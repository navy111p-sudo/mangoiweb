name: Build Mangoi Test APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build signed release APK
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          gradle assembleRelease --no-daemon --stacktrace --warning-mode all 2>&1 | tee /tmp/build.log

      - name: Publish results to repo
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          cp /tmp/build.log ci-build.log 2>/dev/null || echo "(no /tmp/build.log)" > ci-build.log
          echo "" >> ci-build.log
          echo "BUILD_OUTCOME=${{ steps.build.outcome }}" >> ci-build.log
          mkdir -p dist
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            cp mobile-app/app/build/outputs/apk/release/app-release.apk dist/mangoi-test-signed.apk
            echo "APK committed to dist/mangoi-test-signed.apk" >> ci-build.log

            # === 앱 자동 업데이트용: APK 를 웹사이트에 배치 + 버전 매니페스트 생성 ===
            # (build.gradle 의 versionCode/Name 을 단일 출처로 사용)
            VC=$(grep -oE 'versionCode[[:space:]]+[0-9]+' mobile-app/app/build.gradle | grep -oE '[0-9]+' | head -1)
            VN=$(grep -oE 'versionName[[:space:]]+"[^"]+"' mobile-app/app/build.gradle | sed -E 's/.*"([^"]+)".*/\1/' | head -1)
            mkdir -p cloudflare-deploy/public/downloads
            cp mobile-app/app/build/outputs/apk/release/app-release.apk cloudflare-deploy/public/downloads/mangoi.apk
            {
              printf '{\n'
              printf '  "versionCode": %s,\n' "${VC:-1}"
              printf '  "versionName": "%s",\n' "${VN:-1.0}"
              printf '  "url": "https://test.mangoi.co.kr/downloads/mangoi.apk",\n'
              printf '  "notes": "%s"\n' "최신 버전이 배포되었습니다. 업데이트하면 새 기능과 개선이 적용됩니다."
              printf '}\n'
            } > cloudflare-deploy/public/app-version.json
            echo "app-version.json 생성: versionCode=$VC versionName=$VN" >> ci-build.log
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ci-build.log dist cloudflare-deploy/public/app-version.json cloudflare-deploy/public/downloads 2>/dev/null || true
          git commit -m "ci: publish build results + APK auto-update manifest [skip ci]" || echo "nothing to commit"
          # 자동배포 워처가 main 을 빠르게 밀어올리므로 rebase 없는 push 는 거부되기 쉽다.
          # fetch→rebase→push 를 재시도해 CI 결과(APK+매니페스트)가 확실히 안착하게 한다.
          # 충돌 가능 파일은 CI 가 생성한 app-version.json 뿐 → 그럴 땐 항상 우리(CI) 버전 채택.
          pushed=0
          for attempt in $(seq 1 6); do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then pushed=1; break; fi
            else
              git checkout --ours cloudflare-deploy/public/app-version.json 2>/dev/null || true
              git add -A
              GIT_EDITOR=true git rebase --continue || git rebase --abort
            fi
            sleep $((attempt * 4))
          done
          if [ "$pushed" != "1" ]; then echo "::error::CI push to main failed after retries"; exit 1; fi

      - name: Upload APK artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: mangoi-test-signed-apk
          path: mobile-app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Fail job if build failed
        if: steps.build.outcome != 'success'
        run: |
          echo "Gradle build failed — see ci-build.log committed to the repo."
          exit 1
