name: Build Mangoi Test APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build signed release APK
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          gradle assembleRelease --no-daemon --stacktrace --warning-mode all 2>&1 | tee /tmp/build.log

      - name: Commit build log to repo (for diagnosis)
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          cp /tmp/build.log ci-build.log 2>/dev/null || echo "(no /tmp/build.log produced)" > ci-build.log
          echo "" >> ci-build.log
          echo "BUILD_OUTCOME=${{ steps.build.outcome }}" >> ci-build.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ci-build.log
          git commit -m "ci: build log [skip ci]" || echo "nothing to commit"
          git push origin HEAD:main

      - name: Prepare APK
        if: steps.build.outcome == 'success'
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk out/mangoi-test-signed.apk

      - name: Upload APK artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: mangoi-test-signed-apk
          path: mobile-app/out/mangoi-test-signed.apk
          if-no-files-found: error

      - name: Fail job if build failed
        if: steps.build.outcome != 'success'
        run: |
          echo "Gradle build failed — see ci-build.log committed to the repo."
          exit 1
