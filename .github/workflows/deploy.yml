name: Deploy WebRTC Unified Platform (Cloudflare Workers)

# main 브랜치에 push 될 때마다 자동 배포.
# 수동 실행도 가능 (Actions 탭 → Run workflow).
on:
  push:
    branches: [main]
    paths:
      # cloudflare-deploy 하위만 배포 트리거 (불필요한 배포 방지)
      - 'cloudflare-deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      skip_base:
        description: 'base Worker 배포 건너뜀'
        required: false
        default: 'false'
      skip_prod:
        description: 'production Worker 배포 건너뜀'
        required: false
        default: 'false'

# 동시 실행 방지 (중복 배포로 인한 바인딩 경쟁 방지)
concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    # 작업 디렉터리를 cloudflare-deploy/ 로 고정 (package.json / wrangler.toml 위치)
    defaults:
      run:
        working-directory: cloudflare-deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'cloudflare-deploy/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (src/*.ts)
        run: npx tsc --noEmit
        continue-on-error: true

      # ─── 인라인 JS 문법 게이트 (차단) ───
      # 이 경로는 deploy.ps1 을 타지 않는다. 로컬 배포에만 게이트를 걸면
      # main 에 push 되는 순간 여기로 그대로 빠져나간다.
      #
      # 2026-07-23 장애: 폰트 일괄치환이 JS 문자열 안 CSS 를 건드려 문자열이 끊겼고
      #   index.html 인라인 script 10블록이 통째로 SyntaxError → 수업 입장 함수가
      #   아예 정의되지 않아 전 사용자가 수업에 못 들어갔다. 그런데
      #     · 위 tsc 는 src/*.ts 만 본다 (게다가 continue-on-error 라 실패해도 통과)
      #     · 아래 헬스체크는 HTTP 200 여부만 본다 (내용이 깨져도 200 이다)
      #   이 두 개로는 절대 못 잡는다.
      #
      # continue-on-error 를 붙이지 않는다 — 실패하면 배포하지 않는다.
      # 검사 대상: cloudflare-deploy/public 이하 .html 인라인 <script> + .js 전수
      - name: Inline JS syntax gate (HTML <script> + .js)
        working-directory: .
        run: node test-harness/inline_js_syntax_harness.mjs

      # 시크릿 존재 여부 확인 — 없으면 워크플로우는 성공 처리하고 배포만 건너뜀
      - name: Check required secrets
        id: check_secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN 또는 CLOUDFLARE_ACCOUNT_ID 시크릿이 설정되지 않아 Cloudflare 배포를 건너뜁니다. (Settings → Secrets and variables → Actions 에서 등록)"
            echo "secrets_present=false" >> "$GITHUB_OUTPUT"
          else
            echo "✓ Cloudflare 시크릿 확인 완료"
            echo "secrets_present=true" >> "$GITHUB_OUTPUT"
          fi

      # ─── 1) base Worker 배포 (webrtc-unified-platform) ───
      - name: Deploy base Worker
        if: steps.check_secrets.outputs.secrets_present == 'true' && github.event.inputs.skip_base != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'cloudflare-deploy'
          wranglerVersion: '4'
          # wrangler deploy — top-level 바인딩 사용 (Durable Objects/KV/D1/R2)
          command: deploy

      # ─── 2) production Worker 배포 (webrtc-unified-platform-prod) ───
      # Wrangler 4부터 [env.production] 은 top-level 바인딩을 자동 상속하지 않으므로
      # wrangler.toml 에 production 블록이 재선언되어 있어야 함 (이미 되어 있음).
      - name: Deploy production Worker
        if: steps.check_secrets.outputs.secrets_present == 'true' && github.event.inputs.skip_prod != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'cloudflare-deploy'
          wranglerVersion: '4'
          command: deploy --env production

      # ─── 3) 배포 후 헬스체크 ───
      - name: Health check — base
        if: steps.check_secrets.outputs.secrets_present == 'true' && github.event.inputs.skip_base != 'true'
        run: |
          URL="https://webrtc-unified-platform.navy111p.workers.dev/video-call/"
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 20 "$URL" || echo "000")
          echo "base   → $URL → HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::warning::base Worker 헬스체크 실패 (HTTP $CODE)"
          fi

      - name: Health check — production
        if: steps.check_secrets.outputs.secrets_present == 'true' && github.event.inputs.skip_prod != 'true'
        run: |
          URL="https://webrtc-unified-platform-prod.navy111p.workers.dev/video-call/"
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 20 "$URL" || echo "000")
          echo "prod   → $URL → HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::warning::production Worker 헬스체크 실패 (HTTP $CODE)"
          fi

      - name: Deploy summary
        if: always()
        run: |
          {
            if [ "${{ steps.check_secrets.outputs.secrets_present }}" = "true" ]; then
              echo "### 🚀 Cloudflare Workers 배포 요약"
              echo ""
              echo "| Worker | URL |"
              echo "|---|---|"
              echo "| base | https://webrtc-unified-platform.navy111p.workers.dev/video-call/ |"
              echo "| production | https://webrtc-unified-platform-prod.navy111p.workers.dev/video-call/ |"
              echo ""
              echo "커밋: \`${{ github.sha }}\`"
            else
              echo "### ⏭️ Cloudflare 배포 건너뜀"
              echo ""
              echo "**원인**: \`CLOUDFLARE_API_TOKEN\` 또는 \`CLOUDFLARE_ACCOUNT_ID\` 시크릿 미설정"
              echo ""
              echo "**해결**: Settings → Secrets and variables → Actions 에서 두 시크릿을 추가하세요."
              echo ""
              echo "커밋: \`${{ github.sha }}\`"
            fi
          } >> $GITHUB_STEP_SUMMARY
