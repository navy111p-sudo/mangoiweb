<!doctype html><html lang=ko><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>망고아이 우주인 말풍선 샘플</title><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Pretendard','Malgun Gothic','Segoe UI',system-ui,sans-serif;background:#05070f;overflow:hidden}
.stage{position:relative;width:100%;height:100vh;min-height:560px;
  background:radial-gradient(120% 90% at 78% 18%,#1b2a55 0%,#0b1330 42%,#05070f 100%);
  overflow:hidden;display:flex;align-items:center}
/* twinkling starfield (pure CSS) */
.stars{position:absolute;inset:0;background-image:
  radial-gradient(1.5px 1.5px at 12% 22%,#fff,transparent),
  radial-gradient(1.5px 1.5px at 28% 68%,#cfe0ff,transparent),
  radial-gradient(1px 1px at 47% 34%,#fff,transparent),
  radial-gradient(1.5px 1.5px at 63% 12%,#fff,transparent),
  radial-gradient(1px 1px at 72% 52%,#bcd2ff,transparent),
  radial-gradient(1.5px 1.5px at 84% 78%,#fff,transparent),
  radial-gradient(1px 1px at 92% 30%,#fff,transparent),
  radial-gradient(1px 1px at 38% 88%,#fff,transparent);
  opacity:.85;animation:twinkle 6s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.55}50%{opacity:.95}}

.hero-copy{position:relative;z-index:2;padding-left:8%;max-width:640px;color:#fff}
.kicker{font-size:15px;font-weight:800;letter-spacing:.22em;color:#ffd23f;margin-bottom:18px}
.hero-copy h1{font-size:clamp(34px,5vw,64px);font-weight:900;line-height:1.08;letter-spacing:-.02em;
  text-shadow:0 6px 30px rgba(0,0,0,.5)}
.lead{margin-top:18px;font-size:clamp(16px,2vw,22px);color:#c7d2f0}
.hint{margin-top:34px;display:inline-flex;align-items:center;gap:10px;font-size:15px;font-weight:700;
  color:#0b1330;background:#ffd23f;padding:11px 18px;border-radius:999px;
  box-shadow:0 10px 26px -8px rgba(251,191,36,.6);animation:bob 1.8s ease-in-out infinite;transition:opacity .4s}
.hint i{font-style:normal;font-size:18px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* astronaut sits on the right, gently floating */
.astro-zone{position:absolute;right:6%;top:50%;width:min(34vw,380px);
  transform:translateY(-50%);z-index:3;cursor:pointer;outline:none}
.astro{width:100%;animation:float 7s ease-in-out infinite;transition:transform .5s cubic-bezier(.22,.7,.3,1);will-change:transform}
.astro img{width:100%;height:auto;display:block;user-select:none;-webkit-user-drag:none;
  filter:drop-shadow(0 22px 40px rgba(0,0,0,.55)) drop-shadow(0 0 26px rgba(251,191,36,.28))}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-22px) rotate(1.5deg)}}
/* on hover: pause the drift, lift & scale a touch — like it leans in to speak */
.astro-zone:hover .astro,.astro-zone:focus .astro,.astro-zone.on .astro{
  animation-play-state:paused;transform:translateY(-10px) scale(1.05)}

/* speech bubble — hidden until hover, then reveals with an Apple-like ease */
.bubble{position:absolute;left:-42%;top:2%;width:340px;max-width:80vw;
  background:#fffdf6;color:#241a02;border-radius:22px;padding:20px 24px;
  box-shadow:0 26px 60px -16px rgba(0,0,0,.5), 0 0 0 2px rgba(251,191,36,.35) inset;
  opacity:0;transform:translateY(14px) scale(.86);transform-origin:88% 100%;pointer-events:none;
  transition:opacity .5s cubic-bezier(.22,.7,.3,1), transform .55s cubic-bezier(.34,1.56,.44,1);
  transition-delay:.05s}
.bubble b{display:block;font-size:20px;font-weight:900;line-height:1.35;color:#b3620a}
.bubble span{display:block;font-size:22px;font-weight:800;line-height:1.4;margin-top:4px}
.bubble em{font-style:normal;color:#e8760a}
.bubble .tail{position:absolute;right:34px;bottom:-16px;width:34px;height:22px;background:transparent}
.bubble .tail::before{content:"";position:absolute;inset:0;background:#fffdf6;
  clip-path:polygon(0 0,100% 0,58% 100%);box-shadow:0 12px 18px -8px rgba(0,0,0,.35)}
.astro-zone:hover .bubble,.astro-zone:focus .bubble,.astro-zone.on .bubble{
  opacity:1;transform:translateY(0) scale(1)}

@media (max-width:820px){
  .hero-copy{padding-left:6%;max-width:60%}
  .astro-zone{right:2%;width:44vw}
  .bubble{left:-70%;width:280px;font-size:.9em}
}
</style></head><body>

<script>
// touch / tap support: toggle the bubble on tap; also hide the hint once shown once
(function(){
  var zone=document.getElementById('astroZone'), hint=document.getElementById('hint');
  function reveal(){ zone.classList.add('on'); if(hint) hint.style.opacity='0'; }
  zone.addEventListener('mouseenter',reveal);
  zone.addEventListener('mouseleave',function(){ zone.classList.remove('on'); });
  zone.addEventListener('click',function(){ zone.classList.toggle('on'); if(hint) hint.style.opacity='0'; });
  zone.addEventListener('focus',reveal);
  zone.addEventListener('blur',function(){ zone.classList.remove('on'); });
})();
