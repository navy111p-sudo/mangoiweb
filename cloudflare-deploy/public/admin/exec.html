<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📊 경영진 대시보드 — 망고아이</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#263449;
    --fg:#e2e8f0; --mut:#94a3b8; --dim:#64748b; --bd:#334155;
    --y:#f59e0b; --g:#10b981; --r:#ef4444; --b:#3b82f6; --p:#a855f7;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",sans-serif;font-size:14px}
  a{color:inherit;text-decoration:none}
  header.top{min-height:56px;display:flex;align-items:center;flex-wrap:wrap;gap:8px 12px;padding:8px 14px;border-bottom:1px solid var(--bd);background:#0b1220;position:sticky;top:0;z-index:50}
  header.top h1{font-size:16px;margin:0;font-weight:800;letter-spacing:-.3px}
  header.top .grow{flex:1}
  header.top a.btn,header.top button.btn{padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--panel);color:var(--fg);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  header.top a.btn:hover,header.top button.btn:hover{background:var(--panel2)}
  main{max-width:1080px;margin:0 auto;padding:16px 14px 80px}
  .as-of{color:var(--dim);font-size:12px;margin:4px 2px 14px}
  h2.sec{font-size:14px;color:var(--mut);font-weight:700;margin:22px 2px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .seg{display:inline-flex;gap:6px}
  .seg button{padding:4px 11px;border-radius:6px;border:1px solid var(--bd);background:var(--panel);color:var(--mut);font-size:12px;cursor:pointer}
  .seg button.active{background:#0b1220;color:#fcd34d;border-color:var(--y);font-weight:700}
  .kpi-row{display:grid;gap:12px;grid-template-columns:repeat(4,1fr)}
  @media(max-width:780px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
  .kpi-card{background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:16px;position:relative;overflow:hidden}
  .kpi-card::after{content:"";position:absolute;inset:0 0 auto auto;width:80px;height:80px;background:radial-gradient(circle at top right,rgba(245,158,11,.10),transparent 70%)}
  .kpi-card h3{margin:0 0 8px;font-size:12px;color:var(--mut);font-weight:600;display:flex;align-items:center;gap:6px}
  .kpi-card .big{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1.1}
  .kpi-card .sub{margin-top:6px;font-size:12px;color:var(--dim)}
  .trend{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:2px}
  .up{background:rgba(16,185,129,.15);color:#34d399}
  .down{background:rgba(239,68,68,.15);color:#f87171}
  .flat{background:rgba(148,163,184,.15);color:#cbd5e1}
  .chart-wrap{background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:14px}
  .chart-box{position:relative;height:300px;width:100%}
  @media(max-width:640px){.chart-box{height:240px}.kpi-card .big{font-size:22px}}
  .hint{font-size:11px;color:var(--dim);margin:8px 2px 0;text-align:center}
  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(2,6,23,.62);opacity:0;pointer-events:none;transition:opacity .25s;z-index:80}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(440px,92vw);background:var(--bg);border-left:1px solid var(--bd);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:90;display:flex;flex-direction:column}
  .drawer.on{transform:translateX(0)}
  .drawer header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--bd);background:#0b1220}
  .drawer header h3{margin:0;font-size:15px;font-weight:800}
  .drawer header .x{margin-left:auto;background:transparent;border:1px solid var(--bd);color:var(--fg);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px}
  .drawer .body{padding:16px;overflow-y:auto;flex:1}
  .mini-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .mini{background:var(--panel);border:1px solid var(--bd);border-radius:10px;padding:11px}
  .mini .lbl{font-size:11px;color:var(--mut)}
  .mini .val{font-size:17px;font-weight:800;margin-top:3px}
  .dgrp{margin-top:18px}
  .dgrp h4{margin:0 0 8px;font-size:12px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  table.list{width:100%;border-collapse:collapse;font-size:13px}
  table.list th,table.list td{padding:8px 9px;text-align:left;border-bottom:1px solid var(--bd)}
  table.list th{background:var(--panel2);color:var(--mut);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  table.list td.num{text-align:right;font-variant-numeric:tabular-nums}
  .empty{color:var(--dim);font-size:13px;padding:10px 2px}
  .badge{display:inline-block;background:rgba(245,158,11,.14);color:#fcd34d;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--y);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header class="top">
  <h1>📊 경영진 대시보드</h1>
  <span class="badge" id="brandDate">—</span>
  <span class="badge" id="scopeBadge" style="background:rgba(59,130,246,.18);color:#93c5fd">—</span>
  <select id="scopeSel" style="display:none;padding:5px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--panel);color:var(--fg);font-size:12px"></select>
  <span class="grow"></span>
  <a class="btn" href="/admin/students-unified">👨‍🎓 학생</a>
  <a class="btn" href="/admin/finance-realtime">💸 실시간 재무</a>
  <a class="btn" href="/admin">← 관리자</a>
  <button class="btn" id="refreshBtn">↻ 새로고침</button>
</header>

<main>
  <p class="as-of" id="asOf"><span class="spin"></span> 불러오는 중…</p>

  <!-- ① 핵심 지표 -->
  <section>
    <h2 class="sec">오늘의 경영 지표</h2>
    <div class="kpi-row" id="kpiToday">
      <div class="kpi-card"><h3>👥 재원생</h3><div class="big">…</div></div>
      <div class="kpi-card"><h3>💰 오늘 매출</h3><div class="big">…</div></div>
      <div class="kpi-card"><h3>💸 오늘 비용</h3><div class="big">…</div></div>
      <div class="kpi-card"><h3>📈 오늘 순익</h3><div class="big">…</div></div>
    </div>
    <h2 class="sec">이번 달 누계</h2>
    <div class="kpi-row" id="kpiMonth">
      <div class="kpi-card"><h3>🆕 이번달 신규</h3><div class="big">…</div></div>
      <div class="kpi-card"><h3>💰 이번달 매출</h3><div class="big">…</div></div>
      <div class="kpi-card"><h3>💸 이번달 비용</h3><div class="big">…</div></div>
      <div class="kpi-card"><h3>📈 이번달 순익</h3><div class="big">…</div></div>
    </div>
  </section>

  <!-- ② 학생수 추이 -->
  <section>
    <h2 class="sec">👥 학생수 추이
      <span class="seg" id="rangeSeg">
        <button data-days="7">7일</button>
        <button data-days="30" class="active">30일</button>
        <button data-days="90">90일</button>
      </span>
    </h2>
    <div class="chart-wrap"><div class="chart-box"><canvas id="stuChart"></canvas></div></div>
  </section>

  <!-- ③ 매출·비용 추이 -->
  <section>
    <h2 class="sec">💰 매출 · 비용 · 순익 추이</h2>
    <div class="chart-wrap"><div class="chart-box"><canvas id="finChart"></canvas></div></div>
    <p class="hint">📌 차트의 막대/점을 누르면 그날의 상세 데이터(결제·지출·신규 학생)가 열립니다.</p>
  </section>
</main>

<!-- 상세 드로어 -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <header>
    <h3 id="dTitle">상세</h3>
    <button class="x" id="dClose">✕</button>
  </header>
  <div class="body" id="dBody"><p class="empty">날짜를 선택하세요.</p></div>
</aside>

<script>
const $ = s => document.querySelector(s);
const won = n => (n||0).toLocaleString('ko-KR') + '원';
const manwon = n => { n=n||0; if(Math.abs(n)>=10000){const m=n/10000; return (Math.round(m*10)/10).toLocaleString('ko-KR')+'만'} return n.toLocaleString('ko-KR')+'원' };
const fmtTime = ms => { const d=new Date(ms+9*3600*1000); return d.toISOString().slice(11,16) };
function trendTag(v){
  if(v===undefined||v===null) return '';
  const cls = v>0?'up':(v<0?'down':'flat'); const arw = v>0?'▲':(v<0?'▼':'–');
  return `<span class="trend ${cls}">${arw} ${Math.abs(v)}%</span>`;
}
let stuChart, finChart, curDays=30, seriesCache=[];
let asParam='';
function withAs(u){ return asParam ? u + (u.includes('?')?'&':'?') + 'as=' + encodeURIComponent(asParam) : u; }

async function jget(u){ const r=await fetch(u,{credentials:'same-origin'}); if(!r.ok) throw new Error(u+' '+r.status); return r.json(); }

async function loadSummary(){
  const s = await jget(withAs('/api/admin/exec/summary'));
  const today = new Date(s.as_of); 
  $('#brandDate').textContent = s.today.date;
  if (s.scope) $('#scopeBadge').textContent = s.scope.label;
  $('#asOf').textContent = '최종 갱신 ' + today.toLocaleString('ko-KR',{hour12:false});
  // 오늘
  $('#kpiToday').innerHTML = `
    <div class="kpi-card"><h3>👥 재원생</h3><div class="big">${s.students.active.toLocaleString('ko-KR')}<span style="font-size:14px;color:var(--mut)">명</span></div><div class="sub">오늘 신규 +${s.students.new_today}명</div></div>
    <div class="kpi-card"><h3>💰 오늘 매출</h3><div class="big" style="color:#34d399">${manwon(s.today.income)}</div><div class="sub">${s.today.pay_count}건 결제 ${trendTag(s.today.income_trend)}</div></div>
    <div class="kpi-card"><h3>💸 오늘 비용</h3>${s.cost_hq_only?'<div class="big" style="color:#64748b;font-size:17px">본사 통합</div><div class="sub">대리점은 매출·학생만</div>':`<div class="big" style="color:#f87171">${manwon(s.today.expense)}</div><div class="sub">급여 ${manwon(s.today.expense_payroll)} · 기타 ${manwon(s.today.expense_manual)}</div>`}</div>
    <div class="kpi-card"><h3>📈 오늘 순익</h3><div class="big" style="color:${s.today.net>=0?'#60a5fa':'#f87171'}">${manwon(s.today.net)}</div><div class="sub">${trendTag(s.today.net_trend)}</div></div>`;
  // 이번달
  $('#kpiMonth').innerHTML = `
    <div class="kpi-card"><h3>🆕 이번달 신규</h3><div class="big">+${s.students.new_this_month}<span style="font-size:14px;color:var(--mut)">명</span></div><div class="sub">${s.this_month.period}</div></div>
    <div class="kpi-card"><h3>💰 이번달 매출</h3><div class="big" style="color:#34d399">${manwon(s.this_month.income)}</div><div class="sub">${s.this_month.pay_count}건 ${trendTag(s.this_month.income_trend)}</div></div>
    <div class="kpi-card"><h3>💸 이번달 비용</h3>${s.cost_hq_only?'<div class="big" style="color:#64748b;font-size:17px">본사 통합</div><div class="sub">대리점은 매출·학생만</div>':`<div class="big" style="color:#f87171">${manwon(s.this_month.expense)}</div><div class="sub">급여 ${manwon(s.this_month.expense_payroll)}</div>`}</div>
    <div class="kpi-card"><h3>📈 이번달 순익</h3><div class="big" style="color:${s.this_month.net>=0?'#60a5fa':'#f87171'}">${manwon(s.this_month.net)}</div><div class="sub">${trendTag(s.this_month.net_trend)}</div></div>`;
}

const gridC='rgba(148,163,184,.12)', tickC='#94a3b8';
const baseOpts = onClick => ({
  responsive:true, maintainAspectRatio:false,
  interaction:{mode:'index',intersect:false},
  onClick:(e,els)=>{ if(els&&els.length){ const i=els[0].index; const d=seriesCache[i]; if(d) openDetail(d.date); } },
  plugins:{ legend:{labels:{color:tickC,boxWidth:12,font:{size:11}}}, tooltip:{} },
  scales:{ x:{grid:{color:gridC},ticks:{color:tickC,maxRotation:0,autoSkip:true,maxTicksLimit:8,font:{size:10}}} }
});

async function loadSeries(days){
  const r = await jget(withAs('/api/admin/exec/series?days='+days));
  seriesCache = r.series;
  const labels = r.series.map(d=>d.date.slice(5));
  const cum = r.series.map(d=>d.cum_students);
  const nw = r.series.map(d=>d.new_students);
  const inc = r.series.map(d=>d.income);
  const exp = r.series.map(d=>d.expense);
  const net = r.series.map(d=>d.net);

  if(stuChart) stuChart.destroy();
  stuChart = new Chart($('#stuChart'),{ data:{labels,datasets:[
      {type:'line',label:'누적 재원생',data:cum,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.12)',tension:.3,fill:true,pointRadius:2,yAxisID:'y',order:1},
      {type:'bar',label:'신규 학생',data:nw,backgroundColor:'rgba(168,85,247,.6)',borderRadius:3,yAxisID:'y1',order:2}
    ]}, options:{...baseOpts(), scales:{
      x:{grid:{color:gridC},ticks:{color:tickC,maxRotation:0,autoSkip:true,maxTicksLimit:8,font:{size:10}}},
      y:{position:'left',grid:{color:gridC},ticks:{color:tickC,font:{size:10}},title:{display:true,text:'재원생(명)',color:tickC,font:{size:10}}},
      y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:tickC,font:{size:10},precision:0},title:{display:true,text:'신규(명)',color:tickC,font:{size:10}}}
    }}});

  if(finChart) finChart.destroy();
  finChart = new Chart($('#finChart'),{ data:{labels,datasets:[
      {type:'bar',label:'매출',data:inc,backgroundColor:'rgba(16,185,129,.55)',borderRadius:3,order:2},
      {type:'bar',label:'비용',data:exp,backgroundColor:'rgba(239,68,68,.55)',borderRadius:3,order:2},
      {type:'line',label:'순익',data:net,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',tension:.3,fill:true,pointRadius:2,order:1}
    ]}, options:{...baseOpts(), scales:{
      x:{grid:{color:gridC},ticks:{color:tickC,maxRotation:0,autoSkip:true,maxTicksLimit:8,font:{size:10}}},
      y:{grid:{color:gridC},ticks:{color:tickC,font:{size:10},callback:v=>(v/10000)+'만'}}
    }}});
}

async function openDetail(date){
  $('#dTitle').textContent = date + ' 상세';
  $('#dBody').innerHTML = '<p class="empty"><span class="spin"></span> 불러오는 중…</p>';
  $('#scrim').classList.add('on'); $('#drawer').classList.add('on'); $('#drawer').setAttribute('aria-hidden','false');
  try{
    const d = await jget(withAs('/api/admin/exec/detail?date='+date));
    let h = `<div class="mini-row">
      <div class="mini"><div class="lbl">매출</div><div class="val" style="color:#34d399">${manwon(d.income_total)}</div></div>
      <div class="mini"><div class="lbl">비용</div><div class="val" style="color:#f87171">${manwon(d.expense_total)}</div></div>
      <div class="mini"><div class="lbl">순익</div><div class="val" style="color:#60a5fa">${manwon(d.income_total-d.expense_total)}</div></div>
    </div>`;
    // 신규 학생
    h += `<div class="dgrp"><h4>🆕 신규 학생 (${d.new_students.length}명)</h4>`;
    h += d.new_students.length ? '<table class="list"><tr><th>이름</th><th>영문명</th></tr>' +
      d.new_students.map(s=>`<tr><td>${s.korean_name||'-'}</td><td>${s.english_name||'-'}</td></tr>`).join('')+'</table>'
      : '<p class="empty">신규 등록 없음</p>';
    h += '</div>';
    // 결제 내역
    h += `<div class="dgrp"><h4>💰 결제 내역 (${d.payments.length}건)</h4>`;
    h += d.payments.length ? '<table class="list"><tr><th>학생</th><th>방식</th><th>시각</th><th class="num">금액</th></tr>' +
      d.payments.map(p=>`<tr><td>${p.student_name||'-'}</td><td>${p.method||'-'}</td><td>${fmtTime(p.paid_at)}</td><td class="num">${won(p.amount_krw)}</td></tr>`).join('')+'</table>'
      : '<p class="empty">결제 없음</p>';
    h += '</div>';
    // 지출 내역
    h += `<div class="dgrp"><h4>💸 지출 내역 (수동 ${d.expenses.length}건 + 급여 ${d.payroll_count}건)</h4>`;
    let xt = d.expenses.length ? '<table class="list"><tr><th>분류</th><th>메모</th><th class="num">금액</th></tr>' +
      d.expenses.map(x=>`<tr><td>${x.category||'기타'}</td><td>${x.memo||'-'}</td><td class="num">${won(x.amount_krw)}</td></tr>`).join('')+'</table>'
      : '<p class="empty">수동 지출 없음</p>';
    if(d.payroll_total>0) xt += `<p class="empty">＋ 급여 정산 ${won(d.payroll_total)} (${d.payroll_count}건)</p>`;
    h += xt + '</div>';
    $('#dBody').innerHTML = h;
  }catch(e){ $('#dBody').innerHTML = '<p class="empty">불러오기 실패: '+e.message+'</p>'; }
}
function closeDetail(){ $('#scrim').classList.remove('on'); $('#drawer').classList.remove('on'); $('#drawer').setAttribute('aria-hidden','true'); }

$('#dClose').onclick = closeDetail;
$('#scrim').onclick = closeDetail;
$('#refreshBtn').onclick = ()=>boot();
$('#rangeSeg').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  [...$('#rangeSeg').children].forEach(x=>x.classList.remove('active')); b.classList.add('active');
  curDays = +b.dataset.days; loadSeries(curDays);
});

async function loadScopes(){
  try{
    const r = await jget('/api/admin/exec/scopes');
    if(!r || !r.hq) return;
    const sel = $('#scopeSel');
    const opts = [{value:'',label:'🏢 본사 전체'}]
      .concat((r.branches||[]).map(b=>({value:b.value,label:'🏬 '+b.label})))
      .concat((r.agencies||[]).map(a=>({value:a.value,label:'🏪 '+a.label+' ('+a.students+'명)'})));
    sel.innerHTML = opts.map(o=>`<option value="${o.value}">${o.label}</option>`).join('');
    sel.style.display='';
    sel.onchange=()=>{ asParam=sel.value; reload(); };
  }catch(e){}
}
async function reload(){
  try{ await loadSummary(); await loadSeries(curDays); }
  catch(e){ $('#asOf').innerHTML = '⚠️ 데이터를 불러오지 못했습니다 — 로그인이 필요할 수 있어요. <a href="/admin/login?next=/admin/exec" style="color:#fcd34d">로그인</a>'; }
}
async function boot(){ await loadScopes(); await reload(); }
boot();
</script>
</body>
</html>
