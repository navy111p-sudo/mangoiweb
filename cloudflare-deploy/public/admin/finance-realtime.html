<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>💸 실시간 재무 — 망고아이</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#263449;
    --fg:#e2e8f0; --mut:#94a3b8; --dim:#64748b; --bd:#334155;
    --y:#f59e0b; --g:#10b981; --r:#ef4444; --b:#3b82f6; --p:#a855f7;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",sans-serif;font-size:14px}
  a{color:#fde68a;text-decoration:none}

  header.top{min-height:56px;display:flex;align-items:center;flex-wrap:wrap;gap:8px 12px;padding:8px 14px;border-bottom:1px solid var(--bd);background:#0b1220;position:sticky;top:0;z-index:50}
  header.top .brand{font-weight:800;color:#fbbf24;white-space:nowrap;flex-shrink:0}
  header.top .crumb{color:var(--mut);font-size:13px;white-space:nowrap;flex-shrink:0}
  header.top .right{margin-left:auto;display:flex;align-items:center;flex-wrap:wrap;gap:8px;flex-shrink:0}
  header.top a.btn,header.top button.btn{padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--panel);color:var(--fg);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  @media(max-width:480px){
    header.top{gap:6px 8px;padding:8px 10px}
    header.top .crumb{display:none}
    header.top .right{width:100%;margin-left:0;justify-content:flex-start}
    header.top a.btn,header.top button.btn{padding:6px 10px;font-size:11.5px}
  }
  header.top a.btn:hover,header.top button.btn:hover{background:var(--panel2)}

  main{max-width:1400px;margin:0 auto;padding:18px}
  .as-of{font-size:12px;color:var(--dim);margin:0 2px 14px}

  section{margin-bottom:22px}
  h2.sec{font-size:13px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin:0 0 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  h2.sec .seg{margin-left:auto;display:flex;gap:4px}
  .seg button{padding:4px 11px;border-radius:6px;border:1px solid var(--bd);background:var(--panel);color:var(--mut);font-size:12px;cursor:pointer}
  .seg button.active{background:#0b1220;color:#fcd34d;border-color:var(--y);font-weight:700}

  /* KPI 3열(오늘/주/월) → 모바일 1열 */
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .kpi-card{background:var(--panel);border:1px solid var(--bd);border-radius:12px;padding:16px}
  .kpi-card h3{margin:0 0 12px;font-size:13px;color:#fcd34d;font-weight:700}
  .kpi-card .line{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px dashed rgba(148,163,184,.15)}
  .kpi-card .line:last-child{border-bottom:0}
  .kpi-card .lab{font-size:12px;color:var(--mut)}
  .kpi-card .val{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums}
  .kpi-card .val.income{color:var(--g)} .kpi-card .val.expense{color:var(--r)} .kpi-card .val.net{color:var(--b)}
  .kpi-card .val.net.minus{color:var(--r)}
  .trend{font-size:11px;font-weight:600;margin-left:6px}
  .trend.up{color:#6ee7b7} .trend.down{color:#fca5a5} .trend.flat{color:var(--dim)}

  .chart-wrap{background:var(--panel);border:1px solid var(--bd);border-radius:12px;padding:14px}
  .chart-box{position:relative;height:300px;width:100%}
  @media(max-width:640px){.chart-box{height:240px}}

  /* 지출 입력 + 목록 */
  .exp-grid{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start}
  .card{background:var(--panel);border:1px solid var(--bd);border-radius:12px;padding:16px}
  .card h3{margin:0 0 12px;font-size:13px;font-weight:700;color:#fcd34d}
  .form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .form-row label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  .form-row input,.form-row select{padding:9px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--panel2);color:var(--fg);font-size:14px;width:100%}
  .form-row input:focus,.form-row select:focus{outline:none;border-color:var(--y)}
  button.primary{width:100%;padding:11px;border-radius:8px;border:0;background:linear-gradient(135deg,var(--y),#d97706);color:#1e293b;font-weight:800;font-size:14px;cursor:pointer;margin-top:4px}
  button.primary:hover{filter:brightness(1.06)}
  button.primary:disabled{opacity:.5;cursor:not-allowed}

  table.list{width:100%;border-collapse:collapse;font-size:13px}
  table.list th,table.list td{padding:9px 10px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
  table.list th{background:var(--panel2);color:var(--mut);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  table.list td.num{text-align:right;font-variant-numeric:tabular-nums}
  table.list tr:hover td{background:rgba(245,158,11,.06)}
  .del{background:transparent;border:1px solid var(--bd);color:#fca5a5;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer}
  .del:hover{background:rgba(239,68,68,.12)}
  .empty{text-align:center;padding:34px 10px;color:var(--mut);font-size:13px}
  .scroll{overflow-x:auto;border-radius:8px}
  .tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .tools a,.tools button{font-size:12px;padding:6px 11px;border-radius:6px;border:1px solid var(--bd);background:var(--panel);color:var(--fg);cursor:pointer}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0b1220;border:1px solid var(--bd);color:var(--fg);padding:11px 18px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:99}
  .toast.show{opacity:1}
  .toast.err{border-color:#991b1b;color:#fca5a5}

  @media(max-width:880px){
    .kpi-row{grid-template-columns:1fr}
    .exp-grid{grid-template-columns:1fr}
  }
</style>
<link rel="stylesheet" href="/css/admin-readability.css"><!-- 가독성 보강 -->
</head>
<body>
<header class="top">
  <span class="brand">🥭 망고아이</span>
  <span class="crumb">／ 실시간 재무</span>
  <span class="crumb" id="scopeCrumb" style="color:#93c5fd;font-weight:700"></span>
  <div class="right">
    <a class="btn" href="/admin/learning-insights">🎓 학습</a>
    <a class="btn" href="/admin/marketing-studio">📣 마케팅</a>
    <button class="btn" id="refreshBtn">↻ 새로고침</button>
    <a class="btn" href="/admin">← 관리자</a>
  </div>
</header>

<main>
  <p class="as-of" id="asOf">불러오는 중…</p>

  <!-- ① 실시간 요약 -->
  <section>
    <h2 class="sec">📊 실시간 요약 (수입 · 지출 · 순이익)</h2>
    <div class="kpi-row" id="summaryRow">
      <div class="kpi-card"><h3>오늘</h3><div class="empty">…</div></div>
      <div class="kpi-card"><h3>이번 주</h3><div class="empty">…</div></div>
      <div class="kpi-card"><h3>이번 달</h3><div class="empty">…</div></div>
    </div>
  </section>

  <!-- ② 일별 추이 -->
  <section>
    <h2 class="sec">📈 일별 현금흐름
      <span class="seg" id="dailySeg">
        <button data-days="7">7일</button>
        <button data-days="30" class="active">30일</button>
        <button data-days="90">90일</button>
      </span>
    </h2>
    <div class="tools">
      <a id="dailyCsv" href="#" target="_blank">⬇ CSV 다운로드</a>
    </div>
    <div class="chart-wrap"><div class="chart-box"><canvas id="dailyChart"></canvas></div></div>
  </section>

  <!-- ③ 주별 집계 -->
  <section>
    <h2 class="sec">🗓 주별 집계
      <span class="seg" id="weeklySeg">
        <button data-weeks="8">8주</button>
        <button data-weeks="12" class="active">12주</button>
        <button data-weeks="26">26주</button>
      </span>
    </h2>
    <div class="tools">
      <a id="weeklyCsv" href="#" target="_blank">⬇ CSV 다운로드</a>
    </div>
    <div class="chart-wrap"><div class="chart-box"><canvas id="weeklyChart"></canvas></div></div>
  </section>

  <!-- ③b 지출 카테고리 -->
  <section>
    <h2 class="sec">🍩 지출 카테고리 구성 (최근 90일)</h2>
    <div class="exp-grid">
      <div class="chart-wrap"><div class="chart-box" style="height:260px"><canvas id="breakdownChart"></canvas></div></div>
      <div class="card"><div class="scroll"><table class="list"><thead><tr><th>분류</th><th class="num">금액</th><th class="num">비중</th></tr></thead><tbody id="bdBody"><tr><td colspan="3" class="empty">불러오는 중…</td></tr></tbody></table></div></div>
    </div>
  </section>

  <!-- ④ 지출 관리 -->
  <section>
    <h2 class="sec">🧾 지출 관리</h2>
    <div class="exp-grid">
      <div class="card">
        <h3>최근 지출 내역</h3>
        <div class="tools">
          <a id="expCsv" href="/api/admin/realtime/expenses?format=csv" target="_blank">⬇ CSV 다운로드</a>
        </div>
        <div class="scroll">
          <table class="list">
            <thead><tr><th>날짜</th><th>분류</th><th class="num">금액</th><th>메모</th><th></th></tr></thead>
            <tbody id="expBody"><tr><td colspan="5" class="empty">불러오는 중…</td></tr></tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <h3>지출 등록</h3>
        <div class="form-row">
          <label>금액 (원)</label>
          <input type="number" id="fAmount" placeholder="예: 150000" min="1" inputmode="numeric">
        </div>
        <div class="form-row">
          <label>분류</label>
          <select id="fCategory">
            <option>임대료</option><option>인건비</option><option>마케팅</option>
            <option>교재/자료</option><option>시스템/서버</option><option>공과금</option>
            <option>세금</option><option selected>기타</option>
          </select>
        </div>
        <div class="form-row">
          <label>날짜</label>
          <input type="date" id="fDate">
        </div>
        <div class="form-row">
          <label>메모 (선택)</label>
          <input type="text" id="fMemo" placeholder="간단 메모" maxlength="120">
        </div>
        <button class="primary" id="addBtn">＋ 지출 추가</button>
      </div>
    </div>
  </section>

  <!-- ⑤ 일일 스냅샷 -->
  <section>
    <h2 class="sec">📁 일일 재무 스냅샷 (자동 저장)</h2>
    <div class="tools">
      <button id="snapBtn">📸 오늘 스냅샷 생성</button>
    </div>
    <div class="card">
      <div class="scroll">
        <table class="list">
          <thead><tr><th>날짜</th><th class="num">수입</th><th class="num">지출</th><th class="num">순이익</th><th class="num">결제건수</th></tr></thead>
          <tbody id="snapBody"><tr><td colspan="5" class="empty">불러오는 중…</td></tr></tbody>
        </table>
      </div>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
const won = n => (Number(n)||0).toLocaleString('ko-KR') + '원';
const $ = s => document.querySelector(s);
let dailyChart, weeklyChart, breakdownChart;

function toast(msg, isErr){
  const t = $('#toast'); t.textContent = msg; t.className = 'toast show' + (isErr?' err':'');
  setTimeout(()=>{ t.className = 'toast' + (isErr?' err':''); }, 2200);
}
async function api(path, opts){
  const r = await fetch(path, Object.assign({ headers:{'Content-Type':'application/json'} }, opts));
  if (r.status === 401){ location.href = '/admin/login?next=' + encodeURIComponent(location.pathname); throw new Error('auth'); }
  const j = await r.json().catch(()=>({ok:false,error:'bad json'}));
  if (!j.ok && j.ok !== undefined) throw new Error(j.error || 'error');
  return j;
}
function trendHtml(t){
  if (!t || t.pct === null) return '<span class="trend flat">신규</span>';
  if (t.pct === 0) return '<span class="trend flat">±0%</span>';
  const up = t.pct > 0;
  return `<span class="trend ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(t.pct)}%</span>`;
}

// ① 요약
async function loadSummary(){
  try{
    const j = await api('/api/admin/realtime/summary');
    $('#asOf').textContent = '기준 시각: ' + new Date(j.as_of).toLocaleString('ko-KR');
    if(j.scope) $('#scopeCrumb').textContent = '· ' + j.scope.label + (j.cost_hq_only?' (매출만)':'');
    const blocks = [
      { title:'오늘', d:j.today, sub:j.today.date },
      { title:'이번 주', d:j.this_week, sub:'주 시작 '+j.this_week.start },
      { title:'이번 달', d:j.this_month, sub:j.this_month.period },
    ];
    $('#summaryRow').innerHTML = blocks.map(b=>{
      const net = b.d.net, netCls = net<0?'net minus':'net';
      return `<div class="kpi-card"><h3>${b.title} <span style="color:var(--dim);font-weight:400;font-size:11px">${b.sub}</span></h3>
        <div class="line"><span class="lab">수입</span><span><span class="val income">${won(b.d.income)}</span>${trendHtml(b.d.income_trend)}</span></div>
        <div class="line"><span class="lab">지출</span><span class="val expense">${j.cost_hq_only?'<span style="color:var(--dim);font-size:12px">본사 통합</span>':won(b.d.expense)}</span></div>
        <div class="line"><span class="lab">순이익</span><span><span class="val ${netCls}">${won(net)}</span>${trendHtml(b.d.net_trend)}</span></div>
        <div class="line"><span class="lab">결제건수</span><span class="val" style="font-size:15px">${b.d.pay_count}건</span></div>
      </div>`;
    }).join('');
  }catch(e){ if(e.message!=='auth') $('#summaryRow').innerHTML = '<div class="kpi-card"><div class="empty">요약 로드 실패: '+e.message+'</div></div>'; }
}

// ② 일별
async function loadDaily(days){
  $('#dailyCsv').href = `/api/admin/realtime/daily?days=${days}&format=csv`;
  try{
    const j = await api(`/api/admin/realtime/daily?days=${days}`);
    const labels = j.series.map(s=>s.date.slice(5));
    const income = j.series.map(s=>s.income);
    const expense = j.series.map(s=>s.expense);
    const net = j.series.map(s=>s.net);
    if (dailyChart) dailyChart.destroy();
    dailyChart = new Chart($('#dailyChart'), {
      data:{ labels, datasets:[
        { type:'bar', label:'수입', data:income, backgroundColor:'rgba(16,185,129,.55)', borderRadius:3, order:2 },
        { type:'bar', label:'지출', data:expense, backgroundColor:'rgba(239,68,68,.55)', borderRadius:3, order:2 },
        { type:'line', label:'순이익', data:net, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.1)', tension:.3, fill:true, pointRadius:2, order:1 },
      ]},
      options: chartOpts()
    });
  }catch(e){ if(e.message!=='auth') toast('일별 로드 실패: '+e.message, true); }
}

// ③ 주별
async function loadWeekly(weeks){
  $('#weeklyCsv').href = `/api/admin/realtime/weekly?weeks=${weeks}&format=csv`;
  try{
    const j = await api(`/api/admin/realtime/weekly?weeks=${weeks}`);
    const labels = j.series.map(s=>s.label);
    if (weeklyChart) weeklyChart.destroy();
    weeklyChart = new Chart($('#weeklyChart'), {
      data:{ labels, datasets:[
        { type:'bar', label:'수입', data:j.series.map(s=>s.income), backgroundColor:'rgba(16,185,129,.55)', borderRadius:3 },
        { type:'bar', label:'지출', data:j.series.map(s=>s.expense), backgroundColor:'rgba(239,68,68,.55)', borderRadius:3 },
        { type:'line', label:'순이익', data:j.series.map(s=>s.net), borderColor:'#3b82f6', tension:.3, pointRadius:2 },
      ]},
      options: chartOpts()
    });
  }catch(e){ if(e.message!=='auth') toast('주별 로드 실패: '+e.message, true); }
}

function chartOpts(){
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{ mode:'index', intersect:false },
    plugins:{
      legend:{ labels:{ color:'#94a3b8', boxWidth:12, font:{size:11} } },
      tooltip:{ callbacks:{ label:c=>`${c.dataset.label}: ${won(c.parsed.y)}` } }
    },
    scales:{
      x:{ ticks:{ color:'#64748b', maxRotation:0, autoSkip:true, maxTicksLimit:12, font:{size:10} }, grid:{ color:'rgba(51,65,85,.4)' } },
      y:{ ticks:{ color:'#64748b', font:{size:10}, callback:v=> (v>=10000? (v/10000)+'만':v) }, grid:{ color:'rgba(51,65,85,.4)' } }
    }
  };
}

// ④ 지출 목록
async function loadExpenses(){
  try{
    const j = await api('/api/admin/realtime/expenses?limit=100');
    if (!j.expenses.length){ $('#expBody').innerHTML = '<tr><td colspan="5" class="empty">등록된 지출이 없습니다.</td></tr>'; return; }
    $('#expBody').innerHTML = j.expenses.map(e=>`<tr>
      <td>${e.date}</td><td>${esc(e.category)}</td><td class="num">${won(e.amount_krw)}</td>
      <td style="color:var(--mut);max-width:160px;overflow:hidden;text-overflow:ellipsis">${esc(e.memo||'')}</td>
      <td><button class="del" data-id="${e.id}">삭제</button></td></tr>`).join('');
  }catch(e){ if(e.message!=='auth') $('#expBody').innerHTML = '<tr><td colspan="5" class="empty">로드 실패: '+esc(e.message)+'</td></tr>'; }
}
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function addExpense(){
  const amount = parseInt($('#fAmount').value, 10);
  if (!amount || amount <= 0){ toast('금액을 올바르게 입력하세요.', true); return; }
  const btn = $('#addBtn'); btn.disabled = true;
  try{
    await api('/api/admin/realtime/expenses', { method:'POST', body: JSON.stringify({
      amount_krw: amount, category: $('#fCategory').value, spent_at: $('#fDate').value || undefined, memo: $('#fMemo').value || undefined
    })});
    $('#fAmount').value=''; $('#fMemo').value='';
    toast('지출이 등록되었습니다.');
    await Promise.all([loadExpenses(), loadSummary(), loadDaily(curDays), loadWeekly(curWeeks)]);
  }catch(e){ if(e.message!=='auth') toast('등록 실패: '+e.message, true); }
  finally{ btn.disabled = false; }
}

async function delExpense(id){
  if (!confirm('이 지출을 삭제할까요?')) return;
  try{
    await api('/api/admin/realtime/expenses/'+id, { method:'DELETE' });
    toast('삭제되었습니다.');
    await Promise.all([loadExpenses(), loadSummary(), loadDaily(curDays), loadWeekly(curWeeks)]);
  }catch(e){ if(e.message!=='auth') toast('삭제 실패: '+e.message, true); }
}

// ⑤ 스냅샷
async function loadSnapshots(){
  try{
    const j = await api('/api/admin/realtime/snapshots?limit=60');
    if (!j.snapshots.length){ $('#snapBody').innerHTML = '<tr><td colspan="5" class="empty">아직 스냅샷이 없습니다. (매일 새벽 자동 생성)</td></tr>'; return; }
    $('#snapBody').innerHTML = j.snapshots.map(s=>{
      const netCls = s.net_krw<0?'color:var(--r)':'color:var(--b)';
      return `<tr><td>${s.snap_date}</td><td class="num" style="color:var(--g)">${won(s.income_krw)}</td>
        <td class="num" style="color:var(--r)">${won(s.expense_krw)}</td>
        <td class="num" style="${netCls};font-weight:700">${won(s.net_krw)}</td>
        <td class="num">${s.pay_count}</td></tr>`;
    }).join('');
  }catch(e){ if(e.message!=='auth') $('#snapBody').innerHTML = '<tr><td colspan="5" class="empty">로드 실패: '+esc(e.message)+'</td></tr>'; }
}
async function makeSnapshot(){
  try{ await api('/api/admin/realtime/snapshot', { method:'POST' }); toast('오늘 스냅샷을 저장했습니다.'); await loadSnapshots(); }
  catch(e){ if(e.message!=='auth') toast('스냅샷 실패: '+e.message, true); }
}

// 상태 + 이벤트
let curDays = 30, curWeeks = 12;
$('#dailySeg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  $('#dailySeg').querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
  curDays = +b.dataset.days; loadDaily(curDays);
});
$('#weeklySeg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  $('#weeklySeg').querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
  curWeeks = +b.dataset.weeks; loadWeekly(curWeeks);
});
$('#expBody').addEventListener('click', e=>{ const b = e.target.closest('.del'); if(b) delExpense(b.dataset.id); });
$('#addBtn').addEventListener('click', addExpense);
$('#snapBtn').addEventListener('click', makeSnapshot);
$('#refreshBtn').addEventListener('click', ()=>{ loadAll(); toast('새로고침 완료'); });

async function loadBreakdown(){
  try{
    const j = await api('/api/admin/realtime/expense-breakdown?days=90');
    const bd = j.breakdown||[];
    if(!bd.length){ $('#bdBody').innerHTML='<tr><td colspan="3" class="empty">최근 90일 지출 내역이 없습니다.</td></tr>'; if(breakdownChart){breakdownChart.destroy();breakdownChart=null;} return; }
    $('#bdBody').innerHTML = bd.map(x=>`<tr><td>${x.category}</td><td class="num">${won(x.amount)}</td><td class="num">${x.pct}%</td></tr>`).join('')+`<tr><td><b>합계</b></td><td class="num"><b>${won(j.total)}</b></td><td class="num">100%</td></tr>`;
    const pal=['#3b82f6','#ef4444','#f59e0b','#10b981','#a855f7','#06b6d4','#ec4899','#84cc16','#f97316','#64748b'];
    if(breakdownChart)breakdownChart.destroy();
    breakdownChart=new Chart($('#breakdownChart'),{type:'doughnut',data:{labels:bd.map(x=>x.category),datasets:[{data:bd.map(x=>x.amount),backgroundColor:pal,borderColor:'#0b1220',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>`${c.label}: ${won(c.parsed)}`}}}}});
  }catch(e){ if(e.message!=='auth') $('#bdBody').innerHTML='<tr><td colspan="3" class="empty">로드 실패: '+e.message+'</td></tr>'; }
}
function loadAll(){ loadSummary(); loadDaily(curDays); loadWeekly(curWeeks); loadExpenses(); loadSnapshots(); loadBreakdown(); }

// 기본 날짜 = 오늘(로컬)
(function initDate(){ const d=new Date(); const z=n=>String(n).padStart(2,'0'); $('#fDate').value = `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`; })();
loadAll();
</script>
