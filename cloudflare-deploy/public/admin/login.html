<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>망고아이 관리자 로그인 — 리다이렉트</title>
<meta http-equiv="refresh" content="0; url=/admin.html?login=1">
<style>
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:linear-gradient(135deg,#0a1530,#1f1b3a); min-height:100vh;
    display:flex; align-items:center; justify-content:center; color:#fff; text-align:center; }
  .box { padding:30px 40px; background:rgba(20,33,59,0.9); border-radius:18px;
    border:1px solid rgba(139,92,246,0.3); box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  h1 { margin:0 0 8px; font-size:18px; color:#fbbf24; }
  p { margin:6px 0; color:#cbd5e1; font-size:13px; }
  a { color:#60a5fa; text-decoration:none; font-weight:700; }
  a:hover { text-decoration:underline; }
  .spinner { width:38px; height:38px; margin:0 auto 12px;
    border:3px solid rgba(251,191,36,0.2); border-top-color:#fbbf24; border-radius:50%;
    animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <h1>🥭 관리자 로그인으로 이동</h1>
  <p>통합 관리자 페이지로 이동 중입니다…</p>
  <p style="margin-top:14px"><a href="/admin.html?login=1">바로 이동 →</a></p>
</div>
<script>
  // 즉시 리다이렉트 (meta refresh 백업)
  location.replace('/admin.html?login=1');
</script>
</body>
</html>
