<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- 🌐 (2026-07-23) 관리자·강사 화면 언어 부팅 — 해외 스태프는 로그인 직후부터 영어.
     판정 로직·주의사항은 /js/adm-lang-boot.js 파일 머리 주석 하나에 모여 있다.
     ⚠️ adm-lang-boot 는 defer 를 붙이지 말 것(첫 페인트 전에 lang 이 정해져야 함). -->
<script src="/js/adm-lang-boot.js?v=3"></script>
<script defer src="/js/i18n-sweep.js?v=9"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>수강권 만료·재활성 · 망고아이</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Malgun Gothic','맑은 고딕','Segoe UI',sans-serif; background:linear-gradient(160deg,#0f172a,#1e293b); color:#e6edf6; min-height:100vh; padding:22px; font-size:17px; }
  .wrap { max-width:1040px; margin:0 auto; }
  .head { display:flex; align-items:center; gap:14px; margin-bottom:6px; }
  .head img { height:52px; }
  h1 { font-size:29px; margin:0; font-weight:900; }
  .sub { color:#a9b7ca; font-size:16.5px; margin:4px 0 20px; line-height:1.55; }
  .langbtn { margin-left:auto; align-self:flex-start; cursor:pointer; font-weight:800; font-size:15px; border-radius:999px; padding:10px 18px; border:1px solid rgba(148,163,184,0.45); background:transparent; color:#e6edf6; }
  .card { background:rgba(30,41,59,0.92); border:1px solid rgba(148,163,184,0.22); border-radius:20px; padding:22px; margin-bottom:18px; }
  .tabs { display:flex; flex-wrap:wrap; gap:10px; }
  .tab { cursor:pointer; font-size:17px; font-weight:800; border-radius:14px; padding:15px 20px; border:1px solid rgba(148,163,184,0.3); background:rgba(15,23,42,0.6); color:#cbd5e1; text-align:center; flex:1; min-width:150px; }
  .tab .cnt { display:block; font-size:26px; font-weight:900; margin-top:4px; }
  .tab.active { border-color:transparent; }
  .tab.expiring.active { background:linear-gradient(135deg,#f59e0b,#d97706); color:#1a1204; }
  .tab.expired.active { background:linear-gradient(135deg,#ef4444,#b91c1c); color:#fff; }
  .tab.inactive.active { background:linear-gradient(135deg,#3b82f6,#1d4ed8); color:#fff; }
  .toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:14px; }
  input, button { font-size:16px; border-radius:11px; padding:12px 15px; border:1px solid rgba(148,163,184,0.4); }
  input { background:#0f172a; color:#e6edf6; flex:1; min-width:180px; }
  .btn { cursor:pointer; font-weight:800; border:0; background:transparent; color:#e6edf6; border:1px solid rgba(148,163,184,0.45); }
  table { width:100%; border-collapse:collapse; margin-top:6px; font-size:16.5px; }
  th, td { padding:14px 11px; text-align:left; border-bottom:1px solid rgba(148,163,184,0.16); }
  th { color:#a9b7ca; font-size:14px; font-weight:700; white-space:nowrap; }
  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  tbody tr:nth-child(even) { background:rgba(148,163,184,0.06); }
  .name { font-weight:800; font-size:18px; }
  .badge { font-size:14px; font-weight:800; padding:5px 12px; border-radius:999px; white-space:nowrap; }
  .b-warn { background:rgba(245,158,11,0.18); color:#fbbf24; }
  .b-danger { background:rgba(239,68,68,0.18); color:#fca5a5; }
  .b-info { background:rgba(59,130,246,0.18); color:#93c5fd; }
  .detail { color:#7dd3fc; text-decoration:none; font-weight:700; }
  .chk { width:22px; height:22px; cursor:pointer; }
  .empty { text-align:center; color:#a9b7ca; padding:32px 12px; line-height:1.7; }
  .muted { color:#7c8ba1; font-size:14.5px; }
  @media (max-width:720px){ table{font-size:14.5px;} th,td{padding:11px 7px;} h1{font-size:24px;} .tab .cnt{font-size:22px;} }
</style>
<style id="pc-scale">
  /* PC 가독성 확대 — admin.html(body{zoom:1.3})과 동일 배율. 모바일 영향 없음 */
  @media (min-width: 1024px) { body { zoom: 1.3; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <img src="/img/mango-char.png" alt="Mangoi">
    <h1 id="t_title">🔁 수강권 관리</h1>
    <button class="langbtn lang-toggle" id="lang">🇺🇸 English</button>
  </div>
  <div class="sub" id="t_sub"></div>

  <div class="card">
    <div class="tabs">
      <div class="tab expiring" data-cat="expiring"><span id="t_tab_expiring"></span><span class="cnt" id="c_expiring">–</span></div>
      <div class="tab expired" data-cat="expired"><span id="t_tab_expired"></span><span class="cnt" id="c_expired">–</span></div>
      <div class="tab inactive" data-cat="inactive"><span id="t_tab_inactive"></span><span class="cnt" id="c_inactive">–</span></div>
    </div>
    <div class="toolbar">
      <input id="search" type="text">
      <button class="btn" id="csv"></button>
      <span class="muted" id="updated"></span>
    </div>
  </div>

  <div class="card" id="msgCard" style="display:none">
    <div style="font-weight:800;font-size:18px;margin-bottom:10px" id="t_msg_title"></div>
    <div class="toolbar" style="align-items:center;gap:12px">
      <label style="display:flex;align-items:center;gap:8px;font-weight:700;cursor:pointer"><input type="checkbox" id="autoToggle" style="width:20px;height:20px"> <span id="t_auto"></span></label>
      <span class="muted" id="t_cap"></span> <input id="dailyCap" type="number" min="1" max="500" style="width:64px">
      <span class="muted" id="t_link"></span> <input id="linkUrl" type="text" style="flex:1;min-width:160px">
      <button class="btn" id="saveSettings"></button>
      <span class="ok" id="setMsg"></span>
    </div>
    <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center">
      <button class="btn" id="bulkSend" style="background:linear-gradient(135deg,#22c55e,#16a34a);color:#052e16;border:0;font-weight:800"></button>
      <span class="muted" id="t_send_hint"></span>
    </div>
  </div>

  <div class="card"><div id="body"></div></div>
</div>

<!-- 문자 미리보기·발송 모달 -->
<div id="msgModal" style="display:none;position:fixed;inset:0;z-index:60">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6)" id="msgBackdrop"></div>
  <div style="position:relative;max-width:470px;margin:7vh auto;padding:0 16px">
    <div class="card" style="margin:0">
      <div style="font-weight:800;font-size:19px;margin-bottom:4px" id="msgWho"></div>
      <div class="muted" id="msgSub" style="margin-bottom:10px"></div>
      <textarea id="msgText" style="width:100%;min-height:140px;font-size:15.5px;border-radius:12px;padding:13px;background:#0f172a;color:#e6edf6;border:1px solid rgba(148,163,184,0.4);line-height:1.65"></textarea>
      <div class="muted" id="msgLen" style="margin:6px 2px"></div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px">
        <button class="btn" id="msgRegen"></button>
        <button class="btn" id="msgSend" style="background:linear-gradient(135deg,#22c55e,#16a34a);color:#052e16;border:0;font-weight:800"></button>
        <button class="btn" id="msgClose"></button>
        <span class="ok" id="msgResult"></span>
      </div>
    </div>
  </div>
</div>

<!-- 아이 성향 입력 모달 -->
<div id="traitModal" style="display:none;position:fixed;inset:0;z-index:60">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6)" id="traitBackdrop"></div>
  <div style="position:relative;max-width:440px;margin:6vh auto;padding:0 16px">
    <div class="card" style="margin:0">
      <div style="font-weight:800;font-size:19px;margin-bottom:12px" id="traitWho"></div>
      <div id="tl_gender" style="font-weight:700;margin-bottom:6px"></div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn" id="tg_m" data-g="M" style="flex:1"></button>
        <button class="btn" id="tg_f" data-g="F" style="flex:1"></button>
      </div>
      <div id="tl_mbti" style="font-weight:700;margin-bottom:6px"></div>
      <select id="t_mbti" style="width:100%;font-size:16px;border-radius:12px;padding:11px;background:#0f172a;color:#e6edf6;border:1px solid rgba(148,163,184,0.4);margin-bottom:12px"></select>
      <div id="tl_int" style="font-weight:700;margin-bottom:6px"></div>
      <input id="t_int" type="text" maxlength="100" style="width:100%;font-size:16px;border-radius:12px;padding:11px;background:#0f172a;color:#e6edf6;border:1px solid rgba(148,163,184,0.4);margin-bottom:12px">
      <div id="tl_per" style="font-weight:700;margin-bottom:6px"></div>
      <textarea id="t_per" maxlength="200" style="width:100%;min-height:60px;font-size:15px;border-radius:12px;padding:11px;background:#0f172a;color:#e6edf6;border:1px solid rgba(148,163,184,0.4)"></textarea>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px">
        <button class="btn" id="t_save" style="background:linear-gradient(135deg,#22c55e,#16a34a);color:#052e16;border:0;font-weight:800"></button>
        <button class="btn" id="t_copy"></button>
        <button class="btn" id="t_close"></button>
        <span class="ok" id="t_msg"></span>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var g=function(id){return document.getElementById(id);};
  var cur={ rows:[], counts:{}, cat:'expiring' };

  var I18N={
    ko:{ title:'🔁 수강권 만료·재활성 관리', langLabel:'🇺🇸 English', htmlLang:'ko',
      sub:'이 시스템은 <b>기간제 정기수업</b>이에요. <b>만료 임박</b>(갱신 유도)·<b>최근 만료</b>(재등록)·<b>휴면</b>(이탈 위험) 학생을 자동으로 찾아드려요.',
      tab_expiring:'⏰ 만료 임박 (30일 내)', tab_expired:'🔴 최근 만료 (60일 내)', tab_inactive:'💤 휴면 (수업 끊김)',
      searchPh:'학생 이름/아이디 검색…', csv:'⬇️ CSV', updated:'갱신: ',
      th_student:'학생', th_last:'마지막 수업', th_expiry:'만료일', th_status:'상태', th_detail:'상세', th_done:'연락함',
      dLeft:function(n){return n+'일 남음';}, dAgo:function(n){return n+'일 전';}, dOver:function(n){return n+'일 지남';},
      noClass:'수업 기록 없음', detail:'보기 ›', loading:'불러오는 중…', empty:'해당 학생이 없어요. 👍', neterr:'네트워크 오류', needLogin:'관리자 로그인이 필요합니다.', loginLink:'로그인하기', noMatch:'검색 결과 없음',
      csvHead:'아이디,이름,카테고리,마지막수업,만료일,만료까지(일),휴면(일),연락함', csvName:'수강권관리', y:'예', n:'아니오',
      th_msg:'문자', msg:'📱 문자', noPhone:'번호없음', msgTitleCard:'📱 AI 자동 연락 (문자)', autoLabel:'자동 발송(매일 오전 10시)', capLabel:'하루 최대', linkLabel:'재등록 링크', save:'💾 저장', saved:'저장됨 ✓',
      bulkSend:'📤 이 목록 전체에 문자 보내기', sendHint:'전화번호 있는·아직 연락 안 한 학생에게만 발송돼요 (30일 내 재발송 안 함).',
      msgSub:'AI가 상황에 맞게 작성한 문구예요. 수정 후 보내도 돼요.', regen:'🔄 다시 생성', send:'📤 발송', close:'닫기',
      sending:'보내는 중…', sentOne:'✅ 발송 완료!', sendFail:'발송 실패', bulkDone:function(n,t){return '✅ '+n+'명 발송 완료 (대상 '+t+'명 중)';}, confirmBulk:function(n){return n+'명에게 문자를 보낼까요? (안전장치: 하루 상한·30일 재발송 방지 적용)';}, bytes:'자',
      trait:'🧬', traitTitle:'아이 성향', g_m:'남아', g_f:'여아', mbtiL:'MBTI', interestsL:'좋아하는 것', personalityL:'성격', traitPh:'예: 공룡·그림', traitPPh:'예: 부끄럼 많지만 칭찬에 신나요', saveTrait:'💾 저장', copyLink:'🔗 학부모 입력 링크 복사', linkCopied:'복사됨! 문자/카톡으로 보내세요 ✓', traitSaved:'저장됨 ✓' },
    en:{ title:'🔁 Enrollment Retention', langLabel:'🇰🇷 한국어', htmlLang:'en',
      sub:'This is a <b>period-based subscription</b> model. It automatically finds students who are <b>expiring soon</b> (renew), <b>recently expired</b> (re-enroll), or <b>inactive</b> (churn risk).',
      tab_expiring:'⏰ Expiring (30 days)', tab_expired:'🔴 Recently expired (60d)', tab_inactive:'💤 Inactive (no class)',
      searchPh:'Search name / ID…', csv:'⬇️ CSV', updated:'Updated: ',
      th_student:'Student', th_last:'Last class', th_expiry:'Expiry', th_status:'Status', th_detail:'Detail', th_done:'Contacted',
      dLeft:function(n){return n+'d left';}, dAgo:function(n){return n+'d ago';}, dOver:function(n){return n+'d overdue';},
      noClass:'No class record', detail:'View ›', loading:'Loading…', empty:'No students here. 👍', neterr:'Network error', needLogin:'Admin login required.', loginLink:'Go to login', noMatch:'No match',
      csvHead:'ID,Name,Category,LastClass,Expiry,DaysToExpiry,DaysInactive,Contacted', csvName:'Retention', y:'yes', n:'no',
      th_msg:'SMS', msg:'📱 SMS', noPhone:'no phone', msgTitleCard:'📱 AI Auto-Contact (SMS)', autoLabel:'Auto-send (daily 10 AM)', capLabel:'Daily max', linkLabel:'Re-enroll link', save:'💾 Save', saved:'Saved ✓',
      bulkSend:'📤 Send SMS to this whole list', sendHint:'Only sends to students who have a phone and were not contacted yet (no resend within 30 days).',
      msgSub:'AI wrote this message for the situation. You can edit before sending.', regen:'🔄 Regenerate', send:'📤 Send', close:'Close',
      sending:'Sending…', sentOne:'✅ Sent!', sendFail:'Send failed', bulkDone:function(n,t){return '✅ Sent to '+n+' (of '+t+')';}, confirmBulk:function(n){return 'Send SMS to '+n+' students? (safeguards: daily cap, no resend within 30 days)';}, bytes:'chars',
      trait:'🧬', traitTitle:'Child traits', g_m:'Boy', g_f:'Girl', mbtiL:'MBTI', interestsL:'Likes', personalityL:'Personality', traitPh:'e.g. dinosaurs, drawing', traitPPh:'e.g. shy but loves praise', saveTrait:'💾 Save', copyLink:'🔗 Copy parent link', linkCopied:'Copied! Send via SMS/Kakao ✓', traitSaved:'Saved ✓' }
  };
  /* 🌐 (2026-07-23) 이 화면들은 'mangoi_payroll_lang' 이라는 자기만의 키를 써서,
   계정 언어(영어)로 로그인해도 서로 따로 놀았다. 공용 키 'mangoi_lang' 으로 통일.
   (구 키가 남아 있으면 1회 이관 — 쓰던 사람의 선택이 갑자기 바뀌지 않게) */
  var lang = localStorage.getItem('mangoi_lang') || localStorage.getItem('mangoi_payroll_lang') || 'en';
  if (lang !== 'ko' && lang !== 'en') lang = 'en';
  function t(){return I18N[lang];}

  function applyLang(){
    var d=t(); document.documentElement.lang=d.htmlLang;
    g('t_title').textContent=d.title; g('lang').textContent=d.langLabel; g('t_sub').innerHTML=d.sub;
    g('t_tab_expiring').textContent=d.tab_expiring; g('t_tab_expired').textContent=d.tab_expired; g('t_tab_inactive').textContent=d.tab_inactive;
    g('search').placeholder=d.searchPh; g('csv').textContent=d.csv;
    g('t_msg_title').textContent=d.msgTitleCard; g('t_auto').textContent=d.autoLabel; g('t_cap').textContent=d.capLabel; g('t_link').textContent=d.linkLabel;
    g('saveSettings').textContent=d.save; g('bulkSend').textContent=d.bulkSend; g('t_send_hint').textContent=d.sendHint;
    g('msgRegen').textContent=d.regen; g('msgSend').textContent=d.send; g('msgClose').textContent=d.close; g('msgSub').textContent=d.msgSub;
    render();
  }

  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  function setActiveTab(){
    Array.prototype.forEach.call(document.querySelectorAll('.tab'), function(tb){ tb.classList.toggle('active', tb.getAttribute('data-cat')===cur.cat); });
  }

  function render(){
    var d=t();
    g('c_expiring').textContent=cur.counts.expiring||0;
    g('c_expired').textContent=cur.counts.expired||0;
    g('c_inactive').textContent=cur.counts.inactive||0;
    setActiveTab();
    var q=(g('search').value||'').trim().toLowerCase();
    var rows=cur.rows.filter(function(r){ return !q || String(r.name||'').toLowerCase().indexOf(q)>=0 || String(r.user_id||'').toLowerCase().indexOf(q)>=0; });
    if(!cur.rows.length){ g('body').innerHTML='<div class="empty">'+d.empty+'</div>'; return; }
    if(!rows.length){ g('body').innerHTML='<div class="empty">'+d.noMatch+'</div>'; return; }
    var h='<table><thead><tr><th>'+d.th_student+'</th><th>'+d.th_last+'</th><th>'+d.th_expiry+'</th><th style="text-align:center">'+d.th_msg+'</th><th>'+d.th_detail+'</th><th style="text-align:center">'+d.th_done+'</th></tr></thead><tbody>';
    rows.forEach(function(r){
      var last = r.last_class ? (r.last_class+' <span class="muted">('+d.dAgo(r.days_inactive)+')</span>') : '<span class="muted">'+d.noClass+'</span>';
      var exp;
      if(r.end_date){
        var tag = r.days_to_expiry==null? '' : (r.days_to_expiry>=0? '<span class="badge b-warn">'+d.dLeft(r.days_to_expiry)+'</span>' : '<span class="badge b-danger">'+d.dOver(-r.days_to_expiry)+'</span>');
        exp = r.end_date+' '+tag;
      } else exp='<span class="muted">–</span>';
      var phoneBtn = r.has_phone
        ? '<button class="btn" style="padding:7px 12px;font-size:14px" data-msg="'+esc(r.user_id)+'">'+d.msg+'</button>'+(r.last_msg_at?' <span class="ok" style="font-size:12px">✓</span>':'')
        : '<span class="muted" style="font-size:13px">'+d.noPhone+'</span>';
      var msgCell = phoneBtn + ' <button class="btn" style="padding:7px 10px;font-size:14px" data-trait="'+esc(r.user_id)+'" title="'+d.traitTitle+'">'+d.trait+'</button>';
      h+='<tr><td class="name">'+esc(r.name||r.user_id)+'<div class="muted">'+esc(r.user_id)+'</div></td>'
        +'<td>'+last+'</td><td>'+exp+'</td>'
        +'<td style="text-align:center">'+msgCell+'</td>'
        +'<td><a class="detail" href="/admin/student?uid='+encodeURIComponent(r.user_id)+'" target="_blank">'+d.detail+'</a></td>'
        +'<td style="text-align:center"><input class="chk" type="checkbox" data-uid="'+esc(r.user_id)+'" '+(r.contacted?'checked':'')+'></td></tr>';
    });
    h+='</tbody></table>'; g('body').innerHTML=h;
    Array.prototype.forEach.call(document.querySelectorAll('.chk'), function(c){ c.addEventListener('change', function(){ toggleContacted(c.getAttribute('data-uid'), c.checked); }); });
    Array.prototype.forEach.call(document.querySelectorAll('[data-msg]'), function(b){ b.addEventListener('click', function(){ openMsg(b.getAttribute('data-msg')); }); });
    Array.prototype.forEach.call(document.querySelectorAll('[data-trait]'), function(b){ b.addEventListener('click', function(){ openTrait(b.getAttribute('data-trait')); }); });
  }

  function toggleContacted(uid, done){
    var r=cur.rows.filter(function(x){return x.user_id===uid;})[0]; if(r) r.contacted=done?1:0;
    fetch('/api/admin/retention/contacted',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,contacted:done})}).catch(function(){});
  }

  // ── 설정 ──
  function applySettingsUI(s){
    g('autoToggle').checked = !!s.auto_enabled; g('dailyCap').value = s.daily_cap||20; g('linkUrl').value = s.link_url||'';
  }
  function saveSettings(){
    var d=t();
    var body={ auto_enabled: g('autoToggle').checked?1:0, daily_cap: parseInt(g('dailyCap').value,10)||20, link_url: g('linkUrl').value };
    fetch('/api/admin/retention/settings',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){return r.json();}).then(function(x){ if(x&&x.ok){ g('setMsg').textContent=d.saved; setTimeout(function(){g('setMsg').textContent='';},2500); } }).catch(function(){});
  }

  // ── 문자 미리보기·발송 ──
  var msgUid=null;
  function openMsg(uid){
    var d=t(); msgUid=uid;
    var r=cur.rows.filter(function(x){return x.user_id===uid;})[0]||{};
    g('msgWho').textContent=(r.name||uid); g('msgResult').textContent=''; g('msgText').value=d.loading;
    g('msgModal').style.display='block';
    fetch('/api/admin/retention/preview?uid='+encodeURIComponent(uid),{credentials:'same-origin'})
      .then(function(r){return r.json();}).then(function(x){ g('msgText').value=(x&&x.message)||''; updLen(); }).catch(function(){ g('msgText').value=''; });
  }
  function updLen(){ g('msgLen').textContent=(g('msgText').value.length)+' '+t().bytes; }
  function regenMsg(){ if(msgUid) openMsg(msgUid); }
  function sendOne(){
    var d=t(); var b=g('msgSend'); b.disabled=true; g('msgResult').textContent=d.sending;
    fetch('/api/admin/retention/send',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_ids:[msgUid]})})
      .then(function(r){return r.json();}).then(function(x){
        b.disabled=false;
        var ok = x&&x.sent>0;
        g('msgResult').textContent = ok? d.sentOne : (d.sendFail+(x&&x.results&&x.results[0]?' ('+(x.results[0].reason||x.results[0].status)+')':''));
        if(ok){ var rr=cur.rows.filter(function(y){return y.user_id===msgUid;})[0]; if(rr){rr.contacted=1;rr.last_msg_at=Date.now();} setTimeout(function(){ g('msgModal').style.display='none'; render(); },1200); }
      }).catch(function(){ b.disabled=false; g('msgResult').textContent=d.sendFail; });
  }
  function bulkSend(){
    var d=t();
    var q=(g('search').value||'').trim().toLowerCase();
    var ids=cur.rows.filter(function(r){ return r.has_phone && !r.contacted && (!q || String(r.name||'').toLowerCase().indexOf(q)>=0); }).map(function(r){return r.user_id;});
    if(!ids.length){ alert(d.noPhone); return; }
    if(!confirm(d.confirmBulk(ids.length))) return;
    var b=g('bulkSend'); b.disabled=true; b.textContent=d.sending;
    fetch('/api/admin/retention/send',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_ids:ids})})
      .then(function(r){return r.json();}).then(function(x){ b.disabled=false; b.textContent=d.bulkSend; alert(d.bulkDone((x&&x.sent)||0, ids.length)); load(); }).catch(function(){ b.disabled=false; b.textContent=d.bulkSend; });
  }

  // ── 아이 성향 입력 ──
  var traitUid=null, traitGender='', traitLink='';
  var MBTI=['','ISTJ','ISFJ','INFJ','INTJ','ISTP','ISFP','INFP','INTP','ESTP','ESFP','ENFP','ENTP','ESTJ','ESFJ','ENFJ','ENTJ'];
  (function(){ var s=g('t_mbti'); MBTI.forEach(function(m){ var o=document.createElement('option'); o.value=m; o.textContent=m||'—'; s.appendChild(o); }); })();
  function setTG(gv){ traitGender=(traitGender===gv?'':gv); g('tg_m').style.opacity=(traitGender==='M'?'1':'0.5'); g('tg_f').style.opacity=(traitGender==='F'?'1':'0.5'); }
  function openTrait(uid){
    var d=t(); traitUid=uid; traitGender=''; traitLink=''; g('t_msg').textContent='';
    var r=cur.rows.filter(function(x){return x.user_id===uid;})[0]||{};
    g('traitWho').textContent=(r.name||uid)+' — '+d.traitTitle;
    g('tl_gender').textContent=d.g_m+'/'+d.g_f; g('tg_m').textContent=d.g_m; g('tg_f').textContent=d.g_f;
    g('tl_mbti').textContent=d.mbtiL; g('tl_int').textContent=d.interestsL; g('tl_per').textContent=d.personalityL;
    g('t_int').placeholder=d.traitPh; g('t_per').placeholder=d.traitPPh;
    g('t_save').textContent=d.saveTrait; g('t_copy').textContent=d.copyLink; g('t_close').textContent=d.close;
    g('t_mbti').value=''; g('t_int').value=''; g('t_per').value=''; setTG('');
    g('traitModal').style.display='block';
    fetch('/api/admin/student-traits?uid='+encodeURIComponent(uid),{credentials:'same-origin'})
      .then(function(r){return r.json();}).then(function(x){
        if(x&&x.ok){ var tr=x.traits||{}; if(tr.gender){setTG(tr.gender);} g('t_mbti').value=tr.mbti||''; g('t_int').value=tr.interests||''; g('t_per').value=tr.personality||'';
          if(x.link_token){ traitLink=location.origin+'/traits.html?uid='+encodeURIComponent(uid)+'&t='+x.link_token; } }
      }).catch(function(){});
  }
  function saveTrait(){
    var d=t(); var b=g('t_save'); b.disabled=true;
    fetch('/api/admin/student-traits',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:traitUid,gender:traitGender,mbti:g('t_mbti').value,interests:g('t_int').value,personality:g('t_per').value})})
      .then(function(r){return r.json();}).then(function(x){ b.disabled=false; if(x&&x.ok){ g('t_msg').textContent=d.traitSaved; setTimeout(function(){g('traitModal').style.display='none';},900); } }).catch(function(){ b.disabled=false; });
  }
  function copyTraitLink(){
    var d=t(); if(!traitLink) return;
    (navigator.clipboard?navigator.clipboard.writeText(traitLink):Promise.reject()).then(function(){ g('t_msg').textContent=d.linkCopied; }).catch(function(){ prompt('링크:', traitLink); });
  }

  function load(){
    var d=t();
    g('body').innerHTML='<div class="empty">'+d.loading+'</div>';
    fetch('/api/admin/retention?type='+cur.cat,{credentials:'same-origin'})
      .then(function(r){ if(r.status===401){throw new Error('auth');} return r.json(); })
      .then(function(data){
        if(!data||!data.ok){ g('body').innerHTML='<div class="empty">'+d.neterr+'</div>'; return; }
        cur.rows=data.rows||[]; cur.counts=data.counts||{};
        if(data.settings) applySettingsUI(data.settings);
        g('msgCard').style.display = cur.rows.length ? 'block' : 'none';
        g('updated').textContent=data.updated_at?(d.updated+new Date(data.updated_at).toLocaleString()):'';
        render();
      })
      .catch(function(e){
        if(e.message==='auth'){ g('body').innerHTML='<div class="empty">'+d.needLogin+'<br><a href="/admin/login.html" style="color:#7dd3fc">'+d.loginLink+'</a></div>'; }
        else g('body').innerHTML='<div class="empty">'+d.neterr+'</div>';
      });
  }

  Array.prototype.forEach.call(document.querySelectorAll('.tab'), function(tb){ tb.addEventListener('click', function(){ cur.cat=tb.getAttribute('data-cat'); g('search').value=''; load(); }); });
  g('lang').addEventListener('click', function(){ lang=(lang==='ko'?'en':'ko'); localStorage.setItem('mangoi_lang', lang); localStorage.setItem('mangoi_lang_by', 'user'); applyLang(); });
  g('search').addEventListener('input', render);
  g('csv').addEventListener('click', function(){
    var d=t(); if(!cur.rows.length){ return; }
    var lines=[d.csvHead];
    cur.rows.forEach(function(r){ lines.push([r.user_id,'"'+String(r.name||'').replace(/"/g,'""')+'"',r.category,r.last_class||'',r.end_date||'',r.days_to_expiry==null?'':r.days_to_expiry,r.days_inactive==null?'':r.days_inactive,r.contacted?d.y:d.n].join(',')); });
    var blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=d.csvName+'_'+cur.cat+'.csv'; a.click();
  });

  g('saveSettings').addEventListener('click', saveSettings);
  g('bulkSend').addEventListener('click', bulkSend);
  g('msgRegen').addEventListener('click', regenMsg);
  g('msgSend').addEventListener('click', sendOne);
  g('msgClose').addEventListener('click', function(){ g('msgModal').style.display='none'; });
  g('msgBackdrop').addEventListener('click', function(){ g('msgModal').style.display='none'; });
  g('msgText').addEventListener('input', updLen);
  g('tg_m').addEventListener('click', function(){ setTG('M'); });
  g('tg_f').addEventListener('click', function(){ setTG('F'); });
  g('t_save').addEventListener('click', saveTrait);
  g('t_copy').addEventListener('click', copyTraitLink);
  g('t_close').addEventListener('click', function(){ g('traitModal').style.display='none'; });
  g('traitBackdrop').addEventListener('click', function(){ g('traitModal').style.display='none'; });

  applyLang(); load();
})();
</script>
</body>
</html>
