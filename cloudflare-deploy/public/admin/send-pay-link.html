<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- 🌐 (2026-07-23) 관리자·강사 화면 언어 부팅 — 해외 스태프는 로그인 직후부터 영어.
     판정 로직·주의사항은 /js/adm-lang-boot.js 파일 머리 주석 하나에 모여 있다.
     ⚠️ adm-lang-boot 는 defer 를 붙이지 말 것(첫 페인트 전에 lang 이 정해져야 함). -->
<script src="/js/adm-lang-boot.js?v=1"></script>
<script defer src="/js/i18n-sweep.js?v=9"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>결제 링크 문자 보내기 · 망고아이 관리자</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Malgun Gothic','맑은 고딕',sans-serif; background:#0f172a; color:#f1f5f9; min-height:100vh; padding:32px 20px; }
  .wrap { display:flex; flex-wrap:wrap; gap:24px; justify-content:center; align-items:flex-start; max-width:1200px; margin:0 auto; }
  .card { background:#1e293b; border:1px solid rgba(148,163,184,0.25); border-radius:20px; padding:34px 36px; width:100%; max-width:560px; flex:1 1 480px; }
  h1 { font-size:27px; margin:0 0 8px; letter-spacing:-0.3px; }
  .desc { color:#b6c2d4; font-size:17px; margin-bottom:26px; line-height:1.7; }
  label { display:block; font-size:17px; font-weight:700; margin:22px 0 9px; color:#f1f5f9; }
  input, select { width:100%; padding:17px 18px; background:#0f172a; border:2px solid rgba(148,163,184,0.35); border-radius:12px; color:#fff; font-size:19px; font-family:inherit; }
  input::placeholder { color:#7c8aa0; }
  input:focus, select:focus { outline:none; border-color:#22c55e; box-shadow:0 0 0 3px rgba(34,197,94,0.25); }
  select { cursor:pointer; }
  .btn { width:100%; margin-top:30px; padding:20px; border:0; border-radius:14px; font-size:21px; font-weight:800; cursor:pointer; background:linear-gradient(135deg,#22c55e,#16a34a); color:#052e16; box-shadow:0 4px 14px rgba(34,197,94,0.35); }
  .btn:hover:not(:disabled) { filter:brightness(1.08); }
  .btn:disabled { opacity:0.6; cursor:default; }
  .msg { margin-top:20px; padding:16px 18px; border-radius:12px; font-size:17px; line-height:1.7; display:none; }
  .msg.ok { background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.4); color:#86efac; }
  .msg.err { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; }
  .preview { margin-top:14px; font-size:14px; color:#8ea1ba; word-break:break-all; }
  a.back { color:#7db8ff; font-size:16px; text-decoration:none; font-weight:700; }
  a.back:hover { text-decoration:underline; }
  @media (max-width: 640px) {
    body { padding:20px 12px; }
    .card { padding:24px 20px; }
    h1 { font-size:22px; }
    .desc { font-size:15.5px; }
    label { font-size:15.5px; }
    input, select { font-size:17px; padding:14px 15px; }
    .btn { font-size:18px; padding:16px; }
  }
</style>
<style id="pc-scale">
  /* PC 가독성 확대 — admin.html(body{zoom:1.3})과 동일 배율. 모바일 영향 없음 */
  @media (min-width: 1024px) { body { zoom: 1.3; } }
</style>
</head>
<body>
  <div class="wrap">
  <div class="card">
    <a class="back" href="/admin.html">← 관리자로</a>
    <h1 style="margin-top:12px">📱 결제 링크 문자 보내기</h1>
    <div class="desc">학부모 전화번호와 상품을 고르면, 카드·카카오페이로 결제할 수 있는 <b>간편 링크를 문자로</b> 보냅니다.</div>

    <label>학부모/학생 이름 (선택)</label>
    <input id="name" type="text" placeholder="예: 홍길동" autocomplete="off">

    <label>받는 사람 휴대폰 번호 <span style="color:#f87171">*</span></label>
    <input id="phone" type="tel" inputmode="numeric" placeholder="010-1234-5678" autocomplete="off">

    <label>상품 <span style="color:#f87171">*</span></label>
    <select id="program">
      <option value="">— 상품 선택 —</option>
      <option value="1on1-4">1:1 4회권 · 60,000원</option>
      <option value="1on1-8">1:1 8회권 · 120,000원</option>
      <option value="1on1-12">1:1 12회권 · 180,000원</option>
      <option value="1on1-24">1:1 24회권 · 360,000원</option>
      <option value="group-12">그룹 12회권 · 120,000원</option>
      <option value="business">비즈니스 영어 · 70,000원</option>
      <option value="kids">키즈 영어 · 50,000원</option>
      <option value="exam">시험 영어 · 80,000원</option>
      <option value="fixed_teacher">강사 고정 · 30,000원</option>
      <option value="prime_time">시간대 우선권 · 20,000원</option>
      <option value="writing_review">1:1 영작 첨삭 · 40,000원</option>
      <option value="manager">학습 매니저 · 50,000원</option>
      <option value="group_class">원어민 그룹 클래스 · 60,000원</option>
      <option value="pron_ai">AI 발음 코치 · 15,000원</option>
    </select>

    <button class="btn" id="send">📨 결제 링크 문자 보내기</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- ───── 결제 내역 ───── -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h1 style="font-size:24px;margin:0">💳 결제 내역</h1>
      <button type="button" id="refresh" style="padding:10px 18px;border-radius:10px;border:1px solid rgba(148,163,184,0.4);background:transparent;color:#e2e8f0;cursor:pointer;font-size:16px;font-weight:700">↻ 새로고침</button>
    </div>
    <div id="todaySum" style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.35);border-radius:12px;padding:15px 18px;font-size:17.5px;color:#86efac;margin-bottom:16px;line-height:1.6">불러오는 중…</div>
    <div id="orders" style="font-size:17px"></div>
  </div>

  <!-- ───── 결제 안전 점검(대사) ───── -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h1 style="font-size:24px;margin:0">🔍 결제 안전 점검</h1>
      <button type="button" id="auditBtn" style="padding:10px 18px;border-radius:10px;border:1px solid rgba(251,191,36,0.5);background:rgba(251,191,36,0.12);color:#fcd34d;cursor:pointer;font-size:16px;font-weight:800">지금 점검</button>
    </div>
    <div style="color:#9fb0c6;font-size:15px;margin-bottom:12px;line-height:1.55">이중결제 의심 · 수업 연결 누락을 검사해요. 매일 새벽 3시에 자동으로도 돌고, 이상이 있으면 사장님 폰으로 문자가 갑니다.</div>
    <div id="auditOut" style="font-size:16.5px;line-height:1.7"></div>
  </div>
  </div><!-- /.wrap -->

<style>
  .ord { border:1px solid rgba(148,163,184,0.2); border-radius:12px; padding:14px 16px; margin-bottom:10px; }
  .ord-top { display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .ord-name { font-weight:700; font-size:17.5px; }
  .ord-amt { font-weight:800; color:#fcd34d; font-size:18px; }
  .ord-sub { color:#9fb0c6; font-size:14.5px; margin-top:5px; }
  .badge2 { font-size:14px; font-weight:800; padding:4px 13px; border-radius:99px; white-space:nowrap; }
  .b-paid { background:rgba(34,197,94,0.18); color:#4ade80; }
  .b-pending { background:rgba(148,163,184,0.18); color:#aebbcc; }
  .b-failed { background:rgba(239,68,68,0.16); color:#f87171; }
</style>

<script>
(function(){
  var g = function(id){ return document.getElementById(id); };
  g('send').addEventListener('click', function(){
    var name = g('name').value.trim();
    var phone = g('phone').value.replace(/[^0-9]/g,'');
    var program = g('program').value;
    var msg = g('msg');
    msg.style.display='none';
    if (phone.length < 10) { show('err','⚠️ 전화번호를 정확히 입력해 주세요.'); return; }
    if (!program) { show('err','⚠️ 상품을 선택해 주세요.'); return; }
    var btn = g('send'); btn.disabled = true; btn.textContent = '📨 보내는 중…';
    fetch('/api/pay/send-link', {
      method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
      body: JSON.stringify({ name: name, phone: phone, program: program })
    })
    .then(function(r){ return r.json().catch(function(){return {};}); })
    .then(function(d){
      btn.disabled=false; btn.textContent='📨 결제 링크 문자 보내기';
      if (d && d.ok) {
        show('ok','✅ 결제 링크 문자를 보냈습니다!' + (d.link ? '<div class="preview">'+d.link+'</div>' : ''));
      } else {
        show('err','❌ ' + ((d && d.message) || '발송 실패') + (d && d.error==='auth_required' ? ' (관리자 로그인이 필요해요)' : ''));
      }
    })
    .catch(function(){ btn.disabled=false; btn.textContent='📨 결제 링크 문자 보내기'; show('err','❌ 네트워크 오류'); });
    function show(cls, html){ msg.className='msg '+cls; msg.innerHTML=html; msg.style.display='block'; }
  });
  function show(cls, html){ var msg=g('msg'); msg.className='msg '+cls; msg.innerHTML=html; msg.style.display='block'; }

  // ── 결제 내역 로드 ──
  function won(n){ return '₩' + Number(n||0).toLocaleString('ko-KR'); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function kst(ms){ if(!ms) return '-'; return new Date(ms + 9*3600*1000).toISOString().slice(5,16).replace('T',' '); }
  function loadOrders(){
    g('orders').innerHTML = '<div style="color:#9fb0c6;padding:18px;text-align:center">불러오는 중…</div>';
    fetch('/api/pay/admin/orders?limit=50', { credentials:'include' })
      .then(function(r){ return r.json().catch(function(){return {};}); })
      .then(function(d){
        if (!d || !d.ok) {
          g('orders').innerHTML = '<div style="color:#f87171;padding:12px">불러오기 실패' + (d && d.error==='auth_required' ? ' (관리자 로그인이 필요해요)' : '') + '</div>';
          g('todaySum').textContent = '—'; return;
        }
        g('todaySum').innerHTML = '📅 최근 24시간 결제완료 <b>' + (d.today.count||0) + '건</b> · 합계 <b>' + won(d.today.total) + '</b>';
        var os = d.orders || [];
        if (!os.length) { g('orders').innerHTML = '<div style="color:#9fb0c6;padding:18px;text-align:center">아직 결제 내역이 없어요.</div>'; return; }
        g('orders').innerHTML = os.map(function(o){
          var st = o.status==='paid' ? ['b-paid','완료'] : o.status==='failed' ? ['b-failed','실패'] : ['b-pending','대기'];
          var who = esc(o.student_name || o.payer_name || '-');
          return '<div class="ord"><div class="ord-top">'
            + '<span class="ord-name">' + who + ' · ' + esc(o.program||'') + '</span>'
            + '<span class="badge2 ' + st[0] + '">' + st[1] + '</span></div>'
            + '<div class="ord-top" style="margin-top:4px"><span class="ord-sub">' + kst(o.paid_at||o.created_at) + (o.method?' · '+esc(o.method):'') + (o.fail_reason?' · '+esc(o.fail_reason):'') + '</span>'
            + '<span class="ord-amt">' + won(o.amount) + '</span></div></div>';
        }).join('');
      })
      .catch(function(){ g('orders').innerHTML = '<div style="color:#f87171;padding:12px">네트워크 오류</div>'; });
  }
  g('refresh').addEventListener('click', loadOrders);
  loadOrders();

  // ── 결제 안전 점검 (대사 즉시 실행) ──
  g('auditBtn').addEventListener('click', function(){
    var b = g('auditBtn'); b.disabled = true; b.textContent = '🔄 점검 중…';
    fetch('/api/pay/admin/audit', { credentials:'same-origin' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        b.disabled = false; b.textContent = '지금 점검';
        if (!d || !d.ok) { g('auditOut').innerHTML = '<div style="color:#f87171">점검 실패: '+((d&&d.error)||'오류')+'</div>'; return; }
        var a = d.audit || {}, s = a.summary || {};
        var html = '';
        if (!s.anomalies) {
          html += '<div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.35);border-radius:12px;padding:14px 16px;color:#86efac">✅ 이상 없음 — 이중결제 의심 0건 · 수업연결 누락 0건</div>';
        } else {
          if (a.legacyDup && a.legacyDup.length) {
            html += '<div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.4);border-radius:12px;padding:14px 16px;color:#fca5a5;margin-bottom:10px"><b>⚠️ 이중결제 의심 '+a.legacyDup.length+'건 (기존 결제창, 최근 3일)</b>';
            a.legacyDup.forEach(function(x){ html += '<div style="margin-top:6px;font-size:15px">· '+x.user_id+' — '+Number(x.amount_krw).toLocaleString('ko-KR')+'원 × '+x.cnt+'회 ('+x.d+')</div>'; });
            html += '</div>';
          }
          if (a.newDup && a.newDup.length) {
            html += '<div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.4);border-radius:12px;padding:14px 16px;color:#fca5a5;margin-bottom:10px"><b>⚠️ 이중결제 의심 '+a.newDup.length+'건 (새 결제, 48시간)</b>';
            a.newDup.forEach(function(x){ html += '<div style="margin-top:6px;font-size:15px">· '+(x.uid||'?')+' — '+x.program+' × '+x.cnt+'회, 합계 '+Number(x.total).toLocaleString('ko-KR')+'원</div>'; });
            html += '</div>';
          }
          if (a.missingEnroll && a.missingEnroll.length) {
            html += '<div style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.4);border-radius:12px;padding:14px 16px;color:#fcd34d;margin-bottom:10px"><b>🟡 수업 연결 누락 '+a.missingEnroll.length+'건 (결제됐는데 수강 미활성)</b>';
            a.missingEnroll.forEach(function(x){ html += '<div style="margin-top:6px;font-size:15px">· '+(x.student_name||x.payer_name||'?')+' — '+Number(x.amount).toLocaleString('ko-KR')+'원 ('+x.order_id+')</div>'; });
            html += '</div>';
          }
        }
        if (a.stalePending) html += '<div style="color:#9fb0c6;font-size:14.5px;margin-top:8px">참고: 시작만 하고 완료 안 된 주문(1일 이상) '+a.stalePending+'건 — 자동 만료되므로 조치 불필요</div>';
        g('auditOut').innerHTML = html;
      })
      .catch(function(){ b.disabled=false; b.textContent='지금 점검'; g('auditOut').innerHTML = '<div style="color:#f87171">네트워크 오류</div>'; });
  });
})();
</script>
</body>
</html>
