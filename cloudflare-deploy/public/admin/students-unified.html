<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>학생관리로 이동 중… — Mangoi 관리</title>
<!--
  ============================================================================
   ♻️ (2026-07-18) 학생관리 일원화 리다이렉트
   ----------------------------------------------------------------------------
   이 통합(unified) 학생관리 페이지도 메인 콘솔 학생관리 카드로 합쳐졌다.
   (데이터 소스 /api/admin/students/unified 는 admin.html #card-students-mgmt 와 동일)
     → /admin.html#card-students-mgmt
   구 링크 호환: ?q=이름 → ?smq=이름 으로 매핑. 원복은 git 이력에서 이전 버전 복원.
   함께 리다이렉트되는 자매 페이지: /admin/students.html
  ============================================================================
-->
<script>
  (function(){
    try {
      var p = new URLSearchParams(location.search);
      var q = p.get('smq') || p.get('q') || '';
      var url = '/admin.html' + (q ? ('?smq=' + encodeURIComponent(q)) : '') + '#card-students-mgmt';
      location.replace(url);
    } catch(e) {
      location.replace('/admin.html#card-students-mgmt');
    }
  })();
</script>
<meta http-equiv="refresh" content="0;url=/admin.html#card-students-mgmt" />
<style>
  html,body{margin:0;height:100%}
  body{display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#0f172a;color:#e2e8f0}
  .box{text-align:center;padding:24px}
  .t{font-size:15px;font-weight:800}
  .s{font-size:12.5px;color:#94a3b8;margin-top:8px}
  a{color:#38bdf8;font-weight:700}
</style>
</head>
<body>
  <div class="box">
    <div class="t">👨‍🎓 학생관리로 이동 중…</div>
    <div class="s">자동으로 넘어가지 않으면 <a href="/admin.html#card-students-mgmt">여기</a>를 누르세요.</div>
  </div>
</body>
</html>
