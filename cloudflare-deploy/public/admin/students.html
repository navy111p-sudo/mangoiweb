<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>학생관리로 이동 중… — Mangoi 관리</title>
<!--
  ============================================================================
   ♻️ (2026-07-16) 학생관리 일원화 리다이렉트
   ----------------------------------------------------------------------------
   이 구 ERP 학생 목록 페이지(데이터 소스 students_erp, 현 환경에서 비어 있음)는
   실데이터가 뜨는 메인 관리자 콘솔의 학생관리 카드로 통합되었다.
     → /admin.html#card-students-mgmt
   해시로 진입하면 admin.html 의 openCardFromHash 가 학생관리 카드 + '학생 목록' 하위를
   펼치고(→ adm-core 의 lazy-load 로 실제 학생 자동 로드), ?smq=이름 은 검색창에 채운다.
   (구 링크 호환: ?q=이름 → ?smq=이름 으로 매핑)
   원복하려면 git 이력에서 이 파일 이전 버전을 복원하면 된다.
  ============================================================================
-->
<script>
  (function(){
    try {
      var p = new URLSearchParams(location.search);
      var q = p.get('smq') || p.get('q') || '';
      var url = '/admin.html' + (q ? ('?smq=' + encodeURIComponent(q)) : '') + '#card-students-mgmt';
      location.replace(url);
    } catch(e) {
      location.replace('/admin.html#card-students-mgmt');
    }
  })();
</script>
<meta http-equiv="refresh" content="0;url=/admin.html#card-students-mgmt" />
<style>
  html,body{margin:0;height:100%}
  body{display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#0a1530;color:#e6ecff}
  .box{text-align:center;padding:24px}
  .t{font-size:15px;font-weight:800}
  .s{font-size:12.5px;color:#94a3b8;margin-top:8px}
  a{color:#38bdf8;font-weight:700}
</style>
</head>
<body>
  <div class="box">
    <div class="t">👨‍🎓 학생관리로 이동 중…</div>
    <div class="s">자동으로 넘어가지 않으면 <a href="/admin.html#card-students-mgmt">여기</a>를 누르세요.</div>
  </div>
</body>
</html>
