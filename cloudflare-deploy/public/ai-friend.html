<!doctype html>
<html lang="ko">
<head>




  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes" />
  <title>💬 AI 영어 친구 Mango — Mangoi</title>
  <link rel="icon" href="/mangoi-favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#0a1530" />
  <script src="/js/mango-i18n.js" defer></script>
  <style>
    :root {
      --bg: #0a1530; --card: #14213b; --text: #e6ecff; --text2: #a3b3d1;
      --gold: #fbbf24; --green: #10b981; --border: rgba(251,191,36,0.18);
      --bubble-me: linear-gradient(135deg, #fbbf24, #f59e0b);
      --bubble-ai: #1e293b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background:radial-gradient(125% 100% at 50% -8%,#2a4d9e 0%,#1a2f6b 42%,#122350 100%); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      line-height: 1.5; height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; height: 100dvh; }
    .top { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: rgba(20, 33, 59, 0.95); position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .top a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 14px; }
    .top .mango-icon { width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      overflow: hidden; }
    .top .mango-icon img { width: 100%; height: 100%; object-fit: cover; }
    .top .info { flex: 1; }
    .top .name { font-size: 14px; font-weight: 800; }
    .top .status { font-size: 11px; color: var(--green); }
    .top .clear-btn { background: rgba(239,68,68,0.15); color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.3); padding: 6px 10px;
      border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
    .opts { display: flex; gap: 6px; padding: 8px 14px; background: rgba(20,33,59,0.6);
      overflow-x: auto; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .opt { padding: 6px 12px; background: var(--card); border: 1px solid var(--border);
      color: var(--text); border-radius: 999px; cursor: pointer; font-size: 11.5px;
      font-weight: 700; white-space: nowrap; }
    .opt.active { background: linear-gradient(135deg, var(--gold), #f59e0b); color: #1a1a1a; border-color: var(--gold); }

    /* ══ 🎮 게임 HUD: 레벨·XP·스트릭·오늘의 단어·퀘스트 ══ */
    .hud { display: flex; gap: 8px; align-items: center; padding: 8px 14px;
      background: rgba(10,21,48,0.55); border-bottom: 1px solid var(--border);
      overflow-x: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; }
    .hud::-webkit-scrollbar { display: none; }
    .hud-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px;
      background: var(--card); border: 1px solid var(--border); border-radius: 999px;
      font-size: 11.5px; font-weight: 800; white-space: nowrap; flex-shrink: 0; }
    .hud-lv { border-color: rgba(251,191,36,0.45); background: linear-gradient(135deg, rgba(251,191,36,0.16), rgba(245,158,11,0.08)); }
    .hud-lv .xp-track { width: 54px; height: 7px; border-radius: 99px; background: rgba(255,255,255,0.12); overflow: hidden; display: inline-block; }
    .hud-lv .xp-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #fbbf24, #f97316);
      width: 0%; transition: width .8s cubic-bezier(.22,1.4,.36,1); display: block; }
    .hud-streak { color: #fda4af; border-color: rgba(251,113,133,0.4); }
    .hud-pts { color: var(--gold); }
    .hud-wod { border-color: rgba(96,165,250,0.45); background: linear-gradient(135deg, rgba(59,130,246,0.18), rgba(37,99,235,0.08));
      cursor: pointer; transition: transform .15s; }
    .hud-wod:hover { transform: scale(1.04); }
    .hud-wod .wod-en { color: #93c5fd; font-weight: 900; }
    .hud-wod .wod-ko { color: var(--text2); font-weight: 600; font-size: 10.5px; }
    .hud-wod.done { border-color: rgba(52,211,153,0.55); background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(5,150,105,0.08)); }
    .hud-wod.done .wod-en { color: #6ee7b7; }
    .quests { display: flex; gap: 6px; align-items: center; padding: 6px 14px 8px;
      background: rgba(10,21,48,0.55); border-bottom: 1px solid var(--border);
      overflow-x: auto; flex-shrink: 0; }
    .quests::-webkit-scrollbar { display: none; }
    .q-label { font-size: 10.5px; color: var(--text2); font-weight: 800; white-space: nowrap; flex-shrink: 0; }
    .quest { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px;
      border-radius: 999px; font-size: 10.5px; font-weight: 800; white-space: nowrap; flex-shrink: 0;
      background: rgba(255,255,255,0.06); border: 1px dashed rgba(163,179,209,0.4); color: var(--text2); }
    .quest.done { background: linear-gradient(135deg, rgba(16,185,129,0.25), rgba(5,150,105,0.12));
      border: 1px solid rgba(52,211,153,0.6); color: #6ee7b7; }
    .quest .q-prog { color: var(--gold); }
    .quest.done .q-prog { color: #6ee7b7; }

    .chat { flex: 1; overflow-y: auto; padding: 18px 14px;
      display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 78%; padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: var(--bubble-me); color: #1a1a1a;
      border-bottom-right-radius: 6px; font-weight: 600; }
    .msg.ai { align-self: flex-start; background: var(--bubble-ai); color: var(--text);
      border-bottom-left-radius: 6px; border: 1px solid var(--border); }
    .msg .wod-hit { background: rgba(255,255,255,0.55); border-radius: 6px; padding: 0 4px; font-weight: 900; }
    /* 💡 문법 팁 카드 — AI 답변 끝의 (💡 …) 를 분리해 예쁘게 */
    .tip-chip { margin-top: 8px; padding: 7px 10px; border-radius: 10px; font-size: 12px;
      background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.35);
      color: #fde68a; line-height: 1.5; white-space: normal; }
    .ai-row { display: flex; gap: 8px; align-items: flex-end; }
    .ai-avatar { width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
      overflow: hidden; }
    .ai-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .ai-row.speaking .ai-avatar { animation: avatarBop .55s ease-in-out infinite; }
    @keyframes avatarBop { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-4px) rotate(5deg); } }
    .typing { display: inline-flex; gap: 4px; padding: 14px 18px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
      animation: bounce 1.4s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; } }
    .input-bar { background: rgba(20,33,59,0.98); border-top: 1px solid var(--border);
      padding: 12px 14px; backdrop-filter: blur(12px); flex-shrink: 0; }
    .input-bar form { display: flex; gap: 8px; max-width: 820px; margin: 0 auto; }
    .input-bar input { flex: 1; padding: 12px 16px; background: var(--card);
      color: var(--text); border: 1px solid var(--border); border-radius: 999px;
      font-size: 14px; font-family: inherit; }
    .input-bar input:focus { outline: 0; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(251,191,36,0.15); }
    .input-bar button { padding: 10px 18px; background: linear-gradient(135deg, #10b981, #059669);
      color: #fff; border: 0; border-radius: 999px; font-size: 14px; font-weight: 800;
      cursor: pointer; box-shadow: 0 4px 14px -2px rgba(16,185,129,0.4); }
    .input-bar button:disabled { background: #475569; box-shadow: none; }
    .empty-state { text-align: center; color: var(--text2); padding: 22px 16px 30px; }
    .empty-state .hero-mango { width: 84px; height: 84px; border-radius: 50%; overflow: hidden;
      margin: 0 auto 10px; border: 3px solid rgba(251,191,36,0.5); box-shadow: 0 8px 28px -6px rgba(251,191,36,0.45);
      animation: heroFloat 3s ease-in-out infinite; }
    .empty-state .hero-mango img { width: 100%; height: 100%; object-fit: cover; }
    @keyframes heroFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .empty-state h2 { color: var(--gold); font-size: 19px; margin: 0 0 8px 0; }
    .empty-state p { font-size: 13px; line-height: 1.6; margin: 6px 0; }
    /* 🗺 주제 모험 카드 */
    .topics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 9px;
      max-width: 560px; margin: 16px auto 0; }
    @media (max-width: 520px) { .topics { grid-template-columns: repeat(2, minmax(0,1fr)); } }
    .topic-card { padding: 12px 6px 10px; border-radius: 14px; cursor: pointer; border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(160deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: transform .15s, box-shadow .15s, border-color .15s; }
    .topic-card:hover { transform: translateY(-3px) scale(1.03); border-color: rgba(251,191,36,0.55);
      box-shadow: 0 10px 22px -8px rgba(251,191,36,0.35); }
    .topic-card .t-emoji { font-size: 26px; line-height: 1; }
    .topic-card .t-name { font-size: 11.5px; font-weight: 800; color: var(--text); }
    .quick { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
    .quick button { padding: 8px 14px; background: rgba(251,191,36,0.12);
      color: var(--gold); border: 1px solid rgba(251,191,36,0.3);
      border-radius: 999px; font-size: 12px; cursor: pointer; font-weight: 700; }

    /* ⭐ 포인트 플로팅 토스트 */
    .pt-toast { position: fixed; left: 50%; bottom: 108px; transform: translateX(-50%);
      background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a1a1a;
      font-weight: 900; font-size: 15px; padding: 8px 18px; border-radius: 999px;
      box-shadow: 0 8px 24px -4px rgba(251,191,36,0.55); z-index: 900; pointer-events: none;
      animation: ptFly 1.5s ease-out forwards; white-space: nowrap; }
    @keyframes ptFly { 0% { opacity: 0; transform: translate(-50%, 16px) scale(.7); }
      18% { opacity: 1; transform: translate(-50%, 0) scale(1.08); }
      70% { opacity: 1; transform: translate(-50%, -30px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -60px) scale(.9); } }
    /* 🎉 레벨업/퀘스트 축하 배너 */
    .cele-banner { position: fixed; left: 50%; top: 34%; transform: translate(-50%,-50%) scale(.6);
      background: linear-gradient(135deg, #1e293b, #0f172a); border: 2px solid var(--gold);
      color: var(--text); padding: 18px 26px; border-radius: 20px; z-index: 950; text-align: center;
      box-shadow: 0 18px 60px -10px rgba(251,191,36,0.5); animation: celePop 2.6s ease forwards; pointer-events: none;
      max-width: 84vw; }
    .cele-banner .cb-big { font-size: 30px; }
    .cele-banner .cb-title { font-size: 17px; font-weight: 900; color: var(--gold); margin-top: 4px; }
    .cele-banner .cb-sub { font-size: 12.5px; color: var(--text2); margin-top: 3px; }
    @keyframes celePop { 0% { opacity: 0; transform: translate(-50%,-50%) scale(.6); }
      12% { opacity: 1; transform: translate(-50%,-50%) scale(1.06); }
      20% { transform: translate(-50%,-50%) scale(1); }
      82% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%,-58%) scale(.94); } }
    /* 🎊 콘페티 */
    .confetti-box { position: fixed; inset: 0; pointer-events: none; z-index: 940; overflow: hidden; }
    .confetti-p { position: absolute; width: 9px; height: 14px; top: -20px; border-radius: 2px;
      animation: cfFall linear forwards; }
    @keyframes cfFall { to { transform: translateY(110vh) rotate(720deg); opacity: .9; } }

    /* 🔊 헤더 소리 ON/OFF 토글 */
    .snd-toggle { background: rgba(251,191,36,0.15); color: var(--gold);
      border: 1px solid rgba(251,191,36,0.35); width: 34px; height: 34px;
      border-radius: 9px; font-size: 15px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; line-height: 1; }
    .snd-toggle.off { background: rgba(148,163,184,0.12); color: #94a3b8; border-color: rgba(148,163,184,0.3); }

    /* 🔊 각 AI 답변 "다시 듣기" 스피커 버튼 */
    .replay-btn { align-self: flex-end; margin-bottom: 2px; width: 30px; height: 30px;
      border-radius: 50%; border: 1px solid rgba(251,191,36,0.35);
      background: rgba(251,191,36,0.12); color: var(--gold); font-size: 14px;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      line-height: 1; transition: transform .15s, background .15s; padding: 0; }
    .replay-btn:hover { background: rgba(251,191,36,0.22); transform: scale(1.08); }
    .replay-btn.playing { background: var(--gold); color: #1a1a1a; animation: sndPulse 1s ease-in-out infinite; }
    @keyframes sndPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.5); } 50% { box-shadow: 0 0 0 6px rgba(251,191,36,0); } }

    /* 🎤 입력창 말하기(음성 입력) 버튼 */
    .mic-btn { padding: 0; width: 46px; flex-shrink: 0; background: rgba(251,191,36,0.14);
      color: var(--gold); border: 1px solid rgba(251,191,36,0.35); border-radius: 999px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .mic-btn:hover { background: rgba(251,191,36,0.24); }
    .mic-btn.recording { background: linear-gradient(135deg,#ef4444,#dc2626); color: #fff;
      border-color: #ef4444; animation: micPulse 1.1s ease-in-out infinite; }
    @keyframes micPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.55); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }
  </style>
</head>
<body>
  <div class="top">
    <a href="/">←</a>
    <div class="mango-icon"><img src="/img/mango-char.png" alt="Mango" /></div>
    <div class="info">
      <div class="name">Mango</div>
      <div class="status">● <span data-ko="온라인 (24시간)" data-en="online (24/7)">온라인 (24시간)</span></div>
    </div>
    <button class="snd-toggle" id="sndToggle" onclick="toggleSound()" aria-label="소리 켜기/끄기" data-ko-aria="소리 켜기/끄기" data-en-aria="Sound on/off" title="소리 듣기 켜기/끄기">🔊</button>
    <button class="clear-btn" onclick="clearChat()">🗑 <span data-ko="대화 초기화" data-en="Clear">대화 초기화</span></button>
  </div>
  <div class="opts">
    <span style="font-size:11px;color:var(--text2);align-self:center;margin-right:4px" data-ko="레벨:" data-en="Level:">레벨:</span>
    <button class="opt" data-level="A1">A1</button>
    <button class="opt" data-level="A2">A2</button>
    <button class="opt active" data-level="B1">B1</button>
    <button class="opt" data-level="B2">B2</button>
    <button class="opt" data-level="C1">C1</button>
    <span style="font-size:11px;color:var(--text2);align-self:center;margin:0 4px 0 8px" data-ko="스타일:" data-en="Style:">스타일:</span>
    <button class="opt active" data-persona="friendly" data-ko="친근한" data-en="Friendly">친근한</button>
    <button class="opt" data-persona="playful" data-ko="장난스러운" data-en="Playful">장난스러운</button>
    <button class="opt" data-persona="serious" data-ko="진지한" data-en="Serious">진지한</button>
    <button class="opt" data-persona="tutor" data-ko="튜터" data-en="Tutor">튜터</button>
    <span style="font-size:11px;color:var(--text2);align-self:center;margin:0 4px 0 8px">🔊 <span data-ko="속도:" data-en="Speed:">속도:</span></span>
    <button class="opt" data-rate="0.6" data-ko="🐢 아주 느리게" data-en="🐢 Very slow">🐢 아주 느리게</button>
    <button class="opt" data-rate="0.8" data-ko="느리게" data-en="Slow">느리게</button>
    <button class="opt active" data-rate="1" data-ko="보통" data-en="Normal">보통</button>
    <button class="opt" data-rate="1.2" data-ko="🐇 빠르게" data-en="🐇 Fast">🐇 빠르게</button>
    <span style="font-size:11px;color:var(--text2);align-self:center;margin:0 4px 0 8px">🎙 <span data-ko="목소리:" data-en="Voice:">목소리:</span></span>
    <button class="opt" data-voice="female" data-ko="👩 여자" data-en="👩 Female">👩 여자</button>
    <button class="opt" data-voice="male" data-ko="👨 남자" data-en="👨 Male">👨 남자</button>
    <button class="opt" data-voice="mix" data-ko="🔀 번갈아" data-en="🔀 Mix">🔀 번갈아</button>
  </div>

  <!-- 🎮 게임 HUD: 레벨·XP·스트릭·오늘 포인트·오늘의 단어 -->
  <div class="hud" id="hud">
    <span class="hud-chip hud-lv" id="lvChip">🥭 <span id="lvName">Lv.1 새싹 망고</span>
      <span class="xp-track"><span class="xp-fill" id="xpFill"></span></span></span>
    <span class="hud-chip hud-streak" id="streakChip" title="연속 대화 일수">🔥 <span id="streakN">0</span><span data-ko="일 연속" data-en="-day streak">일 연속</span></span>
    <span class="hud-chip hud-pts" id="ptsChip" title="오늘 획득 포인트">⭐ <span data-ko="오늘" data-en="Today">오늘</span> +<span id="ptsN">0</span>P</span>
    <span class="hud-chip hud-wod" id="wodChip" onclick="hearWod()" title="눌러서 발음 듣기 — 대화에 쓰면 +5P!">
      ✨ <span data-ko="오늘의 단어" data-en="Word of the day">오늘의 단어</span>:
      <span class="wod-en" id="wodEn">—</span> <span class="wod-ko" id="wodKo"></span> <span id="wodEmoji"></span>
    </span>
  </div>
  <!-- 🏆 일일 퀘스트 -->
  <div class="quests" id="quests">
    <span class="q-label">🏆 <span data-ko="오늘의 퀘스트:" data-en="Daily quests:">오늘의 퀘스트:</span></span>
    <span class="quest" id="qTalk">💬 <span data-ko="영어 수다 5번" data-en="Chat 5 times">영어 수다 5번</span> <span class="q-prog" id="qTalkN">0/5</span></span>
    <span class="quest" id="qWord">✨ <span data-ko="오늘의 단어 쓰기" data-en="Use today's word">오늘의 단어 쓰기</span> <span class="q-prog">+5P</span></span>
    <span class="quest" id="qVoice">🎤 <span data-ko="목소리로 말하기" data-en="Speak out loud">목소리로 말하기</span> <span class="q-prog">+1P</span></span>
  </div>

  <div class="chat" id="chat"></div>
  <div class="input-bar">
    <form onsubmit="sendMsg(event)">
      <input id="msgInput" type="text" autocomplete="off" placeholder="영어로 메시지를 보내세요…" data-ko-placeholder="영어로 메시지를 보내세요…" data-en-placeholder="Type in English…" maxlength="500" />
      <button type="button" class="mic-btn" id="micBtn" onclick="toggleMic()" aria-label="말하기 (음성 입력)" data-ko-aria="말하기 (음성 입력)" data-en-aria="Speak (voice input)" title="말하기 — 마이크로 영어 말하기">🎤</button>
      <button type="submit" id="sendBtn" data-ko="전송" data-en="Send">전송</button>
    </form>
  </div>

  <script>
    // 전체 사이트 로그인된 사용자(mango_user) + 서명 토큰 자동 사용
    // 서버가 uid 를 그대로 믿지 않으므로(타인 대화 열람/삭제 방지 = IDOR 차단)
    // 항상 { uid, token } 쌍으로 요청한다. 게스트는 서버 발급 랜덤 uid + 세션 스코프 토큰.
    let authCache = null;
    function tokenUid(tok) {
      try { return JSON.parse(atob(String(tok).split('.')[0].replace(/-/g,'+').replace(/_/g,'/'))).uid || null; } catch(e){ return null; }
    }
    async function getAuth() {
      if (authCache) return authCache;
      let u = null;
      try { u = JSON.parse(localStorage.getItem('mango_user') || 'null'); } catch(e){}
      if (u && u.user_id) {
        let tok = null;
        try { tok = localStorage.getItem('mango_token'); } catch(e){}
        if (tok && tokenUid(tok) === u.user_id) {
          authCache = { uid: u.user_id, token: tok };
          return authCache;
        }
        // 토큰이 없거나 다른 계정 것 → 비밀번호 미설정 계정은 조용히 재발급 (로그인과 동일 보안수준)
        try {
          const r = await fetch('/api/student/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ user_id: u.user_id }) });
          const d = await r.json();
          if (d.ok && d.token) {
            try { localStorage.setItem('mango_token', d.token); } catch(e){}
            authCache = { uid: u.user_id, token: d.token };
            return authCache;
          }
        } catch(e){}
        // 비밀번호 계정인데 토큰 없음(예: 이전 버전에서 로그인) → 재로그인 전까지 게스트로 폴백
      }
      // 게스트 — 세션 스코프(sessionStorage) 랜덤 uid + 서버 발급 토큰
      try {
        const g = JSON.parse(sessionStorage.getItem('mango_guest_chat') || 'null');
        if (g && g.uid && g.token) { authCache = g; return authCache; }
      } catch(e){}
      try {
        const r = await fetch('/api/ai/chat-guest-token', { method:'POST' });
        const d = await r.json();
        if (d.ok && d.uid && d.token) {
          try { sessionStorage.setItem('mango_guest_chat', JSON.stringify({ uid: d.uid, token: d.token })); } catch(e){}
          authCache = { uid: d.uid, token: d.token };
          return authCache;
        }
      } catch(e){}
      return null;
    }
    let currentLevel = 'B1';
    let currentPersona = 'friendly';
    // 🔊 원어민 음성 재생 속도 (localStorage 로 유지, 기본 1 = 보통)
    let currentRate = (function(){
      try { const r = parseFloat(localStorage.getItem('mangoi_aifriend_tts_rate')); return (r >= 0.5 && r <= 1.5) ? r : 1; } catch(e){ return 1; }
    })();

    document.querySelectorAll('.opt[data-level]').forEach(b => {
      b.onclick = () => { document.querySelectorAll('.opt[data-level]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); currentLevel = b.dataset.level; };
    });
    document.querySelectorAll('.opt[data-persona]').forEach(b => {
      b.onclick = () => { document.querySelectorAll('.opt[data-persona]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); currentPersona = b.dataset.persona; };
    });
    /* 🎙 목소리 선택 — 여자(asteria)/남자(orion)/번갈아(메시지마다 교대). localStorage 로 기억. */
    let currentVoice = (function(){ try { const v = localStorage.getItem('mangoi_aifriend_voice'); return ['female','male','mix'].includes(v) ? v : 'female'; } catch(e){ return 'female'; } })();
    let _mixTurn = 0;
    function speakerFor() {
      if (currentVoice === 'male') return 'orion';
      if (currentVoice === 'mix') return (_mixTurn++ % 2 === 0) ? 'asteria' : 'orion';
      return 'asteria';
    }
    document.querySelectorAll('.opt[data-voice]').forEach(b => {
      if (b.dataset.voice === currentVoice) { document.querySelectorAll('.opt[data-voice]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }
      b.onclick = () => {
        document.querySelectorAll('.opt[data-voice]').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentVoice = b.dataset.voice;
        try { localStorage.setItem('mangoi_aifriend_voice', currentVoice); } catch(e){}
        try { if (window.UXT) UXT.hit('ux:aifriend-voice-' + currentVoice); } catch(e){}
      };
    });
    document.querySelectorAll('.opt[data-rate]').forEach(b => {
      if (parseFloat(b.dataset.rate) === currentRate) { document.querySelectorAll('.opt[data-rate]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }
      b.onclick = () => { applyRate(parseFloat(b.dataset.rate) || 1); };
    });
    /* 🐢 (2026-07-23) "천천히 말해줘" 를 말이나 글로 부탁하면 실제로 음성 속도를 한 단계 낮춘다.
       그동안은 속도가 화면 버튼으로만 바뀌어서, 부탁해도 똑같은 속도로 계속 말했다.
       (AI 답변 자체가 요청에 응하는 것은 서버 프롬프트에서 처리) */
    const RATE_STEPS_AF = [0.6, 0.8, 1, 1.2];
    function applyRate(v) {
      currentRate = v;
      try { localStorage.setItem('mangoi_aifriend_tts_rate', String(currentRate)); } catch(e){}
      document.querySelectorAll('.opt[data-rate]').forEach(x => {
        x.classList.toggle('active', parseFloat(x.dataset.rate) === currentRate);
      });
    }
    function maybeAdjustRate(text) {
      const t = String(text || '');
      const slower = /(천천히|느리게|너무\s*빠르|못\s*알아|알아듣기)/.test(t)
                  || /\b(slow(ly| down)?|too fast|more slowly|speak slower)\b/i.test(t);
      const faster = /(빠르게|더\s*빨리)/.test(t) || /\b(faster|speed up)\b/i.test(t);
      if (!slower && !faster) return;
      const i = RATE_STEPS_AF.indexOf(currentRate);
      const cur = i < 0 ? RATE_STEPS_AF.indexOf(1) : i;
      const next = slower ? Math.max(0, cur - 1) : Math.min(RATE_STEPS_AF.length - 1, cur + 1);
      if (RATE_STEPS_AF[next] !== currentRate) applyRate(RATE_STEPS_AF[next]);
    }
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function isEn() { try { return window.getLang && window.getLang() === 'en'; } catch(e){ return false; } }

    /* ══ 🎮 게임화 상태 — 서버 gam 응답(오늘/누적 메시지·스트릭·오늘의 단어)으로 갱신 ══ */
    const MANGO_LEVELS = [
      { at: 0,   name: '새싹 망고' },  { at: 10,  name: '풋풋 망고' },
      { at: 25,  name: '노랑 망고' },  { at: 50,  name: '달콤 망고' },
      { at: 90,  name: '반짝 망고' },  { at: 140, name: '슈퍼 망고' },
      { at: 200, name: '히어로 망고' },{ at: 280, name: '마스터 망고' },
      { at: 380, name: '챔피언 망고' },{ at: 500, name: '황금 망고' },
    ];
    const MANGO_LEVELS_EN = ['Seed Mango','Green Mango','Yellow Mango','Sweet Mango','Shiny Mango','Super Mango','Hero Mango','Master Mango','Champion Mango','Golden Mango'];
    function calcLevel(lifetime) {
      let idx = 0;
      for (let i = 0; i < MANGO_LEVELS.length; i++) if (lifetime >= MANGO_LEVELS[i].at) idx = i;
      const cur = MANGO_LEVELS[idx];
      const next = MANGO_LEVELS[idx + 1] || null;
      const pct = next ? Math.min(100, Math.round((lifetime - cur.at) / (next.at - cur.at) * 100)) : 100;
      return { n: idx + 1, name: cur.name, nameEn: MANGO_LEVELS_EN[idx], pct };
    }
    let gamState = { today: 0, lifetime: 0, streak: 0, word: null, sessionPts: 0, wordDone: false, voiceDone: false };
    function updateHUD() {
      const g = gamState;
      const lv = calcLevel(g.lifetime);
      document.getElementById('lvName').textContent = 'Lv.' + lv.n + ' ' + (isEn() ? lv.nameEn : lv.name);
      document.getElementById('xpFill').style.width = lv.pct + '%';
      document.getElementById('streakN').textContent = g.streak;
      document.getElementById('ptsN').textContent = g.sessionPts;
      if (g.word) {
        document.getElementById('wodEn').textContent = g.word.w;
        document.getElementById('wodKo').textContent = '(' + g.word.ko + ')';
        document.getElementById('wodEmoji').textContent = g.word.e || '';
        document.getElementById('wodChip').classList.toggle('done', !!g.wordDone);
      }
      const t = Math.min(g.today, 5);
      document.getElementById('qTalkN').textContent = t + '/5';
      document.getElementById('qTalk').classList.toggle('done', g.today >= 5);
      document.getElementById('qWord').classList.toggle('done', !!g.wordDone);
      document.getElementById('qVoice').classList.toggle('done', !!g.voiceDone);
    }
    function hearWod() {
      if (gamState.word) speakText(gamState.word.w, null, null);
    }

    /* ══ 🎵 효과음 — WebAudio 직접 합성(파일 없음), 소리 토글 존중 ══ */
    let _actx = null;
    function actx() {
      if (!_actx) { try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
      if (_actx && _actx.state === 'suspended') { try { _actx.resume(); } catch(e){} }
      return _actx;
    }
    function tone(freq, t0, dur, type, vol) {
      const c = actx(); if (!c) return;
      const o = c.createOscillator(), g = c.createGain();
      o.type = type || 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, c.currentTime + t0);
      g.gain.exponentialRampToValueAtTime(vol || 0.12, c.currentTime + t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + t0 + dur);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime + t0); o.stop(c.currentTime + t0 + dur + 0.05);
    }
    function sndPop()  { if (!isSoundOn()) return; tone(660, 0, 0.09, 'triangle', 0.10); }
    function sndCoin() { if (!isSoundOn()) return; tone(880, 0, 0.08, 'square', 0.06); tone(1320, 0.08, 0.14, 'square', 0.06); }
    function sndFanfare() { if (!isSoundOn()) return;
      [[523,0],[659,0.11],[784,0.22],[1047,0.34]].forEach(p => tone(p[0], p[1], 0.22, 'triangle', 0.11));
      tone(1319, 0.5, 0.4, 'triangle', 0.09);
    }

    /* ══ 🎊 콘페티 + 축하 배너 + ⭐포인트 토스트 ══ */
    function confetti(n) {
      const box = document.createElement('div');
      box.className = 'confetti-box';
      const colors = ['#fbbf24','#f97316','#10b981','#60a5fa','#f472b6','#a78bfa'];
      for (let i = 0; i < (n || 36); i++) {
        const p = document.createElement('div');
        p.className = 'confetti-p';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[i % colors.length];
        p.style.animationDuration = (1.4 + Math.random() * 1.4) + 's';
        p.style.animationDelay = (Math.random() * 0.5) + 's';
        box.appendChild(p);
      }
      document.body.appendChild(box);
      setTimeout(() => box.remove(), 3400);
    }
    function celebrate(big, title, sub) {
      const el = document.createElement('div');
      el.className = 'cele-banner';
      el.innerHTML = '<div class="cb-big">' + big + '</div><div class="cb-title">' + escapeHtml(title) + '</div>' + (sub ? '<div class="cb-sub">' + escapeHtml(sub) + '</div>' : '');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2700);
      confetti(44);
      sndFanfare();
    }
    function ptToast(text) {
      const el = document.createElement('div');
      el.className = 'pt-toast';
      el.textContent = text;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1600);
      sndCoin();
    }

    /* ══ 서버 gam 반영 — 레벨업/오늘의 단어/수다 5번 퀘스트 감지 → 축하 ══ */
    function applyGam(g, wasVoice) {
      if (!g) return;
      const prevLevel = calcLevel(gamState.lifetime).n;
      const prevToday = gamState.today;
      gamState.today = g.today || 0;
      gamState.lifetime = g.lifetime || 0;
      gamState.streak = g.streak || 0;
      if (g.word) gamState.word = g.word;
      let earned = 0;
      if (g.awarded) earned += g.awarded;
      if (g.voice_bonus) { earned += g.voice_bonus; gamState.voiceDone = true; }
      if (g.word_bonus) { earned += g.word_bonus; gamState.wordDone = true; }
      gamState.sessionPts += earned;
      updateHUD();
      const newLevel = calcLevel(gamState.lifetime);
      if (newLevel.n > prevLevel && gamState.lifetime > 1) {
        celebrate('🥭', (isEn() ? 'LEVEL UP! ' : '레벨 업! ') + 'Lv.' + newLevel.n + ' ' + (isEn() ? newLevel.nameEn : newLevel.name),
          isEn() ? 'Your Mango is growing!' : '망고가 무럭무럭 자라고 있어요!');
      } else if (g.word_bonus) {
        celebrate('✨', isEn() ? "Today's word used! +5P" : '오늘의 단어 사용! +5P',
          '"' + (gamState.word ? gamState.word.w : '') + '" — ' + (isEn() ? 'Great vocabulary!' : '멋진 단어 실력이에요!'));
      } else if (prevToday < 5 && gamState.today >= 5) {
        celebrate('🏆', isEn() ? 'Quest complete: 5 chats!' : '퀘스트 달성: 영어 수다 5번!',
          isEn() ? 'You are on fire today!' : '오늘 영어 실력이 불타오르고 있어요!');
      } else if (earned > 0) {
        ptToast('+' + earned + 'P ⭐');
      }
    }

    // 유저 말풍선에서 오늘의 단어 하이라이트
    function renderWithWod(text) {
      let html = escapeHtml(text);
      if (gamState.word) {
        try {
          const re = new RegExp('\\b(' + gamState.word.w + ')\\b', 'gi');
          html = html.replace(re, '<span class="wod-hit">$1</span>');
        } catch(e){}
      }
      return html;
    }
    function appendMsg(role, content) {
      const chat = document.getElementById('chat');
      if (role === 'user') {
        const m = document.createElement('div');
        m.className = 'msg user';
        m.innerHTML = renderWithWod(content);
        chat.appendChild(m);
      } else {
        // (💡 …) 문법 팁을 본문에서 분리해 노란 팁 카드로 — TTS 는 영어 본문만 읽음
        let body = String(content || '');
        let tip = '';
        const tm = body.match(/\(💡[^)]*\)\s*$/);
        if (tm) { tip = tm[0].replace(/^\(/, '').replace(/\)$/, '').trim(); body = body.slice(0, tm.index).trim(); }
        const row = document.createElement('div');
        row.className = 'ai-row';
        row.innerHTML = '<div class="ai-avatar"><img src="/img/mango-char.png" alt="Mango" /></div>'
          + '<div class="msg ai">' + escapeHtml(body).replace(/\n/g, '<br>')
          + (tip ? '<div class="tip-chip">' + escapeHtml(tip) + '</div>' : '')
          + '</div>'
          + '<button class="replay-btn" aria-label="다시 듣기" data-ko-aria="다시 듣기" data-en-aria="Play again" title="다시 듣기">🔊</button>';
        const rb = row.querySelector('.replay-btn');
        if (rb) rb.addEventListener('click', () => speakText(body, rb, row));
        row._speakBody = body;
        chat.appendChild(row);
      }
      chat.scrollTop = chat.scrollHeight;
    }

    /* ══ 🔊 소리 듣기 (원어민 TTS: 서버 Deepgram Aura-1 → MeloTTS → 브라우저 폴백) ══ */
    function isSoundOn() { try { return localStorage.getItem('mangoi_aifriend_sound') !== '0'; } catch(e){ return true; } }
    function updateSoundBtn() {
      const b = document.getElementById('sndToggle'); if (!b) return;
      const on = isSoundOn();
      b.textContent = on ? '🔊' : '🔇';
      b.classList.toggle('off', !on);
    }
    function toggleSound() {
      const on = isSoundOn();
      try { localStorage.setItem('mangoi_aifriend_sound', on ? '0' : '1'); } catch(e){}
      if (on) { // 껐음 — 재생 중인 음성 중단
        try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch(e){}
        document.querySelectorAll('audio').forEach(a => { try { a.pause(); } catch(e){} });
        document.querySelectorAll('.replay-btn.playing').forEach(x => x.classList.remove('playing'));
        document.querySelectorAll('.ai-row.speaking').forEach(x => x.classList.remove('speaking'));
      }
      updateSoundBtn();
    }
    let _ttsLangSet = false;
    function speakText(text, btn, row) {
      if (!window.MangoiTTS) return;
      if (!_ttsLangSet) { try { MangoiTTS.setLang('en'); } catch(e){} _ttsLangSet = true; }
      const clean = String(text || '').replace(/^[⚠️❗️\s]+/, '').trim();
      if (!clean || /^⚠️/.test(text)) return;   // 시스템/오류 메시지는 읽지 않음
      document.querySelectorAll('.replay-btn.playing').forEach(x => x.classList.remove('playing'));
      document.querySelectorAll('.ai-row.speaking').forEach(x => x.classList.remove('speaking'));
      if (btn) btn.classList.add('playing');
      if (row) row.classList.add('speaking');
      const done = function(){
        if (btn) btn.classList.remove('playing');
        if (row) row.classList.remove('speaking');
      };
      try {
        try { if (MangoiTTS.setSpeaker) MangoiTTS.setSpeaker(speakerFor()); } catch(e){}
        MangoiTTS.speak(clean, currentRate, done);
      } catch(e){ done(); }
    }

    /* ══ 🎤 말하기 (브라우저 음성인식 → 영어 받아쓰기 → 자동 전송 + 🎤보너스) ══ */
    let _recog = null, _recognizing = false, _pendingVoice = false;
    /* 🎤 (2026-07-23) "한두 마디만 하면 마이크가 꺼지고 AI가 엉뚱한 답을 한다" 대응 상태.
       _micBase = 브라우저가 세션을 제멋대로 끊어서 다시 시작한 경우, 앞 세션까지 들은 말
       _micSess = 지금 세션에서 들은 말 (매 onresult 마다 0부터 재조립)
       _micBySilence = 우리 침묵 감시 타이머가 부른 종료인가(=진짜 말이 끝남)
       _micStopWanted = 사용자가 ⏹ 를 눌렀거나 재시작하면 안 되는 오류인가 */
    let _micBase = '', _micSess = '', _micBySilence = false, _micStopWanted = false, _micRestarts = 0, _micT0 = 0;
    function updateMicUI() {
      const b = document.getElementById('micBtn'); if (!b) return;
      b.classList.toggle('recording', _recognizing);
      b.textContent = _recognizing ? '⏹' : '🎤';
    }
    /* 🎤 인식 조각 합치기 — 안드로이드 크롬은 continuous 모드에서 "지금까지 말한 문장 전체"를
       확정 결과로 여러 번 다시 보낸다(누적형). PC 크롬은 새로 말한 조각만 보낸다(조각형).
       그래서 그냥 이어붙이면 안드로이드에서 "I like I like to I like to eat…" 처럼 겹겹이 쌓인다.
       앞 문장의 꼬리와 새 조각의 머리가 겹치면(단어 단위) 겹친 만큼 지우고 붙인다:
         merge("I like to", "I like to eat") = "I like to eat"   ← 누적형: 통째로 교체됨
         merge("I like",    "to eat")        = "I like to eat"   ← 조각형: 그대로 연결 */
    function mergeSpeech(a, b) {
      a = (a || '').replace(/\s+/g, ' ').trim();
      b = (b || '').replace(/\s+/g, ' ').trim();
      if (!a) return b;
      if (!b) return a;
      const la = a.toLowerCase().split(' '), lb = b.toLowerCase().split(' '), rb = b.split(' ');
      let k = 0;
      for (let n = Math.min(la.length, lb.length); n > 0; n--) {
        if (la.slice(la.length - n).join(' ') === lb.slice(0, n).join(' ')) { k = n; break; }
      }
      const rest = rb.slice(k).join(' ');
      return rest ? a + ' ' + rest : a;
    }
    /* 🎤 인식 결과 다듬기 — 공백 정리 + 같은 단어("I I like like")뿐 아니라
       같은 구절("my dog likes my dog likes", 2~6단어)의 연속 반복도 한 번으로. */
    function tidySpeech(s) {
      s = (s || '').replace(/\s+/g, ' ').trim();
      for (let i = 0; i < 3; i++) {
        const prev = s;
        s = s.replace(/(^|\s)(\S+)(?:\s+\2)+(?=\s|$)/gi, '$1$2');
        s = s.replace(/(^|\s)((?:\S+\s+){1,5}\S+)(?:\s+\2)+(?=\s|$)/gi, '$1$2');
        if (s === prev) break;
      }
      return s;
    }
    /* 🎤 아직 말이 안 끝난 것처럼 보이는가 — 단어 2개 이하이거나, 뒤에 말이 더 붙어야
       자연스러운 단어("I", "and", "to", "my", "want" …)로 끝났으면 아직 말하는 중으로 본다.
       (아이들은 "I ... 음 ... like ... 음 ... dogs" 처럼 중간에 오래 쉰다) */
    const MIC_DANGLING = /^(i|a|an|and|or|but|to|the|my|your|his|her|our|their|is|are|am|was|were|be|been|do|does|did|can|could|will|would|should|want|wants|like|likes|love|loves|have|has|had|in|on|at|of|for|with|about|that|this|these|those|it|he|she|they|we|you|because|so|very|really|going|gonna|there|when|what|where|who|how|why|im|its|dont|doesnt|lets|wanna)$/i;
    function micUnfinished(s) {
      const w = String(s || '').trim().split(/\s+/).filter(Boolean);
      if (w.length < 3) return true;
      return MIC_DANGLING.test(w[w.length - 1].replace(/[^a-z']/gi, ''));
    }
    function initRecog() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;
      const r = new SR();
      // 🎤 말 중간에 숨 쉬어도 안 끊기게: continuous=true + interim 결과로 "침묵 감시 타이머" 운용.
      //    브라우저의 성급한 자동종료를 끄고, 말이 끝나고 조용해지면 우리가 직접 종료한다.
      r.lang = 'en-US'; r.interimResults = true; r.maxAlternatives = 1; r.continuous = true;
      let _silence = null;
      /* 🎤 (2026-07-23) 침묵 대기 시간을 상황에 맞게 — 2.6초 고정이라 "한두 마디 하면 꺼졌다".
         아직 아무 말도 못 들었으면 오래 기다리고(생각할 시간), 조각만 들렸으면 넉넉히,
         문장이 다 완성돼 보이면 예전처럼 빠르게 마무리한다. */
      const SIL_FIRST = 9000;                  // 첫 마디를 기다리는 시간
      const SIL_SHORT = 5000;                  // 1~2단어 / 미완성 꼬리 — 아직 말하는 중일 가능성
      const SIL_DONE  = 2600;                  // 문장이 완성돼 보이면 기존과 동일하게 빠르게
      const micHeard = () => tidySpeech(mergeSpeech(_micBase, _micSess));
      const armSilence = () => {
        if (_silence) clearTimeout(_silence);
        const t = micHeard();
        const ms = !t ? SIL_FIRST : (micUnfinished(t) ? SIL_SHORT : SIL_DONE);
        _silence = setTimeout(() => { _micBySilence = true; try { r.stop(); } catch(e){} }, ms);
      };
      /* 🎤 진짜로 말이 끝났을 때만 여기로 온다 → 들은 말을 합쳐서 전송 */
      const finishMic = () => {
        _recognizing = false; updateMicUI();
        const input = document.getElementById('msgInput');
        const said = tidySpeech(mergeSpeech(_micBase, _micSess));
        _micBase = ''; _micSess = '';
        if (input) input.value = said;
        if (said) { micHint(null); _pendingVoice = true; sendMsg(); }   // 인식 끝나면 자동 전송
        else micHint(isEn() ? "I couldn't hear anything. Tap 🎤 and try again."
                            : '🎤 소리가 잘 안 들렸어요. 🎤 를 다시 누르고 또박또박 말해주세요.', 5000);
      };
      /* 🎤 (2026-07-22 2차) 확정 결과를 버퍼(_finalTxt)에 이어붙이는 방식을 폐기.
         안드로이드 크롬은 continuous 모드에서 "지금까지 말한 문장 전체"를 확정 결과로
         여러 번 다시 보내서, 이어붙이면 누적본이 겹겹이 쌓였다:
           "I like" + "I like to" + "I like to eat" → "I like I like to I like to eat…"
         이제 결과가 올 때마다 브라우저가 들고 있는 이번 녹음의 전체 결과 목록(0~끝)을
         mergeSpeech(겹침 제거)로 처음부터 다시 조립한다. 이어붙일 버퍼 자체가 없으므로
         한 녹음 안의 반복도, 이전 녹음이 넘어오는 일도 원천적으로 불가능하다. */
      r.onstart = () => { _micBySilence = false; _micSess = ''; armSilence(); };
      r.onresult = (ev) => {
        try {
          let full = '';
          for (let i = 0; i < ev.results.length; i++) full = mergeSpeech(full, ev.results[i][0].transcript);
          _micSess = full;
          const input = document.getElementById('msgInput');
          if (input) input.value = tidySpeech(mergeSpeech(_micBase, _micSess));
          armSilence();                        // 말할 때마다 종료 타이머 리셋 → 계속 말하면 안 끊김
        } catch(e){}
      };
      /* 🎤 (2026-07-23) 브라우저가 제멋대로 끊은 경우 다시 듣기.
         안드로이드 크롬은 continuous=true 를 무시하고 첫 확정 결과 뒤 세션을 스스로 닫는다.
         지금까지는 그 onend 를 "학생이 말을 마쳤다"로 착각해 조각("I")을 그대로 AI 에 보냈다.
         → 우리 침묵 타이머가 부른 종료가 아니면 아직 말하는 중으로 보고, 들은 말을 유지한 채
           즉시 다시 듣는다. 끝내는 권한은 오직 침묵 타이머와 사용자의 ⏹ 뿐. */
      r.onend = () => {
        if (_silence) clearTimeout(_silence);
        /* 아직 한 마디도 못 들었으면 재시작을 3회로 제한 — 안드로이드는 start() 마다
           '삐' 소리가 나서, 학생이 말을 안 하는데 8번씩 재시작하면 그게 더 성가시다. */
        const heardAnything = !!(_micBase || _micSess);
        const wantMore = !_micBySilence && !_micStopWanted
                       && _micRestarts < (heardAnything ? 8 : 3) && (Date.now() - _micT0) < 60000;
        _micBase = mergeSpeech(_micBase, _micSess); _micSess = '';
        if (wantMore) {
          _micRestarts++;
          try { r.start(); return; }                       // UI 는 계속 '듣는 중' 유지
          catch(e){
            setTimeout(() => { try { r.start(); } catch(e2){ finishMic(); } }, 250);
            return;
          }
        }
        finishMic();
      };
      /* 오류 — no-speech(아직 말을 못 꺼냄)만 재시작 허용, 나머지는 그대로 종료.
         무슨 일이 일어났는지 학생에게 반드시 알려준다(그동안 아무 안내가 없었다). */
      r.onerror = (ev) => {
        if (_silence) clearTimeout(_silence);
        const err = ev && ev.error;
        if (err === 'no-speech') return;
        _micStopWanted = true;
        _recognizing = false; updateMicUI();
        _micBase = ''; _micSess = '';
        if (err === 'not-allowed' || err === 'service-not-allowed') {
          micHint(isEn() ? 'Mic permission is off. Tap the lock icon in the address bar → allow the microphone.'
                         : '🎤 마이크 권한이 꺼져 있어요. 주소창의 자물쇠(🔒) → 마이크 "허용" 후 다시 눌러주세요.', 6000);
        } else if (err === 'audio-capture') {
          micHint(isEn() ? 'No microphone found. Check your headset or device.'
                         : '🎤 마이크를 찾지 못했어요. 헤드셋·기기 연결을 확인해주세요.', 6000);
        } else if (err === 'network') {
          /* 음성인식 서버에 못 닿는 환경 — 녹음+Whisper 로 대신 시도한다 */
          micHint(isEn() ? 'Switching to recording mode…' : '🎤 녹음 방식으로 바꿔서 다시 시도할게요…', 2500);
          setTimeout(() => { micViaWhisper(); }, 300);
        }
      };
      return r;
    }
    /* 🎤 마이크 상태·오류를 화면에 알려준다 — 그동안 ai-friend 는 아무 안내가 없어서
       권한이 꺼져 있거나 소리가 안 들려도 학생은 "마이크가 안 된다"고만 느꼈다. */
    function micHint(msg, ms) {
      let el = document.getElementById('micHint');
      if (!el) {
        el = document.createElement('div');
        el.id = 'micHint';
        el.style.cssText = 'position:fixed;left:50%;transform:translateX(-50%);bottom:96px;z-index:9999;'
          + 'max-width:88vw;padding:10px 16px;border-radius:14px;background:rgba(15,23,42,.92);color:#fff;'
          + 'font-size:14px;line-height:1.45;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.28);display:none';
        document.body.appendChild(el);
      }
      if (el._t) { clearTimeout(el._t); el._t = null; }
      if (!msg) { el.style.display = 'none'; return; }
      el.textContent = msg;
      el.style.display = 'block';
      if (ms !== 0) el._t = setTimeout(() => { el.style.display = 'none'; }, ms || 3200);
    }

    /* 🎤 브라우저 음성인식이 없는 환경(앱 WebView·카카오 인앱 브라우저·구형 iOS)에서는
       녹음해서 서버 Whisper 로 전사한다. 그동안은 "지원하지 않아요"로 끝나 마이크를 못 썼다. */
    let _whisperOn = false;
    async function micViaWhisper() {
      if (!window.MangoiVoice || !MangoiVoice.supported()) {
        micHint(isEn() ? 'This browser cannot use the microphone. Please type instead.'
                       : '이 브라우저는 마이크를 쓸 수 없어요. 아래에 글로 입력해 주세요. 😢', 5000);
        return;
      }
      if (_whisperOn) { MangoiVoice.stop(); return; }     // ⏹ — 지금까지 녹음분으로 전사
      _whisperOn = true; _recognizing = true; updateMicUI();
      try { if (window.MangoiTTS && MangoiTTS.stop) MangoiTTS.stop(); } catch(e){}
      const said = await MangoiVoice.record({
        onState: (s, info) => {
          if (s === 'ready')         micHint(isEn() ? 'Getting the mic ready…' : '마이크를 준비하고 있어요…', 0);
          else if (s === 'waiting')  micHint(isEn() ? '🎤 Speak now! Take your time.' : '🎤 지금 말해보세요! 천천히 해도 괜찮아요.', 0);
          else if (s === 'speaking') micHint(isEn() ? '🎤 Listening…' : '🎤 듣고 있어요…', 0);
          else if (s === 'thinking') micHint(isEn() ? '🎧 Writing down what you said…' : '🎧 말한 내용을 받아적는 중…', 0);
          else if (s === 'error') {
            const r = info && info.reason;
            micHint(r === 'denied'
              ? (isEn() ? 'Mic permission is off. Tap the lock icon in the address bar → allow the microphone.'
                        : '🎤 마이크 권한이 꺼져 있어요. 주소창의 자물쇠(🔒) → 마이크 "허용" 후 다시 눌러주세요.')
              : r === 'no_audio'
              ? (isEn() ? "I couldn't hear anything. Try again a bit louder." : '🎤 소리가 잘 안 들렸어요. 조금 더 크게 다시 말해주세요.')
              : (isEn() ? 'Voice input failed. Please type instead.' : '🎤 음성 입력에 실패했어요. 글로 입력해 주세요.'), 5000);
          }
        }
      });
      _whisperOn = false; _recognizing = false; updateMicUI();
      if (said) {
        micHint(null);
        const input = document.getElementById('msgInput');
        if (input) input.value = said;
        _pendingVoice = true; sendMsg();
      }
    }

    function toggleMic() {
      /* ⏹ — 녹음 모드로 넘어간 상태(network 오류 폴백 등)면 녹음을 멈춰야 한다.
         이 검사가 없으면 아래 _recog.stop() 만 부르고 녹음은 계속돼 버튼이 안 먹었다. */
      if (_whisperOn) { MangoiVoice.stop(); return; }
      if (!_recog) _recog = initRecog();
      if (!_recog) { micViaWhisper(); return; }           // 음성인식 미지원 → 녹음+Whisper 로
      if (_recognizing) { _micStopWanted = true; try { _recog.stop(); } catch(e){} return; }
      /* 🔇 AI 낭독을 반드시 먼저 끈다 — 영어는 클라우드 TTS라 <audio> 로 재생되므로
         speechSynthesis.cancel() 만으로는 안 멈추고, 마이크가 AI 목소리를 받아 적었다. */
      try { if (window.MangoiTTS && MangoiTTS.stop) MangoiTTS.stop(); } catch(e){}
      try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch(e){}
      /* 시작 전에 입력창과 인식 버퍼를 비운다 — 이전 내용이 새 녹음에 섞이지 않게 */
      _micBase = ''; _micSess = ''; _micBySilence = false; _micStopWanted = false;
      _micRestarts = 0; _micT0 = Date.now();
      try {
        const input = document.getElementById('msgInput');
        if (input) input.value = '';
      } catch(e){}
      try {
        _recog.start(); _recognizing = true; updateMicUI();
        micHint(isEn() ? '🎤 Speak now! Take your time.' : '🎤 지금 말해보세요! 천천히 해도 괜찮아요.', 0);
      } catch(e){
        _recognizing = false; updateMicUI();
        micViaWhisper();                                  // 음성인식을 못 켜면 녹음 방식으로
      }
    }
    updateSoundBtn();
    function appendTyping() {

      row.id = 'typingRow'; row.className = 'ai-row';
      row.innerHTML = '<div class="ai-avatar"><img src="/img/mango-char.png" alt="Mango" /></div><div class="msg ai typing"><span></span><span></span><span></span></div>';

    }
    function removeTyping() {
      const t = document.getElementById('typingRow');
      if (t) t.remove();
    }

    /* ══ 🗺 주제 모험 카드 — 누르면 영어 스타터 문장을 대신 보내줌 ══ */
    const TOPICS = [
      { e: '🍕', ko: '음식 이야기', en: 'Food', msg: "Let's talk about food! What's your favorite food, Mango?" },
      { e: '🐾', ko: '동물 친구들', en: 'Animals', msg: 'I want to talk about animals! Do you have a favorite animal?' },
      { e: '🚀', ko: '우주 탐험', en: 'Space', msg: "Let's talk about space! Tell me something cool about space." },
      { e: '🦖', ko: '공룡 시대', en: 'Dinosaurs', msg: 'Dinosaurs are so cool! Which dinosaur do you like?' },
      { e: '🎮', ko: '게임 이야기', en: 'Games', msg: "Let's talk about games! What games do you know?" },
      { e: '🏫', ko: '학교 생활', en: 'School', msg: 'Can I tell you about my school day?' },
      { e: '⚽', ko: '스포츠', en: 'Sports', msg: "Let's talk about sports! Do you like soccer?" },
      { e: '🎬', ko: '영화·만화', en: 'Movies', msg: "Let's talk about movies and cartoons! What's fun to watch?" },

    function renderEmpty() {

      const en = isEn();

        '<div class="topic-card" onclick="topicSend(' + i + ')"><span class="t-emoji">' + t.e + '</span><span class="t-name">' + escapeHtml(en ? t.en : t.ko) + '</span></div>'
      ).join('');

        + '<p>' + (en ? "Let's chat in English! Every message earns points ⭐" : "Let's chat in English! 한 마디 할 때마다 포인트가 쌓여요 ⭐") + '</p>'
        + '<p style="color:var(--text2)">' + (en ? 'Pick an adventure topic:' : '모험 주제를 골라볼까요?') + '</p>'
        + '<div class="topics">' + cards + '</div>'

        + '<button onclick="quickSend(\'Tell me a fun fact!\')">' + (en ? 'Fun fact 🌟' : '재미난 사실 🌟') + '</button>'

    function topicSend(i) {

    async function sendMsg(e) {
      if (e) e.preventDefault();
      const input = document.getElementById('msgInput');
      const msg = (input.value || '').trim();
      if (!msg) return;
      maybeAdjustRate(msg);                 // 🐢 "천천히 말해줘" → 실제로 음성 속도를 낮춤
      const wasVoice = _pendingVoice; _pendingVoice = false;
      const auth = await getAuth();
      if (!auth) { appendMsg('ai', '⚠️ 인증에 실패했어요. 새로고침 후 다시 시도해주세요.'); return; }

      // 빈 상태면 클리어
      const empty = document.querySelector('.empty-state');
      if (empty) document.getElementById('chat').innerHTML = '';

      input.value = '';
      document.getElementById('sendBtn').disabled = true;
      appendMsg('user', msg);
      sndPop();
      appendTyping();
      try {
        const r = await fetch('/api/ai/chat-friend', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + auth.token },
          body: JSON.stringify({ uid: auth.uid, msg, level: currentLevel, persona: currentPersona, via: wasVoice ? 'voice' : 'text' })
        });
        let d;
        try { d = await r.json(); } catch(je){ d = { ok:false, error: 'invalid_json_response', status: r.status }; }
        removeTyping();
        if (d && d.ok && d.reply) {
          appendMsg('ai', d.reply);
          applyGam(d.gam, wasVoice);
          // 🔊 새 답변 자동 재생 (소리 듣기 켜져 있을 때) — 마지막 스피커 버튼에 재생 표시
          if (isSoundOn()) {
            const rows = document.querySelectorAll('.ai-row');
            const lastRow = rows.length ? rows[rows.length - 1] : null;
            const btns = document.querySelectorAll('.replay-btn');
            speakText(lastRow && lastRow._speakBody ? lastRow._speakBody : d.reply, btns.length ? btns[btns.length - 1] : null, lastRow);
          }
        } else {
          console.error('[AI Friend] server error:', d, 'status:', r.status);
          const errMsg = d && d.error ? d.error : ('HTTP ' + r.status);
          const detail = d && d.detail ? '\n' + d.detail : '';
          appendMsg('ai', '⚠️ 잠시 응답이 지연되고 있어요. 다시 시도해주세요.\n(' + errMsg + detail + ')');
        }
      } catch(e){
        console.error('[AI Friend] fetch failed:', e);
        removeTyping();
        appendMsg('ai', '⚠️ 네트워크가 불안정합니다. Wi-Fi 를 확인해주세요. (' + (e && e.message ? e.message : 'unknown') + ')');
      }
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
    function quickSend(text) {
      document.getElementById('msgInput').value = text;
      sendMsg();
    }
    async function loadHistory() {
      const auth = await getAuth();
      if (!auth) { renderEmpty(); updateHUD(); return; }
      try {
        const r = await fetch('/api/ai/chat-history?uid=' + encodeURIComponent(auth.uid), {
          headers: { 'Authorization': 'Bearer ' + auth.token }
        });
        const d = await r.json();
        if (d.gam) {
          gamState.today = d.gam.today || 0;
          gamState.lifetime = d.gam.lifetime || 0;
          gamState.streak = d.gam.streak || 0;
          gamState.word = d.gam.word || null;
          gamState.sessionPts = Math.min(gamState.today, 10) * 2;   // 오늘 수다 기본적립 추정치
        }
        if (d.ok && d.items && d.items.length) {
          d.items.forEach(it => appendMsg(it.role === 'assistant' ? 'ai' : 'user', it.content));
        } else {
          renderEmpty();
        }
      } catch(e){ renderEmpty(); }
      updateHUD();
    }
    async function clearChat() {
      if (!confirm(isEn() ? 'Clear all messages?' : '대화 내용을 모두 지울까요?')) return;
      const auth = await getAuth();
      if (auth) {
        try { await fetch('/api/ai/chat-clear', { method:'POST', headers:{'Content-Type':'application/json', 'Authorization': 'Bearer ' + auth.token}, body: JSON.stringify({ uid: auth.uid }) }); } catch(e){}
      }
      document.getElementById('chat').innerHTML = '';
      renderEmpty();
    }
    // 언어 전환 시 HUD·빈 상태 다시 그림 (mango-i18n.js 가 mangoi:lang-changed 이벤트 발행)
    window.addEventListener('mangoi:lang-changed', () => {
      updateHUD();
      if (document.querySelector('.empty-state')) renderEmpty();
    });
    loadHistory();
  </script>
