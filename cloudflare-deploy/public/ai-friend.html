<!doctype html>
<html lang="ko">
<head>






  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes" />
  <title>💬 AI 영어 친구 Mango — Mangoi</title>
  <link rel="icon" href="/mangoi-favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#0a1530" />
  <script src="/js/mango-i18n.js" defer></script>
  <style>
    :root {
      --bg: #0a1530; --card: #14213b; --text: #e6ecff; --text2: #a3b3d1;
      --gold: #fbbf24; --green: #10b981; --border: rgba(251,191,36,0.18);
      --bubble-me: linear-gradient(135deg, #fbbf24, #f59e0b);
      --bubble-ai: #1e293b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background:radial-gradient(125% 100% at 50% -8%,#2a4d9e 0%,#1a2f6b 42%,#122350 100%); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      line-height: 1.5; height: 100%; overflow: hidden; }
    .top { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: rgba(20, 33, 59, 0.95); position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .top a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 14px; }
    .top .mango-icon { width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      overflow: hidden; }
    .top .mango-icon img { width: 100%; height: 100%; object-fit: cover; }
    .top .info { flex: 1; }
    .top .name { font-size: 14px; font-weight: 800; }
    .top .status { font-size: 11px; color: var(--green); }
    .top .clear-btn { background: rgba(239,68,68,0.15); color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.3); padding: 6px 10px;
      border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
    .opts { display: flex; gap: 6px; padding: 10px 14px; background: rgba(20,33,59,0.6);
      overflow-x: auto; border-bottom: 1px solid var(--border); }
    .opt { padding: 6px 12px; background: var(--card); border: 1px solid var(--border);
      color: var(--text); border-radius: 999px; cursor: pointer; font-size: 11.5px;
      font-weight: 700; white-space: nowrap; }
    .opt.active { background: linear-gradient(135deg, var(--gold), #f59e0b); color: #1a1a1a; border-color: var(--gold); }
    .chat { flex: 1; overflow-y: auto; padding: 18px 14px; height: calc(100vh - 240px);
      display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 78%; padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: var(--bubble-me); color: #1a1a1a;
      border-bottom-right-radius: 6px; font-weight: 600; }
    .msg.ai { align-self: flex-start; background: var(--bubble-ai); color: var(--text);
      border-bottom-left-radius: 6px; border: 1px solid var(--border); }
    .ai-row { display: flex; gap: 8px; align-items: flex-end; }
    .ai-avatar { width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
      overflow: hidden; }
    .ai-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .typing { display: inline-flex; gap: 4px; padding: 14px 18px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
      animation: bounce 1.4s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; } }
    .input-bar { position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(20,33,59,0.98); border-top: 1px solid var(--border);
      padding: 12px 14px; backdrop-filter: blur(12px); }
    .input-bar form { display: flex; gap: 8px; max-width: 820px; margin: 0 auto; }
    .input-bar input { flex: 1; padding: 12px 16px; background: var(--card);
      color: var(--text); border: 1px solid var(--border); border-radius: 999px;
      font-size: 14px; font-family: inherit; }
    .input-bar input:focus { outline: 0; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(251,191,36,0.15); }
    .input-bar button { padding: 10px 18px; background: linear-gradient(135deg, #10b981, #059669);
      color: #fff; border: 0; border-radius: 999px; font-size: 14px; font-weight: 800;
      cursor: pointer; box-shadow: 0 4px 14px -2px rgba(16,185,129,0.4); }
    .input-bar button:disabled { background: #475569; box-shadow: none; }
    .empty-state { text-align: center; color: var(--text2); padding: 40px 20px; }
    .empty-state h2 { color: var(--gold); font-size: 18px; margin: 0 0 10px 0; }
    .empty-state p { font-size: 13px; line-height: 1.6; margin: 6px 0; }
    .quick { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
    .quick button { padding: 8px 14px; background: rgba(251,191,36,0.12);
      color: var(--gold); border: 1px solid rgba(251,191,36,0.3);
      border-radius: 999px; font-size: 12px; cursor: pointer; font-weight: 700; }

    /* 🔊 헤더 소리 ON/OFF 토글 */
    .snd-toggle { background: rgba(251,191,36,0.15); color: var(--gold);
      border: 1px solid rgba(251,191,36,0.35); width: 34px; height: 34px;
      border-radius: 9px; font-size: 15px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; line-height: 1; }
    .snd-toggle.off { background: rgba(148,163,184,0.12); color: #94a3b8; border-color: rgba(148,163,184,0.3); }

    /* 🔊 각 AI 답변 "다시 듣기" 스피커 버튼 */
    .replay-btn { align-self: flex-end; margin-bottom: 2px; width: 30px; height: 30px;
      border-radius: 50%; border: 1px solid rgba(251,191,36,0.35);
      background: rgba(251,191,36,0.12); color: var(--gold); font-size: 14px;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      line-height: 1; transition: transform .15s, background .15s; padding: 0; }
    .replay-btn:hover { background: rgba(251,191,36,0.22); transform: scale(1.08); }
    .replay-btn.playing { background: var(--gold); color: #1a1a1a; animation: sndPulse 1s ease-in-out infinite; }
    @keyframes sndPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.5); } 50% { box-shadow: 0 0 0 6px rgba(251,191,36,0); } }

    /* 🎤 입력창 말하기(음성 입력) 버튼 */
    .mic-btn { padding: 0; width: 46px; flex-shrink: 0; background: rgba(251,191,36,0.14);
      color: var(--gold); border: 1px solid rgba(251,191,36,0.35); border-radius: 999px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .mic-btn:hover { background: rgba(251,191,36,0.24); }
    .mic-btn.recording { background: linear-gradient(135deg,#ef4444,#dc2626); color: #fff;
      border-color: #ef4444; animation: micPulse 1.1s ease-in-out infinite; }
    @keyframes micPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.55); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }
  </style>
</head>
<body>
  <div class="top">
    <a href="/">←</a>
    <div class="mango-icon"><img src="/img/mango-char.png" alt="Mango" /></div>
    <div class="info">
      <div class="name">Mango</div>
      <div class="status">● <span data-ko="온라인 (24시간)" data-en="online (24/7)">온라인 (24시간)</span></div>
    </div>
    <button class="snd-toggle" id="sndToggle" onclick="toggleSound()" aria-label="소리 켜기/끄기" data-ko-aria="소리 켜기/끄기" data-en-aria="Sound on/off" title="소리 듣기 켜기/끄기">🔊</button>
    <button class="clear-btn" onclick="clearChat()">🗑 <span data-ko="대화 초기화" data-en="Clear">대화 초기화</span></button>
  </div>
  <div class="opts">
    <span style="font-size:11px;color:var(--text2);align-self:center;margin-right:4px">레벨:</span>
    <button class="opt" data-level="A1">A1</button>
    <button class="opt" data-level="A2">A2</button>
    <button class="opt active" data-level="B1">B1</button>
    <button class="opt" data-level="B2">B2</button>
    <button class="opt" data-level="C1">C1</button>
    <span style="font-size:11px;color:var(--text2);align-self:center;margin:0 4px 0 8px">스타일:</span>
    <button class="opt active" data-persona="friendly">친근한</button>
    <button class="opt" data-persona="playful">장난스러운</button>
    <button class="opt" data-persona="serious">진지한</button>
    <button class="opt" data-persona="tutor">튜터</button>
    <span style="font-size:11px;color:var(--text2);align-self:center;margin:0 4px 0 8px">🔊 <span data-ko="속도:" data-en="Speed:">속도:</span></span>
    <button class="opt" data-rate="0.6" data-ko="🐢 아주 느리게" data-en="🐢 Very slow">🐢 아주 느리게</button>
    <button class="opt" data-rate="0.8" data-ko="느리게" data-en="Slow">느리게</button>
    <button class="opt active" data-rate="1" data-ko="보통" data-en="Normal">보통</button>
    <button class="opt" data-rate="1.2" data-ko="🐇 빠르게" data-en="🐇 Fast">🐇 빠르게</button>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-bar">
    <form onsubmit="sendMsg(event)">
      <input id="msgInput" type="text" autocomplete="off" placeholder="영어로 메시지를 보내세요…" data-ko-placeholder="영어로 메시지를 보내세요…" data-en-placeholder="Type in English…" maxlength="500" />
      <button type="button" class="mic-btn" id="micBtn" onclick="toggleMic()" aria-label="말하기 (음성 입력)" data-ko-aria="말하기 (음성 입력)" data-en-aria="Speak (voice input)" title="말하기 — 마이크로 영어 말하기">🎤</button>
      <button type="submit" id="sendBtn">전송</button>
    </form>
  </div>

  <script>
    // 전체 사이트 로그인된 사용자(mango_user) + 서명 토큰 자동 사용
    // 서버가 uid 를 그대로 믿지 않으므로(타인 대화 열람/삭제 방지 = IDOR 차단)
    // 항상 { uid, token } 쌍으로 요청한다. 게스트는 서버 발급 랜덤 uid + 세션 스코프 토큰.
    let authCache = null;
    function tokenUid(tok) {
      try { return JSON.parse(atob(String(tok).split('.')[0].replace(/-/g,'+').replace(/_/g,'/'))).uid || null; } catch(e){ return null; }
    }
    async function getAuth() {
      if (authCache) return authCache;
      let u = null;
      try { u = JSON.parse(localStorage.getItem('mango_user') || 'null'); } catch(e){}
      if (u && u.user_id) {
        let tok = null;
        try { tok = localStorage.getItem('mango_token'); } catch(e){}
        if (tok && tokenUid(tok) === u.user_id) {
          authCache = { uid: u.user_id, token: tok };
          return authCache;
        }
        // 토큰이 없거나 다른 계정 것 → 비밀번호 미설정 계정은 조용히 재발급 (로그인과 동일 보안수준)
        try {
          const r = await fetch('/api/student/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ user_id: u.user_id }) });
          const d = await r.json();
          if (d.ok && d.token) {
            try { localStorage.setItem('mango_token', d.token); } catch(e){}
            authCache = { uid: u.user_id, token: d.token };
            return authCache;
          }
        } catch(e){}
        // 비밀번호 계정인데 토큰 없음(예: 이전 버전에서 로그인) → 재로그인 전까지 게스트로 폴백
      }
      // 게스트 — 세션 스코프(sessionStorage) 랜덤 uid + 서버 발급 토큰
      try {
        const g = JSON.parse(sessionStorage.getItem('mango_guest_chat') || 'null');
        if (g && g.uid && g.token) { authCache = g; return authCache; }
      } catch(e){}
      try {
        const r = await fetch('/api/ai/chat-guest-token', { method:'POST' });
        const d = await r.json();
        if (d.ok && d.uid && d.token) {
          try { sessionStorage.setItem('mango_guest_chat', JSON.stringify({ uid: d.uid, token: d.token })); } catch(e){}
          authCache = { uid: d.uid, token: d.token };
          return authCache;
        }
      } catch(e){}
      return null;
    }
    let currentLevel = 'B1';
    let currentPersona = 'friendly';
    // 🔊 원어민 음성 재생 속도 (localStorage 로 유지, 기본 1 = 보통)
    let currentRate = (function(){
      try { const r = parseFloat(localStorage.getItem('mangoi_aifriend_tts_rate')); return (r >= 0.5 && r <= 1.5) ? r : 1; } catch(e){ return 1; }
    })();

    document.querySelectorAll('.opt[data-level]').forEach(b => {
      b.onclick = () => { document.querySelectorAll('.opt[data-level]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); currentLevel = b.dataset.level; };
    });
    document.querySelectorAll('.opt[data-persona]').forEach(b => {
      b.onclick = () => { document.querySelectorAll('.opt[data-persona]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); currentPersona = b.dataset.persona; };
    });
    document.querySelectorAll('.opt[data-rate]').forEach(b => {
      if (parseFloat(b.dataset.rate) === currentRate) { document.querySelectorAll('.opt[data-rate]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }
      b.onclick = () => {
        document.querySelectorAll('.opt[data-rate]').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        currentRate = parseFloat(b.dataset.rate) || 1;
        try { localStorage.setItem('mangoi_aifriend_tts_rate', String(currentRate)); } catch(e){}
      };
    });
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function appendMsg(role, content) {
      const chat = document.getElementById('chat');
      if (role === 'user') {
        const m = document.createElement('div');
        m.className = 'msg user';
        m.textContent = content;
        chat.appendChild(m);
      } else {
        const row = document.createElement('div');
        row.className = 'ai-row';
        row.innerHTML = `<div class="ai-avatar"><img src="/img/mango-char.png" alt="Mango" /></div><div class="msg ai">${escapeHtml(content).replace(/\n/g, '<br>')}</div><button class="replay-btn" aria-label="다시 듣기" data-ko-aria="다시 듣기" data-en-aria="Play again" title="다시 듣기">🔊</button>`;
        const rb = row.querySelector('.replay-btn');
        if (rb) rb.addEventListener('click', () => speakText(content, rb));
        chat.appendChild(row);
      }
      chat.scrollTop = chat.scrollHeight;
    }

    /* ══ 🔊 소리 듣기 (원어민 TTS: 서버 Deepgram Aura-1 → MeloTTS → 브라우저 폴백) ══ */
    function isSoundOn() { try { return localStorage.getItem('mangoi_aifriend_sound') !== '0'; } catch(e){ return true; } }
    function updateSoundBtn() {
      const b = document.getElementById('sndToggle'); if (!b) return;
      const on = isSoundOn();
      b.textContent = on ? '🔊' : '🔇';
      b.classList.toggle('off', !on);
    }
    function toggleSound() {
      const on = isSoundOn();
      try { localStorage.setItem('mangoi_aifriend_sound', on ? '0' : '1'); } catch(e){}
      if (on) { // 껐음 — 재생 중인 음성 중단
        try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch(e){}
        document.querySelectorAll('audio').forEach(a => { try { a.pause(); } catch(e){} });
        document.querySelectorAll('.replay-btn.playing').forEach(x => x.classList.remove('playing'));
      }
      updateSoundBtn();
    }
    let _ttsLangSet = false;
    function speakText(text, btn) {
      if (!window.MangoiTTS) return;
      if (!_ttsLangSet) { try { MangoiTTS.setLang('en'); } catch(e){} _ttsLangSet = true; }
      const clean = String(text || '').replace(/^[⚠️❗️\s]+/, '').trim();
      if (!clean || /^⚠️/.test(text)) return;   // 시스템/오류 메시지는 읽지 않음
      document.querySelectorAll('.replay-btn.playing').forEach(x => x.classList.remove('playing'));
      if (btn) btn.classList.add('playing');
      try {
        MangoiTTS.speak(clean, currentRate, function(){ if (btn) btn.classList.remove('playing'); });
      } catch(e){ if (btn) btn.classList.remove('playing'); }
    }

    /* ══ 🎤 말하기 (브라우저 음성인식 → 영어 받아쓰기 → 자동 전송) ══ */
    let _recog = null, _recognizing = false;
    function updateMicUI() {
      const b = document.getElementById('micBtn'); if (!b) return;
      b.classList.toggle('recording', _recognizing);
      b.textContent = _recognizing ? '⏹' : '🎤';
    }
    function initRecog() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;
      const r = new SR();
      r.lang = 'en-US'; r.interimResults = false; r.maxAlternatives = 1; r.continuous = false;
      r.onresult = (ev) => {
        try {
          const t = ev.results[0][0].transcript;
          const input = document.getElementById('msgInput');
          if (input && t) input.value = t;
        } catch(e){}
      };
      r.onend = () => {
        _recognizing = false; updateMicUI();
        const input = document.getElementById('msgInput');
        if (input && (input.value || '').trim()) sendMsg();   // 인식 끝나면 자동 전송
      };
      r.onerror = () => { _recognizing = false; updateMicUI(); };
      return r;
    }
    function toggleMic() {
      if (!_recog) _recog = initRecog();
      if (!_recog) {
        const en = (window.getLang && window.getLang() === 'en');
        alert(en ? 'Voice input is not supported on this browser. Please use Chrome.' : '이 브라우저는 음성 입력을 지원하지 않아요. Chrome(크롬)에서 사용해주세요.');
        return;
      }
      if (_recognizing) { try { _recog.stop(); } catch(e){} return; }
      try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch(e){}   // 내 음성이 TTS를 녹음하지 않게
      try { _recog.start(); _recognizing = true; updateMicUI(); } catch(e){ _recognizing = false; updateMicUI(); }
    }
    updateSoundBtn();
    function appendTyping() {
      const chat = document.getElementById('chat');
      const row = document.createElement('div');
      row.id = 'typingRow'; row.className = 'ai-row';
      row.innerHTML = '<div class="ai-avatar"><img src="/img/mango-char.png" alt="Mango" /></div><div class="msg ai typing"><span></span><span></span><span></span></div>';
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }
    function removeTyping() {
      const t = document.getElementById('typingRow');
      if (t) t.remove();
    }
    function renderEmpty() {
      const chat = document.getElementById('chat');
      chat.innerHTML = `<div class="empty-state">
        <h2>👋 Hi! I'm Mango</h2>
        <p>Let's chat in English! 영어 실력은 매일 조금씩 쌓여요.</p>
        <p style="color:var(--text2)">아래에서 시작해보세요:</p>
        <div class="quick">
          <button onclick="quickSend('Hi Mango! How are you today?')">Hi Mango! 👋</button>
          <button onclick="quickSend('Tell me a fun fact about Korea.')">Fun fact 🇰🇷</button>
          <button onclick="quickSend('What did you do yesterday?')">Yesterday 📅</button>
          <button onclick="quickSend('Can you teach me a new word?')">New word 📚</button>
        </div>
      </div>`;
    }
    async function sendMsg(e) {
      if (e) e.preventDefault();
      const input = document.getElementById('msgInput');
      const msg = (input.value || '').trim();
      if (!msg) return;
      const auth = await getAuth();
      if (!auth) { appendMsg('ai', '⚠️ 인증에 실패했어요. 새로고침 후 다시 시도해주세요.'); return; }

      // 빈 상태면 클리어
      const empty = document.querySelector('.empty-state');
      if (empty) document.getElementById('chat').innerHTML = '';

      input.value = '';
      document.getElementById('sendBtn').disabled = true;
      appendMsg('user', msg);
      appendTyping();
      try {
        const r = await fetch('/api/ai/chat-friend', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + auth.token },
          body: JSON.stringify({ uid: auth.uid, msg, level: currentLevel, persona: currentPersona })
        });
        let d;
        try { d = await r.json(); } catch(je){ d = { ok:false, error: 'invalid_json_response', status: r.status }; }
        removeTyping();
        if (d && d.ok && d.reply) {
          appendMsg('ai', d.reply);
          // 🔊 새 답변 자동 재생 (소리 듣기 켜져 있을 때) — 마지막 스피커 버튼에 재생 표시
          if (isSoundOn()) {
            const btns = document.querySelectorAll('.replay-btn');
            speakText(d.reply, btns.length ? btns[btns.length - 1] : null);
          }
        } else {
          console.error('[AI Friend] server error:', d, 'status:', r.status);
          const errMsg = d && d.error ? d.error : ('HTTP ' + r.status);
          const detail = d && d.detail ? '\n' + d.detail : '';
          appendMsg('ai', '⚠️ 잠시 응답이 지연되고 있어요. 다시 시도해주세요.\n(' + errMsg + detail + ')');
        }
      } catch(e){
        console.error('[AI Friend] fetch failed:', e);
        removeTyping();
        appendMsg('ai', '⚠️ 네트워크가 불안정합니다. Wi-Fi 를 확인해주세요. (' + (e && e.message ? e.message : 'unknown') + ')');
      }
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
    function quickSend(text) {
      document.getElementById('msgInput').value = text;
      sendMsg();
    }
    async function loadHistory() {
      const auth = await getAuth();
      if (!auth) { renderEmpty(); return; }
      try {
        const r = await fetch('/api/ai/chat-history?uid=' + encodeURIComponent(auth.uid), {
          headers: { 'Authorization': 'Bearer ' + auth.token }
        });
        const d = await r.json();
        if (d.ok && d.items && d.items.length) {
          d.items.forEach(it => appendMsg(it.role === 'assistant' ? 'ai' : 'user', it.content));
        } else {
          renderEmpty();
        }
      } catch(e){ renderEmpty(); }
    }
    async function clearChat() {
      if (!confirm('대화 내용을 모두 지울까요?')) return;
      const auth = await getAuth();
      if (auth) {
        try { await fetch('/api/ai/chat-clear', { method:'POST', headers:{'Content-Type':'application/json', 'Authorization': 'Bearer ' + auth.token}, body: JSON.stringify({ uid: auth.uid }) }); } catch(e){}
      }
      document.getElementById('chat').innerHTML = '';
      renderEmpty();
    }
    loadHistory();
