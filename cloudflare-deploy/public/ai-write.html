<!doctype html>
<html lang="ko">
<head>






  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes" />
  <title>✍️ AI 영작 첨삭 — Mangoi</title>
  <link rel="icon" href="/mangoi-favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#0a1530" />
  <script src="/js/mango-i18n.js" defer></script>
  <style>
    :root {
      --bg: #0a1530; --card: #14213b; --text: #e6ecff; --text2: #a3b3d1;
      --gold: #fbbf24; --green: #10b981; --red: #ef4444; --blue: #3b82f6;
      --border: rgba(251,191,36,0.18);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      line-height: 1.55; }
    .top { display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      background: rgba(20, 33, 59, 0.95); position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .top a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 14px; }
    .top h1 { margin: 0; font-size: 16px; font-weight: 800; flex: 1; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 18px; }
    .intro { background: rgba(245,158,11,0.10); border: 1px dashed rgba(245,158,11,0.4);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 14px;
      font-size: 13px; color: #fde68a; line-height: 1.55; }
    .level-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .level-btn { padding: 8px 14px; background: var(--card); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; cursor: pointer; font-weight: 700;
      font-size: 12.5px; }
    .level-btn.active { background: linear-gradient(135deg, var(--gold), #f59e0b); color: #1a1a1a; border-color: var(--gold); }
    textarea { width: 100%; padding: 14px; background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 12px; font-size: 14px;
      font-family: inherit; min-height: 140px; line-height: 1.55; resize: vertical; }
    textarea:focus { outline: 0; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(251,191,36,0.15); }
    .submit-btn { display: block; width: 100%; padding: 16px; margin: 14px 0;
      background: linear-gradient(135deg, #10b981, #059669); color: #fff;
      border: 0; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer;
      box-shadow: 0 4px 14px -2px rgba(16,185,129,0.4); }
    .submit-btn:disabled { background: #475569; cursor: not-allowed; box-shadow: none; }
    .result { background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .result-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .score-circle { width: 64px; height: 64px; border-radius: 50%;
      background: conic-gradient(var(--green) var(--p), #1e293b 0);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #fff;
      position: relative; }
    .score-circle::before { content: ''; position: absolute; inset: 6px;
      background: var(--card); border-radius: 50%; }
    .score-circle > span { position: relative; z-index: 1; }
    .corrected { background: rgba(16,185,129,0.10); border-left: 4px solid var(--green);
      padding: 12px 14px; border-radius: 8px; margin-bottom: 12px;
      font-size: 14px; line-height: 1.65; color: #d1fae5; }
    .issues { margin-bottom: 12px; }
    .issue { background: rgba(239,68,68,0.08); border-left: 4px solid var(--red);
      padding: 10px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
    .issue-orig { color: #fca5a5; text-decoration: line-through; }
    .issue-sug { color: #86efac; font-weight: 700; }
    .issue-reason { color: var(--text2); font-size: 12.5px; margin-top: 4px; }
    .tip { background: rgba(59,130,246,0.10); border-left: 4px solid var(--blue);
      padding: 12px 14px; border-radius: 8px; font-size: 13px; color: #dbeafe; }
    .history { margin-top: 24px; }
    .history h3 { font-size: 14px; color: var(--gold); margin: 0 0 10px 0; }
    .hist-item { background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 6px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; cursor: pointer; }
    .hist-item:hover { background: rgba(251,191,36,0.08); }
    .hist-score { font-weight: 800; color: var(--gold); }
  </style>
</head>
<body>
  <div class="top">
    <a href="/">← <span data-ko="홈" data-en="Home">홈</span></a>
    <h1 data-ko="✍️ AI 영작 첨삭" data-en="✍️ AI Writing Coach">✍️ AI 영작 첨삭</h1>
  </div>
  <div class="wrap">
    <div class="intro">
      💡 영어로 자유롭게 써보세요. AI가 문법·표현을 교정하고 점수와 이유를 알려드려요.
      (예: "Yesterday I go to school..." → "Yesterday I went to school...")
    </div>

    <div class="level-row" id="levelRow">
      <button class="level-btn" data-level="A1">A1 입문</button>
      <button class="level-btn" data-level="A2">A2 초급</button>
      <button class="level-btn active" data-level="B1">B1 중급</button>
      <button class="level-btn" data-level="B2">B2 중상급</button>
      <button class="level-btn" data-level="C1">C1 고급</button>
    </div>

    <textarea id="text" placeholder="여기에 영어로 입력하세요 (3 ~ 2000자)..."></textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="submit-btn" id="submitBtn" onclick="submitText()" style="flex:1">
        ✨ <span data-ko="AI 첨삭 받기" data-en="Get AI Correction">AI 첨삭 받기</span>
      </button>
      <button id="resetBtn" onclick="resetForm()" title="새로 작성" style="padding:14px 18px;background:rgba(255,255,255,0.08);color:var(--text);border:1px solid rgba(255,255,255,0.18);border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit">🔄 <span data-ko="새로" data-en="Reset">새로</span></button>
    </div>

    <div id="resultBox" style="display:none"></div>

    <!-- 📜 복습 영역 -->
    <div class="history">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <h3 style="margin:0;flex:1">📜 <span data-ko="나의 영작 일기 (날짜별 복습)" data-en="My Writing Diary (Daily Review)">나의 영작 일기 (날짜별 복습)</span></h3>
        <button onclick="toggleViewMode()" id="viewModeBtn" style="padding:6px 12px;background:rgba(251,191,36,0.18);color:var(--gold);border:1px solid rgba(251,191,36,0.40);border-radius:8px;cursor:pointer;font-size:11.5px;font-weight:700;font-family:inherit">📅 <span data-ko="날짜별" data-en="By Date">날짜별</span></button>
      </div>
      <div id="histList"><div style="color:var(--text2);font-size:13px;padding:12px;text-align:center">아직 첨삭 기록이 없어요. 위에서 첫 영작을 시작해보세요!</div></div>
    </div>
  </div>

  <!-- 복습 모달 (저장된 첨삭 클릭 시) -->
  <div id="reviewModal" style="display:none;position:fixed;inset:0;background:rgba(5,7,18,0.85);backdrop-filter:blur(8px);z-index:99000;padding:30px 14px;overflow-y:auto" onclick="if(event.target===this)closeReview()">
    <div style="max-width:700px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:10px;padding:14px 18px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a">
        <span style="font-size:20px">📖</span>
        <div style="flex:1">
          <div style="font-weight:800;font-size:15px">복습 모드 — AI 첨삭 다시보기</div>
          <div id="reviewDate" style="font-size:11.5px;opacity:0.8;margin-top:2px">—</div>
        </div>
        <button onclick="closeReview()" style="background:rgba(0,0,0,0.18);border:0;color:#1a1a1a;width:32px;height:32px;border-radius:50%;font-weight:800;cursor:pointer;font-size:16px">✕</button>
      </div>
      <div id="reviewBody" style="padding:18px;max-height:70vh;overflow-y:auto"></div>
    </div>
  </div>

  <script>
    // 전체 사이트 로그인된 사용자(mango_user) 자동 사용
    function getUid() {
      try {
        const u = JSON.parse(localStorage.getItem('mango_user') || 'null');
        if (u && u.user_id) return u.user_id;
      } catch(e){}
      return 'guest_' + (Math.random().toString(36).slice(2, 8));
    }
    let currentLevel = 'B1';
    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLevel = btn.dataset.level;
      };
    });
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function scoreColor(s) {
      if (s >= 85) return '#10b981';
      if (s >= 70) return '#f59e0b';
      return '#ef4444';
    }
    function showErrorBox(title, detail) {
      document.getElementById('resultBox').style.display = '';
      document.getElementById('resultBox').innerHTML = `
        <div class="result" style="border-left:4px solid var(--red)">
          <div style="font-size:15px;font-weight:800;color:var(--red);margin-bottom:8px">⚠️ ${escapeHtml(title)}</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap">${escapeHtml(detail || '')}</div>
          <div style="margin-top:14px;padding:12px;background:rgba(251,191,36,0.10);border:1px solid rgba(251,191,36,0.3);border-radius:8px;font-size:12.5px;color:#fde68a">
            💡 잠시 후 다시 시도해주세요. 문제가 계속되면 페이지를 새로고침(Ctrl+Shift+R)하거나 망고아이 관리자에게 문의하세요.
          </div>
        </div>`;
    }
    async function submitText() {
      const textEl = document.getElementById('text');
      const text = (textEl.value || '').trim();
      if (text.length < 3) { alert('3글자 이상 입력하세요.'); return; }
      if (text.length > 2000) { alert('2000자 이내로 입력하세요.'); return; }
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.innerHTML = '⏳ AI 분석 중… (5~15초)';
      const resultBox = document.getElementById('resultBox');
      resultBox.style.display = 'none';
      let r, d;
      try {
        r = await fetch('/api/ai/write-correct', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, level: currentLevel, uid: getUid() })
        });
        try {
          d = await r.json();
        } catch(je) {
          console.error('[AI Write] JSON parse failed:', je, 'status:', r.status);
          showErrorBox('서버 응답을 해석할 수 없습니다', 'HTTP ' + r.status + ' — 응답이 JSON 이 아닙니다.\n관리자에게 배포 상태를 확인해주세요.');
          btn.disabled = false; btn.innerHTML = '✨ AI 첨삭 받기';
          return;
        }
        if (d && d.ok) {
          renderResult(d);
          await loadHistory();
        } else {
          console.error('[AI Write] server error:', d, 'status:', r.status);
          const err = (d && d.error) || ('HTTP ' + r.status);
          const detail = (d && d.detail) || '';
          showErrorBox('AI 첨삭 처리 중 오류', '에러 코드: ' + err + (detail ? '\n상세: ' + detail : ''));
        }
      } catch(e){
        console.error('[AI Write] fetch failed:', e);
        showErrorBox('네트워크 오류', e && e.message ? e.message : '인터넷 연결을 확인해주세요.');
      } finally {
        btn.disabled = false; btn.innerHTML = '✨ AI 첨삭 받기';
      }
    }
    function renderResult(d) {
      const sc = d.score || 0;
      const color = scoreColor(sc);
      const issuesHtml = (d.issues || []).map(i =>
        `<div class="issue">
          <span class="issue-orig">${escapeHtml(i.original)}</span> → <span class="issue-sug">${escapeHtml(i.suggested)}</span>
          <div class="issue-reason">💡 ${escapeHtml(i.reason)}</div>
        </div>`).join('');
      document.getElementById('resultBox').style.display = '';
      document.getElementById('resultBox').innerHTML = `
        <div class="result">
          <div class="result-head">
            <div class="score-circle" style="--p:${sc*3.6}deg;background:conic-gradient(${color} ${sc*3.6}deg, #1e293b 0)">
              <span style="color:${color}">${sc}</span>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text2)">점수 (CEFR ${escapeHtml(d.level||'')})</div>
              <div style="font-size:14px;font-weight:800;color:${color}">${sc>=85?'훌륭해요! 🎉':sc>=70?'좋아요 💪':'더 연습해보세요 🌱'}</div>
            </div>
          </div>
          <div style="font-size:11.5px;color:var(--text2);font-weight:700;margin-bottom:6px">✅ 수정된 문장</div>
          <div class="corrected">${escapeHtml(d.corrected)}</div>
          ${issuesHtml ? '<div style="font-size:11.5px;color:var(--text2);font-weight:700;margin-bottom:6px">⚠️ 발견된 점</div><div class="issues">' + issuesHtml + '</div>' : ''}
          <div class="tip">💬 ${escapeHtml(d.tip || '')}</div>
          <div style="display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(148,163,184,0.18)">
            <button onclick="resetForm()" style="flex:1;padding:12px;background:linear-gradient(135deg,var(--gold),#f59e0b);color:#1a1a1a;border:0;border-radius:10px;font-weight:800;cursor:pointer;font-size:14px;font-family:inherit">🔄 <span data-ko="새 글 작성하기" data-en="Write New">새 글 작성하기</span></button>
            <button onclick="document.getElementById('histList').scrollIntoView({behavior:'smooth'})" style="padding:12px 18px;background:rgba(255,255,255,0.08);color:var(--text);border:1px solid rgba(255,255,255,0.18);border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit">📜 <span data-ko="기록 보기" data-en="History">기록 보기</span></button>
          </div>
        </div>`;
      // 결과 표시 후 history 자동 갱신 (방금 저장된 항목 포함)
      setTimeout(() => loadHistory(), 500);
    }
    let _allHistory = [];
    let _viewMode = 'date'; // 'date' or 'list'

    async function loadHistory() {
      const uid = getUid();
      if (!uid) return;
      try {
        const r = await fetch('/api/ai/write-history?uid=' + encodeURIComponent(uid));
        const d = await r.json();
        if (d.ok && d.items.length) {
          _allHistory = d.items;
          renderHistory();
        }
      } catch(e){}
    }

    function renderHistory() {
      const wrap = document.getElementById('histList');
      if (!_allHistory.length) {
        wrap.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:12px;text-align:center">아직 첨삭 기록이 없어요. 위에서 첫 영작을 시작해보세요!</div>';
        return;
      }
      if (_viewMode === 'date') {
        renderByDate();
      } else {
        renderAsList();
      }
    }

    function renderByDate() {
      // 날짜별 그룹핑
      const groups = {};
      _allHistory.forEach(it => {
        const d = new Date(it.created_at);
        const key = d.toISOString().slice(0, 10); // YYYY-MM-DD
        if (!groups[key]) groups[key] = [];
        groups[key].push(it);
      });
      const today = new Date().toISOString().slice(0, 10);
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      const html = Object.keys(groups).sort().reverse().map(date => {
        const items = groups[date];
        const avgScore = Math.round(items.reduce((s, x) => s + (x.score || 0), 0) / items.length);
        const sc = avgScore;
        const color = sc >= 85 ? '#10b981' : sc >= 70 ? '#fbbf24' : '#fca5a5';
        const dispDate = date === today ? '📅 오늘'
                       : date === yesterday ? '📅 어제'
                       : '📅 ' + date;
        return `
          <div style="margin-bottom:14px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden">
            <div style="padding:10px 14px;background:rgba(251,191,36,0.10);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(251,191,36,0.18)">
              <div style="font-weight:800;color:var(--gold);font-size:13px">${dispDate}</div>
              <div style="display:flex;gap:8px;align-items:center;font-size:11.5px">
                <span style="color:var(--text2)">${items.length}개</span>
                <span style="background:${color};color:#1a1a1a;padding:2px 9px;border-radius:99px;font-weight:800">평균 ${avgScore}점</span>
              </div>
            </div>
            <div style="padding:6px">
              ${items.map(it => {
                const tm = new Date(it.created_at).toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
                const sc = it.score || 0;
                const cc = sc >= 85 ? '#10b981' : sc >= 70 ? '#fbbf24' : '#fca5a5';
                const preview = (it.original_text || '').slice(0, 70);
                return `<div class="hist-item" onclick="openReview(${it.id})" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:9px 12px;margin:3px;border-radius:8px;background:rgba(15,23,42,0.4);transition:all .15s" onmouseover="this.style.background='rgba(251,191,36,0.10)'" onmouseout="this.style.background='rgba(15,23,42,0.4)'">
                  <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px;color:var(--text)">${escapeHtml(preview)}…</span>
                  <span style="display:flex;align-items:center;gap:8px;font-size:11px;flex-shrink:0;margin-left:10px">
                    <span style="background:${cc};color:#1a1a1a;padding:2px 9px;border-radius:99px;font-weight:800">${sc}</span>
                    <span style="color:var(--text2)">${tm}</span>
                    <span style="color:var(--text2);font-size:13px">▶</span>
                  </span>
                </div>`;
              }).join('')}
            </div>
          </div>`;
      }).join('');
      document.getElementById('histList').innerHTML = html;
    }

    function renderAsList() {
      const html = _allHistory.slice(0, 30).map(it => {
        const dt = new Date(it.created_at).toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
        const preview = (it.original_text || '').slice(0, 60);
        const sc = it.score || 0;
        const cc = sc >= 85 ? '#10b981' : sc >= 70 ? '#fbbf24' : '#fca5a5';
        return `<div class="hist-item" onclick="openReview(${it.id})" style="cursor:pointer">
          <span>${escapeHtml(preview)}…</span>
          <span><span class="hist-score" style="background:${cc};color:#1a1a1a;padding:2px 9px;border-radius:99px">${sc}</span> · ${dt}</span>
        </div>`;
      }).join('');
      document.getElementById('histList').innerHTML = html;
    }

    window.toggleViewMode = function(){
      _viewMode = _viewMode === 'date' ? 'list' : 'date';
      const btn = document.getElementById('viewModeBtn');
      btn.innerHTML = _viewMode === 'date'
        ? '📅 <span data-ko="날짜별" data-en="By Date">날짜별</span>'
        : '📋 <span data-ko="리스트" data-en="List">리스트</span>';
      renderHistory();
    };

    // 🔄 리셋 — 새로 작성
    window.resetForm = function(){
      document.getElementById('text').value = '';
      document.getElementById('resultBox').style.display = 'none';
      document.getElementById('resultBox').innerHTML = '';
      document.getElementById('text').focus();
      // 스크롤 위로
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // 📖 복습 모달 — 저장된 첨삭 상세 보기 + 자기 채점 모드
    window.openReview = function(id) {
      const item = _allHistory.find(x => x.id === id);
      if (!item) return;
      let feedback = {};
      try { feedback = JSON.parse(item.feedback || '{}'); } catch(e){}
      const issues = feedback.issues || [];
      const tip = feedback.tip || '';
      const sc = item.score || 0;
      const cc = sc >= 85 ? '#10b981' : sc >= 70 ? '#fbbf24' : '#fca5a5';
      const dt = new Date(item.created_at).toLocaleString('ko-KR');

      const issuesHtml = issues.map(i =>
        `<div style="padding:10px 12px;background:rgba(239,68,68,0.10);border-left:3px solid var(--red);border-radius:6px;margin-bottom:6px">
          <div style="font-size:12.5px"><span style="text-decoration:line-through;color:#fca5a5">${escapeHtml(i.original||'')}</span> → <b style="color:#86efac">${escapeHtml(i.suggested||'')}</b></div>

          <div style="font-size:11.5px;color:var(--text2);font-weight:700;margin-bottom:6px">✏️ 내가 쓴 영작 (원본)</div>
          <div id="reviewOriginal" style="padding:12px 14px;background:rgba(15,23,42,0.6);border-radius:8px;font-size:14px;color:#fde68a;line-height:1.65;font-family:inherit">${escapeHtml(item.original_text||'')}</div>

      document.body.style.overflow = '';
    };

    window.practiceAgain = function(encodedOrig) {
      const orig = decodeURIComponent(encodedOrig);
      closeReview();
      resetForm();
      // 원본을 placeholder 처럼 보여주거나 비교용으로 표시
      const t = document.getElementById('text');
      t.placeholder = '이전 글: "' + orig.slice(0, 60) + '..." — 더 잘 써보세요!';
      t.focus();
    };

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReview(); });
