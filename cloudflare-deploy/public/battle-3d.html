<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>망고아이 · 3D 영어 배틀 — 레슨 보스전</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:#070b16;font-family:'Noto Sans KR','Segoe UI',sans-serif;color:#eaf2ff;overflow:hidden}
  #mango-battle-3d{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;background:#070b16}
  #battleCanvas{display:block;width:100%;height:100%}
  .flash{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;background:radial-gradient(120% 90% at 50% 55%,rgba(255,255,255,.55),transparent 60%)}

  .hud{position:absolute;top:12px;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:flex-start;padding:0 16px;pointer-events:none}
  .nameplate{background:rgba(8,14,30,.6);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:7px 12px;backdrop-filter:blur(4px);text-shadow:0 1px 2px #000;min-width:152px}
  .nameplate .nm{font-size:13px;font-weight:800}
  .nameplate.p .nm{color:#7fb0ff} .nameplate.e .nm{color:#ff8a8a}
  .nameplate .hp{margin-top:5px;height:9px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden}
  .nameplate .hp i{display:block;height:100%;border-radius:999px;transition:width .35s ease}
  .nameplate.p .hp i{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
  .nameplate.e .hp i{background:linear-gradient(90deg,#ef4444,#f87171)}
  .topmid{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:5;text-align:center;pointer-events:none}
  .topmid .lesson{font-size:12px;font-weight:800;color:#fbbf24;text-shadow:0 1px 3px #000}
  .topmid .score{font-size:11px;color:#9fb3d6;font-weight:700;margin-top:2px}
  .iconbtn{position:absolute;top:12px;right:16px;z-index:8;background:rgba(8,14,30,.7);border:1px solid rgba(255,255,255,.16);color:#eaf2ff;border-radius:10px;width:38px;height:38px;font-size:16px;cursor:pointer}
  .iconbtn:active{transform:scale(.94)}

  #toast{position:absolute;top:70px;left:50%;transform:translateX(-50%) scale(.8);z-index:6;font-weight:900;font-size:22px;letter-spacing:.5px;opacity:0;pointer-events:none;text-shadow:0 2px 10px rgba(0,0,0,.6);transition:transform .25s ease,opacity .25s ease;white-space:nowrap}

  #quiz{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;width:min(94%,560px);background:rgba(8,12,24,.82);border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:14px 14px 12px;backdrop-filter:blur(7px);box-shadow:0 16px 40px rgba(0,0,0,.5);display:none}
  #quiz .qrow{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:4px}
  #quiz .qtype{font-size:10.5px;font-weight:800;color:#0b1020;background:#fbbf24;border-radius:999px;padding:2px 9px}
  #quiz .q{font-size:19px;font-weight:900;text-align:center;line-height:1.35;margin:2px 0 4px}
  #quiz .q .bl{color:#fbbf24}
  #quiz .qhint{text-align:center;font-size:12px;color:#9fb3d6;margin-bottom:10px}
  #quiz .choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  #quiz .ch{font-family:inherit;font-size:16px;font-weight:800;color:#eaf2ff;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);border-radius:12px;padding:12px 10px;cursor:pointer;transition:.12s}
  #quiz .ch:hover{background:rgba(255,255,255,.14)}
  #quiz .ch:active{transform:scale(.97)}
  #quiz .ch.right{background:#22c55e;border-color:#22c55e;color:#04220f}
  #quiz .ch.wrong{background:#ef4444;border-color:#ef4444;color:#fff;animation:qshake .35s}
  @keyframes qshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  #quiz .listen{display:block;margin:9px auto 0;background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.5);color:#bdf3cf;font-size:12px;font-weight:800;padding:6px 14px;border-radius:999px;cursor:pointer;font-family:inherit}

  .overlay{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(3,5,12,.84);backdrop-filter:blur(6px);padding:16px;text-align:center}
  .overlay.on{display:flex}
  .card{width:min(94%,440px);background:linear-gradient(180deg,#141f3a,#0b1228);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:22px 20px;box-shadow:0 26px 64px rgba(0,0,0,.7)}
  .card h1{font-size:24px;font-weight:900;margin-bottom:4px}.card h1 .em{color:#fbbf24}
  .card .tag{font-size:11px;color:#a855f7;font-weight:800;letter-spacing:1.5px;margin-bottom:10px}
  .card p{font-size:13px;color:#c7d3ea;line-height:1.6;margin-bottom:14px}
  .lessonpick{display:flex;flex-direction:column;gap:8px;margin:12px 0 16px}
  .lessonpick button{font-family:inherit;font-weight:800;font-size:15px;color:#eaf2ff;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.16);border-radius:12px;padding:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .lessonpick button:hover{border-color:#fbbf24;background:rgba(251,191,36,.1)}
  .lessonpick .b{font-size:11px;color:#ff8a8a;font-weight:800}
  .btn{background:#fbbf24;color:#2a0606;border:none;border-radius:12px;padding:12px 26px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 8px 20px rgba(251,191,36,.35)}
  .btn:active{transform:scale(.96)}
  .btn.red{background:#ef4444;color:#fff}
  .stars{font-size:34px;letter-spacing:4px;margin:8px 0}
  .voicebadge{position:absolute;left:8px;bottom:8px;z-index:7;font-size:10px;color:#9fb3d6;background:rgba(8,14,30,.6);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:3px 7px;pointer-events:none;max-width:52%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #loadErr{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;text-align:center;padding:24px;color:#fca5a5}
</style>
</head>
<body>
  <div id="mango-battle-3d">
    <canvas id="battleCanvas"></canvas>
    <div class="flash" id="flash"></div>

    <div class="hud">
      <div class="nameplate p"><div class="nm" id="pName">🛡️ 기사 (우리 학생)</div><div class="hp"><i id="pHp" style="width:100%"></i></div></div>
      <div class="nameplate e"><div class="nm" id="eName">👹 보스</div><div class="hp"><i id="eHp" style="width:100%"></i></div></div>
    </div>
    <div class="topmid"><div class="lesson" id="lessonTxt">레슨</div><div class="score" id="scoreTxt">점수 0 · 콤보 0</div></div>
    <button class="iconbtn" id="muteBtn" title="음소거">🔊</button>
    <div id="toast"></div>
    <div class="voicebadge" id="voiceBadge">🔊 음성 준비 중…</div>

    <div id="quiz">
      <div class="qrow"><span class="qtype" id="qType">단어</span></div>
      <div class="q" id="qText"></div>
      <div class="qhint" id="qHint"></div>
      <div class="choices" id="choices"></div>
      <button class="listen" id="qListen">🔊 정답 발음 듣기</button>
    </div>

    <div class="overlay on" id="startOverlay">
      <div class="card">
        <div class="tag">⚔️ 3D 영어 배틀 · 레슨 보스전 ⚔️</div>
        <h1>워드 <span class="em">배틀</span> 마스터</h1>
        <p>레슨을 골라 <b>보스(왕)</b>와 대결! 단어·문장 퀴즈를 맞히면 기사가 공격하고, 틀리면 보스가 반격합니다. 보스를 쓰러뜨리면 <b>3D 배지</b>를 획득해요. 🔊 소리를 켜고 즐기세요!</p>
        <div id="badgeCollection" style="margin:0 0 12px;font-size:13px;font-weight:800;color:#c7d3ea"></div>
        <div class="lessonpick" id="lessonPick"></div>
      </div>
    </div>

    <div class="overlay" id="winOverlay">
      <div class="card">
        <div class="tag">⚡ 레슨 클리어 ⚡</div>
        <h1>🏅 <span class="em">승리!</span></h1>
        <div class="stars" id="winStars">⭐⭐⭐</div>
        <p id="winMsg"></p>
        <button class="btn" id="nextBtn">다음 레슨 ▶</button>
      </div>
    </div>
    <div class="overlay" id="loseOverlay">
      <div class="card">
        <div class="tag">💀 GAME OVER 💀</div>
        <h1>아쉽다…</h1>
        <p id="loseMsg">보스에게 당했어요. 다시 도전해볼까요?</p>
        <button class="btn red" id="retryBtn">다시 도전 ↻</button>
      </div>
    </div>

    <div id="loadErr">⚠ Three.js 로드 실패 — 인터넷/CDN 확인</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- glTF 로더 (실사 .glb 캐릭터용) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
  (function(){
    'use strict';
    if(!window.THREE){ document.getElementById('loadErr').style.display='flex'; return; }

    /* ===== 레슨 데이터 (각 레슨 = 보스전) ===== */
    /* ★ 망고아이 앱의 실제 교재 데이터(index.html 의 _GAME_WORDS / _GAME_VOCAB)에서 가져옴.
         교재가 바뀌면 아래 배열만 동일 형식으로 교체하면 됩니다. */
    var LESSONS = [
      { name:'레슨 1 · 단어 왕', boss:'👹 워드 왕 (Word King)', color:0xef4444, color2:0x7a1010, badge:'star',
        items:[
          {type:'단어', q:'사과', a:'apple', ch:['apple','book','water','star']},
          {type:'단어', q:'책',   a:'book',  ch:['book','cat','flower','sun']},
          {type:'단어', q:'고양이', a:'cat',  ch:['cat','dog','moon','apple']},
          {type:'단어', q:'강아지', a:'dog',  ch:['dog','cat','star','book']},
          {type:'단어', q:'꽃',   a:'flower',ch:['flower','water','moon','hello']},
          {type:'단어', q:'안녕', a:'hello', ch:['hello','love','school','sun']}
        ]},
      { name:'레슨 2 · 별빛 왕', boss:'✨ 스타 왕 (Star King)', color:0x6366f1, color2:0x2a2a7a, badge:'gem',
        items:[
          {type:'단어', q:'학교', a:'school',ch:['school','water','book','star']},
          {type:'단어', q:'물',   a:'water', ch:['water','apple','sun','love']},
          {type:'단어', q:'태양', a:'sun',   ch:['sun','moon','star','flower']},
          {type:'단어', q:'달',   a:'moon',  ch:['moon','sun','star','cat']},
          {type:'단어', q:'별',   a:'star',  ch:['star','sun','moon','dog']},
          {type:'단어', q:'사랑', a:'love',  ch:['love','hello','flower','water']}
        ]},
      { name:'레슨 3 · 문장 왕', boss:'📜 센텐스 왕 (Sentence King)', color:0xa855f7, color2:0x4a2a7a, badge:'trophy',
        items:[
          {type:'문장', q:'I love ___ fruit.',          hint:'(망고)',   a:'mango',  ch:['mango','apple','book','water']},
          {type:'문장', q:'She is reading a ___ .',      hint:'(책)',     a:'book',   ch:['book','cat','dog','sun']},
          {type:'문장', q:'We go to ___ every day.',     hint:'(학교)',   a:'school', ch:['school','water','moon','star']},
          {type:'문장', q:'My ___ is very cute.',        hint:'(강아지)', a:'dog',    ch:['dog','cat','flower','sun']},
          {type:'문장', q:'He plays ___ on Sundays.',    hint:'(축구)',   a:'soccer', ch:['soccer','tennis','music','games']},
          {type:'문장', q:'I like to eat ___ .',         hint:'(피자)',   a:'pizza',  ch:['pizza','apple','bread','rice']}
        ]},
      { name:'레슨 4 · 혼합 복습 왕', boss:'👑 마스터 왕 (Master King)', color:0x14b8a6, color2:0x0f5e57, badge:'trophy',
        items:[
          {type:'단어', q:'별',   a:'star',  ch:['star','sun','moon','book']},
          {type:'문장', q:'The ___ is shining brightly.', hint:'(태양)',   a:'sun',     ch:['sun','moon','star','water']},
          {type:'단어', q:'사랑', a:'love',  ch:['love','hello','flower','cat']},
          {type:'문장', q:'They are good ___ .',          hint:'(친구들)', a:'friends', ch:['friends','books','dogs','cats']},
          {type:'단어', q:'학교', a:'school',ch:['school','water','moon','apple']},
          {type:'문장', q:'My ___ is very cute.',         hint:'(강아지)', a:'dog',     ch:['dog','cat','sun','book']}
        ]}
    ];

    /* ===== Three.js 기본 ===== */
    var canvas=document.getElementById('battleCanvas'), wrap=document.getElementById('mango-battle-3d');
    var W=wrap.clientWidth, H=wrap.clientHeight;
    var scene=new THREE.Scene(); scene.background=new THREE.Color(0x070b16); scene.fog=new THREE.Fog(0x070b16,20,60);
    var camera=new THREE.PerspectiveCamera(46,W/H,0.1,200); camera.position.set(0,4.2,15.5); camera.lookAt(0,2.1,0); scene.add(camera);
    var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true}); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2)); renderer.setSize(W,H); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    renderer.outputEncoding=THREE.sRGBEncoding; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.06;

    // 사실적 반사용 환경맵 (절차적 그라디언트 → PMREM): 갑옷/검/배지 금속이 실제로 반사됨
    (function(){ var c=document.createElement('canvas'); c.width=32; c.height=96; var x=c.getContext('2d'); var g=x.createLinearGradient(0,0,0,96);
      g.addColorStop(0,'#33406e'); g.addColorStop(0.46,'#6d83b6'); g.addColorStop(0.52,'#aeb9d6'); g.addColorStop(0.6,'#1a2236'); g.addColorStop(1,'#070b16'); x.fillStyle=g; x.fillRect(0,0,32,96);
      var tex=new THREE.CanvasTexture(c); tex.mapping=THREE.EquirectangularReflectionMapping; var pm=new THREE.PMREMGenerator(renderer);
      try{ scene.environment=pm.fromEquirectangular(tex).texture; }catch(e){} tex.dispose(); pm.dispose(); })();

    scene.add(new THREE.AmbientLight(0x8090c0,0.5));
    scene.add(new THREE.HemisphereLight(0x9fc0ff,0x101830,0.5));
    var key=new THREE.DirectionalLight(0xffffff,1.15); key.position.set(6,12,8); key.castShadow=true; key.shadow.mapSize.set(2048,2048); key.shadow.camera.left=-12; key.shadow.camera.right=12; key.shadow.camera.top=12; key.shadow.camera.bottom=-12; scene.add(key);
    var rim=new THREE.DirectionalLight(0x5577ff,0.5); rim.position.set(-8,5,-6); scene.add(rim);
    var spot=new THREE.PointLight(0xff6a3a,0,30); spot.position.set(0,8,2); scene.add(spot);

    // 별가루 배경 (안개 영향 X)
    (function(){ var N=380,pos=new Float32Array(N*3),seed=1234.5; function rnd(){seed=(seed*9301+49297)%233280;return seed/233280;}
      for(var i=0;i<N;i++){ var r=26+rnd()*34,th=rnd()*Math.PI*2,ph=(rnd()-0.5)*Math.PI; pos[i*3]=Math.cos(th)*Math.cos(ph)*r; pos[i*3+1]=Math.abs(Math.sin(ph))*r*0.7+4; pos[i*3+2]=Math.sin(th)*Math.cos(ph)*r-8; }
      var g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(pos,3)); scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x9fb8ff,size:0.4,sizeAttenuation:true,transparent:true,opacity:0.85,fog:false}))); })();

    var floor=new THREE.Mesh(new THREE.CircleGeometry(11,56), new THREE.MeshStandardMaterial({color:0x141d36,roughness:0.62,metalness:0.35})); floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
    var grid=new THREE.GridHelper(22,22,0x3b5bdb,0x1e2b4d); grid.position.y=0.01; if(grid.material){grid.material.transparent=true;grid.material.opacity=0.3;} scene.add(grid);
    var ring=new THREE.Mesh(new THREE.TorusGeometry(10.2,0.14,16,90), new THREE.MeshStandardMaterial({color:0xfbbf24,emissive:0x4a3400,metalness:0.6,roughness:0.4})); ring.rotation.x=-Math.PI/2; ring.position.y=0.06; scene.add(ring);

    /* ===== 디테일 캐릭터 (기사 / 보스) ===== */
    function mat(c,r,m,e){ return new THREE.MeshStandardMaterial({color:c,roughness:r==null?0.5:r,metalness:m==null?0.2:m,emissive:e||0x000000}); }
    function limbMesh(len,rT,rB,material){ var geo=new THREE.CylinderGeometry(rT,rB,len,16); geo.translate(0,-len/2,0); var msh=new THREE.Mesh(geo,material); msh.castShadow=true; return msh; }
    function joint(r,material){ var j=new THREE.Mesh(new THREE.SphereGeometry(r,16,12),material); j.castShadow=true; return j; }
    function makeCape(color){ var geo=new THREE.PlaneGeometry(1.5,2.4,10,14); var m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:color,roughness:0.72,metalness:0.04,side:THREE.DoubleSide})); m.castShadow=true; geo.userData.base=geo.attributes.position.array.slice(0); return m; }
    function waveCape(mesh,time,dir){ var pos=mesh.geometry.attributes.position, base=mesh.geometry.userData.base; for(var i=0;i<pos.count;i++){ var bx=base[i*3],by=base[i*3+1]; var tt=(1.2-by)/2.4; if(tt<0)tt=0; var wv=Math.sin(time*2.2+bx*2.4+by*1.2)*0.17*tt + Math.sin(time*1.3)*0.06*tt; pos.array[i*3]=bx+Math.sin(time*1.7+by)*0.04*tt; pos.array[i*3+1]=by; pos.array[i*3+2]=base[i*3+2]+wv-tt*tt*0.55; } pos.needsUpdate=true; mesh.geometry.computeVertexNormals(); }
    function buildCharacter(cfg){
      var G=new THREE.Group();
      var skin=mat(cfg.skin,0.58,0.05), armor=mat(cfg.armor,0.46,0.34,cfg.isBoss?0x140000:0x000000), trim=mat(cfg.trim,0.24,0.92,cfg.isBoss?0x200000:0x000000);
      armor.envMapIntensity=0.55; skin.envMapIntensity=0.4; trim.envMapIntensity=0.95;
      var eyeMat=new THREE.MeshStandardMaterial({color:cfg.eye,emissive:cfg.eye,emissiveIntensity:cfg.isBoss?1.4:0.25});
      var f=cfg.face||1;
      var pelvis=new THREE.Mesh(new THREE.BoxGeometry(1.12,0.58,0.78),armor); pelvis.position.y=1.7; pelvis.castShadow=true; G.add(pelvis);
      // 갑옷 치마(타셋) — 허리에서 방사형으로 늘어진 금속 플레이트
      var skirt=new THREE.Group(); skirt.position.y=1.7; G.add(skirt);
      for(var s=0;s<10;s++){ var ang=(s/10)*Math.PI*2; var pl=new THREE.Mesh(new THREE.BoxGeometry(0.27,0.5,0.09),(s%2)?trim:armor); pl.position.set(Math.cos(ang)*0.6,-0.26,Math.sin(ang)*0.6); pl.lookAt(0,(1.7-0.26)-0.8,0); pl.castShadow=true; skirt.add(pl); }
      // 부드러운 몸통 (라드 곡선) — 허리에서 가슴·어깨로 자연스러운 근육 실루엣
      var torsoPts=[ new THREE.Vector2(0.5,0), new THREE.Vector2(0.67,0.34), new THREE.Vector2(0.76,0.66), new THREE.Vector2(0.73,1.0), new THREE.Vector2(0.6,1.3), new THREE.Vector2(0.4,1.5) ];
      var torso=new THREE.Mesh(new THREE.LatheGeometry(torsoPts,30),armor); torso.position.y=1.78; torso.castShadow=true; G.add(torso);
      var belt=new THREE.Mesh(new THREE.TorusGeometry(0.72,0.11,12,30),trim); belt.rotation.x=Math.PI/2; belt.position.y=1.86; G.add(belt);
      var buckle=new THREE.Mesh(new THREE.BoxGeometry(0.24,0.24,0.1),trim); buckle.position.set(0,1.86,0.72*f); G.add(buckle);
      // 가슴 흉갑 + 늑골 라인
      var chest=new THREE.Mesh(new THREE.BoxGeometry(0.56,0.54,0.14),trim); chest.position.set(0,2.5,0.5*f); G.add(chest);
      [2.64,2.4,2.16].forEach(function(cy){ var rib=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.06,0.1),trim); rib.position.set(0,cy,0.54*f); rib.scale.x=Math.max(0.3,(cy-1.95)*0.85); G.add(rib); });
      // 어깨 견갑 (이중 플레이트) + 보스 가시
