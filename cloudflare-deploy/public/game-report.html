<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>🧠 게임 학습 리포트 — 약점 단어</title>
<link rel="icon" href="/mangoi-favicon.svg" type="image/svg+xml" />
<meta name="theme-color" content="#0a1530" />
<!--
  🧠 교사용 게임 학습 리포트
  학생이 학습게임에서 자주 틀린 단어(약점)를 보여준다. game_progress → /api/games/weak.
  ?uid=<학생 user_id> 로 바로 열거나, 상단 입력창에 학생 아이디를 넣는다.
  각 약점 단어는 🔊 원어민 발음(/api/voice/tts)으로 들어볼 수 있다.
-->
<style>
  :root{ --bg:#0a1530; --card:#14213b; --text:#e6ecff; --text2:#a3b3d1;
    --accent:#38bdf8; --bad:#ef4444; --good:#34d399; --border:rgba(56,189,248,.18); }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
  .top{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(20,33,59,.95);
    position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .top a{color:var(--text);text-decoration:none;font-weight:700;font-size:14px}
  .top h1{margin:0;font-size:18px;font-weight:800;flex:1;min-width:180px}
  .wrap{max-width:900px;margin:0 auto;padding:16px}
  .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .bar input{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);
    padding:10px 14px;font-size:15px;font-family:inherit;outline:none;min-width:180px}
  .bar button{background:linear-gradient(135deg,var(--accent),#0ea5e9);color:#04283a;border:0;
    border-radius:10px;padding:10px 18px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
  .lang-tabs{display:flex;gap:8px;margin-left:auto}
  .lang-tabs button{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text2);
    border-radius:999px;padding:7px 15px;font-size:13.5px;font-weight:800;cursor:pointer;font-family:inherit}
  .lang-tabs button.on{background:rgba(56,189,248,.22);border-color:var(--accent);color:#bae6fd}
  .summary{font-size:14px;color:var(--text2);margin-bottom:12px}
  .summary b{color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .wcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;
    display:flex;flex-direction:column;gap:6px}
  .wcard .hz{font-size:24px;font-weight:800;color:#fff;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .wcard .ko{font-size:15px;color:var(--text2)}
  .wcard .stat{font-size:12.5px;color:var(--text2);margin-top:2px}
  .wcard .stat .w{color:var(--bad);font-weight:800}
  .wcard .stat .r{color:var(--good);font-weight:800}
  .spk{align-self:flex-start;margin-top:4px;background:rgba(56,189,248,.14);border:1px solid var(--border);
    color:var(--accent);border-radius:999px;padding:5px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .spk:active{transform:scale(.96)}
  .empty{text-align:center;color:var(--text2);padding:50px 20px;font-size:15px;line-height:1.7}
  .empty .big{font-size:44px;margin-bottom:10px}
</style>
</head>
<body>
  <div class="top">
    <a href="/admin/students.html">← <span>학생관리</span></a>
    <h1>🧠 게임 학습 리포트 — 약점 단어</h1>
  </div>
  <div class="wrap">
    <div class="bar">
      <input id="uid" type="text" placeholder="학생 아이디(user_id)" autocomplete="off"
        onkeydown="if(event.key==='Enter')loadReport()" />
      <button onclick="loadReport()">조회</button>
      <div class="lang-tabs">
        <button class="on" data-lang="en" onclick="setLang('en')">🇬🇧 영어</button>
        <button data-lang="zh" onclick="setLang('zh')">🇨🇳 중국어</button>
      </div>
    </div>
    <div class="summary" id="summary"></div>
    <div id="content"></div>
  </div>

<script>
var Q = new URLSearchParams(location.search);
var LANG = 'en';
var CUR_UID = (Q.get('uid') || Q.get('user_id') || '').trim();
document.getElementById('uid').value = CUR_UID;

function setLang(l){
  LANG = (l==='zh') ? 'zh' : 'en';
  [].forEach.call(document.querySelectorAll('.lang-tabs button'), function(b){
    b.classList.toggle('on', b.getAttribute('data-lang')===LANG);
  });
  loadReport();
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"]/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

// 🔊 원어민 발음 재생 (서버 TTS: en=Deepgram, zh=Google 만다린)
var _audio = null, _ttsCache = {};
function speak(text, lang){
  var key = lang+'|'+text;
  function play(u){ try{ if(!_audio) _audio=new Audio(); _audio.src=u; _audio.play().catch(function(){}); }catch(e){} }
  if(_ttsCache[key]){ play(_ttsCache[key]); return; }
  fetch('/api/voice/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text:text, lang:lang }) })
    .then(function(r){ var ct=r.headers.get('content-type')||''; if(!r.ok||ct.indexOf('audio')<0) throw 0; return r.blob(); })
    .then(function(b){ var u=URL.createObjectURL(b); _ttsCache[key]=u; play(u); })
    .catch(function(){});
}

function loadReport(){
  var uid = document.getElementById('uid').value.trim();
  CUR_UID = uid;
  var summary = document.getElementById('summary'), content = document.getElementById('content');
  if(!uid){ summary.textContent=''; content.innerHTML='<div class="empty"><div class="big">👩‍🏫</div>학생 아이디를 입력하고 조회하세요.</div>'; return; }
  try{ history.replaceState(null,'','?uid='+encodeURIComponent(uid)); }catch(e){}
  summary.innerHTML='불러오는 중…';
  content.innerHTML='';
  fetch('/api/games/weak?user_id='+encodeURIComponent(uid)+'&lang='+LANG+'&limit=40')
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(d){
      if(!d || !d.ok){ summary.textContent=''; content.innerHTML='<div class="empty"><div class="big">⚠️</div>데이터를 불러오지 못했어요.</div>'; return; }
      var weak = d.weak || [];
      var langName = LANG==='zh'?'중국어':'영어';
      if(!weak.length){
        summary.innerHTML='';
        content.innerHTML='<div class="empty"><div class="big">🎉</div><b>'+escapeHtml(uid)+'</b> 학생은 '+langName+' 게임에서<br>아직 약점으로 잡힌 단어가 없어요!<br><span style="font-size:13px;color:#64748b">(게임을 더 하면 자주 틀리는 단어가 여기 모여요)</span></div>';
        return;
      }
      summary.innerHTML='<b>'+escapeHtml(uid)+'</b> 학생 · '+langName+' 약점 단어 <b>'+weak.length+'</b>개 (자주 틀린 순). 🔊 를 눌러 원어민 발음을 함께 지도하세요.';
      content.innerHTML = '<div class="grid">' + weak.map(function(w){
        var hz = escapeHtml(w.item);
        var pron = (w.pron_count>0)
          ? '<div class="stat">🎤 발음 최고 <b style="color:'+(w.pron_best>=60?'#34d399':'#f59e0b')+'">'+w.pron_best+'점</b> <span style="color:#64748b">('+w.pron_count+'회 시도)</span></div>'
          : '';
        return '<div class="wcard">'
          + '<div class="hz">'+hz+'</div>'
          + '<div class="ko">'+ (w.ko?escapeHtml(w.ko):'<span style="color:#64748b">(뜻 미기록)</span>') +'</div>'
          + '<div class="stat">❌ 오답 <span class="w">'+w.wrong+'</span> · ✅ 정답 <span class="r">'+w.correct+'</span></div>'
          + pron
          + '<button class="spk" onclick="speak('+JSON.stringify(w.item).replace(/"/g,'&quot;')+',\''+LANG+'\')">🔊 발음 듣기</button>'
          + '</div>';
      }).join('') + '</div>';
    })
    .catch(function(){ summary.textContent=''; content.innerHTML='<div class="empty"><div class="big">⚠️</div>연결 오류</div>'; });
}
loadReport();
</script>

</body>
</html>
