<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050B14">
<title>📝 마스터 클래스 디자인 — 망고아이</title>
<!-- BUILD:20260530-master-v1 -->
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
  html,body{
    background:#050B14;
    color:#E2E8F0;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Pretendard",sans-serif;
    font-size:15px;line-height:1.5;
    min-height:100vh;
  }
  body{display:flex;justify-content:center;align-items:flex-start;padding:10px}

  /* 메인 디바이스 프레임 */
  .frame{
    width:100%;max-width:430px;
    background:#09111E;
    min-height:calc(100vh - 20px);
    border-radius:32px;
    border:6px solid #1E293B;
    padding:20px 18px 110px;
    position:relative;
    box-shadow:0 25px 50px -12px rgba(0,0,0,0.6);
    overflow:hidden;
  }
  @media (max-width:480px){
    body{padding:0}
    .frame{border-radius:0;border:0;padding:16px 14px 110px}
  }

  /* 상단 토스트 */
  .toast{
    position:absolute;top:-90px;left:14px;right:14px;
    background:linear-gradient(135deg,#10B981,#059669);
    color:#fff;padding:14px 20px;border-radius:30px;
    font-size:13px;font-weight:700;text-align:center;
    transition:top .45s cubic-bezier(0.175,0.885,0.32,1.275);
    z-index:99;box-shadow:0 12px 28px -6px rgba(16,185,129,0.55);
  }
  .toast.show{top:15px}

  /* 진행 단계 인디케이터 */
  .stepbar{
    display:flex;justify-content:space-between;
    font-size:11px;color:#475569;margin-bottom:18px;padding:5px 0;
  }
  .stepbar span.active{
    color:#38BDF8;font-weight:bold;
    text-shadow:0 0 10px rgba(56,189,248,0.3);
  }

  h2.title{font-size:22px;font-weight:900;margin-bottom:4px;letter-spacing:-0.5px;color:#fff}
  p.sub{color:#94A3B8;font-size:13px;margin-bottom:22px;line-height:1.5}

  /* 1:1 / 그룹 토글 */
  .type-tabs{display:flex;gap:6px;background:#111C2E;padding:4px;border-radius:12px;margin-bottom:18px}
  .type-tabs button{
    flex:1;padding:11px 0;cursor:pointer;border:none;border-radius:9px;
    font-size:13px;font-weight:bold;transition:all .25s;
    background:transparent;color:#64748B;
  }
  .type-tabs button.active{
    background:linear-gradient(135deg,#3B82F6,#2563EB);
    color:#fff;box-shadow:0 4px 12px -4px rgba(59,130,246,0.6);
  }

  /* 섹션 라벨 */
  .sec-label{
    font-size:12.5px;font-weight:700;color:#94A3B8;
    margin-bottom:8px;display:flex;align-items:center;gap:6px;
  }

  /* 주간 목표 횟수 토글 */
  .weekly-target{margin-bottom:18px}
  .target-tabs{
    display:flex;gap:4px;background:#111C2E;padding:4px;border-radius:10px;
  }
  .target-tabs button{
    flex:1;padding:8px 0;cursor:pointer;border:none;border-radius:7px;
    font-size:12px;font-weight:bold;transition:all .2s;
    background:transparent;color:#64748B;
  }
  .target-tabs button.active{
    background:#2563EB;color:#fff;
  }

  /* 날짜 가로 슬라이더 */
  .date-section{margin-bottom:18px}
  .date-row{
    display:flex;gap:8px;overflow-x:auto;
    scrollbar-width:none;-ms-overflow-style:none;
    padding-bottom:4px;
  }
  .date-row::-webkit-scrollbar{display:none}
  .date-card{
    flex:0 0 auto;min-width:64px;
    padding:12px 6px;border-radius:12px;text-align:center;cursor:pointer;
    transition:all .25s;
    background:#111C2E;border:1px solid #1E293B;
  }
  .date-card.active{
    background:#1E3A8A;border:2px solid #38BDF8;padding:11px 5px;
    box-shadow:0 4px 16px -4px rgba(56,189,248,0.5);
  }
  .date-card .dn{font-size:11px;color:#64748B}
  .date-card .dd{font-size:17px;font-weight:900;margin:3px 0;color:#fff}
  .date-card.active .dd{color:#38BDF8}
  .date-card .dm{font-size:10px;color:#475569}

  /* 시간 슬롯 그리드 */
  .time-section{margin-bottom:14px}
  .time-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
    max-height:230px;overflow-y:auto;padding-right:2px;
  }
  .time-grid::-webkit-scrollbar{width:4px}
  .time-grid::-webkit-scrollbar-thumb{background:#1E293B;border-radius:4px}
  .slot{
    padding:11px 0;border-radius:8px;
    font-size:12px;font-weight:bold;transition:all .2s;
    background:#111C2E;color:#D1D5DB;border:1px solid #1E293B;
    cursor:pointer;
  }
  .slot:hover:not(:disabled){background:#1A2540;border-color:#334155}
  .slot.selected{
    background:#1E40AF;color:#38BDF8;border:1px solid #38BDF8;
    box-shadow:0 0 0 2px rgba(56,189,248,0.18);
  }
  .slot:disabled{
    background:#1E2530;color:#334155;border-color:#1E293B;
    cursor:not-allowed;
  }

  /* "장바구니에 담기" 브릿지 버튼 */
  .add-btn{
    width:100%;padding:12px;border-radius:10px;border:1px solid #1E293B;
    font-weight:bold;font-size:13px;margin-top:12px;
    background:#0F172A;color:#475569;cursor:not-allowed;
    transition:all .25s;
  }
  .add-btn.active{
    background:rgba(56,189,248,0.12);color:#38BDF8;
    border-color:#38BDF8;cursor:pointer;
  }
  .add-btn.active:hover{background:rgba(56,189,248,0.22)}

  /* 장바구니 영역 */
  .cart{
    background:#111C2E;padding:14px;border-radius:14px;
    border:1px solid #1E293B;margin-top:14px;
  }
  .cart-head{
    font-size:13px;font-weight:bold;margin-bottom:10px;color:#38BDF8;
    display:flex;justify-content:space-between;
  }
  .cart-empty{color:#475569;font-size:12px;line-height:1.5}
  .cart-list{display:flex;flex-direction:column;gap:6px}
  .cart-item{
    display:flex;justify-content:space-between;align-items:center;
    background:#0F172A;padding:10px 12px;border-radius:8px;
    border:1px solid #1E293B;font-size:12.5px;
  }
  .cart-item span.txt{flex:1;color:#E2E8F0}
  .cart-item button{
    background:none;border:none;color:#EF4444;font-weight:bold;
    cursor:pointer;padding:0 4px;font-size:18px;line-height:1;
  }

  /* 하단 고정 결제 바 */
  .footer{
    position:absolute;bottom:0;left:0;right:0;
    background:#09111E;padding:14px 18px 18px;
    border-top:1px solid #1E293B;
  }
  .footer .info{
    font-size:12px;color:#94A3B8;margin-bottom:8px;
    text-align:center;font-weight:500;
  }
  .checkout-btn{
    width:100%;padding:15px;border-radius:18px;
    font-size:15px;font-weight:900;border:none;transition:all .25s;
    background:#1E293B;color:#475569;cursor:not-allowed;
  }
  .checkout-btn.ready{
    background:linear-gradient(135deg,#FBBF24,#F59E0B);
    color:#000;cursor:pointer;
    box-shadow:0 6px 18px -4px rgba(251,191,36,0.55);
  }
  .checkout-btn.ready:hover{transform:translateY(-1px);box-shadow:0 10px 24px -4px rgba(251,191,36,0.65)}

  /* 우측 상단 홈 버튼 */
  .home-btn{
    position:absolute;top:18px;right:18px;z-index:5;
    background:rgba(15,23,42,0.85);border:1px solid #1E293B;
    color:#94A3B8;padding:7px 12px;border-radius:99px;
    font-size:12px;cursor:pointer;text-decoration:none;
    display:flex;align-items:center;gap:4px;
  }
  .home-btn:hover{background:#1E293B;color:#fff}
</style>
</head>
<body>

<div class="frame">

  <!-- 토스트 알림 -->
  <div id="toast" class="toast"></div>

  <!-- 홈 버튼 -->
  <a href="/" class="home-btn">🏠 홈</a>

  <!-- 진행 단계 -->
  <div class="stepbar">
    <span>① 수업 형태</span>
    <span class="active">② 날짜·교사</span>
    <span>③ 결제</span>
  </div>

  <h2 class="title">📝 마스터 클래스 디자인</h2>
  <p class="sub">당신의 목표를 세우고 시간을 예술처럼 디자인하세요.</p>

  <!-- 1:1 / 그룹 토글 -->
  <div class="sec-label">👥 수업 형태</div>
  <div class="type-tabs">
    <button id="type-oneon" class="active" data-type="oneon">1:1 마스터</button>
    <button id="type-group" data-type="group">그룹 토론</button>
  </div>

  <!-- 주간 목표 -->
  <div class="weekly-target">
    <div class="sec-label">🎯 주간 수업 횟수 설정</div>
    <div class="target-tabs" id="target-tabs">
      <button data-count="1">주 1회</button>
      <button data-count="2" class="active">주 2회</button>
      <button data-count="3">주 3회</button>
      <button data-count="4">주 4회</button>
      <button data-count="5">주 5회</button>
    </div>
  </div>

  <!-- 날짜 선택 -->
  <div class="date-section">
    <div class="sec-label">📅 날짜 선택 (요일 자유 이동)</div>
    <div class="date-row" id="date-row"></div>
  </div>

  <!-- 시간 선택 -->
  <div class="time-section">
    <div class="sec-label">⏰ 시간 선택 (최소 20분 자동 블록 + 연속 확장)</div>
    <div class="time-grid" id="time-grid"></div>
  </div>

  <!-- 장바구니 담기 버튼 -->
  <button class="add-btn" id="add-btn">➕ 위 시간대 장바구니에 담기</button>

  <!-- 장바구니 영역 -->
  <div class="cart">
    <div class="cart-head">
      <span>🛒 선택된 마스터 예약 목록</span>
      <span id="cart-count">(0 / 2회 완료)</span>
    </div>
    <div id="cart-body">
      <p class="cart-empty">요일을 이동하며 일정을 장바구니에 채워보세요.</p>
    </div>
  </div>

  <!-- 하단 고정 결제 바 -->
  <div class="footer">
    <div class="info" id="footer-info">주 2회 일정을 장바구니에 모두 담아주세요.</div>
    <button class="checkout-btn" id="checkout-btn" disabled>완벽한 일정 디자인! 결제로 이동 ➡️</button>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ─── 상태 ───
  var state = {
    type: 'oneon',          // oneon | group
    weeklyTarget: 2,        // 주간 목표 횟수
    currentDay: null,       // 현재 선택된 날짜 ID (yyyy-mm-dd)
    currentSlotIds: [],     // 현재 화면에서 선택 중인 임시 슬롯
    cart: []                // 누적 예약 장바구니 [{id, dayId, slotIds, display}]
  };

  // ─── 10분 단위 슬롯 (09:00 ~ 23:00) ───
  var TIME_SLOTS = [];
  for (var h = 9; h <= 23; h++) {
    for (var m = 0; m < 60; m += 10) {
      if (h === 23 && m > 0) break; // 23:00 까지
      var t = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      TIME_SLOTS.push({ id: TIME_SLOTS.length + 1, time: t });
    }
  }

  // ─── 날짜 14일 생성 (오늘 ~ +13일) ───
  var DAYS = [];
  var DAY_NAMES = ['일','월','화','수','목','금','토'];
  (function genDays(){
    var today = new Date();
    for (var i = 0; i < 14; i++) {
      var d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + i);
      var id = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      DAYS.push({
        id: id,
        dayName: DAY_NAMES[d.getDay()],
        dd: d.getDate(),
        month: (d.getMonth()+1) + '월'
      });
    }
    state.currentDay = DAYS[0].id;
  })();

  // ─── 렌더링 ───
  function renderDates() {
    var row = document.getElementById('date-row');
    row.innerHTML = '';
    DAYS.forEach(function(day){
      var c = document.createElement('div');
      c.className = 'date-card' + (state.currentDay === day.id ? ' active' : '');
      c.innerHTML =
        '<div class="dn">'+day.dayName+'</div>'+
        '<div class="dd">'+day.dd+'</div>'+
        '<div class="dm">'+day.month+'</div>';
      c.onclick = function(){
        state.currentDay = day.id;
        state.currentSlotIds = [];
        renderDates();
        renderTimes();
        renderAddBtn();
      };
      row.appendChild(c);
    });
  }

  function renderTimes() {
    var grid = document.getElementById('time-grid');
    grid.innerHTML = '';
    TIME_SLOTS.forEach(function(slot){
      var booked = state.cart.some(function(item){
        return item.dayId === state.currentDay && item.slotIds.indexOf(slot.id) !== -1;
      });
      var selected = state.currentSlotIds.indexOf(slot.id) !== -1;
      var b = document.createElement('button');
      b.className = 'slot' + (selected ? ' selected' : '');
      b.disabled = booked;
      b.textContent = slot.time;
      b.onclick = function(){ handleSlotClick(slot.id); };
      grid.appendChild(b);
    });
  }

  function renderAddBtn() {
    var btn = document.getElementById('add-btn');
    if (state.currentSlotIds.length > 0) {
      btn.classList.add('active');
      btn.disabled = false;
    } else {
      btn.classList.remove('active');
      btn.disabled = true;
    }
  }

  function renderCart() {
    var body = document.getElementById('cart-body');
    var count = document.getElementById('cart-count');
    count.textContent = '(' + state.cart.length + ' / ' + state.weeklyTarget + '회 완료)';
    if (state.cart.length === 0) {
      body.innerHTML = '<p class="cart-empty">요일을 이동하며 일정을 장바구니에 채워보세요.</p>';
    } else {
      var html = '<div class="cart-list">';
      state.cart.forEach(function(item){
        html += '<div class="cart-item"><span class="txt">'+item.display+'</span><button data-rid="'+item.id+'">×</button></div>';
      });
      html += '</div>';
      body.innerHTML = html;
      // remove 핸들러 연결
      body.querySelectorAll('button[data-rid]').forEach(function(btn){
        btn.onclick = function(){
          var rid = Number(btn.getAttribute('data-rid'));
          state.cart = state.cart.filter(function(it){ return it.id !== rid; });
          renderCart();
          renderTimes();
          renderFooter();
        };
      });
    }
  }

  function renderFooter() {
    var info = document.getElementById('footer-info');
    var btn = document.getElementById('checkout-btn');
    var met = (state.cart.length === state.weeklyTarget);
    if (met) {
      info.textContent = '✨ 주간 목표 조건 충족! 일정 연동 완료';
      btn.classList.add('ready');
      btn.disabled = false;
    } else {
      info.textContent = '주 ' + state.weeklyTarget + '회 일정을 장바구니에 모두 담아주세요. (현재 ' + state.cart.length + '회)';
      btn.classList.remove('ready');
      btn.disabled = true;
    }
  }

  // ─── 슬롯 클릭 로직 (최소 20분 자동 + 연속 확장) ───
  function handleSlotClick(clickedId) {
    // 1. 마지막 슬롯 단독 클릭 방지
    if (clickedId === TIME_SLOTS.length) {
      showAlert('⚠️ 최소 20분(2개 블록) 예약을 위해 앞 시간대를 선택해 주세요.');
      return;
    }
    // 2. 이미 장바구니에 있는 시간대는 잠금
    var locked = state.cart.some(function(item){
      return item.dayId === state.currentDay && item.slotIds.indexOf(clickedId) !== -1;
    });
    if (locked) {
      showAlert('⚠️ 이미 장바구니에 담긴 시간대입니다.');
      return;
    }
    // 3. 첫 선택 → 자동 2블록 (20분)
    if (state.currentSlotIds.length === 0) {
      state.currentSlotIds = [clickedId, clickedId + 1];
    } else {
      var min = Math.min.apply(null, state.currentSlotIds);
      var max = Math.max.apply(null, state.currentSlotIds);
      if (clickedId === max + 1) {
        state.currentSlotIds.push(clickedId);
      } else if (clickedId === min - 1) {
        state.currentSlotIds.unshift(clickedId);
      } else {
        // 비연속 → 새 블록으로 리셋
        state.currentSlotIds = [clickedId, clickedId + 1];
      }
    }
    renderTimes();
    renderAddBtn();
  }

  // ─── 장바구니 담기 ───
  document.getElementById('add-btn').onclick = function(){
    if (state.currentSlotIds.length === 0) return;
    if (state.cart.length >= state.weeklyTarget) {
      showAlert('⚠️ 이미 목표 주 ' + state.weeklyTarget + '회 예약을 모두 완료하셨습니다.');
      return;
    }
    var day = DAYS.find(function(d){ return d.id === state.currentDay; });
    var sorted = state.currentSlotIds.slice().sort(function(a,b){ return a-b; });
    var startTime = TIME_SLOTS.find(function(s){ return s.id === sorted[0]; }).time;
    var lastSlotId = sorted[sorted.length - 1];
    var nextSlot = TIME_SLOTS.find(function(s){ return s.id === lastSlotId + 1; });
    var endTime = nextSlot ? nextSlot.time : '종료';
    state.cart.push({
      id: Date.now() + Math.random(),
      dayId: state.currentDay,
      slotIds: sorted,
      display: day.month + ' ' + day.dd + '일 (' + day.dayName + ') ' + startTime + ' ~ ' + endTime
    });
    state.currentSlotIds = [];
    renderTimes();
    renderAddBtn();
    renderCart();
    renderFooter();
  };

  // ─── 1:1/그룹 토글 ───
  document.querySelectorAll('.type-tabs button').forEach(function(b){
    b.onclick = function(){
      document.querySelectorAll('.type-tabs button').forEach(function(x){ x.classList.remove('active'); });
      b.classList.add('active');
      state.type = b.getAttribute('data-type');
    };
  });

  // ─── 주간 목표 토글 ───
  document.querySelectorAll('#target-tabs button').forEach(function(b){
    b.onclick = function(){
      document.querySelectorAll('#target-tabs button').forEach(function(x){ x.classList.remove('active'); });
      b.classList.add('active');
      state.weeklyTarget = Number(b.getAttribute('data-count'));
      // 목표 변경 시 장바구니 리셋 (정합성 보장)
      state.cart = [];
      state.currentSlotIds = [];
      renderTimes();
      renderAddBtn();
      renderCart();
      renderFooter();
    };
  });

  // ─── 결제 진입 트리거 ───
  document.getElementById('checkout-btn').onclick = function(){
    if (state.cart.length !== state.weeklyTarget) return;
    var t = document.getElementById('toast');
    t.textContent = '✅ 신청 완료! 결제로 이동합니다…';
    t.classList.add('show');
    try {
      localStorage.setItem('mangoi_pending_booking', JSON.stringify({
        type: state.type,
        weeklyTarget: state.weeklyTarget,
        cart: state.cart,
        created_at: Date.now()
      }));
    } catch(e){}
    setTimeout(function(){
      try {
        var u = new URL(location.origin + '/');
        u.searchParams.set('menu', 'payment');
        u.searchParams.set('from', 'booking');
        u.searchParams.set('type', state.type);
        location.href = u.toString();
      } catch(e) {
        location.href = '/?menu=payment&from=booking';
      }
    }, 1300);
  };

  // ─── 알림 토스트 (짧은 경고) ───
  function showAlert(msg) {
    var t = document.getElementById('toast');
    var orig = t.style.background;
    t.style.background = 'linear-gradient(135deg,#EF4444,#DC2626)';
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){
      t.classList.remove('show');
      setTimeout(function(){ t.style.background = orig; t.textContent = ''; }, 500);
    }, 2200);
  }

  // ─── 초기 렌더링 ───
  renderDates();
  renderTimes();
  renderAddBtn();
  renderCart();
  renderFooter();
})();
