<script>
// 🔊 음성 안내 버튼을 글로벌 바([🏠 홈] [🌐 EN] 옆)에 자동 inject
(function tryAddAudioBtn(){
  if (window.mangoiAddBarButton && document.getElementById('mangoi-global-bar')) {
    function lvLabel() {
      var muted = false;
      try { muted = localStorage.getItem('mangoi_lessonvideo_audio_muted') === '1'; } catch(e){}
      var en = window.getLang && window.getLang() === 'en';
      if (muted) return '<span>🔇</span> <span>' + (en?'Audio On':'음성 켜기') + '</span>';
      return '<span>🔊</span> <span>' + (en?'Audio Off':'음성 끄기') + '</span>';
    }
    window.mangoiAddBarButton({
      id: 'mangoi-lv-audio-btn',
      text: lvLabel(),
      title: '음성 안내 켜기/끄기',
      onclick: function(){ window.toggleLessonAudio && window.toggleLessonAudio(); }
    });
    // 토글 후 라벨 업데이트
    window.addEventListener('mangoi:lang-changed', function(){
      var b = document.getElementById('mangoi-lv-audio-btn');
      if (b) b.innerHTML = lvLabel();
    });
    window._lvAudioBtnRefresh = function(){
      var b = document.getElementById('mangoi-lv-audio-btn');
      if (b) b.innerHTML = lvLabel();
    };
  } else {
    setTimeout(tryAddAudioBtn, 150);
  }
})();
</script>

<script>
// 🔊 레슨 비디오 페이지 안내 음성 자동 재생 (홈에서 카드 클릭 진입 시)
(function(){
  let shouldPlay = false;
  try { shouldPlay = sessionStorage.getItem('mangoi_play_lessonvideo_audio') === '1'; } catch(e){}
  try { if (localStorage.getItem('mangoi_lessonvideo_audio_muted') === '1') shouldPlay = false; } catch(e){}
  try { sessionStorage.removeItem('mangoi_play_lessonvideo_audio'); } catch(e){}

  // 끄기 버튼 상태 동기화
  function updateBtn() {
    const muted = localStorage.getItem('mangoi_lessonvideo_audio_muted') === '1';
    const icon = document.getElementById('lv-audio-icon');
    const label = document.getElementById('lv-audio-label');
    if (!icon || !label) return;
    if (muted) {
      icon.textContent = '🔇';
      label.textContent = (window.getLang && window.getLang() === 'en') ? 'Unmute' : '음성 켜기';
      label.setAttribute('data-ko', '음성 켜기');
      label.setAttribute('data-en', 'Unmute');
    } else {
      icon.textContent = '🔊';
      label.textContent = (window.getLang && window.getLang() === 'en') ? 'Mute' : '음성 끄기';
      label.setAttribute('data-ko', '음성 끄기');
      label.setAttribute('data-en', 'Mute');
    }
  }
  if (document.readyState !== 'loading') updateBtn();
  else document.addEventListener('DOMContentLoaded', updateBtn);
  window.addEventListener('mangoi:lang-changed', updateBtn);

  // 토글 핸들러
  window.toggleLessonAudio = function() {
    const muted = localStorage.getItem('mangoi_lessonvideo_audio_muted') === '1';
    if (muted) {
      localStorage.removeItem('mangoi_lessonvideo_audio_muted');
      alert(window.getLang && window.getLang() === 'en' ? '🔊 Audio guide enabled.' : '🔊 음성 안내가 켜졌어요.');
    } else {
      localStorage.setItem('mangoi_lessonvideo_audio_muted', '1');
      document.querySelectorAll('audio').forEach(a => { try { a.pause(); } catch(e){} });
      const t = document.getElementById('lv-audio-toast');
      if (t) t.remove();
      alert(window.getLang && window.getLang() === 'en' ? '🔇 Audio guide muted.' : '🔇 음성 안내가 꺼졌어요.');
    }
    updateBtn();
    if (window._lvAudioBtnRefresh) window._lvAudioBtnRefresh();
  };

  if (!shouldPlay) return;

  // 자동 재생 + 멈춤 토스트
  const audio = new Audio('/audio/레슨비디오.wav');
  audio.volume = 0.55;
  audio.play().catch(() => {});

  const toast = document.createElement('div');
  toast.id = 'lv-audio-toast';
  toast.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(20,41,80,0.95);color:#fbbf24;border:1px solid rgba(251,191,36,0.4);border-radius:12px;padding:12px 16px;font-size:13px;font-family:"Noto Sans KR",sans-serif;display:flex;align-items:center;gap:12px;box-shadow:0 12px 32px -8px rgba(0,0,0,0.5);backdrop-filter:blur(8px);animation:lv-slide 0.35s ease-out';
  const isEn = window.getLang && window.getLang() === 'en';
  toast.innerHTML =
    '<span style="display:inline-flex;align-items:center;gap:6px">🔊 <b>' + (isEn ? 'Video Lesson Guide' : '비디오 레슨 안내') + '</b></span>' +
    '<button id="lv-stop" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#e6ecff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11.5px;font-weight:700">⏸ ' + (isEn ? 'Stop' : '멈춤') + '</button>';
  const style = document.createElement('style');
  style.textContent = '@keyframes lv-slide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}';
  document.head.appendChild(style);
  document.body.appendChild(toast);
  document.getElementById('lv-stop').onclick = function() { try { audio.pause(); } catch(e){} toast.remove(); };
  audio.addEventListener('ended', () => { try { toast.remove(); } catch(e){} });
})();
</script>

  <script>
    // 🎯 3단계 네비게이션 — 교재 → 챕터 → 유닛
    (function(){
      let curTb = 'MES';
      let curChapter = null;  // 'BTS 01' 같은 형식
      let curUnit = null;     // 'UNIT 001' / 'REVIEW' / 'TEST'

      // 비디오 제목에서 챕터/유닛 자동 파싱
      // 예: "BTS 01(My school) UNIT 001" → { tb:'BTS', chNo:'01', chTitle:'My school', unitLabel:'UNIT 001' }
      function parseVideo(v) {
        const title = String(v.title || '').trim();
        // 패턴 1: "TB 01(Title) UNIT 001" 또는 "TB 01(Title) REVIEW/TEST"
        const m = title.match(/^(MES|BTS|SIU|EXT)\s*(\d+)\s*\(([^)]+)\)\s*(UNIT\s*\d+|REVIEW|TEST)/i);
        if (m) {
          return {
            tb: m[1].toUpperCase(),
            chNo: m[2].padStart(2,'0'),
            chTitle: m[3].trim(),
            unitLabel: m[4].toUpperCase().replace(/\s+/g,' ').trim(),
            chKey: m[1].toUpperCase() + ' ' + m[2].padStart(2,'0'),
          };
        }
        // 패턴 2: 외부 컨텐츠 (단순 형식) — category='EXT' 만 있어도 인식
        // "EXT TED Talk: How to learn..." 같은 자유 형식
        const cat = String(v.category || '').toUpperCase();
        const titleUp = title.toUpperCase();
        if (cat === 'EXT' || titleUp.startsWith('EXT ') || titleUp.startsWith('TED ') || titleUp.startsWith('YOUTUBE ')) {
          // 외부 컨텐츠는 챕터 = 카테고리 라벨 (TED / YouTube / 기타)
          let chTitle = 'External Content';
          let chNo = '01';
          if (titleUp.startsWith('TED ')) { chTitle = 'TED Talks'; chNo = '01'; }
          else if (titleUp.startsWith('YOUTUBE ')) { chTitle = 'YouTube'; chNo = '02'; }
          else if (titleUp.startsWith('EXT ')) { chTitle = '외부 영상'; chNo = '03'; }
          // lesson_no 가 있으면 그걸로 챕터 구분
          if (v.lesson_no) chNo = String(v.lesson_no).padStart(2,'0');
          return {
            tb: 'EXT',
            chNo,
            chTitle,
            unitLabel: 'UNIT 001',
            chKey: 'EXT ' + chNo,
          };
        }
        // 패턴 3 (fallback): category + lesson_no 사용 (MES/BTS/SIU)
        if (['MES','BTS','SIU'].includes(cat)) {
          const ch = v.lesson_no ? String(v.lesson_no).padStart(2,'0') : '01';
          return {
            tb: cat, chNo: ch, chTitle: '',
            unitLabel: 'UNIT 001',
            chKey: cat + ' ' + ch,
          };
        }
        return null;
      }

      function getAllChapters(tb) {
        if (!window._allVideos) return [];
        const map = new Map();
        for (const v of window._allVideos) {
          const p = parseVideo(v);
          if (!p || p.tb !== tb) continue;
          if (!map.has(p.chKey)) map.set(p.chKey, { chNo: p.chNo, chTitle: p.chTitle, count: 0 });
          map.get(p.chKey).count++;
        }
        return [...map.entries()]
          .map(([key, info]) => ({ key, ...info }))
          .sort((a,b) => a.chNo.localeCompare(b.chNo));
      }

      function getAllUnits(tb, chKey) {
        if (!window._allVideos) return [];
        const list = [];
        const seen = new Set();
        for (const v of window._allVideos) {
          const p = parseVideo(v);
          if (!p || p.tb !== tb || p.chKey !== chKey) continue;
          if (seen.has(p.unitLabel)) continue;
          seen.add(p.unitLabel);
          list.push({ label: p.unitLabel, video: v, parsed: p });
        }
        // 정렬: UNIT 1~9 → REVIEW → TEST
        list.sort((a,b) => {
          const score = (l) => {
            if (l === 'REVIEW') return 1000;
            if (l === 'TEST') return 1001;
            const m = l.match(/UNIT\s*(\d+)/);
            return m ? parseInt(m[1],10) : 999;
          };
          return score(a.label) - score(b.label);
        });
        return list;
      }

      function L() { try { return (window.getLang && window.getLang()) === 'en' ? 'en' : 'ko'; } catch(e){ return 'ko'; } }
      function T(ko, en) { return L() === 'en' ? en : ko; }

      function renderChapters() {
        const wrap = document.getElementById('chapter-list');
        const chapters = getAllChapters(curTb);
        const chStat = document.getElementById('ch-stat');
        const tbStat = document.getElementById('tb-stat');

        // 통계
        const total = (window._allVideos || []).filter(v => {
          const p = parseVideo(v); return p && p.tb === curTb;
        }).length;
        tbStat.textContent = total + T('개 영상', ' video' + (total !== 1 ? 's' : ''));
        chStat.textContent = '(' + chapters.length + T('개)', chapters.length !== 1 ? ')' : ')');

        if (!chapters.length) {
          wrap.innerHTML = '<div style="grid-column:1/-1;color:#94a3b8;font-size:12.5px;text-align:center;padding:20px">📭 ' +
            T('이 교재의 영상이 아직 등록되지 않았습니다.', 'No videos registered for this textbook yet.') +
            '<br><span style="font-size:11px;opacity:0.7">' +
            T('관리자가 YouTube URL 을 등록하면 여기에 자동 표시됩니다.', 'Videos will appear here once admin adds YouTube URLs.') +
            '</span></div>';
          document.getElementById('unit-area').style.display = 'none';
          return;
        }
        wrap.innerHTML = chapters.map(c => `
          <button class="chapter-pill ${c.key === curChapter ? 'active' : ''}" data-key="${c.key}">
            <span class="ch-num">${c.key} <span style="opacity:0.7">· ${c.count}${T('개', '')}</span></span>
            <span class="ch-title">${(c.chTitle || T('(제목 없음)','(no title)')).replace(/[<>"&]/g, '')}</span>
          </button>
        `).join('');
        wrap.querySelectorAll('.chapter-pill').forEach(b => {
          b.onclick = () => {
            curChapter = b.dataset.key;
            curUnit = null;
            renderChapters();
            renderUnits();
          };
        });
      }

      function renderUnits() {
        const area = document.getElementById('unit-area');
        const wrap = document.getElementById('unit-list');
        const unStat = document.getElementById('un-stat');
        if (!curChapter) { area.style.display = 'none'; return; }
        const units = getAllUnits(curTb, curChapter);
        unStat.textContent = '(' + curChapter + ' · ' + units.length + '개)';
        area.style.display = '';
        if (!units.length) { wrap.innerHTML = '<div style="grid-column:1/-1;color:#94a3b8;font-size:12px;padding:14px;text-align:center">이 챕터의 유닛이 없습니다.</div>'; return; }
        wrap.innerHTML = units.map(u => {
          const label = u.label.replace(/UNIT\s*0*(\d+)/i, (_, n) => 'UNIT ' + n);
          const special = (u.label === 'REVIEW' || u.label === 'TEST') ? u.label : '';
          return `<button class="unit-pill${u.label === curUnit ? ' active' : ''}" data-unit="${u.label}" ${special?'data-special="'+special+'"':''}>${label}</button>`;
        }).join('');
        wrap.querySelectorAll('.unit-pill').forEach(b => {
          b.onclick = () => {
            curUnit = b.dataset.unit;
            renderUnits();
            applyFilter();
          };
        });
      }

      function applyFilter() {
        const status = document.getElementById('tb-filter-status');
        if (!curChapter || !curUnit) {
          status.style.display = 'none';
          window._tbFiltered = null;
          if (window.renderAll) window.renderAll();
          return;
        }
        status.style.display = 'block';
        status.innerHTML = '🎯 필터: <b>' + curChapter + ' · ' + curUnit + '</b> ' +
          '<button onclick="window.clearTbFilter()" style="margin-left:10px;padding:3px 10px;background:rgba(239,68,68,0.18);color:#fca5a5;border:1px solid rgba(239,68,68,0.35);border-radius:6px;font-size:11px;cursor:pointer;font-weight:700">✕ 필터 해제</button>';
        // 비디오 필터링
        const filtered = (window._allVideos || []).filter(v => {
          const p = parseVideo(v);
          return p && p.tb === curTb && p.chKey === curChapter && p.unitLabel === curUnit;
        });
        window._tbFiltered = filtered;
        if (window.renderAll) window.renderAll();
        setTimeout(() => {
          document.getElementById('content')?.scrollIntoView({ behavior:'smooth', block:'start' });
        }, 100);
      }

      window.clearTbFilter = function(){
        curUnit = null;
        renderUnits();
        applyFilter();
      };

      // 교재 탭 클릭
      document.querySelectorAll('.tb-tab').forEach(b => {
        b.onclick = () => {
          document.querySelectorAll('.tb-tab').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          curTb = b.dataset.tb;
          curChapter = null;
          curUnit = null;
          renderChapters();
          document.getElementById('unit-area').style.display = 'none';
          applyFilter();
        };
      });

      // 비디오 로드 후 자동 렌더
      window.afterVideosLoaded = renderChapters;

      // 🌐 i18n: 언어 변경 시 동적 그리드 + content 다시 그리기
      window.addEventListener('mangoi:lang-changed', () => {
        renderChapters();
        if (curChapter) renderUnits();
        if (typeof window.renderAll === 'function') window.renderAll();
      });

      // URL ?textbook=BTS&chapter=BTS%2001&unit=UNIT%20001 지원
      window.addEventListener('load', () => {
        try {
          const p = new URLSearchParams(location.search);
          const tb = p.get('textbook');
          if (tb && ['MES','BTS','SIU'].includes(tb.toUpperCase())) {
            const tabBtn = document.querySelector('.tb-tab[data-tb="'+tb.toUpperCase()+'"]');
            if (tabBtn) setTimeout(() => tabBtn.click(), 800);
          }
        } catch(e){}
      });
    })();
  </script>

  <!-- 레벨 필터 바 제거됨 — 교재(MES/BTS/SIU) + Lesson 선택만 사용 -->

  <div id="content"><div class="empty">불러오는 중…</div></div>
</div>

<!-- 비디오 모달 -->
<div id="vid-modal" class="modal" onclick="if(event.target===this)closeModal()">
  <button class="modal-close" onclick="closeModal()">×</button>
  <div class="modal-body">
    <iframe id="vid-iframe" class="modal-iframe" allow="accelerometer;autoplay;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
    <div class="modal-info">
      <div class="modal-title" id="vid-title">-</div>
      <div class="modal-meta" id="vid-meta">-</div>
    </div>
  </div>
</div>

<script>
const esc = (s) => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const LEVEL_NAMES = {
  A1: { ko: '초급 1 (기초)', en: 'A1 — Beginner' },
  A2: { ko: '초급 2 (간단 표현)', en: 'A2 — Elementary' },
  B1: { ko: '중급 1 (일상 대화)', en: 'B1 — Intermediate' },
  B2: { ko: '중급 2 (자유 표현)', en: 'B2 — Upper-Intermediate' },
  C1: { ko: '고급 1 (능숙)', en: 'C1 — Advanced' },
  C2: { ko: '고급 2 (원어민 수준)', en: 'C2 — Mastery' },
};
let _allVideos = [];
let _activeLevel = '';
window._allVideos = _allVideos;
window._tbFiltered = null;  // 교재/레슨 필터 결과 (외부 핸들러에서 세팅)

async function loadVideos() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="empty">불러오는 중…</div>';
  try {
    const r = await fetch('/api/mango-videos');
    const d = await r.json();
    _allVideos = (d.items || d.videos || []).filter(v => v.youtube_id);
    window._allVideos = _allVideos;
    renderAll();
    // 챕터/유닛 네비게이션 동기화
    if (typeof window.afterVideosLoaded === 'function') {
      window.afterVideosLoaded();
    }
  } catch(e) {
    el.innerHTML = '<div class="empty"><b style="color:#f87171">로드 실패: ' + esc(e.message) + '</b><br><span style="font-size:11.5px;margin-top:6px;display:inline-block">잠시 후 다시 시도하세요</span></div>';
  }
}

window.renderAll = renderAll;
function renderAll() {
  const el = document.getElementById('content');
  const isFiltered = window._tbFiltered !== null;
  let videos = isFiltered ? window._tbFiltered : _allVideos;

  // i18n 헬퍼
  const isEn = (function(){ try { return (window.getLang && window.getLang()) === 'en'; } catch(e){ return false; } })();
  const t = (ko, en) => isEn ? en : ko;

  // 처음 진입 (필터 없음) — 학생 친화적 안내
  if (!isFiltered) {
    if (!videos.length) {
      el.innerHTML = `
        <div style="text-align:center;padding:60px 20px;background:linear-gradient(135deg,rgba(99,102,241,0.10),rgba(20,33,59,0.6));border:1px dashed rgba(148,163,184,0.25);border-radius:14px">
          <div style="font-size:50px;line-height:1;margin-bottom:14px">📚</div>
          <h3 style="margin:0 0 10px 0;color:#fbbf24;font-size:18px;font-weight:800">${t('학습을 시작해보세요!','Start Learning!')}</h3>
          <p style="color:#cbd5e1;font-size:13.5px;line-height:1.7;margin:0">
            ${t('위에서','Select a lesson from')} <b style="color:#6ee7b7">MES</b> · <b style="color:#c4b5fd">BTS</b> · <b style="color:#fcd34d">SIU</b> ${t('교재 중','textbooks above.')}<br>
            ${t('원하는 <b>Lesson 번호</b>를 선택하면 영상이 표시됩니다.','Pick a chapter and unit, and the video will appear here.')}
          </p>
        </div>`;
      return;
    }
    videos = videos.slice(0, 6);
    el.innerHTML = `
      <div style="margin-bottom:12px;padding:10px 14px;background:rgba(99,102,241,0.10);border-left:3px solid #8b5cf6;border-radius:8px;font-size:12.5px;color:#c4b5fd">
        💡 <b>${t('최근 등록된 영상','Recently added')}</b> — ${t('교재의 Lesson 버튼을 선택하면 해당 레슨만 표시됩니다.','Pick a Lesson to filter videos.')}
      </div>
      ${renderLevelSection(t('최근 등록','Recently Added'), videos)}`;
    return;
  }

  // 필터 활성화 상태
  if (!videos.length) {
    el.innerHTML = `
      <div style="text-align:center;padding:50px 20px;background:rgba(20,33,59,0.6);border:1px dashed rgba(251,191,36,0.3);border-radius:12px">
        <div style="font-size:42px;margin-bottom:10px">🎬</div>
        <h3 style="color:#fbbf24;font-size:16px;font-weight:800;margin:0 0 8px 0">${t('아직 이 레슨의 영상이 없어요','No videos for this lesson yet')}</h3>
        <p style="color:#a3b3d1;font-size:12.5px;margin:0;line-height:1.6">${t('관리자가 곧 추가할 예정입니다.','Admin will add them soon.')}<br>${t('다른 Lesson 을 선택해보거나 잠시 후 다시 확인해주세요.','Try a different Lesson or check back later.')}</p>
        <button onclick="window.clearTbFilter()" style="margin-top:14px;padding:9px 18px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a;border:0;border-radius:8px;font-weight:800;cursor:pointer;font-size:12.5px">${t('↩ 다른 영상 보기','↩ Browse other videos')}</button>
      </div>`;
    return;
  }

  if (_activeLevel) {
    // 단일 레벨만 표시
    el.innerHTML = renderLevelSection(_activeLevel, videos);
  } else {
    // 모든 레벨 섹션
    const byLevel = {};
    videos.forEach(v => {
      const k = v.level || '미분류';
      if (!byLevel[k]) byLevel[k] = [];
      byLevel[k].push(v);
    });
    const ORDER = ['A1','A2','B1','B2','C1','C2','미분류'];
    el.innerHTML = ORDER.filter(l => byLevel[l]).map(l => renderLevelSection(l, byLevel[l])).join('');
  }
}

function renderLevelSection(level, videos) {
  const meta = LEVEL_NAMES[level] || { ko: level, en: level };
  const cls = `lv-${level}`;
  return `
    <div class="level-section">
      <div class="level-header ${cls}">
        <span class="level-tag ${cls}">${esc(level)}</span>
        <span class="level-title">${esc(meta.ko)}</span>
        <span class="level-desc">${videos.length}개 영상</span>
      </div>
      <div class="video-grid">
        ${videos.sort((a,b) => (a.lesson_no||0) - (b.lesson_no||0) || (a.sort_order||0) - (b.sort_order||0)).map(v => {
          const thumb = v.thumbnail_url || `https://img.youtube.com/vi/${esc(v.youtube_id)}/mqdefault.jpg`;
          const dur = v.duration_sec ? `${Math.floor(v.duration_sec/60)}:${String(v.duration_sec%60).padStart(2,'0')}` : null;
          return `<div class="video-card" onclick="openVideo('${esc(v.youtube_id)}', ${JSON.stringify(v).replace(/"/g,'&quot;')})">
            <div class="thumb">
              <img src="${esc(thumb)}" alt="${esc(v.title)}" loading="lazy" onerror="this.style.display='none'" />
              <div class="thumb-play">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              </div>
              ${dur ? `<div class="thumb-dur">${dur}</div>` : ''}
            </div>
            <div class="v-body">
              <div class="v-meta">
                ${v.lesson_no ? `<span class="v-lesson">Lesson ${v.lesson_no}</span>` : ''}
                ${v.category ? `<span class="v-lesson">· ${esc(v.category)}</span>` : ''}
              </div>
              <div class="v-title">${esc(v.title)}</div>
              ${v.description ? `<div class="v-desc">${esc(v.description)}</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

window.openVideo = function(youtubeId, v) {
  document.getElementById('vid-iframe').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0`;
  document.getElementById('vid-title').textContent = v.title || '';
  const meta = [
    v.level ? `📊 ${v.level}` : '',
    v.lesson_no ? `📚 Lesson ${v.lesson_no}` : '',
    v.category ? `🏷 ${v.category}` : '',
    v.duration_sec ? `⏱ ${Math.floor(v.duration_sec/60)}:${String(v.duration_sec%60).padStart(2,'0')}` : '',
  ].filter(Boolean).join(' · ');
  document.getElementById('vid-meta').innerHTML = meta + (v.description?`<br><br>${esc(v.description)}`:'');
  document.getElementById('vid-modal').classList.add('active');
};
window.closeModal = function() {
  document.getElementById('vid-modal').classList.remove('active');
  document.getElementById('vid-iframe').src = '';
};
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// URL ?textbook=MES&lesson=3 자동 필터 (선택사항)
(function(){
  try {
    const params = new URLSearchParams(location.search);
    const tb = params.get('textbook');
    const ln = params.get('lesson');
    if (tb && ln) {
      // 페이지 로드 후 자동 클릭
      setTimeout(() => {
        const pill = document.querySelector(`.lesson-pill[data-tb="${tb}"][data-lesson="${ln}"]`);
        if (pill) pill.click();
      }, 600);
    }
  } catch(e){}
})();

loadVideos();
</script>
