<!DOCTYPE html>
<html lang="ko">
<head>






<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<title>MBTI 매칭 — 망고아이</title>
<link rel="icon" type="image/png" href="/img/icon-192.png">
<link rel="icon" href="data:," />
<script src="/js/mango-i18n.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800;900&family=Cormorant+Garamond:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:radial-gradient(ellipse at top right,rgba(79,124,255,0.22),transparent 50%),radial-gradient(ellipse at bottom left,rgba(167,139,250,0.16),transparent 45%),linear-gradient(180deg,#0a1530,#0b1c44,#0f1d40);color:#e6ecff;font-family:'Noto Sans KR',sans-serif;padding-bottom:80px}
  .wrap{max-width:720px;margin:0 auto;padding:28px 18px}
  .brand{text-align:center;margin-bottom:24px}
  .brand-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;background:linear-gradient(180deg,#fff4cc,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:32px;letter-spacing:1px;display:block}
  .sub{color:#a3b3d1;font-size:12.5px;margin-top:6px;line-height:1.6}
  .card{background:#142950;border:1px solid rgba(99,102,241,0.25);border-radius:14px;padding:22px;margin-bottom:14px}
  h2{font-size:17px;font-weight:800;color:#fbbf24;margin-bottom:12px}
  .mbti-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .mbti-btn{padding:14px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:10px;color:#cbd5e1;cursor:pointer;font-weight:800;font-size:14px;font-family:inherit;transition:all .15s}
  .mbti-btn:hover{background:rgba(79,124,255,0.18);border-color:rgba(79,124,255,0.5);color:#fff;transform:translateY(-2px)}
  .mbti-btn.selected{background:linear-gradient(135deg,#4f7cff,#3b82f6);color:#fff;border-color:#4f7cff;box-shadow:0 6px 18px -4px rgba(79,124,255,0.5)}
  .teacher-card{background:rgba(255,255,255,0.04);border:1px solid rgba(99,102,241,0.20);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:center;cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden}
  .teacher-card:hover{background:rgba(99,102,241,0.18);border-color:rgba(99,102,241,0.5);transform:translateY(-2px);box-shadow:0 14px 30px -10px rgba(0,0,0,0.5)}
  .teacher-card.top{background:linear-gradient(135deg,rgba(251,191,36,0.15),rgba(245,158,11,0.06));border-color:rgba(251,191,36,0.45);box-shadow:0 8px 24px -8px rgba(251,191,36,0.25)}
  .teacher-card.top:hover{background:linear-gradient(135deg,rgba(251,191,36,0.25),rgba(245,158,11,0.12));box-shadow:0 16px 36px -10px rgba(251,191,36,0.4)}
  .teacher-photo{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#4f7cff,#3b82f6);overflow:hidden;flex-shrink:0;border:2px solid rgba(99,102,241,0.4);display:flex;align-items:center;justify-content:center;transition:all .2s ease}
  .teacher-card:hover .teacher-photo{transform:scale(1.06);border-color:#fbbf24;box-shadow:0 6px 16px -4px rgba(251,191,36,0.4)}
  .teacher-card.top .teacher-photo{border-color:#fbbf24;box-shadow:0 6px 16px -4px rgba(251,191,36,0.45)}
  .teacher-photo img{width:100%;height:100%;object-fit:cover}
  .teacher-photo-fallback{font-size:24px;font-weight:900;color:#fff}
  .match-score{font-size:28px;font-weight:900;min-width:56px;text-align:center}
  .match-score.high{color:#34d399}
  .match-score.mid{color:#fbbf24}
  .match-score.low{color:#a3b3d1}
  /* hover 시 확장 영역 */
  .teacher-extra{max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .2s ease;opacity:0}
  .teacher-card:hover .teacher-extra{max-height:200px;opacity:1;margin-top:10px}
  .teacher-extra-inner{padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(99,102,241,0.25);border-radius:10px;display:flex;gap:10px;flex-wrap:wrap}
  .teacher-cta{flex:1;min-width:130px;padding:10px 14px;font-weight:800;border:0;border-radius:8px;cursor:pointer;font-size:12.5px;font-family:inherit;transition:transform .15s}
  .teacher-cta:hover{transform:translateY(-2px)}
  .cta-enroll{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a}
  .cta-inquiry{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
  .cta-trial{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff}
  /* 카드 본문은 가로 — extra 는 아래로 떨어지도록 wrapper */
  .teacher-card-row{display:flex;gap:14px;align-items:center;width:100%}
  .teacher-card-content{flex:1;min-width:0}
  .home-btn{position:fixed;top:14px;right:14px;z-index:999;padding:9px 18px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a;text-decoration:none;font-weight:800;border-radius:99px;font-size:13px}
  .help{font-size:11.5px;color:#6b7a99;margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<a class="home-btn" href="/">🏠 <span data-ko="홈" data-en="Home">홈</span></a>

<!-- 🔊 좌상단 — 음성 끄기/켜기 토글 -->
<button id="mbti-audio-toggle" onclick="toggleMbtiAudio()" style="position:fixed;top:14px;left:14px;z-index:999;padding:9px 14px;background:rgba(20,41,80,0.85);color:#fbbf24;border:1px solid rgba(251,191,36,0.4);border-radius:99px;cursor:pointer;font-size:12px;font-weight:700;backdrop-filter:blur(8px);font-family:'Noto Sans KR',sans-serif">
  <span id="mbti-audio-icon">🔊</span> <span id="mbti-audio-label" data-ko="음성 끄기" data-en="Mute">음성 끄기</span>
</button>

<script>
// 🔊 MBTI 페이지 안내 음성 자동 재생 (홈에서 클릭 진입 시)
(function(){
  let shouldPlay = false;
  try { shouldPlay = sessionStorage.getItem('mangoi_play_mbti_audio') === '1'; } catch(e){}
  try { if (localStorage.getItem('mangoi_mbti_audio_muted') === '1') shouldPlay = false; } catch(e){}
  try { sessionStorage.removeItem('mangoi_play_mbti_audio'); } catch(e){}

  // 끄기 버튼 상태 동기화
  function updateBtn() {
    const muted = localStorage.getItem('mangoi_mbti_audio_muted') === '1';
    const icon = document.getElementById('mbti-audio-icon');
    const label = document.getElementById('mbti-audio-label');
    if (!icon || !label) return;
    if (muted) {
      icon.textContent = '🔇';
      label.textContent = (window.getLang && window.getLang() === 'en') ? 'Unmute' : '음성 켜기';
      label.setAttribute('data-ko', '음성 켜기');
      label.setAttribute('data-en', 'Unmute');
    } else {
      icon.textContent = '🔊';
      label.textContent = (window.getLang && window.getLang() === 'en') ? 'Mute' : '음성 끄기';
      label.setAttribute('data-ko', '음성 끄기');
      label.setAttribute('data-en', 'Mute');
    }
  }
  document.addEventListener('DOMContentLoaded', updateBtn);
  if (document.readyState !== 'loading') updateBtn();
  window.addEventListener('mangoi:lang-changed', updateBtn);

  // 토글 핸들러
  window.toggleMbtiAudio = function() {
    const muted = localStorage.getItem('mangoi_mbti_audio_muted') === '1';
    if (muted) {
      localStorage.removeItem('mangoi_mbti_audio_muted');
      alert(window.getLang && window.getLang() === 'en' ? '🔊 Audio guide enabled.' : '🔊 음성 안내가 켜졌어요.');
    } else {
      localStorage.setItem('mangoi_mbti_audio_muted', '1');
      document.querySelectorAll('audio').forEach(a => { try { a.pause(); } catch(e){} });
      const t = document.getElementById('mbti-audio-toast');
      if (t) t.remove();
      alert(window.getLang && window.getLang() === 'en' ? '🔇 Audio guide muted.' : '🔇 음성 안내가 꺼졌어요.');
    }
    updateBtn();
  };

  if (!shouldPlay) return;

  // 자동 재생 + 토스트
  const audio = new Audio('/audio/MBTI.wav');
  audio.volume = 0.5;
  audio.play().catch(() => {});

  const toast = document.createElement('div');
  toast.id = 'mbti-audio-toast';
  toast.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(20,41,80,0.95);color:#fbbf24;border:1px solid rgba(251,191,36,0.4);border-radius:12px;padding:12px 16px;font-size:13px;font-family:"Noto Sans KR",sans-serif;display:flex;align-items:center;gap:12px;box-shadow:0 12px 32px -8px rgba(0,0,0,0.5);backdrop-filter:blur(8px);animation:mat-slide 0.35s ease-out';
  toast.innerHTML = `
    <span style="display:inline-flex;align-items:center;gap:6px">🔊 <b>MBTI 매칭 안내</b></span>
    <button id="mat-stop" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#e6ecff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11.5px;font-weight:700">⏸ 멈춤</button>
  `;
  const style = document.createElement('style');
  style.textContent = '@keyframes mat-slide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}';
  document.head.appendChild(style);
  document.body.appendChild(toast);
  document.getElementById('mat-stop').onclick = function() { try { audio.pause(); } catch(e){} toast.remove(); };
  audio.addEventListener('ended', () => { try { toast.remove(); } catch(e){} });
})();
</script>

<div class="wrap">
  <div class="brand">
    <span class="brand-logo">🧠 MBTI Matching</span>
    <div class="sub" data-ko="자신의 MBTI 를 선택하면 잘 맞을 강사를 추천해드려요" data-en="Select your MBTI and we'll recommend compatible teachers">자신의 MBTI 를 선택하면 잘 맞을 강사를 추천해드려요</div>
  </div>

  <div class="card">
    <h2 data-ko="① 자신의 MBTI 를 선택하세요" data-en="① Pick Your MBTI">① 자신의 MBTI 를 선택하세요</h2>
    <div class="mbti-grid" id="mbti-grid"></div>
    <div style="margin-top:14px;padding:14px 18px;background:linear-gradient(135deg,rgba(251,191,36,0.18),rgba(245,158,11,0.08));border:1px solid rgba(251,191,36,0.45);border-radius:12px;text-align:center">
      <div style="font-weight:800;color:#fbbf24;font-size:14px;margin-bottom:6px" data-ko="🤔 자기 MBTI 모르시면" data-en="🤔 Don't know your MBTI?">🤔 자기 MBTI 모르시면</div>
      <div style="font-size:12.5px;color:#cbd5e1;margin-bottom:10px" data-ko="지금 바로 테스트 해보세요! 12문항 · 2~3분 소요" data-en="Take the quick test now! 12 questions · 2-3 min">지금 바로 테스트 해보세요! 12문항 · 2~3분 소요</div>
      <a href="/mbti-test.html" style="display:inline-block;padding:10px 22px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a;text-decoration:none;font-weight:800;border-radius:99px;font-size:13.5px;box-shadow:0 6px 16px -4px rgba(251,191,36,0.4)">📝 <span data-ko="간단 MBTI 테스트 시작" data-en="Start Quick Test">간단 MBTI 테스트 시작</span></a>
    </div>
    <div class="help" style="margin-top:10px" data-ko="💡 또는 16personalities.com 에서 정밀 검사 가능" data-en="💡 Or do a detailed test at 16personalities.com">💡 또는 <a href="https://www.16personalities.com/ko" target="_blank" style="color:#93c5fd;text-decoration:underline">16personalities.com</a> 에서 정밀 검사 가능</div>
    <button id="match-btn" onclick="doMatch()" disabled style="display:block;width:100%;margin-top:14px;padding:13px;background:linear-gradient(135deg,#4f7cff,#3b82f6);color:#fff;border:0;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;opacity:0.5">🔍 <span data-ko="매칭 시작" data-en="Start Matching">매칭 시작</span></button>
  </div>

  <div id="result-card" class="card" style="display:none">
    <h2>🌟 <span data-ko="잘 맞는 강사 TOP 5" data-en="Top 5 Matched Teachers">잘 맞는 강사 TOP 5</span></h2>
    <div id="result-list"></div>
    <div class="help" style="margin-top:10px" data-ko="💡 매칭 점수는 단순 참고용입니다. 실제 수업 만족도는 강사와 학생의 노력에 달려있어요." data-en="💡 Score is just a guide. Real chemistry depends on effort.">💡 매칭 점수는 단순 참고용입니다. 실제 수업 만족도는 강사와 학생의 노력에 달려있어요.</div>
  </div>
</div>

<script>
const MBTI_TYPES = ['INTJ','INTP','ENTJ','ENTP','INFJ','INFP','ENFJ','ENFP','ISTJ','ISFJ','ESTJ','ESFJ','ISTP','ISFP','ESTP','ESFP'];
const esc = (s) => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
let selectedMbti = null;

// MBTI 버튼 렌더
const grid = document.getElementById('mbti-grid');
grid.innerHTML = MBTI_TYPES.map(m => `<button class="mbti-btn" onclick="pickMbti('${m}')" id="mbti-${m}">${m}</button>`).join('');

// URL 파라미터 ?mbti=XXXX 자동 선택 + 매칭 시작 (테스트 페이지에서 돌아온 경우)
(function(){
  try {
    const urlMbti = new URLSearchParams(location.search).get('mbti');
    if (urlMbti && /^[IE][NS][TF][JP]$/.test(urlMbti.toUpperCase())) {
      const m = urlMbti.toUpperCase();
      setTimeout(() => {
        pickMbti(m);
        // 테스트 완료 안내 토스트
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;top:90px;left:50%;transform:translateX(-50%);z-index:99999;background:rgba(20,41,80,0.95);color:#fbbf24;border:1px solid rgba(251,191,36,0.45);border-radius:12px;padding:12px 20px;font-size:13.5px;font-weight:700;box-shadow:0 12px 32px -8px rgba(0,0,0,0.5);backdrop-filter:blur(8px)';
        toast.innerHTML = `✅ 테스트 결과: <b style="font-size:16px;color:#fff;margin:0 4px">${m}</b> — 자동 선택됐어요!`;
        document.body.appendChild(toast);
        setTimeout(() => { try { toast.remove(); } catch(e){} }, 4000);
        // 1초 후 자동 매칭 시작
        setTimeout(() => doMatch(), 1000);
      }, 200);
    }
  } catch(e){}
})();

window.pickMbti = function(m) {
  selectedMbti = m;
  document.querySelectorAll('.mbti-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('mbti-'+m).classList.add('selected');
  const btn = document.getElementById('match-btn');
  btn.disabled = false; btn.style.opacity = '1';
};

// 강사 클릭 → 신청 모달 또는 신규상담 페이지로
//   type: 'inquiry'(기본) | 'trial' | 'enroll'
window.bookTeacher = function(teacherUid, teacherName, mbti, score, type) {
  type = type || 'inquiry';
  // 선택된 강사 정보를 sessionStorage 에 저장 → 홈/신규상담 모달에서 prefill
  const data = {
    teacher_uid: teacherUid,
    teacher_name: teacherName,
    teacher_mbti: mbti,
    match_score: score,
    request_type: type,
    selected_at: Date.now(),
  };
  try { sessionStorage.setItem('mangoi_selected_teacher', JSON.stringify(data)); } catch(e){}

  // type 별 분기
  if (type === 'trial') {
    // 무료체험 → 신규상담 모달로 (메시지에 자동 prefill)
    location.href = '/?go=trial&teacher=' + encodeURIComponent(teacherUid);
  } else if (type === 'enroll') {
    // 정규 수강 → 결제/수강신청
    location.href = '/?go=enroll&teacher=' + encodeURIComponent(teacherUid);
  } else {
    // 기본: 신규상담 (강사 자동 선택된 상태)
    location.href = '/?go=inquiry&teacher=' + encodeURIComponent(teacherUid);
  }
};

window.doMatch = async function() {
  if (!selectedMbti) return;
  const card = document.getElementById('result-card');
  const btn = document.getElementById('match-btn');
  const btnLabel = btn ? btn.querySelector('span[data-ko]') : null;
  // 🔄 토글: 이미 열려있으면 닫기
  if (card.style.display === 'block') {
    card.style.display = 'none';
    if (btnLabel) { btnLabel.setAttribute('data-ko','매칭 시작'); btnLabel.setAttribute('data-en','Start Matching'); btnLabel.textContent = (window.getLang && window.getLang() === 'en') ? 'Start Matching' : '매칭 시작'; }
    if (btn) btn.innerHTML = '🔍 <span data-ko="매칭 시작" data-en="Start Matching">매칭 시작</span>';
    return;
  }
  // 열기
  const out = document.getElementById('result-list');
  card.style.display = 'block';
  if (btn) btn.innerHTML = '🔽 <span data-ko="결과 닫기" data-en="Close Results">결과 닫기</span>';
  out.innerHTML = '<div style="color:#a3b3d1;text-align:center;padding:20px">매칭 중…</div>';
  // 결과 영역으로 부드럽게 스크롤
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  try {
    const r = await fetch('/api/mbti/match', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mbti: selectedMbti }) });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    if (!d.top_matches || !d.top_matches.length) {
      out.innerHTML = '<div style="text-align:center;color:#a3b3d1;padding:30px"><b style="color:#fbbf24">아직 등록된 강사 MBTI 가 없어요</b><br><span style="font-size:11.5px">관리자가 강사 MBTI 정보를 등록해야 매칭이 가능합니다</span></div>';
      return;
    }
    out.innerHTML = d.top_matches.map((t, i) => {
      const tier = t.match_score >= 80 ? 'high' : t.match_score >= 60 ? 'mid' : 'low';
      const isTop = i === 0;
      const fallback = `https://api.dicebear.com/7.x/lorelei/svg?seed=${encodeURIComponent(t.teacher_name||t.teacher_uid)}&backgroundColor=fbbf24,b6e3f4,c0aede,fcd0a1`;
      const photoUrl = t.photo_url || fallback;
      const tname = (t.teacher_name||t.teacher_uid).replace(/'/g,'&#39;');
      return `<div class="teacher-card ${isTop?'top':''}" onclick="bookTeacher('${esc(t.teacher_uid)}','${esc(tname)}','${esc(t.mbti)}',${t.match_score})">
        <div style="display:flex;gap:14px;align-items:center;width:100%">
          <div class="teacher-photo"><img src="${esc(photoUrl)}" alt="${esc(t.teacher_name)}" onerror="this.parentElement.innerHTML='<div class=&quot;teacher-photo-fallback&quot;>${(t.teacher_name||'?').charAt(0).toUpperCase()}</div>'" /></div>
          <div class="match-score ${tier}">${t.match_score}<div style="font-size:9px;letter-spacing:1px;font-weight:700;color:#a3b3d1">SCORE</div></div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;color:#fff;font-size:14px">${esc(t.teacher_name)}${isTop?' 🥇':''} <span style="display:inline-block;padding:1px 8px;background:rgba(79,124,255,0.25);color:#a5b4fc;border-radius:99px;font-size:10.5px;font-weight:800;margin-left:4px">${esc(t.mbti)}</span></div>
            ${t.teaching_style?`<div style="font-size:11.5px;color:#c4b5fd;margin-top:3px">🎓 ${esc(t.teaching_style)}</div>`:''}
            ${t.hobby?`<div style="font-size:11.5px;color:#a3b3d1;margin-top:2px">🎨 ${esc(t.hobby)}</div>`:''}
            ${t.intro?`<div style="font-size:11.5px;color:#cbd5e1;margin-top:4px;line-height:1.5">${esc(t.intro)}</div>`:''}
          </div>
        </div>
        <!-- hover 자동 펼침: 큰 CTA 1개 + 무료체험 보조 -->
        <div class="teacher-extra" style="width:100%">
          <div class="teacher-extra-inner">
            <button class="teacher-cta cta-trial" onclick="event.stopPropagation();bookTeacher('${esc(t.teacher_uid)}','${esc(tname)}','${esc(t.mbti)}',${t.match_score},'trial')" style="flex:0 0 auto">🎁 무료체험</button>
            <button class="teacher-cta cta-enroll" onclick="event.stopPropagation();bookTeacher('${esc(t.teacher_uid)}','${esc(tname)}','${esc(t.mbti)}',${t.match_score},'inquiry')">📝 ${esc(t.teacher_name)} 선생님과 수업 신청하기 →</button>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    out.innerHTML = '<div style="color:#f87171;padding:20px;text-align:center">❌ ' + esc(e.message) + '</div>';
  }
};
