<!doctype html>
<html lang="ko">
<head>






  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5" />
  <title>🧠 1분 단어 퀴즈 — Mangoi</title>
  <link rel="icon" href="/mangoi-favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#f2f6ff" />
  <script src="/js/mango-i18n.js" defer></script>
  <style>
    :root { --bg:#f2f6ff; --card:#ffffff; --text:#1f2b4a; --text2:#5a6a8f;
      --gold:#d97706; --green:#10b981; --red:#ef4444; --blue:#3b82f6;
      --border:rgba(217,119,6,0.28); }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; line-height:1.55; }
    .top { display:flex; align-items:center; gap:12px; padding:14px 18px;
      background:rgba(255,255,255,0.93); position:sticky; top:0; z-index:50;
      backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
    .top a { color:var(--text); text-decoration:none; font-weight:700; font-size:17px; }
    .top-nav-btn { display:flex; align-items:center; justify-content:center; width:46px; height:46px;
      background:#ffffff; color:var(--text); border:1px solid var(--border);
      border-radius:12px; font-size:22px; font-weight:800; cursor:pointer; line-height:1;
      text-decoration:none; transition:background .15s; -webkit-tap-highlight-color:transparent; }
    .top-nav-btn:hover { background:rgba(251,191,36,0.15); }
    .top h1 { margin:0; font-size:24px; font-weight:800; flex:1; }
    .wrap { max-width:940px; margin:0 auto; padding:26px 20px; }
    .intro { background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(245,158,11,0.06));
      border:1px solid rgba(251,191,36,0.30); border-radius:16px; padding:28px; margin-bottom:18px; }
    .intro h2 { margin:0 0 12px 0; font-size:30px; color:var(--gold); font-weight:800; }
    .intro p { margin:8px 0; color:var(--text2); font-size:18px; line-height:1.65; }
    .start-btn { display:block; width:100%; padding:22px; margin-top:16px;
      background:linear-gradient(135deg,#10b981,#059669); color:#fff; border:0;
      border-radius:14px; font-size:24px; font-weight:800; cursor:pointer;
      box-shadow:0 6px 18px -2px rgba(16,185,129,0.4); }
    .start-btn:hover { transform:translateY(-1px); filter:brightness(1.05); }
    .start-btn:disabled { background:#94a3b8; cursor:not-allowed; box-shadow:none; }
    .progress-bar { height:9px; background:rgba(31,43,74,0.10); border-radius:99px; overflow:hidden; margin-bottom:14px; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#fbbf24,#f59e0b); transition:width .3s; border-radius:99px; }
    .quiz-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:30px; margin-bottom:14px; }
    .q-num { font-size:16px; color:var(--gold); font-weight:800; letter-spacing:0.5px; margin-bottom:8px; }
    .q-text { font-size:28px; font-weight:800; color:var(--text); margin-bottom:8px; line-height:1.4; }
    .q-hint { font-size:16px; color:var(--text2); font-style:italic; margin-bottom:18px; }
    .opt { display:block; width:100%; text-align:left; padding:18px 22px; margin-bottom:10px;
      background:#ffffff; color:var(--text); border:1px solid rgba(90,106,143,0.35);
      border-radius:12px; cursor:pointer; font-size:20px; font-weight:600; font-family:inherit;
      transition:all .15s; }
    .opt:hover { background:rgba(251,191,36,0.12); border-color:rgba(251,191,36,0.5); transform:translateX(2px); }
    .opt.correct { background:rgba(16,185,129,0.14); border-color:#10b981; color:#047857; }
    .opt.wrong { background:rgba(239,68,68,0.12); border-color:#ef4444; color:#b91c1c; }
    .opt:disabled { cursor:default; }
    .opt-prefix { display:inline-block; width:32px; height:32px; line-height:32px; text-align:center;
      background:rgba(251,191,36,0.18); color:var(--gold); border-radius:50%; font-weight:800;
      font-size:16px; margin-right:12px; }
    .nav-btns { display:flex; gap:10px; margin-top:14px; }
    .nav-btn { flex:1; padding:17px; background:#ffffff; color:var(--text);
      border:1px solid var(--border); border-radius:12px; font-weight:700; cursor:pointer;
      font-size:18px; font-family:inherit; }
    .nav-btn:hover { background:rgba(251,191,36,0.15); }
    .nav-btn.primary { background:linear-gradient(135deg,var(--gold),#f59e0b); color:#1a1a1a; border:0; }
    .result-card { text-align:center; padding:36px 22px; }
    .result-score { font-size:76px; font-weight:900; line-height:1; }
    .result-label { font-size:19px; color:var(--text2); margin-top:8px; }
    .result-msg { margin-top:16px; padding:16px 20px; background:rgba(251,191,36,0.10);
      border-radius:12px; font-size:18px; color:#92400e; line-height:1.6; }
    .lv-pick, .topic-pick {
      padding:9px 16px; background:#ffffff; color:var(--text2);
      border:1px solid rgba(90,106,143,0.35); border-radius:99px;
      font-size:16px; font-weight:700; cursor:pointer; font-family:inherit;
      transition:all .15s;
    }
    .lv-pick:hover, .topic-pick:hover { background:rgba(251,191,36,0.15); color:#b45309; border-color:rgba(217,119,6,0.5); }
    .lv-pick.active { background:linear-gradient(135deg,#10b981,#059669); color:#fff; border-color:#10b981; box-shadow:0 3px 8px rgba(16,185,129,0.4); }
    .topic-pick.active { background:linear-gradient(135deg,#3b82f6,#1d4ed8); color:#fff; border-color:#3b82f6; box-shadow:0 3px 8px rgba(59,130,246,0.4); }

    /* ── 🧒/🧑‍🎓 연령 모드 토글 ── */
    .mode-toggle { display:flex; gap:4px; background:#ffffff; border:1px solid var(--border); border-radius:99px; padding:4px; }
    .mode-btn { border:0; background:transparent; font-size:22px; width:46px; height:38px; border-radius:99px; cursor:pointer; line-height:1; }
    .mode-btn.active { background:linear-gradient(135deg,#fbbf24,#f59e0b); box-shadow:0 2px 6px rgba(245,158,11,0.4); }

    /* ── 공통: 발음 버튼 / 피드백 ── */
    .say-btn { background:rgba(251,191,36,0.14); color:var(--gold); border:1px solid rgba(251,191,36,0.4);
      border-radius:99px; padding:9px 18px; font-weight:800; cursor:pointer; font-size:17px; font-family:inherit; }
    .say-btn:hover { background:rgba(251,191,36,0.24); }
    .say-btn.sm { padding:6px 14px; font-size:16px; }
    .say-btn.xs { padding:4px 11px; font-size:16px; margin-right:6px; }
    .fb { margin-top:16px; padding:14px 18px; border-radius:12px; font-size:18px; font-weight:700; line-height:1.5; }
    .fb.ok { background:rgba(16,185,129,0.14); color:#047857; }
    .fb.no { background:rgba(239,68,68,0.10); color:#b91c1c; }
    .fb .xp-plus { color:#b45309; font-weight:900; margin-left:4px; }
    .fb .spd { color:#0369a1; margin-left:4px; }

    /* ── 🧒 키즈 모드 ── */
    .kid-head { display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:12px; }
    .kid-mascot { width:58px; height:58px; border-radius:50%; object-fit:cover; box-shadow:0 3px 10px -2px rgba(245,158,11,0.5); }
    .kid-mascot.bounce { animation:mBounce .55s; }
    @keyframes mBounce { 0%,100%{transform:translateY(0) rotate(0)} 30%{transform:translateY(-13px) rotate(-9deg)} 60%{transform:translateY(0) rotate(7deg)} }
    .kid-stars { font-size:30px; letter-spacing:3px; }
    .kid-word { text-align:center; display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:10px; }
    .kid-emoji { font-size:100px; line-height:1; animation:floaty 3s ease-in-out infinite; }
    @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .quiz-card.kids .q-text { font-size:30px; text-align:center; }
    .opts-kids .opt { font-size:24px; padding:20px 22px; border-radius:16px; font-weight:700; }
    .opts-kids .opt:hover { transform:scale(1.02); }
    .star-pop { position:fixed; font-size:38px; pointer-events:none; z-index:99999; animation:starUp 1s ease-out forwards; }
    @keyframes starUp { 0%{opacity:1;transform:translateY(0) scale(.6)} 100%{opacity:0;transform:translateY(-95px) scale(1.5)} }
    .result-emoji { font-size:76px; line-height:1; margin-bottom:8px; }

    /* ── 🧑‍🎓 챌린지 모드 ── */
    .ch-stats { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-weight:800; font-size:18px; }
    .ch-combo { color:#ea580c; }
    .ch-xp { color:#b45309; }
    .ch-word { text-align:center; display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:12px; }
    .ch-word-txt { font-size:44px; font-weight:900; color:var(--text); letter-spacing:.5px; }
    .timer-wrap { height:9px; background:rgba(31,43,74,0.10); border-radius:99px; overflow:hidden; margin-bottom:14px; }
    .timer-bar { height:100%; width:100%; background:linear-gradient(90deg,#ef4444,#f59e0b,#10b981); transition:width .1s linear; border-radius:99px; }

    /* ── 오답 노트 ── */
    .wrong-note { margin-top:18px; text-align:left; background:#ffffff; border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
    .wn-title { font-weight:800; color:var(--gold); margin-bottom:10px; font-size:18px; }
    .wn-item { padding:11px 0; border-bottom:1px solid rgba(148,163,184,0.12); font-size:18px; }
    .wn-item:last-child { border-bottom:0; }
    .wn-ex { color:var(--text2); font-size:16px; margin-top:4px; font-style:italic; }
    .confetti-pc { position:fixed; top:-20px; font-size:26px; pointer-events:none; z-index:99998; animation:confFall linear forwards; }
    @keyframes confFall { to { transform:translateY(105vh) rotate(360deg); opacity:.2; } }

    /* ── 유형 배지 / 진행 점 / 랭크 / 듣기·영어단어 프롬프트 ── */
    .q-type { text-align:center; font-size:16px; font-weight:800; color:#2563eb; letter-spacing:.4px; margin-bottom:12px; }
    .qdots { display:flex; gap:8px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
    .qdot { width:12px; height:12px; border-radius:50%; background:rgba(31,43,74,0.16); transition:transform .15s,background .15s; }
    .qdot.cur { background:#fbbf24; transform:scale(1.35); box-shadow:0 0 8px rgba(251,191,36,0.6); }
    .qdot.ok { background:#10b981; }
    .qdot.no { background:#ef4444; }
    .ch-rank { color:#7c3aed; font-size:16px; font-weight:800; }

    /* ── 💰 결과 보상 카드 / 🎯 오답 재도전 ── */
    .mq-earn { margin-top:12px; display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
      padding:12px 16px; background:linear-gradient(135deg,rgba(251,191,36,0.18),rgba(245,158,11,0.08));
      border:1px solid rgba(251,191,36,0.45); border-radius:12px;
      animation:earnPop .45s cubic-bezier(.34,1.56,.64,1); }
    .mq-earn .amt { font-size:28px; font-weight:900; color:#b45309; }
    .mq-earn .bal { font-size:16px; color:var(--text2); font-weight:600; }
    @keyframes earnPop { 0%{transform:scale(.6);opacity:0} 100%{transform:scale(1);opacity:1} }
    .mq-mission { margin-top:10px; padding:13px 18px; background:rgba(16,185,129,0.16);
      border:1px solid rgba(16,185,129,0.45); border-radius:12px; font-weight:800; color:#047857;
      font-size:18px; animation:earnPop .45s cubic-bezier(.34,1.56,.64,1) .1s backwards; }
    .mq-hint { margin-top:12px; font-size:16px; color:var(--text2); }
    .retry-wrong { display:block; width:100%; margin-top:16px; padding:17px; border:0; border-radius:14px; cursor:pointer;
      background:linear-gradient(135deg,#f97316,#ea580c); color:#fff; font-size:19px; font-weight:800; font-family:inherit;
      box-shadow:0 5px 16px -2px rgba(249,115,22,0.45); transition:transform .12s,filter .12s; }
    .retry-wrong:hover { transform:translateY(-1px); filter:brightness(1.06); }

    /* ── 📖/📚 출제 범위 토글 ── */
    .src-row { display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin:14px 0 2px 0; }
    .src-label { font-size:16px; color:var(--text2); font-weight:700; margin-right:2px; }
    .src-pick { padding:10px 18px; background:#ffffff; color:var(--text2);
      border:1px solid rgba(90,106,143,0.35); border-radius:99px; font-size:17px; font-weight:700;
      cursor:pointer; font-family:inherit; transition:all .15s; }
    .src-pick:hover { background:rgba(251,191,36,0.15); color:#b45309; border-color:rgba(217,119,6,0.5); }
    .src-pick.active { background:linear-gradient(135deg,#fbbf24,#f59e0b); color:#1a1a1a; border-color:#fbbf24; box-shadow:0 3px 8px rgba(245,158,11,0.4); }

    /* ── 🎤 말하기 문제 ── */
    .speak-mic { display:block; width:100%; margin-top:8px; padding:20px; border:0; border-radius:16px; cursor:pointer;
      background:linear-gradient(135deg,#8b5cf6,#6d28d9); color:#fff; font-size:21px; font-weight:800; font-family:inherit;
      box-shadow:0 6px 18px -2px rgba(139,92,246,0.5); transition:transform .12s,filter .12s; }
    .speak-mic:hover { transform:translateY(-1px); filter:brightness(1.08); }
    .speak-mic:disabled { background:#94a3b8; cursor:not-allowed; box-shadow:none; }
    .speak-mic.rec { animation:recPulse 1s ease-in-out infinite; background:linear-gradient(135deg,#ef4444,#b91c1c); }
    @keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} 50%{box-shadow:0 0 0 12px rgba(239,68,68,0)} }
    .speak-skip { display:block; width:100%; margin-top:10px; padding:13px; background:transparent; color:var(--text2);
      border:1px dashed rgba(148,163,184,0.35); border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; }
    .speak-skip:hover { color:#b45309; border-color:rgba(217,119,6,0.5); }
    .speak-word-big { font-size:48px; font-weight:900; color:var(--text); letter-spacing:.5px; }
    .listen-ic { font-size:84px; line-height:1; animation:listenPulse 1.4s ease-in-out infinite; }
    @keyframes listenPulse { 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.12);opacity:1} }
    .kid-ko { font-size:54px; font-weight:900; color:#d97706; text-align:center; letter-spacing:-.5px; }
    .opts-ch .opt { transition:all .12s; }

    /* ── 📱 좁은 폰(≤420px): 큰 요소만 살짝 줄여 한 화면 유지 ── */
    @media (max-width:420px){
      .wrap { padding:18px 14px; }
      .intro h2 { font-size:24px; }
      .intro p { font-size:16px; }
      .start-btn { font-size:20px; padding:18px; }
      .q-text, .quiz-card.kids .q-text { font-size:23px; }
      .opt { font-size:18px; padding:16px 18px; }
      .opts-kids .opt { font-size:20px; padding:17px 18px; }
      .kid-emoji { font-size:80px; }
      .ch-word-txt { font-size:34px; }
      .speak-word-big { font-size:38px; }
      .kid-ko { font-size:42px; }
      .listen-ic { font-size:68px; }
      .result-score { font-size:58px; }
      .top h1 { font-size:19px; }
      .top-nav-btn { width:38px; height:38px; font-size:18px; }
      .mode-btn { width:38px; height:32px; font-size:18px; }
      .quiz-card { padding:22px 18px; }
    }
  </style>
</head>
<body>
  <div class="top">
    <button type="button" class="top-nav-btn" onclick="if(history.length>1){history.back()}else{location.href='/'}" title="뒤로 가기" aria-label="뒤로 가기 (이전 페이지)">←</button>
    <a href="/" class="top-nav-btn" title="홈으로" aria-label="홈으로">🏠</a>
    <h1>🧠 <span data-ko="AI 단어 퀴즈" data-en="AI Vocab Quiz">AI 단어 퀴즈</span></h1>
    <div class="mode-toggle" title="연령 모드">
      <button class="mode-btn" data-mode="kids" onclick="setMode('kids',true)" aria-label="어린이 모드" data-ko-aria="어린이 모드" data-en-aria="Kids mode">🧒</button>
      <button class="mode-btn" data-mode="challenge" onclick="setMode('challenge',true)" aria-label="청소년 모드" data-ko-aria="청소년 모드" data-en-aria="Teen mode">🧑‍🎓</button>
    </div>
  </div>
  <div class="wrap">
    <div id="introBox" class="intro">
      <h2 data-ko="🎯 마이크로러닝 — 1분 안에 끝!" data-en="🎯 Microlearning — Done in 1 minute!">🎯 마이크로러닝 — 1분 안에 끝!</h2>
      <p data-ko="📚 내 단어장에서 무작위 5개 단어를 골라 객관식 퀴즈를 만들어줍니다." data-en="📚 5 random words from your vocab list become a multiple-choice quiz.">📚 내 단어장에서 <b>무작위 5개 단어</b>를 골라 객관식 퀴즈를 만들어줍니다.</p>
      <p data-ko="⏱ 등하교·출퇴근 자투리 시간에 가볍게 복습하세요." data-en="⏱ Review during commute or short breaks.">⏱ 등하교·출퇴근 자투리 시간에 가볍게 복습하세요.</p>
      <p data-ko="🎁 정답 맞히면 숙련도가 오르고 포인트(정답당 10P)도 쌓여요!" data-en="🎁 Correct answers boost mastery and earn points (10P each)!">🎁 정답 맞히면 숙련도가 오르고 포인트(정답당 10P)도 쌓여요!</p>
      <div class="src-row">
        <span class="src-label" data-ko="출제 범위" data-en="Word source">출제 범위</span>
        <button class="src-pick active" data-src="mywords" onclick="pickSource('mywords')">📖 <span data-ko="내 단어장" data-en="My words">내 단어장</span></button>
        <button class="src-pick" data-src="textbook" onclick="pickSource('textbook')">📚 <span data-ko="내 레벨 단어은행" data-en="Level word bank">내 레벨 단어은행</span></button>
      </div>
      <button class="start-btn" id="startBtn" onclick="startQuiz()">🚀 <span data-ko="퀴즈 시작" data-en="Start">퀴즈 시작</span></button>
      <div id="introMsg" style="margin-top:12px;font-size:16px;color:var(--text2);text-align:center"></div>
    </div>

    <!-- 단어장 비어있을 때 — 2가지 옵션 -->
    <div id="emptyBox" style="display:none;background:linear-gradient(135deg,rgba(59,130,246,0.10),rgba(99,102,241,0.06));border:1px solid rgba(99,102,241,0.30);border-radius:14px;padding:18px;margin-top:14px">
      <h3 style="margin:0 0 12px 0;font-size:23px;color:#d97706;font-weight:800" data-ko="📭 단어장이 비어있어요" data-en="📭 Your vocab list is empty">📭 단어장이 비어있어요</h3>
      <p style="color:var(--text2);font-size:17px;line-height:1.6;margin:0 0 16px 0" data-ko="두 가지 방법 중 하나를 선택하세요:" data-en="Choose one of these two options:">두 가지 방법 중 하나를 선택하세요:</p>

      <!-- 옵션 1: AI 자동 생성 (추천) -->
      <div style="background:rgba(16,185,129,0.10);border:1px solid rgba(16,185,129,0.30);border-radius:12px;padding:14px 16px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:28px">🤖</span>
          <div style="flex:1">
            <div style="font-weight:800;color:#047857;font-size:19px" data-ko="옵션 1: AI 자동 생성 (추천!)" data-en="Option 1: AI Auto-Generate (Recommended!)">옵션 1: AI 자동 생성 (추천!)</div>
            <div style="font-size:16px;color:var(--text2);margin-top:3px" data-ko="AI가 내 레벨에 맞는 단어 10개를 즉시 채워줘요" data-en="AI instantly fills 10 words matched to your level">AI가 내 레벨에 맞는 단어 10개를 즉시 채워줘요</div>
          </div>
        </div>
        <div style="display:flex;gap:7px;flex-wrap:wrap;margin:10px 0">
          <span style="font-size:16px;color:var(--text2);align-self:center;margin-right:4px" data-ko="레벨:" data-en="Level:">레벨:</span>

  <script>
    function getUid() {
      try { const u = JSON.parse(localStorage.getItem('mango_user') || 'null'); if (u && u.user_id) return u.user_id; } catch(e){}
      // 게스트도 uid 고정 저장 — 호출마다 바뀌면 AI 생성 단어와 퀴즈 조회 uid 가 어긋나 영원히 no_words

        return g;
      } catch(e){}
      return 'guest_' + Math.random().toString(36).slice(2,8);

    function getName() {
      try { const u = JSON.parse(localStorage.getItem('mango_user') || 'null'); if (u && (u.name || u.user_name)) return u.name || u.user_name; } catch(e){}

    function escHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    let quizzes = [], curIdx = 0, answers = [];
    let combo = 0, bestCombo = 0, xp = 0, stars = 0;
    let timerId = null, timeLeft = 0;
    let serverQuizzesRaw = [], retryCount = 0;   // 오답 재도전용 원본 보관 + 보상 멱등 키

    let curLevel = 'A1';
    let curTopic = '';

    /* ── 📖/📚 출제 범위 (내 단어장 / 레벨 단어은행) ── */
    let curSource = (function(){ try{ var s=localStorage.getItem('mangoi_quiz_source'); if(s==='textbook') return s; }catch(e){} return 'mywords'; })();
    function pickSource(s){
      curSource = (s==='textbook') ? 'textbook' : 'mywords';
      try{ localStorage.setItem('mangoi_quiz_source', curSource); }catch(e){}
      document.querySelectorAll('.src-pick').forEach(function(b){ b.classList.toggle('active', b.dataset.src===curSource); });
    }

    /* ── 🧒/🧑‍🎓 연령 모드 (A1·A2=키즈 자동 / 상단 토글로 수동) ── */
    let modeManual = false;
    let curMode = (function(){ try{ var m=localStorage.getItem('mangoi_quiz_mode'); if(m==='kids'||m==='challenge') return m; }catch(e){} return 'kids'; })();
    function setMode(m, manual){
      curMode = (m==='challenge') ? 'challenge' : 'kids';
      if (manual){ modeManual = true; try{ localStorage.setItem('mangoi_quiz_mode', curMode); }catch(e){} }
      try{ document.body.setAttribute('data-mode', curMode); }catch(e){}
      document.querySelectorAll('.mode-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.mode===curMode); });
      var opt = document.querySelector('#opts .opt');
      if (opt && !opt.disabled) renderQuiz();   // 아직 안 푼 문제면 새 모드로 다시 그림
    }

    function pickLv(btn) {
      document.querySelectorAll('.lv-pick').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      curLevel = btn.dataset.lv;
      if (!modeManual) setMode((curLevel==='A1'||curLevel==='A2') ? 'kids' : 'challenge', false);
    }

    /* ── 단어 → 그림(이모지) 매핑 (키즈 모드 시각화) ── */
    const WORD_EMOJI = {
      apple:'🍎',banana:'🍌',orange:'🍊',grape:'🍇',strawberry:'🍓',watermelon:'🍉',lemon:'🍋',peach:'🍑',cherry:'🍒',bread:'🍞',rice:'🍚',egg:'🥚',milk:'🥛',water:'💧',juice:'🧃',coffee:'☕',tea:'🍵',cake:'🍰',cookie:'🍪',pizza:'🍕',hamburger:'🍔',hotdog:'🌭',chicken:'🍗',fish:'🐟',meat:'🥩',cheese:'🧀',icecream:'🍦',candy:'🍬',chocolate:'🍫',soup:'🍲',salad:'🥗',noodle:'🍜',noodles:'🍜',carrot:'🥕',potato:'🥔',tomato:'🍅',corn:'🌽',onion:'🧅',mushroom:'🍄',honey:'🍯',
      dog:'🐶',cat:'🐱',rabbit:'🐰',bear:'🐻',lion:'🦁',tiger:'🐯',elephant:'🐘',monkey:'🐵',horse:'🐴',cow:'🐮',pig:'🐷',bird:'🐦',duck:'🦆',frog:'🐸',snake:'🐍',fox:'🦊',wolf:'🐺',panda:'🐼',penguin:'🐧',owl:'🦉',bee:'🐝',butterfly:'🦋',ant:'🐜',turtle:'🐢',dolphin:'🐬',whale:'🐳',shark:'🦈',sheep:'🐑',goat:'🐐',mouse:'🐭',deer:'🦌',giraffe:'🦒',zebra:'🦓',
      school:'🏫',book:'📖',pen:'🖊️',pencil:'✏️',notebook:'📓',bag:'🎒',backpack:'🎒',desk:'🪑',chair:'🪑',teacher:'👩‍🏫',student:'🧑‍🎓',ruler:'📏',scissors:'✂️',clock:'🕐',computer:'💻',paper:'📄',crayon:'🖍️',eraser:'🧽',map:'🗺️',globe:'🌐',homework:'📚',
      family:'👨‍👩‍👧‍👦',mother:'👩',father:'👨',mom:'👩',dad:'👨',baby:'👶',brother:'👦',sister:'👧',grandmother:'👵',grandfather:'👴',boy:'👦',girl:'👧',friend:'🧑‍🤝‍🧑',people:'👥',man:'👨',woman:'👩',
      airplane:'✈️',plane:'✈️',car:'🚗',bus:'🚌',train:'🚆',ship:'🚢',boat:'⛵',bike:'🚲',bicycle:'🚲',taxi:'🚕',rocket:'🚀',hotel:'🏨',beach:'🏖️',mountain:'⛰️',camera:'📷',ticket:'🎫',world:'🌍',road:'🛣️',bridge:'🌉',park:'🏞️',city:'🏙️',
      sun:'☀️',rain:'🌧️',snow:'❄️',cloud:'☁️',wind:'🌬️',rainbow:'🌈',storm:'⛈️',hot:'🔥',cold:'🧊',umbrella:'☂️',star:'⭐',moon:'🌙',sky:'🌌',lightning:'⚡',
      hand:'✋',eye:'👁️',ear:'👂',nose:'👃',mouth:'👄',foot:'🦶',heart:'❤️',hair:'💇',tooth:'🦷',face:'😊',
      red:'🔴',blue:'🔵',green:'🟢',yellow:'🟡',black:'⚫',white:'⚪',purple:'🟣',pink:'🌸',brown:'🟤',
      tree:'🌳',flower:'🌸',house:'🏠',home:'🏠',fire:'🔥',money:'💰',phone:'📱',key:'🔑',door:'🚪',window:'🖼️',gift:'🎁',balloon:'🎈',ball:'⚽',music:'🎵',game:'🎮',love:'❤️',time:'⏰',light:'💡',king:'👑',queen:'👸',robot:'🤖',
      run:'🏃',walk:'🚶',sleep:'😴',eat:'🍽️',drink:'🥤',read:'📖',write:'✍️',sing:'🎤',dance:'💃',jump:'🤸',swim:'🏊',play:'🎮',cook:'👨‍🍳',study:'📚',laugh:'😂',cry:'😢',smile:'😊',
      soccer:'⚽',basketball:'🏀',baseball:'⚾',tennis:'🎾'
    };
    function wordEmoji(w){ var k=String(w||'').toLowerCase().trim().replace(/[.!?,]+$/,''); return WORD_EMOJI[k] || ''; }
    function speakWord(w){ try{ if(window.MangoiTTS){ MangoiTTS.setLang('en'); MangoiTTS.speak(String(w||'').trim(), 1); } }catch(e){} }

    /* ── 효과음 (WebAudio, 별도 파일 없이 즉시 재생) ── */
    let _actx = null;
    function sfx(kind){
      try{
        if(!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)();
        var t=_actx.currentTime, o=_actx.createOscillator(), g=_actx.createGain(); o.connect(g); g.connect(_actx.destination);
        if(kind==='correct'){ o.type='sine'; o.frequency.setValueAtTime(660,t); o.frequency.setValueAtTime(990,t+0.1); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.22,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.3); o.start(t); o.stop(t+0.32); }
        else if(kind==='star'){ o.type='triangle'; o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(1175,t+0.08); o.frequency.setValueAtTime(1568,t+0.16); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.2,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.34); o.start(t); o.stop(t+0.36); }
        else { o.type='sine'; o.frequency.setValueAtTime(320,t); o.frequency.exponentialRampToValueAtTime(170,t+0.25); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.3); o.start(t); o.stop(t+0.32); }
      }catch(e){}
    }
    function vibrate(p){ try{ navigator.vibrate && navigator.vibrate(p); }catch(e){} }

    /* ── 타이머 (챌린지 모드: 10초, 초과해도 감점 없고 속도 보너스만) ── */
    function clearTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }
    function startTimer(){
      clearTimer(); timeLeft=10;
      var bar=document.getElementById('timerBar'), start=Date.now();
      timerId=setInterval(function(){
        var el=(Date.now()-start)/1000; timeLeft=Math.max(0,10-el);
        if(bar) bar.style.width=(timeLeft/10*100)+'%';
        if(timeLeft<=0){ clearTimer(); onTimeout(); }
      }, 100);
    }

    /* ── 키즈: 별/마스코트/컨페티 효과 ── */
    function renderStars(){ var s=''; for(var i=0;i<quizzes.length;i++){ s += (i<stars?'⭐':'☆'); } return s; }
    function bounceMascot(){ var m=document.getElementById('kidMascot'); if(m){ m.classList.remove('bounce'); void m.offsetWidth; m.classList.add('bounce'); } }
    function popStar(){ try{ var s=document.createElement('div'); s.className='star-pop'; s.textContent='⭐'; s.style.left=(window.innerWidth/2-15)+'px'; s.style.top=(window.innerHeight*0.42)+'px'; document.body.appendChild(s); setTimeout(function(){ s.remove(); },1000); }catch(e){} }
    function confetti(){ try{ var em=['🎉','⭐','✨','🎊','🏆']; for(var i=0;i<16;i++){ (function(i){ var c=document.createElement('div'); c.className='confetti-pc'; c.textContent=em[i%em.length]; c.style.left=Math.round(Math.random()*100)+'vw'; c.style.animationDuration=(1.4+Math.random()*1.2)+'s'; c.style.animationDelay=(Math.random()*0.3)+'s'; document.body.appendChild(c); setTimeout(function(){ c.remove(); }, 3200); })(i); } }catch(e){} }

    /* ── 진행 점 · 랭크 · 자동넘김 상태 ── */
    let dotResults = [], autoAdvTimer = null, _advancing = false;
    function renderDots(){
      var s='<div class="qdots">';
      for(var i=0;i<quizzes.length;i++){
        var cls='qdot';
        if(i===curIdx) cls+=' cur';
        else if(dotResults[i]===true) cls+=' ok';
        else if(dotResults[i]===false) cls+=' no';
        s+='<span class="'+cls+'"></span>';
      }
      return s+'</div>';
    }
    function rankLabel(){ return xp>=80 ? '🥇 Gold' : xp>=30 ? '🥈 Silver' : '🥉 Bronze'; }

    /* ── 문제 유형 다양화 (프론트에서 배치 데이터로 재구성 · 서버 변경 없음) ──
       meaning: 단어→뜻 · listen: 듣고→뜻(단어 숨김) · word: 뜻→영어단어 */
    const COMMON_EN = ['book','water','friend','house','music','apple','happy','school','family','money','time','food','color','animal','number','morning','night','summer','winter','story','teacher','student','flower','river','world'];
    function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
    function prepareQuizzes(serverQuizzes){
      var allWords = serverQuizzes.map(function(q){ return q.source_word; }).filter(Boolean);
      var rot = (curMode==='kids') ? ['meaning','listen'] : ['meaning','word','listen'];
      var arr = serverQuizzes.map(function(q, k){
        var meaning = q.options[q.correct_index];
        var type = rot[k % rot.length];
        var base = { serverId:q.id, serverCorrect:q.correct_index, word:q.source_word, meaning:meaning, example:q.hint || '', type:type };
        if (type==='word' && allWords.filter(function(w){ return w && w!==q.source_word; }).length < 1) type='meaning', base.type='meaning';
        if (base.type==='word'){
          var pool = shuffle(allWords.filter(function(w){ return w && w!==q.source_word; }).slice()).slice(0,3);
          var extra = shuffle(COMMON_EN.filter(function(w){ return w!==q.source_word && pool.indexOf(w)<0; }));
          while(pool.length<3 && extra.length){ pool.push(extra.shift()); }
          var opts = shuffle([q.source_word].concat(pool));
          base.options=opts; base.correctIndex=opts.indexOf(q.source_word);
          base.questionText='"'+meaning+'" 는 영어로?'; base.showEmoji=false; base.audioOnLoad=false;
        } else if (base.type==='listen'){
          base.options=q.options.slice(); base.correctIndex=q.correct_index;
          base.questionText='잘 듣고 뜻을 고르세요'; base.showEmoji=false; base.audioOnLoad=true;
        } else {
          base.options=q.options.slice(); base.correctIndex=q.correct_index;
          base.questionText='이 단어의 뜻은?'; base.showEmoji=true; base.audioOnLoad=true;
        }
        return base;
      });
      // 🎤 말하기 미션 1문제 (3번째 문제): 마이크 되는 기기에서만, 재도전 등 짧은 세트엔 안 섞음
      try {
        if (arr.length >= 4 && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          var sp = arr[2];
          sp.type = 'speak'; sp.options = []; sp.correctIndex = -1;
          sp.questionText = ''; sp.showEmoji = true; sp.audioOnLoad = true;
        }
      } catch(e){}
      return arr;
    }
    function pickTopic(btn, topic) {
      document.querySelectorAll('.topic-pick').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      curTopic = topic;
    }

    function tt(ko, en) { try { return (window.getLang && window.getLang()) === 'en' ? en : ko; } catch(e){ return ko; } }
    async function autoGenerate() {
      const btn = document.getElementById('autoBtn');
      btn.disabled = true; btn.innerHTML = tt('⏳ AI 가 단어 만드는 중… (10~20초)', '⏳ AI generating words… (10–20s)');
      try {
        const r = await fetch('/api/vocab/auto-generate', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ uid: getUid(), level: curLevel, topic: curTopic, count: 10 })
        });
        const d = await r.json();
        if (d.ok && d.added > 0) {
          alert(tt(`✅ ${d.added}개 단어가 단어장에 추가되었어요!\n곧 퀴즈를 시작합니다.`, `✅ ${d.added} words added to your list!\nStarting the quiz…`));
          document.getElementById('emptyBox').style.display = 'none';
          document.getElementById('introBox').style.display = '';
          setTimeout(() => startQuiz(), 400);
        } else if (d.ok && d.added === 0) {
          alert(tt('이미 비슷한 단어들이 단어장에 있어요. 다른 레벨이나 주제를 시도해보세요!', 'You already have similar words. Try a different level or topic!'));
          btn.disabled = false; btn.innerHTML = tt('🤖 AI가 단어 10개 만들어주기','🤖 Let AI generate 10 words');
        } else {
          alert(tt('생성 실패: ', 'Generation failed: ') + (d.error || 'unknown') + tt('\n다시 시도해주세요.', '\nPlease try again.'));
          btn.disabled = false; btn.innerHTML = tt('🤖 AI가 단어 10개 만들어주기','🤖 Let AI generate 10 words');
        }
      } catch(e) {
        alert(tt('네트워크 오류 — 다시 시도해주세요', 'Network error — please try again'));
        btn.disabled = false; btn.innerHTML = tt('🤖 AI가 단어 10개 만들어주기','🤖 Let AI generate 10 words');
      }
    }

    async function startQuiz() {
      const btn = document.getElementById('startBtn');
      btn.disabled = true; btn.innerHTML = '⏳ 퀴즈 생성 중…';
      try {
        const r = await fetch('/api/vocab/gen-quiz', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ uid: getUid(), count: 5, source: curSource })
        });
        const d = await r.json();
        if (!d.ok) {
          // 단어장 비어있음 → 옵션 화면 표시 (버튼은 원복해 잠기지 않게)
          if (d.error === 'no_words') {
            btn.disabled = false; btn.innerHTML = '🚀 <span data-ko="퀴즈 시작" data-en="Start">퀴즈 시작</span>';
            document.getElementById('introBox').style.display = 'none';
            document.getElementById('emptyBox').style.display = '';
            return;
          }
          document.getElementById('introMsg').innerHTML = '⚠️ ' + escHtml(d.message || d.error || '퀴즈를 만들 수 없어요.');
          btn.disabled = false; btn.innerHTML = '🚀 퀴즈 시작';
          return;
        }
        serverQuizzesRaw = d.quizzes; retryCount = 0;
        quizzes = prepareQuizzes(d.quizzes);
        curIdx = 0; answers = []; dotResults = []; combo = 0; bestCombo = 0; xp = 0; stars = 0;
        document.getElementById('introBox').style.display = 'none';
        document.getElementById('emptyBox').style.display = 'none';
        document.getElementById('quizArea').style.display = '';
        renderQuiz();
      } catch(e) {
        document.getElementById('introMsg').textContent = '네트워크 오류 — 다시 시도해주세요.';
        btn.disabled = false; btn.innerHTML = '🚀 퀴즈 시작';
      }
    }

    function renderQuiz() {
      clearTimer();
      const Q = quizzes[curIdx];
      if (!Q) return showResult();
      const total = quizzes.length;
      const pct = ((curIdx)/total)*100;
      const area = document.getElementById('quizArea');
      const isKids = curMode === 'kids';

      const head = isKids
        ? `<div class="kid-head"><img class="kid-mascot" id="kidMascot" src="/img/mango-char.png" alt="Mango" /><div class="kid-stars" id="kidStars">${renderStars()}</div></div>`
        : `<div class="ch-stats"><span class="ch-combo" id="chCombo">🔥 ${combo}</span><span class="ch-rank">${rankLabel()}</span><span class="ch-xp" id="chXp">XP ${xp}</span></div>`;

      // 유형 배지
      const typeBadge = `<div class="q-type">${
        Q.type==='listen' ? (isKids?'👂 듣고 맞히기':'👂 Listening') :
        Q.type==='word'   ? (isKids?'🔤 영어로 말하기':'🔤 Say it in English') :
        Q.type==='speak'  ? (isKids?'🎤 따라 말하기':'🎤 Speaking') :
                            (isKids?'📖 뜻 맞히기':'📖 Meaning')
      }</div>`;

      // 🎤 말하기 문제: 보기 대신 마이크 버튼 (타이머 없음, 성공 +20P 보너스)
      if (Q.type === 'speak') {
        area.innerHTML = `
          <div id="qdotsWrap">${renderDots()}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          ${head}
          <div class="quiz-card ${isKids?'kids':'challenge'}">
            <div class="q-num">${isKids ? ('문제 '+(curIdx+1)+' / '+total) : ('Q'+(curIdx+1)+' / '+total)}</div>
            ${typeBadge}
            <div class="kid-word">
              <div class="kid-emoji">${wordEmoji(Q.word)||'🗣️'}</div>
              <div class="speak-word-big">${escHtml(Q.word||'')}</div>
              <div style="font-size:18px;color:var(--text2)">${escHtml(Q.meaning||'')}</div>
              <button class="say-btn" id="sayBtn">🔊 <span data-ko="발음 듣기" data-en="Listen">발음 듣기</span></button>
            </div>
            <div class="q-text" style="text-align:center">${isKids?'큰 소리로 따라 말해보세요!':'Say it out loud!'}</div>
            <button class="speak-mic" id="micBtn" onclick="speakAttempt()">🎤 ${isKids?'눌러서 말하기 (3초)':'Tap & speak (3s)'}</button>
            <button class="speak-skip" id="skipBtn" onclick="speakResolve(false, true)">${isKids?'잘 안 돼요 — 건너뛰기':'Skip this one'}</button>
            <div id="feedback" class="fb" style="display:none"></div>
            <div id="nextRow" class="nav-btns" style="display:none">
              <button class="nav-btn primary" onclick="nextQuiz()">${curIdx === total-1 ? (isKids?'🎉 결과 보기':'🎯 See Result') : (isKids?'다음 →':'Next →')}</button>
            </div>
          </div>
        `;
        var sb0 = document.getElementById('sayBtn'); if (sb0) sb0.onclick = function(){ speakWord(Q.word); };
        setTimeout(function(){ speakWord(Q.word); }, 260);
        speakTries = 0;
        try{ if(window.applyLang) applyLang(); else if(window.mangoApplyI18n) mangoApplyI18n(); }catch(e){}
        return;
      }

      // 프롬프트(그림/단어/듣기)
      let prompt;
      if (Q.type==='listen') {
        prompt = `<div class="${isKids?'kid-word':'ch-word'}"><div class="listen-ic">👂</div><button class="say-btn" id="sayBtn">🔊 <span data-ko="다시 듣기" data-en="Play again">다시 듣기</span></button></div>`;
      } else if (Q.type==='word') {
        prompt = isKids
          ? `<div class="kid-word"><div class="kid-ko">${escHtml(Q.meaning)}</div></div>`
          : `<div class="ch-word"><span class="ch-word-txt" style="color:#d97706">${escHtml(Q.meaning)}</span></div>`;
      } else {
        prompt = isKids
          ? `<div class="kid-word"><div class="kid-emoji">${wordEmoji(Q.word)||'🔤'}</div><button class="say-btn" id="sayBtn">🔊 <span data-ko="다시 듣기" data-en="Play">다시 듣기</span></button></div>`
          : `<div class="ch-word"><span class="ch-word-txt">${escHtml(Q.word||'')}</span><button class="say-btn sm" id="sayBtn">🔊</button></div>`;
      }
      const timer = isKids ? '' : `<div class="timer-wrap"><div class="timer-bar" id="timerBar"></div></div>`;

      area.innerHTML = `
        <div id="qdotsWrap">${renderDots()}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        ${head}
        <div class="quiz-card ${isKids?'kids':'challenge'}">
          <div class="q-num">${isKids ? ('문제 '+(curIdx+1)+' / '+total) : ('Q'+(curIdx+1)+' / '+total)}</div>
          ${typeBadge}
          ${timer}
          ${prompt}
          <div class="q-text">${escHtml(Q.questionText)}</div>
          <div id="opts" class="${isKids?'opts-kids':'opts-ch'}">
            ${Q.options.map((o, i) => `<button class="opt" data-i="${i}" onclick="pickAnswer(${i})">${isKids?'':('<span class="opt-prefix">'+String.fromCharCode(65+i)+'</span>')}${escHtml(o)}</button>`).join('')}
          </div>
          <div id="feedback" class="fb" style="display:none"></div>
          <div id="nextRow" class="nav-btns" style="display:none">
            <button class="nav-btn primary" onclick="nextQuiz()">${curIdx === total-1 ? (isKids?'🎉 결과 보기':'🎯 See Result') : (isKids?'다음 →':'Next →')}</button>
          </div>
        </div>
      `;
      var sb = document.getElementById('sayBtn'); if (sb) sb.onclick = function(){ speakWord(Q.word); };
      if (Q.audioOnLoad) setTimeout(function(){ speakWord(Q.word); }, 260);   // 단어 발음 자동 재생(듣기/뜻 유형)
      if (!isKids) startTimer();
      try{ if(window.applyLang) applyLang(); else if(window.mangoApplyI18n) mangoApplyI18n(); }catch(e){}
    }

    function recordProgress(Q, isCorrect) {
      // 서버 숙련도 기록: 정답이면 서버 정답 index, 오답이면 다른 index 로 번역 제출(유형 무관 일관 기록)
      var serverAns = isCorrect ? Q.serverCorrect : (Q.serverCorrect === 0 ? 1 : 0);
      try { fetch('/api/vocab/quiz-submit', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ quiz_id: Q.serverId, answer: serverAns }) }); } catch(e) {}
    }

    /* ── 🎤 말하기 문제: 3초 녹음 → Whisper 전사 → 단어 일치 판정 (2회 시도 + 건너뛰기) ── */
    let speakTries = 0;
    async function speakAttempt() {
      const Q = quizzes[curIdx];
      const btn = document.getElementById('micBtn');
      const fb = document.getElementById('feedback');
      if (!btn || btn.disabled || !Q || Q._resolved) return;
      try {
        btn.disabled = true; btn.classList.add('rec');
        btn.innerHTML = '🔴 ' + tt('지금 말해요: "'+Q.word+'"', 'Speak now: "'+Q.word+'"');
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const rec = new MediaRecorder(stream);
        const chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.start();
        await new Promise(res => setTimeout(res, 3000));
        rec.stop();
        await new Promise(res => rec.onstop = res);
        stream.getTracks().forEach(t => t.stop());
        if (Q._resolved) return;   // 녹음 중 건너뛰기 눌렀으면 무시
        btn.classList.remove('rec');
        btn.innerHTML = '🤖 ' + tt('AI가 듣는 중…', 'AI listening…');
        const fd = new FormData();
        fd.append('audio', new Blob(chunks, { type: rec.mimeType || 'audio/webm' }), 'speak.webm');
        const r = await fetch('/api/voice/transcribe', { method: 'POST', body: fd });
        const d = await r.json();
        if (Q._resolved) return;
        const heard = String(d.text||'').toLowerCase().replace(/[^a-z\s]/g,' ');
        const target = String(Q.word||'').toLowerCase().trim();
        const hit = d.ok && heard.split(/\s+/).some(t => t === target || (target.length>3 && t.includes(target)));
        if (hit) { speakResolve(true, false); return; }
        speakTries++;
        if (speakTries >= 2) { speakResolve(false, false); return; }
        fb.style.display = 'block'; fb.className = 'fb no';
        fb.innerHTML = tt('아깝다! AI가 들은 말: "','Almost! AI heard: "') + escHtml(d.text||'…') + tt('" — 한 번 더!','" — try again!');
        btn.disabled = false; btn.innerHTML = '🎤 ' + tt('다시 도전! (1회 남음)','Try again! (1 left)');
      } catch(e) {
        if (Q._resolved) return;
        btn.classList.remove('rec');
        btn.disabled = false; btn.innerHTML = '🎤 ' + tt('눌러서 말하기 (3초)','Tap & speak (3s)');
        fb.style.display = 'block'; fb.className = 'fb no';
        fb.innerHTML = tt('마이크를 열 수 없어요 (권한 확인) — 아래 건너뛰기를 눌러도 돼요','Cannot open the mic — you can skip below');
      }
    }
    function speakResolve(isCorrect, skipped) {
      const Q = quizzes[curIdx];
      if (!Q || Q._resolved) return;
      Q._resolved = true;
      const isKids = curMode === 'kids';
      const btn = document.getElementById('micBtn');
      if (btn) { btn.disabled = true; btn.classList.remove('rec'); btn.innerHTML = isCorrect ? ('🌟 ' + tt('발음 성공!','Great!')) : '🎤'; }
      const sk = document.getElementById('skipBtn'); if (sk) sk.style.display = 'none';
      recordProgress(Q, isCorrect);
      dotResults[curIdx] = isCorrect;
      answers.push({ word: Q.word, meaning: Q.meaning, example: Q.example, correct: isCorrect });
      var dz = document.getElementById('qdotsWrap'); if (dz) dz.innerHTML = renderDots();
      const fb = document.getElementById('feedback');
      fb.style.display = 'block';
      if (isCorrect) {
        combo++; bestCombo = Math.max(bestCombo, combo);
        sfx('correct'); vibrate(30);
        if (isKids) {
          stars++; sfx('star'); bounceMascot(); popStar();
          var st = document.getElementById('kidStars'); if (st) st.innerHTML = renderStars();
          fb.className = 'fb ok';
          fb.innerHTML = tt('와! 발음 최고예요! 🌟','Perfect pronunciation! 🌟');
        } else {
          var gained = 15 + (combo>=2 ? combo*2 : 0);
          xp += gained;
          fb.className = 'fb ok';
          fb.innerHTML = '✅ Nice pronunciation!' + (combo>=2?(' 🔥 x'+combo):'') + ' <span class="xp-plus">+'+gained+' XP</span>';
          var cc = document.getElementById('chCombo'); if (cc) cc.textContent = '🔥 '+combo;
          var cx = document.getElementById('chXp'); if (cx) cx.textContent = 'XP '+xp;
        }
        // 발음 성공 보너스 +20P (로그인 학생만, 서버 멱등)
        try {
          const uid = getUid();
          if (uid.indexOf('guest_') !== 0) {
            fetch('/api/vocab/reward', { method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({ user_id: uid, student_name: getName(), kind: 'speak', session_id: 'mq:' + Q.serverId + ':speak' }) })
              .then(r => r.json()).then(function(d){ if (d.ok && d.awarded > 0) fb.innerHTML += ' <span class="xp-plus">💰 +20P</span>'; }).catch(function(){});
          }
        } catch(e){}
        if (autoAdvTimer) clearTimeout(autoAdvTimer);
        autoAdvTimer = setTimeout(function(){ nextQuiz(); }, 1400);
      } else {
        combo = 0;
        sfx('wrong'); vibrate([15,40,15]);
        fb.className = 'fb no';
        fb.innerHTML = (skipped ? tt('괜찮아요! 발음을 듣고 따라 연습해보세요 🙂 ','No problem — listen & practice 🙂 ') : tt('아쉬워요! 정답 발음을 들어보세요 ','Close! Listen once more '))
          + '<b>' + escHtml(Q.word) + '</b>';
        speakWord(Q.word);
        var cc2 = document.getElementById('chCombo'); if (cc2) cc2.textContent = '🔥 0';
      }
      document.getElementById('nextRow').style.display = '';
    }
    function pickAnswer(i) {
      var first = document.querySelector('#opts .opt');
      if (first && first.disabled) return;   // 중복 클릭 방지
      clearTimer();
      const Q = quizzes[curIdx];
      document.querySelectorAll('.opt').forEach(b => b.disabled = true);
      revealAnswer(i, false);
    }
    function onTimeout() {
      if (document.querySelector('.opt.correct') || document.querySelector('.opt.wrong')) return;
      document.querySelectorAll('.opt').forEach(b => b.disabled = true);
      revealAnswer(-1, true);
    }

    function revealAnswer(i, timedOut) {
      const Q = quizzes[curIdx];
      const correctIndex = Q.correctIndex;
      const isCorrect = !timedOut && i === correctIndex;
      const isKids = curMode === 'kids';
      recordProgress(Q, isCorrect);
      dotResults[curIdx] = isCorrect;
      answers.push({ word: Q.word, meaning: Q.meaning, example: Q.example, correct: isCorrect });

      document.querySelectorAll('.opt').forEach(b => {
        const bi = parseInt(b.dataset.i);
        if (bi === correctIndex) b.classList.add('correct');
        else if (bi === i && !isCorrect) b.classList.add('wrong');
      });
      var dz = document.getElementById('qdotsWrap'); if (dz) dz.innerHTML = renderDots();
      speakWord(Q.word);   // 답한 뒤 단어 발음(특히 '영어로 말하기' 유형에서 정답 확인)
      const fb = document.getElementById('feedback');
      fb.style.display = 'block';

      if (isCorrect) {
        combo++; bestCombo = Math.max(bestCombo, combo);
        sfx('correct'); vibrate(30);
        if (isKids) {
          stars++; sfx('star'); bounceMascot(); popStar();
          var st = document.getElementById('kidStars'); if (st) st.innerHTML = renderStars();
          var praise = ['잘했어! 🎉','최고야! 🌟','우와 정답! 👏','대단해! 💯'];
          fb.className = 'fb ok';
          fb.innerHTML = (combo>=3 ? ('🔥 '+combo+'개 연속! ') : '') + praise[combo % praise.length];
        } else {
          var speed = Math.max(0, Math.round(timeLeft));
          var gained = 10 + speed + (combo>=2 ? combo*2 : 0);
          xp += gained;
          fb.className = 'fb ok';
          fb.innerHTML = '✅ Nice!' + (combo>=2 ? (' 🔥 x'+combo) : '') + ' <span class="xp-plus">+'+gained+' XP</span>' + (speed>0 ? (' <span class="spd">⚡ speed +'+speed+'</span>') : '');
          var cc = document.getElementById('chCombo'); if (cc) cc.textContent = '🔥 '+combo;
          var cx = document.getElementById('chXp'); if (cx) cx.textContent = 'XP '+xp;
          var cr = document.querySelector('.ch-rank'); if (cr) cr.textContent = rankLabel();
        }
        if (autoAdvTimer) clearTimeout(autoAdvTimer);
        autoAdvTimer = setTimeout(function(){ nextQuiz(); }, 1200);   // 정답이면 자연스럽게 자동 진행
      } else {
        combo = 0;
        sfx('wrong'); vibrate([15,40,15]);
        var ans = escHtml(Q.options[correctIndex]);
        if (isKids) {
          fb.className = 'fb no';
          fb.innerHTML = (timedOut ? '⏰ 시간이 다 됐어요! ' : '괜찮아, 다음엔 맞힐 수 있어! 😊 ') + '정답: <b>'+ans+'</b>';
        } else {
          fb.className = 'fb no';
          fb.innerHTML = (timedOut ? '⏰ Time up — ' : '❌ Not quite — ') + 'it\'s <b>'+ans+'</b>';
          var cc2 = document.getElementById('chCombo'); if (cc2) cc2.textContent = '🔥 0';
        }
      }
      document.getElementById('nextRow').style.display = '';
    }

    function nextQuiz() {
      if (_advancing) return;
      _advancing = true;
      if (autoAdvTimer) { clearTimeout(autoAdvTimer); autoAdvTimer = null; }
      clearTimer();
      curIdx++;
      if (curIdx >= quizzes.length) showResult();
      else renderQuiz();
      setTimeout(function(){ _advancing = false; }, 60);
    }

    function showResult() {
      clearTimer();
      const correct = answers.filter(a => a.correct).length;
      const total = answers.length || 1;
      const pct = Math.round((correct/total)*100);
      const isKids = curMode === 'kids';
      const wrong = answers.filter(a => !a.correct);

      const head = isKids
        ? `<div class="result-emoji">${pct===100?'🏆':pct>=60?'🌟':'🌱'}</div><div class="result-score" style="color:${pct>=80?'#059669':pct>=60?'#d97706':'#dc2626'}">⭐ ${correct} / ${total}</div><div class="result-label">별 ${correct}개 획득!</div>`
        : `<div class="result-score" style="color:${pct>=80?'#059669':pct>=60?'#d97706':'#dc2626'}">${correct} / ${total}</div><div class="result-label">정답률 ${pct}% · XP +${xp} · 🔥 best x${bestCombo}</div>`;
      const msg = isKids
        ? (pct===100 ? '완벽해요! 모든 단어를 알고 있어요 🎉' : pct>=60 ? '잘했어요! 조금만 더 하면 완벽해요 💪' : '좋은 시작이에요! 다시 해볼까요? 🌱')
        : (pct===100 ? '🏆 Perfect! Flawless run.' : pct>=80 ? '✨ Great job — almost perfect.' : pct>=60 ? '💪 Solid. Review the misses and retry.' : '🌱 Keep going — review and beat your score.');

      let note = '';
      if (wrong.length) {
        note = `<div class="wrong-note"><div class="wn-title">📒 ${isKids?'다시 볼 단어':'Review these'}</div>` +
          wrong.map(w => `<div class="wn-item"><button class="say-btn xs wn-say" data-w="${escHtml(w.word||'')}">🔊</button><b>${escHtml(w.word||'')}</b> — ${escHtml(w.meaning||'')}${w.example?`<div class="wn-ex">${escHtml(w.example)}</div>`:''}</div>`).join('') +
          `</div>`;
      }

      const retryBtn = wrong.length
        ? `<button class="retry-wrong" onclick="retryWrong()">🎯 ${isKids?('틀린 단어만 다시 풀기 ('+wrong.length+'개)'):('Retry '+wrong.length+' missed word'+(wrong.length>1?'s':''))}</button>`
        : '';

      document.getElementById('quizArea').innerHTML = `
        <div class="quiz-card result-card">
          ${head}
          <div id="mqReward"></div>
          <div class="result-msg">${msg}</div>
          ${note}
          ${retryBtn}
          <div class="nav-btns" style="margin-top:${wrong.length?'10':'18'}px">
            <button class="nav-btn" onclick="location.reload()">🔁 ${isKids?'다시 풀기':'Retry'}</button>
            <button class="nav-btn" onclick="location.href='/vocab.html'">📚 ${isKids?'단어장':'Vocab'}</button>
          </div>
          <button class="nav-btn primary" style="width:100%;margin-top:10px" onclick="window.MangoFlow&&MangoFlow.open('quiz')">🚀 ${isKids?'다음 활동':'Next activity'}</button>
        </div>
      `;
      document.querySelectorAll('.wn-say').forEach(b => b.onclick = function(){ speakWord(b.dataset.w); });
      if (pct >= 80) confetti();
      awardPoints(correct);
    }

    /* ── 🎯 틀린 단어만 재도전 (서버 재요청 없이 원본 퀴즈에서 재구성) ── */
    function retryWrong() {
      const wrongWords = answers.filter(a => !a.correct).map(a => a.word);
      const subset = serverQuizzesRaw.filter(q => wrongWords.indexOf(q.source_word) >= 0);
      if (!subset.length) return;
      retryCount++;
      quizzes = prepareQuizzes(subset);
      curIdx = 0; answers = []; dotResults = []; combo = 0; bestCombo = 0; xp = 0; stars = 0;
      renderQuiz();
    }

    /* ── 💰 포인트 적립 (기존 /api/vocab/reward 재사용 — 서버 멱등·일일상한) ── */
    async function awardPoints(correct) {
      const slot = document.getElementById('mqReward');
      if (!slot || correct <= 0) return;
      const uid = getUid();
      if (uid.indexOf('guest_') === 0) {
        slot.innerHTML = `<div class="mq-hint">${tt('🔑 로그인하면 정답 포인트가 쌓여요!','🔑 Log in to earn points for correct answers!')}</div>`;
        return;
      }
      const sessionId = 'mq:' + (serverQuizzesRaw[0] && serverQuizzesRaw[0].id || Date.now()) + (retryCount ? ':r' + retryCount : '');
      try {
        const r = await fetch('/api/vocab/reward', { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ user_id: uid, student_name: getName(), kind: 'session', correct_count: correct, session_id: sessionId }) });
        const d = await r.json();
        if (d.ok && d.awarded > 0) {
          slot.innerHTML = `<div class="mq-earn"><span class="amt">💰 +${d.awarded}P</span><span>${tt('적립!','earned!')}</span><span class="bal">${tt('내 포인트','Balance')} ${Number(d.balance).toLocaleString()}P</span></div>`;
          sfx('star');
        } else if (d.ok && d.daily_cap) {
          slot.innerHTML = `<div class="mq-hint">${tt('오늘 포인트 상한에 도달했어요 — 내일 또 만나요! 🌙','Daily point cap reached — see you tomorrow! 🌙')}</div>`;
        }
        // 일일 미션(하루 10단어) — 서버가 검증, 퀴즈 답도 복습으로 집계됨
