<!doctype html>
<html lang="ko">
<head>






  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5" />
  <title>🧠 1분 단어 퀴즈 — Mangoi</title>
  <link rel="icon" href="/mangoi-favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#0a1530" />
  <script src="/js/mango-i18n.js" defer></script>
  <style>
    :root { --bg:#0a1530; --card:#14213b; --text:#e6ecff; --text2:#a3b3d1;
      --gold:#fbbf24; --green:#10b981; --red:#ef4444; --blue:#3b82f6;
      --border:rgba(251,191,36,0.18); }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:radial-gradient(125% 100% at 50% -8%,#2a4d9e 0%,#1a2f6b 42%,#122350 100%); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; line-height:1.55; }
    .top { display:flex; align-items:center; gap:12px; padding:14px 18px;
      background:rgba(20,33,59,0.95); position:sticky; top:0; z-index:50;
      backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
    .top a { color:var(--text); text-decoration:none; font-weight:700; font-size:14px; }
    .top h1 { margin:0; font-size:16px; font-weight:800; flex:1; }
    .wrap { max-width:680px; margin:0 auto; padding:18px; }
    .intro { background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(245,158,11,0.06));
      border:1px solid rgba(251,191,36,0.30); border-radius:14px; padding:18px; margin-bottom:16px; }
    .intro h2 { margin:0 0 8px 0; font-size:18px; color:var(--gold); font-weight:800; }
    .intro p { margin:6px 0; color:var(--text2); font-size:13px; line-height:1.65; }
    .start-btn { display:block; width:100%; padding:16px; margin-top:12px;
      background:linear-gradient(135deg,#10b981,#059669); color:#fff; border:0;
      border-radius:12px; font-size:15px; font-weight:800; cursor:pointer;
      box-shadow:0 6px 18px -2px rgba(16,185,129,0.4); }
    .start-btn:hover { transform:translateY(-1px); filter:brightness(1.05); }
    .start-btn:disabled { background:#475569; cursor:not-allowed; box-shadow:none; }
    .progress-bar { height:6px; background:rgba(255,255,255,0.08); border-radius:99px; overflow:hidden; margin-bottom:14px; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#fbbf24,#f59e0b); transition:width .3s; border-radius:99px; }
    .quiz-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:14px; }
    .q-num { font-size:11.5px; color:var(--gold); font-weight:800; letter-spacing:0.5px; margin-bottom:8px; }
    .q-text { font-size:18px; font-weight:800; color:#fff; margin-bottom:6px; line-height:1.4; }
    .q-hint { font-size:12.5px; color:var(--text2); font-style:italic; margin-bottom:18px; }
    .opt { display:block; width:100%; text-align:left; padding:14px 18px; margin-bottom:8px;
      background:rgba(15,23,42,0.6); color:var(--text); border:1px solid rgba(148,163,184,0.2);
      border-radius:10px; cursor:pointer; font-size:14px; font-weight:600; font-family:inherit;
      transition:all .15s; }
    .opt:hover { background:rgba(251,191,36,0.12); border-color:rgba(251,191,36,0.5); transform:translateX(2px); }
    .opt.correct { background:rgba(16,185,129,0.25); border-color:#10b981; color:#86efac; }
    .opt.wrong { background:rgba(239,68,68,0.25); border-color:#ef4444; color:#fca5a5; }
    .opt:disabled { cursor:default; }
    .opt-prefix { display:inline-block; width:24px; height:24px; line-height:24px; text-align:center;
      background:rgba(251,191,36,0.18); color:var(--gold); border-radius:50%; font-weight:800;
      font-size:12px; margin-right:10px; }
    .nav-btns { display:flex; gap:10px; margin-top:12px; }
    .nav-btn { flex:1; padding:13px; background:rgba(255,255,255,0.06); color:var(--text);
      border:1px solid var(--border); border-radius:10px; font-weight:700; cursor:pointer;
      font-size:13px; font-family:inherit; }
    .nav-btn:hover { background:rgba(251,191,36,0.15); }
    .nav-btn.primary { background:linear-gradient(135deg,var(--gold),#f59e0b); color:#1a1a1a; border:0; }
    .result-card { text-align:center; padding:32px 20px; }
    .result-score { font-size:54px; font-weight:900; line-height:1; }
    .result-label { font-size:14px; color:var(--text2); margin-top:6px; }
    .result-msg { margin-top:14px; padding:14px 18px; background:rgba(251,191,36,0.10);
      border-radius:10px; font-size:13.5px; color:#fde68a; line-height:1.6; }
    .lv-pick, .topic-pick {
      padding:6px 11px; background:rgba(15,23,42,0.7); color:var(--text2);
      border:1px solid rgba(148,163,184,0.25); border-radius:99px;
      font-size:11.5px; font-weight:700; cursor:pointer; font-family:inherit;
      transition:all .15s;
    }
    .lv-pick:hover, .topic-pick:hover { background:rgba(251,191,36,0.15); color:#fcd34d; border-color:rgba(251,191,36,0.5); }
    .lv-pick.active { background:linear-gradient(135deg,#10b981,#059669); color:#fff; border-color:#10b981; box-shadow:0 3px 8px rgba(16,185,129,0.4); }
    .topic-pick.active { background:linear-gradient(135deg,#3b82f6,#1d4ed8); color:#fff; border-color:#3b82f6; box-shadow:0 3px 8px rgba(59,130,246,0.4); }

    /* ── 🧒/🧑‍🎓 연령 모드 토글 ── */
    .mode-toggle { display:flex; gap:4px; background:rgba(15,23,42,0.6); border:1px solid var(--border); border-radius:99px; padding:3px; }
    .mode-btn { border:0; background:transparent; font-size:16px; width:36px; height:30px; border-radius:99px; cursor:pointer; line-height:1; }
    .mode-btn.active { background:linear-gradient(135deg,#fbbf24,#f59e0b); box-shadow:0 2px 6px rgba(245,158,11,0.4); }

    /* ── 공통: 발음 버튼 / 피드백 ── */
    .say-btn { background:rgba(251,191,36,0.14); color:var(--gold); border:1px solid rgba(251,191,36,0.4);
      border-radius:99px; padding:7px 14px; font-weight:800; cursor:pointer; font-size:13px; font-family:inherit; }
    .say-btn:hover { background:rgba(251,191,36,0.24); }
    .say-btn.sm { padding:4px 10px; font-size:12px; }
    .say-btn.xs { padding:2px 8px; font-size:11px; margin-right:6px; }
    .fb { margin-top:14px; padding:12px 15px; border-radius:10px; font-size:14px; font-weight:700; line-height:1.5; }
    .fb.ok { background:rgba(16,185,129,0.18); color:#86efac; }
    .fb.no { background:rgba(239,68,68,0.16); color:#fca5a5; }
    .fb .xp-plus { color:#fbbf24; font-weight:900; margin-left:4px; }
    .fb .spd { color:#7dd3fc; margin-left:4px; }

    /* ── 🧒 키즈 모드 ── */
    .kid-head { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:10px; }
    .kid-mascot { width:42px; height:42px; border-radius:50%; object-fit:cover; box-shadow:0 3px 10px -2px rgba(245,158,11,0.5); }
    .kid-mascot.bounce { animation:mBounce .55s; }
    @keyframes mBounce { 0%,100%{transform:translateY(0) rotate(0)} 30%{transform:translateY(-13px) rotate(-9deg)} 60%{transform:translateY(0) rotate(7deg)} }
    .kid-stars { font-size:22px; letter-spacing:3px; }
    .kid-word { text-align:center; display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:8px; }
    .kid-emoji { font-size:78px; line-height:1; animation:floaty 3s ease-in-out infinite; }
    @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .quiz-card.kids .q-text { font-size:20px; text-align:center; }
    .opts-kids .opt { font-size:17px; padding:16px 18px; border-radius:14px; font-weight:700; }
    .opts-kids .opt:hover { transform:scale(1.02); }
    .star-pop { position:fixed; font-size:30px; pointer-events:none; z-index:99999; animation:starUp 1s ease-out forwards; }
    @keyframes starUp { 0%{opacity:1;transform:translateY(0) scale(.6)} 100%{opacity:0;transform:translateY(-95px) scale(1.5)} }
    .result-emoji { font-size:58px; line-height:1; margin-bottom:6px; }

    /* ── 🧑‍🎓 챌린지 모드 ── */
    .ch-stats { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-weight:800; font-size:14px; }
    .ch-combo { color:#fb923c; }
    .ch-xp { color:#fbbf24; }
    .ch-word { text-align:center; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px; }
    .ch-word-txt { font-size:30px; font-weight:900; color:#fff; letter-spacing:.5px; }
    .timer-wrap { height:7px; background:rgba(255,255,255,0.08); border-radius:99px; overflow:hidden; margin-bottom:14px; }
    .timer-bar { height:100%; width:100%; background:linear-gradient(90deg,#ef4444,#f59e0b,#10b981); transition:width .1s linear; border-radius:99px; }

    /* ── 오답 노트 ── */
    .wrong-note { margin-top:16px; text-align:left; background:rgba(15,23,42,0.5); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
    .wn-title { font-weight:800; color:var(--gold); margin-bottom:8px; font-size:13.5px; }
    .wn-item { padding:9px 0; border-bottom:1px solid rgba(148,163,184,0.12); font-size:13.5px; }
    .wn-item:last-child { border-bottom:0; }
    .wn-ex { color:var(--text2); font-size:12px; margin-top:3px; font-style:italic; }
    .confetti-pc { position:fixed; top:-20px; font-size:20px; pointer-events:none; z-index:99998; animation:confFall linear forwards; }
    @keyframes confFall { to { transform:translateY(105vh) rotate(360deg); opacity:.2; } }

    /* ── 유형 배지 / 진행 점 / 랭크 / 듣기·영어단어 프롬프트 ── */
    .q-type { text-align:center; font-size:11.5px; font-weight:800; color:#93c5fd; letter-spacing:.4px; margin-bottom:10px; }
    .qdots { display:flex; gap:6px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
    .qdot { width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,0.16); transition:transform .15s,background .15s; }
    .qdot.cur { background:#fbbf24; transform:scale(1.35); box-shadow:0 0 8px rgba(251,191,36,0.6); }
    .qdot.ok { background:#10b981; }
    .qdot.no { background:#ef4444; }
    .ch-rank { color:#c4b5fd; font-size:12.5px; font-weight:800; }
    .listen-ic { font-size:66px; line-height:1; animation:listenPulse 1.4s ease-in-out infinite; }
    @keyframes listenPulse { 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.12);opacity:1} }
    .kid-ko { font-size:40px; font-weight:900; color:#fbbf24; text-align:center; letter-spacing:-.5px; }
    .opts-ch .opt { transition:all .12s; }
  </style>
</head>
<body>
  <div class="top">
    <a href="/">← <span data-ko="홈" data-en="Home">홈</span></a>
    <h1>🧠 <span data-ko="AI 단어 퀴즈" data-en="AI Vocab Quiz">AI 단어 퀴즈</span></h1>
    <div class="mode-toggle" title="연령 모드">
      <button class="mode-btn" data-mode="kids" onclick="setMode('kids',true)" aria-label="어린이 모드" data-ko-aria="어린이 모드" data-en-aria="Kids mode">🧒</button>
      <button class="mode-btn" data-mode="challenge" onclick="setMode('challenge',true)" aria-label="청소년 모드" data-ko-aria="청소년 모드" data-en-aria="Teen mode">🧑‍🎓</button>
    </div>
  </div>
  <div class="wrap">
    <div id="introBox" class="intro">
      <h2 data-ko="🎯 마이크로러닝 — 1분 안에 끝!" data-en="🎯 Microlearning — Done in 1 minute!">🎯 마이크로러닝 — 1분 안에 끝!</h2>
      <p data-ko="📚 내 단어장에서 무작위 5개 단어를 골라 객관식 퀴즈를 만들어줍니다." data-en="📚 5 random words from your vocab list become a multiple-choice quiz.">📚 내 단어장에서 <b>무작위 5개 단어</b>를 골라 객관식 퀴즈를 만들어줍니다.</p>
      <p data-ko="⏱ 등하교·출퇴근 자투리 시간에 가볍게 복습하세요." data-en="⏱ Review during commute or short breaks.">⏱ 등하교·출퇴근 자투리 시간에 가볍게 복습하세요.</p>
      <p data-ko="🎁 정답 맞히면 단어 숙련도가 올라가요!" data-en="🎁 Correct answers boost your word mastery!">🎁 정답 맞히면 단어 숙련도가 올라가요!</p>
      <button class="start-btn" id="startBtn" onclick="startQuiz()">🚀 <span data-ko="퀴즈 시작" data-en="Start">퀴즈 시작</span></button>
      <div id="introMsg" style="margin-top:10px;font-size:12px;color:var(--text2);text-align:center"></div>
    </div>

    <!-- 단어장 비어있을 때 — 2가지 옵션 -->
    <div id="emptyBox" style="display:none;background:linear-gradient(135deg,rgba(59,130,246,0.10),rgba(99,102,241,0.06));border:1px solid rgba(99,102,241,0.30);border-radius:14px;padding:18px;margin-top:14px">
      <h3 style="margin:0 0 12px 0;font-size:16px;color:#fbbf24;font-weight:800" data-ko="📭 단어장이 비어있어요" data-en="📭 Your vocab list is empty">📭 단어장이 비어있어요</h3>
      <p style="color:var(--text2);font-size:13px;line-height:1.6;margin:0 0 16px 0" data-ko="두 가지 방법 중 하나를 선택하세요:" data-en="Choose one of these two options:">두 가지 방법 중 하나를 선택하세요:</p>

      <!-- 옵션 1: AI 자동 생성 (추천) -->
      <div style="background:rgba(16,185,129,0.10);border:1px solid rgba(16,185,129,0.30);border-radius:12px;padding:14px 16px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:22px">🤖</span>
          <div style="flex:1">
            <div style="font-weight:800;color:#6ee7b7;font-size:14.5px" data-ko="옵션 1: AI 자동 생성 (추천!)" data-en="Option 1: AI Auto-Generate (Recommended!)">옵션 1: AI 자동 생성 (추천!)</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px" data-ko="AI가 내 레벨에 맞는 단어 10개를 즉시 채워줘요" data-en="AI instantly fills 10 words matched to your level">AI가 내 레벨에 맞는 단어 10개를 즉시 채워줘요</div>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin:10px 0">
          <span style="font-size:11px;color:var(--text2);align-self:center;margin-right:4px" data-ko="레벨:" data-en="Level:">레벨:</span>
          <button class="lv-pick active" data-lv="A1" onclick="pickLv(this)"><span data-ko="A1 입문" data-en="A1 Starter">A1 입문</span></button>
          <button class="lv-pick" data-lv="A2" onclick="pickLv(this)"><span data-ko="A2 초급" data-en="A2 Elementary">A2 초급</span></button>
          <button class="lv-pick" data-lv="B1" onclick="pickLv(this)"><span data-ko="B1 중급" data-en="B1 Intermediate">B1 중급</span></button>
          <button class="lv-pick" data-lv="B2" onclick="pickLv(this)"><span data-ko="B2 중상급" data-en="B2 Upper-Int.">B2 중상급</span></button>
          <button class="lv-pick" data-lv="C1" onclick="pickLv(this)"><span data-ko="C1 고급" data-en="C1 Advanced">C1 고급</span></button>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px 0">
          <span style="font-size:11px;color:var(--text2);align-self:center;margin-right:4px" data-ko="주제(선택):" data-en="Topic (optional):">주제(선택):</span>
          <button class="topic-pick" onclick="pickTopic(this,'')" data-ko="전체" data-en="All">전체</button>
          <button class="topic-pick" onclick="pickTopic(this,'school')" data-ko="🏫 학교" data-en="🏫 School">🏫 학교</button>
          <button class="topic-pick" onclick="pickTopic(this,'family')" data-ko="👨‍👩‍👧 가족" data-en="👨‍👩‍👧 Family">👨‍👩‍👧 가족</button>
          <button class="topic-pick" onclick="pickTopic(this,'food')" data-ko="🍔 음식" data-en="🍔 Food">🍔 음식</button>
          <button class="topic-pick" onclick="pickTopic(this,'travel')" data-ko="✈️ 여행" data-en="✈️ Travel">✈️ 여행</button>
          <button class="topic-pick" onclick="pickTopic(this,'animal')" data-ko="🐾 동물" data-en="🐾 Animals">🐾 동물</button>
          <button class="topic-pick" onclick="pickTopic(this,'weather')" data-ko="☀️ 날씨" data-en="☀️ Weather">☀️ 날씨</button>
        </div>
        <button onclick="autoGenerate()" id="autoBtn" style="display:block;width:100%;padding:14px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:0;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(16,185,129,0.4)" data-ko="🤖 AI가 단어 10개 만들어주기" data-en="🤖 Let AI generate 10 words">🤖 AI가 단어 10개 만들어주기</button>
      </div>

      <!-- 옵션 2: 직접 추가 -->
      <div style="background:rgba(245,158,11,0.10);border:1px solid rgba(245,158,11,0.30);border-radius:12px;padding:14px 16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:22px">📝</span>
          <div style="flex:1">
            <div style="font-weight:800;color:#fcd34d;font-size:14.5px" data-ko="옵션 2: 직접 단어 추가" data-en="Option 2: Add words manually">옵션 2: 직접 단어 추가</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px" data-ko="내가 원하는 단어를 단어장에서 직접 추가해요" data-en="Add your own words to the vocab list">내가 원하는 단어를 단어장에서 직접 추가해요</div>
          </div>
        </div>
        <button onclick="location.href='/vocab.html'" style="display:block;width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:0;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(245,158,11,0.4)" data-ko="📚 단어장 가서 직접 추가하기" data-en="📚 Go to vocab list & add words">📚 단어장 가서 직접 추가하기</button>
      </div>
    </div>
    <div id="quizArea" style="display:none"></div>
  </div>

  <script>
    function getUid() {
      try { const u = JSON.parse(localStorage.getItem('mango_user') || 'null'); if (u && u.user_id) return u.user_id; } catch(e){}
      return 'guest_' + Math.random().toString(36).slice(2,8);
    }
    function escHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    let quizzes = [], curIdx = 0, answers = [];
    let combo = 0, bestCombo = 0, xp = 0, stars = 0;
    let timerId = null, timeLeft = 0;

    let curLevel = 'A1';
    let curTopic = '';

    /* ── 🧒/🧑‍🎓 연령 모드 (A1·A2=키즈 자동 / 상단 토글로 수동) ── */
    let modeManual = false;
    let curMode = (function(){ try{ var m=localStorage.getItem('mangoi_quiz_mode'); if(m==='kids'||m==='challenge') return m; }catch(e){} return 'kids'; })();
    function setMode(m, manual){
      curMode = (m==='challenge') ? 'challenge' : 'kids';
      if (manual){ modeManual = true; try{ localStorage.setItem('mangoi_quiz_mode', curMode); }catch(e){} }
      try{ document.body.setAttribute('data-mode', curMode); }catch(e){}
      document.querySelectorAll('.mode-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.mode===curMode); });
      var opt = document.querySelector('#opts .opt');
      if (opt && !opt.disabled) renderQuiz();   // 아직 안 푼 문제면 새 모드로 다시 그림
    }

    function pickLv(btn) {

    /* ── 효과음 (WebAudio, 별도 파일 없이 즉시 재생) ── */
    let _actx = null;
    function sfx(kind){
      try{
        if(!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)();
        var t=_actx.currentTime, o=_actx.createOscillator(), g=_actx.createGain(); o.connect(g); g.connect(_actx.destination);
        if(kind==='correct'){ o.type='sine'; o.frequency.setValueAtTime(660,t); o.frequency.setValueAtTime(990,t+0.1); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.22,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.3); o.start(t); o.stop(t+0.32); }
        else if(kind==='star'){ o.type='triangle'; o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(1175,t+0.08); o.frequency.setValueAtTime(1568,t+0.16); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.2,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.34); o.start(t); o.stop(t+0.36); }
        else { o.type='sine'; o.frequency.setValueAtTime(320,t); o.frequency.exponentialRampToValueAtTime(170,t+0.25); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.3); o.start(t); o.stop(t+0.32); }
      }catch(e){}
    }
    function vibrate(p){ try{ navigator.vibrate && navigator.vibrate(p); }catch(e){} }

    /* ── 타이머 (챌린지 모드: 10초, 초과해도 감점 없고 속도 보너스만) ── */
    function clearTimer(){ if(timerId){ clearInterval(timerId); timerId=null; } }
    function startTimer(){
      clearTimer(); timeLeft=10;
      var bar=document.getElementById('timerBar'), start=Date.now();
      timerId=setInterval(function(){
        var el=(Date.now()-start)/1000; timeLeft=Math.max(0,10-el);
        if(bar) bar.style.width=(timeLeft/10*100)+'%';
        if(timeLeft<=0){ clearTimer(); onTimeout(); }
      }, 100);
    }

    /* ── 키즈: 별/마스코트/컨페티 효과 ── */
    function renderStars(){ var s=''; for(var i=0;i<quizzes.length;i++){ s += (i<stars?'⭐':'☆'); } return s; }
    function bounceMascot(){ var m=document.getElementById('kidMascot'); if(m){ m.classList.remove('bounce'); void m.offsetWidth; m.classList.add('bounce'); } }
    function popStar(){ try{ var s=document.createElement('div'); s.className='star-pop'; s.textContent='⭐'; s.style.left=(window.innerWidth/2-15)+'px'; s.style.top=(window.innerHeight*0.42)+'px'; document.body.appendChild(s); setTimeout(function(){ s.remove(); },1000); }catch(e){} }
    function confetti(){ try{ var em=['🎉','⭐','✨','🎊','🏆']; for(var i=0;i<16;i++){ (function(i){ var c=document.createElement('div'); c.className='confetti-pc'; c.textContent=em[i%em.length]; c.style.left=Math.round(Math.random()*100)+'vw'; c.style.animationDuration=(1.4+Math.random()*1.2)+'s'; c.style.animationDelay=(Math.random()*0.3)+'s'; document.body.appendChild(c); setTimeout(function(){ c.remove(); }, 3200); })(i); } }catch(e){} }

    /* ── 진행 점 · 랭크 · 자동넘김 상태 ── */
    let dotResults = [], autoAdvTimer = null, _advancing = false;
    function renderDots(){
      var s='<div class="qdots">';
      for(var i=0;i<quizzes.length;i++){
        var cls='qdot';
        if(i===curIdx) cls+=' cur';
        else if(dotResults[i]===true) cls+=' ok';
        else if(dotResults[i]===false) cls+=' no';
        s+='<span class="'+cls+'"></span>';
      }
      return s+'</div>';
    }
    function rankLabel(){ return xp>=80 ? '🥇 Gold' : xp>=30 ? '🥈 Silver' : '🥉 Bronze'; }

    /* ── 문제 유형 다양화 (프론트에서 배치 데이터로 재구성 · 서버 변경 없음) ──
       meaning: 단어→뜻 · listen: 듣고→뜻(단어 숨김) · word: 뜻→영어단어 */
    const COMMON_EN = ['book','water','friend','house','music','apple','happy','school','family','money','time','food','color','animal','number','morning','night','summer','winter','story','teacher','student','flower','river','world'];
    function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
    function prepareQuizzes(serverQuizzes){
      var allWords = serverQuizzes.map(function(q){ return q.source_word; }).filter(Boolean);
      var rot = (curMode==='kids') ? ['meaning','listen'] : ['meaning','word','listen'];
      return serverQuizzes.map(function(q, k){
        var meaning = q.options[q.correct_index];
        var type = rot[k % rot.length];
        var base = { serverId:q.id, serverCorrect:q.correct_index, word:q.source_word, meaning:meaning, example:q.hint || '', type:type };
        if (type==='word' && allWords.filter(function(w){ return w && w!==q.source_word; }).length < 1) type='meaning', base.type='meaning';
        if (base.type==='word'){
          var pool = shuffle(allWords.filter(function(w){ return w && w!==q.source_word; }).slice()).slice(0,3);
          var extra = shuffle(COMMON_EN.filter(function(w){ return w!==q.source_word && pool.indexOf(w)<0; }));
          while(pool.length<3 && extra.length){ pool.push(extra.shift()); }
          var opts = shuffle([q.source_word].concat(pool));
          base.options=opts; base.correctIndex=opts.indexOf(q.source_word);
          base.questionText='"'+meaning+'" 는 영어로?'; base.showEmoji=false; base.audioOnLoad=false;
        } else if (base.type==='listen'){
          base.options=q.options.slice(); base.correctIndex=q.correct_index;
          base.questionText='잘 듣고 뜻을 고르세요'; base.showEmoji=false; base.audioOnLoad=true;
        } else {
          base.options=q.options.slice(); base.correctIndex=q.correct_index;
          base.questionText='이 단어의 뜻은?'; base.showEmoji=true; base.audioOnLoad=true;
        }
        return base;
      });
    }
    function pickTopic(btn, topic) {
      document.querySelectorAll('.topic-pick').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      curTopic = topic;

    function tt(ko, en) { try { return (window.getLang && window.getLang()) === 'en' ? en : ko; } catch(e){ return ko; } }
    async function autoGenerate() {
      const btn = document.getElementById('autoBtn');
      btn.disabled = true; btn.innerHTML = tt('⏳ AI 가 단어 만드는 중… (10~20초)', '⏳ AI generating words… (10–20s)');
      try {
        const r = await fetch('/api/vocab/auto-generate', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ uid: getUid(), level: curLevel, topic: curTopic, count: 10 })
        });
        const d = await r.json();
        if (d.ok && d.added > 0) {
          alert(tt(`✅ ${d.added}개 단어가 단어장에 추가되었어요!\n곧 퀴즈를 시작합니다.`, `✅ ${d.added} words added to your list!\nStarting the quiz…`));
          document.getElementById('emptyBox').style.display = 'none';
          document.getElementById('introBox').style.display = '';
          setTimeout(() => startQuiz(), 400);
        } else if (d.ok && d.added === 0) {
          alert(tt('이미 비슷한 단어들이 단어장에 있어요. 다른 레벨이나 주제를 시도해보세요!', 'You already have similar words. Try a different level or topic!'));
          btn.disabled = false; btn.innerHTML = tt('🤖 AI가 단어 10개 만들어주기','🤖 Let AI generate 10 words');
        } else {
          alert(tt('생성 실패: ', 'Generation failed: ') + (d.error || 'unknown') + tt('\n다시 시도해주세요.', '\nPlease try again.'));
          btn.disabled = false; btn.innerHTML = tt('🤖 AI가 단어 10개 만들어주기','🤖 Let AI generate 10 words');
        }
      } catch(e) {
        alert(tt('네트워크 오류 — 다시 시도해주세요', 'Network error — please try again'));
        btn.disabled = false; btn.innerHTML = tt('🤖 AI가 단어 10개 만들어주기','🤖 Let AI generate 10 words');
      }
    }

    async function startQuiz() {
      const btn = document.getElementById('startBtn');
      btn.disabled = true; btn.innerHTML = '⏳ 퀴즈 생성 중…';
      try {
        const r = await fetch('/api/vocab/gen-quiz', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ uid: getUid(), count: 5 })
        });
        const d = await r.json();
        if (!d.ok) {
          // 단어장 비어있음 → 옵션 화면 표시
          if (d.error === 'no_words') {
            document.getElementById('introBox').style.display = 'none';
            document.getElementById('emptyBox').style.display = '';
            return;
          }
          document.getElementById('introMsg').innerHTML = '⚠️ ' + escHtml(d.message || d.error || '퀴즈를 만들 수 없어요.');
          btn.disabled = false; btn.innerHTML = '🚀 퀴즈 시작';
          return;
        }
        quizzes = prepareQuizzes(d.quizzes);
        curIdx = 0; answers = []; dotResults = []; combo = 0; bestCombo = 0; xp = 0; stars = 0;
        document.getElementById('introBox').style.display = 'none';
        document.getElementById('emptyBox').style.display = 'none';
        document.getElementById('quizArea').style.display = '';
        renderQuiz();
      } catch(e) {
        document.getElementById('introMsg').textContent = '네트워크 오류 — 다시 시도해주세요.';
        btn.disabled = false; btn.innerHTML = '🚀 퀴즈 시작';
      }
    }

    function renderQuiz() {
      clearTimer();
      const Q = quizzes[curIdx];
      if (!Q) return showResult();
      const total = quizzes.length;
      const pct = ((curIdx)/total)*100;
      const area = document.getElementById('quizArea');
      const isKids = curMode === 'kids';

      const head = isKids
        ? `<div class="kid-head"><img class="kid-mascot" id="kidMascot" src="/img/mango-char.png" alt="Mango" /><div class="kid-stars" id="kidStars">${renderStars()}</div></div>`
        : `<div class="ch-stats"><span class="ch-combo" id="chCombo">🔥 ${combo}</span><span class="ch-rank">${rankLabel()}</span><span class="ch-xp" id="chXp">XP ${xp}</span></div>`;

      // 유형 배지
      const typeBadge = `<div class="q-type">${
        Q.type==='listen' ? (isKids?'👂 듣고 맞히기':'👂 Listening') :
        Q.type==='word'   ? (isKids?'🔤 영어로 말하기':'🔤 Say it in English') :
                            (isKids?'📖 뜻 맞히기':'📖 Meaning')
      }</div>`;

      // 프롬프트(그림/단어/듣기)
      let prompt;
      if (Q.type==='listen') {
        prompt = `<div class="${isKids?'kid-word':'ch-word'}"><div class="listen-ic">👂</div><button class="say-btn" id="sayBtn">🔊 <span data-ko="다시 듣기" data-en="Play again">다시 듣기</span></button></div>`;
      } else if (Q.type==='word') {
        prompt = isKids
          ? `<div class="kid-word"><div class="kid-ko">${escHtml(Q.meaning)}</div></div>`
          : `<div class="ch-word"><span class="ch-word-txt" style="color:#fbbf24">${escHtml(Q.meaning)}</span></div>`;
      } else {
        prompt = isKids
          ? `<div class="kid-word"><div class="kid-emoji">${wordEmoji(Q.word)||'🔤'}</div><button class="say-btn" id="sayBtn">🔊 <span data-ko="다시 듣기" data-en="Play">다시 듣기</span></button></div>`
          : `<div class="ch-word"><span class="ch-word-txt">${escHtml(Q.word||'')}</span><button class="say-btn sm" id="sayBtn">🔊</button></div>`;
      }
      const timer = isKids ? '' : `<div class="timer-wrap"><div class="timer-bar" id="timerBar"></div></div>`;

      area.innerHTML = `
        <div id="qdotsWrap">${renderDots()}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        ${head}
        <div class="quiz-card ${isKids?'kids':'challenge'}">
          <div class="q-num">${isKids ? ('문제 '+(curIdx+1)+' / '+total) : ('Q'+(curIdx+1)+' / '+total)}</div>
          ${typeBadge}
          ${timer}
          ${prompt}
          <div class="q-text">${escHtml(Q.questionText)}</div>
          <div id="opts" class="${isKids?'opts-kids':'opts-ch'}">
            ${Q.options.map((o, i) => `<button class="opt" data-i="${i}" onclick="pickAnswer(${i})">${isKids?'':('<span class="opt-prefix">'+String.fromCharCode(65+i)+'</span>')}${escHtml(o)}</button>`).join('')}
          </div>
          <div id="feedback" class="fb" style="display:none"></div>
          <div id="nextRow" class="nav-btns" style="display:none">
            <button class="nav-btn primary" onclick="nextQuiz()">${curIdx === total-1 ? (isKids?'🎉 결과 보기':'🎯 See Result') : (isKids?'다음 →':'Next →')}</button>
          </div>
        </div>
      `;
      var sb = document.getElementById('sayBtn'); if (sb) sb.onclick = function(){ speakWord(Q.word); };
      if (Q.audioOnLoad) setTimeout(function(){ speakWord(Q.word); }, 260);   // 단어 발음 자동 재생(듣기/뜻 유형)
      if (!isKids) startTimer();
      try{ if(window.applyLang) applyLang(); else if(window.mangoApplyI18n) mangoApplyI18n(); }catch(e){}
    }

    function recordProgress(Q, isCorrect) {
      // 서버 숙련도 기록: 정답이면 서버 정답 index, 오답이면 다른 index 로 번역 제출(유형 무관 일관 기록)
      var serverAns = isCorrect ? Q.serverCorrect : (Q.serverCorrect === 0 ? 1 : 0);
      try { fetch('/api/vocab/quiz-submit', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ quiz_id: Q.serverId, answer: serverAns }) }); } catch(e) {}
    }
    function pickAnswer(i) {
      var first = document.querySelector('#opts .opt');
      if (first && first.disabled) return;   // 중복 클릭 방지
      clearTimer();
      const Q = quizzes[curIdx];
      document.querySelectorAll('.opt').forEach(b => b.disabled = true);
      revealAnswer(i, false);
    }
    function onTimeout() {
      if (document.querySelector('.opt.correct') || document.querySelector('.opt.wrong')) return;
      document.querySelectorAll('.opt').forEach(b => b.disabled = true);
      revealAnswer(-1, true);
    }

    function revealAnswer(i, timedOut) {
      const Q = quizzes[curIdx];
      const correctIndex = Q.correctIndex;
      const isCorrect = !timedOut && i === correctIndex;
      const isKids = curMode === 'kids';
      recordProgress(Q, isCorrect);
      dotResults[curIdx] = isCorrect;
      answers.push({ word: Q.word, meaning: Q.meaning, example: Q.example, correct: isCorrect });

      document.querySelectorAll('.opt').forEach(b => {
        const bi = parseInt(b.dataset.i);
        if (bi === correctIndex) b.classList.add('correct');
        else if (bi === i && !isCorrect) b.classList.add('wrong');
      });
      var dz = document.getElementById('qdotsWrap'); if (dz) dz.innerHTML = renderDots();
      speakWord(Q.word);   // 답한 뒤 단어 발음(특히 '영어로 말하기' 유형에서 정답 확인)
      const fb = document.getElementById('feedback');
      fb.style.display = 'block';

      if (isCorrect) {
        combo++; bestCombo = Math.max(bestCombo, combo);
        sfx('correct'); vibrate(30);
        if (isKids) {
          stars++; sfx('star'); bounceMascot(); popStar();
          var st = document.getElementById('kidStars'); if (st) st.innerHTML = renderStars();
          var praise = ['잘했어! 🎉','최고야! 🌟','우와 정답! 👏','대단해! 💯'];
          fb.className = 'fb ok';
          fb.innerHTML = (combo>=3 ? ('🔥 '+combo+'개 연속! ') : '') + praise[combo % praise.length];
        } else {
          var speed = Math.max(0, Math.round(timeLeft));
          var gained = 10 + speed + (combo>=2 ? combo*2 : 0);
          xp += gained;
          fb.className = 'fb ok';
          fb.innerHTML = '✅ Nice!' + (combo>=2 ? (' 🔥 x'+combo) : '') + ' <span class="xp-plus">+'+gained+' XP</span>' + (speed>0 ? (' <span class="spd">⚡ speed +'+speed+'</span>') : '');
          var cc = document.getElementById('chCombo'); if (cc) cc.textContent = '🔥 '+combo;
          var cx = document.getElementById('chXp'); if (cx) cx.textContent = 'XP '+xp;
          var cr = document.querySelector('.ch-rank'); if (cr) cr.textContent = rankLabel();
        }
        if (autoAdvTimer) clearTimeout(autoAdvTimer);
        autoAdvTimer = setTimeout(function(){ nextQuiz(); }, 1200);   // 정답이면 자연스럽게 자동 진행
      } else {
        combo = 0;
        sfx('wrong'); vibrate([15,40,15]);
        var ans = escHtml(Q.options[correctIndex]);
        if (isKids) {
          fb.className = 'fb no';
          fb.innerHTML = (timedOut ? '⏰ 시간이 다 됐어요! ' : '괜찮아, 다음엔 맞힐 수 있어! 😊 ') + '정답: <b>'+ans+'</b>';
        } else {
          fb.className = 'fb no';
          fb.innerHTML = (timedOut ? '⏰ Time up — ' : '❌ Not quite — ') + 'it\'s <b>'+ans+'</b>';
          var cc2 = document.getElementById('chCombo'); if (cc2) cc2.textContent = '🔥 0';
        }
      }
      document.getElementById('nextRow').style.display = '';
    }

    function nextQuiz() {
      if (_advancing) return;
      _advancing = true;
      if (autoAdvTimer) { clearTimeout(autoAdvTimer); autoAdvTimer = null; }
      clearTimer();
      curIdx++;
      if (curIdx >= quizzes.length) showResult();
      else renderQuiz();
      setTimeout(function(){ _advancing = false; }, 60);
    }

    function showResult() {
      clearTimer();
      const correct = answers.filter(a => a.correct).length;
      const total = answers.length || 1;
      const pct = Math.round((correct/total)*100);
      const isKids = curMode === 'kids';
      const wrong = answers.filter(a => !a.correct);

      const head = isKids
        ? `<div class="result-emoji">${pct===100?'🏆':pct>=60?'🌟':'🌱'}</div><div class="result-score" style="color:${pct>=80?'#10b981':pct>=60?'#fbbf24':'#ef4444'}">⭐ ${correct} / ${total}</div><div class="result-label">별 ${correct}개 획득!</div>`
        : `<div class="result-score" style="color:${pct>=80?'#10b981':pct>=60?'#fbbf24':'#ef4444'}">${correct} / ${total}</div><div class="result-label">정답률 ${pct}% · XP +${xp} · 🔥 best x${bestCombo}</div>`;
      const msg = isKids
        ? (pct===100 ? '완벽해요! 모든 단어를 알고 있어요 🎉' : pct>=60 ? '잘했어요! 조금만 더 하면 완벽해요 💪' : '좋은 시작이에요! 다시 해볼까요? 🌱')
        : (pct===100 ? '🏆 Perfect! Flawless run.' : pct>=80 ? '✨ Great job — almost perfect.' : pct>=60 ? '💪 Solid. Review the misses and retry.' : '🌱 Keep going — review and beat your score.');

      let note = '';
      if (wrong.length) {
        note = `<div class="wrong-note"><div class="wn-title">📒 ${isKids?'다시 볼 단어':'Review these'}</div>` +
          wrong.map(w => `<div class="wn-item"><button class="say-btn xs wn-say" data-w="${escHtml(w.word||'')}">🔊</button><b>${escHtml(w.word||'')}</b> — ${escHtml(w.meaning||'')}${w.example?`<div class="wn-ex">${escHtml(w.example)}</div>`:''}</div>`).join('') +
          `</div>`;
      }

      document.getElementById('quizArea').innerHTML = `
        <div class="quiz-card result-card">
          ${head}
          <div class="result-msg">${msg}</div>
          ${note}
          <div class="nav-btns" style="margin-top:18px">
            <button class="nav-btn" onclick="location.reload()">🔁 ${isKids?'다시 풀기':'Retry'}</button>
            <button class="nav-btn" onclick="location.href='/vocab.html'">📚 ${isKids?'단어장':'Vocab'}</button>
          </div>
          <button class="nav-btn primary" style="width:100%;margin-top:10px" onclick="window.MangoFlow&&MangoFlow.open('quiz')">🚀 ${isKids?'다음 활동':'Next activity'}</button>
        </div>
      `;
      document.querySelectorAll('.wn-say').forEach(b => b.onclick = function(){ speakWord(b.dataset.w); });
      if (pct >= 80) confetti();
    }

    setMode(curMode, false);   // 초기: body[data-mode] + 토글 활성화 반영

    /* ⌨️ 키보드 응답: 1~4 또는 A~D 로 보기 선택, Enter/Space 로 다음 (집중·속도↑) */
    document.addEventListener('keydown', function(e){
      var optsEl = document.getElementById('opts');
      if (optsEl) {
        var opts = optsEl.querySelectorAll('.opt');
        if (opts.length && !opts[0].disabled) {
          var idx = -1;
          if (e.key >= '1' && e.key <= '9') idx = (+e.key) - 1;
          else { var L = (e.key||'').toLowerCase(); if (L>='a' && L<='j') idx = L.charCodeAt(0) - 97; }
          if (idx >= 0 && idx < opts.length) { e.preventDefault(); pickAnswer(idx); return; }
        }
      }
      if (e.key === 'Enter' || e.key === ' ') {
        var nr = document.getElementById('nextRow');
        if (nr && nr.style.display !== 'none') { e.preventDefault(); nextQuiz(); }
      }
    });
