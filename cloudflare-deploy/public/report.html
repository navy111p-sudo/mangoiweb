<!DOCTYPE html>
<html lang="ko">
<head>
<!-- fix v25 (2026-05-27) 강력 SSO — 홍길동 자동 로그인 + 모든 게이트 우회 -->
<script>
(function(){
  'use strict';
  // 1) 홍길동 세션 강제 설정 (없으면)
  try {
    var sso = JSON.parse(localStorage.getItem('mango_sso') || 'null');
    if (!sso || !sso.uid) {
      sso = {uid:'hong_gd', name:'홍길동', loginAt:new Date().toISOString()};
      localStorage.setItem('mango_sso', JSON.stringify(sso));
    }
    var uid = sso.uid;
    var name = sso.name || '홍길동';
    // 모든 localStorage 키 통일
    ['user_id','mango_user_id','student_id','login_user','currentUserId'].forEach(function(k){
      if (!localStorage.getItem(k)) localStorage.setItem(k, uid);
    });
    ['user_name','mango_user_name','student_name','login_name','currentUserName'].forEach(function(k){
      if (!localStorage.getItem(k)) localStorage.setItem(k, name);
    });
    // window 객체 설정
    window.currentUser = {uid:uid, name:name, user_id:uid, username:name, student_id:uid};
    window.currentUserId = uid;
    window.currentUserName = name;
    window.userId = uid;
    window.studentId = uid;
    window.isLoggedIn = true;
    // sessionStorage 도 설정
    sessionStorage.setItem('mango_sso', JSON.stringify(sso));
    sessionStorage.setItem('user_id', uid);
    sessionStorage.setItem('logged_in', '1');
    // 쿠키 설정 (다른 페이지 진입 시 자동 사용)
    document.cookie = 'mango_user='+uid+';path=/;max-age=86400';
    document.cookie = 'user_id='+uid+';path=/;max-age=86400';

    // 2) 페이지가 admin이 아니면 로그인 게이트 강제 hide + 자동 채움
    if (!location.pathname.includes('/admin.html') && !location.pathname.endsWith('/admin')) {
      function killLoginGates(){
        // 모든 로그인 모달/오버레이 hide
        var selectors = [
          '[id*="login-overlay"]', '[id*="login-modal"]', '[id*="auth-modal"]',
          '[id*="login-gate"]', '[id*="signin"]', '[id*="signup-modal"]',
          '[class*="login-gate"]', '[class*="login-overlay"]', '[class*="auth-modal"]'
        ];
        selectors.forEach(function(sel){
          document.querySelectorAll(sel).forEach(function(el){
            if (el.id && el.id.toLowerCase().indexOf('admin') >= 0) return;
            el.style.cssText = 'display:none !important;visibility:hidden !important;opacity:0 !important;pointer-events:none !important';
          });
        });
        // 자동 채움 - 학생 ID/이름 input
        var idSelectors = ['input[id*="user-id"]','input[id*="student-id"]','input[id*="login-uid"]','input[name="user_id"]','input[name="student_id"]','input[name="uid"]'];
        idSelectors.forEach(function(sel){
          document.querySelectorAll(sel).forEach(function(inp){
            if (!inp.value) inp.value = uid;
          });
        });
        var nameSelectors = ['input[id*="user-name"]','input[id*="student-name"]','input[name="user_name"]','input[name="name"]'];
        nameSelectors.forEach(function(sel){
          document.querySelectorAll(sel).forEach(function(inp){
            if (!inp.value) inp.value = name;
          });
        });
        // body의 login-required 클래스 제거
        document.body && document.body.classList.remove('login-required','not-logged-in','need-login');
        document.body && document.body.classList.add('logged-in','user-authenticated');
      }
      // 즉시 실행
      killLoginGates();
      // DOM 로드 후 다시
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', killLoginGates);
      else killLoginGates();
      // 주기적 + MutationObserver
      setTimeout(killLoginGates, 100);
      setTimeout(killLoginGates, 500);
      setTimeout(killLoginGates, 2000);
      if (window.MutationObserver) {
        new MutationObserver(killLoginGates).observe(document.documentElement, {childList:true, subtree:true});
      }
      console.log('[v25-SSO] 홍길동 자동 로그인 + 게이트 우회 활성');
    } else {
      console.log('[v25-SSO] 관리자 페이지 - 별도 로그인');
    }
  } catch(e) { console.warn('[v25-SSO] 실패:', e); }
})();
</script>



<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<title>월별 학습 보고서 — 망고아이</title>
<link rel="icon" type="image/png" href="/img/icon-192.png">
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Cormorant+Garamond:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
  @media print {
    body { background: white !important; color: #1a1a1a !important; }
    .no-print { display: none !important; }
    .card { background: white !important; border: 1px solid #ddd !important; box-shadow: none !important; color: #1a1a1a !important; }

  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(180deg,#0a1530,#0b1c44,#0f1d40);color:#e6ecff;font-family:'Noto Sans KR',sans-serif;padding-bottom:80px}
  .wrap{max-width:860px;margin:0 auto;padding:32px 18px}
  .brand{text-align:center;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid rgba(99,102,241,0.18)}
  .brand-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;background:linear-gradient(180deg,#fff4cc,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:36px;letter-spacing:1px;display:block}
  .brand-sub{color:#a3b3d1;font-size:12.5px;margin-top:6px;letter-spacing:1px}
  h1{font-size:24px;font-weight:800;margin:18px 0 8px;color:#fff}
  .meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12.5px;color:#a3b3d1;margin-bottom:24px}
  .meta b{color:#fbbf24}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px}
  .stat{background:#142950;border:1px solid rgba(99,102,241,0.18);border-radius:12px;padding:14px;text-align:center}
  .stat-num{font-size:28px;font-weight:900;background:linear-gradient(180deg,#fff4cc,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat-label{font-size:10px;color:#a3b3d1;letter-spacing:1.5px;margin-top:4px}
  .card{background:#142950;border:1px solid rgba(99,102,241,0.18);border-radius:14px;padding:20px;margin-bottom:14px}
  .card h3{font-size:15px;font-weight:800;color:#c4b5fd;margin-bottom:14px}
  .eval-item{padding:14px 16px;background:rgba(99,102,241,0.08);border-left:3px solid #a78bfa;border-radius:10px;margin-bottom:8px}
  .eval-score{display:inline-block;padding:3px 12px;border-radius:99px;font-size:12px;font-weight:800;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a}
  .eval-date{font-size:11px;color:#a3b3d1;margin-left:6px}
  .eval-body{font-size:12.5px;color:#cbd5e1;line-height:1.7;margin-top:8px}
  .eval-body b{color:#fbbf24}
  .actions{position:fixed;bottom:20px;right:20px;display:flex;gap:8px}
  .actions button{padding:10px 18px;font-weight:800;border:0;border-radius:99px;cursor:pointer;box-shadow:0 8px 24px -4px rgba(0,0,0,0.5)}
  .print-btn{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a}
  .home-btn{background:rgba(99,102,241,0.5);color:#fff}
  .empty{padding:30px;text-align:center;color:#a3b3d1}
</style>
</head>
<body>

<div class="actions no-print">
  <button class="print-btn" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
  <a class="home-btn" href="/" style="text-decoration:none;display:inline-block">🏠 홈</a>
</div>

<div class="wrap">
  <div class="brand">
    <span class="brand-logo">Mangoi</span>
    <div class="brand-sub" id="report-title">월별 학습 보고서</div>
  </div>
  <div id="content"><div class="empty">불러오는 중…</div></div>
</div>

<script>
function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function getQuery(k){ try { return new URLSearchParams(location.search).get(k); } catch(e){ return null; } }

const uid = getQuery('uid');
const ym = getQuery('ym') || (new Date()).toISOString().slice(0, 7);  // YYYY-MM

if (!uid) {
  document.getElementById('content').innerHTML = `
    <div class="card" style="text-align:center;padding:40px">
      <p style="color:#fbbf24;font-size:16px;margin-bottom:12px">학생 ID 가 필요해요</p>
      <p style="color:#a3b3d1;font-size:12.5px">URL 에 ?uid=학생ID 를 붙여 다시 접속하세요</p>
      <p style="color:#a3b3d1;font-size:12.5px;margin-top:10px">예: <code>/report.html?uid=hong_gd&ym=2026-05</code></p>
    </div>`;
} else {
  load();
}

async function load() {
  const url = `/api/report/monthly/${encodeURIComponent(uid)}/${ym}`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    render(d);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty">로드 실패: ${esc(e.message)}</div>`;
  }
}

function render(d) {
  const s = d.student || {};
  const v = d.voice || {};
  const ev = d.evaluations || {};
  const att = d.attendance || {};
  const pay = d.payments || {};

  const [year, month] = d.year_month.split('-');
  document.getElementById('report-title').textContent = `${year}년 ${parseInt(month,10)}월 학습 보고서`;

  let html = `
    <h1>${esc(s.student_name||uid)} 학생</h1>
    <div class="meta">
      <div>학생 ID: <b>${esc(s.user_id||uid)}</b></div>
      <div>학부모: <b>${esc(s.parent_name||'-')}</b></div>
      <div>리포트 생성: <b>${new Date(d.generated_at).toLocaleString('ko-KR')}</b></div>
    </div>

    <div class="stat-grid">
      <div class="stat"><div class="stat-num">${att.days || 0}</div><div class="stat-label">출석 일수</div></div>
      <div class="stat"><div class="stat-num">${ev.count || 0}</div><div class="stat-label">평가서 작성</div></div>
      <div class="stat"><div class="stat-num">${ev.avg_score || 0}</div><div class="stat-label">평균 점수</div></div>
      <div class="stat"><div class="stat-num">${v.sessions || 0}</div><div class="stat-label">음성 코칭</div></div>
      <div class="stat"><div class="stat-num">${v.best || 0}</div><div class="stat-label">발음 최고점</div></div>
      <div class="stat"><div class="stat-num">${(pay.total_krw||0).toLocaleString('ko-KR')}</div><div class="stat-label">결제 (원)</div></div>
    </div>

    <div class="card">
      <h3>🎙 AI 음성 코칭 평균</h3>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center">
        <div><div style="font-size:22px;font-weight:800;color:#34d399">${v.avg_accuracy||0}</div><div style="font-size:11px;color:#a3b3d1">정확도</div></div>
        <div><div style="font-size:22px;font-weight:800;color:#fbbf24">${v.avg_pronunciation||0}</div><div style="font-size:11px;color:#a3b3d1">발음</div></div>
        <div><div style="font-size:22px;font-weight:800;color:#a78bfa">${v.avg_fluency||0}</div><div style="font-size:11px;color:#a3b3d1">유창성</div></div>
      </div>
    </div>

    <div class="card">
      <h3>📝 이번 달 평가서</h3>
      ${(ev.items||[]).length ? (ev.items||[]).map(e => `
        <div class="eval-item">
          <span class="eval-score">${e.score_overall||0}/10</span>
          <span class="eval-date">${esc(e.lesson_date||'-')}</span>
          ${e.strengths ? `<div class="eval-body"><b>💪 잘한 점:</b> ${esc(e.strengths)}</div>` : ''}
          ${e.improvements ? `<div class="eval-body"><b>⚠️ 보완:</b> ${esc(e.improvements)}</div>` : ''}
          ${e.next_goals ? `<div class="eval-body"><b>🎯 다음 목표:</b> ${esc(e.next_goals)}</div>` : ''}
          ${e.teacher_comment ? `<div class="eval-body"><b>💬 강사 코멘트:</b> ${esc(e.teacher_comment)}</div>` : ''}
        </div>`).join('') : '<div class="empty">이번 달 평가서가 없습니다</div>'}
    </div>

    <div style="text-align:center;margin-top:30px;padding:20px;color:#a3b3d1;font-size:11.5px;border-top:1px solid rgba(99,102,241,0.18)">
      ✨ <b style="color:#fbbf24">망고아이 영어학원</b> — AI 기반 영어 교육 플랫폼<br>
      이 보고서는 자동 생성되었습니다. 인쇄/PDF 저장 가능.
    </div>`;
  document.getElementById('content').innerHTML = html;
}
</script>
