<style>
:root {
  --bg: #0B1224;
  --bg-soft: #131C36;
  --bg-card: #1A2548;
  --bg-card-2: #1E2D58;
  --border: rgba(96, 165, 250, 0.18);
  --border-strong: rgba(96, 165, 250, 0.45);
  --text: #E2E8F0;
  --text-dim: #94A3B8;
  --text-mute: #64748B;
  --accent: #3B82F6;
  --accent-2: #60A5FA;
  --accent-soft: rgba(59, 130, 246, 0.15);
  --warn: #FBBF24;
  --warn-soft: rgba(251, 191, 36, 0.15);
  --ok: #10B981;
  --ok-soft: rgba(16, 185, 129, 0.15);
  --bad: #EF4444;
  --cn-red: #DC2626;
  --cn-gold: #F59E0B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:linear-gradient(160deg,var(--bg) 0%,#0E1834 100%);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Noto Sans SC","PingFang SC","Microsoft YaHei","Pretendard",sans-serif;
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.wrap{max-width:900px;margin:0 auto;padding:16px 14px 100px}

/* 헤더 */
header.hero{
  background:linear-gradient(135deg,var(--cn-red) 0%,var(--cn-gold) 100%);
  border-radius:16px;padding:22px 24px;margin-bottom:16px;
  box-shadow:0 12px 30px -8px rgba(220,38,38,0.4);
  position:relative;overflow:hidden;
}
header.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 60%);pointer-events:none}
header.hero h1{font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.4px;display:flex;align-items:center;gap:10px;position:relative}
header.hero h1 .ico{font-size:32px}
header.hero .sub{margin-top:6px;font-size:13.5px;color:rgba(255,255,255,0.92);font-weight:600;position:relative}
header.hero .home{position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);color:#fff;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:700;text-decoration:none;transition:background .15s}
header.hero .home:hover{background:rgba(255,255,255,0.28)}

/* 레벨 선택 카드 */
.lvl-section{margin-bottom:18px}
.lvl-section h2{font-size:14px;font-weight:700;color:var(--accent-2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.lvl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.lvl-btn{
  background:var(--bg-card);border:1.5px solid var(--border);border-radius:12px;
  padding:12px 10px;cursor:pointer;text-align:center;
  font-size:13px;font-weight:700;color:var(--text);
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.lvl-btn:hover{border-color:var(--accent);background:var(--bg-card-2)}
.lvl-btn.active{
  background:linear-gradient(135deg,var(--accent),#1D4ED8);
  border-color:var(--accent-2);color:#fff;
  box-shadow:0 6px 18px -4px rgba(59,130,246,0.5);
}
.lvl-btn .num{font-size:18px;font-weight:900;display:block;margin-bottom:2px}
.lvl-btn .lbl{font-size:11px;color:var(--text-dim);font-weight:600}
.lvl-btn.active .lbl{color:rgba(255,255,255,0.85)}

/* 그룹 토글 (다락원 / Lv 1~20) */
.group-tabs{display:flex;gap:6px;background:var(--bg-card);padding:4px;border-radius:12px;margin-bottom:12px;border:1px solid var(--border)}
.group-tab{flex:1;padding:9px 12px;background:transparent;border:0;color:var(--text-dim);font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;transition:all .15s}
.group-tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px -3px rgba(59,130,246,0.4)}

/* 메인 카드 — 현재 문장 */
.main-card{
  background:var(--bg-card);border:1.5px solid var(--border);border-radius:16px;
  padding:24px 22px;margin-bottom:14px;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
.main-card .prompt-label{font-size:12px;color:var(--text-dim);margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px}
.main-card .chinese{
  font-size:30px;font-weight:700;color:#fff;letter-spacing:1px;line-height:1.4;
  text-align:center;padding:10px 0;
  font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
}
.main-card .pinyin{
  font-size:16px;color:var(--cn-gold);font-weight:600;text-align:center;
  margin-top:6px;font-style:italic;letter-spacing:0.5px;
}
.main-card .korean{
  font-size:14px;color:var(--text-dim);text-align:center;margin-top:10px;
  padding-top:10px;border-top:1px dashed var(--border);
}

/* 컨트롤 */
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;justify-content:center}
.btn{
  padding:11px 18px;border:0;border-radius:10px;cursor:pointer;
  font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:6px;
  transition:transform .12s,filter .15s;
}
.btn:active{transform:scale(0.96)}
.btn:hover{filter:brightness(1.1)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#1D4ED8);color:#fff}
.btn-ghost{background:transparent;color:var(--accent-2);border:1px solid var(--accent)}
.btn-warn{background:linear-gradient(135deg,var(--cn-gold),var(--cn-red));color:#fff}
.btn-record{background:linear-gradient(135deg,var(--bad),#B91C1C);color:#fff;padding:13px 24px;font-size:14.5px}
.btn-record.recording{background:linear-gradient(135deg,var(--ok),#059669);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.5)}50%{box-shadow:0 0 0 14px rgba(16,185,129,0)}}

/* 속도 슬라이더 */
.speed-row{display:flex;align-items:center;gap:10px;margin-top:14px;background:var(--bg-soft);padding:10px 14px;border-radius:10px}
.speed-row label{font-size:12px;color:var(--text-dim);font-weight:600;min-width:36px}
.speed-row input[type=range]{flex:1}
.speed-row .val{font-size:13px;color:var(--cn-gold);font-weight:800;min-width:38px;text-align:right}

/* 진행 + 결과 */
.progress{font-size:12px;color:var(--text-dim);text-align:center;margin-top:10px}
.result-card{
  background:var(--bg-card-2);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-top:12px;display:none;
}
.result-card.show{display:block;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.result-card .score{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--ok),var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.result-card .feedback{font-size:13px;color:var(--text-dim);margin-top:6px;text-align:center;line-height:1.6}

/* 단원 선택 (다락원) */
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:6px;margin-bottom:14px}
.lesson-btn{
  background:var(--bg-soft);border:1px solid var(--border);border-radius:9px;
  padding:8px 4px;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--text-dim);
  text-align:center;line-height:1.3;transition:all .15s;
}
.lesson-btn:hover{border-color:var(--cn-gold);color:var(--text)}
.lesson-btn.active{background:linear-gradient(135deg,var(--cn-red),var(--cn-gold));color:#fff;border-color:transparent}
.lesson-btn .l-num{font-weight:900;display:block;font-size:13px}

/* 모바일 */
@media (max-width:600px){
  .wrap{padding:12px 10px 80px}
  header.hero{padding:18px 16px}
  header.hero h1{font-size:18px}
  header.hero .home{top:10px;right:10px;font-size:11px;padding:5px 10px}
  .main-card{padding:18px 14px}
  .main-card .chinese{font-size:24px}
  .main-card .pinyin{font-size:14px}
  .lvl-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
}
</style>
</head>

let state = {
  group: 'darakwon',
  darakwonBook: 3,
  lessonIdx: 0,
  lv: 1,
  attempt: 1,
  speed: 0.85,
  recording: false,
};

/* ── 다락원 마스터 카드 렌더 ── */
function renderDarakwon(){
  const grid = document.getElementById('darakwon-grid');
  grid.innerHTML = '';
  Object.entries(DARAKWON).forEach(([k, v]) => {
    const b = document.createElement('button');
    b.className = 'lvl-btn' + (Number(k) === state.darakwonBook ? ' active' : '');
    b.innerHTML = `<span class="num">${k}</span><span class="lbl">${v.name}<br>${v.sub}</span>`;
    b.onclick = () => { state.darakwonBook = Number(k); state.lessonIdx = 0; renderDarakwon(); renderLessons(); pickRandom(); };
    grid.appendChild(b);
  });
}

function renderLessons(){
  const grid = document.getElementById('lesson-grid');
  grid.innerHTML = '';
  const book = DARAKWON[state.darakwonBook];
  if (!book) return;
  book.lessons.forEach((l, i) => {
    const b = document.createElement('button');
    b.className = 'lesson-btn' + (i === state.lessonIdx ? ' active' : '');
    b.innerHTML = `<span class="l-num">${i+1}</span>${l.t.replace(/제\d+과\s*/,'')}`;
    b.onclick = () => { state.lessonIdx = i; renderLessons(); pickRandom(); };
    grid.appendChild(b);
  });
}

/* ── Lv 1~20 카드 렌더 ── */
function renderLv(){
  const grid = document.getElementById('lv-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 20; i++) {
    const b = document.createElement('button');
    b.className = 'lvl-btn' + (i === state.lv ? ' active' : '');
    const lbl = i <= 4 ? '입문' : i <= 8 ? '초급' : i <= 12 ? '중급' : i <= 16 ? '상급' : '원어민';
    b.innerHTML = `<span class="num">Lv ${i}</span><span class="lbl">${lbl}</span>`;
    b.onclick = () => { state.lv = i; renderLv(); pickRandom(); };
    grid.appendChild(b);
  }
}

/* ── 문장 선택 ── */
function pickRandom(){
  let pool = [];
  if (state.group === 'darakwon') {
    const book = DARAKWON[state.darakwonBook];
    const lesson = book && book.lessons[state.lessonIdx];
    pool = (lesson && lesson.s) || [];
  } else {
    pool = LV_SENTENCES[state.lv] || [];
  }
  if (!pool.length) return;
  const item = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('cn-text').textContent = item.c;
  document.getElementById('cn-pinyin').textContent = item.p;
  document.getElementById('cn-korean').textContent = item.k;
  state.attempt = 1;
  document.getElementById('progress').textContent = `시도 ${state.attempt}/3 · 버튼을 눌러 녹음을 시작하세요`;
  document.getElementById('result').classList.remove('show');
}

/* ── TTS ── */
function speak(){
  if (!('speechSynthesis' in window)) { alert('이 브라우저는 TTS 를 지원하지 않습니다.'); return; }
  const text = document.getElementById('cn-text').textContent;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = state.speed;
  u.pitch = 1;
  // 가능한 중국어 음성 선택
  const voices = speechSynthesis.getVoices();
  const cn = voices.find(v => /zh|chinese|mandarin/i.test(v.lang + ' ' + v.name));
  if (cn) u.voice = cn;
  speechSynthesis.speak(u);
}

/* ── 녹음 + 평가 ── */
let recognition = null, recording = false;
function startRecord(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('이 브라우저는 음성 인식을 지원하지 않습니다.\nChrome 또는 Edge 를 사용해 주세요.'); return; }
  if (recording) { recognition && recognition.stop(); return; }
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  const btn = document.getElementById('btn-rec');
  btn.textContent = '🛑 녹음 중지'; btn.classList.add('recording');
  recording = true;
  document.getElementById('progress').textContent = '🎙 듣고 있어요…';

  recognition.onresult = function(e){
    const said = e.results[0][0].transcript.trim();
    const target = document.getElementById('cn-text').textContent.replace(/[,.。?!?!]/g, '').trim();
    const saidClean = said.replace(/[,.。?!?!]/g, '').trim();
    // 간단 비교 — 글자 일치율
    let match = 0;
    for (let i = 0; i < target.length; i++) {
      if (saidClean.includes(target[i])) match++;
    }
    const score = Math.min(100, Math.round((match / target.length) * 100));
    showResult(score, said);
  };
  recognition.onerror = function(e){
    stopRecord();
    document.getElementById('progress').textContent = '⚠️ 인식 실패: ' + (e.error || 'error');
  };
  recognition.onend = stopRecord;
  recognition.start();
}
function stopRecord(){
  recording = false;
  const btn = document.getElementById('btn-rec');
  btn.textContent = '🎙 녹음 시작'; btn.classList.remove('recording');
}
function showResult(score, said){
  const r = document.getElementById('result');
  r.classList.add('show');
  document.getElementById('score').textContent = score + '점';
  let fb = '';
  if (score >= 85) fb = `✅ 정말 잘했어요! 원어민처럼 정확해요.\n인식: "${said}"`;
  else if (score >= 60) fb = `👍 잘했어요! 조금만 더 또박또박.\n인식: "${said}"`;
  else fb = `💪 다시 한번 도전!\n원어민 발음을 다시 들어보세요.\n인식: "${said}"`;
  document.getElementById('feedback').textContent = fb;
  state.attempt = Math.min(3, state.attempt + 1);
  document.getElementById('progress').textContent = `시도 ${state.attempt}/3`;
}

/* ── 그룹 토글 ── */
document.querySelectorAll('.group-tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.group-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.group = t.dataset.group;
    document.getElementById('grp-darakwon').style.display = state.group === 'darakwon' ? '' : 'none';
    document.getElementById('grp-lv').style.display = state.group === 'lv' ? '' : 'none';
    pickRandom();
  };
});

/* ── 이벤트 바인딩 ── */
document.getElementById('btn-tts').onclick = speak;
document.getElementById('btn-next').onclick = pickRandom;
document.getElementById('btn-rec').onclick = startRecord;
document.getElementById('speed-range').oninput = function(){
  state.speed = parseFloat(this.value);
  document.getElementById('speed-val').textContent = state.speed.toFixed(2) + 'x';
};

/* ── 초기 렌더 ── */
renderDarakwon();
renderLessons();
renderLv();
pickRandom();

// TTS 보이스 비동기 로딩 트리거
if ('speechSynthesis' in window) speechSynthesis.getVoices();

console.log('[speech-coach-cn] 중국어 발음 교정 활성 — 다락원 마스터 + Lv 1~20');
</script>
