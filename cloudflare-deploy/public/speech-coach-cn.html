<style>
:root {
  --bg: #0B1224;
  --bg-soft: #131C36;

  --border: rgba(96, 165, 250, 0.18);

  --text: #E2E8F0;
  --text-dim: #94A3B8;
  --text-mute: #64748B;
  --accent: #3B82F6;
  --accent-2: #60A5FA;
  --accent-soft: rgba(59, 130, 246, 0.15);
  --warn: #FBBF24;
  --warn-soft: rgba(251, 191, 36, 0.15);
  --ok: #10B981;

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{

}
.wrap{max-width:900px;margin:0 auto;padding:16px 14px 100px}

/* 헤더 */
header.hero{
  background:linear-gradient(135deg,var(--cn-red) 0%,var(--cn-gold) 100%);
  border-radius:16px;padding:22px 24px;margin-bottom:16px;
  box-shadow:0 12px 30px -8px rgba(220,38,38,0.4);
  position:relative;overflow:hidden;
}
header.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 60%);pointer-events:none}
header.hero h1{font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.4px;display:flex;align-items:center;gap:10px;position:relative}
header.hero h1 .ico{font-size:32px}
header.hero .sub{margin-top:6px;font-size:13.5px;color:rgba(255,255,255,0.92);font-weight:600;position:relative}
header.hero .home{position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);color:#fff;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:700;text-decoration:none;transition:background .15s}
header.hero .home:hover{background:rgba(255,255,255,0.28)}

/* 레벨 선택 카드 */
.lvl-section{margin-bottom:18px}
.lvl-section h2{font-size:14px;font-weight:700;color:var(--accent-2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.lvl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.lvl-btn{
  background:var(--bg-card);border:1.5px solid var(--border);border-radius:12px;
  padding:12px 10px;cursor:pointer;text-align:center;
  font-size:13px;font-weight:700;color:var(--text);
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.lvl-btn:hover{border-color:var(--accent);background:var(--bg-card-2)}
.lvl-btn.active{
  background:linear-gradient(135deg,var(--accent),#1D4ED8);
  border-color:var(--accent-2);color:#fff;
  box-shadow:0 6px 18px -4px rgba(59,130,246,0.5);
}
.lvl-btn .num{font-size:18px;font-weight:900;display:block;margin-bottom:2px}
.lvl-btn .lbl{font-size:11px;color:var(--text-dim);font-weight:600}
.lvl-btn.active .lbl{color:rgba(255,255,255,0.85)}

/* 그룹 토글 (다락원 / Lv 1~20) */
.group-tabs{display:flex;gap:6px;background:var(--bg-card);padding:4px;border-radius:12px;margin-bottom:12px;border:1px solid var(--border)}
.group-tab{flex:1;padding:9px 12px;background:transparent;border:0;color:var(--text-dim);font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;transition:all .15s}
.group-tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px -3px rgba(59,130,246,0.4)}

/* 메인 카드 — 현재 문장 */
.main-card{
  background:var(--bg-card);border:1.5px solid var(--border);border-radius:16px;
  padding:24px 22px;margin-bottom:14px;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
.main-card .prompt-label{font-size:12px;color:var(--text-dim);margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px}
.main-card .chinese{
  font-size:30px;font-weight:700;color:#fff;letter-spacing:1px;line-height:1.4;
  text-align:center;padding:10px 0;
  font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
}
.main-card .pinyin{
  font-size:16px;color:var(--cn-gold);font-weight:600;text-align:center;
  margin-top:6px;font-style:italic;letter-spacing:0.5px;
}
.main-card .korean{
  font-size:14px;color:var(--text-dim);text-align:center;margin-top:10px;
  padding-top:10px;border-top:1px dashed var(--border);
}

/* 컨트롤 */
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;justify-content:center}
.btn{
  padding:11px 18px;border:0;border-radius:10px;cursor:pointer;
  font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:6px;
  transition:transform .12s,filter .15s;
}
.btn:active{transform:scale(0.96)}
.btn:hover{filter:brightness(1.1)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#1D4ED8);color:#fff}
.btn-ghost{background:transparent;color:var(--accent-2);border:1px solid var(--accent)}
.btn-warn{background:linear-gradient(135deg,var(--cn-gold),var(--cn-red));color:#fff}
.btn-record{background:linear-gradient(135deg,var(--bad),#B91C1C);color:#fff;padding:13px 24px;font-size:14.5px}
.btn-record.recording{background:linear-gradient(135deg,var(--ok),#059669);animation:pulse 1.2s infinite}
.btn-warn.playing{background:linear-gradient(135deg,var(--ok),#059669)}
.btn-step{background:linear-gradient(135deg,var(--ok),#059669);color:#fff}
.sentence-select{flex:1;min-width:140px;max-width:280px;padding:10px 12px;background:var(--bg-card);color:var(--text,#fff);border:1px solid var(--border);border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer}
.sentence-progress{max-width:320px;margin:6px auto 2px;height:7px;background:rgba(148,163,184,0.2);border-radius:99px;overflow:hidden}
.sentence-progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--ok),#059669);border-radius:99px;transition:width .45s cubic-bezier(.3,1,.4,1)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.5)}50%{box-shadow:0 0 0 14px rgba(16,185,129,0)}}

/* 반복 듣기 컨트롤 */
.repeat-row{display:flex;align-items:center;gap:10px;margin-top:12px;background:var(--bg-soft);padding:8px 12px;border-radius:10px;flex-wrap:wrap;justify-content:center}
.repeat-label{font-size:13px;color:var(--text-dim);font-weight:700}
.repeat-stepper{display:flex;align-items:center;gap:8px}
.repeat-stepper button{width:34px;height:34px;border:0;border-radius:9px;background:var(--bg-card-2);color:#fff;font-size:18px;font-weight:800;cursor:pointer;line-height:1}
.repeat-stepper button:active{transform:scale(0.92)}
#rep-val{min-width:46px;text-align:center;font-size:14px;font-weight:800;color:var(--cn-gold)}
.rep-inf-btn{border:1px solid var(--accent);background:transparent;color:var(--accent-2);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:800;cursor:pointer}
.rep-inf-btn.active{background:linear-gradient(135deg,var(--cn-gold),var(--cn-red));color:#fff;border-color:transparent}

/* 속도 슬라이더 */
.speed-row{display:flex;align-items:center;gap:10px;margin-top:14px;background:var(--bg-soft);padding:10px 14px;border-radius:10px}
.speed-row label{font-size:12px;color:var(--text-dim);font-weight:600;min-width:36px}
.speed-row input[type=range]{flex:1}
.speed-row .val{font-size:13px;color:var(--cn-gold);font-weight:800;min-width:38px;text-align:right}

/* 진행 + 결과 */
.progress{font-size:12px;color:var(--text-dim);text-align:center;margin-top:10px}
.result-card{
  background:var(--bg-card-2);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-top:12px;display:none;
}
.result-card.show{display:block;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.result-card .score{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--ok),var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.result-card .feedback{font-size:13px;color:var(--text-dim);margin-top:6px;text-align:center;line-height:1.6}

/* 단원 선택 (다락원) */
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:6px;margin-bottom:14px}
.lesson-btn{
  background:var(--bg-soft);border:1px solid var(--border);border-radius:9px;
  padding:8px 4px;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--text-dim);
  text-align:center;line-height:1.3;transition:all .15s;
}
.lesson-btn:hover{border-color:var(--cn-gold);color:var(--text)}
.lesson-btn.active{background:linear-gradient(135deg,var(--cn-red),var(--cn-gold));color:#fff;border-color:transparent}
.lesson-btn .l-num{font-weight:900;display:block;font-size:13px}

/* 모바일 */
@media (max-width:600px){
  .wrap{padding:12px 10px 80px}
  header.hero{padding:18px 16px}
  header.hero h1{font-size:18px}
  header.hero .home{top:10px;right:10px;font-size:11px;padding:5px 10px}
  .main-card{padding:18px 14px}
  .main-card .chinese{font-size:24px}
  .main-card .pinyin{font-size:14px}
  .lvl-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
}
</style>
</head>

/* ── 다락원 마스터 카드 렌더 ── */
function renderDarakwon(){
  const grid = document.getElementById('darakwon-grid');
  grid.innerHTML = '';
  Object.entries(DARAKWON).forEach(([k, v]) => {
    const b = document.createElement('button');
    b.className = 'lvl-btn' + (Number(k) === state.darakwonBook ? ' active' : '');
    b.innerHTML = '<span class="num">' + k + '</span><span class="lbl">' + v.name + '<br>' + v.sub + '</span>';
    b.onclick = () => { state.darakwonBook = Number(k); state.lessonIdx = 0; renderDarakwon(); renderLessons(); pickRandom(); };
    grid.appendChild(b);
  });
}

function renderLessons(){
  const grid = document.getElementById('lesson-grid');
  grid.innerHTML = '';
  const book = DARAKWON[state.darakwonBook];
  if (!book) return;
  book.lessons.forEach((l, i) => {
    const b = document.createElement('button');
    b.className = 'lesson-btn' + (i === state.lessonIdx ? ' active' : '');
    b.innerHTML = '<span class="l-num">' + (i+1) + '</span>' + l.t.replace(/제\d+과\s*/, '');
    b.onclick = () => { state.lessonIdx = i; renderLessons(); pickRandom(); };
    grid.appendChild(b);
  });
}

/* ── Lv 1~20 카드 렌더 ── */
function renderLv(){
  const grid = document.getElementById('lv-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 20; i++) {
    const b = document.createElement('button');
    b.className = 'lvl-btn' + (i === state.lv ? ' active' : '');
    const lbl = i <= 4 ? '입문' : i <= 8 ? '초급' : i <= 12 ? '중급' : i <= 16 ? '상급' : '원어민';
    b.innerHTML = '<span class="num">Lv ' + i + '</span><span class="lbl">' + lbl + '</span>';
    b.onclick = () => { state.lv = i; renderLv(); pickRandom(); };
    grid.appendChild(b);
  }
}

/* 진행 저장(이어서 하기) + 완료 체크 — localStorage (문장은 한자 텍스트로 식별) */
var LS_CN_DONE = 'mangoi_speech_cn_done', LS_CN_POS = 'mangoi_speech_cn_pos';
function loadDoneCn(){ try { return new Set(JSON.parse(localStorage.getItem(LS_CN_DONE) || '[]')); } catch(e){ return new Set(); } }
var doneCn = loadDoneCn();
function saveDoneCn(){ try { localStorage.setItem(LS_CN_DONE, JSON.stringify(Array.from(doneCn))); } catch(e){} }
function savePosCn(){ try { localStorage.setItem(LS_CN_POS, JSON.stringify({ group: state.group, book: state.darakwonBook, lesson: state.lessonIdx, lv: state.lv, sIdx: state.sIdx })); } catch(e){} }
function markSentenceDone(){
  var pool = getPool(); var it = pool[state.sIdx];
  if (it && !doneCn.has(it.c)) {
    doneCn.add(it.c); saveDoneCn(); updateSentenceNav(pool);
    if (pool.length && pool.every(function(x){ return doneCn.has(x.c); })) {
      celebrate('🎉 이 세트 완료! 대단해요!');       // 세트 완주 축하
      var setId = 'cn:' + (state.group === 'darakwon' ? ('dk' + state.darakwonBook + '-' + state.lessonIdx) : ('lv' + state.lv));
      awardSpeechPoints(setId, '🏅 중국어 발음 마스터');  // 배지 + 포인트 적립
    }
  }
}
/* 세트 완주 보상 — 로컬 배지 저장 + 서버 포인트 적립(로그인 시) */
function awardSpeechPoints(setId, badgeLabel){
  try {
    var b = JSON.parse(localStorage.getItem('mangoi_speech_badges') || '[]');
    if (b.indexOf(setId) < 0) { b.push(setId); localStorage.setItem('mangoi_speech_badges', JSON.stringify(b)); }
  } catch(e){}
  try {
    var uid = localStorage.getItem('mango_user_id');
    if (uid) {
      fetch('/api/points/earn-by-rule', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: uid, rule_code: 'speech_master', meta: { set: setId, badge: badgeLabel } })
      }).then(function(r){ return r.json(); }).then(function(d){
        if (d && d.ok) { var pr = document.getElementById('progress'); if (pr) pr.textContent = '🏅 ' + badgeLabel + ' · +' + (d.rule ? d.rule.amount : 20) + 'P 적립!'; }
      }).catch(function(){});
    }
  } catch(e){}
}
/* 완주 사운드 — Web Audio 상승 아르페지오 (외부 파일 없음) */
function playChime(){
  try {
    var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
    var ctx = playChime._ctx || (playChime._ctx = new AC());
    if (ctx.state === 'suspended') { try { ctx.resume(); } catch(e){} }
    var now = ctx.currentTime;
    [523.25, 659.25, 783.99, 1046.5].forEach(function(f, i){
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      var t = now + i * 0.12;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.2, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
      o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t + 0.55);
    });
  } catch(e){}
}
/* 세트 완주 축하 — 사운드 + 배지 + 컨페티 (외부 라이브러리 없음) */
function celebrate(msg){
  playChime();
  var badge = document.createElement('div');

  document.body.appendChild(badge);
  requestAnimationFrame(function(){ badge.style.opacity='1'; badge.style.transform='translate(-50%,-50%) scale(1)'; });
  var colors = ['#fbbf24','#34d399','#38bdf8','#a78bfa','#f472b6','#f87171'];
  for (var i=0;i<40;i++){ (function(i){
    var p = document.createElement('div'), size = 6 + Math.random()*9;
    p.style.cssText = 'position:fixed;top:-24px;left:'+(Math.random()*100)+'vw;width:'+size+'px;height:'+size+'px;background:'+colors[i%colors.length]+';z-index:100000;border-radius:'+(Math.random()<0.5?'50%':'2px')+';pointer-events:none';
    document.body.appendChild(p);
    var dur = 1500 + Math.random()*1300, drift = (Math.random()*2-1)*140, rot = Math.random()*720;
    try { p.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:'translate('+drift+'px,'+(window.innerHeight+60)+'px) rotate('+rot+'deg)',opacity:0.9}],{duration:dur,easing:'cubic-bezier(.2,.6,.5,1)'}); } catch(e){}
    setTimeout(function(){ p.remove(); }, dur);
  })(i); }
  setTimeout(function(){ badge.style.opacity='0'; badge.style.transform='translate(-50%,-50%) scale(0.8)'; setTimeout(function(){ badge.remove(); }, 400); }, 2300);
}

/* ── 문장 선택 (순차 이동 + 선택 + 랜덤) ── */
function getPool(){
  if (state.group === 'darakwon') {
    const book = DARAKWON[state.darakwonBook];
    const lesson = book && book.lessons[state.lessonIdx];
    return (lesson && lesson.s) || [];
  }
  return LV_SENTENCES[state.lv] || [];
}
/* 현재 인덱스(state.sIdx) 문장을 화면에 표시 */
function showSentence(){
  const pool = getPool();
  if (!pool.length) return;
  state.sIdx = ((state.sIdx % pool.length) + pool.length) % pool.length;   // 순환(끝→처음)
  const item = pool[state.sIdx];
  document.getElementById('cn-text').textContent = item.c;
  document.getElementById('cn-pinyin').textContent = item.p;
  document.getElementById('cn-korean').textContent = item.k;
  state.attempt = 1;
  document.getElementById('progress').textContent = '시도 ' + state.attempt + '/3 · 버튼을 눌러 녹음을 시작하세요';
  document.getElementById('result').classList.remove('show');
  updateSentenceNav(pool);
  savePosCn();   // 위치 저장 → 다음에 이어서
}
/* 이전/다음/선택 UI 동기화 (완료 문장은 ✓ 표시) */
function updateSentenceNav(pool){
  pool = pool || getPool();
  const sel = document.getElementById('sentence-select');
  if (sel) {
    sel.innerHTML = pool.map(function(it, i){
      var mark = doneCn.has(it.c) ? '✓ ' : '';
      var lbl = it.c.length > 16 ? it.c.slice(0, 16) + '…' : it.c;
      return '<option value="' + i + '">' + mark + (i + 1) + '. ' + lbl + '</option>';
    }).join('');
    sel.value = String(state.sIdx);
  }
  var doneN = pool.filter(function(it){ return doneCn.has(it.c); }).length;
  const cnt = document.getElementById('sentence-count');
  if (cnt) cnt.textContent = (state.sIdx + 1) + ' / ' + pool.length + (doneN ? ' · ✓ ' + doneN : '');
  const bar = document.getElementById('sentence-bar');
  if (bar) bar.style.width = (pool.length ? Math.round(doneN / pool.length * 100) : 0) + '%';   // 완료율 진행바
}
function goSentence(delta){ stopSpeak(); state.sIdx += delta; showSentence(); }
function selectSentence(v){ stopSpeak(); state.sIdx = parseInt(v, 10) || 0; showSentence(); }
/* "↪ 다른 문장" = 랜덤 (인덱스도 동기화) */
function pickRandom(){
  const pool = getPool();
  if (!pool.length) return;
  state.sIdx = Math.floor(Math.random() * pool.length);
  showSentence();
}

/* ── TTS + 반복 듣기 (1~무한) ── */
let speaking = false;
function setTtsBtn(on){
  const b = document.getElementById('btn-tts');
  if (!b) return;
  if (on){ b.textContent = '⏹ 멈추기'; b.classList.add('playing'); }
  else   { b.textContent = '🔊 원어민 발음 듣기'; b.classList.remove('playing'); }
}
let cnAudio = null;
const cnTtsCache = {};
function stopSpeak(){
  speaking = false;
  if (cnAudio) { try { cnAudio.pause(); } catch(_){} }
  try { speechSynthesis.cancel(); } catch(_){}
  setTtsBtn(false);
}
async function speak(){
  // 재생 중이면 멈추기 (토글)
  if (speaking) { stopSpeak(); return; }

  const text = document.getElementById('cn-text').textContent;
  const total = state.repeat;          // 숫자 또는 Infinity
  let count = 0;
  speaking = true;
  setTtsBtn(true);

  // 1) 서버 원어민 TTS (Workers AI) — 실패 시 브라우저 TTS 폴백
  let url = cnTtsCache[text];
  if (!url) {
    try {
      const resp = await fetch('/api/voice/tts', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, lang: 'zh' })
      });
      if (resp.ok && ((resp.headers.get('content-type') || '').includes('audio'))) {
        const blob = await resp.blob();
        if (blob.size > 200) { url = URL.createObjectURL(blob); cnTtsCache[text] = url; }
      }
    } catch(_){}
  }
  if (!speaking) return; // 로딩 중 멈춤 처리

  function showLabel(){
    const label = (total === Infinity) ? (count + '회 (무한)') : (count + ' / ' + total + '회');
    const pr = document.getElementById('progress');
    if (pr) pr.textContent = '🔊 듣는 중… ' + label;
  }

  function playOnce(){
    if (!speaking) return;
    if (total !== Infinity && count >= total) { stopSpeak(); return; }
    count++;
    showLabel();
    if (url) {
      cnAudio = new Audio(url);
      cnAudio.playbackRate = state.speed;
      cnAudio.onended = function(){ if (speaking) setTimeout(playOnce, 280); };
      cnAudio.onerror = function(){ stopSpeak(); };
      cnAudio.play().catch(function(){ stopSpeak(); });
      return;
    }
    if (!('speechSynthesis' in window)) { stopSpeak(); alert('이 브라우저는 TTS 를 지원하지 않습니다.'); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = state.speed;
    u.pitch = 1;
    const voices = speechSynthesis.getVoices();
    const cn = voices.find(v => /zh|chinese|mandarin/i.test(v.lang + ' ' + v.name));
    if (cn) u.voice = cn;
    u.onend = function(){ if (speaking) setTimeout(playOnce, 280); };
    u.onerror = function(){ stopSpeak(); };
    try { speechSynthesis.cancel(); } catch(_){}
    speechSynthesis.speak(u);
  }
  playOnce();
}

/* ── 녹음 + 평가 ── */
let recognition = null, recording = false;
function startRecord(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('이 브라우저는 음성 인식을 지원하지 않습니다.\nChrome 또는 Edge 를 사용해 주세요.'); return; }
  if (recording) { recognition && recognition.stop(); return; }
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  const btn = document.getElementById('btn-rec');
  btn.textContent = '🛑 녹음 중지'; btn.classList.add('recording');
  recording = true;
  document.getElementById('progress').textContent = '🎙 듣고 있어요…';

  recognition.onresult = function(e){
    const said = e.results[0][0].transcript.trim();
    const target = document.getElementById('cn-text').textContent.replace(/[,.。?!?!]/g, '').trim();
    const saidClean = said.replace(/[,.。?!?!]/g, '').trim();
    let match = 0;
    for (let i = 0; i < target.length; i++) {
      if (saidClean.includes(target[i])) match++;
    }
    const score = Math.min(100, Math.round((match / target.length) * 100));
    showResult(score, said);
  };
  recognition.onerror = function(e){
    stopRecord();
    document.getElementById('progress').textContent = '⚠️ 인식 실패: ' + (e.error || 'error');
  };
  recognition.onend = stopRecord;
  recognition.start();
}
function stopRecord(){
  recording = false;
  const btn = document.getElementById('btn-rec');
  btn.textContent = '🎙 녹음 시작'; btn.classList.remove('recording');
}
function showResult(score, said){
  const r = document.getElementById('result');
  r.classList.add('show');
  try { markSentenceDone(); } catch(e){}   // 채점 완료 → 이 문장 완료 체크
  document.getElementById('score').textContent = score + '점';
  let fb = '';
  if (score >= 85) fb = '✅ 정말 잘했어요! 원어민처럼 정확해요.\n인식: "' + said + '"';
  else if (score >= 60) fb = '👍 잘했어요! 조금만 더 또박또박.\n인식: "' + said + '"';
  else fb = '💪 다시 한번 도전!\n원어민 발음을 다시 들어보세요.\n인식: "' + said + '"';
  document.getElementById('feedback').textContent = fb;
  state.attempt = Math.min(3, state.attempt + 1);
  document.getElementById('progress').textContent = '시도 ' + state.attempt + '/3';
}

/* ── 그룹 토글 ── */
document.querySelectorAll('.group-tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.group-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.group = t.dataset.group;
    document.getElementById('grp-darakwon').style.display = state.group === 'darakwon' ? '' : 'none';
    document.getElementById('grp-lv').style.display = state.group === 'lv' ? '' : 'none';
    pickRandom();
  };
});

/* ── 반복 듣기 컨트롤 ── */
function updateRepeatUI(){
  const valEl = document.getElementById('rep-val');
  const infEl = document.getElementById('rep-inf');
  if (state.repeat === Infinity){
    if (valEl) valEl.textContent = '∞';
    if (infEl) infEl.classList.add('active');
  } else {
    if (valEl) valEl.textContent = state.repeat + '회';
    if (infEl) infEl.classList.remove('active');
  }
}
document.getElementById('rep-dec').onclick = function(){
  if (state.repeat === Infinity){ state.repeat = REP_STEPS[REP_STEPS.length-1]; }
  else {
    let i = REP_STEPS.indexOf(state.repeat);
    if (i > 0) state.repeat = REP_STEPS[i-1];
    else if (i === -1) state.repeat = 1;
  }
  updateRepeatUI();
};
document.getElementById('rep-inc').onclick = function(){
  if (state.repeat === Infinity) return;
  let i = REP_STEPS.indexOf(state.repeat);
  if (i >= 0 && i < REP_STEPS.length-1) state.repeat = REP_STEPS[i+1];
  else if (i === -1) state.repeat = 2;
  updateRepeatUI();
};
document.getElementById('rep-inf').onclick = function(){
  state.repeat = (state.repeat === Infinity) ? 1 : Infinity;
  updateRepeatUI();
};
updateRepeatUI();

/* ── 이벤트 바인딩 ── */
document.getElementById('btn-tts').onclick = speak;
document.getElementById('btn-next').onclick = function(){ stopSpeak(); pickRandom(); };
document.getElementById('btn-rec').onclick = function(){ stopSpeak(); startRecord(); };
document.getElementById('speed-range').oninput = function(){
  state.speed = parseFloat(this.value);
  document.getElementById('speed-val').textContent = state.speed.toFixed(2) + 'x';
};
