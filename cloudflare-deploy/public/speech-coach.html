<script>
let mediaRecorder = null;
let chunks = [];
let isRecording = false;

function setTarget(t) {
  document.getElementById('target-display').textContent = t;
  document.getElementById('target-input').value = t;
  resetUI();
}

let ttsAudio = null;
const ttsCache = {};
function detectTtsLang(t) {
  if (/[\u4e00-\u9fff]/.test(t)) return 'zh';
  if (/[\uac00-\ud7a3]/.test(t)) return 'ko';
  return 'en';
}
function speakFallback(t, lang) {
  try {
    const u = new SpeechSynthesisUtterance(t);
    const voices = window.speechSynthesis.getVoices();
    const pref = lang === 'ko' ? 'ko' : lang === 'zh' ? 'zh' : 'en';
    const v = voices.find(v => v.lang && v.lang.toLowerCase().startsWith(pref));
    if (v) u.voice = v;
    u.lang = pref === 'ko' ? 'ko-KR' : pref === 'zh' ? 'zh-CN' : 'en-US';
    u.rate = 0.9;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch(e) { alert('음성 합성 실패: ' + e.message); }
}
async function speakTarget() {
  const t = document.getElementById('target-input').value || document.getElementById('target-display').textContent;
  if (!t) return;
  const lang = detectTtsLang(t);
  if (lang === 'ko') { speakFallback(t, lang); return; } // 한국어는 브라우저 TTS
  if (ttsAudio) { try { ttsAudio.pause(); } catch(_){} }
  try { window.speechSynthesis.cancel(); } catch(_){}
  try {
    let url = ttsCache[lang + '|' + t];
    if (!url) {
      const resp = await fetch('/api/voice/tts', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: t, lang })
      });
      if (!resp.ok || !((resp.headers.get('content-type') || '').includes('audio'))) throw new Error('tts_unavailable');
      const blob = await resp.blob();
      if (blob.size < 200) throw new Error('tts_empty');
      url = URL.createObjectURL(blob);
      ttsCache[lang + '|' + t] = url;
    }
    ttsAudio = new Audio(url);
    await ttsAudio.play();
  } catch (e) { speakFallback(t, lang); } // 서버 TTS 실패 시 브라우저 TTS 폴백
}

function resetUI() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('rec-status').textContent = (window.getLang && window.getLang() === 'en' ? 'Tap mic to start recording' : '마이크 버튼을 눌러 녹음 시작');
}

async function toggleRec() {
  if (isRecording) { stopRec(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: chunks[0]?.type || 'audio/webm' });
      await processAudio(blob);
    };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('rec-btn').classList.add('recording');
    document.getElementById('rec-btn').textContent = '⏹';
    document.getElementById('rec-status').textContent = '🔴 녹음 중… 다시 누르면 종료';
  } catch (e) {
    alert('마이크 권한이 필요합니다: ' + e.message);
  }
}

function stopRec() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  document.getElementById('rec-btn').classList.remove('recording');
  document.getElementById('rec-btn').textContent = '🎙';
  document.getElementById('rec-status').textContent = '⏳ AI 분석 중…';
}

async function processAudio(blob) {
  try {
    // 1) Whisper 로 전사
    const fd = new FormData();
    fd.append('audio', blob, 'rec.webm');
    const trResp = await fetch('/api/voice/transcribe', { method: 'POST', body: fd });
    const trD = await trResp.json();
    if (!trD.ok) throw new Error('전사 실패: ' + (trD.error || ''));
    const spoken = (trD.text || '').trim();

    // 2) 발음 평가 + AI 피드백
    const target = document.getElementById('target-display').textContent;
    let user = null; try { user = JSON.parse(localStorage.getItem('mango_user') || 'null'); } catch(e){}
    const coachResp = await fetch('/api/voice/coach', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target, spoken, student_uid: user?.user_id || 'guest', student_name: user?.user_name || '' })
    });
    const cD = await coachResp.json();
    if (!cD.ok) throw new Error('평가 실패: ' + (cD.error || ''));

    // 3) 화면 표시
    document.getElementById('transcript-text').textContent = spoken || '(음성을 인식하지 못했어요)';
    document.getElementById('sc-overall').textContent = cD.scores.overall;
    document.getElementById('sc-accuracy').textContent = cD.scores.accuracy;
    document.getElementById('sc-pron').textContent = cD.scores.pronunciation;
    document.getElementById('sc-flue').textContent = cD.scores.fluency;
    document.getElementById('feedback-text').textContent = '💡 ' + cD.feedback;
    document.getElementById('suggestion-text').textContent = '🎯 ' + cD.suggestion;
    document.getElementById('result').style.display = 'block';
    document.getElementById('rec-status').textContent = '✅ 완료! 다시 녹음하려면 마이크 누르세요';

    // 결과 영역으로 스크롤
    setTimeout(() => document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
  } catch (e) {
    document.getElementById('rec-status').textContent = '❌ ' + e.message;
  }
}

// 음성 합성 voice 로드
if (typeof window.speechSynthesis !== 'undefined') {
  window.speechSynthesis.onvoiceschanged = () => {};
  setTimeout(() => window.speechSynthesis.getVoices(), 200);
}
</script>

  btn.onclick = function(){
    var m = !isMuted();
    try { localStorage.setItem(MUTE_KEY, m ? '1' : '0'); } catch(e){}
    if (m) { try{ a.pause(); }catch(e){} }
    else { try{ a.currentTime = 0; }catch(e){} played = true; a.play(); }
    updateMute();
  };
  updateMute();
  (function placeBtn(){
    var home = document.querySelector('.home-btn, #global-home-fab, #global-home, .home');
    if (!home) { btn.style.position='fixed'; btn.style.top='14px'; btn.style.right='70px'; btn.style.zIndex='100000'; document.body.appendChild(btn); return; }
    var cs = getComputedStyle(home);
    if (cs.position === 'fixed') {
      var r = home.getBoundingClientRect();
      btn.style.position = 'fixed';
      btn.style.top = Math.max(8, r.top + (r.height - 34) / 2) + 'px';
      btn.style.right = (window.innerWidth - r.left + 8) + 'px';
      btn.style.zIndex = String((parseInt(cs.zIndex, 10) || 999) + 1);
      btn.style.marginRight = '0';
      document.body.appendChild(btn);
    } else {
      home.parentNode.insertBefore(btn, home);
    }
  })();
})();
</script>
