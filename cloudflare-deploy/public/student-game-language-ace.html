<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>B-17 폭격기 (Flying Fortress)</title>
<!--
  ✈️ 랭귀지 에이스(Language Ace): B-17 단어 폭격대
  · 단일 HTML SPA. 허브 파라미터: ?uid= &speed=1..5 &stage=1..3 &goal=N(정답 단어 목표, 허브 기본 10) &glang=en|zh &sentence=...
  · 플레이어 B-17 = 실사 이미지(/img/b17-player.png) 런타임 크로마키(초록 제거) 스프라이트
  · 적기 전부 = A6M Zero 실사 스프라이트(/img/zero-enemy.png, 편대사진서 선두기 크롭+크로마키). 비행패턴 weave/dive 2종
  · 문장을 어순대로 '단어를 실은 적기'를 격추해 완성 → 발음 재생(Web Speech API)
  · 연료(드럼통) 획득 → 점수+시간 증가 · 적 탄막(danmaku) 회피
  · 사운드 = Web Audio API(기관총/폭발/획득/오답), 발음 = Web Speech API
  · 학습기록 = /api/games/progress 배치 전송(실패해도 게임 무관)
-->
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#0a0f14;
    font-family:'Segoe UI',system-ui,'Malgun Gothic',sans-serif;color:#e8eef5;user-select:none;touch-action:none}
  #wrap{position:fixed;inset:0;overflow:hidden}
  canvas{display:block;position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}

  /* ── 상단 문장 바 ── */
  #topbar{position:absolute;top:0;left:0;right:0;z-index:6;padding:8px 12px 10px;
    background:linear-gradient(180deg,rgba(8,14,20,.92),rgba(8,14,20,.55) 70%,transparent);
    pointer-events:none}
  #sentKo{font-size:14px;color:#ffd479;text-align:center;font-weight:700;letter-spacing:.3px;
    text-shadow:0 1px 3px #000}
  #sentEn{margin-top:5px;display:flex;flex-wrap:wrap;gap:5px 7px;justify-content:center;align-items:center}
  .wtok{font-size:16px;font-weight:800;padding:3px 9px;border-radius:8px;line-height:1.1;
    background:rgba(20,30,42,.7);color:#5f7089;border:1px solid rgba(120,140,170,.25);
    text-shadow:0 1px 2px #000;transition:.15s}
  .wtok .py{display:block;font-size:10px;font-weight:600;color:#7d8ba0;margin-top:1px}
  .wtok.done{background:linear-gradient(180deg,#2e7d46,#1c5a30);color:#d8ffe4;border-color:#41d178}
  .wtok.done .py{color:#a5e6bd}
  .wtok.next{background:linear-gradient(180deg,#c9942a,#a2711a);color:#fff6da;border-color:#ffd479;
    box-shadow:0 0 0 2px rgba(255,212,121,.5),0 0 14px rgba(255,190,60,.55);
    animation:pulseTok .9s ease-in-out infinite}
  .wtok.next .py{color:#ffe9b8}
  @keyframes pulseTok{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

  /* ── HUD ── */
  #hud{position:absolute;left:0;right:0;bottom:0;z-index:6;padding:8px 12px 10px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:10px;pointer-events:none;
    background:linear-gradient(0deg,rgba(8,14,20,.9),transparent)}
  .hbox{background:rgba(10,18,26,.72);border:1px solid rgba(120,150,180,.22);border-radius:10px;
    padding:5px 11px;backdrop-filter:blur(3px)}
  .hlab{font-size:10px;color:#8aa0b8;font-weight:700;letter-spacing:1px}
  .hval{font-size:20px;font-weight:900;line-height:1.05;font-variant-numeric:tabular-nums}
  #hScore .hval{color:#ffd479}
  #hClear .hval{color:#7fd1ff}
  #timeWrap{flex:1;max-width:340px}
  #timeBar{height:12px;border-radius:7px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:4px;
    border:1px solid rgba(255,255,255,.14)}
  #timeFill{height:100%;width:100%;border-radius:7px;
    background:linear-gradient(90deg,#3ddc84,#a3e635);transition:width .25s linear}
  #timeFill.warn{background:linear-gradient(90deg,#f97316,#ef4444)}
  #hHearts{font-size:19px;letter-spacing:1px;filter:drop-shadow(0 1px 2px #000)}

  /* ── 오버레이(시작/종료) ── */
  .overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:22px;
    background:radial-gradient(120% 90% at 50% 35%,rgba(24,36,50,.86),rgba(6,10,14,.96))}
  .overlay.hide{display:none}
  .oTitle{font-size:34px;font-weight:900;letter-spacing:.5px;
    background:linear-gradient(180deg,#ffe9a8,#e0b048);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;text-shadow:0 2px 8px rgba(0,0,0,.4);line-height:1.1}
  .oSub{margin-top:6px;font-size:15px;color:#b8c6d6;font-weight:600}
  .oRules{margin:16px 0;font-size:14px;color:#c8d4e2;line-height:1.9;max-width:400px}
  .oRules b{color:#ffd479}
  .langRow{display:flex;gap:12px;margin:6px 0 4px}
  .langBtn{padding:10px 22px;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;
    border:2px solid rgba(140,165,195,.35);background:rgba(20,32,46,.7);color:#c8d4e2;transition:.15s}
  .langBtn.on{border-color:#ffd479;color:#fff6da;background:linear-gradient(180deg,#3a4a5e,#26323f);
    box-shadow:0 0 16px rgba(255,190,60,.4)}
  .bigBtn{margin-top:14px;padding:14px 44px;border-radius:14px;font-size:20px;font-weight:900;cursor:pointer;
    border:none;color:#1a2028;background:linear-gradient(180deg,#ffe08a,#e0a838);
    box-shadow:0 6px 20px rgba(224,168,56,.45),inset 0 1px 0 rgba(255,255,255,.6);letter-spacing:.5px}
  .bigBtn:active{transform:translateY(2px)}
  #overStat{font-size:17px;color:#dbe6f2;margin:8px 0 2px;line-height:1.7}
  #overStat b{color:#ffd479;font-size:22px}

  /* 말하기 연습 오버레이 */
  .spPhase{font-size:22px;font-weight:900;color:#ffd479;text-shadow:0 2px 6px #000;text-align:center}
  .spSent{font-size:32px;font-weight:900;color:#fff;margin:12px 0 2px;line-height:1.35;max-width:92%;text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.5)}
  .spSent .py{font-size:15px;color:#7fd1ff;font-weight:700}
  .spKo{font-size:16px;color:#b8c6d6;margin-bottom:4px;text-align:center}
  .spDots{display:flex;gap:12px;margin:14px 0 6px}
  .spDot{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);
    display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#8aa0b8;transition:.15s}
  .spDot.ok{background:linear-gradient(180deg,#2e7d46,#1c5a30);border-color:#41d178;color:#d8ffe4}
  .spDot.no{background:linear-gradient(180deg,#7d2e2e,#5a1c1c);border-color:#ef4444;color:#ffd8d8}
  .spDot.cur{border-color:#ffd479;box-shadow:0 0 12px rgba(255,190,60,.6);animation:pulseTok .9s ease-in-out infinite}
  .spHeard{font-size:15px;color:#cdd9e6;min-height:24px;margin-top:4px;text-align:center;max-width:90%}
  .spHeard b{color:#7fd1ff}
  .spSkip{margin-top:16px;background:none;border:1px solid rgba(140,165,195,.4);color:#9fb0c4;
    padding:8px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
  .spSkip:active{transform:scale(.96)}
  .spSpeed{display:flex;align-items:center;gap:7px;margin:10px 0 2px;flex-wrap:wrap;justify-content:center}
  .spSpeedLab{font-size:13px;color:#8aa0b8;font-weight:700}
  .spSpd{padding:6px 13px;border-radius:20px;border:1px solid rgba(140,165,195,.35);background:rgba(20,32,46,.7);
    color:#c8d4e2;font-size:14px;font-weight:800;cursor:pointer;transition:.12s}
  .spSpd.on{border-color:#ffd479;color:#1a2028;background:linear-gradient(180deg,#ffe08a,#e0a838);box-shadow:0 0 12px rgba(255,190,60,.4)}
  .spSpd:active{transform:scale(.95)}

  /* 단어 발음 팝업 */
  #wordpop{position:absolute;z-index:15;display:none;pointer-events:none;
    background:rgba(12,20,28,.94);border:1px solid #ffd479;border-radius:9px;padding:5px 11px;
    font-size:14px;font-weight:700;color:#fff6da;box-shadow:0 4px 16px rgba(0,0,0,.5);white-space:nowrap;
    transform:translate(-50%,-120%)}

  /* 상단 우측 컨트롤 */
  #ctlRow{position:absolute;top:8px;right:10px;z-index:7;display:flex;gap:6px}
  .ctlBtn{width:34px;height:34px;border-radius:9px;border:1px solid rgba(140,165,195,.3);
    background:rgba(12,20,28,.7);color:#cdd9e6;font-size:16px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;justify-content:center;pointer-events:auto}
  .ctlBtn:active{transform:scale(.92)}
  #bannerMsg{position:absolute;top:34%;left:50%;transform:translateX(-50%);z-index:8;
    font-size:30px;font-weight:900;pointer-events:none;opacity:0;text-shadow:0 3px 12px rgba(0,0,0,.7);
    transition:opacity .2s}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>

  <div id="topbar">
    <div id="sentKo">—</div>
    <div id="sentEn"></div>
  </div>

  <div id="ctlRow">
    <button class="ctlBtn" id="btnMute" title="소리">🔊</button>
    <button class="ctlBtn" id="btnPause" title="일시정지">⏸️</button>
  </div>

  <div id="bannerMsg"></div>

  <div id="hud">
    <div class="hbox" id="hScore"><div class="hlab">SCORE</div><div class="hval" id="vScore">0</div></div>
    <div class="hbox" id="timeWrap"><div class="hlab">FUEL / TIME <span id="vTime" style="float:right;color:#a3e635">60</span></div>
      <div id="timeBar"><div id="timeFill"></div></div>
      <div id="hHearts" style="margin-top:5px">❤️❤️❤️</div></div>
    <div class="hbox" id="hClear"><div class="hlab">정답</div><div class="hval" id="vClear">0/10</div></div>
  </div>

  <div id="wordpop"></div>

  <!-- 시작 화면 -->
  <div class="overlay" id="start">
    <div class="oTitle">✈️ B-17 폭격기<br><span style="font-size:20px;font-weight:700;color:#cfe0f0;-webkit-text-fill-color:#cfe0f0">(Flying Fortress)</span></div>
    <div class="oSub" id="startSub">문장을 어순대로 격추하라!</div>
    <div class="langRow">
      <button class="langBtn" id="lgEn" data-l="en">🇺🇸 English</button>
      <button class="langBtn" id="lgZh" data-l="zh">🇨🇳 中文</button>
    </div>
    <div class="langRow" id="skyRow">
      <button class="langBtn skyBtn" data-s="day">☀️ 낮</button>
      <button class="langBtn skyBtn" data-s="evening">🌙 저녁</button>
    </div>
    <div class="oRules">
      🖱️ <b>마우스로 조종</b> — B-17이 부드럽게 따라와요<br>
      🔫 <b>누르고 있으면 연사</b> — 기관총 발사<br>
      🎯 위 문장에서 <b>금색으로 빛나는 단어</b>를 실은 적기를 순서대로 격추!<br>
      🛢️ <b>연료 드럼통</b>을 쏘면 시간·점수 증가<br>
      💥 <b>A6M 제로센 편대</b>의 탄막을 피하세요!
    </div>
    <button class="bigBtn" id="btnStart">▶ 출격!</button>
  </div>

  <!-- 종료 화면 -->
  <div class="overlay hide" id="over">
    <div class="oTitle" id="overTitle">임무 완료!</div>
    <div id="overStat"></div>
    <button class="bigBtn" id="btnAgain">🔄 다시 출격</button>
  </div>

  <!-- 말하기 연습 화면(문장 완성 시): 듣기 3번 → 따라 말하기 3번 -->
  <div class="overlay hide" id="speak">
    <div class="spPhase" id="spPhase">🔊 잘 들어보세요</div>
    <div class="spSent" id="spSent">—</div>
    <div class="spKo" id="spKo"></div>
    <div class="spSpeed" id="spSpeed">
      <span class="spSpeedLab">🔉 속도</span>
      <button class="spSpd" data-r="0.6">🐢 느리게</button>
      <button class="spSpd" data-r="0.85">보통</button>
      <button class="spSpd" data-r="1.1">🐇 빠르게</button>
    </div>
    <div class="spDots" id="spDots"></div>
    <div class="spHeard" id="spHeard"></div>
    <button class="bigBtn hide" id="spMic">🎤 탭해서 말하기</button>
    <button class="spSkip" id="spSkip">건너뛰기 ▶</button>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   0. 파라미터 · 상태
   ════════════════════════════════════════════════════════════ */
var QS    = new URLSearchParams(location.search);
var UID   = QS.get('uid') || '';
var SPEED = Math.max(1, Math.min(5, parseInt(QS.get('speed')||'2',10) || 2));
var STAGE = Math.max(1, Math.min(3, parseInt(QS.get('stage')||'1',10) || 1));
// 🎯 GOAL = 정답 단어 명중 목표(허브 goal=10 컨벤션과 동일 단위 — shooter 등 형제 게임과 통일).
//    문장은 이 목표를 향한 '수단'이고, 정답 단어를 어순대로 맞히다 GOAL 개 달성 시 임무 완료.
var GOAL  = (function(){ var g=parseInt(QS.get('goal'),10); return (g>=3 && g<=50) ? g : 10; })();
// glang 파라미터 우선, 없으면 localStorage 폴백(직접 링크 시에도 형제 게임과 언어 일관)
var MODE  = (function(){ var g=QS.get('glang'); if(g==='zh'||g==='en') return g;
  try{ var l=localStorage.getItem('mangoi_game_lang'); return (l==='zh')?'zh':'en'; }catch(_){ return 'en'; } })();
var SPMUL = 0.8 + SPEED*0.16;            // 속도 배수(1..5 → 0.96..1.6)
var DIFF  = 0.85 + STAGE*0.18;           // 난이도 배수
// 🌤️ 배경 시간대: day(하늘색+구름) | evening(밤하늘+별·달·별똥별)
var SKY = (function(){ try{ var s=localStorage.getItem('mangoi_langace_sky'); return (s==='evening')?'evening':'day'; }catch(_){ return 'day'; } })();

/* ════════════════════════════════════════════════════════════
   1. 데이터 — 문장 세트(영/중) · 단어 뜻/병음
   ════════════════════════════════════════════════════════════ */
var LANGMETA = { en:{name:'영어',flag:'🇺🇸',tts:'en-US'}, zh:{name:'중국어',flag:'🇨🇳',tts:'zh-CN'} };

var SETS = {
  en:[
    {w:['I','like','to','read','books'],       ko:'나는 책 읽기를 좋아해요'},
    {w:['We','go','to','school'],              ko:'우리는 학교에 가요'},
    {w:['The','big','dog','runs','fast'],      ko:'큰 개가 빠르게 달려요'},
    {w:['My','cat','is','very','happy'],       ko:'내 고양이는 아주 행복해요'},
    {w:['Birds','sing','a','song'],            ko:'새들이 노래를 불러요'},
    {w:['I','drink','milk','at','home'],       ko:'나는 집에서 우유를 마셔요'},
    {w:['The','sun','is','big','and','bright'],ko:'태양은 크고 밝아요'},
    {w:['We','play','games','at','school'],    ko:'우리는 학교에서 게임을 해요'}
  ],
  zh:[
    {w:['我','喜欢','读','书'],        ko:'나는 책 읽기를 좋아해요'},
    {w:['我们','去','学校'],           ko:'우리는 학교에 가요'},
    {w:['大','狗','跑','得','快'],      ko:'큰 개가 빠르게 달려요'},
    {w:['我的','猫','很','高兴'],       ko:'내 고양이는 행복해요'},
    {w:['鸟','唱','歌'],              ko:'새가 노래해요'},
    {w:['我','在','家','喝','牛奶'],    ko:'나는 집에서 우유를 마셔요'},
    {w:['太阳','又','大','又','亮'],    ko:'태양은 크고 밝아요'},
    {w:['我们','在','学校','玩'],       ko:'우리는 학교에서 놀아요'}
  ]
};

/* 단어 뜻/병음(발음 팝업·디코이 라벨용) */
var GLOSS = {
  en:{ I:'나',like:'좋아하다',to:'~하기',read:'읽다',books:'책들',We:'우리',go:'가다',school:'학교',
    The:'그',big:'큰',dog:'개',runs:'달린다',fast:'빠르게',My:'나의',cat:'고양이',is:'~이다',very:'아주',
    happy:'행복한',Birds:'새들',sing:'노래하다',a:'하나의',song:'노래',drink:'마시다',milk:'우유',at:'~에서',
    home:'집',sun:'태양',and:'그리고',bright:'밝은',play:'놀다',games:'게임' },
  zh:{ '我':{k:'나',p:'wǒ'},'喜欢':{k:'좋아하다',p:'xǐhuan'},'读':{k:'읽다',p:'dú'},'书':{k:'책',p:'shū'},
    '我们':{k:'우리',p:'wǒmen'},'去':{k:'가다',p:'qù'},'学校':{k:'학교',p:'xuéxiào'},'大':{k:'큰',p:'dà'},
    '狗':{k:'개',p:'gǒu'},'跑':{k:'달리다',p:'pǎo'},'得':{k:'(정도)',p:'de'},'快':{k:'빠른',p:'kuài'},
    '我的':{k:'나의',p:'wǒde'},'猫':{k:'고양이',p:'māo'},'很':{k:'아주',p:'hěn'},'高兴':{k:'기쁜',p:'gāoxìng'},
    '鸟':{k:'새',p:'niǎo'},'唱':{k:'노래하다',p:'chàng'},'歌':{k:'노래',p:'gē'},'在':{k:'~에서',p:'zài'},
    '家':{k:'집',p:'jiā'},'喝':{k:'마시다',p:'hē'},'牛奶':{k:'우유',p:'niúnǎi'},'太阳':{k:'태양',p:'tàiyáng'},
    '又':{k:'또한',p:'yòu'},'亮':{k:'밝은',p:'liàng'},'玩':{k:'놀다',p:'wán'} }
};
function glossKo(w){ if(!w)return''; if(MODE==='en'){ return GLOSS.en[w]||GLOSS.en[String(w).toLowerCase()]||''; } var g=GLOSS.zh[w]; return g?g.k:''; }
function glossPy(w){ if(!w||MODE!=='zh')return''; var g=GLOSS.zh[w]; return g?g.p:''; }
/* 디코이 단어 풀(문장에 없어도 라벨로 등장) */
function decoyPool(){ return MODE==='en'
  ? ['run','jump','apple','water','star','moon','tree','fish','red','blue','small','eat','sing','friend','play','book']
  : ['苹果','水','星星','月亮','树','鱼','红','蓝','小','吃','朋友','花','门','手','火','风']; }

/* ════════════════════════════════════════════════════════════
   2. 캔버스 · 리사이즈 (DPR 캡)
   ════════════════════════════════════════════════════════════ */
var cv = document.getElementById('cv'), ctx = cv.getContext('2d');
var W=0,H=0,DPR=1,SCALE=1;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = cv.clientWidth; H = cv.clientHeight;
  SCALE = (W>=760) ? 2 : 1;   // 🖥️ PC(넓은 화면)에선 비행기 등 2배 크게
  cv.width = Math.round(W*DPR); cv.height = Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildBackdrop();
}

  var img=new Image();

    var gr=ctx.createLinearGradient(tx,ty,s.x,s.y); gr.addColorStop(0,'rgba(255,255,255,0)'); gr.addColorStop(1,'rgba(255,255,255,'+k.toFixed(2)+')');
    ctx.strokeStyle=gr; ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(s.x,s.y); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,'+k.toFixed(2)+')'; ctx.beginPath(); ctx.arc(s.x,s.y,2.1,0,7); ctx.fill(); }
}
/* 뭉게구름 한 덩이 = 겹친 퍼프 + 옅은 밑면(볼륨감). dark=true 면 밤 구름(어둡게) */
function drawCloud(g,x,y,s,seed,dark){
  function rnd(k){ var v=Math.sin(seed*13.1+k*7.3)*43758.5; return v-Math.floor(v); }
  var puffs=5+Math.floor(rnd(1)*4);
  var body = dark ? ['rgba(60,72,104,','rgba(46,56,88,'] : ['rgba(255,255,255,','rgba(188,206,224,'];
  // 밑면(입체감)
  for(var k=0;k<puffs;k++){ var px=x+(k-(puffs-1)/2)*34*s+(rnd(k)*20-10)*s, py=y+8*s+rnd(k+30)*10*s, r=(26+rnd(k+10)*20)*s;
    var sg=g.createRadialGradient(px,py,0,px,py,r); sg.addColorStop(0,body[1]+(dark?'.75)':'.85)')); sg.addColorStop(1,body[1]+'0)');
    g.fillStyle=sg; g.beginPath(); g.arc(px,py,r,0,7); g.fill(); }
  // 본체 퍼프
  for(var k2=0;k2<puffs;k2++){ var px2=x+(k2-(puffs-1)/2)*32*s+(rnd(k2+3)*16-8)*s, py2=y-rnd(k2+5)*14*s, r2=(30+rnd(k2+2)*22)*s;
    var wg=g.createRadialGradient(px2,py2-r2*0.25,r2*0.2,px2,py2,r2); wg.addColorStop(0,body[0]+'1)'); wg.addColorStop(.72,body[0]+(dark?'.9)':'.97)')); wg.addColorStop(1,body[0]+'0)');
    g.fillStyle=wg; g.beginPath(); g.arc(px2,py2,r2,0,7); g.fill(); }
}

/* ════════════════════════════════════════════════════════════
   7. 게임 상태
   ════════════════════════════════════════════════════════════ */
var G = null;
function newGame(){
  var order = shuffle(SETS[MODE].slice());
  G = {
    running:false, over:false, paused:false, speaking:false, dead:false,   // dead=격추 연출 중(게임 정지, 폭발 파티클만)
    score:0, time:60, timeMax:60, hearts:3, clears:0, correct:0,   // clears=완성 문장 / correct=정답 단어 명중(승리 판정 단위)
    px:W/2, py:H*0.72, tx:W/2, ty:H*0.72,   // player pos & target
    firing:false, fireT:0, invuln:0, shake:0, flash:0,
    enemies:[], ebul:[], pbul:[], fuels:[], parts:[], pilot:null,
    spawnT:0, fuelT:0, watchT:0,
    queue:order, si:0, sent:null, next:0,
    prog:[]
  };
  loadSentence();
}
function loadSentence(){
  if(G.si>=G.queue.length) G.queue=shuffle(SETS[MODE].slice()), G.si=0;
  var s=G.queue[G.si++];
  G.sent = { w:s.w.slice(), ko:s.ko }; G.next=0;
  renderSentence();
}

/* ════════════════════════════════════════════════════════════
   8. 문장 바 렌더
   ════════════════════════════════════════════════════════════ */
function renderSentence(){
  document.getElementById('sentKo').textContent = '🎯 '+G.sent.ko;
  var host=document.getElementById('sentEn'); host.innerHTML='';
  G.sent.w.forEach(function(w,i){
    var cls = i<G.next ? 'done' : (i===G.next ? 'next' : '');
    var py = glossPy(w); var pyh = py ? '<span class="py">'+py+'</span>' : '';
    host.insertAdjacentHTML('beforeend','<span class="wtok '+cls+'">'+esc(w)+pyh+'</span>');
  });
}
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

/* ════════════════════════════════════════════════════════════
   9. 적기 스폰 — Bf109 / Zero, 단어 탑재
   ════════════════════════════════════════════════════════════ */
function neededWord(){ return G.sent.w[G.next]; }
function sameWord(a,b){ return MODE==='en' ? String(a).toLowerCase()===String(b).toLowerCase() : a===b; }
function targetOnScreen(){ var t=neededWord(); return G.enemies.some(function(e){ return e.alive && sameWord(e.word,t); }); }

function spawnEnemy(forceTarget){
  if(G.enemies.length>=5) return;   // 동시 적기 상한(난이도 완화)
  // 전 적기 = A6M Zero. 비행 패턴만 두 가지: weave(좌우 크게 스웝) / dive(빠른 직하강)
  var pat = Math.random()<0.5 ? 'weave' : 'dive';
  var word;
  if(forceTarget){ word=neededWord(); }
  else {
    var r=Math.random();
    if(r<0.42) word=neededWord();                                   // 정답 단어 자주
    else if(r<0.72){ var rem=G.sent.w.filter(function(w,i){return i!==G.next;}); word=rem.length?rem[Math.floor(Math.random()*rem.length)]:neededWord(); }
    else { var dp=decoyPool(); word=dp[Math.floor(Math.random()*dp.length)]; }
  }
  var x = 60+Math.random()*(W-120);
  var dw = (pat==='dive' ? 76 : 88) * SCALE;     // 표시 폭(px) · 🖥️ PC 2배
  var dh = dw * 445/887;                         // 원본 비율 유지
  var e = {
    pat:pat, alive:true, word:word, x:x, y:-dh,
    dw:dw, dh:dh, hw:dw*0.42, hh:dh*0.44, r:dh*0.42,
    t:Math.random()*6.28, bank:0,
    vy: (pat==='dive'? (54+Math.random()*22) : (34+Math.random()*16)) * SPMUL * DIFF,
    amp: pat==='weave' ? (60+Math.random()*80) : (22+Math.random()*26),
    freq: pat==='weave' ? (0.9+Math.random()*0.6) : (1.5+Math.random()*0.8),
    baseX:x, fireT: 0.6+Math.random()*1.2
  };
  G.enemies.push(e);
}

/* ════════════════════════════════════════════════════════════
   10. 발사 · 탄막
   ════════════════════════════════════════════════════════════ */
var _gunSide=0;
function playerFire(){
  var t=performance.now();
  if(t - G.fireT < 68) return; G.fireT=t;      // 연사 주기 ↓ = 빠른 '다다다'
  // 양쪽 총열 교대 발사(연발 기관총 느낌)
  _gunSide^=1; var lx=G.px-11, rx=G.px+11, my=G.py-26;
  G.pbul.push({x:lx, y:my, vy:-700}, {x:rx, y:my, vy:-700});
  // 총구 화염(짧게)
  if(G.parts.length<130){ G.parts.push({fire:true,x:_gunSide?lx:rx,y:my,age:0,life:0.05,rad:7}); }
  sndShot();
}
/* 총알은 기체 '총구'에서 발사 — 탄막 대신 총처럼 적게 조준 사격. 기체 로컬좌표(기수=아래 +y)를 뱅킹각으로 회전해 총구 월드좌표 계산 */
function muzzleWorld(e, lx, ly){ var a=clamp(e.bank*0.012,-0.28,0.28), ca=Math.cos(a), sa=Math.sin(a);
  return { x:e.x + lx*ca - ly*sa, y:e.y + lx*sa + ly*ca }; }
function fireBullet(mx,my,sp,color){ var a=Math.atan2(G.py-my, G.px-mx);
  G.ebul.push({x:mx,y:my,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:5,c:color}); muzzleFlash(mx,my); }
function enemyFire(e){
  if(G.ebul.length >= 14) return;                 // 🛡️ 화면 총알 상한(탄막 쌓임 방지)
  if(e.pat==='dive'){
    // 기수 카울총 단발 조준 사격
    var m=muzzleWorld(e, 0, e.dh*0.42);
    fireBullet(m.x, m.y, 205*SPMUL, '#ffcf5a');
  } else {
    // 좌우 날개총 중 한쪽만 1발 조준(탄막 아님, 총처럼)
    var wing=e.dw*0.24, s=(Math.random()<0.5?-1:1);
    var w=muzzleWorld(e, s*wing, e.dh*0.30);
    fireBullet(w.x, w.y, 168*SPMUL, '#ff6b6b');
  }
  sndEnemyShot();
}
/* 총구 화염 — 짧은 화구 + 스파크(기존 파티클 렌더 재사용) */
function muzzleFlash(x,y){
  G.parts.push({fire:true,x:x,y:y,age:0,life:0.11,rad:10});
  for(var i=0;i<3;i++){ var a=Math.random()*6.28, sp=45+Math.random()*40;
    G.parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.16,age:0,size:2,rot:0,vr:0,kind:'spark'}); }
}

/* ════════════════════════════════════════════════════════════
   11. 폭발 · 파티클
   ════════════════════════════════════════════════════════════ */
function explode(x,y,big){
  var n = big?26:16;
  for(var i=0;i<n;i++){ var a=Math.random()*6.28, sp=(big?80:50)+Math.random()*(big?260:160);
    G.parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.5+Math.random()*0.5,age:0,
      size:2+Math.random()*(big?5:3),rot:Math.random()*6.28,vr:(Math.random()-0.5)*10,
      kind: Math.random()<0.55?'debris':'spark'}); }
  // 충격 링 + 화구
  G.parts.push({ring:true,x:x,y:y,age:0,life:0.45,r0:6,r1:big?90:56});
  G.parts.push({fire:true,x:x,y:y,age:0,life:big?0.5:0.36,rad:big?52:36});
  G.shake=Math.min(16, G.shake+(big?12:7));
}

/* ════════════════════════════════════════════════════════════
   12. 입력 — 포인터 조종/발사
   ════════════════════════════════════════════════════════════ */
function ptr(ev){ var r=cv.getBoundingClientRect(); var t=ev.touches&&ev.touches[0]?ev.touches[0]:ev;
  return {x:t.clientX-r.left, y:t.clientY-r.top}; }
cv.addEventListener('pointermove',function(ev){ if(!G||!G.running||G.speaking)return; var p=ptr(ev); G.tx=p.x; G.ty=p.y; });
cv.addEventListener('pointerdown',function(ev){ if(!G||!G.running||G.speaking)return; audio(); if(AC&&AC.state==='suspended')AC.resume();
  var p=ptr(ev); G.tx=p.x; G.ty=p.y; G.firing=true; playerFire(); });
window.addEventListener('pointerup',function(){ if(G)G.firing=false; });
cv.addEventListener('contextmenu',function(e){e.preventDefault();});

/* ════════════════════════════════════════════════════════════
   13. 업데이트
   ════════════════════════════════════════════════════════════ */
function update(dt){
  if(!G.running||G.paused||G.speaking) return;   // 말하기연습 중엔 게임/타이머 정지
  if(G.dead){ stepParticles(dt);                   // 격추 연출: 폭발 파티클 + 조종사 낙하산 하강만
    if(G.pilot){ var pl=G.pilot; pl.t+=dt; pl.y+=pl.vy*dt; pl.x=pl.baseX+Math.sin(pl.t*1.1)*24*SCALE; }
    return; }
  // 시간
  G.time -= dt; if(G.time<=0){ G.time=0; return endGame(false); }
  bdScroll = (bdScroll + dt*90*SPMUL) % bdH;

  // 플레이어(정밀 lerp 추종)
  var lp=1-Math.pow(0.0016, dt);
  G.px += (G.tx-G.px)*lp; G.py += (G.ty-G.py)*lp;
  G.px=clamp(G.px,24,W-24); G.py=clamp(G.py,60,H-70);
  if(G.invuln>0)G.invuln-=dt;

  // 연사
  if(G.firing) playerFire();

  // 스폰
  G.spawnT-=dt;
  if(G.spawnT<=0){ spawnEnemy(false); G.spawnT = (1.7 - STAGE*0.1)/SPMUL * (0.8+Math.random()*0.6); }
  // 정답 단어 항상 화면에 존재하도록 워치독
  G.watchT-=dt; if(G.watchT<=0){ G.watchT=1.0; if(!targetOnScreen() && G.enemies.length<5) spawnEnemy(true); }
  // 연료
  G.fuelT-=dt; if(G.fuelT<=0){ G.fuelT=6+Math.random()*5;
    G.fuels.push({x:40+Math.random()*(W-80),y:-30,vy:(52+Math.random()*20),r:16*SCALE,rot:0}); }

  // 적기 이동/사격
  for(var i=G.enemies.length-1;i>=0;i--){ var e=G.enemies[i]; if(!e.alive){G.enemies.splice(i,1);continue;}
    e.t+=dt; e.y+=e.vy*dt;
    var nx = e.baseX + Math.sin(e.t*e.freq)*e.amp;
    e.bank = (nx-e.x); e.x=nx; e.x=clamp(e.x,20,W-20);
    e.fireT-=dt; if(e.fireT<=0 && e.y>20 && e.y<H*0.75){ enemyFire(e); e.fireT=(e.pat==='dive'?2.2:2.9)*(1.25-STAGE*0.08); }
    if(e.y>H+40){ G.enemies.splice(i,1); }
  }
  // 적 탄
  for(var b=G.ebul.length-1;b>=0;b--){ var eb=G.ebul[b]; eb.x+=eb.vx*dt; eb.y+=eb.vy*dt;
    if(eb.x<-20||eb.x>W+20||eb.y<-20||eb.y>H+20){ G.ebul.splice(b,1); continue; }
    if(G.invuln<=0 && Math.hypot(eb.x-G.px,eb.y-G.py) < 20*SCALE){ G.ebul.splice(b,1); hitPlayer(); }
  }
  // 플레이어 탄
  for(var p=G.pbul.length-1;p>=0;p--){ var pb=G.pbul[p]; pb.y+=pb.vy*dt;
    if(pb.y<-20){ G.pbul.splice(p,1); continue; }
    var hit=false;
    for(var j=0;j<G.enemies.length;j++){ var en=G.enemies[j]; if(!en.alive)continue;
      if(Math.abs(pb.x-en.x)<en.hw && Math.abs(pb.y-en.y)<en.hh){ resolveHit(en); hit=true; break; } }
    if(!hit){ for(var f=0;f<G.fuels.length;f++){ var fu=G.fuels[f];
      if(Math.abs(pb.x-fu.x)<fu.r+4 && Math.abs(pb.y-fu.y)<fu.r+4){ collectFuel(fu); G.fuels.splice(f,1); hit=true; break; } } }
    if(hit) G.pbul.splice(p,1);
  }
  // 연료 낙하 + 몸통 획득
  for(var g2=G.fuels.length-1;g2>=0;g2--){ var fl=G.fuels[g2]; fl.y+=fl.vy*dt; fl.rot+=dt*2;
    if(fl.y>H+30){ G.fuels.splice(g2,1); continue; }
    if(Math.hypot(fl.x-G.px,fl.y-G.py)<fl.r+18*SCALE){ collectFuel(fl); G.fuels.splice(g2,1); } }
  // 적기 몸통 충돌
  for(var k2=0;k2<G.enemies.length;k2++){ var em=G.enemies[k2]; if(!em.alive)continue;
    if(G.invuln<=0 && Math.hypot(em.x-G.px,em.y-G.py)<em.r+16*SCALE){ explode(em.x,em.y,false); sndBoom(); em.alive=false; hitPlayer(); } }
  // 파티클/흔들림
  stepParticles(dt);
}
/* 파티클 + 화면흔들림/플래시 감쇠(정상·격추연출 공용) */
function stepParticles(dt){
  if(G.shake>0)G.shake=Math.max(0,G.shake-dt*40); if(G.flash>0)G.flash-=dt;
  for(var q=G.parts.length-1;q>=0;q--){ var pt=G.parts[q]; pt.age+=dt; if(pt.age>=pt.life){ G.parts.splice(q,1); continue; }
    if(!pt.ring&&!pt.fire){ pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=260*dt; pt.vx*=0.98; pt.rot+=pt.vr*dt; } }
}

function hitPlayer(){ if(G.invuln>0||G.dead)return; G.hearts--; G.invuln=1.3; G.flash=0.35; G.shake=Math.min(18,G.shake+10);
  G.time=Math.max(0,G.time-2); sndBuzz(); updateHUD();
  if(G.hearts<=0){ playerDestroyed(); } }   // 💥 격추 → 대형 폭발 연출

/* 💥 격추 연출 — 대형 폭발 + 큰 폭발음 → 🪂 조종사 낙하산 탈출 → 종료화면 */
function playerDestroyed(){
  if(G.dead)return; G.dead=true; G.firing=false;
  bgmStop();
  var px0=G.px, py0=G.py;
  bigExplode(px0, py0);
  sndBigBoom();
  G.shake=Math.min(46,G.shake+34); G.flash=0.8;
  setTimeout(function(){ if(G&&G.dead){ bigExplode(px0+20,py0-14); sndBoom(); } }, 220);
  setTimeout(function(){ if(G&&G.dead){ bigExplode(px0-18,py0+16); } }, 440);
  // 🪂 폭발 직후 조종사가 낙하산으로 탈출해 천천히 하강
  setTimeout(function(){ if(G&&G.dead){ G.pilot={ baseX:px0, x:px0, y:py0-40*SCALE, vy:30*SCALE, t:0 }; sndPickup(); pilotVidStart(); } }, 560);
  setTimeout(function(){ if(G&&G.dead) endGame(false); }, 2800);   // 낙하산 하강이 보이도록 연장
}
/* 대형 폭발 = 다층 화구 + 다중 충격링 + 다량 파편(기존 파티클 렌더 재사용) */
function bigExplode(x,y){
  G.parts.push({fire:true,x:x,y:y,age:0,life:0.75,rad:130});
  G.parts.push({fire:true,x:x,y:y,age:0,life:0.5,rad:85});
  G.parts.push({ring:true,x:x,y:y,age:0,life:0.6,r0:12,r1:185});
  G.parts.push({ring:true,x:x,y:y,age:0,life:0.42,r0:6,r1:120});
  for(var i=0;i<44;i++){ var a=Math.random()*6.28, sp=110+Math.random()*380;
    G.parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.6+Math.random()*0.8,age:0,
      size:2+Math.random()*6,rot:Math.random()*6.28,vr:(Math.random()-0.5)*15,
      kind: Math.random()<0.5?'debris':'spark'}); }
  G.shake=Math.min(46,G.shake+16);
}

function resolveHit(en){
  en.alive=false;
  if(sameWord(en.word, neededWord())){
    explode(en.x,en.y,true); sndBoom();
    G.correct++;                                  // 🎯 정답 단어 명중 누적(허브 goal 컨벤션과 동일 단위)
    G.score += 100 + G.clears*10;
    pushProg(en.word,true);
    speak(en.word, 0.95, 1);
    wordPopAt(en.x,en.y, en.word);
    G.next++;
    banner('+'+(100+G.clears*10), '#a3e635');
    if(G.correct>=GOAL){ updateHUD(); return winGame(); }   // 목표 정답 수 달성 → 임무 완료
    if(G.next>=G.sent.w.length){ sentenceComplete(); }
    else renderSentence();
  } else {
    explode(en.x,en.y,false); sndBuzz();
    pushProg(en.word,false);
    G.time=Math.max(0,G.time-2.5);
    G.flash=0.25;
    banner('오답! -2.5s', '#ff6b6b');
  }
  updateHUD();
}
function sentenceComplete(){
  G.clears++;
  G.score += 300; G.time=Math.min(G.timeMax, G.time+5);   // 보너스 점수 + 시간
  banner('✦ 문장 완성! +300 ✦', '#ffd479');
  updateHUD();
  startSpeaking();   // 🎤 듣기 3번 → 따라 말하기 3번 연습(게임 일시정지). 끝나면 다음 문장
}
function winGame(){ if(!G||!G.running)return; G.running=false; G.speaking=false;
  try{ document.getElementById('speak').classList.add('hide'); }catch(_){}
  setTimeout(function(){ endGame(true); }, 900); }  // 마지막 폭발/발음만 재생 후 종료

/* ════════════════════════════════════════════════════════════
   말하기 연습 — 듣기 3번 → 따라 말하기 3번(음성인식) → 모두 성공 시 추가 포인트 / 실패 시 같은 문장 재도전
   ════════════════════════════════════════════════════════════ */
var SP=null, spState='';   // spState: 'listen' | 'speak' | 'result'
var spRate=(function(){ try{ var r=parseFloat(localStorage.getItem('mangoi_langace_rate')); return (r>=0.4&&r<=1.6)?r:0.85; }catch(_){ return 0.85; } })();
function spFull(){ return SP.sent.w.join(MODE==='zh'?'':' '); }
function spStopAudio(){ _spkSeq++; try{ speechSynthesis.cancel(); }catch(_){} }   // 진행 중 낭독 시퀀스 취소
/* 🔉 읽어주기 속도 변경 — 듣기 중이면 새 속도로 다시 들려주고, 아니면 1회 미리듣기 */
function setSpRate(r){
  spRate=r; try{ localStorage.setItem('mangoi_langace_rate', String(r)); }catch(_){}
  var btns=document.querySelectorAll('#spSpeed .spSpd');
  for(var i=0;i<btns.length;i++){ btns[i].classList.toggle('on', parseFloat(btns[i].getAttribute('data-r'))===r); }
  if(!SP) return;
  if(spState==='listen'){ spListen(); }                                  // 듣기 단계: 새 속도로 3번 다시
  else if(spState==='speak'){ spStopAudio(); speak(spFull(), spRate, 1); } // 말하기 단계: 미리듣기 1회
}
function dotsHtml(n,cur){ var s=''; for(var i=0;i<n;i++){ s+='<div class="spDot'+(i===cur?' cur':'')+'">'+(i+1)+'</div>'; } return s; }
function spSetDot(i,ok){ var d=document.querySelectorAll('#spDots .spDot'); if(!d[i])return;
  d[i].classList.remove('cur'); d[i].classList.add(ok?'ok':'no'); d[i].textContent=ok?'✓':'✗';
  if(d[i+1]) d[i+1].classList.add('cur'); }
function spPhase(t){ document.getElementById('spPhase').textContent=t; }
function spHeard(html){ document.getElementById('spHeard').innerHTML=html||''; }

function startSpeaking(){
  SP={ sent:G.sent, done:0, ok:0 };

function spListen(){

function spBeginSpeak(){

}
function spDoRep(){
  var mic=document.getElementById('spMic'); mic.disabled=true; mic.textContent='🎙️ 듣는 중…';
  spHeard('말해보세요…');
  listenOnce(function(ok, said){

    spSetDot(idx, ok);
    spHeard(said ? ('들린 말: <b>'+esc(said)+'</b> '+(ok?'✅':'❌')) : '❌ 잘 안 들렸어요');
    if(ok) sndPickup(); else sndBuzz();

      spPhase('🎤 따라 말해보세요! ('+(SP.done+1)+'/3)');

}
function spResult(){
  spState='result';
  if(SP.ok>=3){
    G.score += 150; updateHUD();                       // ✅ 모두 성공 → 추가 포인트
    spPhase('🏆 완벽해요! 추가 +150');

    setTimeout(spNext, 1700);
  } else {
    spPhase('💪 아쉬워요! 다시 해볼까요? ('+SP.ok+'/3)');   // ❌ 실패 → 같은 문장 재도전
    spHeard('같은 문장을 다시 들려줄게요…');
    setTimeout(spListen, 1800);
  }
}
function spNext(){ spStopAudio(); spState=''; document.getElementById('speak').classList.add('hide'); G.speaking=false;
  if(!muted) bgmStart(); loadSentence(); }
function spSkip(){ spStopAudio(); spState=''; document.getElementById('speak').classList.add('hide');

/* TTS N회 반복 후 콜백(끝 이벤트 유실 대비 안전 타임아웃 · 시퀀스 토큰으로 재시작 시 옛 낭독 무효화) */
var _spkSeq=0;
function speakTimes(text, rate, times, cb){
  var seq=++_spkSeq;
  var called=false; function fin(){ if(called||seq!==_spkSeq)return; called=true; if(cb) cb(); }
  if(muted){ setTimeout(fin, 600); return; }
  try{ speechSynthesis.cancel(); }catch(_){}
  var lang=LANGMETA[MODE].tts, v=pickVoice(lang), n=0;
  var est=Math.max(2600, text.length*150)*times;
  var safety=setTimeout(fin, est+2000);
  function once(){ if(seq!==_spkSeq)return; n++;
    try{ var u=new SpeechSynthesisUtterance(text); u.lang=lang; u.rate=rate||0.9; if(v)u.voice=v;
      u.onend=function(){ if(seq!==_spkSeq)return; if(n<times) setTimeout(once,450); else { clearTimeout(safety); fin(); } };
      u.onerror=function(){ if(seq!==_spkSeq)return; if(n<times) setTimeout(once,450); else { clearTimeout(safety); fin(); } };
      speechSynthesis.speak(u);
    }catch(_){ clearTimeout(safety); fin(); }
  }
  once();
}
/* 음성인식 1회 — 미지원/오류는 통과(soft-lock 방지) */
function listenOnce(cb){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ cb(true,'(음성인식 미지원 · 통과)'); return; }
  var rec; try{ rec=new SR(); }catch(_){ cb(true,'(통과)'); return; }
  // 🎤 말 중간에 숨 쉬어도 안 끊기게: continuous=true + 침묵 감시. 정답이 들리면 즉시 통과,
  //    아니면 "말 끝나고 조용해질 때까지" 기다렸다가 마지막 인식으로 판정(8초 강제 종료 제거).
  rec.lang=(MODE==='zh'?'zh-CN':'en-US'); rec.interimResults=true; rec.maxAlternatives=3; rec.continuous=true;
  var done=false, best='', matched=false, _sil=null, SILENCE_MS=2400;
  function finish(ok,txt){ if(done)return; done=true; if(_sil)clearTimeout(_sil); try{rec.stop();}catch(_){}; cb(ok,txt); }
  function arm(){ if(_sil)clearTimeout(_sil); _sil=setTimeout(function(){ try{rec.stop();}catch(_){} }, SILENCE_MS); }
  rec.onstart=function(){ arm(); };
  rec.onresult=function(e){ if(done)return; var target=spFull();
    for(var s=e.resultIndex;s<e.results.length;s++){ var alts=e.results[s];
      for(var i=0;i<alts.length;i++){ var tx=alts[i].transcript||''; if(tx)best=tx; if(matchSentence(tx,target)){ matched=true; best=tx; finish(true,best); return; } }
    }
    arm(); };                                    // 아직 정답 아님 → 계속 말할 시간 부여
  rec.onerror=function(){ if(_sil)clearTimeout(_sil); finish(matched, best); };
  rec.onend=function(){ if(_sil)clearTimeout(_sil); finish(matched, best); };
  try{ rec.start(); }catch(_){ finish(false,''); return; }
}
/* 발화 vs 정답 문장 매칭(관대) — en=단어 65%↑, zh=글자 70%↑ */
function matchSentence(said, target){
  if(!said) return false;
  if(MODE==='zh'){
    var s=said.replace(/[\s，。,.!?！？、]/g,''), t=target.replace(/[\s，。,.!?！？、]/g,'');
    if(!t) return false; var hit=0; for(var i=0;i<t.length;i++){ if(s.indexOf(t.charAt(i))>=0) hit++; }
    return hit/t.length >= 0.7;
  }
  function norm(x){ return x.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(Boolean); }
  var sw=norm(said), tw=norm(target); if(!tw.length) return false;
  var setS={}; sw.forEach(function(w){ setS[w]=1; });
  var hit2=0; tw.forEach(function(w){ if(setS[w]) hit2++; });
  return hit2/tw.length >= 0.65;
}
function collectFuel(fu){ explode(fu.x,fu.y,false); sndPickup();
  G.time=Math.min(G.timeMax, G.time+8); G.score+=30;
  for(var i=0;i<8;i++){ var a=Math.random()*6.28; G.parts.push({x:fu.x,y:fu.y,vx:Math.cos(a)*90,vy:Math.sin(a)*90-40,
    life:0.5,age:0,size:3,rot:0,vr:5,kind:'spark',fuel:true}); }
  banner('⛽ +8s', '#7fd1ff'); updateHUD(); }

/* ════════════════════════════════════════════════════════════
   14. 렌더
   ════════════════════════════════════════════════════════════ */
function render(){
  ctx.save();
  if(G && G.shake>0){ var s=G.shake; ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); }
  // 배경(2회 타일 스크롤)
  if(bd){ var off = bdScroll; ctx.drawImage(bd,0,off-bdH); ctx.drawImage(bd,0,off); }
  else { ctx.fillStyle='#2b3d4f'; ctx.fillRect(0,0,W,H); }
  // 🌙 저녁: 달(고정) + 🌠 별똥별(애니메이션) — 배경 위, 게임요소 아래
  if(SKY==='evening'){ drawMoonAt(ctx, W*0.82, H*0.15, 30*(SCALE>1?1.5:1)); drawShooters(); }

  if(G){
    // 연료
    G.fuels.forEach(function(fu){ drawFuel(fu); });
    // 적기(라벨 포함) — 전 기체 A6M Zero 실사 스프라이트
    G.enemies.forEach(function(e){ drawZeroSprite(e); drawLabel(e); });
    // 적 탄
    G.ebul.forEach(function(eb){ drawEbul(eb); });
    // 플레이어 탄(위로 향하는 예광탄 — 밝은 하늘서도 보이게 어두운 외곽+노란 코어+흰 탄두)
    ctx.lineCap='round';
    G.pbul.forEach(function(pb){
      ctx.strokeStyle='rgba(70,35,0,.5)'; ctx.lineWidth=4.5; ctx.beginPath(); ctx.moveTo(pb.x,pb.y-12); ctx.lineTo(pb.x,pb.y+2); ctx.stroke();
      ctx.strokeStyle='#ffcf3c'; ctx.lineWidth=2.6; ctx.beginPath(); ctx.moveTo(pb.x,pb.y-12); ctx.lineTo(pb.x,pb.y+1); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(pb.x,pb.y-12,1.9,0,7); ctx.fill(); });
    // 플레이어
    drawPlayer();
    // 파티클
    G.parts.forEach(function(pt){ drawPart(pt); });
    // 🪂 조종사 낙하산 탈출(격추 연출)
    if(G.pilot) drawPilot(G.pilot);
    // 피격 플래시
    if(G.flash>0){ ctx.fillStyle='rgba(255,40,40,'+(G.flash*0.5)+')'; ctx.fillRect(0,0,W,H); }
  }
  ctx.restore();
}

function drawPlayer(){
  if(G.dead) return;                      // 격추됨 → 기체 사라지고 폭발만
  var blink = (G.invuln>0 && Math.floor(performance.now()/90)%2===0);
  ctx.save(); ctx.translate(G.px,G.py); ctx.scale(SCALE,SCALE);   // 🖥️ PC 2배 확대
  // 연한 그림자(방사형 — shadowBlur 대신 = 성능)
  var sh=ctx.createRadialGradient(6,26,4,6,26,46); sh.addColorStop(0,'rgba(0,0,0,.34)'); sh.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sh; ctx.beginPath(); ctx.ellipse(6,26,44,20,0,0,7); ctx.fill();
  if(!blink){
    if(B17.ready){ var sc=76/B17.h; var w=B17.w*sc, h=B17.h*sc; ctx.drawImage(B17.cnv,-w/2,-h/2,w,h); }
    else { drawB17fallback(); }
  }
  ctx.restore();
}
/* 🪂 조종사 낙하산 — 격추 후 천천히 하강하며 좌우로 흔들림. 실사 영상(크로마키) 우선, 실패 시 PNG */
/* 화면 밖으로 짤리지 않게 그리기 중심을 클램프(피사체가 화면 안에 통째로 보이도록) */
function clampPos(v, half, span){ var a=half+6, b=span-half-6; if(a>b) return span/2; return v<a?a:(v>b?b:v); }
/* 🪂 조종사 낙하산 = 전신 컷 이미지(몸통 전체 보장). 처음 조종석 크기→나오며 크게(가까이). 화면 밖 안짤리게 클램프 */
function drawPilot(p){
  if(!PILOT.ready) return;
  var sway=Math.sin(p.t*1.1);
  var grow = 0.16 + Math.min(1, p.t/2.5)*1.16;               // 조종석 크기(0.16) → 크게(1.32)
  var h=Math.min(150*SCALE*grow, H*0.86), pw=h*PILOT.w/PILOT.h;
  var dx=clampPos(p.x, pw*0.5, W), dy=clampPos(p.y, h*0.5, H);
  ctx.save(); ctx.translate(dx,dy); ctx.rotate(sway*0.09);
  ctx.drawImage(PILOT.img, -pw/2, -h/2, pw, h);
  ctx.restore();
}
function drawB17fallback(){ // 이미지 로드 전/실패 시 벡터 대체(올리브 드랩)
  ctx.save();
  var body=ctx.createLinearGradient(-8,0,10,0); body.addColorStop(0,'#6a6f45'); body.addColorStop(.5,'#878c5a'); body.addColorStop(1,'#565a38');
  ctx.fillStyle=body; rr(-7,-34,14,66,7); ctx.fill();
  var wing=ctx.createLinearGradient(0,-6,0,6); wing.addColorStop(0,'#7d8252'); wing.addColorStop(1,'#565a38');
  ctx.fillStyle=wing; rr(-46,-8,92,15,5); ctx.fill(); rr(-22,26,44,10,4); ctx.fill();
  ctx.fillStyle='#3a3d28'; [-34,-16,16,34].forEach(function(ex){ rr(ex-4,-14,8,12,3); ctx.fill(); });
  ctx.fillStyle='#9fd0e6'; rr(-5,-30,10,10,4); ctx.fill();
  ctx.restore();
}

/* ── A6M Zero 실사 스프라이트(기수 아래) + 연한 그림자 + 뱅킹 ── */
function drawZeroSprite(e){
  if(!ZERO.ready){ drawZeroVec(e); return; }
  ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(clamp(e.bank*0.012,-0.28,0.28));
  // 연한 그림자(방사형 = shadowBlur 대비 성능)
  var shy=e.dh*0.32, shrx=e.dw*0.5, shry=e.dh*0.34;
  var sh=ctx.createRadialGradient(4,shy,3,4,shy,shrx); sh.addColorStop(0,'rgba(0,0,0,.3)'); sh.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sh; ctx.beginPath(); ctx.ellipse(4,shy,shrx,shry,0,0,7); ctx.fill();
  ctx.drawImage(ZERO.img, -e.dw/2, -e.dh/2, e.dw, e.dh);
  ctx.restore();
}
/* 이미지 로드 전/실패 시 벡터 대체(회녹색 + 히노마루, 기수 아래) */
function drawZeroVec(e){
  ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(Math.PI + clamp(e.bank*0.01,-0.3,0.3));
  var wg=ctx.createLinearGradient(0,-4,0,6); wg.addColorStop(0,'#9aa585'); wg.addColorStop(.5,'#77835f'); wg.addColorStop(1,'#4c5539');
  ctx.fillStyle=wg; ctx.beginPath(); ctx.ellipse(0,2,30,7,0,0,7); ctx.fill();
  ctx.fillStyle='#c0392b'; [-19,19].forEach(function(wx){ ctx.beginPath(); ctx.arc(wx,2,4,0,7); ctx.fill(); });
  var bg=ctx.createLinearGradient(-6,0,7,0); bg.addColorStop(0,'#8a9370'); bg.addColorStop(.5,'#b3bd97'); bg.addColorStop(1,'#59613f');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.moveTo(0,-32); ctx.quadraticCurveTo(7,-16,6,6); ctx.quadraticCurveTo(5,22,0,29);
  ctx.quadraticCurveTo(-5,22,-6,6); ctx.quadraticCurveTo(-7,-16,0,-32); ctx.closePath(); ctx.fill();
  var cg=ctx.createLinearGradient(0,-8,0,8); cg.addColorStop(0,'#3a5a4a'); cg.addColorStop(1,'#1e352a');
  ctx.fillStyle=cg; rr(-4,-6,8,15,4); ctx.fill();
  ctx.fillStyle=wg; ctx.beginPath(); ctx.moveTo(0,20); ctx.lineTo(-10,30); ctx.lineTo(10,30); ctx.closePath(); ctx.fill();
  ctx.restore();
}

/* 단어 라벨(적기 아래) */
function drawLabel(e){
  var isT = sameWord(e.word, neededWord());
  ctx.save(); ctx.font='bold 15px "Segoe UI",sans-serif'; ctx.textAlign='center';
  var tw=ctx.measureText(e.word).width, pad=7, bw=tw+pad*2, by=e.y+e.r+4;
  ctx.fillStyle = isT ? 'rgba(60,44,10,.92)' : 'rgba(10,16,22,.82)';
  rr(e.x-bw/2, by, bw, 21, 6); ctx.fill();
  if(isT){ ctx.strokeStyle='#ffd479'; ctx.lineWidth=1.5; rr(e.x-bw/2,by,bw,21,6); ctx.stroke(); }
  ctx.fillStyle = isT ? '#ffe9a8' : '#dbe6f2'; ctx.textBaseline='middle';
  ctx.fillText(e.word, e.x, by+11);
  ctx.restore();
}

/* 예광탄(트레이서) — 진행 방향으로 길쭉한 총알선 + 뜨거운 탄두(둥근 폭탄 느낌 제거) */
function drawEbul(eb){
  var sp=Math.hypot(eb.vx,eb.vy)||1, ux=eb.vx/sp, uy=eb.vy/sp, len=15;
  ctx.save(); ctx.lineCap='round';
  ctx.strokeStyle='rgba(120,60,20,.4)'; ctx.lineWidth=4;   // 어두운 외곽(밝은 하늘서도 보이게)
  ctx.beginPath(); ctx.moveTo(eb.x-ux*len, eb.y-uy*len); ctx.lineTo(eb.x, eb.y); ctx.stroke();
  ctx.strokeStyle=eb.c; ctx.lineWidth=2.6;                 // 예광 코어
  ctx.beginPath(); ctx.moveTo(eb.x-ux*len*0.7, eb.y-uy*len*0.7); ctx.lineTo(eb.x, eb.y); ctx.stroke();
  ctx.fillStyle='#fff6c8'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 2.2, 0, 7); ctx.fill();  // 탄두
  ctx.restore();
}
function drawFuel(fu){
  ctx.save(); ctx.translate(fu.x,fu.y); ctx.rotate(Math.sin(fu.rot)*0.15);
  var sh=ctx.createRadialGradient(3,18,2,3,18,20); sh.addColorStop(0,'rgba(0,0,0,.3)'); sh.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sh; ctx.beginPath(); ctx.ellipse(3,18,16,7,0,0,7); ctx.fill();
  var bg=ctx.createLinearGradient(-fu.r,0,fu.r,0); bg.addColorStop(0,'#8a5a1e'); bg.addColorStop(.5,'#d08a2e'); bg.addColorStop(1,'#6e4416');
  ctx.fillStyle=bg; rr(-fu.r*0.72,-fu.r,fu.r*1.44,fu.r*2,4); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-fu.r*0.72,-4); ctx.lineTo(fu.r*0.72,-4);
  ctx.moveTo(-fu.r*0.72,5); ctx.lineTo(fu.r*0.72,5); ctx.stroke();
  ctx.fillStyle='#1a1a1a'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⛽',0,0);
  ctx.restore();
}
function drawPart(pt){
  var k=1-pt.age/pt.life;
  if(pt.ring){ var r=pt.r0+(pt.r1-pt.r0)*(pt.age/pt.life); ctx.strokeStyle='rgba(255,220,150,'+(k*0.8)+')';
    ctx.lineWidth=3*k+0.5; ctx.beginPath(); ctx.arc(pt.x,pt.y,r,0,7); ctx.stroke(); return; }
  if(pt.fire){ var rr2=pt.rad*(0.5+0.5*(pt.age/pt.life));
    var fg=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,rr2);
    fg.addColorStop(0,'rgba(255,255,240,'+k+')'); fg.addColorStop(.3,'rgba(255,210,80,'+(k*0.95)+')');
    fg.addColorStop(.6,'rgba(255,120,30,'+(k*0.8)+')'); fg.addColorStop(.85,'rgba(190,40,20,'+(k*0.5)+')');
    fg.addColorStop(1,'rgba(60,20,15,0)'); ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(pt.x,pt.y,rr2,0,7); ctx.fill(); return; }
  if(pt.kind==='spark'){ ctx.fillStyle= pt.fuel ? 'rgba(140,210,255,'+k+')' : 'rgba(255,'+(160+Math.floor(80*k))+',80,'+k+')';
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.size*k+0.5,0,7); ctx.fill(); }
  else { ctx.save(); ctx.translate(pt.x,pt.y); ctx.rotate(pt.rot);
    ctx.fillStyle='rgba('+(70+Math.floor(40*k))+','+(70+Math.floor(30*k))+',60,'+(0.6+0.4*k)+')';
    ctx.fillRect(-pt.size,-pt.size,pt.size*2,pt.size*2); ctx.restore(); }
}

/* ════════════════════════════════════════════════════════════
   15. HUD · 배너 · 팝업
   ════════════════════════════════════════════════════════════ */
function updateHUD(){
  document.getElementById('vScore').textContent=G.score;
  document.getElementById('vClear').textContent=G.correct+'/'+GOAL;
  document.getElementById('vTime').textContent=Math.ceil(G.time);
  var pct=Math.max(0,Math.min(1,G.time/G.timeMax))*100;
  var tf=document.getElementById('timeFill'); tf.style.width=pct+'%'; tf.classList.toggle('warn', G.time<15);
  document.getElementById('hHearts').textContent = '❤️'.repeat(Math.max(0,G.hearts)) + '🤍'.repeat(Math.max(0,3-G.hearts));
}
var _bnT=null;
function banner(txt,color){ var el=document.getElementById('bannerMsg'); el.textContent=txt; el.style.color=color||'#ffd479';
  el.style.opacity='1'; if(_bnT)clearTimeout(_bnT); _bnT=setTimeout(function(){ el.style.opacity='0'; },700); }
var _popT=null;
function wordPopAt(x,y,w){ var el=document.getElementById('wordpop'); var ko=glossKo(w), py=glossPy(w);
  el.innerHTML = esc(w)+(py?' <span style="color:#ffcf5a">['+py+']</span>':'')+(ko?' · '+esc(ko):'');
  el.style.left=x+'px'; el.style.top=y+'px'; el.style.display='block';
  if(_popT)clearTimeout(_popT); _popT=setTimeout(function(){ el.style.display='none'; },1100); }

/* ════════════════════════════════════════════════════════════
   16. 학습기록
   ════════════════════════════════════════════════════════════ */
function pushProg(word,ok){ G.prog.push({item:word,ko:glossKo(word)||'',correct:!!ok}); if(G.prog.length>=20)flushProg(); }
function flushProg(){ if(!G||!G.prog.length)return; var ev=G.prog.splice(0,60),body=JSON.stringify({user_id:UID,lang:MODE,game:'language-ace',events:ev});
  try{ if(navigator.sendBeacon)navigator.sendBeacon('/api/games/progress',new Blob([body],{type:'application/json'}));
    else fetch('/api/games/progress',{method:'POST',headers:{'Content-Type':'application/json'},body:body,keepalive:true}).catch(function(){}); }catch(_){} }

/* ════════════════════════════════════════════════════════════
   17. 루프
   ════════════════════════════════════════════════════════════ */
var last=0, raf=null;
function loop(ts){ raf=requestAnimationFrame(loop); if(!last)last=ts; var dt=(ts-last)/1000; last=ts;
  if(dt>0.05)dt=0.05;  // 탭 복귀 등 큰 점프 클램프
  if(G&&G.running&&!G.paused){ update(dt); if(G.running) updateHUD(); }
  render(); }

/* ════════════════════════════════════════════════════════════
   18. 시작 / 종료
   ════════════════════════════════════════════════════════════ */
function startGame(){
  document.getElementById('start').classList.add('hide');
  document.getElementById('over').classList.add('hide');
  pilotVidStop();                          // 🎥 이전 판 낙하산 영상 정지
  // 출격 클릭(사용자 제스처)으로 영상 autoplay 잠금 해제: 잠깐 재생→즉시 정지
  try{ var _pp=PVID.vid&&PVID.vid.play(); if(_pp&&_pp.then) _pp.then(function(){ try{ PVID.vid.pause(); PVID.vid.currentTime=0; }catch(_){} }).catch(function(){}); }catch(_){}
  newGame(); G.running=true; updateHUD();
  audio(); if(AC&&AC.state==='suspended')AC.resume();
  bgmStart();                              // 🎵 배경음악 시작
  banner('✈️ 출격!', '#ffd479');
}
function endGame(win){
  if(!G||G.over)return; G.over=true; G.running=false; flushProg();
  bgmStop(); pilotVidStop();               // 🎵 배경음악·🎥 낙하산 영상 정지
  try{ speechSynthesis.cancel(); }catch(_){}
  document.getElementById('overTitle').textContent = win ? '🎖️ 임무 완료!' : '💥 격추당했다!';
  document.getElementById('overStat').innerHTML =
    '정답 <b>'+G.correct+'</b> / '+GOAL+' · 완성 문장 <b>'+G.clears+'</b><br>최종 점수 <b>'+G.score+'</b>';
  document.getElementById('over').classList.remove('hide');
  if(win){ sndPickup(); } else { sndBoom(); }
}

/* ════════════════════════════════════════════════════════════
   19. UI 바인딩
   ════════════════════════════════════════════════════════════ */
function setLang(l){ MODE=(l==='zh')?'zh':'en';
  document.getElementById('lgEn').classList.toggle('on',MODE==='en');
  document.getElementById('lgZh').classList.toggle('on',MODE==='zh');
  document.getElementById('startSub').textContent = MODE==='zh' ? '한자 문장을 어순대로 격추하라!' : '문장을 어순대로 격추하라!';
  try{ localStorage.setItem('mangoi_game_lang',MODE); }catch(_){}
}
document.getElementById('lgEn').addEventListener('click',function(){ setLang('en'); });
document.getElementById('lgZh').addEventListener('click',function(){ setLang('zh'); });
// 🌤️ 낮/저녁 배경 선택
function setSky(s){ SKY=(s==='evening')?'evening':'day';
  var b=document.querySelectorAll('#skyRow .skyBtn');
  for(var i=0;i<b.length;i++){ b[i].classList.toggle('on', b[i].getAttribute('data-s')===SKY); }
  try{ localStorage.setItem('mangoi_langace_sky',SKY); }catch(_){}
  buildBackdrop();   // 배경 즉시 재생성
}
(function(){ var b=document.querySelectorAll('#skyRow .skyBtn');
  for(var i=0;i<b.length;i++){ (function(el){ el.addEventListener('click', function(){ setSky(el.getAttribute('data-s')); }); })(b[i]); }
})();
document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnAgain').addEventListener('click', startGame);
document.getElementById('btnMute').addEventListener('click',function(){ muted=!muted; this.textContent=muted?'🔇':'🔊';
  if(muted){ bgmStop(); try{speechSynthesis.cancel();}catch(_){} }
  else if(G&&G.running&&!G.paused){ bgmStart(); } });
document.getElementById('btnPause').addEventListener('click',function(){ if(!G||!G.running||G.speaking)return; G.paused=!G.paused; this.textContent=G.paused?'▶️':'⏸️';
  if(G.paused){ bgmStop(); banner('⏸️ 일시정지','#cdd9e6'); } else { bgmStart(); } });
document.addEventListener('visibilitychange',function(){ if(G&&G.running&&document.hidden){ G.paused=true; bgmStop(); document.getElementById('btnPause').textContent='▶️'; } });
// 말하기 연습 버튼
document.getElementById('spMic').addEventListener('click', function(){ if(SP) spDoRep(); });
document.getElementById('spSkip').addEventListener('click', function(){ if(SP) spSkip(); });
// 🔉 읽어주기 속도 버튼
(function(){ var btns=document.querySelectorAll('#spSpeed .spSpd');
  for(var i=0;i<btns.length;i++){ (function(b){ b.addEventListener('click', function(){ setSpRate(parseFloat(b.getAttribute('data-r'))); }); })(btns[i]); }
  // 저장된 속도로 활성표시 초기화
  for(var j=0;j<btns.length;j++){ btns[j].classList.toggle('on', parseFloat(btns[j].getAttribute('data-r'))===spRate); }
})();

/* ════════════════════════════════════════════════════════════
   20. 유틸
   ════════════════════════════════════════════════════════════ */
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ── 부트 ── */
resize(); setLang(MODE); setSky(SKY); raf=requestAnimationFrame(loop);
</script>
