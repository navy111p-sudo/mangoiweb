<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>P-38 라이트닝 (Lightning)</title>
<!--
  ✈️ 랭귀지 에이스(Language Ace): B-17 단어 폭격대
  · 단일 HTML SPA. 허브 파라미터: ?uid= &speed=1..5 &stage=1..3 &goal=N(정답 단어 목표, 허브 기본 10) &glang=en|zh &sentence=...
  · 플레이어 B-17 = 실사 이미지(/img/b17-player.png) 런타임 크로마키(초록 제거) 스프라이트
  · 적기 전부 = A6M Zero 실사 스프라이트(/img/zero-enemy.png, 편대사진서 선두기 크롭+크로마키). 비행패턴 weave/dive 2종
  · 문장을 어순대로 '단어를 실은 적기'를 격추해 완성 → 발음 재생(Web Speech API)
  · 연료(드럼통) 획득 → 점수+시간 증가 · 적 탄막(danmaku) 회피
  · 사운드 = Web Audio API(기관총/폭발/획득/오답), 발음 = 서버 원어민 TTS(/api/voice/tts) 우선 → 기기 음성(Web Speech) 폴백
  · 학습기록 = /api/games/progress 배치 전송(실패해도 게임 무관)
-->
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#0a0f14;
    font-family:'Segoe UI',system-ui,'Malgun Gothic',sans-serif;color:#e8eef5;user-select:none;touch-action:none}
  #wrap{position:fixed;inset:0;overflow:hidden}
  canvas{display:block;position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}

  /* ── 상단 문장 바 (배경 박스 없이 글자만 — 전투기 가림 방지) ── */
  #topbar{position:absolute;top:0;left:0;right:0;z-index:6;padding:5px 12px 2px;
    background:transparent; pointer-events:none}
  #sentKo{font-size:13px;color:#ffe07a;text-align:center;font-weight:800;letter-spacing:.3px;
    text-shadow:0 1px 2px #000,0 0 5px rgba(0,0,0,.85),-1px 0 2px #000,1px 0 2px #000}
  #sentEn{margin-top:2px;display:flex;flex-wrap:wrap;gap:1px 10px;justify-content:center;align-items:flex-start}
  /* 🈶 한자 자형 통일 — 정식 중국어 폰트(YaHei/PingFang) 우선, 라틴은 Segoe */
  .wtok, .spSent{ font-family:'Segoe UI','Microsoft YaHei','微软雅黑','PingFang SC','Hiragino Sans GB','Noto Sans CJK SC','Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  /* 배경/테두리 제거 = 글자만. 상태는 '글자색'으로 표시 */
  .wtok{font-size:19px;font-weight:900;padding:0;border:0;border-radius:0;line-height:1.05;
    background:none;color:#eef5ff;text-align:center;transition:color .2s;
    text-shadow:0 1px 2px #000,0 0 4px rgba(0,0,0,.95),-1px 0 2px #000,1px 0 2px #000,0 -1px 2px #000}
  .wtok .py{display:block;font-size:11px;font-weight:800;color:#e3ecf7;margin-top:0;
    text-shadow:0 1px 2px #000,0 0 3px rgba(0,0,0,.9)}
  .wtok.done{color:#74ffa6}                       /* 완료 = 초록 글자 */
  .wtok.done .py{color:#b6f2cc}
  .wtok.next{color:#ffd84a; animation:tokColor .8s ease-in-out infinite}  /* 지금 맞출 단어 = 노랑 + 색 깜빡임 */
  .wtok.next .py{color:#ffe9b8}
  @keyframes tokColor{
    0%,100%{color:#ffd84a;text-shadow:0 1px 2px #000,0 0 8px rgba(255,205,60,.95),-1px 0 2px #000,1px 0 2px #000}
    50%    {color:#fff6a0;text-shadow:0 1px 2px #000,0 0 15px rgba(255,225,90,1),-1px 0 2px #000,1px 0 2px #000} }

  /* ── HUD ── */
  #hud{position:absolute;left:0;right:0;bottom:0;z-index:6;padding:8px 12px 10px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:10px;pointer-events:none;
    background:linear-gradient(0deg,rgba(8,14,20,.9),transparent)}
  .hbox{background:rgba(10,18,26,.72);border:1px solid rgba(120,150,180,.22);border-radius:10px;
    padding:5px 11px;backdrop-filter:blur(3px)}
  .hlab{font-size:10px;color:#8aa0b8;font-weight:700;letter-spacing:1px}
  .hval{font-size:20px;font-weight:900;line-height:1.05;font-variant-numeric:tabular-nums}
  #hScore .hval{color:#ffd479}
  #hClear .hval{color:#7fd1ff}
  #timeWrap{flex:1;max-width:340px}
  #timeBar{height:12px;border-radius:7px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:4px;
    border:1px solid rgba(255,255,255,.14)}
  #timeFill{height:100%;width:100%;border-radius:7px;
    background:linear-gradient(90deg,#3ddc84,#a3e635);transition:width .25s linear}
  #timeFill.warn{background:linear-gradient(90deg,#f97316,#ef4444)}
  #hHearts{font-size:19px;letter-spacing:1px;filter:drop-shadow(0 1px 2px #000)}

  /* ── 오버레이(시작/종료) ──
     내용이 화면보다 길면 스크롤. margin:auto 트릭 = 짧으면 중앙, 길면 위부터(잘림 방지) */
  .overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-start;text-align:center;padding:16px 14px;overflow-y:auto;
    background:radial-gradient(120% 90% at 50% 35%,rgba(24,36,50,.86),rgba(6,10,14,.96))}
  .overlay>:first-child{margin-top:auto}
  .overlay>:last-child{margin-bottom:auto}
  .overlay.hide{display:none}
  .oTitle{font-size:27px;font-weight:900;letter-spacing:.5px;flex-shrink:0;
    background:linear-gradient(180deg,#ffe9a8,#e0b048);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;text-shadow:0 2px 8px rgba(0,0,0,.4);line-height:1.15}
  .oTitleEn{font-size:15px;font-weight:700;color:#cfe0f0;-webkit-text-fill-color:#cfe0f0}
  .oSub{margin-top:3px;font-size:13.5px;color:#b8c6d6;font-weight:600}
  .oRules{margin:10px 0 0;font-size:12.5px;color:#9fb2c6;line-height:1.75;max-width:400px}
  .oRules b{color:#ffd479}
  .langRow{display:flex;gap:9px;margin:7px 0 0}
  .langBtn{padding:8px 18px;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;
    border:2px solid rgba(140,165,195,.35);background:rgba(20,32,46,.7);color:#c8d4e2;transition:.15s}
  .langBtn.on{border-color:#ffd479;color:#fff6da;background:linear-gradient(180deg,#3a4a5e,#26323f);
    box-shadow:0 0 16px rgba(255,190,60,.4)}
  /* 🎯 난이도 스테퍼 */
  .diffRow{display:flex;gap:8px;align-items:center;margin:7px 0 0}
  .diffLab{font-size:14px;font-weight:800;color:#c8d4e2}
  .diffBtn{width:36px;height:36px;border-radius:10px;font-size:21px;font-weight:900;cursor:pointer;line-height:1;
    border:2px solid rgba(140,165,195,.4);background:rgba(20,32,46,.85);color:#ffe08a;display:flex;align-items:center;justify-content:center}
  .diffBtn:active{transform:scale(.9)}
  .diffVal{min-width:40px;text-align:center;font-size:24px;font-weight:900;color:#ffd479;
    text-shadow:0 2px 6px #000;font-variant-numeric:tabular-nums}
  .diffTag{font-size:14px;font-weight:800;color:#a7c4e6;min-width:52px;text-align:left}
  .diffHint{font-size:11.5px;color:#8aa0b8;margin:3px 0 0;max-width:400px;text-align:center;line-height:1.4}
  .bigBtn{margin-top:12px;padding:13px 46px;border-radius:14px;font-size:19px;font-weight:900;cursor:pointer;flex-shrink:0;
    border:none;color:#1a2028;background:linear-gradient(180deg,#ffe08a,#e0a838);
    box-shadow:0 6px 20px rgba(224,168,56,.45),inset 0 1px 0 rgba(255,255,255,.6);letter-spacing:.5px}
  .bigBtn:active{transform:translateY(2px)}
  /* 📚 시작화면 안 교재 네비 컴팩트(공용 lesson-nav.js 스타일을 페이지에서만 축소) */
  #start .lnav-wrap{gap:4px;margin:7px 0 0}
  #start .lnav-sel{padding:5px 9px;font-size:12px;max-width:190px}
  #start .lnav-btn{padding:6px 12px;font-size:13px}
  #start .lnav-label{min-width:100px;max-width:150px;font-size:12px}
  /* 📱 좁거나 낮은 화면 = 한층 더 컴팩트 */
  @media (max-width:480px),(max-height:700px){
    .oTitle{font-size:23px}
    .oTitleEn{font-size:13px}
    .oSub{font-size:12.5px}
    .langBtn{padding:7px 14px;font-size:14px}
    .diffBtn{width:33px;height:33px;font-size:19px}
    .diffVal{font-size:21px}
    .oRules{font-size:11.5px;line-height:1.65}
    .bigBtn{margin-top:10px;padding:12px 40px;font-size:18px}
  }
  #overStat{font-size:17px;color:#dbe6f2;margin:8px 0 2px;line-height:1.7}
  #overStat b{color:#ffd479;font-size:22px}

  /* 말하기 연습 오버레이 */
  .spPhase{font-size:22px;font-weight:900;color:#ffd479;text-shadow:0 2px 6px #000;text-align:center}
  .spSent{font-size:32px;font-weight:900;color:#fff;margin:12px 0 2px;line-height:1.35;max-width:92%;text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.5)}
  .spSent .py{font-size:15px;color:#7fd1ff;font-weight:700}
  .spKo{font-size:16px;color:#b8c6d6;margin-bottom:4px;text-align:center}
  .spDots{display:flex;gap:12px;margin:14px 0 6px}
  .spDot{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);
    display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#8aa0b8;transition:.15s}
  .spDot.ok{background:linear-gradient(180deg,#2e7d46,#1c5a30);border-color:#41d178;color:#d8ffe4}
  .spDot.no{background:linear-gradient(180deg,#7d2e2e,#5a1c1c);border-color:#ef4444;color:#ffd8d8}
  .spDot.cur{border-color:#ffd479;box-shadow:0 0 12px rgba(255,190,60,.6);animation:pulseTok .9s ease-in-out infinite}
  .spHeard{font-size:15px;color:#cdd9e6;min-height:24px;margin-top:4px;text-align:center;max-width:90%}
  .spHeard b{color:#7fd1ff}
  .spSkip{margin-top:16px;background:none;border:1px solid rgba(140,165,195,.4);color:#9fb0c4;
    padding:8px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
  .spSkip:active{transform:scale(.96)}
  .spSpeed{display:flex;align-items:center;gap:7px;margin:10px 0 2px;flex-wrap:wrap;justify-content:center}
  .spSpeedLab{font-size:13px;color:#8aa0b8;font-weight:700}
  .spSpd{padding:6px 13px;border-radius:20px;border:1px solid rgba(140,165,195,.35);background:rgba(20,32,46,.7);
    color:#c8d4e2;font-size:14px;font-weight:800;cursor:pointer;transition:.12s}
  .spSpd.on{border-color:#ffd479;color:#1a2028;background:linear-gradient(180deg,#ffe08a,#e0a838);box-shadow:0 0 12px rgba(255,190,60,.4)}
  .spSpd:active{transform:scale(.95)}
  /* 🔴 녹음 중(마이크 켜짐) — 버튼 빨갛게 + 맥동 */
  #spMic.recording{background:linear-gradient(180deg,#ff6b6b,#e03131);color:#fff;
    box-shadow:0 0 0 4px rgba(255,90,90,.35),0 6px 20px rgba(224,49,49,.55);animation:recPulse .9s ease-in-out infinite}
  @keyframes recPulse{0%,100%{box-shadow:0 0 0 4px rgba(255,90,90,.35),0 6px 20px rgba(224,49,49,.55)}
    50%{box-shadow:0 0 0 10px rgba(255,90,90,.12),0 6px 26px rgba(224,49,49,.75)}}

  /* 단어 발음 팝업 */
  #wordpop{position:absolute;z-index:15;display:none;pointer-events:none;
    background:rgba(12,20,28,.94);border:1px solid #ffd479;border-radius:9px;padding:5px 11px;
    font-size:14px;font-weight:700;color:#fff6da;box-shadow:0 4px 16px rgba(0,0,0,.5);white-space:nowrap;
    transform:translate(-50%,-120%)}

  /* 상단 우측 컨트롤 */
  #ctlRow{position:absolute;top:8px;right:10px;z-index:7;display:flex;gap:6px}
  .ctlBtn{width:34px;height:34px;border-radius:9px;border:1px solid rgba(140,165,195,.3);
    background:rgba(12,20,28,.7);color:#cdd9e6;font-size:16px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;justify-content:center;pointer-events:auto}
  .ctlBtn:active{transform:scale(.92)}
  #bannerMsg{position:absolute;top:34%;left:50%;transform:translateX(-50%);z-index:8;
    font-size:30px;font-weight:900;pointer-events:none;opacity:0;text-shadow:0 3px 12px rgba(0,0,0,.7);
    transition:opacity .2s}

  /* 🔥 발사 버튼 — 바탕 없이 글자만 작게, 폭격기 기수(맨 앞)에 붙어 따라다님. 누르는 동안만 발사 */
  #fireBtn{position:absolute;left:0;top:0;z-index:9;width:34px;height:34px;
    background:none;border:0;border-radius:0;box-shadow:none;
    color:#ff5236;font-size:13px;font-weight:900;line-height:1;
    display:none;align-items:center;justify-content:center;
    text-shadow:0 1px 2px #000,0 0 3px #000,-1px 0 1px #000,1px 0 1px #000,0 -1px 1px #000;
    cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;pointer-events:auto;transition:transform .05s}
  #fireBtn.on{display:flex}
  #fireBtn:active{transform:scale(.8)}
</style>
<script src="/js/mangoi-stt.js?v=2"></script><!-- 🎤 음성인식 조기 종료 보호막 -->
<script src="/js/i18n-sweep.js?v=11" defer></script>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>

  <div id="topbar">
    <div id="sentKo">—</div>
    <div id="sentEn"></div>
  </div>

  <div id="ctlRow">
    <button class="ctlBtn" id="btnMute" title="소리">🔊</button>
    <button class="ctlBtn" id="btnPause" title="일시정지">⏸️</button>
  </div>

  <div id="bannerMsg"></div>

  <div id="hud">
    <div class="hbox" id="hScore"><div class="hlab">SCORE</div><div class="hval" id="vScore">0</div></div>
    <div class="hbox" id="timeWrap"><div class="hlab">FUEL / TIME <span id="vTime" style="float:right;color:#a3e635">60</span></div>
      <div id="timeBar"><div id="timeFill"></div></div>
      <div id="hHearts" style="margin-top:5px">❤️❤️❤️</div></div>
    <div class="hbox" id="hClear"><div class="hlab">정답</div><div class="hval" id="vClear">0/10</div></div>
  </div>

  <button id="fireBtn">발사</button>

  <div id="wordpop"></div>

  <!-- 시작 화면 -->
  <div class="overlay" id="start">
    <div class="oTitle">✈️ P-38 라이트닝 <span class="oTitleEn">(Lightning)</span></div>
    <div class="oSub" id="startSub">문장을 어순대로 격추하라!</div>
    <div class="langRow">
      <button class="langBtn" id="lgEn" data-l="en">🇺🇸 English</button>
      <button class="langBtn" id="lgZh" data-l="zh">🇨🇳 中文</button>
    </div>
    <div class="langRow" id="skyRow">
      <button class="langBtn skyBtn" data-s="day">☀️ 낮</button>
      <button class="langBtn skyBtn" data-s="evening">🌙 저녁</button>
    </div>
    <!-- 📚 진도(레슨) 네비게이션: ◀복습 / ▶예습 -->
    <div id="lessonNav" style="margin-top:4px"></div>
    <div class="diffRow" id="diffRow">
      <span class="diffLab">🎯 난이도</span>
      <button class="diffBtn" id="diffMinus" aria-label="난이도 낮추기">−</button>
      <span class="diffVal" id="diffVal">4</span>
      <button class="diffBtn" id="diffPlus" aria-label="난이도 높이기">＋</button>
      <span class="diffTag" id="diffTag">보통</span>
    </div>
    <div class="diffHint">난이도↑ = 전투기·총알 빠르고 많이, 발음 빠르게 (1 쉬움 ~ 7 어려움)</div>
    <button class="bigBtn" id="btnStart">▶ 출격!</button>
    <div class="oRules">
      🖱️ 드래그로 조종 · 🔫 누르고 있으면 연사<br>
      🎯 문장의 금색 단어를 실은 적기를 순서대로 격추!<br>
      🛢️ 드럼통 = 시간·점수 ↑ · 💥 적 탄막을 피하세요!
    </div>
  </div>

  <!-- 종료 화면 -->
  <div class="overlay hide" id="over">
    <div class="oTitle" id="overTitle">임무 완료!</div>
    <div id="overStat"></div>
    <button class="bigBtn" id="btnAgain">🔄 다시 출격</button>
  </div>

  <!-- 말하기 연습 화면(문장 완성 시): 듣기 3번 → 따라 말하기 3번 -->
  <div class="overlay hide" id="speak">
    <div class="spPhase" id="spPhase">🔊 잘 들어보세요</div>
    <div class="spSent" id="spSent">—</div>
    <div class="spKo" id="spKo"></div>
    <div class="spSpeed" id="spSpeed">
      <span class="spSpeedLab">🔉 속도</span>
      <button class="spSpd" data-r="0.6">🐢 느리게</button>
      <button class="spSpd" data-r="0.85">보통</button>
      <button class="spSpd" data-r="1.1">🐇 빠르게</button>
    </div>
    <div class="spDots" id="spDots"></div>
    <div class="spHeard" id="spHeard"></div>
    <button class="bigBtn hide" id="spMic">🎤 탭해서 말하기</button>
    <button class="spSkip" id="spSkip">건너뛰기 ▶</button>
  </div>
</div>

<script src="/js/lesson-nav.js?v=2"></script>
<script>
/* ════════════════════════════════════════════════════════════
   0. 파라미터 · 상태
   ════════════════════════════════════════════════════════════ */
var QS    = new URLSearchParams(location.search);
var UID   = QS.get('uid') || '';
// 🎯 통합 난이도 1(쉬움)~7(어려움) — 전투기 비행속도·총알(속도/발사빈도)·적기 수·발음(말하기)속도까지 함께.
//    저장값(mangoi_langace_diff) 우선, 없으면 허브 speed(1..5) 매핑.
var DLEVEL = (function(){
  try{ var d=parseInt(localStorage.getItem('mangoi_langace_diff'),10); if(d>=1&&d<=7) return d; }catch(_){}
  var sp=Math.max(1,Math.min(5,parseInt(QS.get('speed')||'3',10)||3));
  return Math.max(1,Math.min(7, Math.round(1+(sp-1)/4*6)));
})();
function diffSpmul(){ return 0.5 + (DLEVEL-1)/6*1.2; }            // 0.5..1.7 (전투기·총알 속도)
function diffFireMul(){ return 1.7 - DLEVEL*0.14; }              // 발사 간격 배수(저난이도=길게 = 천천히 쏨)
function diffSpawnBase(){ return 2.3 - DLEVEL*0.13; }            // 스폰 기본 간격(저난이도=드물게)
function diffMaxEnemies(){ return 3 + Math.round((DLEVEL-1)/6*3); }  // 3..6대
function diffRate(){ return +(0.6 + (DLEVEL-1)/6*0.6).toFixed(2); }  // 0.6..1.2 (말하기 속도)
// 🎯 GOAL = 정답 단어 명중 목표(허브 goal=10 컨벤션과 동일 단위 — shooter 등 형제 게임과 통일).

  function play(u, retried){
    try{
      if(!_ttsAudio) _ttsAudio=new Audio();
      _ttsStop();
      var done=false;
      function fin(ok){ if(done)return; done=true;
        // 📱 자동재생 정책 등으로 첫 재생이 막히면 잠깐 뒤 딱 1번 재시도(그 사이 잠금이 풀리는 케이스)
        if(!ok && !retried){ setTimeout(function(){ play(u, true); }, 320); return; }
        if(!ok && onfail){ onfail(); } else if(ok && onend){ onend(); } }
      _ttsAudio.onended=function(){ fin(true); };
      _ttsAudio.onerror=function(){ fin(false); };
      _ttsAudio.src=u; _ttsAudio.playbackRate=_audRate(rate);
      try{ _ttsAudio.preservesPitch=true; _ttsAudio.webkitPreservesPitch=true; }catch(_){}
      var p=_ttsAudio.play(); if(p&&p.catch) p.catch(function(){ fin(false); });
    }catch(_){ if(onfail)onfail(); }
  }
  if(_ttsCache[key]){ play(_ttsCache[key]); return; }
  fetch('/api/voice/tts', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ text:text, lang:lang, speaker:speaker }) })
    .then(function(r){ var ct=r.headers.get('content-type')||'';
      if(!r.ok || ct.indexOf('audio')<0) throw new Error('tts'); return r.blob(); })
    .then(function(b){ if(b.size<200) throw new Error('empty');
      // 📱 blob: URL 은 일부 안드로이드 WebView <audio> 가 재생 못 함 → data: URL 로 변환(앱에서도 확실히 소리)
      var fr=new FileReader();
      fr.onload=function(){ var u=String(fr.result||''); if(!u){ if(onfail)onfail(); return; } _ttsCache[key]=u; play(u); };
      fr.onerror=function(){ try{ var u2=URL.createObjectURL(b); _ttsCache[key]=u2; play(u2); }catch(_){ if(onfail)onfail(); } };
      fr.readAsDataURL(b);
    })
    .catch(function(){ if(onfail)onfail(); });
}

/* ── 중국어 서버 TTS = /api/tts-free (Google 만다린) ──
   ⚠️ /api/voice/tts 의 zh 는 깨진 오디오(Whisper 전사 실패)라 안 씀. /api/tts-free 는 정상 만다린(Whisper 전사 통과).
   기기(브라우저)에 중국어 음성이 없는 폰에서도 서버 오디오 파일이라 소리가 난다. 실패 시에만 기기 음성 폴백. */
var _freeCache={};
function _freeTts(text, rate, onend, onfail){
  var lang=LANGMETA[MODE].tts.slice(0,2), key=lang+'|'+text;
  function play(u, retried){
    try{
      if(!_ttsAudio) _ttsAudio=new Audio();
      _ttsStop();
      var done=false;
      function fin(ok){ if(done)return; done=true;
        if(!ok && !retried){ setTimeout(function(){ play(u,true); }, 320); return; }  // 자동재생 차단 1회 재시도
        if(!ok && onfail){ onfail(); } else if(ok && onend){ onend(); } }
      _ttsAudio.onended=function(){ fin(true); };
      _ttsAudio.onerror=function(){ fin(false); };
      _ttsAudio.src=u; _ttsAudio.playbackRate=_audRate(rate);
      try{ _ttsAudio.preservesPitch=true; _ttsAudio.webkitPreservesPitch=true; }catch(_){}
      var p=_ttsAudio.play(); if(p&&p.catch) p.catch(function(){ fin(false); });
    }catch(_){ if(onfail)onfail(); }
  }
  if(_freeCache[key]){ play(_freeCache[key]); return; }
  fetch('/api/tts-free?lang='+lang+'&q='+encodeURIComponent(text))
    .then(function(r){ var ct=r.headers.get('content-type')||''; if(!r.ok||ct.indexOf('audio')<0) throw new Error('free'); return r.blob(); })
    .then(function(b){ if(b.size<300) throw new Error('empty');
      var fr=new FileReader();
      fr.onload=function(){ var u=String(fr.result||''); if(!u){ if(onfail)onfail(); return; } _freeCache[key]=u; play(u); };
      fr.onerror=function(){ try{ var u2=URL.createObjectURL(b); _freeCache[key]=u2; play(u2); }catch(_){ if(onfail)onfail(); } };
      fr.readAsDataURL(b);
    })
    .catch(function(){ if(onfail)onfail(); });
}
/* 앱(APK v1.8+) 네이티브 TTS 브리지 — WebView 에는 speechSynthesis 가 없어 이것이 유일한 정상 경로 */
function _bridgeSpeak(text, rate){
  try{ if(window.AndroidTTS && window.AndroidTTS.isReady && window.AndroidTTS.isReady()){
    window.AndroidTTS.speak(text, LANGMETA[MODE].tts.slice(0,2), 1.0, rate||0.95); return true; } }catch(_){}
  return false; }
function speak(text, rate, times){ if(muted)return; times=Math.max(1,times||1);
  _ttsStop(); try{ speechSynthesis.cancel(); }catch(_){}
  if(MODE==='zh'){                                          // ★ 중국어 = 서버 오디오(/api/tts-free 구글 만다린) 우선.
    var zn=0;                                               //    기기·앱에 중국어 음성이 없어도 오디오 파일이라 소리가 난다.
    (function zonce(){ zn++;
      _freeTts(text, rate,
        function(){ if(zn<times) setTimeout(zonce,360); },
        function(){ if(!_bridgeSpeak(text, rate)) _synthSpeak(text, rate, times-(zn-1)); }); // 서버 실패 → 앱 네이티브 → 기기 음성
    })();
    return;
  }
  if(_bridgeSpeak(text, rate)) return;                      // ① 앱 네이티브(시스템 음성)
  var n=0;
  function once(){ n++;
    srvTts(text, rate,                                       // ③ en 은 서버 Aura-2(원어민) 우선
      function(){ if(n<times) setTimeout(once,360); },
      function(){ _synthSpeak(text, rate, times-(n-1)); });   // 서버 실패 → 남은 횟수는 기기 음성
  }
  once(); }
/* 기기 음성(브라우저 speechSynthesis) — 서버 TTS 실패 시 폴백 */
function _synthSpeak(text, rate, times){
  var lang=LANGMETA[MODE].tts, v=pickVoice(lang), n=0;
  function once(){ n++; try{ var u=new SpeechSynthesisUtterance(text); u.lang=lang; u.rate=rate||0.95; if(v)u.voice=v;
    if(n<times) u.onend=function(){ setTimeout(once,360); }; speechSynthesis.speak(u); }catch(_){} }
  once(); }
/* 남성 음성 우선 선택(이름 힌트 기반) — 브라우저마다 목소리명이 다름 */
function pickMaleVoice(lang){
  var pref=VOICES.filter(function(v){ return v.lang && v.lang.indexOf((lang||'en').slice(0,2))===0; });
  var male=['david','mark','daniel','alex','fred','george','james','guy','aaron','arthur','richard','eric','ryan','male','man','thomas','paul'];
  var female=['zira','female','woman','samantha','victoria','karen','moira','tessa','fiona','susan','linda','heather','catherine','hazel','google uk english female'];
  var m=pref.find(function(v){ var n=(v.name||'').toLowerCase(); return male.some(function(x){return n.indexOf(x)>=0;}); });
  if(m) return m;
  var nf=pref.find(function(v){ var n=(v.name||'').toLowerCase(); return !female.some(function(x){return n.indexOf(x)>=0;}); });
  return nf || pref[0] || pickVoice(lang);
}
/* 특정 언어 음성으로 한마디(조종사 "Oh no!" 등) — 최대 음량·낮은 톤·느리게 = 감성적/아쉬운 남자 목소리 */
function speakVoice(text, lang, rate){ if(muted)return;
  srvTts(text, rate, null, function(){ _synthVoice(text, lang, rate); }, (lang||'en-US').slice(0,2), 'orion'); }   // orion=남자 음색
function _synthVoice(text, lang, rate){
  try{ var u=new SpeechSynthesisUtterance(text); u.lang=lang||'en-US'; u.rate=rate||0.95; u.pitch=0.72; u.volume=1;
    var v=pickMaleVoice(lang||'en-US'); if(v)u.voice=v; speechSynthesis.speak(u); }catch(_){} }

/* ════════════════════════════════════════════════════════════
   5. 플레이어 스프라이트 — B-17 이미지 크로마키(초록 제거)
   ════════════════════════════════════════════════════════════ */
var B17 = { ready:false, cnv:null, w:0, h:0 };
(function loadB17(){
  var img=new Image();
  img.onload=function(){
    try{
      var oc=document.createElement('canvas'); oc.width=img.width; oc.height=img.height;
      var octx=oc.getContext('2d'); octx.drawImage(img,0,0);
      var id=octx.getImageData(0,0,oc.width,oc.height), d=id.data;
      var minX=oc.width,minY=oc.height,maxX=0,maxY=0;
      for(var i=0;i<d.length;i+=4){
        var r=d[i],g=d[i+1],b=d[i+2];
        // 형광 초록 판정: g가 확실히 우세 → 투명 처리 + 그린 스필 억제
        if(g>90 && g>r*1.25 && g>b*1.25 && (g-Math.max(r,b))>40){ d[i+3]=0; }
        else{
          if(g>r && g>b){ d[i+1]=Math.round((r+b)/2 + (g-(r+b)/2)*0.35); } // despill
          var p=(i/4), x=p%oc.width, y=(p-x)/oc.width;
          if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;
        }
      }
      octx.putImageData(id,0,0);
      // 타이트 크롭
      var cw=Math.max(1,maxX-minX+1), ch=Math.max(1,maxY-minY+1);
      var tc=document.createElement('canvas'); tc.width=cw; tc.height=ch;
      tc.getContext('2d').drawImage(oc,minX,minY,cw,ch,0,0,cw,ch);
      B17.cnv=tc; B17.w=cw; B17.h=ch; B17.ready=true;
    }catch(_){ B17.ready=false; }
  };
  img.onerror=function(){ B17.ready=false; };
  img.src='/img/p38-player.png';   // 🛩️ 플레이어기 = P-38 라이트닝(초록 크로마키 런타임 제거) — 사장님 교체
})();

/* ════════════════════════════════════════════════════════════
   6. 배경 — 스크롤 지형/구름(전진 비행감) · 오프스크린 프리렌더
   ════════════════════════════════════════════════════════════ */
var bd=null, bdH=0, bdScroll=0;
function buildBackdrop(){
  bdH = Math.max(H*2, 1200);
  bd = document.createElement('canvas'); bd.width=Math.max(1,Math.round(W)); bd.height=bdH;
  var g=bd.getContext('2d');
  function rnd(s){ var x=Math.sin(s*99.7)*43758.5; return x-Math.floor(x); }
  if(SKY==='evening'){
    // 🌙 저녁/밤 하늘 — 단색(타일 반복 시 이음매 없게 통일)
    g.fillStyle='#182a52'; g.fillRect(0,0,bd.width,bdH);
    // ⭐ 별 — 밝기·크기 랜덤, 일부는 십자 반짝임
    var stars=Math.round(bd.width*bdH/2600);
    for(var i=0;i<stars;i++){ var sx=rnd(i)*bd.width, sy=rnd(i+7)*bdH, sr=rnd(i+3)*1.5+0.4, sa=0.35+rnd(i+9)*0.65;
      g.fillStyle='rgba(255,255,255,'+sa.toFixed(2)+')'; g.beginPath(); g.arc(sx,sy,sr,0,7); g.fill();
      if(rnd(i+13)>0.9){ g.strokeStyle='rgba(255,255,255,'+(sa*0.5).toFixed(2)+')'; g.lineWidth=0.7;
        g.beginPath(); g.moveTo(sx-3.5,sy); g.lineTo(sx+3.5,sy); g.moveTo(sx,sy-3.5); g.lineTo(sx,sy+3.5); g.stroke(); } }
    // 옅은 밤 구름(어둡게, 성글게)
    for(var c=0;c<8;c++){ drawCloud(g, rnd(c+40)*bd.width, rnd(c+50)*bdH, 0.7+rnd(c+3)*0.9, c+1, true); }
    return;
  }
  // ☀️ 낮 — 단색 하늘색(타일 반복 시 이음매 없게 통일) + 뭉게구름
  g.fillStyle='#77c6f2'; g.fillRect(0,0,bd.width,bdH);
  var n=Math.max(9, Math.round(bdH/140));
  for(var i2=0;i2<n;i2++){ drawCloud(g, rnd(i2)*bd.width, rnd(i2+7)*bdH, 0.7+rnd(i2+3)*1.2, i2+1); }
}
/* 🌙 달 — 은은한 글로우 + 크레이터(고정 위치로 render 에서 호출) */
function drawMoonAt(g,x,y,r){
  var gl=g.createRadialGradient(x,y,r*0.55,x,y,r*2.5); gl.addColorStop(0,'rgba(255,250,225,.45)'); gl.addColorStop(1,'rgba(255,250,225,0)');
  g.fillStyle=gl; g.beginPath(); g.arc(x,y,r*2.5,0,7); g.fill();
  var mg=g.createRadialGradient(x-r*0.3,y-r*0.3,r*0.2,x,y,r); mg.addColorStop(0,'#fffdf2'); mg.addColorStop(1,'#e6dfbe');
  g.fillStyle=mg; g.beginPath(); g.arc(x,y,r,0,7); g.fill();
  g.fillStyle='rgba(198,190,158,.55)';
  [[0.32,-0.22,0.17],[-0.28,0.26,0.12],[0.12,0.38,0.1],[-0.35,-0.28,0.08]].forEach(function(c){ g.beginPath(); g.arc(x+c[0]*r,y+c[1]*r,c[2]*r,0,7); g.fill(); });
}
/* 🌠 별똥별 — 저녁에만, 가끔 사선으로 지나가며 사라짐 */
var _shoot={list:[], next:1.2, last:0};
function drawShooters(){
  if(SKY!=='evening') return;
  var now=performance.now(), dt=_shoot.last?(now-_shoot.last)/1000:0; _shoot.last=now; if(dt>0.06)dt=0.06;
  _shoot.next-=dt;
  if(_shoot.next<=0){ _shoot.next=1.0+Math.random()*3.2;
    _shoot.list.push({x:Math.random()*W*0.8, y:Math.random()*H*0.3, vx:(190+Math.random()*170), vy:(110+Math.random()*90), life:0, max:0.7+Math.random()*0.5}); }
  for(var i=_shoot.list.length-1;i>=0;i--){ var s=_shoot.list[i]; s.life+=dt; if(s.life>=s.max){ _shoot.list.splice(i,1); continue; }
    s.x+=s.vx*dt; s.y+=s.vy*dt;
    var k=1-s.life/s.max, ang=Math.atan2(s.vy,s.vx), L=70, tx=s.x-Math.cos(ang)*L, ty=s.y-Math.sin(ang)*L;
    var gr=ctx.createLinearGradient(tx,ty,s.x,s.y); gr.addColorStop(0,'rgba(255,255,255,0)'); gr.addColorStop(1,'rgba(255,255,255,'+k.toFixed(2)+')');
    ctx.strokeStyle=gr; ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(s.x,s.y); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,'+k.toFixed(2)+')'; ctx.beginPath(); ctx.arc(s.x,s.y,2.1,0,7); ctx.fill(); }
}
/* 뭉게구름 한 덩이 = 겹친 퍼프 + 옅은 밑면(볼륨감). dark=true 면 밤 구름(어둡게) */
function drawCloud(g,x,y,s,seed,dark){
  function rnd(k){ var v=Math.sin(seed*13.1+k*7.3)*43758.5; return v-Math.floor(v); }
  var puffs=5+Math.floor(rnd(1)*4);
  var body = dark ? ['rgba(60,72,104,','rgba(46,56,88,'] : ['rgba(255,255,255,','rgba(188,206,224,'];
  // 밑면(입체감)
  for(var k=0;k<puffs;k++){ var px=x+(k-(puffs-1)/2)*34*s+(rnd(k)*20-10)*s, py=y+8*s+rnd(k+30)*10*s, r=(26+rnd(k+10)*20)*s;
    var sg=g.createRadialGradient(px,py,0,px,py,r); sg.addColorStop(0,body[1]+(dark?'.75)':'.85)')); sg.addColorStop(1,body[1]+'0)');
    g.fillStyle=sg; g.beginPath(); g.arc(px,py,r,0,7); g.fill(); }
  // 본체 퍼프
  for(var k2=0;k2<puffs;k2++){ var px2=x+(k2-(puffs-1)/2)*32*s+(rnd(k2+3)*16-8)*s, py2=y-rnd(k2+5)*14*s, r2=(30+rnd(k2+2)*22)*s;
    var wg=g.createRadialGradient(px2,py2-r2*0.25,r2*0.2,px2,py2,r2); wg.addColorStop(0,body[0]+'1)'); wg.addColorStop(.72,body[0]+(dark?'.9)':'.97)')); wg.addColorStop(1,body[0]+'0)');
    g.fillStyle=wg; g.beginPath(); g.arc(px2,py2,r2,0,7); g.fill(); }
}

var LESSON_SETS=null;   // 📚 교재 레슨 문장(있으면 우선). 없으면 내장 SETS.
function loadSentence(){
  var pool = (LESSON_SETS && LESSON_SETS.length) ? LESSON_SETS : SETS[MODE];
  if(G.si>=G.queue.length) G.queue=shuffle(pool.slice()), G.si=0;
  var s=G.queue[G.si++];
  G.sent = { w:s.w.slice(), ko:s.ko }; G.next=0;
  renderSentence();
  speakTimes(G.sent.w.join(MODE==='zh'?'':' '), 0.95, 2);   // 🔊 새 문장 자동 2회 듣기 — seq 토큰 있는 speakTimes(미션 오디오와 안 꼬임)
}
/* 📚 진도(레슨) 네비게이터 — 로그인 학생 교재의 레슨별 문장 로드 + ◀복습/▶예습 */
function mountLessonNav(){
  if(!window.MangoiLessonNav) return;
  MangoiLessonNav.mount({ glang:MODE, mount:document.getElementById('lessonNav'), onSet:function(sets){
    LESSON_SETS = (sets && sets.length) ? sets : null;
    if(G){ G.queue=[]; G.si=0; if(G.running && !G.speaking) loadSentence(); }
  }});
}

/* ════════════════════════════════════════════════════════════
   8. 문장 바 렌더
   ════════════════════════════════════════════════════════════ */
function renderSentence(){
  document.getElementById('sentKo').textContent = '🎯 '+G.sent.ko;
  var host=document.getElementById('sentEn'); host.innerHTML='';
  G.sent.w.forEach(function(w,i){
    var cls = i<G.next ? 'done' : (i===G.next ? 'next' : '');
    var py = glossPy(w); var pyh = py ? '<span class="py">'+py+'</span>' : '';
    host.insertAdjacentHTML('beforeend','<span class="wtok '+cls+'">'+esc(w)+pyh+'</span>');
  });
}
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

/* ════════════════════════════════════════════════════════════
   9. 적기 스폰 — Bf109 / Zero, 단어 탑재
   ════════════════════════════════════════════════════════════ */
function neededWord(){ return G.sent.w[G.next]; }
function sameWord(a,b){ return MODE==='en' ? String(a).toLowerCase()===String(b).toLowerCase() : a===b; }
function targetOnScreen(){ var t=neededWord(); return G.enemies.some(function(e){ return e.alive && sameWord(e.word,t); }); }

function spawnEnemy(forceTarget){
  if(G.enemies.length>=diffMaxEnemies()) return;   // 동시 적기 상한(난이도별 3~6대)
  // 전 적기 = A6M Zero. 비행 패턴만 두 가지: weave(좌우 크게 스웝) / dive(빠른 직하강)
  var pat = Math.random()<0.5 ? 'weave' : 'dive';
  var word;
  if(forceTarget){ word=neededWord(); }
  else {
    var r=Math.random();
    if(r<0.42) word=neededWord();                                   // 정답 단어 자주
    else if(r<0.72){ var rem=G.sent.w.filter(function(w,i){return i!==G.next;}); word=rem.length?rem[Math.floor(Math.random()*rem.length)]:neededWord(); }
    else { var dp=decoyPool(); word=dp[Math.floor(Math.random()*dp.length)]; }
  }
  var x = 60+Math.random()*(W-120);
  var dw = (pat==='dive' ? 76 : 88) * SCALE;     // 표시 폭(px) · 🖥️ PC 2배
  var dh = dw * 445/887;                         // 원본 비율 유지
  var e = {
    pat:pat, alive:true, word:word, x:x, y:-dh,
    dw:dw, dh:dh, hw:dw*0.42, hh:dh*0.44, r:dh*0.42,
    t:Math.random()*6.28, bank:0,
    vy: (pat==='dive'? (54+Math.random()*22) : (34+Math.random()*16)) * SPMUL,
    amp: pat==='weave' ? (60+Math.random()*80) : (22+Math.random()*26),
    freq: pat==='weave' ? (0.9+Math.random()*0.6) : (1.5+Math.random()*0.8),
    baseX:x, fireT: 0.6+Math.random()*1.2
  };
  G.enemies.push(e);
}

/* ════════════════════════════════════════════════════════════
   10. 발사 · 탄막
   ════════════════════════════════════════════════════════════ */
var _gunSide=0;
function playerFire(){
  var t=performance.now();
  if(t - G.fireT < 68) return; G.fireT=t;      // 연사 주기 ↓ = 빠른 '다다다'
  // 양쪽 총열 교대 발사(연발 기관총 느낌)
  _gunSide^=1; var lx=G.px-11, rx=G.px+11, my=G.py-26;
  G.pbul.push({x:lx, y:my, vy:-700}, {x:rx, y:my, vy:-700});
  // 총구 화염(짧게)
  if(G.parts.length<130){ G.parts.push({fire:true,x:_gunSide?lx:rx,y:my,age:0,life:0.05,rad:7}); }
  sndShot();
}
/* 총알은 기체 '총구'에서 발사 — 탄막 대신 총처럼 적게 조준 사격. 기체 로컬좌표(기수=아래 +y)를 뱅킹각으로 회전해 총구 월드좌표 계산 */
function muzzleWorld(e, lx, ly){ var a=clamp(e.bank*0.012,-0.28,0.28), ca=Math.cos(a), sa=Math.sin(a);
  return { x:e.x + lx*ca - ly*sa, y:e.y + lx*sa + ly*ca }; }
function fireBullet(mx,my,sp,color){ var a=Math.atan2(G.py-my, G.px-mx);
  G.ebul.push({x:mx,y:my,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:5,c:color}); muzzleFlash(mx,my); }
function enemyFire(e){
  if(G.ebul.length >= 14) return;                 // 🛡️ 화면 총알 상한(탄막 쌓임 방지)
  if(e.pat==='dive'){
    // 기수 카울총 단발 조준 사격
    var m=muzzleWorld(e, 0, e.dh*0.42);
    fireBullet(m.x, m.y, 205*SPMUL, '#ffcf5a');
  } else {
    // 좌우 날개총 중 한쪽만 1발 조준(탄막 아님, 총처럼)
    var wing=e.dw*0.24, s=(Math.random()<0.5?-1:1);
    var w=muzzleWorld(e, s*wing, e.dh*0.30);
    fireBullet(w.x, w.y, 168*SPMUL, '#ff6b6b');
  }
  sndEnemyShot();
}
/* 총구 화염 — 짧은 화구 + 스파크(기존 파티클 렌더 재사용) */
function muzzleFlash(x,y){
  G.parts.push({fire:true,x:x,y:y,age:0,life:0.11,rad:10});
  for(var i=0;i<3;i++){ var a=Math.random()*6.28, sp=45+Math.random()*40;
    G.parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.16,age:0,size:2,rot:0,vr:0,kind:'spark'}); }
}

/* ════════════════════════════════════════════════════════════
   11. 폭발 · 파티클
   ════════════════════════════════════════════════════════════ */
function explode(x,y,big){
  var n = big?26:16;
  for(var i=0;i<n;i++){ var a=Math.random()*6.28, sp=(big?80:50)+Math.random()*(big?260:160);
    G.parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.5+Math.random()*0.5,age:0,
      size:2+Math.random()*(big?5:3),rot:Math.random()*6.28,vr:(Math.random()-0.5)*10,
      kind: Math.random()<0.55?'debris':'spark'}); }
  // 충격 링 + 화구
  G.parts.push({ring:true,x:x,y:y,age:0,life:0.45,r0:6,r1:big?90:56});
  G.parts.push({fire:true,x:x,y:y,age:0,life:big?0.5:0.36,rad:big?52:36});
  G.shake=Math.min(16, G.shake+(big?12:7));
}

/* ════════════════════════════════════════════════════════════
   12. 입력 — 포인터 조종/발사
   ════════════════════════════════════════════════════════════ */
function ptr(ev){ var r=cv.getBoundingClientRect(); var t=ev.touches&&ev.touches[0]?ev.touches[0]:ev;
  return {x:t.clientX-r.left, y:t.clientY-r.top}; }
// 📱 이동과 발사 분리: 손가락 드래그는 '이동'만(발사는 🔥버튼). 🖱️ PC 마우스는 종전대로 클릭=발사.
cv.addEventListener('pointermove',function(ev){ if(!G||!G.running||G.speaking)return; var p=ptr(ev); G.tx=p.x; G.ty=p.y; });
cv.addEventListener('pointerdown',function(ev){ if(!G||!G.running||G.speaking)return; audio(); if(AC&&AC.state==='suspended')AC.resume(); ttsUnlock();
  var p=ptr(ev); G.tx=p.x; G.ty=p.y;
  try{ cv.setPointerCapture(ev.pointerId); }catch(_){}   // 손가락이 캔버스 밖으로 살짝 나가도 조종 유지
  if(ev.pointerType==='mouse'){ G.firing=true; playerFire(); }   // PC만 캔버스 클릭=발사. 터치는 이동만.
});
window.addEventListener('pointerup',function(ev){ if(G && (!ev||ev.pointerType==='mouse')) G.firing=false; });
cv.addEventListener('contextmenu',function(e){e.preventDefault();});

// 🔥 발사 버튼(모바일 오발 방지의 핵심) — 누르고 있는 동안에만 연사, 떼면 멈춤
(function(){ var fb=document.getElementById('fireBtn'); if(!fb)return;
  function fireOn(ev){ ev.preventDefault(); if(!G||!G.running||G.speaking)return;
    audio(); if(AC&&AC.state==='suspended')AC.resume(); ttsUnlock();
    G.firing=true; try{ fb.setPointerCapture(ev.pointerId); }catch(_){}; playerFire(); }
  function fireOff(){ if(G)G.firing=false; }
  fb.addEventListener('pointerdown', fireOn);
  fb.addEventListener('pointerup', fireOff);
  fb.addEventListener('pointercancel', fireOff);
  fb.addEventListener('contextmenu', function(e){ e.preventDefault(); });
})();

// ⌨️ PC 스페이스바=발사(길게 누르면 연사)
window.addEventListener('keydown',function(e){ if(e.code==='Space' && G && G.running && !G.speaking){ e.preventDefault(); G.firing=true; } });
window.addEventListener('keyup',function(e){ if(e.code==='Space' && G) G.firing=false; });

/* ════════════════════════════════════════════════════════════
   13. 업데이트
   ════════════════════════════════════════════════════════════ */
function update(dt){
  if(!G.running||G.paused||G.speaking) return;   // 말하기연습 중엔 게임/타이머 정지
  if(G.dead){ stepParticles(dt);                   // 격추 연출: 폭발 파티클 + 조종사 낙하산 하강만
    if(G.pilot){ var pl=G.pilot; pl.t+=dt; pl.y+=pl.vy*dt; }   // 좌우 흔들림은 drawPilot(실시간 시계)에서 → 종료화면서도 계속 움직임
    return; }
  // 시간
  G.time -= dt; if(G.time<=0){ G.time=0; return endGame(false); }
  bdScroll = (bdScroll + dt*90*SPMUL) % bdH;

  // 플레이어(정밀 lerp 추종) — 0.0016→1e-9: 손가락 90% 도달 0.36s→0.11s (모바일 즉각 반응)
  var lp=1-Math.pow(0.000000001, dt);
  G.px += (G.tx-G.px)*lp; G.py += (G.ty-G.py)*lp;
  G.px=clamp(G.px,24,W-24); G.py=clamp(G.py,60,H-70);
  if(G.invuln>0)G.invuln-=dt;

  // 연사
  if(G.firing) playerFire();

  // 스폰
  G.spawnT-=dt;
  if(G.spawnT<=0){ spawnEnemy(false); G.spawnT = diffSpawnBase()/SPMUL * (0.8+Math.random()*0.6); }
  // 정답 단어 항상 화면에 존재하도록 워치독
  G.watchT-=dt; if(G.watchT<=0){ G.watchT=1.0;
    if(!targetOnScreen()){
      if(G.enemies.length<diffMaxEnemies()) spawnEnemy(true);
      else {
        // 🛟 교착 방지: 오답 적기가 상한을 다 채우면(저속에선 수십 초 배회) 정답 단어가 안 나옴
        // → 살아있는 적기 하나의 단어를 목표 단어로 교체
        var _cand=G.enemies.filter(function(e){ return e.alive; });
        if(_cand.length){ _cand[Math.floor(Math.random()*_cand.length)].word=neededWord(); }
      }
    }
  }
  // 연료
  G.fuelT-=dt; if(G.fuelT<=0){ G.fuelT=6+Math.random()*5;
    G.fuels.push({x:40+Math.random()*(W-80),y:-30,vy:(52+Math.random()*20),r:16*SCALE,rot:0}); }

  // 적기 이동/사격
  for(var i=G.enemies.length-1;i>=0;i--){ var e=G.enemies[i]; if(!e.alive){G.enemies.splice(i,1);continue;}
    e.t+=dt; e.y+=e.vy*dt;
    var nx = e.baseX + Math.sin(e.t*e.freq)*e.amp;
    e.bank = (nx-e.x); e.x=nx; e.x=clamp(e.x,20,W-20);
    e.fireT-=dt; if(e.fireT<=0 && e.y>20 && e.y<H*0.75){ enemyFire(e); e.fireT=(e.pat==='dive'?2.2:2.9)*diffFireMul(); }
    if(e.y>H+40){ G.enemies.splice(i,1); }
  }
  // 적 탄
  for(var b=G.ebul.length-1;b>=0;b--){ var eb=G.ebul[b]; eb.x+=eb.vx*dt; eb.y+=eb.vy*dt;
    if(eb.x<-20||eb.x>W+20||eb.y<-20||eb.y>H+20){ G.ebul.splice(b,1); continue; }
    if(G.invuln<=0 && Math.hypot(eb.x-G.px,eb.y-G.py) < 20*SCALE){ G.ebul.splice(b,1); hitPlayer(); }
  }
  // 플레이어 탄
  for(var p=G.pbul.length-1;p>=0;p--){ var pb=G.pbul[p]; pb.y+=pb.vy*dt;
    if(pb.y<-20){ G.pbul.splice(p,1); continue; }
    var hit=false;
    for(var j=0;j<G.enemies.length;j++){ var en=G.enemies[j]; if(!en.alive)continue;
      if(Math.abs(pb.x-en.x)<en.hw && Math.abs(pb.y-en.y)<en.hh){ resolveHit(en); hit=true; break; } }
    if(!hit){ for(var f=0;f<G.fuels.length;f++){ var fu=G.fuels[f];
      if(Math.abs(pb.x-fu.x)<fu.r+4 && Math.abs(pb.y-fu.y)<fu.r+4){ collectFuel(fu); G.fuels.splice(f,1); hit=true; break; } } }
    if(hit) G.pbul.splice(p,1);
  }
  // 연료 낙하 + 몸통 획득
  for(var g2=G.fuels.length-1;g2>=0;g2--){ var fl=G.fuels[g2]; fl.y+=fl.vy*dt; fl.rot+=dt*2;
    if(fl.y>H+30){ G.fuels.splice(g2,1); continue; }
    if(Math.hypot(fl.x-G.px,fl.y-G.py)<fl.r+18*SCALE){ collectFuel(fl); G.fuels.splice(g2,1); } }
  // 적기 몸통 충돌
  for(var k2=0;k2<G.enemies.length;k2++){ var em=G.enemies[k2]; if(!em.alive)continue;
    if(G.invuln<=0 && Math.hypot(em.x-G.px,em.y-G.py)<em.r+16*SCALE){ explode(em.x,em.y,false); sndBoom(); em.alive=false; hitPlayer(); } }
  // 파티클/흔들림
  stepParticles(dt);
}
/* 파티클 + 화면흔들림/플래시 감쇠(정상·격추연출 공용) */
function stepParticles(dt){
  if(G.shake>0)G.shake=Math.max(0,G.shake-dt*40); if(G.flash>0)G.flash-=dt;
  for(var q=G.parts.length-1;q>=0;q--){ var pt=G.parts[q]; pt.age+=dt; if(pt.age>=pt.life){ G.parts.splice(q,1); continue; }
    if(!pt.ring&&!pt.fire){ pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=260*dt; pt.vx*=0.98; pt.rot+=pt.vr*dt; } }
}

function hitPlayer(){ if(G.invuln>0||G.dead)return; G.hearts--; G.invuln=1.3; G.flash=0.35; G.shake=Math.min(18,G.shake+10);
  G.time=Math.max(0,G.time-2); sndBuzz(); updateHUD();
  if(G.hearts<=0){ playerDestroyed(); } }   // 💥 격추 → 대형 폭발 연출

/* 💥 격추 연출 — 대형 폭발 + 큰 폭발음 → 🪂 조종사 낙하산 탈출 → 종료화면 */
function playerDestroyed(){
  if(G.dead)return; G.dead=true; G.firing=false;
  bgmStop();
  var px0=G.px, py0=G.py;
  bigExplode(px0, py0);
  sndBigBoom();
  G.shake=Math.min(46,G.shake+34); G.flash=0.8;
  setTimeout(function(){ if(G&&G.dead){ bigExplode(px0+20,py0-14); sndBoom(); } }, 220);
  setTimeout(function(){ if(G&&G.dead){ bigExplode(px0-18,py0+16); } }, 440);
  // 🪂 폭발 직후 조종사가 낙하산으로 탈출해 천천히 하강
  setTimeout(function(){ if(G&&G.dead){ G.pilot={ baseX:px0, x:px0, y:py0-40*SCALE, vy:30*SCALE, t:0 }; sndPickup(); pilotVidStart();
    speakVoice('Oh no...', 'en-US', 0.68); } }, 560);   // 🗣️ 조종사 "Oh no..." 감성·아쉬운 목소리(느리게)
  setTimeout(function(){ if(G&&G.dead) endGame(false); }, 2800);   // 낙하산 하강이 보이도록 연장
}
/* 대형 폭발 = 다층 화구 + 다중 충격링 + 다량 파편(기존 파티클 렌더 재사용) */
function bigExplode(x,y){
  G.parts.push({fire:true,x:x,y:y,age:0,life:0.75,rad:130});
  G.parts.push({fire:true,x:x,y:y,age:0,life:0.5,rad:85});
  G.parts.push({ring:true,x:x,y:y,age:0,life:0.6,r0:12,r1:185});
  G.parts.push({ring:true,x:x,y:y,age:0,life:0.42,r0:6,r1:120});
  for(var i=0;i<44;i++){ var a=Math.random()*6.28, sp=110+Math.random()*380;
    G.parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.6+Math.random()*0.8,age:0,
      size:2+Math.random()*6,rot:Math.random()*6.28,vr:(Math.random()-0.5)*15,
      kind: Math.random()<0.5?'debris':'spark'}); }
  G.shake=Math.min(46,G.shake+16);
}

function resolveHit(en){
  en.alive=false;
  if(sameWord(en.word, neededWord())){
    explode(en.x,en.y,true); sndBoom();
    G.correct++;                                  // 🎯 정답 단어 명중 누적(허브 goal 컨벤션과 동일 단위)
    G.score += 100 + G.clears*10;
    pushProg(en.word,true);
    speak(en.word, 0.95, 1);
    wordPopAt(en.x,en.y, en.word);
    G.next++;
    banner('+'+(100+G.clears*10), '#a3e635');
    if(G.correct>=GOAL){ updateHUD(); return winGame(); }   // 목표 정답 수 달성 → 임무 완료
    if(G.next>=G.sent.w.length){ sentenceComplete(); }
    else renderSentence();
  } else {
    explode(en.x,en.y,false); sndBuzz();
    speak(en.word, 0.95, 1);                       // 쏴서 맞춘 비행기의 단어는 오답이어도 발음해 준다(듣고 학습)
    pushProg(en.word,false);
    G.time=Math.max(0,G.time-2.5);
    G.flash=0.25;
    banner('오답! -2.5s', '#ff6b6b');
  }
  updateHUD();
}
function sentenceComplete(){
  G.clears++;
  G.score += 300; G.time=Math.min(G.timeMax, G.time+5);   // 보너스 점수 + 시간
  banner('✦ 문장 완성! +300 ✦', '#ffd479');
  updateHUD();
  startSpeaking();   // 🎤 듣기 3번 → 따라 말하기 3번 연습(게임 일시정지). 끝나면 다음 문장
}
function winGame(){ if(!G||!G.running)return; G.running=false; G.speaking=false;
  try{ document.getElementById('speak').classList.add('hide'); }catch(_){}
  setTimeout(function(){ endGame(true); }, 900); }  // 마지막 폭발/발음만 재생 후 종료

/* ════════════════════════════════════════════════════════════
   말하기 연습 — 듣기 3번 → 따라 말하기 3번(음성인식) → 모두 성공 시 추가 포인트 / 실패 시 같은 문장 재도전
   ════════════════════════════════════════════════════════════ */
var SP=null, spState='';   // spState: 'listen' | 'speak' | 'result'
var spRate=diffRate();   // 말하기(발음) 속도 = 난이도에서 파생(연습 중 3버튼으로 미세조정 가능)
function spFull(){ return SP.sent.w.join(MODE==='zh'?'':' '); }
function spStopAudio(){ _spkSeq++; _ttsStop(); try{ speechSynthesis.cancel(); }catch(_){} }   // 진행 중 낭독 시퀀스 취소(서버 오디오 포함)
/* 🔉 읽어주기 속도 변경 — 듣기 중이면 새 속도로 다시 들려주고, 아니면 1회 미리듣기 */
function setSpRate(r){
  spRate=r; try{ localStorage.setItem('mangoi_langace_rate', String(r)); }catch(_){}
  var btns=document.querySelectorAll('#spSpeed .spSpd');
  for(var i=0;i<btns.length;i++){ btns[i].classList.toggle('on', parseFloat(btns[i].getAttribute('data-r'))===r); }
  if(!SP) return;
  if(spState==='listen'){ spListen(); }                                  // 듣기 단계: 새 속도로 3번 다시
  else if(spState==='speak'){ spStopAudio(); speak(spFull(), spRate, 1); } // 말하기 단계: 미리듣기 1회
}
function dotsHtml(n,cur){ var s=''; for(var i=0;i<n;i++){ s+='<div class="spDot'+(i===cur?' cur':'')+'">'+(i+1)+'</div>'; } return s; }
function spSetDot(i,ok){ var d=document.querySelectorAll('#spDots .spDot'); if(!d[i])return;
  d[i].classList.remove('cur'); d[i].classList.add(ok?'ok':'no'); d[i].textContent=ok?'✓':'✗';
  if(d[i+1]) d[i+1].classList.add('cur'); }
function spPhase(t){ document.getElementById('spPhase').textContent=t; }
function spHeard(html){ document.getElementById('spHeard').innerHTML=html||''; }

function startSpeaking(){
  SP={ sent:G.sent, done:0, ok:0 };
  G.speaking=true; bgmStop();
  document.getElementById('speak').classList.remove('hide');
  // 문장 표시(zh는 병음 함께)
  var host=document.getElementById('spSent'); host.innerHTML='';
  SP.sent.w.forEach(function(w,i){ var py=glossPy(w);
    host.insertAdjacentHTML('beforeend','<span>'+(i&&MODE!=='zh'?' ':'')+esc(w)+(py?'<span class="py"> '+py+'</span>':'')+'</span>'); });
  document.getElementById('spKo').textContent='🔊 '+SP.sent.ko;
  spListen();
}
function spListen(){
  spState='listen';
  document.getElementById('spMic').classList.add('hide');
  document.getElementById('spDots').innerHTML=dotsHtml(3,-1);
  spHeard(''); spPhase('🔊 잘 들어보세요 ('+spRate.toFixed(2)+'배속, 3번)');
  speakTimes(spFull(), spRate, 3, spBeginSpeak);
}
function spBeginSpeak(){
  spState='speak';
  SP.done=0; SP.ok=0;
  document.getElementById('spDots').innerHTML=dotsHtml(3,0);
  spPhase('🎤 따라 말해보세요! (1/3)');
  spHeard('아래 버튼을 <b>탭</b>하고 문장을 말하세요');
  var mic=document.getElementById('spMic'); mic.classList.remove('hide'); mic.textContent='🎤 탭해서 말하기'; mic.disabled=false;
}
function spDoRep(){
  var mic=document.getElementById('spMic'); mic.disabled=true; mic.textContent='🔴 녹음 중…'; mic.classList.add('recording');   // 녹음 중=빨강
  spHeard('말해보세요…');
  listenOnce(function(ok, said){
    mic.classList.remove('recording');    // 녹음 끝 → 빨강 해제
    var idx=SP.done; SP.done++; if(ok) SP.ok++;
    spSetDot(idx, ok);
    spHeard(said ? ('들린 말: <b>'+esc(said)+'</b> '+(ok?'✅':'❌')) : '❌ 잘 안 들렸어요');
    if(ok) sndPickup(); else sndBuzz();
    if(SP.done<3){
      spPhase('🎤 따라 말해보세요! ('+(SP.done+1)+'/3)');
      mic.disabled=false; mic.textContent='🎤 탭해서 말하기';
    } else { mic.classList.add('hide'); setTimeout(spResult, 1000); }
  });
}
function spResult(){
  spState='result';
  if(SP.ok>=3){
    G.score += 150; updateHUD();                       // ✅ 모두 성공 → 추가 포인트
    spPhase('🏆 완벽해요! 추가 +150');
    spHeard('세 번 모두 성공! 🎉');
    speak(spFull(), spRate, 1);
    setTimeout(spNext, 1700);
  } else {
    spPhase('💪 아쉬워요! 다시 해볼까요? ('+SP.ok+'/3)');   // ❌ 실패 → 같은 문장 재도전
    spHeard('같은 문장을 다시 들려줄게요…');
    setTimeout(spListen, 1800);
  }
}
function spNext(){ spStopAudio(); spState=''; document.getElementById('speak').classList.add('hide'); G.speaking=false;
  if(!muted) bgmStart(); loadSentence(); }
function spSkip(){ spStopAudio(); spState=''; document.getElementById('speak').classList.add('hide');
  G.speaking=false; if(!muted) bgmStart(); loadSentence(); }

/* TTS N회 반복 후 콜백(끝 이벤트 유실 대비 안전 타임아웃 · 시퀀스 토큰으로 재시작 시 옛 낭독 무효화) */
var _spkSeq=0;
function speakTimes(text, rate, times, cb){
  var seq=++_spkSeq;
  var called=false; function fin(){ if(called||seq!==_spkSeq)return; called=true; if(cb) cb(); }
  if(muted){ setTimeout(fin, 600); return; }
  _ttsStop(); try{ speechSynthesis.cancel(); }catch(_){}
  var est=Math.max(2600, text.length*150)*times;
  var safety=setTimeout(fin, est+4000);   // 서버 TTS 첫 생성(fetch) 여유 포함
  var n=0;
  function done(){ clearTimeout(safety); fin(); }
  // ★ 중국어 = 서버 오디오(/api/tts-free 구글 만다린) 우선 — 기기·앱 WebView 에 zh 음성 없어도 소리가 난다. 실패 시 기기 음성 폴백.
  if(MODE==='zh'){
    (function frep(){ if(seq!==_spkSeq)return; n++;
      _freeTts(text, rate,
        function(){ if(seq!==_spkSeq)return; if(n<times) setTimeout(frep,450); else done(); },
        function(){ if(seq!==_spkSeq)return; synthOnce(); });   // 서버 실패 → 남은 횟수 기기 음성
    })();
    return;
  }
  // ① 앱 네이티브 TTS — 종료 이벤트가 없어 예상 시간으로 반복·완료 판정(안전타임아웃 별도)
  if(window.AndroidTTS && window.AndroidTTS.isReady){
    var ready=false; try{ ready=window.AndroidTTS.isReady(); }catch(_){}
    if(ready){
      var per=Math.max(1800, text.length*(MODE==='zh'?260:110)*( (rate&&rate<1)?1.3:1 ));
      (function rep(){ if(seq!==_spkSeq)return; n++;
        try{ window.AndroidTTS.speak(text, LANGMETA[MODE].tts.slice(0,2), 1.0, rate||0.9); }catch(_){}
        if(n<times) setTimeout(rep, per+450); else setTimeout(done, per);
      })();
      return;
    }
  }
  function once(){ if(seq!==_spkSeq)return; n++;
    srvTts(text, rate,                                       // ③ en 은 서버 Aura-2 우선
      function(){ if(seq!==_spkSeq)return; if(n<times) setTimeout(once,450); else done(); },
      function(){ if(seq!==_spkSeq)return; synthOnce(); });   // 서버 실패 → 남은 횟수 기기 음성
  }
  function synthOnce(){ if(seq!==_spkSeq)return;
    var lang=LANGMETA[MODE].tts, v=pickVoice(lang);
    try{ var u=new SpeechSynthesisUtterance(text); u.lang=lang; u.rate=rate||0.9; if(v)u.voice=v;
      u.onend=u.onerror=function(){ if(seq!==_spkSeq)return; if(n<times){ n++; setTimeout(synthOnce,450); } else done(); };
      speechSynthesis.speak(u);
    }catch(_){ done(); }
  }
  once();
}
/* 음성인식 1회 — 미지원/오류는 통과(soft-lock 방지) */
function listenOnce(cb){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ cb(true,'(음성인식 미지원 · 통과)'); return; }
  var rec; try{ rec=new SR(); }catch(_){ cb(true,'(통과)'); return; }
  // 🎤 말 중간에 숨 쉬어도 안 끊기게: continuous=true + 침묵 감시. 정답이 들리면 즉시 통과,
  //    아니면 "말 끝나고 조용해질 때까지" 기다렸다가 마지막 인식으로 판정(8초 강제 종료 제거).
  rec.lang=(MODE==='zh'?'zh-CN':'en-US'); rec.interimResults=true; rec.maxAlternatives=3; rec.continuous=true;
  var done=false, best='', matched=false, _sil=null, _started=false, SILENCE_MS=2400;
  function finish(ok,txt){ if(done)return; done=true; if(_sil)clearTimeout(_sil); try{rec.stop();}catch(_){}; cb(ok,txt); }
  function arm(){ if(_sil)clearTimeout(_sil); _sil=setTimeout(function(){ try{rec.stop();}catch(_){} }, SILENCE_MS); }
  rec.onstart=function(){ _started=true; arm(); };
  rec.onresult=function(e){ if(done)return; _started=true; var target=spFull();
    for(var s=e.resultIndex;s<e.results.length;s++){ var alts=e.results[s];
      for(var i=0;i<alts.length;i++){ var tx=alts[i].transcript||''; if(tx)best=tx; if(matchSentence(tx,target)){ matched=true; best=tx; finish(true,best); return; } }
    }
    arm(); };                                    // 아직 정답 아님 → 계속 말할 시간 부여
  rec.onerror=function(){ if(_sil)clearTimeout(_sil); finish(matched, best); };
  rec.onend=function(){ if(_sil)clearTimeout(_sil); finish(matched, best); };
  /* 🎤 (2026-07-23) 안드로이드 크롬은 continuous 를 무시하고 첫 확정 결과 뒤 세션을 스스로 닫는다.
     그 종료를 "말을 마쳤다"로 보고 판정하면 조각으로 채점된다 → stop() 을 안 불렀으면 다시 듣는다. */
  try{ if(typeof MangoiSTT!=='undefined') MangoiSTT.harden(rec, { isDone: function(){ return done; }, onRestart: arm }); }catch(_h){}
  try{ rec.start(); }catch(_){ finish(false,''); return; }
  // ⏱ 무이벤트 워치독: 9초간 onstart/onresult가 전혀 없으면(마이크 권한 멈춤 등) 종료 — 말하는 중엔 절대 안 끊음
  setTimeout(function(){ if(!_started && !done) finish(matched, best); }, 9000);
}
/* 발화 vs 정답 문장 매칭(관대) — en=단어 65%↑, zh=글자 70%↑ */
function matchSentence(said, target){
  if(!said) return false;
  if(MODE==='zh'){
    var s=said.replace(/[\s，。,.!?！？、]/g,''), t=target.replace(/[\s，。,.!?！？、]/g,'');
    if(!t) return false; var hit=0; for(var i=0;i<t.length;i++){ if(s.indexOf(t.charAt(i))>=0) hit++; }
    return hit/t.length >= 0.7;
  }
  function norm(x){ return x.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(Boolean); }
  var sw=norm(said), tw=norm(target); if(!tw.length) return false;
  var setS={}; sw.forEach(function(w){ setS[w]=1; });
  var hit2=0; tw.forEach(function(w){ if(setS[w]) hit2++; });
  return hit2/tw.length >= 0.65;
}
function collectFuel(fu){ explode(fu.x,fu.y,false); sndPickup();
  G.time=Math.min(G.timeMax, G.time+8); G.score+=30;
  for(var i=0;i<8;i++){ var a=Math.random()*6.28; G.parts.push({x:fu.x,y:fu.y,vx:Math.cos(a)*90,vy:Math.sin(a)*90-40,
    life:0.5,age:0,size:3,rot:0,vr:5,kind:'spark',fuel:true}); }
  banner('⛽ +8s', '#7fd1ff'); updateHUD(); }

/* ════════════════════════════════════════════════════════════
   14. 렌더
   ════════════════════════════════════════════════════════════ */
function render(){
  ctx.save();
  if(G && G.shake>0){ var s=G.shake; ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); }
  // 배경(2회 타일 스크롤)
  if(bd){ var off = bdScroll; ctx.drawImage(bd,0,off-bdH); ctx.drawImage(bd,0,off); }
  else { ctx.fillStyle='#2b3d4f'; ctx.fillRect(0,0,W,H); }
  // 🌙 저녁: 달(고정) + 🌠 별똥별(애니메이션) — 배경 위, 게임요소 아래
  if(SKY==='evening'){ drawMoonAt(ctx, W*0.82, H*0.15, 30*(SCALE>1?1.5:1)); drawShooters(); }

  if(G){
    // 연료
    G.fuels.forEach(function(fu){ drawFuel(fu); });
    // 적기(라벨 포함) — 전 기체 A6M Zero 실사 스프라이트
    G.enemies.forEach(function(e){ drawZeroSprite(e); drawLabel(e); });
    // 적 탄
    G.ebul.forEach(function(eb){ drawEbul(eb); });
    // 플레이어 탄(위로 향하는 예광탄 — 밝은 하늘서도 보이게 어두운 외곽+노란 코어+흰 탄두)
    ctx.lineCap='round';
    G.pbul.forEach(function(pb){
      ctx.strokeStyle='rgba(70,35,0,.5)'; ctx.lineWidth=4.5; ctx.beginPath(); ctx.moveTo(pb.x,pb.y-12); ctx.lineTo(pb.x,pb.y+2); ctx.stroke();
      ctx.strokeStyle='#ffcf3c'; ctx.lineWidth=2.6; ctx.beginPath(); ctx.moveTo(pb.x,pb.y-12); ctx.lineTo(pb.x,pb.y+1); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(pb.x,pb.y-12,1.9,0,7); ctx.fill(); });
    // 플레이어
    drawPlayer();
    // 파티클
    G.parts.forEach(function(pt){ drawPart(pt); });
    // 🪂 조종사 낙하산 탈출(격추 연출)
    if(G.pilot) drawPilot(G.pilot);
    // 피격 플래시
    if(G.flash>0){ ctx.fillStyle='rgba(255,40,40,'+(G.flash*0.5)+')'; ctx.fillRect(0,0,W,H); }
  }
  ctx.restore();
  positionFireBtn();
}

/* 🔥 발사 버튼을 폭격기 기수(맨 앞)에 붙여 매 프레임 따라다니게 */
function positionFireBtn(){
  var fb=document.getElementById('fireBtn'); if(!fb)return;
  if(!G || !G.running || G.dead || G.speaking){ fb.classList.remove('on'); return; }
  fb.classList.add('on');
  var noseY = G.py - 38*SCALE;                        // 스프라이트 상단 = 기수
  var bw=fb.offsetWidth||52, bh=fb.offsetHeight||52;
  fb.style.left = Math.round(G.px - bw/2) + 'px';     // 기수 중앙
  fb.style.top  = Math.round(noseY - bh*0.5) + 'px';  // 기수 끝에 걸치게
}

function drawPlayer(){
  if(G.dead) return;                      // 격추됨 → 기체 사라지고 폭발만
  var blink = (G.invuln>0 && Math.floor(performance.now()/90)%2===0);
  ctx.save(); ctx.translate(G.px,G.py); ctx.scale(SCALE,SCALE);   // 🖥️ PC 2배 확대
  // 연한 그림자(방사형 — shadowBlur 대신 = 성능)
  var sh=ctx.createRadialGradient(6,26,4,6,26,46); sh.addColorStop(0,'rgba(0,0,0,.34)'); sh.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sh; ctx.beginPath(); ctx.ellipse(6,26,44,20,0,0,7); ctx.fill();
  if(!blink){
    if(B17.ready){ var sc=76/B17.h; var w=B17.w*sc, h=B17.h*sc; ctx.drawImage(B17.cnv,-w/2,-h/2,w,h); }
    else { drawB17fallback(); }
  }
  ctx.restore();
}
/* 🪂 조종사 낙하산 — 격추 후 천천히 하강하며 좌우로 흔들림. 실사 영상(크로마키) 우선, 실패 시 PNG */
/* 화면 밖으로 짤리지 않게 그리기 중심을 클램프(피사체가 화면 안에 통째로 보이도록) */
function clampPos(v, half, span){ var a=half+6, b=span-half-6; if(a>b) return span/2; return v<a?a:(v>b?b:v); }
/* 🪂 조종사 낙하산 = 전신 컷 이미지(몸통 전체 보장). 처음 조종석 크기→나오며 크게(가까이). 화면 밖 안짤리게 클램프
   + 😱 얼굴이 시간에 따라 점점 빨갛게(오프스크린 source-atop 으로 스프라이트 위에만 착색) */
var _pfx=null;
function pilotFxCanvas(w,h){ if(!_pfx)_pfx=document.createElement('canvas'); if(_pfx.width!==w)_pfx.width=w; if(_pfx.height!==h)_pfx.height=h; return _pfx; }
function drawPilot(p){
  if(!PILOT.ready) return;
  var sway=Math.sin(performance.now()/1000*2.2);             // ⏱️ 실시간 흔들림(속도↑) → 종료화면서도 계속 좌우로 움직임
  var grow = 0.16 + Math.min(1, p.t/2.5)*1.16;               // 조종석 크기(0.16) → 크게(1.32)
  var h=Math.min(150*SCALE*grow, H*0.86), pw=h*PILOT.w/PILOT.h;
  var dx=clampPos((p.baseX!=null?p.baseX:p.x)+sway*28*SCALE, pw*0.5, W), dy=clampPos(p.y, h*0.5, H);   // 좌우로 조금 왔다갔다
  // 오프스크린에 조종사 그린 뒤 얼굴만 빨갛게 착색
  var fw=Math.max(2,Math.ceil(pw)), fh=Math.max(2,Math.ceil(h));
  var fx=pilotFxCanvas(fw,fh), fc=fx.getContext('2d',{willReadFrequently:true});   // 매 프레임 getImageData → 읽기최적화 힌트(콘솔 경고 제거)
  fc.clearRect(0,0,fw,fh); fc.drawImage(PILOT.img, 0,0, fw, fh);
  var red=Math.min(0.85, p.t*0.34);                          // 시간↑ → 얼굴 점점 빨갛게
  if(red>0.02){
    // 얼굴 타원 영역 안의 '살색' 픽셀만 붉힘 → 헬멧·군복(국방색)은 그대로
    var cx=fw*0.524, cy=fh*0.565, rx=fw*0.14, ry=fh*0.075;   // PNG 얼굴 중심(297/567, 555/994)
    var x0=Math.max(0,Math.floor(cx-rx)), x1=Math.min(fw,Math.ceil(cx+rx));
    var y0=Math.max(0,Math.floor(cy-ry)), y1=Math.min(fh,Math.ceil(cy+ry));
    if(x1>x0 && y1>y0){
      var im=fc.getImageData(x0,y0,x1-x0,y1-y0), d=im.data, wseg=x1-x0;
      for(var yy=y0;yy<y1;yy++){ for(var xx=x0;xx<x1;xx++){
        var nx=(xx-cx)/rx, ny=(yy-cy)/ry, dd=nx*nx+ny*ny; if(dd>1) continue;
        var idx=((yy-y0)*wseg+(xx-x0))*4, r0=d[idx],g0=d[idx+1],b0=d[idx+2],a0=d[idx+3];
        if(a0<20) continue;
        if(!(r0>g0 && g0>=b0 && r0>90 && (r0-b0)>18)) continue;   // 살색만(국방색=g≈r 제외)
        var f=(1-dd)*red;
        d[idx]  = Math.min(255, r0 + (255-r0)*f*0.9);            // R↑
        d[idx+1]= g0*(1-f*0.7);                                  // G↓
        d[idx+2]= b0*(1-f*0.7);                                  // B↓
      }}
      fc.putImageData(im, x0,y0);
    }
  }
  ctx.save(); ctx.translate(dx,dy); ctx.rotate(sway*0.13);
  ctx.drawImage(fx, -pw/2, -h/2, pw, h);
  ctx.restore();
