<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📖 독해 탐정 — 중국어 문단 게임</title>
<!-- ════════════════════════════════════════════════════════════════════
  📖 독해 탐정 (중국어 문단 독해 게임) — 단어→문장→"문단" 학습의 3라운드 게임
   · 라운드1 🧩 문장 퍼즐: 흩어진 문장을 듣고 원래 순서로 복원(타이머·콤보)
   · 라운드2 🕵️ 이해 퀴즈: 문단을 읽고 3지선다(문항 타이머·근거 문장 하이라이트)
   · 라운드3 🎤 요약 말하기: 핵심 단어를 넣어 중국어로 요약(음성인식 zh-CN)
  데이터: GET /api/games/zh-passage (D1 zh_passage — 교재 "주제" 기반 자체 제작 문단.
          ⚠️ 출판 교재 원문을 그대로 넣지 말 것: 저작권. 주제·어휘 수준만 맞춘 오리지널만.)
  공용: /js/game-tts.js(MangoiTTS zh), /api/games/progress 학습기록, ?uid=&speed= (허브 전달)
  ════════════════════════════════════════════════════════════════════ -->
<style>
:root{
  --bg1:#0b1026; --bg2:#151b3d; --card:#1c2450; --card2:#232c63;
  --ink:#eef1ff; --sub:#9aa7e0; --line:#3a4590;
  --acc:#ffb703; --acc2:#8ecae6; --good:#4ade80; --bad:#f87171; --pop:#c084fc;
}
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{
  font-family:'Segoe UI','Malgun Gothic','Microsoft YaHei',sans-serif;
  background:radial-gradient(1200px 600px at 20% -10%, #24306e 0%, var(--bg1) 55%) fixed, var(--bg1);
  color:var(--ink); overflow-x:hidden; min-height:100dvh;
}
/* 은은한 별 배경(도파민용 반짝임) */
.stars{ position:fixed; inset:0; pointer-events:none; z-index:0; }
.stars i{ position:absolute; width:3px; height:3px; border-radius:50%; background:#fff; opacity:.25; animation:tw 3s infinite; }
@keyframes tw{ 50%{ opacity:.8; transform:scale(1.6);} }

.wrap{ position:relative; z-index:1; max-width:760px; margin:0 auto; padding:10px 12px 90px; }

/* ── 상단 HUD ── */
.hud{ display:flex; align-items:center; gap:8px; padding:8px 10px; background:rgba(15,20,50,.85);
  border:1px solid var(--line); border-radius:14px; position:sticky; top:8px; z-index:50; backdrop-filter:blur(6px); }
.hud .ttl{ font-weight:800; font-size:15px; white-space:nowrap; }
.hud .sp{ flex:1; }
.hud .stat{ font-weight:800; font-size:14px; background:#101636; border:1px solid var(--line); border-radius:10px; padding:4px 9px; white-space:nowrap; }
.hud .stat b{ color:var(--acc); }
#hud-hearts{ letter-spacing:1px; }
#hud-combo{ display:none; color:var(--pop); }
.pybtn{ cursor:pointer; user-select:none; font-weight:900; }
.pybtn.on{ color:var(--acc); border-color:var(--acc); }
body.low-hp .hud{ animation:hpPulse 1s infinite; }
@keyframes hpPulse{ 50%{ box-shadow:0 0 0 3px rgba(248,113,113,.45);} }

/* ── 화면 공통 ── */
.scr{ display:none; }
.scr.active{ display:block; animation:fadeUp .35s ease; }
@keyframes fadeUp{ from{ opacity:0; transform:translateY(14px);} }
h1.big{ text-align:center; font-size:26px; margin:18px 0 4px; text-shadow:0 3px 14px rgba(142,202,230,.35); }
p.sub{ text-align:center; color:var(--sub); font-size:13px; margin-bottom:14px; }

/* ── 시작: 미션(과) 카드 ── */
.missions{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-top:12px; }
.mcard{ background:linear-gradient(160deg,var(--card),var(--card2)); border:1px solid var(--line); border-radius:14px;
  padding:12px; cursor:pointer; transition:transform .15s, box-shadow .15s; position:relative; overflow:hidden; }
.mcard:active{ transform:scale(.96); }
.mcard:hover{ transform:translateY(-3px); box-shadow:0 8px 22px rgba(0,0,0,.4); }
.mcard .no{ font-size:11px; color:var(--acc2); font-weight:800; }
.mcard .tt{ font-size:15px; font-weight:800; margin:3px 0 2px; }
.mcard .tz{ font-size:12px; color:var(--sub); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mcard .st{ margin-top:6px; font-size:13px; letter-spacing:1px; }
.mcard.locked{ opacity:.45; filter:grayscale(.6); }
.mcard .lock{ position:absolute; right:10px; top:10px; font-size:15px; }
.datasrc{ text-align:center; margin-top:12px; font-size:11px; color:var(--sub); }

/* ── 라운드 배너(긴장감 연출) ── */
#round-banner{ position:fixed; inset:0; display:none; z-index:200; background:rgba(5,8,25,.86);
  align-items:center; justify-content:center; flex-direction:column; gap:8px; }
#round-banner.show{ display:flex; animation:fadeUp .25s; }
#round-banner .rb1{ font-size:15px; color:var(--acc2); font-weight:800; letter-spacing:4px; }
#round-banner .rb2{ font-size:34px; font-weight:900; color:var(--acc); text-shadow:0 0 24px rgba(255,183,3,.6); animation:bump .5s; }
#round-banner .rb3{ font-size:14px; color:var(--sub); }
@keyframes bump{ 0%{ transform:scale(.4);} 60%{ transform:scale(1.15);} 100%{ transform:scale(1);} }

/* ── 타이머 바 ── */
.tbar{ height:12px; background:#0e1434; border:1px solid var(--line); border-radius:8px; overflow:hidden; margin:10px 0; }
.tbar i{ display:block; height:100%; width:100%; border-radius:8px;
  background:linear-gradient(90deg,#4ade80,#facc15,#f87171); transition:width .3s linear; }
.tbar.danger i{ animation:tflash .4s infinite; }
@keyframes tflash{ 50%{ filter:brightness(1.8);} }

/* ── 라운드1: 문장 퍼즐 ── */
.slotline{ display:flex; gap:6px; margin:8px 0; flex-wrap:wrap; }
.slot{ flex:1; min-width:34px; height:10px; border-radius:6px; background:#0e1434; border:1px dashed var(--line); }
.slot.done{ background:linear-gradient(90deg,var(--good),#22c55e); border-style:solid; box-shadow:0 0 10px rgba(74,222,128,.5); }
.pz-cards{ display:flex; flex-direction:column; gap:9px; margin-top:10px; }
.pz{ background:linear-gradient(160deg,var(--card),var(--card2)); border:1.5px solid var(--line); border-radius:13px;
  padding:11px 13px; cursor:pointer; font-size:17px; line-height:1.55; transition:transform .12s, border-color .12s; position:relative; }
.pz:active{ transform:scale(.97); }
.pz .py{ display:none; font-size:12px; color:var(--acc2); margin-top:2px; line-height:1.3; }
body.show-py .pz .py{ display:block; }
.pz .kohint{ display:none; font-size:12px; color:var(--acc); margin-top:3px; }
.pz.hinted{ border-color:var(--acc); box-shadow:0 0 14px rgba(255,183,3,.35); }
.pz.hinted .kohint{ display:block; }
.pz.placed{ opacity:0; transform:translateY(-14px) scale(.9); pointer-events:none; transition:all .3s; }
.pz.wrongflash{ animation:wrongsh .4s; border-color:var(--bad); }
@keyframes wrongsh{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
.pz-done{ display:flex; flex-direction:column; gap:6px; margin-top:8px; }
.pz-done .ds{ background:rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.4); border-radius:10px;
  padding:7px 11px; font-size:15px; animation:fadeUp .3s; }
.toolrow{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
.tbtn{ background:#101636; color:var(--ink); border:1px solid var(--line); border-radius:11px; padding:9px 13px;
  font-size:13px; font-weight:700; cursor:pointer; }
.tbtn:active{ transform:scale(.95); }
.tbtn.acc{ background:linear-gradient(135deg,#f59e0b,#f97316); border:none; color:#1a1206; }

/* ── 라운드2: 퀴즈 ── */
.passage{ background:rgba(16,22,54,.9); border:1px solid var(--line); border-radius:14px; padding:13px 14px;
  font-size:17px; line-height:1.9; margin-top:10px; }
.passage .sen{ cursor:pointer; border-radius:6px; padding:1px 2px; transition:background .2s; }
.passage .sen:active{ background:rgba(142,202,230,.2); }
.passage .sen.evi{ background:linear-gradient(90deg,rgba(74,222,128,.35),rgba(74,222,128,.15)); box-shadow:0 0 12px rgba(74,222,128,.35); }
.sen-tip{ display:none; background:#0d1330; border:1px solid var(--acc2); border-radius:10px; padding:8px 11px;
  font-size:13px; color:var(--acc2); margin:6px 0; line-height:1.5; }
.sen-tip .ko{ color:var(--ink); }
.qbox{ margin-top:12px; background:linear-gradient(160deg,var(--card),var(--card2)); border:1px solid var(--line);
  border-radius:14px; padding:13px; }
.qbox .qno{ font-size:12px; color:var(--acc2); font-weight:800; }
.qbox .qq{ font-size:18px; font-weight:800; margin:5px 0 2px; line-height:1.5; }
.qbox .qko{ font-size:13px; color:var(--sub); margin-bottom:9px; }
.choices{ display:flex; flex-direction:column; gap:8px; }
.ch{ background:#101636; border:1.5px solid var(--line); border-radius:12px; padding:11px 13px; cursor:pointer;
  font-size:16px; transition:transform .12s; }
.ch:active{ transform:scale(.97); }
.ch .cko{ font-size:12px; color:var(--sub); display:block; margin-top:1px; }
.ch.ok{ border-color:var(--good); background:rgba(74,222,128,.15); animation:bump .4s; }
.ch.no{ border-color:var(--bad); background:rgba(248,113,113,.14); animation:wrongsh .4s; }
.qtimer{ float:right; font-weight:900; color:var(--acc2); }
.qtimer.danger{ color:var(--bad); animation:tflash .4s infinite; }

/* ── 라운드3: 말하기 ── */
.kwrow{ display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; justify-content:center; }
.kw{ background:#101636; border:1.5px solid var(--line); border-radius:20px; padding:8px 14px; font-size:16px; font-weight:700; }
.kw .kpy{ font-size:11px; color:var(--acc2); display:block; text-align:center; }
.kw.hit{ border-color:var(--good); background:rgba(74,222,128,.18); box-shadow:0 0 12px rgba(74,222,128,.5); animation:bump .4s; }
.micwrap{ text-align:center; margin:16px 0; }
#mic-btn{ width:92px; height:92px; border-radius:50%; border:none; font-size:38px; cursor:pointer;
  background:linear-gradient(160deg,#ef4444,#b91c1c); color:#fff; box-shadow:0 6px 24px rgba(239,68,68,.45); transition:transform .15s; }
#mic-btn:active{ transform:scale(.92); }
#mic-btn.listening{ animation:micPulse 1s infinite; }
@keyframes micPulse{ 50%{ box-shadow:0 0 0 18px rgba(239,68,68,0);} }
#heard{ min-height:44px; background:rgba(16,22,54,.9); border:1px dashed var(--line); border-radius:12px;
  padding:10px 12px; font-size:16px; color:var(--acc2); margin-top:10px; text-align:center; }

/* ── 결과 ── */
.grade{ text-align:center; font-size:76px; font-weight:900; margin:6px 0;
  background:linear-gradient(180deg,#ffe08a,#ff9f1c); -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 6px 30px rgba(255,159,28,.35); animation:bump .6s; }
.rrow{ display:flex; justify-content:space-between; background:rgba(16,22,54,.9); border:1px solid var(--line);
  border-radius:11px; padding:10px 13px; margin-top:8px; font-size:14px; }
.rrow b{ color:var(--acc); }
.bigbtns{ display:flex; gap:10px; margin-top:16px; }
.bb{ flex:1; padding:14px; border:none; border-radius:14px; font-size:16px; font-weight:800; cursor:pointer; }
.bb.p{ background:linear-gradient(135deg,#f59e0b,#f97316); color:#1a1206; }
.bb.s{ background:#101636; color:var(--ink); border:1px solid var(--line); }

/* ── 이펙트: 콤보팝·파티클·셰이크 ── */
#fx-layer{ position:fixed; inset:0; pointer-events:none; z-index:300; overflow:hidden; }
.combo-pop{ position:fixed; left:50%; top:34%; transform:translate(-50%,-50%); font-size:34px; font-weight:900;
  color:var(--pop); text-shadow:0 0 18px rgba(192,132,252,.8); animation:cpop .8s forwards; pointer-events:none; }
@keyframes cpop{ 0%{ transform:translate(-50%,-50%) scale(.3); opacity:0;} 30%{ transform:translate(-50%,-50%) scale(1.25); opacity:1;}
  100%{ transform:translate(-50%,-90%) scale(1); opacity:0;} }
.ptc{ position:fixed; width:9px; height:9px; border-radius:2px; pointer-events:none; animation:pfall 1s forwards; }
@keyframes pfall{ to{ transform:translateY(130px) rotate(340deg); opacity:0; } }
body.shake{ animation:bshake .35s; }
@keyframes bshake{ 0%,100%{transform:translateX(0);} 20%{transform:translateX(-9px);} 60%{transform:translateX(7px);} }
.scorefly{ position:fixed; font-weight:900; font-size:19px; color:var(--good); pointer-events:none; animation:sfly .9s forwards; z-index:301; }
@keyframes sfly{ to{ transform:translateY(-70px); opacity:0; } }

@media (max-width:480px){
  .pz{ font-size:15.5px; } .passage{ font-size:15.5px; } .qbox .qq{ font-size:16px; }
  h1.big{ font-size:22px; } .missions{ grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="fx-layer"></div>

<div class="wrap">
  <!-- HUD -->
  <div class="hud">
    <span class="ttl">📖 독해 탐정</span>
    <span class="sp"></span>
    <span class="stat" id="hud-combo">🔥x<b id="combo-n">1</b></span>
    <span class="stat">⭐<b id="hud-score">0</b></span>
    <span class="stat" id="hud-hearts">❤️❤️❤️</span>
    <span class="stat pybtn" id="py-toggle" title="병음 표시">拼</span>
  </div>

  <!-- 시작: 미션 선택 -->
  <div class="scr active" id="scr-start">
    <h1 class="big">📖 독해 탐정</h1>
    <p class="sub">문단을 <b>듣고 · 맞추고 · 말하는</b> 3라운드! 사건(문단)을 해결하고 별을 모아요 🕵️</p>
    <div class="missions" id="missions"></div>
    <div class="datasrc" id="datasrc">문단 불러오는 중…</div>
  </div>

  <!-- 플레이 -->
  <div class="scr" id="scr-play">
    <div id="round-head" style="margin-top:10px; font-weight:800; font-size:15px;"></div>
    <div class="tbar" id="tbar" style="display:none;"><i id="tbar-i"></i></div>
    <div id="play-area"></div>
  </div>

  <!-- 결과 -->
  <div class="scr" id="scr-result">
    <h1 class="big" id="res-title">사건 해결!</h1>
    <div class="grade" id="res-grade">S</div>
    <p class="sub" id="res-stars">⭐⭐⭐</p>
    <div id="res-rows"></div>
    <div class="bigbtns">
      <button class="bb s" onclick="goStart()">📚 다른 문단</button>
      <button class="bb p" onclick="retryLesson()">🔄 다시 도전</button>
    </div>
  </div>
</div>

<!-- 라운드 배너 -->
<div id="round-banner">
  <div class="rb1" id="rb1">ROUND 1</div>
  <div class="rb2" id="rb2">🧩 문장 퍼즐</div>
  <div class="rb3" id="rb3">문단을 듣고 순서대로 복원하세요!</div>
</div>

<script src="/js/game-tts.js"></script>
<script>
'use strict';
/* ═══════════ 공통 상태 ═══════════ */
var QS = new URLSearchParams(location.search);
var UID = QS.get('uid') || (function(){ try{ var k='mangoi_guest_uid', v=localStorage.getItem(k);
  if(!v){ v='guest-'+Math.random().toString(36).slice(2,9); localStorage.setItem(k,v); } return v; }catch(_){ return 'guest'; } })();
var SPEED = Math.max(1, Math.min(7, parseInt(QS.get('speed')||'3',10)||3));       // 허브 속도 1~7 → 타이머 가감
var TIME_MULT = [0,1.6,1.3,1.0,0.85,0.7,0.6,0.5][SPEED];                          // 높을수록 짧은 제한시간(아드레날린)
try{ MangoiTTS.setLang('zh'); }catch(_){}

var PASSAGES = [];            // 서버 로드 문단들
var CUR = null;               // 현재 문단
var CUR_IDX = 0;
var score = 0, combo = 1, hearts = 3, roundScore = [0,0,0], usedHint = 0;
var timerIv = null, timeLeft = 0, timeMax = 0, qTimerIv = null;
var progressQueue = [];       // /api/games/progress 이벤트 모음

/* ═══════════ 내장 폴백 문단(자체 제작 오리지널 — 서버 실패 시) ═══════════ */
var FALLBACK = [
 { lesson:0, title_zh:'去动物园', title_ko:'교통수단 고르기', hz:'', ko:'',
   sentences:[
    {hz:'今天天气很好，小明想去动物园玩儿。', py:'Jīntiān tiānqì hěn hǎo, Xiǎomíng xiǎng qù dòngwùyuán wánr.', ko:'오늘 날씨가 좋아서 샤오밍은 동물원에 놀러 가고 싶어요.'},
    {hz:'动物园离他家有点儿远。', py:'Dòngwùyuán lí tā jiā yǒudiǎnr yuǎn.', ko:'동물원은 집에서 조금 멀어요.'},
    {hz:'骑自行车去太累了。', py:'Qí zìxíngchē qù tài lèi le.', ko:'자전거를 타고 가면 너무 피곤해요.'},
    {hz:'坐出租车去太贵了。', py:'Zuò chūzūchē qù tài guì le.', ko:'택시를 타고 가면 너무 비싸요.'},
    {hz:'地铁又快又便宜，还不堵车。', py:'Dìtiě yòu kuài yòu piányi, hái bù dǔchē.', ko:'지하철은 빠르고 싸고 차도 안 막혀요.'},
    {hz:'所以小明决定坐地铁去。', py:'Suǒyǐ Xiǎomíng juédìng zuò dìtiě qù.', ko:'그래서 샤오밍은 지하철을 타기로 했어요.'}],
   questions:[
    {q:'小明想去哪儿？', q_ko:'샤오밍은 어디에 가고 싶어 하나요?', choices:[{hz:'游乐园',ko:'놀이공원'},{hz:'动物园',ko:'동물원'},{hz:'公园',ko:'공원'}], answer:1, evidence:0},
    {q:'他为什么不坐出租车？', q_ko:'왜 택시를 타지 않나요?', choices:[{hz:'太贵了',ko:'너무 비싸서'},{hz:'太累了',ko:'너무 피곤해서'},{hz:'人太多',ko:'사람이 너무 많아서'}], answer:0, evidence:3},
    {q:'小明决定怎么去？', q_ko:'샤오밍은 어떻게 가기로 했나요?', choices:[{hz:'骑自行车',ko:'자전거를 타고'},{hz:'坐公共汽车',ko:'버스를 타고'},{hz:'坐地铁',ko:'지하철을 타고'}], answer:2, evidence:5}],
   keywords:[{hz:'动物园',py:'dòngwùyuán',ko:'동물원'},{hz:'地铁',py:'dìtiě',ko:'지하철'},{hz:'出租车',py:'chūzūchē',ko:'택시'},{hz:'决定',py:'juédìng',ko:'결정하다'}] },
 { lesson:0, title_zh:'吃什么好呢', title_ko:'뭘 먹을까?', hz:'', ko:'',
   sentences:[
    {hz:'周末我和朋友一起去饭馆吃饭。', py:'Zhōumò wǒ hé péngyou yìqǐ qù fànguǎn chīfàn.', ko:'주말에 나는 친구와 식당에 밥 먹으러 가요.'},

/* ═══════════ 효과음(WebAudio 합성 — 파일 없이) ═══════════ */
var AC = null;
function ac(){ try{ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }catch(_){ return null; } }
function tone(freq, dur, type, vol, when){
  var c=ac(); if(!c) return; var o=c.createOscillator(), g=c.createGain();
  o.type=type||'sine'; o.frequency.value=freq; g.gain.value=vol||0.12;
  o.connect(g); g.connect(c.destination);
  var t=c.currentTime+(when||0); o.start(t); g.gain.setValueAtTime(vol||0.12,t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur); o.stop(t+dur+0.02);
}
function sndOk(){ tone(660,.12,'triangle',.14); tone(880,.16,'triangle',.12,.08); }
function sndCombo(n){ [523,659,784,1047].slice(0,Math.min(4,n)).forEach(function(f,i){ tone(f,.12,'triangle',.13,i*0.07); }); }
function sndNo(){ tone(196,.25,'sawtooth',.1); tone(147,.3,'sawtooth',.08,.1); }
function sndTick(){ tone(1200,.05,'square',.05); }
function sndFanfare(){ [523,659,784,1047,1319].forEach(function(f,i){ tone(f,.22,'triangle',.14,i*0.12); }); }
function sndHeart(){ tone(392,.15,'sine',.12); tone(311,.3,'sine',.12,.12); }

}
function burst(x,y,n){
  var lay=document.getElementById('fx-layer'), cols=['#ffb703','#8ecae6','#c084fc','#4ade80','#f87171'];
  for(var i=0;i<(n||14);i++){
    var p=document.createElement('i'); p.className='ptc';
    p.style.left=(x+(Math.random()*70-35))+'px'; p.style.top=(y+(Math.random()*24-12))+'px';
    p.style.background=cols[i%cols.length]; p.style.animationDelay=(Math.random()*0.15)+'s';
    lay.appendChild(p); (function(q){ setTimeout(function(){ q.remove(); },1300); })(p);
  }
}

function loadPassages(){
  var CK='mangoi_zhpassage_v1';
  try{ var c=sessionStorage.getItem(CK);
    if(c){ var o=JSON.parse(c); if(o && o.t && (Date.now()-o.t)<600000 && o.d && o.d.length){ PASSAGES=o.d; renderMissions('교재 주제 맞춤 문단'); return; } } }catch(_){}
  fetch('/api/games/zh-passage?textbook='+encodeURIComponent('다락원')+'&level='+encodeURIComponent('Lv 3'))
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(j && j.ok && j.passages && j.passages.length){
        PASSAGES = j.passages;
        try{ sessionStorage.setItem(CK, JSON.stringify({t:Date.now(), d:PASSAGES})); }catch(_){}
        renderMissions('📚 다락원 중국어 마스터 3 · 과별 주제 문단');

}
function getStars(){ try{ return JSON.parse(localStorage.getItem('mangoi_reading_stars')||'{}'); }catch(_){ return {}; } }
function setStars(key, n){ try{ var s=getStars(); if((s[key]|0) < n){ s[key]=n; localStorage.setItem('mangoi_reading_stars', JSON.stringify(s)); } }catch(_){}}

function renderMissions(srcLabel){
  var st = getStars();
  document.getElementById('missions').innerHTML = PASSAGES.map(function(p,i){
    var key = p.lesson || ('f'+i);

    return '<div class="mcard" onclick="startLesson('+i+')">'
      + '<span class="no">'+(p.lesson?('제'+p.lesson+'과'):'보너스')+'</span>'

function stopAllTimers(){ if(timerIv){ clearInterval(timerIv); timerIv=null; } if(qTimerIv){ clearInterval(qTimerIv); qTimerIv=null; } }
function startBar(seconds, onEnd){
  stopAllTimers();
  timeMax = seconds; timeLeft = seconds;
  var bar=document.getElementById('tbar'), fill=document.getElementById('tbar-i');
  bar.style.display='block'; bar.classList.remove('danger'); fill.style.width='100%';
  timerIv = setInterval(function(){
    timeLeft -= 0.25;
    fill.style.width = Math.max(0,(timeLeft/timeMax)*100)+'%';
    if(timeLeft<=8 && !bar.classList.contains('danger')){ bar.classList.add('danger'); }
    if(timeLeft<=5 && Math.abs(timeLeft-Math.round(timeLeft))<0.13) sndTick();
    if(timeLeft<=0){ stopAllTimers(); bar.style.display='none'; onEnd(); }
  }, 250);
}
function hideBar(){ document.getElementById('tbar').style.display='none'; }

/* ═══════════ 라운드1: 문장 퍼즐 ═══════════ */
var r1 = {};
function round1Init(){
  var sents = CUR.sentences;
  r1 = { next:0, order:[], listened:false };
  // 섞기(원순서와 같으면 재섞기)
  var idx = sents.map(function(_,i){ return i; });
  do{ idx.sort(function(){ return Math.random()-0.5; }); }while(sents.length>2 && idx.every(function(v,i){ return v===i; }));
  r1.order = idx;

  document.getElementById('round-head').innerHTML = '🧩 ROUND 1 — 문장을 <b style="color:var(--acc)">원래 순서대로</b> 탭하세요';
  var html = '<div class="slotline">' + sents.map(function(){ return '<span class="slot"></span>'; }).join('') + '</div>'
    + '<div class="toolrow">'
    + '<button class="tbtn acc" id="r1-listen" onclick="r1Listen()">👂 문단 듣기</button>'
    + '<button class="tbtn" onclick="r1Hint(this)">💡 힌트 (-20점)</button>'
    + '</div>'
    + '<div class="pz-done" id="pz-done"></div>'
    + '<div class="pz-cards" id="pz-cards">'
    + r1.order.map(function(si){
        var s=sents[si];
        return '<div class="pz" data-si="'+si+'" onclick="r1Pick(this)">'+s.hz
          + '<div class="py">'+(s.py||'')+'</div>'
          + '<div class="kohint">💡 '+(s.ko||'')+'</div></div>';
      }).join('')
    + '</div>';
  document.getElementById('play-area').innerHTML = html;
  var t = Math.round((30 + CUR.sentences.length*14) * TIME_MULT);
  startBar(t, r1TimeUp);
}
function r1Listen(){
  // 전체 문단을 순서대로 낭독(듣기 힌트 — 첫 1회 무료, 이후 -15점)
  if(r1.listened){ addScore(-15); } r1.listened = true;
  var b=document.getElementById('r1-listen'); if(b) b.textContent='👂 다시 듣기 (-15점)';
  var sents = CUR.sentences, k=0;
  (function next(){ if(k>=sents.length) return; MangoiTTS.speak(sents[k].hz, 1, function(){ k++; next(); }); })();
}
function r1Hint(btn){
  addScore(-20);
  var cards = document.querySelectorAll('#pz-cards .pz:not(.placed)');
  for(var i=0;i<cards.length;i++){
    if(parseInt(cards[i].getAttribute('data-si'),10) === r1.next){ cards[i].classList.add('hinted'); break; }
  }
}
function r1Pick(el){
  var si = parseInt(el.getAttribute('data-si'),10);
  var s = CUR.sentences[si];
  if(si === r1.next){
    el.classList.add('placed');
    var pts = 50 + (combo-1)*10;
    addScore(pts, el); setCombo(combo+1); sndOk();
    var r=el.getBoundingClientRect(); burst(r.left+r.width/2, r.top+10, 12);
    MangoiTTS.speak(s.hz, 1);
    progressQueue.push({ item:s.hz, ko:s.ko||'', correct:true });
    // 완성 줄에 추가 + 슬롯 채움
    var d=document.createElement('div'); d.className='ds'; d.textContent=(r1.next+1)+'. '+s.hz;
    document.getElementById('pz-done').appendChild(d);
    document.querySelectorAll('.slot')[r1.next].classList.add('done');
    r1.next++;
    if(r1.next >= CUR.sentences.length){
      stopAllTimers(); hideBar();
      var bonus = Math.round(Math.max(0,timeLeft)*5);
      addScore(bonus); roundScore[0] = score;
      comboPop('🧩 퍼즐 완성! +'+bonus);
      sndFanfare();
      setTimeout(function(){ banner('ROUND 2','🕵️ 이해 퀴즈','문단을 읽고 질문에 답하세요! 근거를 찾아라!', round2Init); },1200);
    }
  } else {
    el.classList.add('wrongflash'); setTimeout(function(){ el.classList.remove('wrongflash'); },450);
    setCombo(1); sndNo();
    progressQueue.push({ item:s.hz, ko:s.ko||'', correct:false });
    loseHeart();
  }
}
function r1TimeUp(){
  sndNo(); comboPop('⏰ 시간 초과!');
  if(!loseHeart()){
    // 남은 문장 자동 배치 없이 시간 리필로 재도전(긴장 유지)
    startBar(Math.round(25*TIME_MULT), r1TimeUp);
  }
}

function round2Init(){

function senTip(el){

function r2Read(){
  var sents = CUR.sentences, spans = document.querySelectorAll('#passage .sen'), k=0;

    spans.forEach(function(sp){ sp.style.background=''; });
    if(k>=sents.length) return;

function r2Show(){
  var q = CUR.questions[r2.qi];
  var qhtml = '<div class="qbox" id="qbox">'
    + '<span class="qtimer" id="qtimer">20</span>'
    + '<div class="qno">사건 질문 '+(r2.qi+1)+' / '+CUR.questions.length+'</div>'
    + '<div class="qq">'+q.q+'</div>'
    + '<div class="qko">'+(q.q_ko||'')+'</div>'
    + '<div class="choices">'

        +(c.ko?('<span class="cko">'+c.ko+'</span>'):'')+'</div>'; }).join('')
    + '</div></div>';
  document.getElementById('qwrap').innerHTML = qhtml;
  MangoiTTS.speak(q.q, 1);
  // 문항 타이머 20초(속도 반영)
  var sec = Math.max(8, Math.round(20*TIME_MULT));
  r2.qsec = sec;
  var tEl = document.getElementById('qtimer');
  tEl.textContent = sec; tEl.classList.remove('danger');
  if(qTimerIv) clearInterval(qTimerIv);
  qTimerIv = setInterval(function(){
    r2.qsec--; tEl.textContent = Math.max(0, r2.qsec);
    if(r2.qsec<=5){ tEl.classList.add('danger'); sndTick(); }
    if(r2.qsec<=0){ clearInterval(qTimerIv); qTimerIv=null; r2Answer(null); }
  }, 1000);
}
function r2Answer(el){
  if(qTimerIv){ clearInterval(qTimerIv); qTimerIv=null; }
  var q = CUR.questions[r2.qi];
  var ci = el ? parseInt(el.getAttribute('data-ci'),10) : -1;
  var chs = document.querySelectorAll('#qbox .ch');
  chs.forEach(function(c){ c.onclick=null; });
  var ok = (ci === q.answer);
  progressQueue.push({ item:q.q, ko:q.q_ko||'', correct:ok });
  // 근거 문장 하이라이트 + 스크롤
  var evi = document.querySelector('#passage .sen[data-i="'+q.evidence+'"]');
  if(evi){ evi.classList.add('evi'); evi.scrollIntoView({behavior:'smooth', block:'center'}); }
  if(ok){
    el.classList.add('ok'); sndOk();
    var pts = 100 + (combo-1)*20 + r2.qsec*5;
    addScore(pts, el); setCombo(combo+1);
    var r=el.getBoundingClientRect(); burst(r.left+r.width/2, r.top+8, 16);
  } else {
    if(el) el.classList.add('no');
    chs[q.answer] && chs[q.answer].classList.add('ok');
    setCombo(1); sndNo();
    if(loseHeart()) return;
    comboPop(el ? '❌ 아쉬워요!' : '⏰ 시간 초과!');
  }
  setTimeout(function(){
    if(evi) evi.classList.remove('evi');
    r2.qi++;
    if(r2.qi < CUR.questions.length){ r2Show(); }
    else {
      roundScore[1] = score - roundScore[0];
      banner('ROUND 3','🎤 요약 말하기','핵심 단어를 넣어 중국어로 요약해 보세요!', round3Init);
    }
  }, ok ? 1300 : 2100);
}

}
function r2ReadFromR3(){
  var sents=CUR.sentences, k=0;
  (function next(){ if(k>=sents.length) return; MangoiTTS.speak(sents[k].hz, 1, function(){ k++; next(); }); })();
}
function r3Mic(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition; if(!SR) return;
  var btn = document.getElementById('mic-btn'), heard = document.getElementById('heard');
  var rec = new SR();
  rec.lang='zh-CN'; rec.interimResults=false; rec.maxAlternatives=3; rec.continuous=false;
  btn.classList.add('listening'); heard.textContent='👂 듣고 있어요… 또박또박 말해 보세요!';
  rec.onresult = function(ev){
    var texts=[]; for(var i=0;i<ev.results.length;i++){ for(var j=0;j<ev.results[i].length;j++){ texts.push(ev.results[i][j].transcript||''); } }
    var all = texts.join(' ');
    heard.textContent = '🗣️ "'+(texts[0]||'')+'"';
    var newHit = 0;
    r3.kws.forEach(function(k,i){
      if(r3.hits[i]) return;
      if(all.indexOf(k.hz)>=0){ r3.hits[i]=true; newHit++;
        var el=document.getElementById('kw-'+i); if(el){ el.classList.add('hit'); var r=el.getBoundingClientRect(); burst(r.left+r.width/2, r.top, 10); } }
    });
    if(newHit>0){ sndOk(); addScore(newHit*80); comboPop('🎯 단어 적중 +'+(newHit*80)); }
    var hitN = Object.keys(r3.hits).length;
    progressQueue.push({ item:'说:'+(CUR.title_zh||CUR_IDX), ko:'요약 말하기 '+hitN+'단어', correct: hitN>=2 });
    if(hitN>=2){ addScore(200); sndFanfare(); comboPop('🏆 요약 성공! +200'); setTimeout(finishGame, 1300); return; }
    r3.tries++;
    if(r3.tries>=3){ heard.textContent += ' — 도전 끝! 그래도 멋졌어요 👏'; setTimeout(finishGame, 1300); }
    else { heard.textContent += ' — 좋아요! 핵심 단어를 '+(2-hitN)+'개 더 넣어 다시!'; }
  };
  rec.onerror = function(){ heard.textContent='😅 잘 안 들렸어요. 다시 눌러서 도전!'; };
  rec.onend = function(){ btn.classList.remove('listening'); };
  try{ rec.start(); }catch(_){}
}
function r3Skip(){ finishGame(); }

/* ═══════════ 종료·결과 ═══════════ */
function gameOver(){
  stopAllTimers(); flushProgress();
  document.getElementById('res-title').textContent = '💥 하트 소진!';
  document.getElementById('res-grade').textContent = '💔';
  document.getElementById('res-stars').textContent = '다시 도전하면 풀 수 있어요!';
  document.getElementById('res-rows').innerHTML = '<div class="rrow"><span>획득 점수</span><b>'+score+'</b></div>';
  show('scr-result'); sndNo();
}
function finishGame(){
  stopAllTimers(); flushProgress();
  roundScore[2] = score - roundScore[0] - roundScore[1];
  // 등급: 이론 최대 대비 비율(문장 60 + 시간보너스≈, 퀴즈 200/문항, 말하기 520)
  var maxS = CUR.sentences.length*60 + 150 + (CUR.questions?CUR.questions.length:0)*220 + 520;
  var pct = score / maxS;
  var grade = pct>=0.72 ? 'S' : pct>=0.55 ? 'A' : pct>=0.35 ? 'B' : 'C';
  var stars = grade==='S' ? 3 : grade==='A' ? 2 : 1;
  setStars(CUR.lesson || ('f'+CUR_IDX), stars);
  document.getElementById('res-title').textContent = '🕵️ 사건 해결!';
  document.getElementById('res-grade').textContent = grade;
  document.getElementById('res-stars').textContent = '⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('res-rows').innerHTML =
      '<div class="rrow"><span>🧩 문장 퍼즐</span><b>'+roundScore[0]+'</b></div>'
    + '<div class="rrow"><span>🕵️ 이해 퀴즈</span><b>'+roundScore[1]+'</b></div>'
    + '<div class="rrow"><span>🎤 요약 말하기</span><b>'+roundScore[2]+'</b></div>'
    + '<div class="rrow"><span>총점</span><b>'+score+'</b></div>';
  show('scr-result');
  sndFanfare();
  // 축하 파티클 소나기
  var W=window.innerWidth;
  for(var i=0;i<5;i++){ (function(k){ setTimeout(function(){ burst(Math.random()*W, 80+Math.random()*120, 18); }, k*220); })(i); }
}
function flushProgress(){
  if(!progressQueue.length) return;
  var events = progressQueue.splice(0, 60);
  try{
    fetch('/api/games/progress', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: UID, lang:'zh', events: events }) }).catch(function(){});
  }catch(_){}
}
window.addEventListener('beforeunload', flushProgress);

/* 시작 */
loadPassages();
