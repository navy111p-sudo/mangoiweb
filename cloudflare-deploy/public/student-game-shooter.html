<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>학생게임 — 영어 문장 슈팅 (원어민 음성)</title>
<style>
  :root{
    --accent:#fbbf24; --good:#22c55e; --bad:#ef4444; --blue:#3b82f6;
    --tx:#e8f0ff; --sub:#9fb3d6; --line:rgba(255,255,255,.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Noto Sans KR','Segoe UI',sans-serif;color:var(--tx);
    background:radial-gradient(125% 95% at 50% -6%,#6d5ce0 0%,#4338ca 34%,#241a63 72%,#170f45 100%);overflow:hidden;user-select:none}
  /* 패널에 임베드되도록 컨테이너가 100% 채움 */
  #game{position:relative;width:100%;height:100dvh;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  /* 🌌 주니어 친화 우주 배경 — 반짝이는 별 (플레이 필드 뒤 은은하게) */
  #field::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.7;
    background:radial-gradient(1.4px 1.4px at 20% 30%,#fff,transparent),radial-gradient(1.2px 1.2px at 70% 50%,#fff,transparent),
      radial-gradient(1px 1px at 40% 80%,#fff,transparent),radial-gradient(1.6px 1.6px at 85% 20%,#fff,transparent),
      radial-gradient(1.2px 1.2px at 55% 15%,#d7e6ff,transparent),radial-gradient(1px 1px at 12% 68%,#d7e6ff,transparent),
      radial-gradient(1.3px 1.3px at 30% 55%,#ffe9a8,transparent),radial-gradient(1.1px 1.1px at 92% 72%,#ffe9a8,transparent)}
  /* 🎨 주니어 컬러풀 오로라 — 은은하게 색이 흐르는 우주 */
  #field::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.5;mix-blend-mode:screen;
    background:radial-gradient(46% 36% at 14% 18%,rgba(56,189,248,.6),transparent 70%),
      radial-gradient(42% 34% at 86% 24%,rgba(236,72,153,.5),transparent 70%),
      radial-gradient(52% 42% at 50% 108%,rgba(52,211,153,.45),transparent 70%);
    animation:mgAurora 15s ease-in-out infinite alternate}
  @keyframes mgAurora{0%{transform:translate(0,0) scale(1)}50%{transform:translate(3%,2%) scale(1.14)}100%{transform:translate(-2%,-1%) scale(1.06)}}
  /* 🚀 떠다니는 우주 장식 */
  .bgfx{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .bgfx b{position:absolute;bottom:-10%;font-style:normal;font-weight:400;line-height:1;
    filter:drop-shadow(0 2px 5px rgba(0,0,0,.35));will-change:transform;animation:mgFloatUp linear infinite}
  @keyframes mgFloatUp{0%{transform:translateY(0) rotate(0);opacity:0}
    12%{opacity:.85}88%{opacity:.85}100%{transform:translateY(-118vh) rotate(48deg);opacity:0}}
  #game.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-7px,4px)}50%{transform:translate(6px,-5px)}75%{transform:translate(-5px,5px)}}

  .hud{display:flex;align-items:center;gap:9px;padding:8px 12px;border-bottom:1px solid var(--line);
    background:rgba(8,16,34,.55)}
  .stat{display:flex;flex-direction:column;line-height:1.1}
  .stat .lab{font-size:10px;color:var(--sub);font-weight:600}
  .stat .val{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
  #scoreVal{color:var(--accent)}
  .lvlpill{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.5);color:#bcd6ff;
    font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px}
  .timer{margin-left:auto}
  #timerVal{color:#7fd1ff}
  .timer.low #timerVal{color:var(--bad);animation:blink .8s infinite}
  @keyframes blink{50%{opacity:.35}}

  .target{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;
    padding:9px 12px;border-bottom:1px solid var(--line);background:rgba(8,16,34,.35)}
  .target .hint{flex-basis:100%;text-align:center;font-size:11px;color:var(--sub);margin-bottom:1px}
  .listen{background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.5);color:#86efac;
    font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;cursor:pointer;font-family:inherit}
  .listen:active{transform:scale(.95)}
  .chip{font-size:16px;font-weight:700;padding:5px 12px;border-radius:9px;border:1px solid transparent;transition:.15s;position:relative}
  .chip.done{background:rgba(34,197,94,.18);color:#86efac;border-color:rgba(34,197,94,.4)}
  .chip.done::after{content:'✓';position:absolute;top:-7px;right:-5px;font-size:10px;color:var(--good)}
  .chip.next{background:var(--accent);color:#3a2e05;animation:pulse 1.1s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(251,191,36,.55)}100%{box-shadow:0 0 0 12px rgba(251,191,36,0)}}
  .chip.pending{background:rgba(255,255,255,.06);color:var(--sub);border-color:var(--line)}

  #field{position:relative;flex:1 1 auto;min-height:0;overflow:hidden}
  .monster{position:absolute;display:flex;flex-direction:column;align-items:center;gap:1px;border:none;background:none;
    cursor:pointer;font-family:inherit;will-change:transform;animation:sway 2s ease-in-out infinite alternate;padding:2px}
  @keyframes sway{from{transform:translateX(-8px) rotate(-5deg)}to{transform:translateX(8px) rotate(5deg)}}
  .monster .face{font-size:30px;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5))}
  .monster .word{font-size:14px;font-weight:800;color:#fff;background:rgba(12,20,40,.85);
    border:2px solid rgba(255,255,255,.18);border-radius:999px;padding:2px 11px;white-space:nowrap;
    box-shadow:0 4px 12px rgba(0,0,0,.4);text-shadow:0 1px 2px rgba(0,0,0,.6)}
  .monster.distractor .word{border-color:rgba(255,120,120,.35)}
  /* 👑 황금 보너스 표적 — 2배 점수 */
  .monster.golden .word{background:linear-gradient(135deg,#fde68a,#f59e0b);color:#3a2e05;border-color:#fff7d6;box-shadow:0 0 18px rgba(251,191,36,.95),0 4px 12px rgba(0,0,0,.4)}
  .monster.golden .face{filter:drop-shadow(0 0 9px gold)}
  .monster.golden::after{content:'👑';position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:15px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
  .monster:active{transform:scale(.9)}
  .monster.pop{animation:pop .28s forwards}
  @keyframes pop{to{transform:scale(1.8);opacity:0}}
  .monster.wrong .word{animation:wf .4s;border-color:var(--bad)}
  @keyframes wf{0%,100%{background:rgba(12,20,40,.85)}50%{background:var(--bad)}}

  .bullet{position:absolute;width:13px;height:13px;margin:-6px 0 0 -6px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff,var(--accent) 60%,#b45309);
    box-shadow:0 0 12px 3px rgba(251,191,36,.8);transition:left .16s linear,top .16s linear;z-index:8;pointer-events:none}
  .spark{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--accent);pointer-events:none;z-index:9}
  .floatscore{position:absolute;font-weight:900;font-size:20px;pointer-events:none;z-index:12;animation:floatup .8s forwards;text-shadow:0 2px 6px rgba(0,0,0,.6)}
  .floatscore.plus{color:var(--good)} .floatscore.minus{color:var(--bad)}
  @keyframes floatup{to{transform:translateY(-44px);opacity:0}}
  #combo{position:absolute;top:28%;left:50%;transform:translate(-50%,-50%);z-index:15;font-size:40px;font-weight:900;
    font-style:italic;color:#fff;pointer-events:none;opacity:0;text-shadow:0 0 16px var(--accent),0 4px 10px rgba(0,0,0,.6);-webkit-text-stroke:2px #b45309}
  #combo.show{animation:comboPop .8s}
  @keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-8deg)}
    35%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(4deg)}
    70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-85%)}}
  /* ===== 정교한 회전 포탑 ===== */
  #turret{position:absolute;left:50%;bottom:4px;transform:translateX(-50%);z-index:10;width:70px;height:62px;pointer-events:none}
  .turret-base{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:60px;height:26px;
    background:linear-gradient(180deg,#3b475e,#141c2a);border:1px solid #5b6b86;border-radius:30px 30px 7px 7px;
    box-shadow:inset 0 2px 4px rgba(255,255,255,.12),0 7px 16px rgba(0,0,0,.5)}
  .turret-hub{position:absolute;left:50%;bottom:17px;transform:translateX(-50%);width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#b6c4d6,#475569 65%,#1c2535);border:1px solid #6b7d96;z-index:12;
    box-shadow:0 1px 3px rgba(0,0,0,.5)}
  .barrel-rot{position:absolute;left:50%;bottom:22px;transform-origin:50% 100%;transform:translateX(-50%) rotate(0deg);
    transition:transform .1s ease-out;z-index:11}
  /* 총 실루엣은 JS(GUN_SVG)의 SVG 를 barrel 배경으로 그림 — 무기마다 실제 총 모양 */
  .barrel{position:relative;width:28px;height:52px;
    background:50% 50%/100% 100% no-repeat;filter:drop-shadow(0 2px 3px rgba(0,0,0,.55))}
  .barrel.recoil{animation:recoil .18s}
  @keyframes recoil{0%{transform:translateY(0)}35%{transform:translateY(6px)}100%{transform:translateY(0)}}
  /* 🔥 화염방사기 불줄기 파티클 (총구→표적 연속 분사) */
  .flamep{position:absolute;margin:-7px 0 0 -7px;border-radius:50%;pointer-events:none;z-index:9;mix-blend-mode:screen;filter:blur(1px);will-change:transform,opacity}
  .muzzle{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:22px;height:22px;opacity:0;pointer-events:none;
    background:radial-gradient(circle,#fff 0%,#fde68a 32%,rgba(251,191,36,.55) 58%,transparent 72%)}
  .muzzle.flash{animation:flash .16s}
  @keyframes flash{0%{opacity:0;transform:translateX(-50%) scale(.3)}30%{opacity:1;transform:translateX(-50%) scale(1.3)}100%{opacity:0;transform:translateX(-50%) scale(1)}}
  /* 조준선 */
  .crosshair{position:absolute;width:28px;height:28px;margin:-14px 0 0 -14px;border:2px solid rgba(251,191,36,.7);
    border-radius:50%;opacity:0;transition:opacity .2s;pointer-events:none;z-index:7;box-shadow:0 0 8px rgba(251,191,36,.45)}
  .crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(251,191,36,.75)}
  .crosshair::before{left:50%;top:-6px;width:2px;height:8px;transform:translateX(-50%)}
  .crosshair::after{top:50%;left:-6px;height:2px;width:8px;transform:translateY(-50%)}

  /* ===== 무기별 총알·머즐 색 (총 실루엣은 JS 의 GUN_SVG 로 그림) — #game 에 gun-XXX 클래스 ===== */
  #game.gun-pistol .bullet{width:11px;height:11px}
  #game.gun-mg .bullet{width:10px;height:10px;background:radial-gradient(circle at 40% 35%,#fff,#f59e0b 60%,#b45309);box-shadow:0 0 10px 3px rgba(245,158,11,.7)}
  #game.gun-sniper .muzzle{width:26px;height:26px}
  #game.gun-tank .muzzle{width:30px;height:30px}
  #game.gun-tank .bullet{width:16px;height:16px;background:radial-gradient(circle at 40% 35%,#fff,#f59e0b 55%,#92400e);box-shadow:0 0 16px 5px rgba(245,158,11,.8)}
  #game.gun-minigun .muzzle{width:24px;height:24px}
  #game.gun-minigun .bullet{width:9px;height:9px;background:radial-gradient(circle at 40% 35%,#fff,#fbbf24 60%,#b45309);box-shadow:0 0 10px 3px rgba(251,191,36,.7)}
  #game.gun-railgun .muzzle{background:radial-gradient(circle,#fff,#67e8f9 35%,rgba(34,211,238,.55) 60%,transparent 72%)}
  #game.gun-railgun .bullet{width:9px;height:20px;background:radial-gradient(circle at 40% 35%,#fff,#22d3ee 60%,#0e7490);box-shadow:0 0 16px 5px rgba(34,211,238,.9)}
  #game.gun-grenade .bullet{width:15px;height:15px;background:radial-gradient(circle at 40% 35%,#fff,#84cc16 55%,#3f6212);box-shadow:0 0 14px 4px rgba(132,204,22,.7)}
  #game.gun-flame .muzzle{background:radial-gradient(circle,#fff,#fdba74 35%,rgba(234,88,12,.6) 60%,transparent 72%)}
  #game.gun-flame .bullet{width:13px;height:13px;background:radial-gradient(circle at 40% 35%,#fff,#fb923c 50%,#c2410c);box-shadow:0 0 14px 4px rgba(251,146,60,.8)}

  /* 무기 선택 UI */
  .gunlabel{font-size:12px;color:var(--sub);font-weight:700;margin:2px 0 4px}
  .gunpick{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
  .gunpick .gp{background:rgba(255,255,255,.06);border:2px solid var(--line);border-radius:12px;padding:7px 8px;
    display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-family:inherit;color:var(--tx);min-width:58px}
  .gunpick .gp .ic{font-size:22px}
  .gunpick .gp .nm{font-size:10.5px;font-weight:700;color:var(--sub)}
  .gunpick .gp.sel{border-color:var(--accent);background:rgba(251,191,36,.14)}
  .gunpick .gp.sel .nm{color:var(--accent)}
  .gunpick .gp:active{transform:scale(.94)}
  .gunbtn{background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:10px;padding:4px 9px;
    font-size:15px;cursor:pointer;font-family:inherit;color:var(--tx);display:inline-flex;align-items:center;gap:4px}
  .gunbtn .gl{font-size:10px;color:var(--sub);font-weight:700}
  .gunbtn:active{transform:scale(.94)}

  .voicebadge{position:absolute;left:8px;bottom:6px;z-index:11;font-size:10px;color:var(--sub);
    background:rgba(8,16,34,.6);border:1px solid var(--line);border-radius:8px;padding:3px 7px;pointer-events:none;max-width:60%;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .overlay{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 0;
    background:rgba(4,9,22,.88);backdrop-filter:blur(5px)}
  .card{width:min(92%,400px);margin:auto 0;background:linear-gradient(180deg,#16233f,#0d1730);border:1px solid var(--line);
    border-radius:18px;padding:22px 20px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.6)}
  .card h1{font-size:22px;font-weight:900;margin-bottom:6px}
  .card h1 .em{color:var(--accent)}
  .card .big{font-size:42px;font-weight:900;color:var(--accent);margin:4px 0}
  .card .best{color:#7fd1ff;font-weight:700;margin-bottom:14px}
  .rules{text-align:left;font-size:12.5px;color:#c7d3ea;background:rgba(255,255,255,.05);border-radius:11px;
    padding:11px 13px;margin:12px 0 16px;line-height:1.75}
  .rules b{color:var(--accent)}
  .btn{background:var(--accent);color:#3a2e05;border:none;border-radius:11px;padding:12px 26px;font-size:16px;
    font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 20px rgba(251,191,36,.35)}
  .btn:active{transform:scale(.96)}
  .warn{font-size:11px;color:#fca5a5;margin-top:10px}

  /* ===== 모바일 세로 화면 최대 확대 — #field 가 남는 세로공간 전부, 몬스터 크게, 상단바 슬림 ===== */
  .hud{padding:7px 11px;gap:7px}
  .target{padding:7px 11px}
  .target .hint{display:none}          /* 안내문 숨겨 게임영역 확대(판정/조준 로직 그대로) */
  .monster .face{font-size:clamp(40px,6.2vmin,80px)}   /* 화면 크기에 따라 커짐(가로/태블릿/PC) */
  .monster .word{font-size:clamp(15px,2.3vmin,28px);padding:3px 13px}

  /* ===== 🖥️ PC(넓은 화면) — 중앙 글자·요소 약 30% 확대 (PC에서 작게 보이던 문제 개선) ===== */
  @media (min-width:820px){
    .monster .face{font-size:clamp(54px,8.2vmin,110px)}
    .monster .word{font-size:clamp(20px,3.1vmin,38px);padding:4px 17px;border-width:2.5px}
    .chip{font-size:21px;padding:7px 16px;border-radius:11px}
    .listen{font-size:15px;padding:8px 16px}
    .stat .val{font-size:23px}
    .lvlpill{font-size:14px;padding:6px 13px}
    #combo{font-size:52px}
  }
</style>
</head>
<body>
<div id="game">
  <div class="hud">
    <button class="gunbtn" id="backBtn" title="뒤로 가기">←</button>
    <div class="stat"><span class="lab">점수</span><span class="val" id="scoreVal">0</span></div>
    <span class="lvlpill" id="lvlPill">문장 1</span>
    <button class="gunbtn" id="gunBtn" title="무기 바꾸기">🔫</button>
    <div class="stat timer" id="timerBox"><span class="lab">남은 시간</span><span class="val" id="timerVal">60</span></div>
  </div>

  <div class="target">
    <div class="hint">🎯 단어 몬스터를 <b>문장 순서대로</b> 쏘세요 · 맞히면 <b>원어민 발음</b>이 나옵니다</div>
    <button class="listen" id="listenBtn" title="목표 문장 듣기">🔊 문장 듣기</button>
    <div id="sentence" style="display:contents"></div>
  </div>

  <div id="field">
    <div class="bgfx" aria-hidden="true">
      <b style="left:8%;font-size:30px;animation-duration:19s;animation-delay:-2s">🪐</b>
      <b style="left:22%;font-size:20px;animation-duration:15s;animation-delay:-9s">⭐</b>
      <b style="left:37%;font-size:26px;animation-duration:23s;animation-delay:-5s">🚀</b>
      <b style="left:52%;font-size:18px;animation-duration:14s;animation-delay:-12s">✨</b>
      <b style="left:66%;font-size:28px;animation-duration:21s;animation-delay:-1s">🛸</b>
      <b style="left:79%;font-size:22px;animation-duration:17s;animation-delay:-7s">☄️</b>
      <b style="left:90%;font-size:24px;animation-duration:25s;animation-delay:-14s">🌟</b>
      <b style="left:15%;font-size:16px;animation-duration:13s;animation-delay:-6s">✨</b>
      <b style="left:45%;font-size:20px;animation-duration:18s;animation-delay:-16s">⭐</b>
      <b style="left:72%;font-size:16px;animation-duration:12s;animation-delay:-3s">✨</b>
    </div>
    <div id="combo"></div>
    <div class="voicebadge" id="voiceBadge">🔊 음성 준비 중…</div>
    <div class="crosshair" id="crosshair"></div>
    <div id="turret">
      <div class="turret-base"></div>
      <div class="barrel-rot" id="barrelRot"><div class="barrel" id="barrel"><div class="muzzle" id="muzzle"></div></div></div>
      <div class="turret-hub"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="card" id="card">
      <h1>영어 문장 <span class="em">슈팅</span> 🔫</h1>
      <div class="rules">
        • 위 <b>목표 문장</b>을 보고 단어를 <b>순서대로</b> 쏩니다.<br>
        • 정답 → <b>+100점</b> & 💥 + <b>원어민 발음 재생</b> 🔊<br>
        • 오답(순서 틀림) → <b>−50점</b> & 안 터짐<br>
        • 빠른 연속 정답 → <b>콤보!</b> · 제한시간 <b>60초</b>
      </div>
      <div class="gunlabel">⚡ 게임 속도 (5단계 난이도)</div>
      <div class="gunpick" id="speedPicker"></div>
      <div class="gunlabel">🔫 무기 선택 (게임 중에도 상단 버튼으로 변경 가능)</div>
      <div class="gunpick" id="gunPicker"></div>
      <button class="btn" id="startBtn">게임 시작 ▶</button>
      <div class="warn" id="voiceWarn"></div>
    </div>
  </div>
</div>

<script src="/js/game-vocab.js"></script>
<script>
(function(){
  'use strict';
  var SENTENCES = [
    "He plays soccer on Sundays.",
    "She is reading a book now.",
    "We go to school by bus.",
    "I have two cute dogs.",
    "They like to eat pizza.",
    "The sun is very bright today.",
    "My father drives a red car.",
    "Birds can fly in the sky.",
    "We watched a funny movie.",
    "I want to drink cold water.",
    "She sings a beautiful song.",
    "The cat is sleeping on the bed.",

  // ===================================================================
  //  🔊 원어민 음성 (Web Speech API / speechSynthesis) — 외부 파일 없음
  //  · 기기/브라우저에 내장된 en-US 원어민 음성을 사용
  //  · 더 높은 품질이 필요하면 클라우드 TTS(예: 사전 녹음 mp3)로 교체 가능
  // ===================================================================
  var synth = ('speechSynthesis' in window) ? window.speechSynthesis : null;
  var enVoice = null;
  function pickVoice(){
    if(!synth) return;
    var vs = synth.getVoices(); if(!vs.length) return;
    var en = (GLANG==='zh')
      ? vs.filter(function(v){ return /^zh/i.test(v.lang||'') || /Chinese|Mandarin|中文|普通话/i.test(v.name||''); })
      : vs.filter(function(v){ return /^en[-_]?/i.test(v.lang||'') || /English/i.test(v.name||''); });
    if(!en.length){ enVoice=null; return; }
    function score(v){               // '자연스러움' 점수 — 로봇 음성 회피, 자연 음성 우대
      var n=(v.name||''), l=(v.lang||''), s=0;
      if(/en[-_]US/i.test(l)) s+=3; else if(/^en/i.test(l)) s+=1;
      if(/Google/i.test(n)) s+=7;                                          // Chrome Google US (자연)
      if(/Natural|Online/i.test(n)) s+=7;                                  // MS 자연 음성
      if(/Aria|Jenny|Guy|Ava|Emma|Michelle|Andrew|Brian/i.test(n)) s+=4;  // MS 신형
      if(/Samantha|Karen|Daniel|Moira|Allison|Tom/i.test(n)) s+=3;        // Apple 자연
      if(v.localService===false) s+=2;                                     // 네트워크=고품질
      if(/Desktop|eSpeak|Zira|David|Mark|compact|robot/i.test(n)) s-=5;    // 옛 로봇 음성 회피
      return s;
    }
    en.sort(function(a,b){ return score(b)-score(a); });
    enVoice = en[0];
    voiceBadge.textContent = enVoice ? ('🔊 ' + enVoice.name) : '🔊 영어 음성 없음';
  }
  if(synth){ pickVoice(); synth.onvoiceschanged = pickVoice; }
  // 브라우저 TTS (폴백용)
  function synthSpeak(text, rate){
    if(!synth) return;
    try{
      synth.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang=(enVoice&&enVoice.lang)||(GLANG==='zh'?'zh-CN':'en-US'); u.rate=rate||0.9; u.pitch=1.0; u.volume=1;
      if(enVoice) u.voice=enVoice;
      synth.speak(u);
    }catch(e){}
  }
  // ★ 클라우드 TTS (원어민급 Deepgram Aura-1) — 사이트의 /api/voice/tts 사용.
  //   기기에 상관없이 동일한 고품질 발음. 실패(오프라인/standalone)하면 브라우저 TTS 폴백.
  var TTS_URL='/api/voice/tts', ttsCache={}, ttsAudio=null;
  function ttsFetch(text){
    return fetch(TTS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text,lang:GLANG})})
      .then(function(r){ var ct=r.headers.get('content-type')||''; if(!r.ok || ct.indexOf('audio')<0) throw new Error('tts'); return r.blob(); })
      .then(function(b){ var u=URL.createObjectURL(b); ttsCache[text]=u; return u; });
  }
  function prefetchTTS(text){ text=(text||'').trim(); if(!text || ttsCache[text]) return; ttsFetch(text).catch(function(){}); }
  function playUrl(u, rate){ try{ if(!ttsAudio) ttsAudio=new Audio(); ttsAudio.src=u; ttsAudio.playbackRate=rate||1; ttsAudio.play().catch(function(){}); }catch(e){} }  // ⚡ 재생속도=7단계 반영
  function speak(text, rate){
    text=(text||'').trim(); if(!text) return;
    var pr = Math.max(0.5, Math.min(3.2, (rate||1) * spdMult()));       // ⚡ 상단 7단계 속도 → 발음 속도
    if(ttsCache[text]){ playUrl(ttsCache[text], pr); return; }          // 미리받은 음성 즉시 재생
    ttsFetch(text).then(function(u){ playUrl(u, pr); }).catch(function(){ synthSpeak(text, pr); }); // 클라우드 우선(zh=서버가 만다린) → 실패 시 브라우저
  }

  // 오답음만 비음성(짧은 버저) — 정답/문장은 전부 원어민 음성
  // 총 발사음 / 명중·폭발음 (WebAudio 합성, 외부 파일 없음) — 총마다 다른 소리
  var actx=null, master=null, revBus=null;
  function makeImpulse(dur,decay){
    var len=Math.max(1,Math.floor(actx.sampleRate*dur)), buf=actx.createBuffer(2,len,actx.sampleRate);
    for(var c=0;c<2;c++){ var d=buf.getChannelData(c); for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); }
    return buf;
  }
  function ensureCtx(){
    if(!actx){ try{
      actx=new (window.AudioContext||window.webkitAudioContext)();
      master=actx.createGain(); master.gain.value=1.4;
      var comp=actx.createDynamicsCompressor(); try{comp.threshold.value=-10;comp.knee.value=8;comp.ratio.value=12;comp.attack.value=0.003;comp.release.value=0.25;}catch(_){}
      master.connect(comp); comp.connect(actx.destination);   // 마스터 게인↑ + 리미터로 클리핑 방지(체감 볼륨↑)
      var conv=actx.createConvolver(); conv.buffer=makeImpulse(0.55,2.6);   // 합성 리버브(총성 공간감)

  }
  // (선택) 실총 mp3 — SOUND_URLS 를 채우면 합성음 대신 그 파일을 재생, 비우면 합성음 사용.
  //   예: var SOUND_URLS = { pistol:'/sfx/pistol.mp3', rifle:'/sfx/rifle.mp3', hit:'/sfx/explosion.mp3' };
  var SOUND_URLS = {};
  var SBUF = {}, _samplesTried=false;
  function loadSamples(){
    if(_samplesTried || !actx) return; _samplesTried=true;
    Object.keys(SOUND_URLS).forEach(function(k){
      fetch(SOUND_URLS[k]).then(function(r){ return r.arrayBuffer(); })
        .then(function(ab){ return actx.decodeAudioData(ab); })
        .then(function(buf){ SBUF[k]=buf; }).catch(function(){});
    });
  }
  function playSample(key){
    if(!actx || !SBUF[key]) return false;
    try{ var s=actx.createBufferSource(); s.buffer=SBUF[key]; var g=actx.createGain(); g.gain.value=0.9;
      s.connect(g); g.connect(master||actx.destination); if(revBus) g.connect(revBus); s.start(); return true; }catch(e){ return false; }
  }
  function noise(dur){
    var len=Math.max(1,Math.floor(actx.sampleRate*dur)); var buf=actx.createBuffer(1,len,actx.sampleRate); var dch=buf.getChannelData(0);
    for(var i=0;i<len;i++) dch[i]=Math.random()*2-1; var s=actx.createBufferSource(); s.buffer=buf; return s;
  }
  function crack(t,vol,hp,dur){ // 노이즈 크랙(총성 빌딩블록)

  function thump(t,vol,f0,f1,dur){ // 저음 펀치

    o.connect(g); g.connect(master); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur); o.start(t); o.stop(t+dur+0.02);
  }
  var FIRE = {  // 각 발사음 = 전이음(고역 크랙)+본체+저음 펀치 → 리버브로 공간감. 총마다 다름
    pistol:  function(t){ crack(t,0.45,2400,0.02); crack(t,0.5,1000,0.10); thump(t,0.35,200,65,0.09); },   // 날카로운 '탕'

  // ===== 라운드 =====

  function spawnMonster(word,isTarget,isGolden){

  // 회전축(허브) 위치 = barrel-rot 의 회전 원점(밑변 중앙)

  // 🔥 화염방사기: 총구(sx,sy)→표적(ex,ey) 로 불줄기가 쭉 이어져 나가게 다수 파티클을 시차 분사
  function flameStream(sx,sy,ex,ey){

  var fireCooldown=false;

  function resolve(m,x,y){

      var pts = m.golden ? 200 : 100;               // 👑 황금 표적 = 2배 점수
      score += pts;

      combo = (now-lastHit<COMBO_WINDOW)?combo+1:1; lastHit=now; currentIndex++;
