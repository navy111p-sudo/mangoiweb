<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>학생게임 — 영어 문장 슈팅 (원어민 음성)</title>
<style>
  :root{
    --accent:#fbbf24; --good:#22c55e; --bad:#ef4444; --blue:#3b82f6;
    --tx:#e8f0ff; --sub:#9fb3d6; --line:rgba(255,255,255,.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Noto Sans KR','Segoe UI',sans-serif;color:var(--tx);
    background:radial-gradient(120% 80% at 50% 0%,#16294d 0%,#0a1428 70%);overflow:hidden;user-select:none}
  /* 패널에 임베드되도록 컨테이너가 100% 채움 */
  #game{position:relative;width:100%;height:100dvh;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  #game.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-7px,4px)}50%{transform:translate(6px,-5px)}75%{transform:translate(-5px,5px)}}

  .hud{display:flex;align-items:center;gap:9px;padding:8px 12px;border-bottom:1px solid var(--line);
    background:rgba(8,16,34,.55)}
  .stat{display:flex;flex-direction:column;line-height:1.1}
  .stat .lab{font-size:10px;color:var(--sub);font-weight:600}
  .stat .val{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
  #scoreVal{color:var(--accent)}
  .lvlpill{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.5);color:#bcd6ff;
    font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px}
  .timer{margin-left:auto}
  #timerVal{color:#7fd1ff}
  .timer.low #timerVal{color:var(--bad);animation:blink .8s infinite}
  @keyframes blink{50%{opacity:.35}}

  .target{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;
    padding:9px 12px;border-bottom:1px solid var(--line);background:rgba(8,16,34,.35)}
  .target .hint{flex-basis:100%;text-align:center;font-size:11px;color:var(--sub);margin-bottom:1px}
  .listen{background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.5);color:#86efac;
    font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;cursor:pointer;font-family:inherit}
  .listen:active{transform:scale(.95)}
  .chip{font-size:16px;font-weight:700;padding:5px 12px;border-radius:9px;border:1px solid transparent;transition:.15s;position:relative}
  .chip.done{background:rgba(34,197,94,.18);color:#86efac;border-color:rgba(34,197,94,.4)}
  .chip.done::after{content:'✓';position:absolute;top:-7px;right:-5px;font-size:10px;color:var(--good)}
  .chip.next{background:var(--accent);color:#3a2e05;animation:pulse 1.1s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(251,191,36,.55)}100%{box-shadow:0 0 0 12px rgba(251,191,36,0)}}
  .chip.pending{background:rgba(255,255,255,.06);color:var(--sub);border-color:var(--line)}

  #field{position:relative;flex:1 1 auto;min-height:0;overflow:hidden}
  .monster{position:absolute;display:flex;flex-direction:column;align-items:center;gap:1px;border:none;background:none;
    cursor:pointer;font-family:inherit;will-change:transform;animation:sway 2s ease-in-out infinite alternate;padding:2px}
  @keyframes sway{from{transform:translateX(-8px) rotate(-5deg)}to{transform:translateX(8px) rotate(5deg)}}
  .monster .face{font-size:30px;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5))}
  .monster .word{font-size:14px;font-weight:800;color:#fff;background:rgba(12,20,40,.85);
    border:2px solid rgba(255,255,255,.18);border-radius:999px;padding:2px 11px;white-space:nowrap;
    box-shadow:0 4px 12px rgba(0,0,0,.4);text-shadow:0 1px 2px rgba(0,0,0,.6)}
  .monster.distractor .word{border-color:rgba(255,120,120,.35)}
  /* 👑 황금 보너스 표적 — 2배 점수 */
  .monster.golden .word{background:linear-gradient(135deg,#fde68a,#f59e0b);color:#3a2e05;border-color:#fff7d6;box-shadow:0 0 18px rgba(251,191,36,.95),0 4px 12px rgba(0,0,0,.4)}
  .monster.golden .face{filter:drop-shadow(0 0 9px gold)}
  .monster.golden::after{content:'👑';position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:15px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
  .monster:active{transform:scale(.9)}
  .monster.pop{animation:pop .28s forwards}
  @keyframes pop{to{transform:scale(1.8);opacity:0}}
  .monster.wrong .word{animation:wf .4s;border-color:var(--bad)}
  @keyframes wf{0%,100%{background:rgba(12,20,40,.85)}50%{background:var(--bad)}}

  .bullet{position:absolute;width:13px;height:13px;margin:-6px 0 0 -6px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff,var(--accent) 60%,#b45309);
    box-shadow:0 0 12px 3px rgba(251,191,36,.8);transition:left .16s linear,top .16s linear;z-index:8;pointer-events:none}
  .spark{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--accent);pointer-events:none;z-index:9}
  .floatscore{position:absolute;font-weight:900;font-size:20px;pointer-events:none;z-index:12;animation:floatup .8s forwards;text-shadow:0 2px 6px rgba(0,0,0,.6)}
  .floatscore.plus{color:var(--good)} .floatscore.minus{color:var(--bad)}
  @keyframes floatup{to{transform:translateY(-44px);opacity:0}}
  #combo{position:absolute;top:28%;left:50%;transform:translate(-50%,-50%);z-index:15;font-size:40px;font-weight:900;
    font-style:italic;color:#fff;pointer-events:none;opacity:0;text-shadow:0 0 16px var(--accent),0 4px 10px rgba(0,0,0,.6);-webkit-text-stroke:2px #b45309}
  #combo.show{animation:comboPop .8s}
  @keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-8deg)}
    35%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(4deg)}
    70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-85%)}}
  /* ===== 정교한 회전 포탑 ===== */
  #turret{position:absolute;left:50%;bottom:4px;transform:translateX(-50%);z-index:10;width:70px;height:62px;pointer-events:none}
  .turret-base{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:60px;height:26px;
    background:linear-gradient(180deg,#3b475e,#141c2a);border:1px solid #5b6b86;border-radius:30px 30px 7px 7px;
    box-shadow:inset 0 2px 4px rgba(255,255,255,.12),0 7px 16px rgba(0,0,0,.5)}
  .turret-hub{position:absolute;left:50%;bottom:17px;transform:translateX(-50%);width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#b6c4d6,#475569 65%,#1c2535);border:1px solid #6b7d96;z-index:12;
    box-shadow:0 1px 3px rgba(0,0,0,.5)}
  .barrel-rot{position:absolute;left:50%;bottom:22px;transform-origin:50% 100%;transform:translateX(-50%) rotate(0deg);
    transition:transform .1s ease-out;z-index:11}
  .barrel{position:relative;width:13px;height:40px;border-radius:6px 6px 3px 3px;
    background:linear-gradient(90deg,#19212f,#64748b 46%,#bcc9da 50%,#48566b 58%,#19212f);
    border:1px solid #2b3647;box-shadow:0 0 6px rgba(0,0,0,.45)}
  .barrel::after{content:'';position:absolute;top:2px;left:50%;transform:translateX(-50%);width:5px;height:6px;
    background:#0b0f18;border-radius:3px}  /* 총구 구멍 */
  .barrel.recoil{animation:recoil .18s}
  @keyframes recoil{0%{transform:translateY(0)}35%{transform:translateY(6px)}100%{transform:translateY(0)}}
  .muzzle{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:22px;height:22px;opacity:0;pointer-events:none;
    background:radial-gradient(circle,#fff 0%,#fde68a 32%,rgba(251,191,36,.55) 58%,transparent 72%)}
  .muzzle.flash{animation:flash .16s}
  @keyframes flash{0%{opacity:0;transform:translateX(-50%) scale(.3)}30%{opacity:1;transform:translateX(-50%) scale(1.3)}100%{opacity:0;transform:translateX(-50%) scale(1)}}
  /* 조준선 */
  .crosshair{position:absolute;width:28px;height:28px;margin:-14px 0 0 -14px;border:2px solid rgba(251,191,36,.7);
    border-radius:50%;opacity:0;transition:opacity .2s;pointer-events:none;z-index:7;box-shadow:0 0 8px rgba(251,191,36,.45)}
  .crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(251,191,36,.75)}
  .crosshair::before{left:50%;top:-6px;width:2px;height:8px;transform:translateX(-50%)}
  .crosshair::after{top:50%;left:-6px;height:2px;width:8px;transform:translateY(-50%)}

  /* ===== 무기 테마 (총신 모양·색·총알) — #game 에 gun-XXX 클래스로 전환 ===== */
  /* 권총 — 짧은 총신 */
  #game.gun-pistol .barrel{height:28px;background:linear-gradient(90deg,#1a1f29,#5b6573 46%,#9aa4b2 50%,#3a4250 58%,#1a1f29)}
  #game.gun-pistol .bullet{width:11px;height:11px}
  /* 장총(소총) — 긴 나무+강철 총신 */
  #game.gun-rifle .barrel{height:56px;background:linear-gradient(90deg,#1c1610,#5a4632 40%,#7a5a3a 50%,#3a2c1c 60%,#1c1610);border-color:#3a2c1c}
  /* 기관총 — 통풍구 줄무늬 */
  #game.gun-mg .barrel{height:46px;width:15px;background:repeating-linear-gradient(0deg,#2b3340 0 4px,#1a212c 4px 7px);border-color:#3b4452}
  #game.gun-mg .bullet{width:10px;height:10px;background:radial-gradient(circle at 40% 35%,#fff,#f59e0b 60%,#b45309);box-shadow:0 0 10px 3px rgba(245,158,11,.7)}
  /* 산탄총 — 두껍고 짧게 */
  #game.gun-shotgun .barrel{height:36px;width:18px;background:linear-gradient(90deg,#14110d,#4a3f33 46%,#6b5b48 50%,#2e271f 58%,#14110d);border-color:#2e271f}
  /* 저격총 — 길고 가늘게 + 스코프 */
  #game.gun-sniper .barrel{height:62px;width:10px;background:linear-gradient(90deg,#15171c,#3b4250 46%,#5b6473 50%,#262b34 58%,#15171c)}
  #game.gun-sniper .barrel::before{content:'';position:absolute;top:11px;left:50%;transform:translateX(-50%);width:9px;height:14px;background:#0b0f18;border:1px solid #4b5563;border-radius:3px}
  /* 전차포 — 매우 두껍고 군용 그린 */
  #game.gun-tank .barrel{width:22px;height:48px;border-radius:7px 7px 4px 4px;background:linear-gradient(90deg,#1c2415,#3f5128 46%,#5b7038 50%,#2a3a1c 58%,#1c2415);border-color:#3a4a24}
  #game.gun-tank .muzzle{width:28px;height:28px}
  #game.gun-tank .bullet{width:16px;height:16px;background:radial-gradient(circle at 40% 35%,#fff,#f59e0b 55%,#92400e);box-shadow:0 0 16px 5px rgba(245,158,11,.8)}
  /* 리볼버 — 짧고 황동빛 */
  #game.gun-revolver .barrel{height:30px;background:linear-gradient(90deg,#1a1f29,#6b5b48 46%,#cbb894 50%,#3a3024 58%,#1a1f29);border-color:#3a3024}
  /* 돌격소총 — 중간 길이 통풍구 */
  #game.gun-ar .barrel{height:50px;width:14px;background:repeating-linear-gradient(0deg,#252b34 0 6px,#171c24 6px 9px);border-color:#39414d}
  /* 미니건 — 두껍고 회전포신 느낌 */
  #game.gun-minigun .barrel{width:20px;height:44px;border-radius:6px;background:linear-gradient(90deg,#161b22,#3a4452 40%,#6b7686 50%,#2a323c 60%,#161b22);border-color:#39424f}
  #game.gun-minigun .muzzle{width:24px;height:24px}
  #game.gun-minigun .bullet{width:9px;height:9px;background:radial-gradient(circle at 40% 35%,#fff,#fbbf24 60%,#b45309);box-shadow:0 0 10px 3px rgba(251,191,36,.7)}
  /* 레일건 — 길고 가는 사이파이 청록 */
  #game.gun-railgun .barrel{height:58px;width:11px;background:linear-gradient(90deg,#0b2a3a,#0891b2 46%,#67e8f9 50%,#0e7490 58%,#0b2a3a);border-color:#155e75;box-shadow:0 0 10px rgba(34,211,238,.55)}
  #game.gun-railgun .muzzle{background:radial-gradient(circle,#fff,#67e8f9 35%,rgba(34,211,238,.55) 60%,transparent 72%)}
  #game.gun-railgun .bullet{width:9px;height:20px;background:radial-gradient(circle at 40% 35%,#fff,#22d3ee 60%,#0e7490);box-shadow:0 0 16px 5px rgba(34,211,238,.9)}
  /* 유탄발사기 — 두껍고 군용 그린 */
  #game.gun-grenade .barrel{height:34px;width:19px;border-radius:8px 8px 4px 4px;background:linear-gradient(90deg,#1f2415,#4a5a2a 46%,#6b7d38 50%,#2a3418 58%,#1f2415);border-color:#3a4a24}
  #game.gun-grenade .bullet{width:15px;height:15px;background:radial-gradient(circle at 40% 35%,#fff,#84cc16 55%,#3f6212);box-shadow:0 0 14px 4px rgba(132,204,22,.7)}
  /* 화염방사기 — 주황빛 */
  #game.gun-flame .barrel{height:40px;width:16px;background:linear-gradient(90deg,#2a1108,#7c2d12 46%,#ea580c 50%,#9a3412 58%,#2a1108);border-color:#7c2d12}
  #game.gun-flame .muzzle{background:radial-gradient(circle,#fff,#fdba74 35%,rgba(234,88,12,.6) 60%,transparent 72%)}
  #game.gun-flame .bullet{width:13px;height:13px;background:radial-gradient(circle at 40% 35%,#fff,#fb923c 50%,#c2410c);box-shadow:0 0 14px 4px rgba(251,146,60,.8)}

  /* 무기 선택 UI */
  .gunlabel{font-size:12px;color:var(--sub);font-weight:700;margin:2px 0 4px}
  .gunpick{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
  .gunpick .gp{background:rgba(255,255,255,.06);border:2px solid var(--line);border-radius:12px;padding:7px 8px;
    display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-family:inherit;color:var(--tx);min-width:58px}
  .gunpick .gp .ic{font-size:22px}
  .gunpick .gp .nm{font-size:10.5px;font-weight:700;color:var(--sub)}
  .gunpick .gp.sel{border-color:var(--accent);background:rgba(251,191,36,.14)}
  .gunpick .gp.sel .nm{color:var(--accent)}
  .gunpick .gp:active{transform:scale(.94)}
  .gunbtn{background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:10px;padding:4px 9px;
    font-size:15px;cursor:pointer;font-family:inherit;color:var(--tx);display:inline-flex;align-items:center;gap:4px}
  .gunbtn .gl{font-size:10px;color:var(--sub);font-weight:700}
  .gunbtn:active{transform:scale(.94)}

  .voicebadge{position:absolute;left:8px;bottom:6px;z-index:11;font-size:10px;color:var(--sub);
    background:rgba(8,16,34,.6);border:1px solid var(--line);border-radius:8px;padding:3px 7px;pointer-events:none;max-width:60%;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .overlay{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 0;
    background:rgba(4,9,22,.88);backdrop-filter:blur(5px)}
  .card{width:min(92%,400px);margin:auto 0;background:linear-gradient(180deg,#16233f,#0d1730);border:1px solid var(--line);
    border-radius:18px;padding:22px 20px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.6)}
  .card h1{font-size:22px;font-weight:900;margin-bottom:6px}
  .card h1 .em{color:var(--accent)}
  .card .big{font-size:42px;font-weight:900;color:var(--accent);margin:4px 0}
  .card .best{color:#7fd1ff;font-weight:700;margin-bottom:14px}
  .rules{text-align:left;font-size:12.5px;color:#c7d3ea;background:rgba(255,255,255,.05);border-radius:11px;
    padding:11px 13px;margin:12px 0 16px;line-height:1.75}
  .rules b{color:var(--accent)}
  .btn{background:var(--accent);color:#3a2e05;border:none;border-radius:11px;padding:12px 26px;font-size:16px;
    font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 20px rgba(251,191,36,.35)}
  .btn:active{transform:scale(.96)}
  .warn{font-size:11px;color:#fca5a5;margin-top:10px}

  /* ===== 모바일 세로 화면 최대 확대 — #field 가 남는 세로공간 전부, 몬스터 크게, 상단바 슬림 ===== */
  .hud{padding:7px 11px;gap:7px}
  .target{padding:7px 11px}
  .target .hint{display:none}          /* 안내문 숨겨 게임영역 확대(판정/조준 로직 그대로) */
  .monster .face{font-size:clamp(40px,6.2vmin,80px)}   /* 화면 크기에 따라 커짐(가로/태블릿/PC) */
  .monster .word{font-size:clamp(15px,2.3vmin,28px);padding:3px 13px}
</style>
</head>
<body>
<div id="game">
  <div class="hud">
    <button class="gunbtn" id="backBtn" title="뒤로 가기">←</button>
    <div class="stat"><span class="lab">점수</span><span class="val" id="scoreVal">0</span></div>
    <span class="lvlpill" id="lvlPill">문장 1</span>
    <button class="gunbtn" id="gunBtn" title="무기 바꾸기">🔫</button>
    <div class="stat timer" id="timerBox"><span class="lab">남은 시간</span><span class="val" id="timerVal">60</span></div>
  </div>

  <div class="target">
    <div class="hint">🎯 단어 몬스터를 <b>문장 순서대로</b> 쏘세요 · 맞히면 <b>원어민 발음</b>이 나옵니다</div>
    <button class="listen" id="listenBtn" title="목표 문장 듣기">🔊 문장 듣기</button>
    <div id="sentence" style="display:contents"></div>
  </div>

  <div id="field">
    <div id="combo"></div>
    <div class="voicebadge" id="voiceBadge">🔊 음성 준비 중…</div>
    <div class="crosshair" id="crosshair"></div>
    <div id="turret">
      <div class="turret-base"></div>
      <div class="barrel-rot" id="barrelRot"><div class="barrel" id="barrel"><div class="muzzle" id="muzzle"></div></div></div>
      <div class="turret-hub"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="card" id="card">
      <h1>영어 문장 <span class="em">슈팅</span> 🔫</h1>
      <div class="rules">
        • 위 <b>목표 문장</b>을 보고 단어를 <b>순서대로</b> 쏩니다.<br>
        • 정답 → <b>+100점</b> & 💥 + <b>원어민 발음 재생</b> 🔊<br>
        • 오답(순서 틀림) → <b>−50점</b> & 안 터짐<br>
        • 빠른 연속 정답 → <b>콤보!</b> · 제한시간 <b>60초</b>
      </div>
      <div class="gunlabel">⚡ 게임 속도 (5단계 난이도)</div>
      <div class="gunpick" id="speedPicker"></div>
      <div class="gunlabel">🔫 무기 선택 (게임 중에도 상단 버튼으로 변경 가능)</div>
      <div class="gunpick" id="gunPicker"></div>
      <button class="btn" id="startBtn">게임 시작 ▶</button>
      <div class="warn" id="voiceWarn"></div>
    </div>
  </div>
</div>

<script src="/js/game-vocab.js"></script>
<script>
(function(){
  'use strict';
  var SENTENCES = [
    "He plays soccer on Sundays.",
    "She is reading a book now.",
    "We go to school by bus.",
    "I have two cute dogs.",
    "They like to eat pizza.",
    "The sun is very bright today.",
    "My father drives a red car.",
    "Birds can fly in the sky.",
    "We watched a funny movie.",
    "I want to drink cold water.",
    "She sings a beautiful song.",
    "The cat is sleeping on the bed.",
    "Let us play in the park.",
    "He is doing his homework.",
    "I brush my teeth every morning.",
    "The teacher is writing on the board.",
    "We are learning English together.",
    "He bought a new soccer ball.",
    "My sister likes to draw pictures.",
    "The baby is laughing happily.",
    "They are riding bikes in the park.",
    "I can swim in the blue sea.",
    "She made a delicious chocolate cake.",
    "We will visit the zoo on Saturday.",
    "The little bird sang a sweet song.",
    "My family went to the beach last summer.",
    "She wants to be a famous scientist someday.",
    "We should always be kind to our friends.",
    "The students are studying English together now.",
    "He practiced the piano for two hours yesterday.",

    o.frequency.setValueAtTime(170,t); o.frequency.exponentialRampToValueAtTime(80,t+0.2);
    o.connect(g); g.connect(master||actx.destination); g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22); o.start(t); o.stop(t+0.24);
  }catch(e){} }

  // ===== 라운드 =====
  function startRound(){
    clearMonsters();
    var _pool = stagePool();   // 🎢 난이도 구간(짧은 문장→긴 문장)에서 출제
    targetWords = _pool[level % _pool.length].split(' ');
    currentIndex = 0;
    targetWords.forEach(function(w){ prefetchTTS(w.replace(/[.?!]/g,'')); });          // 원어민 음성 미리받기(즉시 재생)
    prefetchTTS(targetWords.join(' ').replace(/[.?!]/g,''));
    lvlPill.textContent = '⭐' + stageLvl + ' · 문장 ' + (level+1) + ' · ✅ ' + correctWords + '/' + GOAL;
    var pool = DISTRACTORS.filter(function(w){ return targetWords.indexOf(w)<0; });
    shuffle(pool);
    var tItems = targetWords.map(function(w){ return {word:w,isTarget:true}; });
    // 👑 이 라운드에 45% 확률로 목표 단어 하나를 황금 보너스 표적으로 (2배 점수 + 특수 연출)
    if(tItems.length && Math.random()<0.45){ tItems[Math.floor(Math.random()*tItems.length)].golden=true; }
    var items = tItems.concat(pool.slice(0,2).map(function(w){ return {word:w,isTarget:false}; }));
    shuffle(items);
    items.forEach(function(it){ spawnMonster(it.word, it.isTarget, it.golden); });
    renderSentence();
    setTimeout(speakSentence, 250); // 라운드 시작 시 목표 문장을 원어민 음성으로 들려줌
  }
  function spawnMonster(word,isTarget,isGolden){
    var el=document.createElement('button');
    el.className='monster'+(isTarget?'':' distractor')+(isGolden?' golden':'');
    el.innerHTML='<span class="face">'+FACES[Math.floor(Math.random()*FACES.length)]+'</span><span class="word">'+word+'</span>';
    var fw=field.clientWidth, fh=field.clientHeight;
    // ⚡ base 속도(스폰 시 고정) — 루프에서 spdMult() 를 매 프레임 곱함 → 속도 변경 즉시 반영.
    //   세로 낙하 + 좌우 드리프트로 몬스터가 더 활발히 빨리빨리 움직임. 상위 속도일수록 훨씬 빠름.
    var m={ el:el, word:word, isTarget:isTarget, golden:!!isGolden, x:rand(8,Math.max(40,fw-86)), y:rand(6,Math.max(40,fh*0.30)),
            vyBase:rand(28,58), vxBase:rand(-48,48) };
    el.style.left=m.x+'px'; el.style.top=m.y+'px';
    el.style.animationDuration=rand(1.4,3).toFixed(2)+'s'; el.style.animationDelay=(-rand(0,2)).toFixed(2)+'s';
    el.addEventListener('click', function(){ fireAt(m); });
    field.appendChild(el); monsters.push(m);
  }
  function clearMonsters(){ monsters.forEach(function(m){ if(m.el&&m.el.parentNode) m.el.remove(); }); monsters=[]; }
  function renderSentence(){
    sentenceEl.innerHTML = targetWords.map(function(w,i){
      var cls = i<currentIndex?'done':(i===currentIndex?'next':'pending');
      return '<span class="chip '+cls+'">'+w+'</span>';
    }).join('');
  }

  // 회전축(허브) 위치 = barrel-rot 의 회전 원점(밑변 중앙)
  function pivot(){ var f=field.getBoundingClientRect(), b=barrelRot.getBoundingClientRect();
    return { x:b.left+b.width/2-f.left, y:b.bottom-f.top }; }
  function aimAt(tx,ty){
    var p=pivot(), deg=Math.atan2(tx-p.x, -(ty-p.y))*180/Math.PI;
    deg=Math.max(-80,Math.min(80,deg));                 // 과회전 제한 → 정밀 조준감
    barrelRot.style.transform='translateX(-50%) rotate('+deg+'deg)';
  }
  var fireCooldown=false;
  function fireAt(m){
    if(!running || !m.el.isConnected || fireCooldown) return;
    fireCooldown=true; setTimeout(function(){ fireCooldown=false; }, 110);
    var f=field.getBoundingClientRect(), r=m.el.getBoundingClientRect();
    aimAt(r.left+r.width/2-f.left, r.top+r.height/2-f.top);   // ① 먼저 정조준
    setTimeout(function(){                                     // ② 정렬 후 발사
      if(!running || !m.el.isConnected) return;
      var f2=field.getBoundingClientRect(), mu=muzzle.getBoundingClientRect(), r2=m.el.getBoundingClientRect();
      var sx=mu.left+mu.width/2-f2.left, sy=mu.top+mu.height/2-f2.top;   // 총알은 총구에서 출발
      var ex=r2.left+r2.width/2-f2.left, ey=r2.top+r2.height/2-f2.top;
      muzzle.classList.remove('flash'); void muzzle.offsetWidth; muzzle.classList.add('flash');  // 머즐 플래시
      barrel.classList.remove('recoil'); void barrel.offsetWidth; barrel.classList.add('recoil'); // 반동
      fireSound();                                  // ★ 총마다 다른 발사음
      var b=document.createElement('div'); b.className='bullet'; b.style.left=sx+'px'; b.style.top=sy+'px'; field.appendChild(b);
      requestAnimationFrame(function(){ b.style.left=ex+'px'; b.style.top=ey+'px'; });
      setTimeout(function(){ if(b.parentNode) b.remove(); resolve(m,ex,ey); }, 150);
    }, 105);
  }

  function resolve(m,x,y){
    if(!running || !m.el.isConnected) return;
    var required = targetWords[currentIndex];
    if(m.word === required){
      var pts = m.golden ? 200 : 100;               // 👑 황금 표적 = 2배 점수
      score += pts;
      var now=performance.now();
      combo = (now-lastHit<COMBO_WINDOW)?combo+1:1; lastHit=now; currentIndex++;
      sndHit();                                      // ★ 표적 명중/폭발음
      speak(m.word.replace(/[.?!]/g,''));            // ★ 맞힌 단어를 원어민 발음으로 재생
      popMonster(m); floatScore((m.golden?'👑+200':'+100'),x,y,true);
      if(m.golden) showCombo('✨ 골든 보너스! +200');
      else if(combo>=2) showCombo(combo+' COMBO!');
      correctWords++;
      renderSentence(); updateHUD();
      if(correctWords>=GOAL){ setTimeout(winGame, 700); return; }   // 🎯 10개 정답 → 결과
      if(currentIndex>=targetWords.length) roundComplete();
    } else {
      score=Math.max(0,score-50); combo=0; sndMiss();
      m.el.classList.remove('wrong'); void m.el.offsetWidth; m.el.classList.add('wrong');
      floatScore('-50',x,y,false); shake(); updateHUD();
    }
  }
  function roundComplete(){
    var bonus=50+combo*10; score+=bonus; updateHUD();
    showCombo('문장 완성! +'+bonus);
    setTimeout(speakSentence, 200);                  // ★ 완성된 전체 문장을 원어민 음성으로
    try{ if(window.parent && window.parent!==window) window.parent.postMessage({type:'mangoi-game-complete', score:100+bonus}, '*'); }catch(e){} // 학생게임 탭 점수 반영
    level++;
    setTimeout(function(){ if(running) startRound(); }, 1600);
  }

  function popMonster(m){
    var i=monsters.indexOf(m); if(i>=0) monsters.splice(i,1);
    var f=field.getBoundingClientRect(), r=m.el.getBoundingClientRect();
    burst(r.left-f.left+r.width/2, r.top-f.top+r.height/2);
    m.el.classList.add('pop'); setTimeout(function(){ if(m.el.parentNode) m.el.remove(); }, 280);
  }
  function burst(x,y){
    for(var i=0;i<9;i++){ (function(k){
      var s=document.createElement('div'); s.className='spark'; s.style.left=x+'px'; s.style.top=y+'px';
      s.style.background=['#fbbf24','#22c55e','#7fd1ff','#fff'][k%4]; field.appendChild(s);
      var ang=Math.random()*Math.PI*2, dist=28+Math.random()*42;
      s.animate([{transform:'translate(0,0)',opacity:1},{transform:'translate('+Math.cos(ang)*dist+'px,'+Math.sin(ang)*dist+'px)',opacity:0}],
        {duration:460+Math.random()*200,easing:'cubic-bezier(.2,.7,.3,1)'});
      setTimeout(function(){ if(s.parentNode) s.remove(); }, 700);
    })(i); }
  }
  function floatScore(txt,x,y,plus){
    var d=document.createElement('div'); d.className='floatscore '+(plus?'plus':'minus'); d.textContent=txt;
    d.style.left=(x-16)+'px'; d.style.top=(y-10)+'px'; field.appendChild(d);
    setTimeout(function(){ if(d.parentNode) d.remove(); }, 800);
  }
  function showCombo(txt){ comboEl.textContent=txt; comboEl.classList.remove('show'); void comboEl.offsetWidth; comboEl.classList.add('show'); }
  function shake(){ gameEl.classList.remove('shake'); void gameEl.offsetWidth; gameEl.classList.add('shake'); setTimeout(function(){ gameEl.classList.remove('shake'); }, 420); }

  function updateHUD(){ scoreVal.textContent=score; try{ lvlPill.textContent='⭐'+stageLvl+' · 문장 '+(level+1)+' · ✅ '+correctWords+'/'+GOAL; }catch(e){} }
  function updateTimer(){ timerVal.textContent=timeLeft; timerBox.classList.toggle('low', timeLeft<=10); }
  function tick(){ if(!running) return; timeLeft--; updateTimer(); if(timeLeft<=0) endGame(); }

  function loop(ts){
    if(!running) return;
    if(!lastTs) lastTs=ts; var dt=Math.min(0.05,(ts-lastTs)/1000); lastTs=ts;
    var h=field.clientHeight, w=field.clientWidth, sm=spdMult();   // ⚡ 매 프레임 현재 속도 반영(변경 즉시)
    for(var i=0;i<monsters.length;i++){ var m=monsters[i];
      m.y+=m.vyBase*sm*dt;
      m.x+=m.vxBase*sm*dt;
      if(m.x<4){ m.x=4; m.vxBase=Math.abs(m.vxBase); } else if(m.x>w-80){ m.x=w-80; m.vxBase=-Math.abs(m.vxBase); }  // 좌우 벽에서 튕김
      if(m.y>h-66){ m.y=-6; m.x=rand(8,Math.max(40,w-86)); }
      m.el.style.left=m.x+'px'; m.el.style.top=m.y+'px';
    }
    rafId=requestAnimationFrame(loop);
  }

  function startGame(){
    ensureCtx();
    if(synth) pickVoice();
    if(synth){ try{ speak(' '); }catch(e){} }     // 모바일 음성 잠금 해제(사용자 제스처)
    score=0; timeLeft=60; combo=0; level=0; lastHit=0; lastTs=0; correctWords=0; running=true;
    overlay.style.display='none'; updateHUD(); updateTimer(); startRound();
    clearInterval(timerId); timerId=setInterval(tick,1000);
    cancelAnimationFrame(rafId); rafId=requestAnimationFrame(loop);
  }
  function endGame(){
    running=false; clearInterval(timerId); cancelAnimationFrame(rafId); clearMonsters(); if(synth) synth.cancel();
    var best=+(localStorage.getItem('ess_best')||0); if(score>best){ best=score; localStorage.setItem('ess_best',best); }
    card.innerHTML='<h1>⏰ 시간 종료!</h1><div class="big">'+score+'점</div><div class="best">🏆 최고 '+best+'점</div><button class="btn" id="restartBtn">다시 시작 ↻</button>';
    overlay.style.display='flex'; document.getElementById('restartBtn').addEventListener('click', startGame);
  }
  // 🎯 정답 단어 10개 명중 달성 → 결과 화면(난이도 단계 클리어) + 허브에 점수 전달
  function winGame(){
    running=false; clearInterval(timerId); cancelAnimationFrame(rafId); clearMonsters(); if(synth) synth.cancel();
    var best=+(localStorage.getItem('ess_best')||0); if(score>best){ best=score; localStorage.setItem('ess_best',best); }
    try{ if(window.parent && window.parent!==window) window.parent.postMessage({type:'mangoi-game-complete', score:score, reason:'goal'}, '*'); }catch(e){}
    var nextBtn = stageLvl < STAGE_MAX
      ? '<button class="btn" id="nextStageBtn" style="background:linear-gradient(135deg,#f43f5e,#be123c);color:#fff">🔥 다음 난이도 ⭐'+(stageLvl+1)+' 도전!</button>'
      : '<button class="btn" id="nextStageBtn" style="background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff">👑 전 단계 클리어! ⭐1부터</button>';
    card.innerHTML='<h1>🏆 난이도 ⭐'+stageLvl+' 클리어!</h1><div class="big">'+score+'점</div>'
      +'<div class="best">✅ 정답 '+correctWords+'개 · 🏆 최고 '+best+'점</div>'
      +nextBtn
      +'<button class="btn" id="restartBtn" style="margin-top:8px">같은 단계 다시 ↻</button>';
    overlay.style.display='flex';
    document.getElementById('restartBtn').addEventListener('click', startGame);
    document.getElementById('nextStageBtn').addEventListener('click', function(){
      setStage(stageLvl < STAGE_MAX ? stageLvl+1 : 1);
      setSpeed(stageLvl);        // 🎢 난이도 = 속도 단계 연동 (몬스터 더 빨라짐)
      startGame();
    });
  }

  // ===== 무기 전환 =====
  function setGun(id){
    if(!GUNS.some(function(g){return g.id===id;})) id=GUNS[0].id;
    curGun=id; try{ localStorage.setItem('ess_gun',id); }catch(e){}
    GUNS.forEach(function(g){ gameEl.classList.remove('gun-'+g.id); });
    gameEl.classList.add('gun-'+id);
    var picker=document.getElementById('gunPicker');
    if(picker) [].forEach.call(picker.children, function(b){ b.classList.toggle('sel', b.getAttribute('data-gun')===id); });
    var g=GUNS.find(function(x){ return x.id===id; });
    if(gunBtn) gunBtn.innerHTML = g.icon + '<span class="gl">'+g.name+'</span>';
  }
  function buildGunPicker(){
    var picker=document.getElementById('gunPicker'); if(!picker) return;
    picker.innerHTML='';
    GUNS.forEach(function(g){
      var b=document.createElement('button'); b.className='gp'; b.setAttribute('data-gun',g.id);
      b.innerHTML='<span class="ic">'+g.icon+'</span><span class="nm">'+g.name+'</span>';
      b.addEventListener('click', function(){ setGun(g.id); });
      picker.appendChild(b);
    });
  }
  gunBtn.addEventListener('click', function(){
    var i=GUNS.findIndex(function(g){ return g.id===curGun; });
    setGun(GUNS[(i+1)%GUNS.length].id);
  });
  buildGunPicker(); setGun(curGun);
  buildSpeedPicker(); setSpeed(speedLvl);

  // ← 뒤로가기: 허브(iframe) 안이면 부모에 알리고, 단독 실행이면 게임 목록으로
  document.getElementById('backBtn').addEventListener('click', function(){
    try{
      if(window.parent && window.parent!==window){ window.parent.postMessage({type:'mangoi-game-back'},'*'); return; }
    }catch(e){}
    if(history.length>1) history.back(); else location.href='/student-games.html';
  });

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('listenBtn').addEventListener('click', function(){ if(running) speakSentence(); });
  if(!synth){ document.getElementById('voiceWarn').textContent='⚠ 이 브라우저는 음성합성을 지원하지 않습니다.'; }
  // 포인터(마우스/터치) 추적 조준 + 조준선
  function trackAim(e){
    var f=field.getBoundingClientRect();
    var px=(e.touches?e.touches[0].clientX:e.clientX)-f.left;
    var py=(e.touches?e.touches[0].clientY:e.clientY)-f.top;
    if(running) aimAt(px,py);
    crosshair.style.left=px+'px'; crosshair.style.top=py+'px'; crosshair.style.opacity='1';
  }
  field.addEventListener('pointermove', trackAim);
  field.addEventListener('pointerdown', trackAim);
  field.addEventListener('pointerleave', function(){ crosshair.style.opacity='0'; });
  window.addEventListener('resize', function(){ var w=field.clientWidth; monsters.forEach(function(m){ if(m.x>w-66){ m.x=Math.max(8,w-86); m.el.style.left=m.x+'px'; } }); });
})();
</script>
