<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>영어 학습 게임 — Mangoi 화상영어</title>
<!--
  ============================================================================
   🎮 학생게임 허브 (Student Games Hub)  — single-file HTML + CSS + JS
   ----------------------------------------------------------------------------
   수업 입장 화면(index.html)의 🎮 학생게임 탭에 있는 7가지 게임을 한 페이지에
   카드로 모아 누르면 바로 플레이하게 한다.
     1) 🎣 낚시+말하기    → english-mastery-suite.html?game=fish  (iframe)
     2) 🚀 슈팅+말하기    → english-mastery-suite.html?game=shoot (iframe)
     3) 🔫 영어 슈팅      → student-game-shooter.html             (iframe)
     4) 🧱 문장 벽돌      → 인라인 렌더 (gameRenderBrick)
     5) 🧩 단어 매칭      → 인라인 렌더 (gameRenderMatch)
     6) 🔤 빈칸 채우기    → 인라인 렌더 (gameRenderFill)
     7) 🎈 풍선 터뜨리기  → 인라인 렌더 (gameRenderBalloon)
   인라인 게임 4종은 index.html 게임 탭에서 그대로 가져온 로직. 점수/원어민
   발음(TTS)/효과음 공유. iframe 게임 3종은 미션 완료 시 postMessage 로 점수 반영.
  ============================================================================
-->
<style>
  :root{
    --deepblue:#0b1b3a; --emerald:#10b981; --gold:#fbbf24;
    --good:#22c55e; --bad:#ef4444; --blue:#3b82f6;
    --tx:#e8f0ff; --sub:#9fb3d6; --line:rgba(255,255,255,.12); --panel:rgba(10,18,38,.72);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Noto Sans KR','Segoe UI',sans-serif;color:var(--tx);min-height:100dvh;
    background:radial-gradient(120% 90% at 50% 0%,#1c3566 0%,#081227 70%)}
  #app{position:relative;width:100%;min-height:100dvh;display:flex;flex-direction:column}

  /* ===== 헤더 ===== */
  .hub-head{text-align:center;padding:26px 16px 10px}
  .hub-head .brand{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--gold);margin-bottom:6px}
  .hub-head h1{font-size:25px;font-weight:900;line-height:1.25}
  .hub-head h1 .em{color:var(--emerald)}
  .hub-head .sub{font-size:13px;color:var(--sub);margin-top:8px;line-height:1.6}

  /* ===== 메뉴(카드 그리드) ===== */
  #hub-menu{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 16px 40px}
  .game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px;
    width:min(960px,100%);margin-top:10px}
  @media(max-width:430px){.game-grid{grid-template-columns:1fr 1fr;gap:12px}}
  .game-card{position:relative;cursor:pointer;border:1px solid var(--line);border-radius:18px;
    padding:20px 16px;text-align:center;color:var(--tx);background:rgba(255,255,255,.05);
    transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;gap:8px;min-height:168px;justify-content:center}
  .game-card::before{content:'';position:absolute;inset:0;background:var(--cardbg);opacity:.16;pointer-events:none}
  .game-card:hover{transform:translateY(-4px) scale(1.02);border-color:var(--gold);
    box-shadow:0 12px 30px rgba(0,0,0,.45)}
  .game-card:active{transform:scale(.98)}
  .game-card .ico{font-size:46px;line-height:1;filter:drop-shadow(0 3px 8px rgba(0,0,0,.45));position:relative}
  .game-card .ttl{font-size:16px;font-weight:800;position:relative}
  .game-card .dsc{font-size:11.5px;color:var(--sub);line-height:1.45;position:relative}
  .game-card .badge{position:absolute;top:10px;right:10px;font-size:9.5px;font-weight:800;letter-spacing:.5px;
    padding:3px 8px;border-radius:999px;background:rgba(16,185,129,.2);color:#6ee7b7;border:1px solid rgba(16,185,129,.4)}

  /* ===== 게임 화면 ===== */
  #hub-game{display:none;flex:1;flex-direction:column;min-height:100dvh}
  #hub-game.active{display:flex}
  .game-topbar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(10,18,38,.85);
    border-bottom:1px solid var(--line);flex-wrap:wrap;flex-shrink:0}
  .game-topbar .back{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--tx);
    padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .game-topbar .back:hover{background:rgba(251,191,36,.16);border-color:var(--gold)}
  .game-topbar .gname{font-size:15px;font-weight:800;color:var(--gold)}
  .game-topbar .next{margin-left:auto;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border:0;
    padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .game-scorebar{display:flex;gap:14px;align-items:center;padding:8px 14px;background:rgba(10,18,38,.7);
    border-bottom:1px solid var(--line);font-size:13px;color:#cbd5e1;flex-shrink:0;flex-wrap:wrap}
  #game-area{flex:1;min-height:0;overflow:auto;background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:24px;color:#f1f5f9;display:flex;flex-direction:column}
  #game-area iframe{width:100%;height:100%;flex:1;min-height:60vh;border:0;display:block;background:#081227}
  .game-iframewrap #game-area{padding:0}
  .brick-btn:hover{transform:scale(1.05)}
  .match-card:hover{transform:scale(1.04)}
  /* ===== ⚡ 게임 속도(난이도) 5단계 선택 ===== */
  .speed-pick{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap}
  .speed-pick .slab{font-size:11px;color:var(--sub);font-weight:700}
  .speed-pick .sp{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--sub);
    border-radius:999px;padding:5px 11px;font-size:11.5px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s}
  .speed-pick .sp.on{background:rgba(16,185,129,.25);border-color:var(--emerald);color:#bbf7d0;box-shadow:0 0 0 1px var(--emerald) inset}
  .speed-pick .sp:active{transform:scale(.95)}
  @media (max-width:560px),(max-height:560px){ .speed-pick .sp{padding:4px 8px;font-size:10.5px} .speed-pick .slab{display:none} }
  /* ===== 좁거나(세로폰) 낮은(가로폰) 화면: 상단바 컴팩트 + 패딩 축소 → 인라인 게임 최대 확대 ===== */
  @media (max-width:560px),(max-height:560px){
    .game-topbar{padding:6px 12px;gap:8px}
    .game-topbar .back,.game-topbar .next{padding:6px 12px;font-size:12px}
    .game-scorebar{padding:5px 12px;gap:10px;font-size:12px}
    #game-area{padding:10px}
  }
  /* brick/fill: 내용 세로 가운데 정렬 (위/아래 빈공간 균형) · match/balloon: 자식이 flex:1 로 채움 */
  #game-area.area-center{justify-content:center}
</style>
</head>
<body>
<div id="app">

  <!-- ===== 메뉴 ===== -->
  <div id="hub-menu">
    <div class="hub-head">
      <div class="brand">MANGOI · LEARNING GAMES</div>
      <h1>영어 <span class="em">학습 게임</span> 🎮</h1>
      <div class="sub">재미있는 게임을 통해 오늘 배운 단어·문장을 다시 예복습해요!<br>원하는 게임을 눌러 바로 플레이하세요.</div>
      <!-- 🔥 학습 불꽃 배지: 게임 하나라도 정답/클리어하면 오늘 달성으로 켜진다 -->
      <div id="streak-badge-hub" style="margin-top:14px"></div>
      <!-- ⚡ 게임 속도(난이도) 5단계 — 모든 게임에 공통 적용 -->
      <div class="speed-pick" id="speed-pick-hub" style="margin-top:14px"></div>
      <!-- 📚 로그인 학생의 교재/레벨 맞춤 출제 표시 (game-vocab.js 로드 성공 시) -->
      <div id="vocab-src-badge" style="display:none;margin:10px auto 0;padding:6px 16px;border-radius:999px;
        background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.4);color:#34d399;
        font-size:13px;font-weight:700;width:fit-content"></div>
    </div>
    <div class="game-grid" id="game-grid"><!-- JS 렌더 --></div>
  </div>

  <!-- ===== 게임 화면 ===== -->
  <div id="hub-game">
    <div class="game-topbar">
      <button class="back" onclick="hubBackToMenu()">← 게임 선택</button>
      <span class="gname" id="hub-gname">게임</span>
      <!-- 게임 중에도 작게 불꽃 상태 노출 -->
      <span id="streak-badge-game" style="margin-left:8px"></span>
      <!-- ⚡ 게임 중 속도(난이도) 변경 — 인라인 게임은 다음 라운드부터, iframe 게임은 재시작 적용 -->
      <span class="speed-pick" id="speed-pick-game" style="margin-left:8px"></span>
      <button class="next" id="hub-next" onclick="gameNextRound()">🔄 다음 문제</button>
    </div>
    <div class="game-scorebar" id="hub-scorebar">
      <span>🏆 점수: <b id="game-score" style="color:var(--gold)">0</b></span>
      <span>✅ 정답: <b id="game-correct" style="color:var(--emerald)">0</b><span style="opacity:.6">/10</span></span>
      <span>❌ 오답: <b id="game-wrong" style="color:var(--bad)">0</b></span>
      <span id="game-timer-wrap" style="display:none">⏱ <b id="game-timer" style="color:#7fd1ff">0</b>초</span>
      <span id="game-feedback" style="margin-left:auto;font-weight:700">&nbsp;</span>
    </div>
    <div id="game-area"><!-- 게임 본체 --></div>
  </div>

</div>

<script src="/js/game-vocab.js"></script>
<script>
/* ============================================================
   게임 데이터 + 상태 (index.html 게임 탭과 동일)
   · 아래 기본 어휘는 폴백 — 로그인 학생이면 game-vocab.js 가
     교재/레벨 맞춤 문장·단어로 내용을 교체한다.
   ============================================================ */
const _GAME_VOCAB = [
  { en: 'I love mango fruit.',           ko: '나는 망고 과일을 좋아해요.',         words: ['I','love','mango','fruit'] },
  { en: 'She is reading a book.',        ko: '그녀는 책을 읽고 있어요.',           words: ['She','is','reading','a','book'] },
  { en: 'We go to school every day.',    ko: '우리는 매일 학교에 가요.',           words: ['We','go','to','school','every','day'] },
  { en: 'My dog is very cute.',          ko: '내 강아지는 매우 귀여워요.',         words: ['My','dog','is','very','cute'] },
  { en: 'The sun is shining brightly.',  ko: '태양이 밝게 빛나고 있어요.',         words: ['The','sun','is','shining','brightly'] },
  { en: 'He plays soccer on Sundays.',   ko: '그는 일요일에 축구를 해요.',         words: ['He','plays','soccer','on','Sundays'] },
  { en: 'I like to eat pizza.',          ko: '나는 피자 먹는 것을 좋아해요.',     words: ['I','like','to','eat','pizza'] },
  { en: 'They are good friends.',        ko: '그들은 좋은 친구입니다.',           words: ['They','are','good','friends'] }
];
const _GAME_WORDS = [
  { en:'apple', ko:'사과' }, { en:'book', ko:'책' }, { en:'cat', ko:'고양이' },
  { en:'dog', ko:'강아지' }, { en:'flower', ko:'꽃' }, { en:'hello', ko:'안녕' },
  { en:'school', ko:'학교' }, { en:'water', ko:'물' }, { en:'sun', ko:'태양' },
  { en:'moon', ko:'달' }, { en:'star', ko:'별' }, { en:'love', ko:'사랑' }
];
const _gameState = { mode: 'brick', score: 0, correct: 0, wrong: 0, current: null, started: false, balloonTimer: null, roundTimer: null };

/* ============================================================
   🎯 목표: 10개 정답 → 결과 화면 (모든 인라인 게임 공통)
   ============================================================ */
const GAME_GOAL = 10;
function _gameCheckGoal(){
  // 정답 처리 직후 호출 — 10개 채우면 결과 화면으로 (true 반환 = 다음 라운드 중단)
  if(_gameState.correct < GAME_GOAL) return false;
  setTimeout(_gameShowResult, 1100);
  return true;
}
function _gameShowResult(){
  _stopRoundTimer();
  if(_gameState.balloonTimer){ clearInterval(_gameState.balloonTimer); _gameState.balloonTimer = null; }
  try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(_){}
  _gameState.started = false;
  var tot = _gameState.correct + _gameState.wrong;
  var acc = tot > 0 ? Math.round(100 * _gameState.correct / tot) : 100;
  var stars = acc >= 90 ? '⭐⭐⭐' : acc >= 70 ? '⭐⭐' : '⭐';
  var src = window._STUDENT_VOCAB && (_STUDENT_VOCAB.textbook || _STUDENT_VOCAB.level)
    ? '<div style="font-size:13px;color:#94a3b8;margin-top:8px">📚 ' + (_STUDENT_VOCAB.textbook || '') + (_STUDENT_VOCAB.level ? ' · ' + _STUDENT_VOCAB.level : '') + ' 맞춤 문제</div>' : '';
  document.getElementById('game-area').innerHTML =
    '<div style="text-align:center;max-width:520px;margin:0 auto;padding:20px">' +
      '<div style="font-size:56px;margin-bottom:6px">🏆</div>' +
      '<div style="font-size:30px;font-weight:800;color:#fbbf24;margin-bottom:4px">10문제 완료!</div>' +
      '<div style="font-size:26px;margin-bottom:14px">' + stars + '</div>' +
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:6px">' +
        '<div style="background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.35);border-radius:12px;padding:12px 20px"><div style="font-size:12px;color:#94a3b8">점수</div><div style="font-size:26px;font-weight:800;color:#fbbf24">' + _gameState.score + '</div></div>' +
        '<div style="background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.35);border-radius:12px;padding:12px 20px"><div style="font-size:12px;color:#94a3b8">정답</div><div style="font-size:26px;font-weight:800;color:#10b981">' + _gameState.correct + '</div></div>' +
        '<div style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);border-radius:12px;padding:12px 20px"><div style="font-size:12px;color:#94a3b8">오답</div><div style="font-size:26px;font-weight:800;color:#ef4444">' + _gameState.wrong + '</div></div>' +
        '<div style="background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.35);border-radius:12px;padding:12px 20px"><div style="font-size:12px;color:#94a3b8">정확도</div><div style="font-size:26px;font-weight:800;color:#38bdf8">' + acc + '%</div></div>' +
      '</div>' + src +
      '<div style="display:flex;gap:12px;justify-content:center;margin-top:20px">' +
        '<button onclick="gameInit()" style="padding:14px 28px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:0;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(16,185,129,.4)">🔄 다시 하기</button>' +
        '<button onclick="hubBackToMenu()" style="padding:14px 28px;background:rgba(148,163,184,.2);color:#e2e8f0;border:0;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer">🎮 게임 목록</button>' +
      '</div>' +
    '</div>';
  var fb = document.getElementById('game-feedback'); if(fb) fb.innerHTML = '<span style="color:#fbbf24">🏆 10문제 달성!</span>';
  var tw = document.getElementById('game-timer-wrap'); if(tw) tw.style.display = 'none';
}

/* ============================================================
   📚 로그인 학생의 교재/레벨 맞춤 어휘 로드 (실패/비로그인 → 기본 어휘 유지)
   ============================================================ */
if (window.MangoiGameVocab){
  MangoiGameVocab.load().then(function(d){
    if(!d) return;
    window._STUDENT_VOCAB = d;
    if(d.sentences.length >= 3){ _GAME_VOCAB.length = 0; d.sentences.forEach(function(s){ _GAME_VOCAB.push(s); }); }
    if(d.words.length >= 6){ _GAME_WORDS.length = 0; d.words.forEach(function(w){ _GAME_WORDS.push(w); }); }
    var el = document.getElementById('vocab-src-badge');
    if(el && (d.textbook || d.level)){
      el.textContent = '📚 ' + (d.textbook || '') + (d.level ? ' · ' + d.level : '') + ' 맞춤 출제 중';
      el.style.display = 'block';
    }
  });
}

/* ============================================================
   ⚡ 게임 속도(난이도) 5단계 — 모든 게임 공통
   · localStorage('mangoi_game_speed') 에 저장, iframe 게임엔 ?speed=1..5 로 전달
   · 인라인: 벽돌/빈칸/매칭 = 라운드 제한시간, 풍선 = 낙하 속도
   ============================================================ */
const SPEED_LEVELS = [
  { lvl:1, ico:'🐢', name:'아주 천천히', mult:0.5  },
  { lvl:2, ico:'🚶', name:'천천히',     mult:0.75 },
  { lvl:3, ico:'🙂', name:'보통',       mult:1    },
  { lvl:4, ico:'🏃', name:'빨리',       mult:1.4  },
  { lvl:5, ico:'🚀', name:'아주 빨리',  mult:1.9  }
];
var _speedLvl = (function(){ try{ var v=parseInt(localStorage.getItem('mangoi_game_speed'),10); return (v>=1&&v<=5)?v:3; }catch(_){ return 3; } })();
function _speedMult(){ return SPEED_LEVELS[_speedLvl-1].mult; }
// 라운드 제한시간(초) — 보통(🙂) 기준. 속도 빠를수록 시간 짧아짐(난이도↑)
const ROUND_TIME = { brick:50, fill:25, match:80 };

function renderSpeedPicks(){
  ['speed-pick-hub','speed-pick-game'].forEach(function(id){
    var el = document.getElementById(id); if(!el) return;
    var compact = (id==='speed-pick-game');
    el.innerHTML = (compact?'':'<span class="slab">⚡ 게임 속도</span>')
      + SPEED_LEVELS.map(function(s){
        return '<button class="sp'+(s.lvl===_speedLvl?' on':'')+'" onclick="setGameSpeed('+s.lvl+')" title="'+s.name+'">'
          + s.ico + (compact?'':' '+s.name) + '</button>';
      }).join('');
  });
}
function setGameSpeed(lvl){
  if(!(lvl>=1&&lvl<=5)) lvl=3;
  _speedLvl = lvl;
  try{ localStorage.setItem('mangoi_game_speed', String(lvl)); }catch(_){}
  renderSpeedPicks();
  // 게임 중이면 즉시 반영: iframe 게임은 새 속도로 재시작, 인라인은 새 라운드부터
  var gameOpen = document.getElementById('hub-game').classList.contains('active');
  if(!gameOpen) return;
  var g = _hubGame(_gameState.mode); if(!g) return;
  if(g.kind === 'iframe'){
    document.getElementById('game-area').innerHTML =
      '<iframe src="'+_hubIframeSrc(g)+'" allow="microphone; autoplay; speaker-selection"></iframe>';
  } else if(_gameState.started){
    gameNextRound();
  }
}
// iframe 게임 src 에 속도/학생/목표 파라미터 부착 — 게임 쪽에서 교재 맞춤 문장 로드 + 10개 정답 결과에 사용
function _hubIframeSrc(g){
  var sentence = _GAME_VOCAB[Math.floor(Math.random()*_GAME_VOCAB.length)].en;
  var src = g.src(sentence);
  src += (src.indexOf('?')>=0?'&':'?') + 'speed=' + _speedLvl + '&goal=10';
  try{ var uid = window.MangoiGameVocab && MangoiGameVocab.getUserId(); if(uid) src += '&uid=' + encodeURIComponent(uid); }catch(_){}
  return src;
}

/* ── 라운드 제한시간 타이머 (벽돌/빈칸/매칭) ── */
function _stopRoundTimer(){
  if(_gameState.roundTimer){ clearInterval(_gameState.roundTimer); _gameState.roundTimer = null; }
}
function _startRoundTimer(){
  _stopRoundTimer();
  var wrap = document.getElementById('game-timer-wrap');
  var base = ROUND_TIME[_gameState.mode];
  if(!base){ if(wrap) wrap.style.display='none'; return; }   // 풍선 등: 시간제한 없음(낙하속도가 난이도)
  var secs = Math.max(5, Math.round(base / _speedMult()));
  var tEl = document.getElementById('game-timer');
  if(wrap) wrap.style.display='inline';
  if(tEl) tEl.textContent = secs;
  _gameState.roundTimer = setInterval(function(){
    secs--;
    if(tEl) tEl.textContent = Math.max(0,secs);
    if(tEl) tEl.style.color = secs<=5 ? 'var(--bad)' : '#7fd1ff';
    if(secs<=0){
      _stopRoundTimer();
      _gameState.wrong++; _gameUpdateScore();
      var fb=document.getElementById('game-feedback');
      if(fb) fb.innerHTML='<span style="color:#ef4444">⏰ 시간 초과! 다음 문제로…</span>';
      setTimeout(gameNextRound, 1500);
    }
  }, 1000);
}

/* ============================================================
   공용 유틸 (index.html 게임 탭과 동일)
   ============================================================ */
function _gameShuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function _gameUpdateScore(){
  document.getElementById('game-score').textContent = _gameState.score;
  document.getElementById('game-correct').textContent = _gameState.correct;
  document.getElementById('game-wrong').textContent = _gameState.wrong;
}

/* ===== 🔊 원어민 발음 (TTS) — index.html 과 동일 로직 ===== */
var _gameEnVoice = null;
function _gameScoreVoice(v){
  var n=(v.name||'').toLowerCase(), lang=(v.lang||'').toLowerCase(), s=0;
  if(lang==='en-us') s+=40; else if(lang==='en-gb'||lang==='en-au') s+=28;
  else if(lang.slice(0,2)==='en') s+=18; else s-=120;
  if(/natural|neural/.test(n)) s+=70;
  if(/google/.test(n)) s+=60;
  if(/\b(aria|jenny|guy|ava|emma|libby|michelle|jane|nova|sara|brian|christopher)\b/.test(n)) s+=48;
  if(/\b(samantha|alex|allison|ava|tom|siri|nicky|evan|joelle|nathan)\b/.test(n)) s+=46;
  if(/online/.test(n)) s+=24;
  if(/premium|enhanced|plus/.test(n)) s+=24;
  if(v.localService===false) s+=30;
  if(/zira|david|mark|hazel|george|susan|catherine|linda|richard|sean|heera|ravi/.test(n)) s-=55;
  if(/desktop|compact|espeak|pico|microsoft server/.test(n)) s-=45;
  if(/zarvox|albert|bahh|bells|boing|bubbles|cellos|trinoids|whisper|wobble|jester|organ|superstar|bad news|good news|deranged|hysterical|pipe|ralph|fred|junior|kathy/.test(n)) s-=90;
  return s;
}
function _gamePickVoice(){
  try{
    var vs=window.speechSynthesis.getVoices(); if(!vs.length) return;
    var en=vs.filter(function(v){ return (v.lang||'').slice(0,2).toLowerCase()==='en'; });
    if(!en.length){ _gameEnVoice=null; return; }
    var best=null, bs=-1e9;
    en.forEach(function(v){ var sc=_gameScoreVoice(v); if(sc>bs){ bs=sc; best=v; } });
    _gameEnVoice=best;
  }catch(_){}
}
try{ if(window.speechSynthesis){ _gamePickVoice(); window.speechSynthesis.onvoiceschanged=_gamePickVoice; } }catch(_){}
window.gameSpeak = function(text){ try{ if(!text) return; if(!_gameEnVoice) _gamePickVoice(); var u=new SpeechSynthesisUtterance(String(text)); u.lang=(_gameEnVoice&&_gameEnVoice.lang)||'en-US'; u.rate=0.95; u.pitch=1.02; if(_gameEnVoice) u.voice=_gameEnVoice; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);}catch(_){} };
window.gameSpeakBuilt = function(){ try{ var pk=(_gameState.current&&_gameState.current.picked)||[]; if(pk.length) gameSpeak(pk.join(' ')); }catch(_){} };
window.gameSpeakTarget = function(){ try{ var s=_gameState.current&&_gameState.current.sentence; if(s&&s.en) gameSpeak(s.en); }catch(_){} };   // 🎧 듣기형(번역 없음) 문제의 문장 듣기

    '</div>' +

  shuffled.forEach((w, i) => {

      'style="padding:clamp(12px,1.8vmin,22px) clamp(18px,2.6vmin,34px);background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border:0;border-radius:10px;font-size:clamp(18px,2.6vmin,34px);font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(59,130,246,0.4);transition:transform 0.15s">' + w + '</button>';

      '<button onclick="gameBrickReset()" style="padding:8px 18px;background:rgba(148,163,184,0.2);color:#cbd5e1;border:0;border-radius:8px;cursor:pointer;font-size:13px">↩ 다시</button>' +
      '<button onclick="gameSpeakBuilt()" style="padding:10px 20px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;border:0;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;box-shadow:0 4px 12px rgba(139,92,246,0.4)">🔊 발음 듣기</button>' +

function gameBrickPick(btn){
  const word = btn.dataset.word;
  _gameState.current.picked.push(word);
  try{ window.gameSpeak && gameSpeak(word); }catch(_){}
  btn.style.opacity = '0.3'; btn.disabled = true;

  const empty = document.getElementById('brick-empty');
  if (empty) empty.remove();

  span.textContent = word;
  span.style.cssText = 'padding:10px 18px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1f2937;border-radius:8px;font-size:clamp(16px,2.4vmin,30px);font-weight:700';
  built.appendChild(span);
}
function gameBrickReset(){ gameRenderBrick(); }
function gameBrickCheck(){
  const sent = _gameState.current.sentence;
  const picked = _gameState.current.picked;
  const correct = picked.length === sent.words.length &&
                  picked.every((w, i) => w === sent.words[i]);
  const fb = document.getElementById('game-feedback');
  if (correct){
    _stopRoundTimer();
    _gameState.score += 10; _gameState.correct++;
    try{ window.MangoiStreak && MangoiStreak.complete('brick'); }catch(_){}  // 🔥 오늘 학습 달성
    fb.innerHTML = '<span style="color:#10b981">✅ 정답! +10점</span>';
    try{ window.gameSpeak && gameSpeak(sent.en); }catch(_){}
    if(!_gameCheckGoal()) setTimeout(gameNextRound, 2200);   // 🎯 10개 정답 → 결과 화면
  } else {
    _gameState.wrong++;
    fb.innerHTML = '<span style="color:#ef4444">❌ 다시 시도! 정답: ' + sent.en + '</span>';
  }
  _gameUpdateScore();
}

/* ============================================================
   게임 2: 🧩 단어 매칭
   ============================================================ */
function gameRenderMatch(){
  const pool = _gameShuffle(_GAME_WORDS).slice(0, 6);
  const cards = [];
  pool.forEach((w, i) => {
    cards.push({ id: 'k' + i, type: 'ko', text: w.ko, pairId: i });
    cards.push({ id: 'e' + i, type: 'en', text: w.en, pairId: i });
  });
  const shuffled = _gameShuffle(cards);
  _gameState.current = { cards: shuffled, flipped: [], matched: new Set() };
  let html =
    '<div style="text-align:center;margin-bottom:18px">' +
      '<div style="font-size:13px;color:#94a3b8">🧩 한국어와 영어 카드 짝을 찾으세요!</div>' +
    '</div>' +
    '<div id="match-grid" style="display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:clamp(8px,1.4vmin,18px);width:100%;max-width:1200px;margin:0 auto;flex:1;min-height:0">';
  shuffled.forEach((c, i) => {
    const bg = c.type === 'ko' ? 'linear-gradient(135deg,#a855f7,#7c3aed)' : 'linear-gradient(135deg,#f59e0b,#ea580c)';
    html += '<div class="match-card" data-idx="' + i + '" data-pair="' + c.pairId + '" data-type="' + c.type + '" data-text="' + c.text + '" onclick="gameMatchFlip(this)" ' +
      'style="background:' + bg + ';border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:clamp(20px,3.4vmin,40px);font-weight:700;box-shadow:0 6px 18px rgba(0,0,0,0.3);transition:transform 0.2s;min-height:0">' +
      '<span style="font-size:clamp(32px,5vmin,60px)">?</span></div>';
  });
  html += '</div>' +
    '<div style="text-align:center;margin-top:18px;font-size:12px;color:#94a3b8">남은 페어: <b id="match-remaining" style="color:#fbbf24">' + pool.length + '</b></div>';
  document.getElementById('game-area').innerHTML = html;
}
function gameMatchFlip(card){
  if (card.dataset.flipped === '1' || card.dataset.matched === '1') return;
  if (_gameState.current.flipped.length >= 2) return;
  card.dataset.flipped = '1';
  card.innerHTML = '<span style="font-size:clamp(18px,3vmin,36px);padding:8px;text-align:center">' + card.dataset.text + '</span>';
  card.style.transform = 'scale(1.05)';
  if (card.dataset.type === 'en'){ try{ window.gameSpeak && gameSpeak(card.dataset.text); }catch(_){} }
  _gameState.current.flipped.push(card);
  if (_gameState.current.flipped.length === 2){
    const [a, b] = _gameState.current.flipped;
    if (a.dataset.pair === b.dataset.pair && a.dataset.type !== b.dataset.type){
      setTimeout(() => {
        a.dataset.matched = '1'; b.dataset.matched = '1';
        a.style.opacity = '0.5'; b.style.opacity = '0.5';
        a.style.transform = ''; b.style.transform = '';
        _gameState.current.matched.add(a.dataset.pair);
        _gameState.score += 5; _gameState.correct++;
        try{ window.MangoiStreak && MangoiStreak.complete('match'); }catch(_){}  // 🔥 오늘 학습 달성
        _gameState.current.flipped = [];
        _gameUpdateScore();
        const total = _gameState.current.cards.length / 2;
        const remEl = document.getElementById('match-remaining');
        if (remEl) remEl.textContent = (total - _gameState.current.matched.size);
        document.getElementById('game-feedback').innerHTML = '<span style="color:#10b981">✅ 매치! +5점</span>';
        if (_gameCheckGoal()) return;                         // 🎯 10개 정답 → 결과 화면
        if (_gameState.current.matched.size === total){
          _stopRoundTimer();
          document.getElementById('game-feedback').innerHTML = '<span style="color:#fbbf24">🏆 완료! 다음 게임으로...</span>';
          setTimeout(gameNextRound, 2000);
        }
      }, 400);
    } else {
      _gameState.wrong++;
      _gameUpdateScore();
      document.getElementById('game-feedback').innerHTML = '<span style="color:#ef4444">❌ 다시</span>';
      setTimeout(() => {
        a.dataset.flipped = '0'; b.dataset.flipped = '0';
        a.innerHTML = '<span style="font-size:28px">?</span>';
        b.innerHTML = '<span style="font-size:28px">?</span>';
        a.style.transform = ''; b.style.transform = '';
        _gameState.current.flipped = [];
      }, 800);
    }
  }
}

/* ============================================================
   게임 3: 🔤 빈칸 채우기
   ============================================================ */
function gameRenderFill(){
  const sent = _GAME_VOCAB[Math.floor(Math.random() * _GAME_VOCAB.length)];
  const meaningfulIdx = sent.words.findIndex(w => w.length > 2 && !['the','is','are','am','was','were','to','on','in','at','of'].includes(w.toLowerCase()));
  const blankIdx = meaningfulIdx >= 0 ? meaningfulIdx : Math.floor(sent.words.length / 2);
  const answer = sent.words[blankIdx];
  const allWords = _GAME_VOCAB.flatMap(s => s.words).filter(w => w.toLowerCase() !== answer.toLowerCase() && w.length > 2);
  const wrongs = _gameShuffle(allWords).slice(0, 3);
  const options = _gameShuffle([answer, ...wrongs]);
  _gameState.current = { answer, sentence: sent };
  const masked = sent.words.map((w, i) => i === blankIdx ? '___' : w).join(' ');
  // 교재 문장에 한국어 번역이 없으면 힌트 대신 🔊 문장 듣기 버튼 제공
  const fillHint = sent.ko
    ? '<div style="font-size:13px;color:#94a3b8;margin-bottom:6px">📝 한국어</div>' +
      '<div style="font-size:18px;color:#fbbf24;padding:10px 18px;background:rgba(251,191,36,0.1);border-radius:10px;display:inline-block">' + sent.ko + '</div>'
    : '<button onclick="gameSpeakTarget()" style="font-size:16px;font-weight:700;color:#fbbf24;padding:10px 20px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,.4);border-radius:10px;cursor:pointer;font-family:inherit">🔊 문장 듣기 (힌트)</button>';
  let html =
    '<div style="text-align:center;margin-bottom:20px">' + fillHint + '</div>' +
    '<div style="text-align:center;margin-bottom:24px">' +
      '<div style="font-size:13px;color:#94a3b8;margin-bottom:8px">🎯 빈칸에 들어갈 단어를 고르세요</div>' +
      '<div style="font-size:24px;font-weight:700;color:#f1f5f9;padding:18px 24px;background:rgba(15,23,42,0.7);border:2px solid #475569;border-radius:12px;display:inline-block;line-height:1.6">' +
        masked.replace('___', '<span style="background:#dc2626;color:#fff;padding:2px 16px;border-radius:6px;letter-spacing:2px;margin:0 4px">___</span>') +
      '</div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:560px;margin:0 auto">';
  options.forEach(opt => {

      'style="padding:18px 14px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;border:0;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(139,92,246,0.4);transition:all 0.15s">' + opt + '</button>';
  });
  html += '</div>';
  document.getElementById('game-area').innerHTML = html;
}
function gameFillCheck(picked, btn){
  const correct = picked.toLowerCase() === _gameState.current.answer.toLowerCase();
  const fb = document.getElementById('game-feedback');
  if (correct){
    _stopRoundTimer();
    btn.style.background = 'linear-gradient(135deg,#10b981,#059669)';
    btn.style.transform = 'scale(1.05)';
    _gameState.score += 8; _gameState.correct++;
    try{ window.MangoiStreak && MangoiStreak.complete('fill'); }catch(_){}  // 🔥 오늘 학습 달성
    fb.innerHTML = '<span style="color:#10b981">✅ 정답! +8점</span>';
    try{ window.gameSpeak && _gameState.current.sentence && gameSpeak(_gameState.current.sentence.en); }catch(_){}
    if(!_gameCheckGoal()) setTimeout(gameNextRound, 1900);   // 🎯 10개 정답 → 결과 화면
  } else {
    btn.style.background = 'linear-gradient(135deg,#dc2626,#991b1b)';
    btn.style.opacity = '0.4';

/* ============================================================
   게임 4: 🎈 풍선 터뜨리기
   ============================================================ */
function gameRenderBalloon(){
  const word = _GAME_WORDS[Math.floor(Math.random() * _GAME_WORDS.length)];
  const wrongs = _gameShuffle(_GAME_WORDS.filter(w => w.en !== word.en)).slice(0, 3);
  const balloons = _gameShuffle([word, ...wrongs]);

  let html =
    '<div style="text-align:center;margin-bottom:14px">' +
      '<div style="font-size:13px;color:#94a3b8">🎈 한국어 뜻에 맞는 영어 풍선을 클릭!</div>' +
      '<div style="font-size:34px;font-weight:700;color:#fbbf24;padding:14px 24px;background:rgba(251,191,36,0.12);border-radius:12px;display:inline-block;margin-top:10px">' + word.ko + '</div>' +
    '</div>' +
    '<div id="balloon-stage" style="position:relative;flex:1;min-height:200px;background:linear-gradient(180deg,#0c4a6e 0%,#0f172a 100%);border-radius:14px;overflow:hidden;border:2px solid #475569">';
  const colors = [
    {bg:'linear-gradient(135deg,#ef4444,#b91c1c)', shadow:'rgba(239,68,68,0.6)', solid:'#ef4444'},
    {bg:'linear-gradient(135deg,#3b82f6,#1d4ed8)', shadow:'rgba(59,130,246,0.6)', solid:'#3b82f6'},
    {bg:'linear-gradient(135deg,#10b981,#047857)', shadow:'rgba(16,185,129,0.6)', solid:'#10b981'},
    {bg:'linear-gradient(135deg,#f59e0b,#d97706)', shadow:'rgba(245,158,11,0.6)', solid:'#f59e0b'}
  ];
  balloons.forEach((b, i) => {
    const left = 5 + i * 22;
    const startTop = -80 - (i * 60);
    const c = colors[i];
    html += '<div class="balloon" data-en="' + b.en + '" data-color="' + c.solid + '" onclick="gameBalloonPop(this)" ' +
      'style="position:absolute;top:' + startTop + 'px;left:' + left + '%;width:clamp(96px,15vmin,168px);height:clamp(116px,18vmin,200px);' +
      'background:' + c.bg + ';border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;' +
      'box-shadow:0 8px 30px ' + c.shadow + ', inset -10px -10px 30px rgba(0,0,0,0.2);' +
      'display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:clamp(18px,2.6vmin,30px);cursor:pointer;' +
      'transition:transform 0.2s">' +
      b.en +
      '<div style="position:absolute;bottom:-30px;left:50%;width:2px;height:30px;background:rgba(255,255,255,0.3);transform:translateX(-50%)"></div>' +
      '</div>';
  });
  html += '</div>' +
    '<div style="text-align:center;margin-top:10px;font-size:12px;color:#94a3b8">⏱ 풍선이 바닥에 닿기 전에 정답을 클릭!</div>';
  document.getElementById('game-area').innerHTML = html;

  let elapsed = 0;
  const SPEED = 3.5 * _speedMult();   // ⚡ 속도(난이도) 5단계에 따라 낙하 속도 변화
  if (_gameState.balloonTimer) clearInterval(_gameState.balloonTimer);
  _gameState.balloonTimer = setInterval(() => {
    if (_gameState.current.popped) return;
    elapsed += 50;
    const stage = document.getElementById('balloon-stage');
    if (!stage){ clearInterval(_gameState.balloonTimer); return; }
    const balloons = stage.querySelectorAll('.balloon');
    let allFell = false;
    const bottomY = Math.max(220, stage.clientHeight - 120);   // 바닥선: 늘어난 스테이지 높이에 맞춤(낙하속도·점수 로직은 그대로)
    balloons.forEach(bl => {
      const top = parseFloat(bl.style.top);
      const newTop = top + SPEED;
      bl.style.top = newTop + 'px';
      if (newTop > bottomY) allFell = true;
    });
    if (allFell && !_gameState.current.popped){
      _gameState.current.popped = true;
      _gameState.wrong++;
      _gameUpdateScore();
      document.getElementById('game-feedback').innerHTML = '<span style="color:#ef4444">❌ 시간 초과! 정답: ' + _gameState.current.answer + '</span>';
      clearInterval(_gameState.balloonTimer);
      setTimeout(gameNextRound, 1500);
    }
  }, 50);
}
function gameBalloonPopSound(){
  try{
    var AC = window.AudioContext||window.webkitAudioContext; if(!AC) return;
    if(!window._gameAC) window._gameAC = new AC();
    var ac = window._gameAC; if(ac.state==='suspended'){ try{ ac.resume(); }catch(_){} }
    var t = ac.currentTime;
    // 리미터(컴프레서)+메이크업 게인 → 훨씬 크되 클리핑 방지
    var comp=ac.createDynamicsCompressor(); try{comp.threshold.value=-12;comp.knee.value=6;comp.ratio.value=16;comp.attack.value=0.001;comp.release.value=0.25;}catch(_){}
    var mk=ac.createGain(); mk.gain.value=3.4; comp.connect(mk); mk.connect(ac.destination);   // 메이크업 게인↑ (리미터로 클리핑 방지, 더 크게)
    var dur=0.2, len=Math.floor(ac.sampleRate*dur), buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0);
    for(var i=0;i<len;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.4); }
    var src=ac.createBufferSource(); src.buffer=buf;
    var hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=500;
    var ng=ac.createGain(); ng.gain.setValueAtTime(0.0001,t); ng.gain.exponentialRampToValueAtTime(1.7,t+0.004); ng.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(hp); hp.connect(ng); ng.connect(comp); src.start(t); src.stop(t+dur);
    var o=ac.createOscillator(), og=ac.createGain();
    o.type='sine'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(60,t+0.13);
    og.gain.setValueAtTime(0.0001,t); og.gain.exponentialRampToValueAtTime(1.5,t+0.004); og.gain.exponentialRampToValueAtTime(0.0001,t+0.17);
    o.connect(og); og.connect(comp); o.start(t); o.stop(t+0.2);
    var o2=ac.createOscillator(), og2=ac.createGain();
    o2.type='triangle'; o2.frequency.setValueAtTime(900,t); o2.frequency.exponentialRampToValueAtTime(180,t+0.08);
    og2.gain.setValueAtTime(0.0001,t); og2.gain.exponentialRampToValueAtTime(0.9,t+0.004); og2.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
    o2.connect(og2); og2.connect(comp); o2.start(t); o2.stop(t+0.12);
  }catch(_){}
}
// 🎈 풍선 터질 때 산산조각: 고무 조각+가루 파편이 사방으로 흩어지며 페이드아웃 + 살짝 플래시
function gameBalloonBurst(stage, cx, cy, color){
  try{
    if(!stage) return; var frags=[], N=22;
    for(var i=0;i<N;i++){
      var el=document.createElement('div'), shard=(i%3!==0), sz=shard?(6+Math.random()*11):(3+Math.random()*4);
      el.style.cssText='position:absolute;left:'+cx+'px;top:'+cy+'px;width:'+sz+'px;height:'+(shard?(sz*0.66):sz)+'px;background:'+color+';'+(shard?('border-radius:'+(Math.random()<0.5?'2px':'50% 50% 0 50%')):'border-radius:50%')+';pointer-events:none;will-change:transform,opacity;box-shadow:0 0 5px '+color+';z-index:6';
      stage.appendChild(el);
      var ang=Math.random()*Math.PI*2, sp=3.5+Math.random()*8.5;
      frags.push({el:el,x:cx,y:cy,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-2.5,rot:Math.random()*360,vrot:(Math.random()-0.5)*44});
    }
    var fr=0, MAX=44;
    (function step(){ fr++; var p=fr/MAX;
      for(var i=0;i<frags.length;i++){ var f=frags[i]; f.vy+=0.6; f.x+=f.vx; f.y+=f.vy; f.rot+=f.vrot;
        f.el.style.transform='translate('+(f.x-cx)+'px,'+(f.y-cy)+'px) rotate('+f.rot+'deg)'; f.el.style.opacity=String(Math.max(0,1-p*1.05)); }
      if(fr<MAX){ requestAnimationFrame(step); } else { for(var j=0;j<frags.length;j++){ var e=frags[j].el; if(e.parentNode) e.parentNode.removeChild(e); } }
    })();
    var fl=document.createElement('div'); fl.style.cssText='position:absolute;left:'+(cx-45)+'px;top:'+(cy-45)+'px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,'+color+'cc,transparent 70%);pointer-events:none;z-index:5;opacity:0.85';
    stage.appendChild(fl); var ff=0;
    (function flStep(){ ff++; fl.style.opacity=String(Math.max(0,0.85*(1-ff/14))); fl.style.transform='scale('+(1+ff*0.14)+')'; if(ff<14){ requestAnimationFrame(flStep); } else if(fl.parentNode){ fl.parentNode.removeChild(fl); } })();
  }catch(_){}
}
function gameBalloonPop(bl){
  if (_gameState.current.popped) return;
  _gameState.current.popped = true;
  const en = bl.dataset.en;
  gameBalloonPopSound();
  setTimeout(function(){ try{ window.gameSpeak && gameSpeak(en); }catch(_){} }, 320);
  const correct = en === _gameState.current.answer;
  try{ var _bst=document.getElementById('balloon-stage'); if(_bst){ var _cx=bl.offsetLeft+bl.offsetWidth/2, _cy=bl.offsetTop+bl.offsetHeight/2; gameBalloonBurst(_bst,_cx,_cy,bl.dataset.color||'#ef4444'); } }catch(_){}  // 산산조각 파편
  bl.style.transform = 'scale(1.3)';
  bl.style.opacity = '0';
  if (_gameState.balloonTimer) clearInterval(_gameState.balloonTimer);
  if (correct){
    _gameState.score += 7; _gameState.correct++;
    try{ window.MangoiStreak && MangoiStreak.complete('balloon'); }catch(_){}  // 🔥 오늘 학습 달성
    document.getElementById('game-feedback').innerHTML = '<span style="color:#10b981">🎉 풍! +7점</span>';
    if(!_gameCheckGoal()) setTimeout(gameNextRound, 1200);   // 🎯 10개 정답 → 결과 화면
  } else {
    _gameState.wrong++;
    document.getElementById('game-feedback').innerHTML = '<span style="color:#ef4444">❌ 틀림! 정답: ' + _gameState.current.answer + '</span>';
    setTimeout(gameNextRound, 1500);
  }
  _gameUpdateScore();
}

/* ============================================================
   iframe(슈팅/낚시) 게임 → 점수 반영
   ============================================================ */
window.addEventListener('message', function (ev){
  const d = ev && ev.data;
  if (!d || typeof d !== 'object' || !d.type) return;
  if (d.type === 'mangoi-game-back'){ hubBackToMenu(); return; }   // ← 게임 내부 뒤로가기 버튼
  if (d.type === 'mangoi-game-complete'){
    _gameState.score += (d.score || 0);
    _gameState.correct += 1;
    try{ window.MangoiStreak && MangoiStreak.complete('iframe'); }catch(_){}  // 🔥 오늘 학습 달성(배틀/낚시/슈팅 미션 완료)
  }
});
