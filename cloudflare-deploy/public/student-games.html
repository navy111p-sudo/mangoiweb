<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>영어 학습 게임 — Mangoi 화상영어</title>
<!--
  ============================================================================
   🎮 학생게임 허브 (Student Games Hub)  — single-file HTML + CSS + JS
   ----------------------------------------------------------------------------
   수업 입장 화면(index.html)의 🎮 학생게임 탭에 있는 7가지 게임을 한 페이지에
   카드로 모아 누르면 바로 플레이하게 한다.
     1) 🎣 낚시+말하기    → english-mastery-suite.html?game=fish  (iframe)
     2) 🚀 슈팅+말하기    → english-mastery-suite.html?game=shoot (iframe)
     3) 🔫 영어 슈팅      → student-game-shooter.html             (iframe)
     4) 🧱 문장 벽돌      → 인라인 렌더 (gameRenderBrick)
     5) 🧩 단어 매칭      → 인라인 렌더 (gameRenderMatch)
     6) 🔤 빈칸 채우기    → 인라인 렌더 (gameRenderFill)
     7) 🎈 풍선 터뜨리기  → 인라인 렌더 (gameRenderBalloon)
   인라인 게임 4종은 index.html 게임 탭에서 그대로 가져온 로직. 점수/원어민
   발음(TTS)/효과음 공유. iframe 게임 3종은 미션 완료 시 postMessage 로 점수 반영.
  ============================================================================
-->
<style>
  :root{
    --deepblue:#0b1b3a; --emerald:#10b981; --gold:#fbbf24;
    --good:#22c55e; --bad:#ef4444; --blue:#3b82f6;
    --tx:#e8f0ff; --sub:#9fb3d6; --line:rgba(255,255,255,.12); --panel:rgba(10,18,38,.72);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Noto Sans KR','Segoe UI',sans-serif;color:var(--tx);min-height:100dvh;
    background:radial-gradient(135% 105% at 50% -8%,#4b83e6 0%,#2a5fbd 38%,#173f8c 100%)}
  #app{position:relative;width:100%;min-height:100dvh;display:flex;flex-direction:column}
  /* 🌤️ 주니어 친화 허브 배경 장식 — 떠다니는 뭉게구름 + 반짝이는 별 (UI 뒤 은은하게) */
  #app::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-repeat:no-repeat;
    background-image:
      radial-gradient(ellipse 130px 46px at 12% 10%,rgba(255,255,255,.28),transparent),
      radial-gradient(ellipse 170px 54px at 86% 16%,rgba(255,255,255,.22),transparent),
      radial-gradient(ellipse 110px 40px at 62% 6%,rgba(255,255,255,.18),transparent),
      radial-gradient(circle,rgba(255,255,255,.7) 0 2px,transparent 3px),
      radial-gradient(circle,rgba(253,224,71,.8) 0 2.5px,transparent 3px),
      radial-gradient(circle,rgba(255,255,255,.6) 0 2px,transparent 3px),
      radial-gradient(circle,rgba(255,255,255,.55) 0 1.5px,transparent 2.5px);
    background-position:0 0,0 0,0 0,22% 34%,72% 44%,44% 58%,88% 70%;
    animation:gbFloat 7s ease-in-out infinite}
  #app > *{position:relative;z-index:1}

  /* ===== 헤더 ===== */
  .hub-head{text-align:center;padding:26px 16px 10px}
  .hub-head .brand{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--gold);margin-bottom:6px}
  .hub-head h1{font-size:25px;font-weight:900;line-height:1.25}
  .hub-head h1 .em{color:var(--emerald)}
  .hub-head .sub{font-size:13px;color:var(--sub);margin-top:8px;line-height:1.6}

  /* ===== 메뉴(카드 그리드) ===== */
  #hub-menu{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 16px 40px}
  .game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px;
    width:min(960px,100%);margin-top:10px}
  @media(max-width:430px){.game-grid{grid-template-columns:1fr 1fr;gap:12px}}
  .game-card{position:relative;cursor:pointer;border:1px solid var(--line);border-radius:18px;
    padding:20px 16px;text-align:center;color:var(--tx);background:rgba(255,255,255,.05);
    transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;gap:8px;min-height:168px;justify-content:center}
  .game-card::before{content:'';position:absolute;inset:0;background:var(--cardbg);opacity:.16;pointer-events:none}
  .game-card:hover{transform:translateY(-4px) scale(1.02);border-color:var(--gold);
    box-shadow:0 12px 30px rgba(0,0,0,.45)}
  .game-card:active{transform:scale(.98)}
  .game-card .ico{font-size:46px;line-height:1;filter:drop-shadow(0 3px 8px rgba(0,0,0,.45));position:relative}
  .game-card .ttl{font-size:16px;font-weight:800;position:relative}
  .game-card .dsc{font-size:11.5px;color:var(--sub);line-height:1.45;position:relative}
  .game-card .badge{position:absolute;top:10px;right:10px;font-size:9.5px;font-weight:800;letter-spacing:.5px;
    padding:3px 8px;border-radius:999px;background:rgba(16,185,129,.2);color:#6ee7b7;border:1px solid rgba(16,185,129,.4)}

  /* ===== 게임 화면 ===== */
  #hub-game{display:none;flex:1;flex-direction:column;min-height:100dvh}
  #hub-game.active{display:flex}
  .game-topbar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(10,18,38,.85);
    border-bottom:1px solid var(--line);flex-wrap:wrap;flex-shrink:0}
  .game-topbar .back{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--tx);
    padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .game-topbar .back:hover{background:rgba(251,191,36,.16);border-color:var(--gold)}
  .game-topbar .gname{font-size:15px;font-weight:800;color:var(--gold)}
  .game-topbar .next{margin-left:auto;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border:0;
    padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .game-scorebar{display:flex;gap:14px;align-items:center;padding:8px 14px;background:rgba(10,18,38,.7);
    border-bottom:1px solid var(--line);font-size:13px;color:#cbd5e1;flex-shrink:0;flex-wrap:wrap}
  #game-area{flex:1;min-height:0;overflow:auto;background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:24px;color:#f1f5f9;display:flex;flex-direction:column}
  #game-area iframe{width:100%;height:100%;flex:1;min-height:60vh;border:0;display:block;background:#081227}
  .game-iframewrap #game-area{padding:0}
  .brick-btn:hover{transform:scale(1.05)}
  .match-card:hover{transform:scale(1.04)}
  /* ===== ⚡ 게임 속도(난이도) 5단계 선택 ===== */
  /* ⚡ 속도 = 세그먼트(연결형) 컨트롤: 라벨 + 이모지 세그먼트 한 덩어리 */
  .speed-pick{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
  .speed-pick .slab{display:inline-flex;flex-direction:column;line-height:1.15;font-size:12px;color:var(--sub);font-weight:800;white-space:nowrap}
  .speed-pick .slab b{color:var(--gold);font-size:11px;font-weight:800}
  .seg{display:inline-flex;background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:3px;gap:2px}
  .speed-pick .sp{width:32px;height:30px;display:inline-flex;align-items:center;justify-content:center;
    background:transparent;border:0;color:var(--sub);border-radius:999px;font-size:15px;cursor:pointer;font-family:inherit;transition:.15s;padding:0}
  .speed-pick .sp:hover{background:rgba(255,255,255,.09)}
  .speed-pick .sp.on{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 3px 10px -2px rgba(16,185,129,.6)}
  .speed-pick .sp:active{transform:scale(.9)}
  @media (max-width:560px),(max-height:560px){ .speed-pick .sp{width:27px;height:27px;font-size:13.5px} .speed-pick .slab{display:none} }
  /* ===== 좁거나(세로폰) 낮은(가로폰) 화면: 상단바 컴팩트 + 패딩 축소 → 인라인 게임 최대 확대 ===== */
  @media (max-width:560px),(max-height:560px){
    .game-topbar{padding:6px 12px;gap:8px}
    .game-topbar .back,.game-topbar .next{padding:6px 12px;font-size:12px}
    .game-scorebar{padding:5px 12px;gap:10px;font-size:12px}
    #game-area{padding:10px}
  }
  /* brick/fill: 내용 세로 가운데 정렬 (위/아래 빈공간 균형) · match/balloon: 자식이 flex:1 로 채움 */
  #game-area.area-center{justify-content:center}

  /* ============================================================
     🎨 주니어 친화 게임별 배경 테마
     · 각 게임 성격에 맞는 밝고 알록달록한 컬러 배경 + 캐릭터별 장식 레이어
     · innerHTML 로 내용이 갈아끼워져도 #game-area 자체 배경/::before 는 유지됨
     · 채도 있는(너무 밝지 않은) 컬러라 기존 흰/회색 글자 가독성도 유지
     ============================================================ */
  #game-area{position:relative;transition:background .45s ease}
  #game-area::before{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
    background-repeat:no-repeat;opacity:0;transition:opacity .45s ease}
  #game-area.themed::before{opacity:1}
  #game-area > *{position:relative;z-index:1}
  @keyframes gbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
  @keyframes gbTwinkle{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.16);filter:brightness(1.35)}}
  @keyframes gbScroll{from{background-position-y:0}to{background-position-y:-41px}}
  @keyframes gbDriftX{0%{transform:translateX(-14px)}100%{transform:translateX(22px)}}
  @keyframes gbAurora{0%{transform:translate(0,0) scale(1)}50%{transform:translate(3%,2%) scale(1.13)}100%{transform:translate(-2%,-1%) scale(1.05)}}
  /* 🌈 움직이는 컬러 라이트(모든 인라인 게임 공통) — 은은하게 색이 흐름 */
  #game-area.themed::after{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;mix-blend-mode:screen;opacity:.45;
    background:radial-gradient(42% 34% at 12% 14%,rgba(255,255,255,.55),transparent 70%),
      radial-gradient(46% 38% at 88% 20%,rgba(255,240,180,.4),transparent 70%),
      radial-gradient(50% 42% at 52% 106%,rgba(180,240,255,.42),transparent 70%);
    animation:gbAurora 16s ease-in-out infinite alternate}

  /* 🧱 문장 벽돌 — 알록달록 장난감 블록 놀이터 (파랑→보라 + 떠다니는 블록) */
  #game-area.theme-brick{background:linear-gradient(165deg,#3b82f6 0%,#6366f1 55%,#8b5cf6 100%)}
  #game-area.theme-brick::before{
    background-image:
      linear-gradient(0deg,rgba(251,191,36,.30),rgba(251,191,36,.30)),
      linear-gradient(0deg,rgba(244,63,94,.28),rgba(244,63,94,.28)),
      linear-gradient(0deg,rgba(16,185,129,.30),rgba(16,185,129,.30)),
      linear-gradient(0deg,rgba(56,189,248,.30),rgba(56,189,248,.30)),
      linear-gradient(0deg,rgba(255,255,255,.16),rgba(255,255,255,.16));
    background-size:64px 42px,52px 34px,74px 48px,46px 30px,40px 26px;
    background-position:7% 16%,88% 12%,82% 86%,13% 84%,50% 6%;
    border-radius:14px;animation:gbFloat 5s ease-in-out infinite}

  /* 🧩 단어 매칭 — 반짝이는 마법/사탕 나라 (핑크→보라 + 별 반짝임) */
  #game-area.theme-match{background:linear-gradient(160deg,#ec4899 0%,#a855f7 55%,#7c3aed 100%)}
  #game-area.theme-match::before{
    background-image:
      radial-gradient(circle,rgba(255,255,255,.9) 0 4px,transparent 5px),
      radial-gradient(circle,rgba(253,224,71,.9) 0 5px,transparent 6px),
      radial-gradient(circle,rgba(255,255,255,.85) 0 3px,transparent 4px),
      radial-gradient(circle,rgba(253,224,71,.85) 0 4px,transparent 5px),
      radial-gradient(circle,rgba(255,255,255,.8) 0 3px,transparent 4px),
      radial-gradient(circle,rgba(255,255,255,.8) 0 4px,transparent 5px);
    background-position:12% 20%,84% 16%,70% 78%,22% 82%,48% 10%,90% 60%;
    animation:gbTwinkle 2.6s ease-in-out infinite}

  /* 🔤 빈칸 채우기 — 상큼한 공책/칠판 (초록 + 가로 노트 줄) */
  #game-area.theme-fill{background:linear-gradient(160deg,#10b981 0%,#0d9488 55%,#0e7490 100%)}
  #game-area.theme-fill::before{
    background-image:repeating-linear-gradient(0deg,transparent 0 39px,rgba(255,255,255,.10) 39px 41px);
    animation:gbScroll 7s linear infinite}

  /* 🎈 풍선 터뜨리기 — 파란 하늘 (구름은 아래 balloon-sky 스테이지에서) */
  #game-area.theme-balloon{background:linear-gradient(180deg,#2563eb 0%,#3b82f6 60%,#60a5fa 100%)}
  #game-area.theme-balloon::before{
    background-image:
      radial-gradient(ellipse 60px 26px at 14% 16%,rgba(255,255,255,.55),transparent),
      radial-gradient(ellipse 80px 30px at 84% 12%,rgba(255,255,255,.5),transparent),
      radial-gradient(ellipse 50px 22px at 60% 24%,rgba(255,255,255,.45),transparent);
    animation:gbDriftX 22s ease-in-out infinite alternate}

  /* iframe 게임 로딩 배경(대부분 iframe 이 덮지만 로딩 순간·레터박스 컬러) */
  #game-area.theme-fish{background:linear-gradient(180deg,#0891b2,#0e7490)}
  #game-area.theme-shoot{background:linear-gradient(160deg,#4f46e5,#7c3aed)}
  #game-area.theme-shooter{background:linear-gradient(160deg,#ef4444,#b91c1c)}
  #game-area.theme-battle3d{background:linear-gradient(160deg,#be123c,#7f1d1d)}
  #game-area.theme-suspect{background:linear-gradient(160deg,#4338ca,#312e81)}
  #game-area.theme-speaking{background:linear-gradient(160deg,#059669,#047857)}

  /* 🎈 풍선 스테이지 — 밤하늘 → 밝은 낮 하늘 + 뭉게구름 */
  .balloon-sky::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background-repeat:no-repeat;
    background-image:
      radial-gradient(ellipse 90px 34px at 18% 20%,rgba(255,255,255,.85),transparent),
      radial-gradient(ellipse 120px 40px at 78% 30%,rgba(255,255,255,.8),transparent),
      radial-gradient(ellipse 70px 28px at 50% 14%,rgba(255,255,255,.75),transparent),
      radial-gradient(ellipse 100px 36px at 40% 62%,rgba(255,255,255,.6),transparent);
    animation:gbDriftX 26s ease-in-out infinite alternate-reverse}
  .balloon-sky .balloon{z-index:2}
  /* 🎈 각 풍선 좌우 흔들림(제각각 폭·주기) — 따로따로 랜덤 낙하 느낌 */
  @keyframes balloonSway{from{transform:translateX(calc(var(--sway,1px) * -1))}to{transform:translateX(var(--sway,1px))}}
  /* ===== 🖥️ PC(넓은 화면) — 인라인 게임 중앙 글자·카드 약 30% 확대 (PC에서 작게 보이던 문제 개선) ===== */
  @media (min-width:820px){
    #game-area .brick-btn{font-size:clamp(24px,3.5vmin,46px)!important;padding:clamp(16px,2.4vmin,28px) clamp(24px,3.4vmin,44px)!important}
    #game-area .match-card{font-size:clamp(26px,4.4vmin,52px)!important}
    #game-area .match-card > span{font-size:clamp(42px,6.6vmin,78px)!important}
    #game-area .match-card div span{font-size:clamp(24px,4vmin,48px)!important}
    #game-area .balloon{font-size:clamp(24px,3.4vmin,40px)!important}
    #game-area .fill-sentence{font-size:32px!important;padding:22px 30px!important}
    #game-area [onclick^="gameFillCheck"]{font-size:24px!important;padding:22px 16px!important}
  }
  /* ===== 🌐 언어 선택(영어/중국어) ===== */
  /* 🌐 언어 = 세그먼트(연결형) 컨트롤 */
  .lang-pick{display:inline-flex;background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:3px;gap:2px}
  .lang-pick .lg{background:transparent;border:0;color:var(--sub);
    border-radius:999px;padding:7px 15px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:.18s}
  .lang-pick .lg:hover{background:rgba(255,255,255,.08)}
  .lang-pick .lg.on{background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff;box-shadow:0 3px 10px -2px rgba(56,189,248,.6)}
  .lang-pick .lg:active{transform:scale(.95)}
  /* 병음(pinyin) 표시 */
  .pinyin{color:#7dd3fc;font-weight:600;letter-spacing:.3px}

  /* ===== 🎛️ 허브 컨트롤 패널 — 산만한 버튼들을 하나의 글래스 카드로 정돈 ===== */
  .hub-panel{width:min(560px,100%);margin:16px auto 0;background:rgba(9,16,38,.42);
    border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:14px 16px;
    display:flex;flex-direction:column;gap:12px;backdrop-filter:blur(12px) saturate(130%);
    -webkit-backdrop-filter:blur(12px) saturate(130%);box-shadow:0 12px 34px -14px rgba(0,0,0,.6)}
  .hub-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .hub-row.center{justify-content:center}
  .hub-divider{height:1px;background:rgba(255,255,255,.09)}
  #streak-badge-hub:empty{display:none}

  /* ===== 💰 코인/룰렛/상점/랭킹 ===== */
  .fun-bar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
  .fun-actions{display:inline-flex;gap:6px;flex-wrap:wrap}
  .coin-wallet{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(251,191,36,.22),rgba(245,158,11,.12));
    border:1px solid rgba(251,191,36,.5);color:#fde68a;border-radius:12px;padding:7px 14px;font-size:14px;font-weight:800}
  .coin-wallet b{color:#fbbf24;font-size:15px}
  .fun-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--tx);
    border-radius:12px;padding:7px 13px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s}
  .fun-btn:hover{background:rgba(56,189,248,.2);border-color:rgba(56,189,248,.5)}
  .fun-btn:active{transform:scale(.95)}
  #coin-fly{position:fixed;pointer-events:none;z-index:70;font-size:20px;font-weight:900;color:#fbbf24;text-shadow:0 2px 6px rgba(0,0,0,.6)}
  /* 모달 */
  .modal-back{position:fixed;inset:0;background:rgba(4,10,26,.72);z-index:80;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
  .modal-back.on{display:flex}
  .modal{background:linear-gradient(160deg,#16294d,#0b1b3a);border:1px solid var(--line);border-radius:20px;
    max-width:440px;width:100%;max-height:86vh;overflow:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal h2{margin:0 0 4px;font-size:20px;font-weight:900;text-align:center}
  .modal .msub{text-align:center;color:var(--sub);font-size:13px;margin-bottom:14px}
  .modal .mclose{display:block;margin:16px auto 0;background:rgba(255,255,255,.1);border:1px solid var(--line);
    color:var(--tx);border-radius:12px;padding:11px 26px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
  /* 룰렛 */
  #wheel{width:210px;height:210px;border-radius:50%;margin:6px auto;position:relative;border:6px solid #fbbf24;
    box-shadow:0 0 0 4px #7c5b12,0 8px 26px rgba(0,0,0,.5);transition:transform 3.6s cubic-bezier(.16,.84,.3,1)}
  #wheel .seg{position:absolute;inset:0;clip-path:polygon(50% 50%,50% 0,100% 0);transform-origin:50% 50%;display:flex;justify-content:center;padding-top:14px}

<script>
/* ============================================================
   게임 데이터 + 상태 (index.html 게임 탭과 동일)
   · 아래 기본 어휘는 폴백 — 로그인 학생이면 game-vocab.js 가

/* 🇬🇧 영어 기본 어휘(폴백) */
const _EN_VOCAB = [

  { en: 'She wants to be a famous scientist someday.',    ko: '그녀는 언젠가 유명한 과학자가 되고 싶어해요.', words: ['She','wants','to','be','a','famous','scientist','someday'] },
  { en: 'We should always be kind to our friends.',       ko: '우리는 친구들에게 항상 친절해야 해요.',     words: ['We','should','always','be','kind','to','our','friends'] },

];
const _EN_WORDS = [
  { en:'apple', ko:'사과' }, { en:'book', ko:'책' }, { en:'cat', ko:'고양이' },
  { en:'dog', ko:'강아지' }, { en:'flower', ko:'꽃' }, { en:'hello', ko:'안녕' },
  { en:'school', ko:'학교' }, { en:'water', ko:'물' }, { en:'sun', ko:'태양' },
  { en:'moon', ko:'달' }, { en:'star', ko:'별' }, { en:'love', ko:'사랑' },
  // 🎢 상위 난이도(6~7단계)용 — 더 길고 어려운 단어
  { en:'beautiful', ko:'아름다운' }, { en:'delicious', ko:'맛있는' }, { en:'important', ko:'중요한' },
  { en:'together', ko:'함께' }, { en:'adventure', ko:'모험' }, { en:'vacation', ko:'방학' }
];

/* 🇨🇳 중국어(다락원 중국어 마스터 수준) 어휘 — en 필드에 한자, pinyin 병음, ko 한국어 뜻.
   문장의 words[] 는 한자를 단어 단위로 미리 분절(중국어는 띄어쓰기가 없으므로). */
const _ZH_VOCAB = [
  { en:'我爱你。',        pinyin:'Wǒ ài nǐ.',              ko:'나는 너를 사랑해.',        words:['我','爱','你'] },
  { en:'你好吗？',        pinyin:'Nǐ hǎo ma?',             ko:'잘 지내니?',              words:['你','好','吗'] },
  { en:'我是学生。',      pinyin:'Wǒ shì xuésheng.',       ko:'나는 학생이에요.',        words:['我','是','学生'] },
  { en:'今天天气很好。',  pinyin:'Jīntiān tiānqì hěn hǎo.',ko:'오늘 날씨가 좋아요.',      words:['今天','天气','很','好'] },
  { en:'我喜欢吃苹果。',  pinyin:'Wǒ xǐhuan chī píngguǒ.', ko:'나는 사과 먹는 걸 좋아해요.',words:['我','喜欢','吃','苹果'] },
  { en:'他每天去学校。',  pinyin:'Tā měitiān qù xuéxiào.', ko:'그는 매일 학교에 가요.',    words:['他','每天','去','学校'] },
  { en:'这是我的朋友。',  pinyin:'Zhè shì wǒ de péngyou.', ko:'이 사람은 내 친구예요.',    words:['这','是','我的','朋友'] },
  { en:'我想喝水。',      pinyin:'Wǒ xiǎng hē shuǐ.',      ko:'나는 물을 마시고 싶어요.',  words:['我','想','喝','水'] },
  // 🎢 상위 난이도(6~7단계)용 — 더 길고 어려운 문장
  { en:'昨天我和家人去了海边。',   pinyin:'Zuótiān wǒ hé jiārén qùle hǎibiān.', ko:'어제 나는 가족과 바닷가에 갔어요.', words:['昨天','我','和','家人','去了','海边'] },
  { en:'她将来想当医生。',         pinyin:'Tā jiānglái xiǎng dāng yīshēng.',    ko:'그녀는 장래에 의사가 되고 싶어해요.', words:['她','将来','想','当','医生'] },
  { en:'我们应该对朋友友好。',     pinyin:'Wǒmen yīnggāi duì péngyou yǒuhǎo.',  ko:'우리는 친구에게 친절해야 해요.',   words:['我们','应该','对','朋友','友好'] },
  { en:'学生们正在一起学习汉语。', pinyin:'Xuéshengmen zhèngzài yìqǐ xuéxí Hànyǔ.', ko:'학생들은 지금 함께 중국어를 공부하고 있어요.', words:['学生们','正在','一起','学习','汉语'] }
];
const _ZH_WORDS = [
  { en:'苹果', pinyin:'píngguǒ', ko:'사과' }, { en:'书',  pinyin:'shū',  ko:'책' },   { en:'猫', pinyin:'māo', ko:'고양이' },
  { en:'狗',   pinyin:'gǒu',     ko:'강아지' }, { en:'花', pinyin:'huā',  ko:'꽃' },   { en:'你好', pinyin:'nǐ hǎo', ko:'안녕' },
  { en:'学校', pinyin:'xuéxiào', ko:'학교' },   { en:'水',  pinyin:'shuǐ', ko:'물' },   { en:'太阳', pinyin:'tàiyáng', ko:'태양' },
  { en:'月亮', pinyin:'yuèliang',ko:'달' },     { en:'星星',pinyin:'xīngxing',ko:'별' },{ en:'爱', pinyin:'ài', ko:'사랑' },
  // 🎢 상위 난이도(6~7단계)용 — 더 길고 어려운 단어
  { en:'漂亮', pinyin:'piàoliang', ko:'예쁜' }, { en:'好吃', pinyin:'hǎochī', ko:'맛있는' }, { en:'重要', pinyin:'zhòngyào', ko:'중요한' },
  { en:'一起', pinyin:'yìqǐ',      ko:'함께' }, { en:'旅行', pinyin:'lǚxíng', ko:'여행' },   { en:'假期', pinyin:'jiàqī',   ko:'방학' }
];

// 활성 어휘(게임이 실제로 읽는 배열) — 언어에 따라 _EN_* / _ZH_* 로 채운다.
const _GAME_VOCAB = [];
const _GAME_WORDS = [];
// 🌐 현재 게임 언어: 'en'(기본) | 'zh'(중국어) — localStorage 로 페이지 간 공유
var GAME_LANG = (function(){ try{ var l=localStorage.getItem('mangoi_game_lang'); return (l==='zh')?'zh':'en'; }catch(_){ return 'en'; } })();
function _fillActive(vocab, words){
  _GAME_VOCAB.length = 0; vocab.forEach(function(v){ _GAME_VOCAB.push(v); });
  _GAME_WORDS.length = 0; words.forEach(function(w){ _GAME_WORDS.push(w); });
}
function _applyLangVocab(){
  if(GAME_LANG==='zh') _fillActive(_ZH_VOCAB, _ZH_WORDS);
  else _fillActive(_EN_VOCAB, _EN_WORDS);
  try{ if(window.MangoiTTS) MangoiTTS.setLang(GAME_LANG); }catch(_){}
}
_applyLangVocab();   // 시작 시 현재 언어 어휘 적용

/* 🀄 다락원 교재에서 추출한 실제 중국어 어휘(zh_vocab)를 불러와 내장 세트를 대체.
   실패/데이터부족 시 위 내장 _ZH_VOCAB/_ZH_WORDS 로 폴백. sessionStorage 10분 캐시. */
var _ZH_LOADED = false;
function loadDarakwonZh(){
  if(_ZH_LOADED) return; _ZH_LOADED = true;
  var CK = 'mangoi_zhvocab_darakwon_v1';
  function apply(d){
    if(!d || !d.ok) return;
    var sents = (d.sentences||[]).filter(function(s){ return s && s.en && s.words && s.words.length>=2; });
    var wds = (d.words||[]).filter(function(w){ return w && w.en && w.ko; });
    if(sents.length >= 3){ _ZH_VOCAB.length=0; sents.forEach(function(s){ _ZH_VOCAB.push(s); }); }
    if(wds.length >= 6){ _ZH_WORDS.length=0; wds.forEach(function(w){ _ZH_WORDS.push(w); }); }
    if(GAME_LANG==='zh'){ _applyLangVocab();   // 중국어 모드면 활성 어휘 즉시 교체
      var el=document.getElementById('vocab-src-badge');
      if(el){ el.textContent='📚 다락원 중국어 마스터 3 교재 어휘'; el.style.display='block'; } }
  }
  try{ var c=JSON.parse(sessionStorage.getItem(CK)||'null'); if(c && (Date.now()-c.at)<600000){ apply(c.d); return; } }catch(_){}
  fetch('/api/games/zh-vocab?textbook=' + encodeURIComponent('다락원') + '&level=' + encodeURIComponent('Lv 3'))
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(d){ if(d){ try{ sessionStorage.setItem(CK, JSON.stringify({at:Date.now(), d:d})); }catch(_){} apply(d); } })
    .catch(function(){});
}
loadDarakwonZh();

/* 🔤 영어 어휘 은행(en_vocab)으로 기본 영어 어휘 강화 — 폴백을 12→풍부하게.
   로그인 학생 교재 데이터가 있으면 그게 우선(game-vocab.js), 없으면 이 은행 사용. */
var _EN_BANK_LOADED = false;
function loadEnBank(){
  if(_EN_BANK_LOADED) return; _EN_BANK_LOADED = true;
  var CK='mangoi_envocab_v1';
  function apply(d){
    if(!d || !d.ok) return;
    (d.sentences||[]).forEach(function(s){ if(s && s.en && s.words && s.words.length>=2 && !_EN_VOCAB.some(function(v){ return v.en===s.en; })) _EN_VOCAB.push(s); });
    (d.words||[]).forEach(function(w){ if(w && w.en && w.ko && !_EN_WORDS.some(function(x){ return x.en===w.en; })) _EN_WORDS.push(w); });
    if(GAME_LANG==='en' && !(window._STUDENT_VOCAB && _STUDENT_VOCAB.sentences && _STUDENT_VOCAB.sentences.length>=3)) _applyLangVocab();
  }
  try{ var c=JSON.parse(sessionStorage.getItem(CK)||'null'); if(c && (Date.now()-c.at)<1800000){ apply(c.d); return; } }catch(_){}
  fetch('/api/games/en-vocab').then(function(r){ return r.ok?r.json():null; })
    .then(function(d){ if(d){ try{ sessionStorage.setItem(CK, JSON.stringify({at:Date.now(),d:d})); }catch(_){} apply(d); } })
    .catch(function(){});
}
loadEnBank();
const _gameState = { mode: 'brick', score: 0, correct: 0, wrong: 0, current: null, started: false, balloonTimer: null, roundTimer: null, _queued: null };

/* ════════════════════════════════════════════════════════════════════
   🧠 학습 강화 엔진 — 오답 재노출(간격 반복)·콤보·하트·이중부호화·선학습
   · 4개 인라인 게임(벽돌·매칭·빈칸·풍선)이 공용으로 사용
   ════════════════════════════════════════════════════════════════════ */
// ── 숙련도(약점) 저장: 언어별 localStorage 영구 기록 + 세션 즉시 재출제 큐 ──
function _MKEY(){ return 'mangoi_game_mastery_' + GAME_LANG; }
function _loadMastery(){ try{ return JSON.parse(localStorage.getItem(_MKEY())||'{}')||{}; }catch(_){ return {}; } }
function _saveMastery(m){ try{ localStorage.setItem(_MKEY(), JSON.stringify(m)); }catch(_){} }
var _missQueue = [];    // 이번 세션 오답 [{kind,id,item}] — 다음 라운드에 우선 재출제
var _seenItems = {};    // 이번 세션에 선학습(미리보기)까지 마친 항목 id
function _itemId(kind, item){ try{ return String((item&&item.en)||''); }catch(_){ return ''; } }

// 정오답 기록 → 약점이면 미스큐에 넣고, 재노출해서 맞히면 졸업
function _recordResult(kind, item, correct){
  try{
    if(!item) return;
    var id = _itemId(kind, item); if(!id) return;
    var m = _loadMastery(); var rec = m[id] || { w:0, r:0 };
    if(correct){
      rec.r++;
      var qi = _missQueue.findIndex(function(x){ return x.id===id; });
      if(qi>=0) _missQueue.splice(qi,1);   // 재노출 후 1회 정답 → 졸업(큐에서 제거)
    } else {
      rec.w++;
      if(!_missQueue.some(function(x){ return x.id===id; })) _missQueue.push({ kind:kind, id:id, item:item });
    }
    m[id]=rec; _saveMastery(m);
    _queueProgress(id, (item&&item.ko)||'', correct);   // 🧠 서버 학습기록에도 누적(로그인 학생만)
  }catch(_){}
}

/* ── 🧠 서버 학습기록 전송(배치): 정오답 이벤트를 모아 /api/games/progress 로 UPSERT ──
   로그인 학생만. 20초 주기 + 결과화면 + 페이지 이탈 시 전송(sendBeacon). ── */
var _progressQueue = [];
function _gameUid(){ try{ return (window.MangoiGameVocab && MangoiGameVocab.getUserId()) || ''; }catch(_){ return ''; } }
function _queueProgress(item, ko, correct){
  if(!item || !_gameUid()) return;
  _progressQueue.push({ item:item, ko:ko||'', correct:!!correct });
  if(_progressQueue.length >= 25) _flushProgress();
}
function _flushProgress(useBeacon){
  try{
    var uid = _gameUid(); if(!uid || !_progressQueue.length) return;
    var payload = { user_id: uid, lang: GAME_LANG, events: _progressQueue.splice(0, _progressQueue.length) };
    var body = JSON.stringify(payload);
    if(useBeacon && navigator.sendBeacon){
      navigator.sendBeacon('/api/games/progress', new Blob([body], { type:'application/json' }));
    } else {
      fetch('/api/games/progress', { method:'POST', headers:{'Content-Type':'application/json'}, body: body, keepalive:true }).catch(function(){});
    }
  }catch(_){}
}
setInterval(function(){ if(_progressQueue.length) _flushProgress(false); }, 20000);
window.addEventListener('pagehide', function(){ _flushProgress(true); });
document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') _flushProgress(true); });

/* ── 🧠 서버 약점 단어로 복습 큐 시딩: 다른 기기에서 틀린 단어도 이어서 복습 ── */
var _seededMiss = false;
function _seedMissFromServer(){
  if(_seededMiss) return; var uid=_gameUid(); if(!uid) return; _seededMiss=true;
  fetch('/api/games/weak?user_id='+encodeURIComponent(uid)+'&lang='+GAME_LANG+'&limit=20')
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(d){
      if(!d||!d.ok||!d.weak) return;
      d.weak.forEach(function(w){
        var id=w.item; if(!id) return;
        var inW=_GAME_WORDS.find(function(x){ return x.en===id; });
        var inV=_GAME_VOCAB.find(function(x){ return x.en===id; });
        if(inW){ if(!_missQueue.some(function(x){ return x.id===id&&x.kind==='word'; })) _missQueue.push({kind:'word',id:id,item:inW}); }
        else if(inV){ if(!_missQueue.some(function(x){ return x.id===id&&x.kind==='sent'; })) _missQueue.push({kind:'sent',id:id,item:inV}); }
      });
    }).catch(function(){});
}
// 어휘가 로드된 뒤(교재/약점) 시딩 — 언어별로 1회
setTimeout(_seedMissFromServer, 1800);
// 약점 우선 선택: 45% 확률로 미스큐에서, 아니면 스테이지 풀에서 무작위
function _pickFrom(pool, kind){
  try{
    if(!pool || !pool.length) return null;
    var q = _missQueue.filter(function(x){ return x.kind===kind; });
    if(q.length && Math.random()<0.45){
      var pk = q[Math.floor(Math.random()*q.length)];
      var found = pool.find(function(p){ return _itemId(kind,p)===pk.id; });
      return found || pk.item;
    }
  }catch(_){}
  return pool[Math.floor(Math.random()*pool.length)];
}
function _nextVocab(){ return _pickFrom(_stageVocab(), 'sent'); }
function _nextWord(){ return _pickFrom(_stageWords(), 'word'); }
// 매칭용: 약점 단어를 최대 절반 우선 포함하고 나머지는 스테이지 풀로 채움
function _pickWords(n){
  var pool = _stageWords(), picks = [];
  var q = _missQueue.filter(function(x){ return x.kind==='word'; });
  _gameShuffle(q).slice(0, Math.ceil(n/2)).forEach(function(pk){
    var f = pool.find(function(p){ return _itemId('word',p)===pk.id; }) || pk.item;
    if(f && f.ko && f.en && !picks.some(function(p){ return p.en===f.en; })) picks.push(f);
  });
  _gameShuffle(pool).forEach(function(w){ if(picks.length<n && !picks.some(function(p){ return p.en===w.en; })) picks.push(w); });
  return picks.slice(0,n);
}

var _combo = 0, _comboBest = 0;
function _comboMult(){ return _combo>=6?3:_combo>=3?2:1; }
function _bumpCombo(){
  _combo++; if(_combo>_comboBest) _comboBest=_combo;
  var el=document.getElementById('game-combo');
  if(el){ if(_combo>=2){ el.style.display=''; el.textContent='🔥'+_combo+(_comboMult()>1?(' ×'+_comboMult()):''); } else el.style.display='none'; }
  if(_combo>=3){ _comboPopup(_combo); _comboSound(_combo); }
  return _comboMult();
}
function _resetCombo(){ _combo=0; var el=document.getElementById('game-combo'); if(el) el.style.display='none'; }
function _comboSound(n){
  try{ var AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    if(!window._gameAC) window._gameAC=new AC(); var ac=window._gameAC; if(ac.state==='suspended'){ try{ac.resume();}catch(_){} }
    var t=ac.currentTime, base=440+Math.min(n,10)*55;
    var o=ac.createOscillator(), g=ac.createGain(); o.type='triangle';
    o.frequency.setValueAtTime(base,t); o.frequency.exponentialRampToValueAtTime(base*1.5,t+0.12);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.45,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.24);
  }catch(_){}
}
function _comboPopup(n){
  try{ var area=document.getElementById('game-area'); if(!area) return;
    if(getComputedStyle(area).position==='static') area.style.position='relative';

    el.style.cssText='position:absolute;top:15%;left:50%;transform:translate(-50%,-50%) scale(.5);z-index:40;font-size:clamp(22px,5vmin,46px);font-weight:900;font-style:italic;color:#fff;text-shadow:0 0 14px #fb7185,0 3px 8px rgba(0,0,0,.6);-webkit-text-stroke:1.5px #be123c;pointer-events:none;transition:transform .18s,opacity .5s';
    area.appendChild(el);
    requestAnimationFrame(function(){ el.style.transform='translate(-50%,-50%) scale(1.12)'; });
    setTimeout(function(){ el.style.opacity='0'; el.style.transform='translate(-50%,-95%) scale(1)'; }, 480);
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 1050);
  }catch(_){}
}

function _confettiBurst(n, big){

  else { _confettiBurst(10, false); if(Math.random()<0.5) _mascot('good'); }   // 일반 정답: 폭죽 + 가끔 마스코트

function _onCorrect(kind, item, base){
  _recordResult(kind, item, true);
  var mult=_bumpCombo();
  var gain=base*mult;
  var boss=false;
  if(_gameState.boss){ boss=true; gain*=2; _gameState.boss=false; }   // 👹 보스 문제 = 점수 2배
  _gameState.score += gain; _gameState.correct++;
  _renderHearts();
  _celebrate(boss ? 'boss' : (_combo>=3 ? 'combo' : 'good'));   // 🎉 축하 연출
  _addCoins((boss?15:3) + (mult>1?(mult*2):0));                 // 💰 코인 적립(콤보·보스 보너스)
  return { gain:gain, mult:mult, boss:boss };
}
// 👹 보스용 — 가장 긴(어려운) 문장 상위 3개 중 무작위
function _bossVocab(){
  var pool = _GAME_VOCAB.filter(function(v){ return v.words && v.words.length>=3; });

  pool = pool.slice().sort(function(a,b){ return (b.words?b.words.length:0)-(a.words?a.words.length:0); });
  var top = pool.slice(0, Math.min(3, pool.length));
  return top[Math.floor(Math.random()*top.length)] || _nextVocab();
}

/* ============================================================
   🎯 목표: 10개 정답 → 결과 화면 (모든 인라인 게임 공통)
   ============================================================ */
const GAME_GOAL = 10;

/* ============================================================
   🎢 난이도(스테이지) 1~7 — 10문제 클리어 시 자동 상승
   · 난이도 ↔ ⚡속도 7단계 연동(풍선 낙하·라운드 제한시간 빨라짐, 6~7단계는 훨씬 빠름)
   · 출제도 어려워짐: 단계가 오를수록 더 길고 어려운 문장/단어 구간에서 출제
   ============================================================ */
const GAME_STAGE_MAX = 7;
var GAME_STAGE = (function(){ try{ var v=parseInt(localStorage.getItem('mangoi_game_stage'),10); return (v>=1&&v<=GAME_STAGE_MAX)?v:1; }catch(_){ return 1; } })();
function setGameStage(st){
  if(!(st>=1&&st<=GAME_STAGE_MAX)) st=1;
  GAME_STAGE = st;
  try{ localStorage.setItem('mangoi_game_stage', String(st)); }catch(_){}
  var el=document.getElementById('game-stage'); if(el) el.textContent = st;
  setGameSpeed(st);   // 난이도 = 속도 단계 자동 연동
}
// 난이도 구간 출제: 배열을 쉬움→어려움으로 정렬해 현재 단계 구간만 뽑는다 (부족하면 이웃 구간으로 확장)
function _stagePool(arr, key, minN){
  var sorted = arr.slice().sort(function(a,b){ return key(a)-key(b); });
  var n = sorted.length, lo = Math.floor((GAME_STAGE-1)/GAME_STAGE_MAX*n), hi = Math.ceil(GAME_STAGE/GAME_STAGE_MAX*n);
  var need = Math.min(minN||4, n);
  while(hi-lo < need){ if(lo>0) lo--; if(hi<n) hi++; }
  return sorted.slice(lo,hi);
}
function _stageVocab(){ return _stagePool(_GAME_VOCAB, function(v){ return (v.words?v.words.length:0)*100 + v.en.length; }, 3); }
function _stageWords(){ return _stagePool(_GAME_WORDS, function(w){ return w.en.length*10 + ((w.ko&&w.ko.length)||0); }, 6); }

function _gameCheckGoal(){
  // 정답 처리 직후 호출 — 10개 채우면 결과 화면으로 (true 반환 = 다음 라운드 중단)
  if(_gameState.correct < GAME_GOAL) return false;
  setTimeout(_gameShowResult, 1100);
  return true;
}
function _gameShowResult(){
  _stopRoundTimer();
  if(_gameState.balloonTimer){ clearInterval(_gameState.balloonTimer); _gameState.balloonTimer = null; }
  try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(_){}
  try{ _flushProgress(false); }catch(_){}   // 🧠 결과 화면에서 학습기록 서버 전송
  try{ _celebrate('win'); setTimeout(function(){ _confettiBurst(50,true); }, 500); }catch(_){}   // 🎉 클리어 대축하
  _gameState.started = false;
  var tot = _gameState.correct + _gameState.wrong;
  var acc = tot > 0 ? Math.round(100 * _gameState.correct / tot) : 100;
  var stars = acc >= 90 ? '⭐⭐⭐' : acc >= 70 ? '⭐⭐' : '⭐';
  // 🏅 개인 최고기록 — 게임+단계별 최고 점수 저장, 경신 시 "신기록!" 배지
  var _bestBadge = '';
  try{
    var bk = 'mangoi_game_best_' + GAME_LANG + '_' + _gameState.mode + '_' + GAME_STAGE;
    var prev = parseInt(localStorage.getItem(bk) || '0', 10) || 0;
    if(_gameState.score > prev){
      localStorage.setItem(bk, String(_gameState.score));
      _bestBadge = '<div style="margin-top:8px;font-size:16px;color:#fbbf24;font-weight:800">🎉 신기록 달성! (이전 최고 ' + prev + '점)</div>';
    } else {
      _bestBadge = '<div style="margin-top:8px;font-size:13px;color:#94a3b8">🏅 이 단계 최고기록 ' + prev + '점</div>';
    }
  }catch(_){}
  var src = window._STUDENT_VOCAB && (_STUDENT_VOCAB.textbook || _STUDENT_VOCAB.level)
    ? '<div style="font-size:13px;color:#94a3b8;margin-top:8px">📚 ' + (_STUDENT_VOCAB.textbook || '') + (_STUDENT_VOCAB.level ? ' · ' + _STUDENT_VOCAB.level : '') + ' 맞춤 문제</div>' : '';

/* ============================================================
   ⚡ 게임 속도(난이도) 5단계 — 모든 게임 공통
   · localStorage('mangoi_game_speed') 에 저장, iframe 게임엔 ?speed=1..5 로 전달
   · 인라인: 벽돌/빈칸/매칭 = 라운드 제한시간, 풍선 = 낙하 속도
   ============================================================ */
const SPEED_LEVELS = [
  { lvl:1, ico:'🐢', name:'아주 천천히', mult:0.5  },
  { lvl:2, ico:'🚶', name:'천천히',     mult:0.75 },
  { lvl:3, ico:'🙂', name:'보통',       mult:1    },
  { lvl:4, ico:'🏃', name:'빨리',       mult:1.4  },
  { lvl:5, ico:'🚀', name:'아주 빨리',  mult:1.9  },
  { lvl:6, ico:'⚡', name:'초고속',     mult:2.5  },
  { lvl:7, ico:'🔥', name:'극한',       mult:3.2  }
];
var _speedLvl = (function(){ try{ var v=parseInt(localStorage.getItem('mangoi_game_speed'),10); return (v>=1&&v<=7)?v:3; }catch(_){ return 3; } })();
function _speedMult(){ return SPEED_LEVELS[_speedLvl-1].mult; }
// 라운드 제한시간(초) — 보통(🙂) 기준. 속도 빠를수록 시간 짧아짐(난이도↑)
const ROUND_TIME = { brick:50, fill:25, match:80 };

function renderSpeedPicks(){
  ['speed-pick-hub','speed-pick-game'].forEach(function(id){
    var el = document.getElementById(id); if(!el) return;
    var compact = (id==='speed-pick-game');
    var cur = SPEED_LEVELS[_speedLvl-1] || SPEED_LEVELS[2];
    var segs = SPEED_LEVELS.map(function(s){
      return '<button class="sp'+(s.lvl===_speedLvl?' on':'')+'" onclick="setGameSpeed('+s.lvl+')" title="'+s.name+'">'
        + s.ico + '</button>';
    }).join('');
    el.innerHTML = (compact?'':'<span class="slab">⚡ 속도<b>'+cur.name+'</b></span>')
      + '<span class="seg">' + segs + '</span>';
  });
}
function setGameSpeed(lvl){
  if(!(lvl>=1&&lvl<=7)) lvl=3;
  _speedLvl = lvl;
  try{ localStorage.setItem('mangoi_game_speed', String(lvl)); }catch(_){}
  // 🔗 속도 = 난이도 통합: 상단 속도 버튼을 누르면 난이도(스테이지)도 같은 값으로 맞춤
  GAME_STAGE = lvl;
  try{ localStorage.setItem('mangoi_game_stage', String(lvl)); }catch(_){}
  var _sg = document.getElementById('game-stage'); if(_sg) _sg.textContent = lvl;
  renderSpeedPicks();
  // 게임 중이면 즉시 반영: iframe 게임은 새 속도로 재시작, 인라인은 새 라운드부터
  var gameOpen = document.getElementById('hub-game').classList.contains('active');
  if(!gameOpen) return;
  var g = _hubGame(_gameState.mode); if(!g) return;
  if(g.kind === 'iframe'){
    document.getElementById('game-area').innerHTML =
      '<iframe src="'+_hubIframeSrc(g)+'" allow="microphone; autoplay; speaker-selection"></iframe>';
  } else if(_gameState.started){
    gameNextRound();
  }
}
// iframe 게임 src 에 속도/학생/목표/언어 파라미터 부착 — 게임 쪽에서 교재 맞춤 문장 로드 + 10개 정답 결과에 사용
function _hubIframeSrc(g){
  var pick = _GAME_VOCAB[Math.floor(Math.random()*_GAME_VOCAB.length)];
  // 중국어는 띄어쓰기가 없으므로 분절된 words[] 를 공백으로 이어 전달(게임이 단어 단위로 분할)
  var sentence = (GAME_LANG==='zh' && pick.words && pick.words.length) ? pick.words.join(' ') : pick.en;
  var src = g.src(sentence);
  src += (src.indexOf('?')>=0?'&':'?') + 'speed=' + _speedLvl + '&goal=10&stage=' + GAME_STAGE + '&glang=' + GAME_LANG;
  try{ var uid = window.MangoiGameVocab && MangoiGameVocab.getUserId(); if(uid) src += '&uid=' + encodeURIComponent(uid); }catch(_){}
  return src;
}

/* ── 라운드 제한시간 타이머 (벽돌/빈칸/매칭) ── */
function _stopRoundTimer(){
  if(_gameState.roundTimer){ clearInterval(_gameState.roundTimer); _gameState.roundTimer = null; }
}
function _startRoundTimer(){
  _stopRoundTimer();
  var wrap = document.getElementById('game-timer-wrap');
  var base = ROUND_TIME[_gameState.mode];
  if(!base){ if(wrap) wrap.style.display='none'; return; }   // 풍선 등: 시간제한 없음(낙하속도가 난이도)
  var secs = Math.max(5, Math.round(base / _speedMult()));
  var tEl = document.getElementById('game-timer');
  if(wrap) wrap.style.display='inline';
  if(tEl) tEl.textContent = secs;
  _gameState.roundTimer = setInterval(function(){
    secs--;
    if(tEl) tEl.textContent = Math.max(0,secs);
    if(tEl) tEl.style.color = secs<=5 ? 'var(--bad)' : '#7fd1ff';
    if(secs<=0){
      _stopRoundTimer();
      // 현재 문제 항목을 오답으로 기록(약점 재노출) + 콤보/하트 처리.
      // 매칭게임처럼 '문제 문장/단어'가 없는 모드는 undefined 를 오답으로 기록하거나 하트를 깎지 않고 넘어감.
      var _it = _gameState.current && (_gameState.current.sentence || _gameState.current.word);
      var dead = false;
      if (_it) {
        var _kd = (_gameState.mode==='balloon') ? 'word' : 'sent';
        dead = _onWrong(_kd, _it);
        _gameUpdateScore();
      }
      var fb=document.getElementById('game-feedback');
      if(fb) fb.innerHTML='<span style="color:#ef4444">⏰ 시간 초과!' + (dead?'':' 다음 문제로…') + '</span>';
      if(!dead) setTimeout(gameNextRound, 1500);
    }
  }, 1000);
}

// 🌐 언어별 카드 제목: '영어 슈팅' 은 중국어 모드에서 '중국어 슈팅' 으로 (나머지는 그대로)
function _gameTitle(g){ if(g.mode==='shooter') return (GAME_LANG==='zh') ? '중국어 슈팅' : '영어 슈팅'; if(g.mode==='battle3d') return (GAME_LANG==='zh') ? '중국어 배틀' : '3D 배틀'; return g.ttl; }
function hubRenderMenu(){
  // 3D 배틀은 영어/중국어 모두 지원(glang 전달) — 전체 노출
  var list = HUB_GAMES.slice();
  document.getElementById('game-grid').innerHTML = list.map(function(g){
    return '<div class="game-card" style="--cardbg:'+g.bg+'" onclick="hubOpenGame(\''+g.mode+'\')">'
      + '<span class="badge">'+g.badge+'</span>'
      + '<span class="ico">'+g.ico+'</span>'
      + '<span class="ttl">'+_gameTitle(g)+'</span>'
      + '<span class="dsc">'+g.dsc+'</span>'
      + '</div>';
  }).join('');
}

function _hubGame(mode){ return HUB_GAMES.find(function(g){ return g.mode===mode; }); }

/* 🎨 게임별 배경 테마 적용 — 각 게임 성격에 맞는 컬러/장식(위 CSS)을 #game-area 에 얹는다.
   인라인 게임(brick/match/fill/balloon)만 장식(::before)까지 켜고, iframe 게임은 로딩 배경색만. */
var _GAME_THEME = { brick:'theme-brick', match:'theme-match', fill:'theme-fill', balloon:'theme-balloon',
  fish:'theme-fish', shoot:'theme-shoot', shooter:'theme-shooter', battle3d:'theme-battle3d',
  suspect:'theme-suspect', speaking:'theme-speaking' };
function _applyGameTheme(mode){
  var area = document.getElementById('game-area'); if(!area) return;
  Object.keys(_GAME_THEME).forEach(function(m){ area.classList.remove(_GAME_THEME[m]); });
  area.classList.remove('themed');
  var cls = _GAME_THEME[mode]; if(!cls) return;
  area.classList.add(cls);
  if(mode==='brick'||mode==='match'||mode==='fill'||mode==='balloon') area.classList.add('themed');
}

function hubOpenGame(mode){
  var g = _hubGame(mode); if(!g) return;
  _gameState.mode = mode;
  document.getElementById('hub-menu').style.display = 'none';
  document.getElementById('hub-game').classList.add('active');
  document.getElementById('hub-gname').textContent = g.ico+' '+_gameTitle(g);
  _applyGameTheme(mode);   // 🎨 이 게임 성격에 맞는 배경 테마
  var hubGameEl = document.getElementById('hub-game');

  if(g.kind === 'iframe'){
    // iframe 게임 — 점수바/다음버튼 숨기고 게임 페이지가 화면을 채움
    hubGameEl.classList.add('game-iframewrap');
    document.getElementById('hub-scorebar').style.display = 'none';
    document.getElementById('hub-next').style.display = 'none';
    document.getElementById('game-area').innerHTML =
      '<iframe src="'+_hubIframeSrc(g)+'" allow="microphone; autoplay; speaker-selection"></iframe>';
  } else {
    // 인라인 미니게임 — 점수바/다음버튼 표시 후 시작
    hubGameEl.classList.remove('game-iframewrap');
    document.getElementById('hub-scorebar').style.display = 'flex';
    document.getElementById('hub-next').style.display = (mode==='match') ? 'none' : 'inline-block';
    gameInit();
  }
}

function hubBackToMenu(){
  // 진행 중이던 타이머/음성 정리
  if(_gameState.balloonTimer){ clearInterval(_gameState.balloonTimer); _gameState.balloonTimer = null; }
  _stopRoundTimer();
  try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(_){}
  document.getElementById('game-area').innerHTML = '';
  _applyGameTheme(null);   // 🎨 배경 테마 초기화
  document.getElementById('hub-game').classList.remove('active');
  document.getElementById('hub-menu').style.display = 'flex';
}

function gameInit(){
  _gameState.started = false;          // setGameStage→setGameSpeed 의 라운드 재시작 방지
  setGameStage(GAME_STAGE);            // 🎢 난이도 표시 + 속도 동기화
  _gameState.started = true;
  _gameState.score = 0; _gameState.correct = 0; _gameState.wrong = 0;
  _hearts = _HEARTS_MAX; _renderHearts();   // 💗 하트 리셋
  _combo = 0; _comboBest = 0; _resetCombo();  // 🔥 콤보 리셋 (미스큐는 세션 유지 = 약점 이어짐)
  _gameState.boss = false;                    // 👹 보스 상태 리셋
  // 모바일 세로 화면 채움: match/balloon 은 플레이영역이 세로공간 전부, brick/fill 은 가운데 정렬
  var area = document.getElementById('game-area');
  if(area){ area.classList.remove('area-center','area-fill');
    area.classList.add((_gameState.mode==='match'||_gameState.mode==='balloon') ? 'area-fill' : 'area-center'); }
  _gameUpdateScore();
  gameNextRound();
}

function gameNextRound(){
  var fb = document.getElementById('game-feedback'); if(fb) fb.textContent = '';
  if(_gameState.balloonTimer){ clearInterval(_gameState.balloonTimer); _gameState.balloonTimer = null; }
  if(_gameState._advTimer){ clearTimeout(_gameState._advTimer); _gameState._advTimer = null; }   // 🎤 섀도잉 대기 타이머 정리
  var mode = _gameState.mode;
  // 다음 항목을 미리 뽑아(약점 우선) → 새 항목이면 선학습 플래시 후 렌더 + 타이머 시작
  if(mode === 'brick' || mode === 'fill'){
    // 👹 보스 라운드: 5번째 문제(정답 4개 완료 후)는 가장 긴 문장 + 2배 점수 (선학습 생략 = 도전)
    var boss = (_gameState.correct === 4 && _gameState.correct < GAME_GOAL);
    _gameState.boss = boss;
    var s = boss ? _bossVocab() : _nextVocab(); _gameState._queued = s;
    _preteachThen(boss ? null : s, 'sent', function(){ if(mode==='brick') gameRenderBrick(); else gameRenderFill(); _startRoundTimer(); });
  } else if(mode === 'balloon'){
    var w = _nextWord(); _gameState._queued = w;
    _preteachThen(w, 'word', function(){ gameRenderBalloon(); _startRoundTimer(); });
  } else {   // match — 6쌍 보드라 선학습 생략
    _gameState._queued = null;
    gameRenderMatch(); _startRoundTimer();
  }
}

/* ============================================================
   공용 유틸 (index.html 게임 탭과 동일)

function _gameShuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function _gameUpdateScore(){
  document.getElementById('game-score').textContent = _gameState.score;
  document.getElementById('game-correct').textContent = _gameState.correct;
  document.getElementById('game-wrong').textContent = _gameState.wrong;
}

/* ===== 🔊 원어민 발음 (TTS) — index.html 과 동일 로직 ===== */
var _gameEnVoice = null;
function _gameScoreVoice(v){
  var n=(v.name||'').toLowerCase(), lang=(v.lang||'').toLowerCase(), s=0;
  if(lang==='en-us') s+=40; else if(lang==='en-gb'||lang==='en-au') s+=28;
  else if(lang.slice(0,2)==='en') s+=18; else s-=120;
  if(/natural|neural/.test(n)) s+=70;
  if(/google/.test(n)) s+=60;
  if(/\b(aria|jenny|guy|ava|emma|libby|michelle|jane|nova|sara|brian|christopher)\b/.test(n)) s+=48;
  if(/\b(samantha|alex|allison|ava|tom|siri|nicky|evan|joelle|nathan)\b/.test(n)) s+=46;
  if(/online/.test(n)) s+=24;
  if(/premium|enhanced|plus/.test(n)) s+=24;
  if(v.localService===false) s+=30;
  if(/zira|david|mark|hazel|george|susan|catherine|linda|richard|sean|heera|ravi/.test(n)) s-=55;
  if(/desktop|compact|espeak|pico|microsoft server/.test(n)) s-=45;
  if(/zarvox|albert|bahh|bells|boing|bubbles|cellos|trinoids|whisper|wobble|jester|organ|superstar|bad news|good news|deranged|hysterical|pipe|ralph|fred|junior|kathy/.test(n)) s-=90;
  return s;
}
function _gamePickVoice(){
  try{
    var vs=window.speechSynthesis.getVoices(); if(!vs.length) return;
    var en=vs.filter(function(v){ return (v.lang||'').slice(0,2).toLowerCase()==='en'; });
    if(!en.length){ _gameEnVoice=null; return; }
    var best=null, bs=-1e9;
    en.forEach(function(v){ var sc=_gameScoreVoice(v); if(sc>bs){ bs=sc; best=v; } });
    _gameEnVoice=best;
  }catch(_){}
}
try{ if(window.speechSynthesis){ _gamePickVoice(); window.speechSynthesis.onvoiceschanged=_gamePickVoice; } }catch(_){}
// 🔊 원어민 발음: 클라우드 TTS(Deepgram Aura-1, game-tts.js) 우선 → 실패 시 브라우저 보이스 폴백
window.gameSpeak = function(text){ try{ if(!text) return;
  var _rate = 1;   // 🔊 발음(말)은 난이도와 무관하게 항상 평상시 속도 — 난이도는 풍선 낙하 속도만 조절
  if(window.MangoiTTS){ MangoiTTS.speak(text, _rate); return; }
  if(!_gameEnVoice) _gamePickVoice(); var u=new SpeechSynthesisUtterance(String(text)); u.lang=(_gameEnVoice&&_gameEnVoice.lang)||'en-US'; u.rate=Math.max(0.5,Math.min(3,0.95*_rate)); u.pitch=1.02; if(_gameEnVoice) u.voice=_gameEnVoice; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);}catch(_){} };
window.gameSpeakBuilt = function(){ try{ var pk=(_gameState.current&&_gameState.current.picked)||[]; if(pk.length) gameSpeak(pk.join(GAME_LANG==='zh'?'':' ')); }catch(_){} };   // 중국어는 붙여쓰기로 발음
window.gameSpeakTarget = function(){ try{ var s=_gameState.current&&_gameState.current.sentence; if(s&&s.en) gameSpeak(s.en); }catch(_){} };   // 🎧 듣기형(번역 없음) 문제의 문장 듣기

/* ── 🎤 따라 말하기(섀도잉): 원어민 발음 재생 → 음성인식으로 따라 말한 것 채점(미지원 브라우저는 재생만) ── */
function _shadowScore(said, target){
  try{
    var norm=function(s){ return String(s).toLowerCase().replace(/[.,!?。，！？]/g,'').trim(); };
    if(GAME_LANG==='zh'){
      var ts=norm(target).replace(/\s+/g,''), ss=norm(said).replace(/\s+/g,'');
      if(!ts) return 0; var hit=0; for(var i=0;i<ts.length;i++){ if(ss.indexOf(ts[i])>=0) hit++; } return hit/ts.length;
    }
    var tw=norm(target).split(/\s+/).filter(Boolean), sw=norm(said).split(/\s+/);
    if(!tw.length) return 0; var h=0; tw.forEach(function(w){ if(sw.indexOf(w)>=0) h++; }); return h/tw.length;
  }catch(_){ return 0; }
}
// 발음 점수(0~100)를 서버에 저장 → 교사가 학생별 발음 향상 확인(game_progress.pron_*)
function _saveShadowScore(item, ko, score){
  try{
    var uid=_gameUid(); if(!uid || !item) return;
    fetch('/api/games/shadow', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ user_id:uid, lang:GAME_LANG, item:item, ko:ko||'', score:Math.round(score*100) }), keepalive:true }).catch(function(){});
  }catch(_){}
}
function _shadowResult(sc, text){
  var fb=document.getElementById('game-feedback');
  if(fb) fb.innerHTML = sc>=0.6
    ? '<span style="color:#10b981">👍 발음 좋아요! ('+Math.round(sc*100)+'점)</span>'
    : '<span style="color:#f59e0b">🔁 거의 됐어요! ('+Math.round(sc*100)+'점) 🔊 다시 도전</span>';
  try{ var s=_gameState.current&&_gameState.current.sentence; _saveShadowScore(text, (s&&s.ko)||'', sc); }catch(_){}
  _gameState._advTimer=setTimeout(gameNextRound,1700);
}
// MediaRecorder → 서버 Whisper 전사 → 채점 (SpeechRecognition 미지원 브라우저: 사파리/iOS 등)
function _shadowViaWhisper(text, fb){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder){
    if(fb) fb.innerHTML='<span style="color:#38bdf8">🔊 잘 듣고 소리내어 따라 말해보세요!</span>'; _gameState._advTimer=setTimeout(gameNextRound,2400); return;
  }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    var mr, chunks=[]; try{ mr=new MediaRecorder(stream); }catch(_){ mr=new MediaRecorder(stream,{mimeType:'audio/webm'}); }
    if(fb) fb.innerHTML='<span style="color:#fbbf24">🎤 따라 말해보세요… (녹음 중)</span>';
    mr.ondataavailable=function(e){ if(e.data && e.data.size) chunks.push(e.data); };
    mr.onstop=function(){
      try{ stream.getTracks().forEach(function(t){ t.stop(); }); }catch(_){}
      var blob=new Blob(chunks, {type:(chunks[0]&&chunks[0].type)||'audio/webm'});
      if(!blob.size){ _gameState._advTimer=setTimeout(gameNextRound,1500); return; }
      if(fb) fb.innerHTML='<span style="color:#94a3b8">🎧 발음 확인 중…</span>';
      var fd=new FormData(); fd.append('audio', blob, 'shadow.webm');
      fetch('/api/voice/transcribe', { method:'POST', body:fd })
        .then(function(r){ return r.ok?r.json():null; })
        .then(function(d){
          if(!d || !d.ok){ if(fb) fb.innerHTML='<span style="color:#94a3b8">🎤 다음 문제로…</span>'; _gameState._advTimer=setTimeout(gameNextRound,1400); return; }
          _shadowResult(_shadowScore(d.text||'', text), text);
        }).catch(function(){ _gameState._advTimer=setTimeout(gameNextRound,1400); });
    };
    mr.start(); setTimeout(function(){ try{ mr.stop(); }catch(_){} }, 4200);
  }).catch(function(){ if(fb) fb.innerHTML='<span style="color:#94a3b8">🎤 마이크 권한이 필요해요 — 다음 문제로…</span>'; _gameState._advTimer=setTimeout(gameNextRound,1600); });
}
function gameShadow(enc){
  var text=decodeURIComponent(enc);
  var fb=document.getElementById('game-feedback');
  if(_gameState._advTimer){ clearTimeout(_gameState._advTimer); _gameState._advTimer=null; }   // 자동 넘어감 취소
  try{ window.gameSpeak && gameSpeak(text); }catch(_){}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  // 미지원 브라우저(사파리/iOS 등) → MediaRecorder + 서버 Whisper 로 채점
  if(!SR){ setTimeout(function(){ _shadowViaWhisper(text, fb); }, 850); return; }
  setTimeout(function(){
    try{
      var rec=new SR(); rec.lang=(GAME_LANG==='zh'?'zh-CN':'en-US'); rec.interimResults=false; rec.maxAlternatives=3;
      if(fb) fb.innerHTML='<span style="color:#fbbf24">🎤 따라 말해보세요… (듣는 중)</span>';
      var done=false;
      rec.onresult=function(e){ done=true;
        var said=''; for(var i=0;i<e.results.length;i++) said+=e.results[i][0].transcript+' ';
        _shadowResult(_shadowScore(said, text), text);
      };
      rec.onerror=function(){ if(!done){ if(fb) fb.innerHTML='<span style="color:#94a3b8">🎤 마이크를 못 썼어요 — 다음 문제로…</span>'; _gameState._advTimer=setTimeout(gameNextRound,1500); } };
      rec.onend=function(){ if(!done && !_gameState._advTimer) _gameState._advTimer=setTimeout(gameNextRound,1500); };
      rec.start(); setTimeout(function(){ try{ rec.stop(); }catch(_){} }, 4500);
    }catch(_){ _gameState._advTimer=setTimeout(gameNextRound,1700); }
  }, 850);
}

/* ============================================================
   게임 1: 🧱 문장 벽돌
   ============================================================ */
function gameRenderBrick(){
  const sentence = _gameState._queued || _nextVocab();   // 🧠 약점 우선 출제(선학습은 gameNextRound 에서)
  _gameState._queued = null;
  _gameState.current = { sentence, picked: [] };
  const shuffled = _gameShuffle(sentence.words);
  // 교재 문장에 한국어 번역이 없으면 듣기 문제로 전환 (🔊 버튼으로 문장 듣고 순서 조립)
  const promptBlock = sentence.ko
    ? '<div style="font-size:13px;color:#94a3b8;margin-bottom:6px">📝 한국어 번역</div>' +
      '<div style="font-size:clamp(24px,3.4vmin,46px);font-weight:700;color:#fbbf24;padding:14px 22px;background:rgba(251,191,36,0.12);border-radius:12px;display:inline-block">' + sentence.ko + '</div>'
    : '<div style="font-size:13px;color:#94a3b8;margin-bottom:6px">🎧 오늘 교재 문장을 듣고 순서대로 만들어 보세요</div>' +
      '<button onclick="gameSpeakTarget()" style="font-size:clamp(18px,2.6vmin,32px);font-weight:700;color:#fbbf24;padding:14px 26px;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,.4);border-radius:12px;cursor:pointer;font-family:inherit">🔊 문장 듣기</button>';
  let html =
    (_gameState.boss ? _bossBannerHtml() : '') +
    '<div style="text-align:center;margin-bottom:24px">' + promptBlock + '</div>' +
    '<div style="text-align:center;margin-bottom:18px">' +
      '<div style="font-size:13px;color:#94a3b8;margin-bottom:8px">🎯 ' + (GAME_LANG==='zh'?'중국어':'영어') + '로 만들어보세요 (단어 클릭)</div>' +
      '<div id="brick-built" style="min-height:64px;background:rgba(15,23,42,0.7);border:2px dashed #475569;border-radius:12px;padding:14px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center">' +
        '<span style="color:#64748b;font-size:14px" id="brick-empty">아래 단어 브릭을 클릭하세요...</span>' +
      '</div>' +
    '</div>' +
    '<div id="brick-pool" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:18px">';
  var _bkGrad = _brickGrad();   // 🛍️ 선택한 벽돌 스킨
  shuffled.forEach((w, i) => {
    // 🎨 내용어=선택 스킨 색 / 기능어=흐린 회색 → 문장에서 어떤 단어가 뜻을 나르는지 보이게
    var _bg = _isContentWord(w) ? _bkGrad+';box-shadow:0 4px 12px rgba(59,130,246,0.4)'
                                : 'linear-gradient(135deg,#64748b,#475569);box-shadow:0 4px 12px rgba(100,116,139,0.3)';
    html += '<button class="brick-btn" data-word="' + w + '" data-idx="' + i + '" onclick="gameBrickPick(this)" ' +
      'style="padding:clamp(12px,1.8vmin,22px) clamp(18px,2.6vmin,34px);background:' + _bg + ';color:#fff;border:0;border-radius:10px;font-size:clamp(18px,2.6vmin,34px);font-weight:600;cursor:pointer;transition:transform 0.15s">' + w + '</button>';
  });
  html += '</div>' +
    '<div style="text-align:center;display:flex;gap:10px;justify-content:center">' +

      '<button onclick="gameSpeakBuilt()" style="padding:10px 20px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;border:0;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;box-shadow:0 4px 12px rgba(139,92,246,0.4)">🔊 발음 듣기</button>' +
      '<button onclick="gameBrickCheck()" style="padding:10px 24px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:0;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;box-shadow:0 4px 12px rgba(16,185,129,0.4)">✅ 확인</button>' +
    '</div>';
  document.getElementById('game-area').innerHTML = html;
}
function gameBrickPick(btn){
  const word = btn.dataset.word;
  _gameState.current.picked.push(word);
  try{ window.gameSpeak && gameSpeak(word); }catch(_){}
  btn.style.opacity = '0.3'; btn.disabled = true;
  const built = document.getElementById('brick-built');
  const empty = document.getElementById('brick-empty');
  if (empty) empty.remove();
  const span = document.createElement('span');
  span.textContent = word;
  span.style.cssText = 'padding:10px 18px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1f2937;border-radius:8px;font-size:clamp(16px,2.4vmin,30px);font-weight:700';
  built.appendChild(span);
}
function gameBrickReset(){ gameRenderBrick(); }
// built 영역 다시 그리기 — 앞의 goodCount 개는 초록(확정), 나머지는 노랑
function _brickRedrawBuilt(goodCount){
  var built=document.getElementById('brick-built'); if(!built) return;
  var picked=_gameState.current.picked;
  built.innerHTML='';
  if(!picked.length){
    var e=document.createElement('span'); e.id='brick-empty'; e.style.cssText='color:#64748b;font-size:14px';
    e.textContent='아래 단어 브릭을 클릭하세요...'; built.appendChild(e); return;
  }
  picked.forEach(function(w,i){
    var sp=document.createElement('span'); sp.textContent=w;
    var ok=(i<goodCount);
    sp.style.cssText='padding:10px 18px;border-radius:8px;font-size:clamp(16px,2.4vmin,30px);font-weight:700;'
      + (ok ? 'background:linear-gradient(135deg,#10b981,#059669);color:#fff'
            : 'background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1f2937');
    built.appendChild(sp);
  });
}
function gameBrickCheck(){
  const sent = _gameState.current.sentence;
  const picked = _gameState.current.picked;
  const target = sent.words;
  const fb = document.getElementById('game-feedback');
  const full = picked.length === target.length && picked.every((w, i) => w === target[i]);
  if (full){
    _stopRoundTimer();
    const r = _onCorrect('sent', sent, 10);
    try{ window.MangoiStreak && MangoiStreak.complete('brick'); }catch(_){}  // 🔥 오늘 학습 달성
    fb.innerHTML = '<span style="color:#10b981">' + (r.boss?'👹 보스 격파! ':'✅ 정답! ') + '+' + r.gain + '점' + (r.mult>1?(' 🔥×'+r.mult):'') + '</span>';
    _brickRedrawBuilt(picked.length);   // 전부 초록으로 확정 표시
    try{ window.gameSpeak && gameSpeak(sent.en); }catch(_){}
    _gameUpdateScore();
    if(!_gameCheckGoal()){
      fb.innerHTML += ' <button onclick="gameShadow(\'' + encodeURIComponent(sent.en) + '\')" style="margin-left:8px;padding:5px 12px;background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;border:0;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700">🎤 따라 말하기</button>';
      _gameState._advTimer = setTimeout(gameNextRound, 2800);   // 🎤 따라말하기 누를 시간 확보
    }
    return;
  }
  // ── 부드러운 오답: 맞은 접두부는 초록으로 남기고, 첫 오답부터 되돌려 그 부분만 다시 ──
  let good = 0;
  while(good < picked.length && good < target.length && picked[good] === target[good]) good++;
  const removed = picked.slice(good);
  _gameState.current.picked = picked.slice(0, good);
  // 되돌린 단어의 브릭 버튼 재활성화(각 단어당 하나씩)
  removed.forEach(function(w){
    var btns=document.querySelectorAll('.brick-btn');
    for(var i=0;i<btns.length;i++){ if(btns[i].disabled && btns[i].dataset.word===w){ btns[i].disabled=false; btns[i].style.opacity='1'; break; } }
  });
  _brickRedrawBuilt(good);
  const dead = _onWrong('sent', sent, true);   // 재시도 허용 → 하트는 문제당 1개만
  _gameUpdateScore();
  if(dead) return;   // 하트 소진 → 부활 화면으로
  fb.innerHTML = good>0
    ? '<span style="color:#f59e0b">거의 다 왔어요! 초록은 그대로, 다음 칸을 다시 골라보세요</span>'
    : '<span style="color:#f59e0b">첫 단어부터 다시 생각해볼까요? 🔊 발음 듣기가 힌트!</span>';
}

  const shuffled = _gameShuffle(cards);
  _gameState.current = { cards: shuffled, flipped: [], matched: new Set(), pool: pool };
  let html =
    '<div style="text-align:center;margin-bottom:18px">' +

function gameMatchFlip(card){

  const EN_STOP = ['the','is','are','am','was','were','to','on','in','at','of'];
  const isContent = (w) => isZh
    ? (ZH_STOP.indexOf(w) < 0)

  let meaningfulIdx = sent.words.findIndex(isContent);
  const blankIdx = meaningfulIdx >= 0 ? meaningfulIdx : Math.floor(sent.words.length / 2);
  const answer = sent.words[blankIdx];
  // 오답 보기: 전체 어휘에서 정답과 다른 단어들 (영어는 길이>2, 중국어는 제한 없음)
  const eq = (a,b) => isZh ? (a===b) : (a.toLowerCase()===b.toLowerCase());
  const allWords = _GAME_VOCAB.flatMap(s => s.words).concat(_GAME_WORDS.map(w=>w.en))
    .filter(w => !eq(w, answer) && (isZh ? true : w.length > 2));
  const wrongs = _gameShuffle(Array.from(new Set(allWords))).slice(0, 3);
  const options = _gameShuffle([answer, ...wrongs]);
  _gameState.current = { answer, sentence: sent };
  // 🎨 내용어(뜻 핵심)는 밝게, 기능어(조사·관사·be)는 흐리게 → 문장 구조가 눈에 보임

  ).join(' ');
  // 힌트: 한국어 번역 + (있으면) 병음. 번역 없으면 🔊 문장 듣기 버튼.

  let html =
    (_gameState.boss ? _bossBannerHtml() : '') +
    '<div style="text-align:center;margin-bottom:20px">' + fillHint + '</div>' +
    '<div style="text-align:center;margin-bottom:24px">' +
      '<div style="font-size:13px;color:#94a3b8;margin-bottom:8px">🎯 빈칸에 들어갈 단어를 고르세요</div>' +
      '<div class="fill-sentence" style="font-size:24px;font-weight:700;color:#f1f5f9;padding:18px 24px;background:rgba(15,23,42,0.7);border:2px solid #475569;border-radius:12px;display:inline-block;line-height:1.6">' +
        maskedHtml +

      '<div style="font-size:11px;color:#64748b;margin-top:8px">밝은 단어 = 뜻 핵심 · 흐린 단어 = 문법 기능어</div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:560px;margin:0 auto">';
  options.forEach(opt => {
    html += '<button onclick="gameFillCheck(\'' + opt + '\', this)" ' +
      'style="padding:18px 14px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;border:0;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(139,92,246,0.4);transition:all 0.15s">' + opt + '</button>';
  });

    const c = colors[i];
    var _bpin = b.pinyin ? '<div class="pinyin" style="font-size:clamp(11px,1.6vmin,15px);color:#e0f2fe;margin-top:2px">' + b.pinyin + '</div>' : '';
    html += '<div class="balloon" data-en="' + b.en + '" data-color="' + c.solid + '" data-spd="' + spd.toFixed(3) + '" onclick="gameBalloonPop(this)" ' +

function gameBalloonPopSound(){
  try{
    var AC = window.AudioContext||window.webkitAudioContext; if(!AC) return;
    if(!window._gameAC) window._gameAC = new AC();
    var ac = window._gameAC; if(ac.state==='suspended'){ try{ ac.resume(); }catch(_){} }
    var t = ac.currentTime;
    // 리미터(컴프레서)+메이크업 게인 → 훨씬 크되 클리핑 방지
    var comp=ac.createDynamicsCompressor(); try{comp.threshold.value=-12;comp.knee.value=6;comp.ratio.value=16;comp.attack.value=0.001;comp.release.value=0.25;}catch(_){}
    var mk=ac.createGain(); mk.gain.value=3.4; comp.connect(mk); mk.connect(ac.destination);   // 메이크업 게인↑ (리미터로 클리핑 방지, 더 크게)
    var dur=0.2, len=Math.floor(ac.sampleRate*dur), buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0);
    for(var i=0;i<len;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.4); }
    var src=ac.createBufferSource(); src.buffer=buf;
    var hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=500;
    var ng=ac.createGain(); ng.gain.setValueAtTime(0.0001,t); ng.gain.exponentialRampToValueAtTime(1.7,t+0.004); ng.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(hp); hp.connect(ng); ng.connect(comp); src.start(t); src.stop(t+dur);
    var o=ac.createOscillator(), og=ac.createGain();
    o.type='sine'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(60,t+0.13);
    og.gain.setValueAtTime(0.0001,t); og.gain.exponentialRampToValueAtTime(1.5,t+0.004); og.gain.exponentialRampToValueAtTime(0.0001,t+0.17);
    o.connect(og); og.connect(comp); o.start(t); o.stop(t+0.2);
    var o2=ac.createOscillator(), og2=ac.createGain();
    o2.type='triangle'; o2.frequency.setValueAtTime(900,t); o2.frequency.exponentialRampToValueAtTime(180,t+0.08);
    og2.gain.setValueAtTime(0.0001,t); og2.gain.exponentialRampToValueAtTime(0.9,t+0.004); og2.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
    o2.connect(og2); og2.connect(comp); o2.start(t); o2.stop(t+0.12);
  }catch(_){}
}
// 🎈 풍선 터질 때 산산조각: 고무 조각+가루 파편이 사방으로 흩어지며 페이드아웃 + 살짝 플래시
function gameBalloonBurst(stage, cx, cy, color){
  try{
    if(!stage) return; var frags=[], N=22;
    for(var i=0;i<N;i++){
      var el=document.createElement('div'), shard=(i%3!==0), sz=shard?(6+Math.random()*11):(3+Math.random()*4);
      el.style.cssText='position:absolute;left:'+cx+'px;top:'+cy+'px;width:'+sz+'px;height:'+(shard?(sz*0.66):sz)+'px;background:'+color+';'+(shard?('border-radius:'+(Math.random()<0.5?'2px':'50% 50% 0 50%')):'border-radius:50%')+';pointer-events:none;will-change:transform,opacity;box-shadow:0 0 5px '+color+';z-index:6';
      stage.appendChild(el);
      var ang=Math.random()*Math.PI*2, sp=3.5+Math.random()*8.5;
      frags.push({el:el,x:cx,y:cy,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-2.5,rot:Math.random()*360,vrot:(Math.random()-0.5)*44});
    }
    var fr=0, MAX=44;
    (function step(){ fr++; var p=fr/MAX;
      for(var i=0;i<frags.length;i++){ var f=frags[i]; f.vy+=0.6; f.x+=f.vx; f.y+=f.vy; f.rot+=f.vrot;
        f.el.style.transform='translate('+(f.x-cx)+'px,'+(f.y-cy)+'px) rotate('+f.rot+'deg)'; f.el.style.opacity=String(Math.max(0,1-p*1.05)); }
      if(fr<MAX){ requestAnimationFrame(step); } else { for(var j=0;j<frags.length;j++){ var e=frags[j].el; if(e.parentNode) e.parentNode.removeChild(e); } }
    })();
    var fl=document.createElement('div'); fl.style.cssText='position:absolute;left:'+(cx-45)+'px;top:'+(cy-45)+'px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,'+color+'cc,transparent 70%);pointer-events:none;z-index:5;opacity:0.85';
    stage.appendChild(fl); var ff=0;
    (function flStep(){ ff++; fl.style.opacity=String(Math.max(0,0.85*(1-ff/14))); fl.style.transform='scale('+(1+ff*0.14)+')'; if(ff<14){ requestAnimationFrame(flStep); } else if(fl.parentNode){ fl.parentNode.removeChild(fl); } })();
  }catch(_){}
}
function gameBalloonPop(bl){

  gameBalloonPopSound();
  setTimeout(function(){ try{ window.gameSpeak && gameSpeak(en); }catch(_){} }, 320);
  const correct = en === _gameState.current.answer;
  try{ var _bst=document.getElementById('balloon-stage'); if(_bst){ var _cx=bl.offsetLeft+bl.offsetWidth/2, _cy=bl.offsetTop+bl.offsetHeight/2; gameBalloonBurst(_bst,_cx,_cy,bl.dataset.color||'#ef4444'); } }catch(_){}  // 산산조각 파편
  bl.style.animation = 'none';   // 흔들림 애니메이션 해제 → 아래 scale 팝이 적용되도록
  bl.style.transform = 'scale(1.3)';
  bl.style.opacity = '0';
  if (_gameState.balloonTimer) clearInterval(_gameState.balloonTimer);
  if (correct){
    const r = _onCorrect('word', _gameState.current.word, 7);
    try{ window.MangoiStreak && MangoiStreak.complete('balloon'); }catch(_){}  // 🔥 오늘 학습 달성
    document.getElementById('game-feedback').innerHTML = '<span style="color:#10b981">🎉 풍! +' + r.gain + '점' + (r.mult>1?(' 🔥×'+r.mult):'') + '</span>';
    _gameUpdateScore();
    if(!_gameCheckGoal()) setTimeout(gameNextRound, 1200);   // 🎯 10개 정답 → 결과 화면
  } else {
    const dead = _onWrong('word', _gameState.current.word);   // 🧠 콤보 리셋·하트 차감·약점 기록
    _gameUpdateScore();
    document.getElementById('game-feedback').innerHTML = '<span style="color:#ef4444">❌ 아쉬워요! 정답: ' + _gameState.current.answer + '</span>';
    if(!dead) setTimeout(gameNextRound, 1500);
  }
}

/* ============================================================
   iframe(슈팅/낚시) 게임 → 점수 반영
   ============================================================ */
window.addEventListener('message', function (ev){
  const d = ev && ev.data;
  if (!d || typeof d !== 'object' || !d.type) return;
  if (d.type === 'mangoi-game-back'){ hubBackToMenu(); return; }   // ← 게임 내부 뒤로가기 버튼
  if (d.type === 'mangoi-game-complete'){
    _gameState.score += (d.score || 0);
    _gameState.correct += 1;
    try{ window.MangoiStreak && MangoiStreak.complete('iframe'); }catch(_){}  // 🔥 오늘 학습 달성(배틀/낚시/슈팅 미션 완료)
  }
});

// ESC 키로 메뉴 복귀
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape' && document.getElementById('hub-game').classList.contains('active')) hubBackToMenu();
});

hubRenderMenu();
renderSpeedPicks();   // ⚡ 속도(난이도) 선택 UI (허브 헤더 + 게임 상단바)
setGameLang(GAME_LANG);   // 🌐 언어 UI 초기화(저장된 언어로 헤더/버튼/TTS 반영)

/* ── 🔥 학습 불꽃 배지 부착(허브 헤더 + 게임 중 컴팩트) ──
   streak.js 가 로드되면 두 곳에 배지를 그리고, complete() 호출 시 자동 갱신된다. */
function _mountStreakBadges(){
  if(!window.MangoiStreak) return;
  MangoiStreak.mountBadge('#streak-badge-hub', { compact:false });
  MangoiStreak.mountBadge('#streak-badge-game', { compact:true });
}
if(window.MangoiStreak){ _mountStreakBadges(); }
else { window.addEventListener('DOMContentLoaded', _mountStreakBadges); }
</script>

// streak.js(defer) 로드 이후 배지를 확실히 부착
