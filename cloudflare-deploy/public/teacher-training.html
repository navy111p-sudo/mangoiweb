<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만고아이 강사 교육 매뉴얼 · Mangoi Teacher Training</title>
<style>
  :root{
    --mango:#F2A900; --mango-deep:#B26A00; --mango-soft:#FFF3D6; --mango-tint:#FFFBF2;
    --ink:#2b2b2b; --ink-soft:#5a5a5a; --line:#eadfce; --bg:#ffffff;
    --good:#27AE60; --warn:#E67E22; --bad:#C0392B;
    --shadow:0 4px 20px rgba(178,106,0,.08); --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Malgun Gothic','Segoe UI',-apple-system,Roboto,sans-serif;
    color:var(--ink);background:var(--mango-tint);line-height:1.65;-webkit-font-smoothing:antialiased}
  /* ---- top bar ---- */
  header.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;padding:12px clamp(16px,4vw,40px)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.05rem;color:var(--mango-deep)}
  .brand .logo{font-size:1.6rem}
  .spacer{flex:1}
  .lang-toggle{display:inline-flex;background:var(--mango-soft);border-radius:999px;padding:4px;gap:2px}
  .lang-toggle button{border:0;background:transparent;padding:6px 16px;border-radius:999px;
    font-weight:700;cursor:pointer;color:var(--mango-deep);font-size:.9rem;transition:.15s}
  .lang-toggle button.active{background:var(--mango);color:#fff;box-shadow:0 2px 8px rgba(242,169,0,.4)}
  .btn-print{border:1px solid var(--mango);background:#fff;color:var(--mango-deep);
    padding:7px 14px;border-radius:999px;font-weight:700;cursor:pointer;font-size:.85rem;white-space:nowrap}
  .btn-print:hover{background:var(--mango-soft)}
  /* ---- hero ---- */
  .hero{text-align:center;padding:clamp(36px,7vw,72px) 20px 28px}
  .hero .mango{font-size:clamp(48px,10vw,84px);line-height:1}
  .hero h1{font-size:clamp(1.7rem,4.5vw,2.6rem);color:var(--mango-deep);margin:.3em 0 .15em;font-weight:800}
  .hero p.sub{color:var(--ink-soft);font-size:clamp(.95rem,2.5vw,1.15rem);max-width:620px;margin:0 auto}
  .hero .tag{display:inline-block;margin-top:16px;background:var(--mango-soft);color:var(--mango-deep);
    padding:6px 16px;border-radius:999px;font-size:.82rem;font-weight:700}
  /* ---- layout ---- */
  main{max-width:940px;margin:0 auto;padding:0 clamp(16px,4vw,32px) 80px}
  /* ---- section nav chips ---- */
  nav.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0 36px}
  nav.chips a{text-decoration:none;background:#fff;border:1px solid var(--line);color:var(--ink-soft);
    padding:7px 14px;border-radius:999px;font-size:.83rem;font-weight:600;transition:.15s}
  nav.chips a:hover{border-color:var(--mango);color:var(--mango-deep);background:var(--mango-soft)}
  /* ---- section ---- */
  section{margin-bottom:44px;scroll-margin-top:80px}
  .sec-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .sec-head .num{flex-shrink:0;width:38px;height:38px;border-radius:12px;background:var(--mango);
    color:#fff;font-weight:800;display:grid;place-items:center;font-size:1.05rem;box-shadow:var(--shadow)}
  .sec-head h2{font-size:clamp(1.3rem,3.2vw,1.7rem);color:var(--mango-deep);font-weight:800}
  .sec-intro{color:var(--ink-soft);margin:2px 0 20px;font-size:1rem}
  .quote{border-left:5px solid var(--mango);background:#fff;padding:14px 20px;border-radius:0 12px 12px 0;
    font-style:italic;color:var(--ink-soft);box-shadow:var(--shadow);margin-top:8px}
  /* ---- core cards ---- */
  .cards{display:grid;gap:16px}
  .card{background:#fff;border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);
    border:1px solid var(--line);position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--mango)}
  .card h3{font-size:1.12rem;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .card h3 .cnum{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--mango-soft);
    color:var(--mango-deep);font-weight:800;display:grid;place-items:center;font-size:.9rem}
  .wdd{display:grid;gap:8px}
  .wdd .row{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start}
  .wdd .lbl{font-weight:700;font-size:.82rem;padding:2px 10px;border-radius:8px;white-space:nowrap;line-height:1.7}
  .lbl.why{background:#eef6ff;color:#2a6ac0}
  .lbl.do{background:#eafaef;color:var(--good)}
  .lbl.dont{background:#fdeeee;color:var(--bad)}
  .wdd .txt{font-size:.95rem;color:var(--ink-soft)}
  /* ---- cycle flow ---- */
  .flow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:18px 0 24px}
  .flow .step{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 16px;
    font-weight:700;font-size:.86rem;color:var(--mango-deep);box-shadow:var(--shadow);display:flex;align-items:center;gap:6px}
  .flow .arrow{color:var(--mango);align-self:center;font-weight:800}
  /* ---- tables ---- */
  .tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);background:#fff;border:1px solid var(--line)}
  table{border-collapse:collapse;width:100%;min-width:480px}
  thead th{background:var(--mango);color:#fff;font-weight:700;padding:12px 14px;text-align:left;font-size:.9rem}
  tbody td{padding:11px 14px;border-top:1px solid var(--line);font-size:.92rem;color:var(--ink-soft);vertical-align:top}
  tbody tr:nth-child(even){background:var(--mango-tint)}
  tbody td:first-child{font-weight:700;color:var(--ink);white-space:nowrap}
  /* rubric level headers */
  .rub th.l1{background:var(--bad)} .rub th.l2{background:var(--warn)} .rub th.l3{background:var(--good)}
  .rub td{white-space:normal}
  .note{font-size:.85rem;color:var(--ink-soft);font-style:italic;margin-top:10px}
  /* ---- roadmap ---- */
  .road{display:grid;gap:16px}
  .road .block{background:#fff;border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow);border:1px solid var(--line)}
  .road .block h3{color:var(--mango-deep);font-size:1.08rem;margin-bottom:4px}
  .road .block .bintro{color:var(--ink-soft);font-size:.9rem;margin-bottom:10px}
  .road ul{list-style:none;display:grid;gap:8px}
  .road li{padding-left:26px;position:relative;font-size:.94rem;color:var(--ink-soft)}
  .road li::before{content:"▸";position:absolute;left:6px;color:var(--mango);font-weight:800}
  /* ---- checklist ---- */
  .check-grp{background:#fff;border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow);
    border:1px solid var(--line);margin-bottom:14px}
  .check-grp h3{color:var(--mango-deep);font-size:1.05rem;margin-bottom:12px}
  .check-item{display:flex;align-items:flex-start;gap:12px;padding:8px 0;cursor:pointer;font-size:.95rem;color:var(--ink-soft);
    border-top:1px dashed var(--line)}
  .check-item:first-of-type{border-top:0}
  .check-item input{appearance:none;flex-shrink:0;width:22px;height:22px;border:2px solid var(--mango);
    border-radius:7px;margin-top:1px;cursor:pointer;position:relative;transition:.15s}
  .check-item input:checked{background:var(--mango)}
  .check-item input:checked::after{content:"✓";color:#fff;position:absolute;inset:0;display:grid;place-items:center;font-size:.9rem;font-weight:800}
  .check-item input:checked + span{text-decoration:line-through;color:#b6b6b6}
  /* ---- footer ---- */
  footer{text-align:center;color:var(--ink-soft);font-size:.82rem;padding:30px 20px;border-top:1px solid var(--line)}
  .dl{display:inline-flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px}
  .dl a{text-decoration:none;color:var(--mango-deep);border:1px solid var(--line);background:#fff;
    padding:6px 14px;border-radius:999px;font-weight:600;font-size:.82rem}
  .dl a:hover{background:var(--mango-soft)}
  @media(max-width:560px){
    .wdd .row{grid-template-columns:1fr}
    .sec-head .num{width:32px;height:32px}
  }
  @media print{
    header.topbar,nav.chips,.btn-print,.lang-toggle,footer .dl{display:none!important}
    body{background:#fff}
    section{page-break-inside:avoid}
    .card,.road .block,.check-grp,.tbl-wrap{box-shadow:none;border:1px solid #ddd}
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="logo">🥭</span><span data-i="brandName">만고아이</span></div>
  <div class="spacer"></div>
  <div class="lang-toggle" role="group" aria-label="language">
    <button id="btn-ko" class="active" onclick="setLang('ko')">한국어</button>
    <button id="btn-en" onclick="setLang('en')">English</button>
  </div>
  <button class="btn-print" onclick="window.print()" data-i="printBtn">🖨 인쇄/PDF</button>
</header>

<div class="hero">
  <div class="mango">🥭</div>
  <h1 data-i="title">만고아이 강사 교육 매뉴얼</h1>
  <p class="sub" data-i="subtitle">어린이·청소년을 몰입시키는 화상영어 티칭 & 트레이닝 가이드</p>
  <div class="tag" data-i="tag">흥미도 × 성취도를 함께 끌어올리는 실전 지침서</div>
</div>

<main>
  <nav class="chips" id="chips"></nav>
  <div id="content"></div>
</main>

<footer>
  <div data-i="footer">Mangoi English · Teacher Success Team · v1.0</div>
  <div class="dl">
    <a href="/teacher-training.html" data-i="dlWeb">🌐 웹 매뉴얼</a>
  </div>
</footer>

<script>
/* ================= i18n content ================= */
const DATA = {

    s1:{n:"1",t:"이 매뉴얼을 만든 이유", body:[

    s2:{n:"2",t:"아이 몰입 수업의 5대 핵심", cores:[

/* ================= render ================= */
let LANG = 'ko';
const esc = s => String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function secHead(n,t){return `<div class="sec-head"><div class="num">${esc(n)}</div><h2>${esc(t)}</h2></div>`;}

function render(){
  const D = DATA[LANG];
  document.documentElement.lang = LANG;
  document.querySelectorAll('[data-i]').forEach(el=>{ if(D[el.dataset.i]!=null) el.textContent = D[el.dataset.i]; });

  // chips
  const ids=['s1','s2','s3','s4','s5','appA','appB'];
  document.getElementById('chips').innerHTML =
    D.chips.map((c,idx)=>`<a href="#${ids[idx]}">${esc(c)}</a>`).join('');

  let h='';
  // S1
  h+=`<section id="s1">${secHead(D.s1.n,D.s1.t)}`+
     D.s1.body.map(p=>`<p class="sec-intro">${esc(p)}</p>`).join('')+
     `<div class="quote">${esc(D.s1.quote)}</div></section>`;
  // S2 cores
  h+=`<section id="s2">${secHead(D.s2.n,D.s2.t)}<div class="cards">`+
     D.s2.cores.map((c,i)=>`<div class="card"><h3><span class="cnum">${i+1}</span>${esc(c.name)}</h3>
       <div class="wdd">
         <div class="row"><span class="lbl why">${D.lblWhy}</span><span class="txt">${esc(c.why)}</span></div>
         <div class="row"><span class="lbl do">${D.lblDo}</span><span class="txt">${esc(c.do)}</span></div>
         <div class="row"><span class="lbl dont">${D.lblDont}</span><span class="txt">${esc(c.dont)}</span></div>
       </div></div>`).join('')+`</div></section>`;
  // S3 cycle
  const flowHtml = D.s3.flow.map((f,i)=>`<span class="step">${esc(f)}</span>`+
     (i<D.s3.flow.length-1?'<span class="arrow">→</span>':'')).join('');
  h+=`<section id="s3">${secHead(D.s3.n,D.s3.t)}<p class="sec-intro">${esc(D.s3.intro)}</p>
     <div class="flow">${flowHtml}</div>${tableHtml(D.s3.head,D.s3.rows)}</section>`;
  // S4 roadmap
  h+=`<section id="s4">${secHead(D.s4.n,D.s4.t)}<div class="road">`+
     D.s4.blocks.map(b=>`<div class="block"><h3>${esc(b.h)}</h3><div class="bintro">${esc(b.i)}</div>
       <ul>${b.li.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`).join('')+`</div></section>`;
  // S5 age
  h+=`<section id="s5">${secHead(D.s5.n,D.s5.t)}<p class="sec-intro">${esc(D.s5.intro)}</p>${tableHtml(D.s5.head,D.s5.rows)}</section>`;
  // appA checklist
  h+=`<section id="appA">${secHead(D.appA.n,D.appA.t)}<p class="sec-intro">${esc(D.appA.intro)}</p>`+
     D.appA.grps.map(g=>`<div class="check-grp"><h3>${esc(g.h)}</h3>`+
       g.li.map(x=>`<label class="check-item"><input type="checkbox"><span>${esc(x)}</span></label>`).join('')+
       `</div>`).join('')+`</section>`;
  // appB rubric
  h+=`<section id="appB">${secHead(D.appB.n,D.appB.t)}<p class="sec-intro">${esc(D.appB.intro)}</p>
     <div class="tbl-wrap"><table class="rub"><thead><tr>
       <th>${esc(D.appB.head[0])}</th><th class="l1">${esc(D.appB.head[1])}</th>
       <th class="l2">${esc(D.appB.head[2])}</th><th class="l3">${esc(D.appB.head[3])}</th></tr></thead>
       <tbody>${D.appB.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>
       <p class="note">${esc(D.appB.note)}</p></section>`;

  document.getElementById('content').innerHTML = h;
}
function tableHtml(head,rows){
  return `<div class="tbl-wrap"><table><thead><tr>${head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
function setLang(l){
  LANG=l;
  document.getElementById('btn-ko').classList.toggle('active',l==='ko');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  try{localStorage.setItem('mangoi_tt_lang',l);}catch(e){}
  render();
}
try{const saved=localStorage.getItem('mangoi_tt_lang'); if(saved==='en'||saved==='ko')LANG=saved;}catch(e){}
document.getElementById('btn-ko').classList.toggle('active',LANG==='ko');
document.getElementById('btn-en').classList.toggle('active',LANG==='en');
render();
</script>
