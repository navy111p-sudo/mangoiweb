<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만고아이 강사 교육 매뉴얼 - 글로벌 오피스 킷</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
        }
        @media print {
            .no-print {
                display: none !important;
            }
            .print-area {
                display: block !important;
                background: white !important;
                color: black !important;
                padding: 0 !important;
                box-shadow: none !important;
                width: 100% !important;
            }
            .page-break {
                page-break-before: always;
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <!-- TOP HEADER (no-print) -->
    <header class="no-print bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-3xl">🥭</span>
                <div>
                    <h1 class="font-bold text-lg text-slate-900 leading-tight" id="nav-title">만고아이 강사 교육 매뉴얼</h1>
                    <p class="text-xs text-orange-500 font-medium">Teacher Success Hub v2.0</p>
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <!-- LANGUAGE TOGGLE SWITCH -->
                <div class="flex items-center bg-slate-100 p-1 rounded-xl border border-slate-200">
                    <button onclick="setLanguage('ko')" id="lang-ko" class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all bg-white text-orange-600 shadow-sm">
                        한글 (KO)
                    </button>
                    <button onclick="setLanguage('en')" id="lang-en" class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500 hover:text-slate-900">
                        English (EN)
                    </button>
                </div>

                <!-- MAIN TABS -->
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button onclick="switchMainTab('excel')" id="btn-tab-excel" class="px-4 py-2 rounded-lg text-sm font-semibold flex items-center space-x-2 transition-all bg-white text-orange-600 shadow-sm">
                        <i data-lucide="layout-grid" class="w-4 h-4"></i>
                        <span id="tab-excel-txt">📊 실전 엑셀 시트</span>
                    </button>
                    <button onclick="switchMainTab('pdf')" id="btn-tab-pdf" class="px-4 py-2 rounded-lg text-sm font-semibold flex items-center space-x-2 transition-all text-slate-600 hover:text-slate-900">
                        <i data-lucide="file-text" class="w-4 h-4"></i>
                        <span id="tab-pdf-txt">📄 공식 PDF 리포트</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- ================= EXCEL SECTION (no-print) ================= -->
        <section id="section-excel" class="no-print space-y-6">
            <!-- Hero visuals: cover banner + manifesto + motivational stats -->
            <div class="rounded-2xl overflow-hidden shadow-sm border border-slate-200">
                <img id="hero-cover-img" src="" alt="Mangoi Teacher Training" class="w-full h-auto block">
            </div>
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <img id="hero-manifesto-img" src="" alt="Manifesto" class="w-full h-auto block rounded-xl">
            </div>
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <img id="hero-stats-img" src="" alt="Key Numbers" class="w-full h-auto block">
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <div class="flex flex-col md:flex-row md:items-center justify-between pb-4 border-b border-slate-100 mb-6 gap-4">
                    <div>
                        <h2 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                            <span class="p-1.5 bg-green-50 text-green-600 rounded-lg"><i data-lucide="sheet" class="w-5 h-5"></i></span>
                            <span id="excel-title">만고아이 인터랙티브 엑셀 워크북</span>
                        </h2>
                        <p class="text-sm text-slate-500 mt-1" id="excel-subtitle">현업에서 실제로 사용 가능한 핵심 기능과 계산 루브릭이 포함된 인터랙티브 시트입니다.</p>
                    </div>
                    <!-- Excel Export Button -->
                    <button onclick="exportCurrentSheet()" class="inline-flex items-center justify-center space-x-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-xl font-semibold text-sm transition-all shadow-sm">
                        <i data-lucide="download" class="w-4 h-4"></i>
                        <span id="btn-export-txt">현재 시트 Excel(.csv) 다운로드</span>
                    </button>
                </div>

                <!-- Excel Tabs -->
                <div class="flex flex-wrap gap-2 mb-6 border-b border-slate-100 pb-4" id="excel-sub-tabs">
                    <!-- Loaded via JavaScript -->
                </div>

                <!-- EXCEL SHEETS CONTENT -->
                <!-- Sheet 0: 5 Core Focus -->
                <div id="sheet-0" class="excel-sheet overflow-x-auto">
                    <!-- Loaded dynamically in JavaScript (RenderExcelSheet0) -->
                </div>

                <!-- Sheet 1: Engagement Cycle -->
                <div id="sheet-1" class="excel-sheet hidden overflow-x-auto">
                    <!-- Loaded dynamically in JavaScript (RenderExcelSheet1) -->
                </div>

                <!-- Sheet 2: Checklist -->
                <div id="sheet-2" class="excel-sheet hidden">
                    <!-- Loaded dynamically in JavaScript (RenderExcelSheet2) -->
                </div>

                <!-- Sheet 3: Rubric Calculator -->
                <div id="sheet-3" class="excel-sheet hidden">
                    <!-- Loaded dynamically in JavaScript (RenderExcelSheet3) -->
                </div>

            </div>
        </section>

        <!-- ================= PDF PRINT AREA ================= -->
        <section id="section-pdf" class="hidden print-area bg-white rounded-2xl p-8 sm:p-12 shadow-sm border border-slate-200 max-w-5xl mx-auto">

            <!-- Floating Print Controller for Web View (no-print) -->
            <div class="no-print flex items-center justify-between pb-6 border-b border-slate-100 mb-8">
                <div>
                    <span class="text-xs font-semibold text-orange-500 uppercase tracking-widest" id="pdf-ready-tag">PDF Export Ready</span>
                    <h2 class="text-xl font-black text-slate-900 mt-0.5" id="pdf-guide-title">인쇄 및 PDF 다운로드 가이드</h2>
                    <p class="text-sm text-slate-500 mt-1" id="pdf-guide-subtitle">인쇄 레이아웃 및 여백이 깔끔하게 정의된 교육 공식 인쇄용 자료입니다.</p>
                </div>
                <button onclick="window.print()" class="inline-flex items-center justify-center space-x-2 bg-orange-600 hover:bg-orange-700 text-white px-5 py-3 rounded-xl font-bold text-sm transition-all shadow-md hover:scale-[1.02] active:scale-95">
                    <i data-lucide="printer" class="w-4 h-4"></i>
                    <span id="btn-print-txt">PDF 또는 실물 인쇄하기</span>
                </button>
            </div>

            <!-- PDF Real Layout Begin (Loaded Dynamically) -->
            <div id="pdf-dynamic-content" class="print-content text-slate-900">
                <!-- Loaded dynamically in JavaScript (RenderPDFLayout) -->
            </div>
        </section>

    </main>

        // Active Excel sheet sub-tab tracking
        function switchExcelTab(sheetIndex) {
            currentActiveExcelSheet = sheetIndex;
            const tabs = document.querySelectorAll('.excel-sub-tab-btn');
            const sheets = document.querySelectorAll('.excel-sheet');

            tabs.forEach((tab, index) => {
                if (index === sheetIndex) {
                    tab.className = "excel-sub-tab-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border-2 border-emerald-600 bg-emerald-50 text-emerald-800 transition-all";
                } else {
                    tab.className = "excel-sub-tab-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider border border-slate-200 hover:bg-slate-50 text-slate-600 transition-all";
                }
            });

            sheets.forEach((sheet, index) => {
                if (index === sheetIndex) {
                    sheet.classList.remove('hidden');
                } else {
                    sheet.classList.add('hidden');
                }
            });
        }

        // Live interactive checklist progress monitor
        function updateChecklist() {
            const checkboxes = document.querySelectorAll('.checklist-box');
            let checkedCount = 0;
            checkboxes.forEach(box => {
                if (box.checked) checkedCount++;
            });

            const percent = checkboxes.length ? Math.round((checkedCount / checkboxes.length) * 100) : 0;
            const progressEl = document.getElementById('checklist-progress');
            const percentEl = document.getElementById('checklist-percent');

            if (progressEl && percentEl) {
                progressEl.style.width = percent + '%';
                percentEl.textContent = percent + '%';
            }
        }

        // Live interactive evaluation rubric calculator
        function calculateRubric() {
            const selects = document.querySelectorAll('.rubric-score');
            if (selects.length === 0) return;

            let sum = 0;
            selects.forEach(select => {
                sum += parseInt(select.value, 10);
            });

            const totalEl = document.getElementById('rubric-total');
            const badgeEl = document.getElementById('rubric-badge');
            const feedbackEl = document.getElementById('rubric-feedback');

            if (!totalEl || !badgeEl || !feedbackEl) return;

            totalEl.textContent = sum;
            const textGroup = i18n[currentLang];

            if (sum >= 15) {
                badgeEl.textContent = textGroup.rubricBadges[0];
                badgeEl.className = "mt-4 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-amber-400 text-slate-950";
                feedbackEl.textContent = textGroup.rubricFeedbackExcellent;
            } else if (sum >= 10) {
                badgeEl.textContent = textGroup.rubricBadges[1];
                badgeEl.className = "mt-4 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-blue-500 text-white";
                feedbackEl.textContent = textGroup.rubricFeedbackGood;
            } else {
                badgeEl.textContent = textGroup.rubricBadges[2];
                badgeEl.className = "mt-4 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-rose-600 text-white";
                feedbackEl.textContent = textGroup.rubricFeedbackNeedsWork;
            }
        }

        // CSV Multi-language downloader
        function exportCurrentSheet() {
            let csvContent = "﻿"; // UTF-8 BOM key to prevent Korean/foreign characters from breaking in Excel
            let fileName = "mangoi_sheet.csv";
            const ds = i18n[currentLang];

            if (currentActiveExcelSheet === 0) {
                fileName = currentLang === 'ko' ? "만고아이_5대_핵심_가이드.csv" : "mangoi_5_core_focus.csv";
                csvContent += ds.sheet0Headers.join(",") + "\n";
                ds.sheet0Rows.forEach(row => {
                    // Escape double quotes and commas for clean CSV
                    const sanitized = row.map(v => `"${v.replace(/"/g, '""')}"`);
                    csvContent += sanitized.join(",") + "\n";
                });
            } else if (currentActiveExcelSheet === 1) {
                fileName = currentLang === 'ko' ? "만고아이_흥미_공식_사이클.csv" : "mangoi_engagement_cycle.csv";
                csvContent += ds.sheet1Headers.join(",") + "\n";
                ds.sheet1Rows.forEach(row => {
                    const sanitized = row.map(v => `"${v.replace(/"/g, '""')}"`);
                    csvContent += sanitized.join(",") + "\n";
                });
            } else if (currentActiveExcelSheet === 2) {
                fileName = currentLang === 'ko' ? "만고아이_자가_체크리스트.csv" : "mangoi_checklist.csv";
                csvContent += ds.checklistHeaders.slice(1).join(",") + "\n"; // omit checkbox col
                ds.checklistRows.forEach(row => {
                    const sanitized = row.map(v => `"${v.replace(/"/g, '""')}"`);
                    csvContent += sanitized.join(",") + "\n";
                });
            } else {
                fileName = currentLang === 'ko' ? "만고아이_강사_평가_결과.csv" : "mangoi_rubric_scores.csv";
                const selects = document.querySelectorAll('.rubric-score');
                const colHeader = currentLang === 'ko' ? "평가 항목,부여된 점수\n" : "Evaluation Criteria,Awarded Points\n";
                csvContent += colHeader;

                ds.rubricItems.forEach((item, idx) => {
                    const score = selects[idx] ? selects[idx].value : "3";
                    csvContent += `"${item.title.replace(/"/g, '""')}",${score}\n`;
                });

                const totalText = currentLang === 'ko' ? "총점" : "Total Score";
                csvContent += `${totalText},${document.getElementById('rubric-total').textContent} / 18\n`;
            }

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", fileName);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        // Initialize elements on load
        window.onload = function() {
            setLanguage('ko'); // default to Korean representation
        }
    </script>
