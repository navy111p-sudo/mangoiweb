<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>html,body{margin:0;background:#0a0c1e;overflow:hidden}#wrap{position:fixed;inset:0}#c{width:100%;height:100%;display:block}
#hud{position:fixed;left:0;right:0;top:0;color:#fff;font:14px/1.5 sans-serif;background:#000a;padding:8px 12px;text-align:center;z-index:9}
#hud b{color:#7CFF9B}
/* red frame at exact canvas edges — 공룡이 이 빨간 테두리(=화면 끝) 안에 항상 다 들어오면 안 잘리는 것 */
#edge{position:fixed;inset:0;border:3px solid #ff3b3b;pointer-events:none;z-index:8}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script></head>
<body><div id="wrap"><canvas id="c"></canvas></div><div id="edge"></div><div id="hud">loading…</div>
<script>
var cfg={ video:'trex-walk.mp4?v=8', vw:1260, vh:470, H0:5.9, feetFrac:0.962, dinoWFrac:0.912, dinoHFrac:0.862, preferX:4.0, sizeFactor:0.7, color:[1.06,1.02,0.96] };
var canvas=document.getElementById('c'), wrap=document.getElementById('wrap');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:false,preserveDrawingBuffer:true});
var scene=new THREE.Scene(); scene.background=new THREE.Color(0x2a2450);
var W=wrap.clientWidth,H=wrap.clientHeight;
var camera=new THREE.PerspectiveCamera(56,W/H,0.1,200); camera.position.set(0,4.7,17); camera.lookAt(0,2.82,0); scene.add(camera);
scene.add(new THREE.AmbientLight(0xffffff,1.0));
// ground grid at y=0 so we SEE where feet should touch
var grid=new THREE.GridHelper(60,60,0x8899ff,0x445088); grid.position.y=0; scene.add(grid);
// hero marker (green box at -4.6) + boss origin marker (yellow at +4.6)
function marker(x,col){var m=new THREE.Mesh(new THREE.BoxGeometry(0.6,2.2,0.6),new THREE.MeshBasicMaterial({color:col}));m.position.set(x,1.1,0);scene.add(m);return m;}
marker(-4.6,0x33ff88);
var GAP=4.6;
var G=new THREE.Group(); G.position.set(GAP,0,0); G.scale.setScalar(1.32); scene.add(G);
// ---- trex billboard (chroma) ----
var video=document.createElement('video'); video.src=cfg.video; video.loop=true; video.muted=true; video.playsInline=true; video.setAttribute('playsinline',''); video.crossOrigin='anonymous';
document.body.appendChild(video); video.play().catch(function(){});
var tex=new THREE.VideoTexture(video); tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter; tex.generateMipmaps=false;
var tc=cfg.color;
var mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,side:THREE.DoubleSide,
 uniforms:{map:{value:tex},keyLo:{value:0.10},keyHi:{value:0.34},tint:{value:new THREE.Color(tc[0],tc[1],tc[2])}},
 vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
 fragmentShader:['uniform sampler2D map;uniform float keyLo;uniform float keyHi;uniform vec3 tint;varying vec2 vUv;',
 'void main(){vec4 c=texture2D(map,vUv);float ex=c.g-max(c.r,c.b);float a=1.0-smoothstep(keyLo,keyHi,ex);if(a<=0.02)discard;',
 'float g2=min(c.g,max(c.r,c.b)+0.06);gl_FragColor=vec4(vec3(c.r,g2,c.b)*tint,a);}'].join('\n')});
var AR=cfg.vw/cfg.vh, DWF=cfg.dinoWFrac, DHF=cfg.dinoHFrac, H0=cfg.H0, BY0=H0*(cfg.feetFrac-0.5);
var mesh=new THREE.Mesh(new THREE.PlaneGeometry(H0*AR,H0),mat); mesh.position.set(0,BY0,0); mesh.frustumCulled=false; mesh.renderOrder=2;
var holder=new THREE.Group(); holder.add(mesh); G.add(holder);
var _pv=new THREE.Vector3();
function fitBossVideo(){
  var ps=G.scale.x; if(!camera.aspect||camera.aspect<0.05)return;
  camera.updateMatrixWorld();
  var Wp=H0*AR, FEET=cfg.feetFrac, uL=(1-DWF)/2,uR=1-(1-DWF)/2,vT=FEET-DHF,vB=FEET;
  var cLocalX=((uL+uR)/2-0.5)*Wp;
  var rel=[[uL,vT],[uR,vT],[uL,vB],[uR,vB]].map(function(c){return{x:(c[0]-0.5)*Wp-cLocalX,y:mesh.position.y+H0/2-c[1]*H0};});
  function bnd(S,X){var a=9,b=-9,cc=9,d=-9;for(var i=0;i<rel.length;i++){_pv.set(X+S*rel[i].x,S*rel[i].y,0).project(camera);if(_pv.x<a)a=_pv.x;if(_pv.x>b)b=_pv.x;if(_pv.y<cc)cc=_pv.y;if(_pv.y>d)d=_pv.y;}return{xmn:a,xmx:b,ymn:cc,ymx:d};}
  var m=0.13,lim=1-m,prefX=cfg.preferX,S=1;
  for(var it=0;it<32;it++){
    var b0=bnd(S,0),b1=bnd(S,1);var slope=((b1.xmn+b1.xmx)-(b0.xmn+b0.xmx))/2;if(Math.abs(slope)<1e-4)slope=(slope<0?-1e-4:1e-4);
    var Xc=-((b0.xmn+b0.xmx)/2)/slope;var bc=bnd(S,Xc);var wHalf=(bc.xmx-bc.xmn)/2;
    if(wHalf<=lim&&bc.ymx<=lim&&bc.ymn>=-lim){var lo=Xc,hi=prefX;for(var k=0;k<26;k++){var mid=(lo+hi)/2,bb=bnd(S,mid);if(bb.xmx<=lim&&bb.xmn>=-lim)lo=mid;else hi=mid;}holder.scale.setScalar(S*(cfg.sizeFactor||1)/ps);holder.position.x=(lo-G.position.x)/ps;return;}
    S*=0.93;if(S<0.04){holder.scale.setScalar(0.04/ps);holder.position.x=(Xc-G.position.x)/ps;return;}
  }
}
function fit(){W=wrap.clientWidth;H=wrap.clientHeight;if(H<1)H=1;camera.aspect=W/H;camera.position.z=(W/H>=1.2)?13.5:17;camera.updateProjectionMatrix();renderer.setSize(W,H,false);fitBossVideo();}
fit(); window.addEventListener('resize',fit);
window.__seek=function(t){video.currentTime=t;};
function loop(){ if(video.readyState>=2)tex.needsUpdate=true; renderer.render(scene,camera);
  document.getElementById('hud').innerHTML='🦖 <b>티라노 전체 몸 테스트</b> — 창 크기를 아무리 바꿔도 <b>다리·발·입·꼬리</b>가 빨간 테두리(화면 끝) 안에 다 들어옵니다 (화면비 '+camera.aspect.toFixed(2)+')';
  requestAnimationFrame(loop); }
loop();
// 브라우저 자동재생 허용 위해 상호작용 시 재생
['click','touchstart','keydown'].forEach(function(e){window.addEventListener(e,function(){var p=video.play();if(p&&p.catch)p.catch(function(){});},{once:true});});
</script><!-- BUILD:20260709014319 -->
</body></html>
