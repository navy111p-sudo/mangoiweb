<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<title>나의 단어장 — 망고아이</title>
<link rel="icon" type="image/png" href="/img/icon-192.png">
<script src="/js/mango-i18n.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800;900&family=Cormorant+Garamond:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:radial-gradient(ellipse at top right,rgba(96,140,255,0.32),transparent 52%),radial-gradient(ellipse at bottom left,rgba(129,132,255,0.26),transparent 48%),linear-gradient(180deg,#1a2f6b,#17306a,#122a58);color:#e6ecff;font-family:'Noto Sans KR',sans-serif;padding-bottom:80px}
  .wrap{max-width:1020px;margin:0 auto;padding:36px 22px}
  .brand{text-align:center;margin-bottom:18px}
  .brand-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;background:linear-gradient(180deg,#fff4cc,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:clamp(38px,5vw,50px);letter-spacing:1px;display:block}
  .sub{color:#a3b3d1;font-size:15px;margin-top:8px}

  /* ── 상단 게임 대시보드: 망고 성장 + 스트릭 + 미션 + 포인트 ── */
  .dash{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center;background:linear-gradient(135deg,rgba(79,124,255,0.14),rgba(20,41,80,0.9));border:1px solid rgba(79,124,255,0.28);border-radius:18px;padding:16px 20px;margin-bottom:20px}
  .mango-pod{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:110px}
  .mango-pod img{width:64px;height:64px;object-fit:contain;transition:width .6s,height .6s;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.35))}
  .mango-pod.glow img{filter:drop-shadow(0 0 14px rgba(251,191,36,0.85))}
  .mango-stage{font-size:13px;font-weight:800;color:#fbbf24}
  .grow-bar{width:110px;height:8px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden}
  .grow-bar i{display:block;height:100%;background:linear-gradient(90deg,#34d399,#fbbf24);border-radius:99px;transition:width .8s}
  .dash-stats{display:flex;gap:12px;flex-wrap:wrap}
  .stat-chip{flex:1;min-width:120px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:12px 14px;text-align:center}
  .stat-chip .v{font-size:22px;font-weight:900;color:#fff}
  .stat-chip .k{font-size:12.5px;color:#a3b3d1;margin-top:2px}
  .stat-chip.hot .v{color:#fb923c}
  .stat-chip.gold .v{color:#fbbf24}
  .mission-chip{position:relative;overflow:hidden}
  .mission-fill{position:absolute;inset:0;background:linear-gradient(90deg,rgba(52,211,153,0.22),rgba(52,211,153,0.08));width:0%;transition:width .8s}
  .mission-chip .v,.mission-chip .k{position:relative}
  .mission-chip.done{border-color:rgba(52,211,153,0.6)}
  .mission-chip.done .v{color:#34d399}

  .tab{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
  .tab button{flex:1;min-width:130px;padding:15px 14px;background:rgba(255,255,255,0.05);color:#a3b3d1;border:1px solid rgba(255,255,255,0.08);border-radius:12px;cursor:pointer;font-weight:700;font-size:16px;font-family:inherit}
  .tab button.active{background:linear-gradient(135deg,#4f7cff,#3b82f6);color:#fff;border-color:transparent}
  .card{background:#142950;border:1px solid rgba(79,124,255,0.18);border-radius:16px;padding:26px;margin-bottom:16px}
  .add-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-bottom:16px}
  .add-form input{padding:15px 16px;background:#0c1a3a;border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#e6ecff;font-size:17px;min-width:0;font-family:inherit}
  .add-form input::placeholder{color:#6b7a99}
  .add-form button{padding:15px 26px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:0;border-radius:10px;font-weight:800;cursor:pointer;font-size:17px;font-family:inherit}

  /* ── 게임 화면 ── */
  .play-hero{text-align:center;padding:26px 10px}
  .play-hero h2{font-size:26px;margin-bottom:8px}
  .play-hero p{color:#a3b3d1;font-size:15px;margin-bottom:20px}
  .big-btn{display:inline-block;padding:18px 46px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a;border:0;border-radius:99px;font-weight:900;font-size:20px;cursor:pointer;box-shadow:0 10px 26px -8px rgba(251,191,36,0.55);font-family:inherit;transition:transform .15s}
  .big-btn:active{transform:scale(0.95)}
  .hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap}
  .hud .prog{color:#a3b3d1;font-size:15px;font-weight:700}
  .hud .score{font-size:17px;font-weight:900;color:#fbbf24}
  .combo-tag{display:inline-block;padding:4px 12px;border-radius:99px;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;font-weight:900;font-size:14px;animation:pop .3s}
  @keyframes pop{0%{transform:scale(0.4)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  .timer-bar{height:10px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;margin-bottom:14px}
  .timer-bar i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#34d399,#fbbf24,#ef4444);border-radius:99px}

  .flash{background:linear-gradient(135deg,#1a3266,#142950);border:1px solid rgba(79,124,255,0.3);border-radius:22px;padding:44px 28px;text-align:center;min-height:300px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;position:relative;box-shadow:0 12px 32px -10px rgba(0,0,0,0.4)}
  .flash-front{font-size:clamp(40px,7vw,58px);font-weight:800;color:#fbbf24;letter-spacing:0.5px}
  .flash-back{margin-top:20px;font-size:26px;color:#e6ecff;display:none}
  .flash-example{margin-top:12px;font-size:18px;color:#a3b3d1;font-style:italic;display:none}
  .flash.flipped .flash-back,.flash.flipped .flash-example{display:block}
  .flash.flipped .flash-front{font-size:30px;opacity:0.7}
  .flash-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .flash-actions button{padding:19px;font-weight:800;border:0;border-radius:12px;cursor:pointer;font-size:18px;font-family:inherit}
  .flash-wrong{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff}
  .flash-correct{background:linear-gradient(135deg,#10b981,#059669);color:#fff}

  .q-box{background:linear-gradient(135deg,#1a3266,#142950);border:1px solid rgba(79,124,255,0.3);border-radius:22px;padding:34px 24px;text-align:center;min-height:170px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 12px 32px -10px rgba(0,0,0,0.4)}
  .q-word{font-size:clamp(36px,6vw,52px);font-weight:800;color:#fbbf24;word-break:break-all}
  .q-word .blank{color:#60a5fa;border-bottom:4px solid #60a5fa;padding:0 4px;margin:0 2px}
  .q-hint{margin-top:10px;font-size:16px;color:#a3b3d1}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .opts button{padding:20px 14px;font-weight:800;border:1px solid rgba(255,255,255,0.12);border-radius:14px;cursor:pointer;font-size:19px;background:rgba(255,255,255,0.05);color:#e6ecff;font-family:inherit;transition:transform .1s}
  .opts button:active{transform:scale(0.96)}
  .opts button.good{background:linear-gradient(135deg,#10b981,#059669);border-color:transparent;color:#fff}
  .opts button.bad{background:linear-gradient(135deg,#ef4444,#b91c1c);border-color:transparent;color:#fff}
  .opts button:disabled{cursor:default}
  .tool-row{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .tool-btn{padding:12px 22px;border-radius:99px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#e6ecff;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit}
  .tool-btn:disabled{opacity:0.45;cursor:default}
  .speak-fb{text-align:center;margin-top:10px;font-size:15px;color:#a3b3d1;min-height:22px}

  /* 정답/오답 플로팅 포인트 */
  .float-pt{position:fixed;font-size:30px;font-weight:900;color:#fbbf24;pointer-events:none;z-index:9999;animation:floatUp 1.1s forwards;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
  .float-pt.neg{color:#f87171}
  @keyframes floatUp{0%{opacity:0;transform:translateY(10px) scale(0.6)}20%{opacity:1;transform:translateY(0) scale(1.15)}100%{opacity:0;transform:translateY(-70px) scale(1)}}

  /* 축하 화면 */
  .finish{text-align:center;padding:28px 10px}
  .finish img{width:110px;height:110px;object-fit:contain;animation:dance 0.8s infinite alternate ease-in-out;filter:drop-shadow(0 0 16px rgba(251,191,36,0.7))}
  @keyframes dance{0%{transform:rotate(-8deg) translateY(0)}100%{transform:rotate(8deg) translateY(-12px)}}
  .finish h2{font-size:30px;margin:14px 0 6px}
  .finish .earn{font-size:22px;font-weight:900;color:#fbbf24;margin:10px 0}
  .finish-grid{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0}
  .finish-grid .fg{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 22px;min-width:110px}
  .finish-grid .fg b{display:block;font-size:24px;color:#fff}
  .finish-grid .fg span{font-size:13px;color:#a3b3d1}
  .mission-banner{margin:14px auto;max-width:420px;background:linear-gradient(135deg,rgba(52,211,153,0.25),rgba(16,185,129,0.12));border:1px solid rgba(52,211,153,0.5);border-radius:14px;padding:14px;font-weight:800;font-size:17px;color:#34d399;animation:pop .4s}

  /* ── 단어 도감 (수집 카드) ── */
  .dex-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .dex-head .t{font-size:19px;font-weight:800}
  .dex-head .c{color:#a3b3d1;font-size:14px}
  .dex{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .dexc{position:relative;border-radius:16px;padding:16px 12px;text-align:center;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);overflow:hidden}
  .dexc .w{font-size:20px;font-weight:900;word-break:break-all}
  .dexc .k{font-size:14px;color:#cbd5e1;margin-top:4px;min-height:20px}
  .dexc .stars{margin-top:8px;font-size:13px;letter-spacing:2px}
  .dexc .rar{position:absolute;top:8px;left:10px;font-size:10.5px;font-weight:900;padding:2px 8px;border-radius:99px}
  .dexc .dx-tools{display:flex;gap:6px;justify-content:center;margin-top:10px}
  .dexc .dx-tools button{padding:6px 12px;border-radius:8px;border:0;cursor:pointer;font-size:13px;background:rgba(255,255,255,0.1);color:#e6ecff}
  .dexc .dx-tools .dl{background:rgba(239,68,68,0.15);color:#f87171;font-size:12px}
  .r-seed{border-color:rgba(148,163,184,0.4)}
  .r-seed .rar{background:rgba(148,163,184,0.25);color:#cbd5e1}
  .r-seed .w{color:#e6ecff}
  .r-silver{border-color:rgba(203,213,225,0.65)}
  .r-silver .rar{background:linear-gradient(135deg,#cbd5e1,#94a3b8);color:#1e293b}
  .r-silver .w{color:#e2e8f0}
  .r-gold{border-color:rgba(251,191,36,0.8);background:linear-gradient(160deg,rgba(251,191,36,0.12),rgba(255,255,255,0.03))}
  .r-gold .rar{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a}
  .r-gold .w{color:#fbbf24}
  .r-master{border-color:rgba(96,165,250,0.9);background:linear-gradient(160deg,rgba(96,165,250,0.16),rgba(192,132,252,0.1))}
  .r-master .rar{background:linear-gradient(135deg,#60a5fa,#c084fc);color:#fff}
  .r-master .w{background:linear-gradient(90deg,#60a5fa,#c084fc,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .r-gold::after,.r-master::after{content:'';position:absolute;top:-60%;left:-70%;width:50%;height:220%;background:linear-gradient(100deg,transparent,rgba(255,255,255,0.35),transparent);transform:rotate(15deg);animation:shine 3.2s infinite}
  @keyframes shine{0%{left:-70%}55%{left:130%}100%{left:130%}}

  /* ── 랭킹 ── */
  .lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;background:rgba(255,255,255,0.04);margin-bottom:8px;font-size:16px}
  .lb-row .rk{width:44px;font-size:20px;font-weight:900;text-align:center}
  .lb-row .nm{flex:1;font-weight:700}
  .lb-row .sc{font-weight:900;color:#fbbf24}
  .lb-row.me{border:1px solid rgba(251,191,36,0.6);background:rgba(251,191,36,0.08)}
  .my-rank{margin-top:14px;text-align:center;padding:14px;border-radius:12px;background:rgba(79,124,255,0.12);border:1px solid rgba(79,124,255,0.3);font-size:16px;font-weight:700}

  /* 배지 토스트 */
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:26px;z-index:9999;background:linear-gradient(135deg,#1a3266,#142950);border:1px solid rgba(251,191,36,0.6);border-radius:14px;padding:14px 24px;font-size:16px;font-weight:800;box-shadow:0 14px 34px -8px rgba(0,0,0,0.6);animation:toastIn .4s}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,26px)}to{opacity:1;transform:translate(-50%,0)}}

  .home-btn{position:fixed;top:14px;right:14px;z-index:999;padding:9px 18px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a;text-decoration:none;font-weight:800;border-radius:99px;font-size:13px}
  .empty{padding:48px 20px;text-align:center;color:#a3b3d1;font-size:17px}
  #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:9998}

  @media (max-width:640px){
    .wrap{padding:24px 14px}
    .add-form{grid-template-columns:1fr}
    .add-form button{padding:14px 18px}
    .dash{grid-template-columns:1fr;text-align:center}
    .mango-pod{margin:0 auto}
    .tab button{min-width:44%;font-size:15px;padding:13px 8px}
    .opts{grid-template-columns:1fr}
    .dex{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  }
</style>
</head>
<body>
<a class="home-btn" href="/">🏠 <span data-ko="홈" data-en="Home">홈</span></a>
<canvas id="confetti-canvas"></canvas>

<div class="wrap">
  <div class="brand">
    <span class="brand-logo">📚 My Vocab</span>
    <div class="sub" data-ko="단어를 모아 골드 카드로 키우고, 복습 게임으로 포인트를 모아요!" data-en="Collect words, level them into gold cards, and earn points with review games!">단어를 모아 골드 카드로 키우고, 복습 게임으로 포인트를 모아요!</div>
  </div>

  <!-- 게임 대시보드 -->
  <div class="dash" id="dash">
    <div class="mango-pod" id="mango-pod">
      <img src="/img/mango-char.png" alt="mango" id="mango-img">
      <div class="mango-stage" id="mango-stage">아기 망고</div>
      <div class="grow-bar"><i id="grow-fill" style="width:0%"></i></div>
    </div>
    <div class="dash-stats">
      <div class="stat-chip hot"><div class="v" id="st-streak">🔥 0일</div><div class="k" data-ko="연속 복습" data-en="Review Streak">연속 복습</div></div>
      <div class="stat-chip mission-chip" id="mission-chip"><div class="mission-fill" id="mission-fill"></div><div class="v" id="st-mission">0/10</div><div class="k" data-ko="오늘의 미션 (+50P)" data-en="Daily Mission (+50P)">오늘의 미션 (+50P)</div></div>
      <div class="stat-chip gold"><div class="v" id="st-points">0P</div><div class="k" data-ko="오늘 얻은 포인트" data-en="Points Today">오늘 얻은 포인트</div></div>
      <div class="stat-chip"><div class="v" id="st-collect">0</div><div class="k" data-ko="수집한 단어" data-en="Words Collected">수집한 단어</div></div>
    </div>
  </div>

  <div class="tab">
    <button id="tab-add" class="active" onclick="switchTab('add')">＋ <span data-ko="단어 추가" data-en="Add Word">단어 추가</span></button>
    <button id="tab-flash" onclick="switchTab('flash')">🎮 <span data-ko="복습 게임" data-en="Review Game">복습 게임</span> <span id="due-badge" style="margin-left:4px;padding:2px 8px;background:#ef4444;color:#fff;border-radius:99px;font-size:12px;display:none"></span></button>
    <button id="tab-rank" onclick="switchTab('rank')">🏆 <span data-ko="주간 랭킹" data-en="Weekly Ranking">주간 랭킹</span></button>
    <button id="tab-list" onclick="switchTab('list')">📖 <span data-ko="단어 도감" data-en="Collection">단어 도감</span></button>
  </div>

  <!-- Add Tab -->
  <div id="pane-add" class="card">
    <div class="add-form">
      <input id="word-input" type="text" placeholder="영어 단어 (예: gorgeous)" data-ko-placeholder="영어 단어 (예: gorgeous)" data-en-placeholder="English word (e.g. gorgeous)" />
      <input id="ko-input" type="text" placeholder="한국어 뜻 (비우면 AI 자동)" data-ko-placeholder="한국어 뜻 (비우면 AI 자동)" data-en-placeholder="Korean (blank = AI auto)" />
      <button onclick="addWord()" data-ko="추가" data-en="Add">추가</button>
    </div>
    <div id="add-feedback" style="font-size:15px;color:#a3b3d1;margin-top:8px"></div>
    <div style="font-size:14px;color:#8b9bbd;margin-top:14px">💡 빈 뜻으로 추가하면 AI 가 자동으로 한국어 + 예문을 생성합니다 (3~5초).</div>
  </div>

  <!-- Play Tab -->
  <div id="pane-flash" class="card" style="display:none">
    <div id="flash-content"></div>
  </div>

  <!-- Rank Tab -->
  <div id="pane-rank" class="card" style="display:none">
    <div id="rank-content"></div>
  </div>

  <!-- Collection Tab -->
  <div id="pane-list" class="card" style="display:none">
    <div id="list-content"></div>
  </div>
</div>

<script>
const esc = (s) => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
function getUid(){ try { const u = JSON.parse(localStorage.getItem('mango_user')||'null'); return u?.user_id || 'guest'; } catch(e){ return 'guest'; } }
function getName(){ try { const u = JSON.parse(localStorage.getItem('mango_user')||'null'); return u?.name || u?.user_name || ''; } catch(e){ return ''; } }
const UID = getUid();

/* ═══════════ 사운드 (WebAudio — 파일 없이 즉석 합성) ═══════════ */
let _ac = null;
function ac(){ if(!_ac){ try{ _ac = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(_ac&&_ac.state==='suspended') _ac.resume().catch(()=>{}); return _ac; }
function tone(freq, t0, dur, type, vol){
  const c = ac(); if(!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type||'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, c.currentTime+t0);
  g.gain.exponentialRampToValueAtTime(vol||0.18, c.currentTime+t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+t0+dur);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime+t0); o.stop(c.currentTime+t0+dur+0.05);
}
const sndFlip    = () => tone(660, 0, 0.08, 'triangle', 0.1);
const sndCorrect = () => { tone(523,0,0.12,'sine',0.16); tone(659,0.09,0.12,'sine',0.16); tone(784,0.18,0.2,'sine',0.18); };
const sndWrong   = () => { tone(220,0,0.2,'sawtooth',0.1); tone(180,0.12,0.28,'sawtooth',0.1); };
const sndCombo   = () => { tone(784,0,0.09,'square',0.09); tone(988,0.08,0.09,'square',0.09); tone(1175,0.16,0.14,'square',0.11); };
const sndFanfare = () => { [523,659,784,1047].forEach((f,i)=>tone(f,i*0.13,0.22,'sine',0.16)); tone(1319,0.55,0.5,'sine',0.18); };
const sndTick    = () => tone(880, 0, 0.05, 'triangle', 0.05);

/* ═══════════ 컨페티 ═══════════ */
function confetti(){
  const cv = document.getElementById('confetti-canvas');
  const ctx = cv.getContext('2d');
  cv.width = innerWidth; cv.height = innerHeight;
  const cols = ['#fbbf24','#34d399','#60a5fa','#f87171','#c084fc','#fff'];
  const ps = Array.from({length:110}, ()=>({
    x: Math.random()*cv.width, y: -20-Math.random()*cv.height*0.5,
    r: 4+Math.random()*6, c: cols[Math.floor(Math.random()*cols.length)],
    vy: 2.2+Math.random()*3, vx: -1.6+Math.random()*3.2, rot: Math.random()*6.3, vr: -0.15+Math.random()*0.3
  }));
  let frames = 0;
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{ p.y+=p.vy; p.x+=p.vx; p.rot+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.fillRect(-p.r/2,-p.r/3,p.r,p.r*0.66); ctx.restore(); });
    if (++frames < 200) requestAnimationFrame(draw); else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* ═══════════ 플로팅 포인트 (+10P 팡!) ═══════════ */
function floatPt(text, neg){

/* ═══════════ 원어민 TTS (서버 R2캐시 → 기기음성 폴백) ═══════════ */
const _ttsCache = new Map();
async function speakWord(text){
  if (!text) return;
  try {
    let u = _ttsCache.get(text);
    if (!u) {
      const r = await fetch('/api/voice/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text, lang:'en' }) });
      const ct = r.headers.get('content-type')||'';
      if (!r.ok || !/audio/i.test(ct)) throw new Error('tts_unavailable');
      u = URL.createObjectURL(await r.blob());
      _ttsCache.set(text, u);
    }
    await new Audio(u).play();
  } catch(e) {
    try { const ut = new SpeechSynthesisUtterance(text); ut.lang='en-US'; ut.rate=0.9; speechSynthesis.speak(ut); } catch(_e){}
  }
}

/* ═══════════ 복습 게임 세션 ═══════════ */
let BANK = [];            // 전체 단어 (4지선다 오답 보기용)
let S = null;             // 현재 세션
let _timerRaf = null, _timerDeadline = 0, _answered = false;

function renderPlayHome(){
  const el = document.getElementById('flash-content');

  Promise.all([

      <button class="big-btn" id="start-btn">▶ 게임 시작!</button>
    </div>`;
    document.getElementById('start-btn').onclick = () => { ac(); startSession(words); };
  }).catch(()=>{ el.innerHTML = '<div class="empty">로드 실패</div>'; });
}

function startSession(words){
  S = {
    id: Date.now(),
    list: words.slice().sort(()=>Math.random()-0.5),
    idx: 0, correct: 0, combo: 0, maxCombo: 0,
    points: 0, bonus: 0, spoke: new Set()
  };
  nextQuestion();
}

function pickMode(w){
  const koBank = BANK.filter(b => b.korean && b.korean.trim());
  const modes = ['flash'];
  if (w.korean && koBank.length >= 4) { modes.push('choice','choice','reverse'); }
  if ((w.word||'').replace(/[^a-zA-Z]/g,'').length >= 3) modes.push('spell');
  return modes[Math.floor(Math.random()*modes.length)];
}
function distractors(w, key, n){
  const pool = BANK.filter(b => b.id !== w.id && b[key] && String(b[key]).trim() && String(b[key]).trim().toLowerCase() !== String(w[key]||'').trim().toLowerCase());
  const seen = new Set(); const out = [];
  pool.sort(()=>Math.random()-0.5).forEach(b => {
    const v = String(b[key]).trim();
    if (out.length < n && !seen.has(v.toLowerCase())) { seen.add(v.toLowerCase()); out.push(v); }
  });
  return out;
}
function hudHtml(){
  const comboTag = S.combo >= 2 ? `<span class="combo-tag">🔥 ${S.combo} COMBO</span>` : '';
  return `<div class="hud">
    <span class="prog">${S.idx+1} / ${S.list.length}</span>
    ${comboTag}
    <span class="score">⭐ ${S.points + S.bonus}P</span>
  </div>`;
}

function nextQuestion(){
  stopTimer();
  if (!S || S.idx >= S.list.length) return endSession();
  _answered = false;
  const w = S.list[S.idx];
  const mode = pickMode(w);
  if (mode === 'flash') renderFlashQ(w);
  else if (mode === 'choice') renderChoiceQ(w);
  else if (mode === 'reverse') renderReverseQ(w);
  else renderSpellQ(w);
}

/* ── 모드 1: 클래식 플래시카드 (+ 🎤 따라 말하기 보너스) ── */

/* ── 모드 2: 4지선다 (영→한) + 타이머 ── */
function renderChoiceQ(w){
  const opts = distractors(w, 'korean', 3); opts.push(String(w.korean).trim());
  opts.sort(()=>Math.random()-0.5);
  const el = document.getElementById('flash-content');
  el.innerHTML = hudHtml() + `
    <div class="timer-bar"><i id="tbar"></i></div>
    <div class="q-box">
      <div class="q-word">${esc(w.word)}</div>
      <div class="q-hint">이 단어의 뜻은? ⏱️</div>
    </div>
    <div class="tool-row"><button class="tool-btn" data-word="${esc(w.word)}" onclick="speakWord(this.dataset.word)">🔊 발음 듣기</button></div>
    <div class="opts" id="opts">${opts.map(o=>`<button data-v="${esc(o)}">${esc(o)}</button>`).join('')}</div>`;
  const ans = String(w.korean).trim();
  wireOpts(w, ans);
  startTimer(12, () => timeoutAnswer(w, ans));
}

/* ── 모드 3: 거꾸로 (한→영) + 타이머 ── */
function renderReverseQ(w){
  const opts = distractors(w, 'word', 3); opts.push(String(w.word).trim());
  opts.sort(()=>Math.random()-0.5);
  const el = document.getElementById('flash-content');
  el.innerHTML = hudHtml() + `
    <div class="timer-bar"><i id="tbar"></i></div>
    <div class="q-box">
      <div class="q-word" style="font-size:clamp(28px,5vw,40px)">🇰🇷 ${esc(w.korean)}</div>
      <div class="q-hint">이 뜻의 영어 단어는? ⏱️</div>
    </div>
    <div class="opts" id="opts">${opts.map(o=>`<button data-v="${esc(o)}">${esc(o)}</button>`).join('')}</div>`;
  const ans = String(w.word).trim();
  wireOpts(w, ans);
  startTimer(12, () => timeoutAnswer(w, ans));
}

/* ── 모드 4: 철자 채우기 ── */
function renderSpellQ(w){
  const word = String(w.word);
  const letterIdx = [];
  for (let i=0;i<word.length;i++) if (/[a-zA-Z]/.test(word[i]) && i>0) letterIdx.push(i);
  const bi = letterIdx[Math.floor(Math.random()*letterIdx.length)];
  const answer = word[bi].toLowerCase();
  const shown = word.slice(0,bi) + '<span class="blank">_</span>' + word.slice(bi+1);
  const alpha = 'abcdefghijklmnopqrstuvwxyz';
  const optSet = new Set([answer]);
  while (optSet.size < 4) optSet.add(alpha[Math.floor(Math.random()*26)]);
  const opts = [...optSet].sort(()=>Math.random()-0.5);
  const el = document.getElementById('flash-content');
  el.innerHTML = hudHtml() + `
    <div class="timer-bar"><i id="tbar"></i></div>
    <div class="q-box">
      <div class="q-word">${shown}</div>
      <div class="q-hint">🇰🇷 ${esc(w.korean||'')} — 빈칸에 들어갈 글자는? ⏱️</div>
    </div>
    <div class="tool-row"><button class="tool-btn" data-word="${esc(w.word)}" onclick="speakWord(this.dataset.word)">🔊 발음 듣기</button></div>
    <div class="opts" id="opts">${opts.map(o=>`<button data-v="${esc(o)}">${esc(o)}</button>`).join('')}</div>`;
  wireOpts(w, answer);
  startTimer(12, () => timeoutAnswer(w, answer));
}

function wireOpts(w, answer){
  document.querySelectorAll('#opts button').forEach(btn => {
    btn.onclick = () => {
      if (_answered) return; _answered = true;
      stopTimer();
      const ok = btn.dataset.v.trim().toLowerCase() === answer.trim().toLowerCase();
      btn.classList.add(ok ? 'good' : 'bad');
      document.querySelectorAll('#opts button').forEach(b => {
        b.disabled = true;
        if (!ok && b.dataset.v.trim().toLowerCase() === answer.trim().toLowerCase()) b.classList.add('good');
      });
      applyAnswer(w.id, ok);
      if (!ok) speakWord(w.word);
      setTimeout(nextQuestion, ok ? 750 : 1400);
    };
  });
}
function timeoutAnswer(w, answer){
  if (_answered) return; _answered = true;
  document.querySelectorAll('#opts button').forEach(b => {
    b.disabled = true;
    if (b.dataset.v.trim().toLowerCase() === String(answer||'').trim().toLowerCase()) b.classList.add('good');
  });
  toast('⏰ 시간 초과!');
  applyAnswer(w.id, false);
  setTimeout(nextQuestion, 1200);
}

/* 타이머 바 */
function startTimer(sec, onTimeout){
  const bar = document.getElementById('tbar');
  if (!bar) return;
  _timerDeadline = Date.now() + sec*1000;
  let lastTickSec = -1;
  (function frame(){
    const remain = _timerDeadline - Date.now();
    if (!document.getElementById('tbar')) return;
    if (remain <= 0) { bar.style.width = '0%'; onTimeout(); return; }
    bar.style.width = (remain/(sec*1000)*100) + '%';
    const rs = Math.ceil(remain/1000);
    if (rs <= 3 && rs !== lastTickSec) { lastTickSec = rs; sndTick(); }
    _timerRaf = requestAnimationFrame(frame);
  })();
}
function stopTimer(){ if (_timerRaf) cancelAnimationFrame(_timerRaf); _timerRaf = null; }

/* 정답/오답 공통 처리: 포인트/콤보/사운드 + 서버 SRS 기록 */
function applyAnswer(id, correct){
  fetch('/api/vocab/review', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id, correct }) }).catch(()=>{});
  if (correct) {
    S.correct++; S.combo++;
    S.maxCombo = Math.max(S.maxCombo, S.combo);
    S.points += 10;
    let extra = 0;
    if (S.combo >= 5) extra = 5; else if (S.combo >= 3) extra = 3;
    S.bonus += extra;
    floatPt('+' + (10+extra) + 'P');
    if (S.combo >= 3) sndCombo(); else sndCorrect();
  } else {
    S.combo = 0;
    floatPt('아쉬워요!', true);
    sndWrong();
  }
  S.idx++;
}

/* 🎤 따라 말하기 (Whisper) — 성공 시 +20P 보너스 */
async function trySpeak(w){
  const btn = document.getElementById('mic-btn');
  const fb = document.getElementById('speak-fb');
  if (!btn || btn.disabled) return;
  if (S.spoke.has(w.id)) { fb.textContent = '이 단어는 이미 도전했어요!'; return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { fb.textContent = '이 기기에서는 마이크를 쓸 수 없어요 😢'; return; }
  try {
    btn.disabled = true;
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const rec = new MediaRecorder(stream);
    const chunks = [];
    rec.ondataavailable = e => chunks.push(e.data);
    fb.textContent = '🔴 지금 말해요: "' + w.word + '" (3초)';
    rec.start();
    await new Promise(res => setTimeout(res, 3000));
    rec.stop();
    await new Promise(res => rec.onstop = res);
    stream.getTracks().forEach(t=>t.stop());
    fb.textContent = '🤖 AI 가 듣는 중…';
    const fd = new FormData();
    fd.append('audio', new Blob(chunks, { type: rec.mimeType || 'audio/webm' }), 'speak.webm');
    const r = await fetch('/api/voice/transcribe', { method:'POST', body: fd });
    const d = await r.json();
    const heard = String(d.text||'').toLowerCase().replace(/[^a-z\s]/g,' ');
    const target = String(w.word).toLowerCase().trim();
    if (d.ok && heard.split(/\s+/).some(t => t === target || (target.length>3 && t.includes(target)))) {
      S.spoke.add(w.id);
      fb.innerHTML = '🌟 <b style="color:#34d399">발음 성공! +20P</b>';
      floatPt('+20P'); sndFanfare(); confetti();
      fetch('/api/vocab/reward', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ user_id: UID, student_name: getName(), kind: 'speak', session_id: S.id + ':' + w.id }) })
        .then(()=>loadStats()).catch(()=>{});
    } else {
      fb.textContent = d.ok ? ('아깝다! AI 가 들은 말: "' + (d.text||'…') + '" — 다시 눌러 도전!') : '잘 안 들렸어요. 다시 도전!';
      sndWrong();
    }
  } catch(e) {
    fb.textContent = '마이크를 열 수 없어요 (권한 확인)';
  } finally {
    const b2 = document.getElementById('mic-btn');
    if (b2 && !S.spoke.has(w.id)) b2.disabled = false;
  }
}

/* ── 세션 종료: 축하 + 보상 지급 + 미션 + 배지 ── */

      <div class="fg"><b>${S.correct}/${total}</b><span>정답</span></div>
      <div class="fg"><b>🔥 ${S.maxCombo}</b><span>최고 콤보</span></div>
      <div class="fg"><b id="earn-pt">+${earn}P</b><span>획득 포인트</span></div>
    </div>
    <div id="mission-slot"></div>
    <p style="color:#a3b3d1;font-size:15px;margin-top:6px">다음 복습 일정은 망각곡선에 맞춰 자동으로 잡혔어요.</p>
    <div style="margin-top:18px">
      <button class="big-btn" onclick="renderPlayHome();loadDueCount()">확인</button>
    </div>
  </div>`;
  // 포인트 지급 (서버 멱등/상한)
  try {
    if (earn > 0) {
      await fetch('/api/vocab/reward', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ user_id: UID, student_name: getName(), kind: 'session', correct_count: S.correct, bonus: S.bonus, session_id: S.id }) });
    }
    // 일일 미션 (10단어) — 서버가 검증
    const sr = await fetch('/api/vocab/stats?uid='+encodeURIComponent(UID));
    const sd = await sr.json();
    if (sd.ok && sd.today_reviewed >= 10 && !sd.mission_done) {
      const mr = await fetch('/api/vocab/reward', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ user_id: UID, student_name: getName(), kind: 'mission' }) });
      const md = await mr.json();
      if (md.ok && md.awarded > 0) {
        document.getElementById('mission-slot').innerHTML = '<div class="mission-banner">🎯 오늘의 미션 완료! 보너스 +50P</div>';
        sndFanfare(); confetti();
      }
    }
  } catch(e){}
  loadStats(); loadDueCount(); checkBadges();
}

/* ═══════════ 주간 랭킹 ═══════════ */
async function loadRank(){
  const el = document.getElementById('rank-content');
  el.innerHTML = '<div class="empty">불러오는 중…</div>';
  try {
    const r = await fetch('/api/vocab/leaderboard?uid='+encodeURIComponent(UID));
    const d = await r.json();
    if (!d.ok) throw new Error();
    if (!d.top || !d.top.length) {
      el.innerHTML = '<div class="empty">아직 이번 주 기록이 없어요.<br>복습 게임으로 첫 번째 단어왕이 되어 보세요! 👑</div>';
      return;
    }
    const medal = ['🥇','🥈','🥉'];
    el.innerHTML = `<div class="dex-head"><span class="t">👑 주간 단어왕 <span style="font-size:13px;color:#a3b3d1">(최근 7일 정답 수)</span></span></div>`
      + d.top.map(row => `
        <div class="lb-row${row.me?' me':''}">
          <span class="rk">${medal[row.rank-1] || row.rank}</span>
          <span class="nm">${esc(row.name)}${row.me?' <span style="color:#fbbf24">(나)</span>':''}</span>
          <span class="sc">${row.correct}개</span>
        </div>`).join('')
      + (d.my_rank ? `<div class="my-rank">내 순위: <b style="color:#fbbf24">${d.my_rank}위</b> / ${d.total_players}명 — 정답 ${d.my_correct}개</div>`
                   : `<div class="my-rank">아직 순위가 없어요 — 복습 게임을 시작해 보세요!</div>`);
  } catch(e){ el.innerHTML = '<div class="empty">로드 실패</div>'; }
}

/* ═══════════ 단어 도감 (수집 카드) ═══════════ */
function rarity(level){
  if (level >= 6) return { cls:'r-master', tag:'MASTER', stars:'💎' };
  if (level >= 4) return { cls:'r-gold',   tag:'GOLD',   stars:'⭐' };
  if (level >= 2) return { cls:'r-silver', tag:'SILVER', stars:'⭐' };
  return { cls:'r-seed', tag:'새싹', stars:'🌱' };
}
async function loadCollection(){
  const el = document.getElementById('list-content');
  el.innerHTML = '<div class="empty">불러오는 중…</div>';
  try {
    const r = await fetch('/api/vocab/list?uid='+encodeURIComponent(UID));
    const d = await r.json();
    if (!d.words || !d.words.length) {
      el.innerHTML = '<div class="empty">아직 카드가 없어요.<br>＋ 단어 추가 탭에서 첫 카드를 수집해 보세요!</div>'; return;
    }
    const mastered = d.words.filter(w => (w.level||0) >= 5).length;
    el.innerHTML = `<div class="dex-head">
        <span class="t">📖 내 단어 카드</span>
        <span class="c">${d.words.length}장 수집 · 🥇 마스터 ${mastered}장 — 복습에서 맞힐수록 카드가 진화해요!</span>
      </div>
      <div class="dex">` + d.words.map(w => {
        const rr = rarity(w.level||0);
        const lv = Math.min(w.level||0, 7);
        return `<div class="dexc ${rr.cls}">
          <span class="rar">${rr.tag}</span>
          <div class="w">${esc(w.word)}</div>
          <div class="k">${esc(w.korean||'-')}</div>
          <div class="stars">${rr.stars.repeat(Math.max(1, Math.ceil((lv+1)/2)))} <span style="color:#8b9bbd;font-size:11px">Lv${lv}</span></div>
          <div class="dx-tools">
            <button data-word="${esc(w.word)}" onclick="speakWord(this.dataset.word)">🔊</button>
            <button class="dl" onclick="delWord(${w.id})">삭제</button>
          </div>
        </div>`;
      }).join('') + '</div>';
  } catch(e){ el.innerHTML = '<div class="empty">로드 실패</div>'; }
}
async function delWord(id){
  if (!confirm('이 카드를 삭제할까요?')) return;
  await fetch('/api/vocab/'+id, { method:'DELETE' });
  loadCollection(); loadDueCount(); loadStats();
}
