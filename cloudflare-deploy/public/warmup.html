<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover" />
<title>🗣️ 수업 전 AI 웜업 — Mangoi</title>
<link rel="icon" href="/mangoi-favicon.svg" type="image/svg+xml" />
<meta name="theme-color" content="#0a1530" />
<!--
  ============================================================================
   🗣️ 수업 전 AI 웜업(Pre-Class Warm-up) 채팅 UI
   ----------------------------------------------------------------------------
   원어민 수업 10분 전, 학생이 입을 풀도록 AI 대화 친구와 짧게 영어로 대화한다.
   FastAPI 백엔드(PreClassAIEngine)의 POST {API_BASE}/api/warmup/chat 를 호출한다.

   [수업 예약 데이터 연동 포인트]
     - session_id : URL 파라미터 ?room=<수업 room_id> 로 넘기면 수업방과 1:1 매칭.
                    (없으면 로그인 유저 id / 날짜 기반으로 자동 생성)
     - lesson_topic: URL 파라미터 ?unit=<교재 unit> 로 넘기면 워밍업이 실제 레슨과 이어짐.
       예) /warmup.html?room=room_20260701_0930&unit=My%20Weekend
     - 오늘 교재  : ?textbook=<교재명>&level=<레벨>&lesson=<레슨번호> 로 직접 지정하거나,
                    로그인 학생이면 /api/warmup/context 가 students_erp 배정 교재를 자동 조회.
                    AI가 그 교재의 핵심 문장(review_quizzes 은행)으로 워밍업 질문을 한다.
     - api        : URL ?api=https://내백엔드주소  또는 localStorage 'mangoi_api_base' 로 지정.
                    (미설정/서버 꺼짐 → "웜업 서버 연결 필요" 안내만 뜨고 화면은 안 깨짐)
  ============================================================================
-->
<style>
  :root{ --bg:#0a1530; --card:#14213b; --text:#e6ecff; --text2:#a3b3d1;
    --accent:#38bdf8; --accent2:#0ea5e9; --border:rgba(56,189,248,.18); --me:#0ea5e9; }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:radial-gradient(125% 100% at 50% -8%,#2a4d9e 0%,#1a2f6b 42%,#122350 100%);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    -webkit-text-size-adjust:100%;text-size-adjust:100%}
  .top{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(20,33,59,.95);
    position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .top a{color:var(--text);text-decoration:none;font-weight:700;font-size:16px}
  .top h1{margin:0;font-size:22px;font-weight:800;flex:1}
  .wrap{max-width:860px;margin:0 auto;display:flex;flex-direction:column;height:calc(100dvh - 52px)}
  /* 채팅 셸(.wrap) 아래, 일반 문서 흐름에 놓여 페이지 스크롤로 닿는 영역 (다음 이동 버튼·서버 설정) */
  .after{max-width:860px;margin:0 auto;padding:12px 16px 28px}
  .meta{display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px;font-size:14px;color:var(--text2)}
  .meta .chip{background:var(--card);border:1px solid var(--border);border-radius:999px;padding:4px 10px}
  .meta .chip b{color:var(--accent)}
  #log{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:82%;padding:14px 18px;border-radius:16px;font-size:19px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .msg.ai{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
  .msg.me{align-self:flex-end;background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;border-bottom-right-radius:4px}
  .msg.sys{align-self:center;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.35);
    color:#fcd34d;font-size:17px;text-align:center;max-width:92%}
  .msg .who{display:block;font-size:15px;opacity:.7;margin-bottom:4px;font-weight:700}
  .msg .who-ava{width:26px;height:26px;border-radius:50%;object-fit:cover;vertical-align:middle;
    margin-right:6px;background:linear-gradient(135deg,#fbbf24,#f59e0b)}
  /* 🥭 → 우리 망고 캐릭터 인라인 아이콘 (이모지 대신 브랜드 캐릭터 노출) */
  .mango-inline{height:1.7em;width:auto;vertical-align:-0.5em;margin:0 .1em;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))}
  .typing{align-self:flex-start;color:var(--text2);font-size:18px;padding:6px 12px}
  .inbar{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);background:rgba(20,33,59,.9)}
  .inbar input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;
    color:var(--text);padding:14px 16px;font-size:19px;font-family:inherit;outline:none}
  .inbar input:focus{border-color:var(--accent)}
  .inbar button{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04283a;border:0;
    border-radius:12px;padding:0 20px;font-size:18px;font-weight:800;cursor:pointer;font-family:inherit}
  .inbar button:disabled{opacity:.5;cursor:not-allowed}
  .hint{padding:0 16px 10px;font-size:14px;color:var(--text2)}
  .settings{padding:10px 16px;border-top:1px dashed var(--border);font-size:12px;color:var(--text2)}
  .settings summary{cursor:pointer;font-weight:700;color:var(--accent)}
  .settings input{width:100%;margin-top:8px;background:var(--card);border:1px solid var(--border);
    border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px}
  /* 🔊 AI 메시지 '다시 듣기' 버튼 */
  .replay-btn{display:inline-flex;align-items:center;gap:4px;margin-top:10px;
    background:rgba(56,189,248,.14);border:1px solid var(--border);color:var(--accent);
    border-radius:999px;padding:6px 14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  .replay-btn:hover{background:rgba(56,189,248,.26)}
  .replay-btn:active{transform:scale(.96)}
  .replay-btn.playing{background:rgba(56,189,248,.32);border-color:var(--accent)}
  /* 🔊 상단 음성 on/off 토글 */
  .spk-toggle{flex:0 0 auto;background:rgba(56,189,248,.14);border:1px solid var(--border);color:var(--accent);
    border-radius:999px;padding:6px 11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
  .spk-toggle.off{background:rgba(148,163,184,.14);color:var(--text2);border-color:rgba(148,163,184,.3)}
  /* 🐢🐇 선생님(AI) 음성 듣기 속도 조절 바 (1~5단계) */
  .rate-bar{display:flex;align-items:center;gap:10px;margin:2px 16px 8px;padding:9px 14px;
    background:var(--card);border:1px solid var(--border);border-radius:14px;font-size:14px;color:var(--text2)}
  .rate-bar .rate-title{font-weight:800;color:var(--text);white-space:nowrap;font-size:15px}
  .rate-bar .rate-side{white-space:nowrap;font-weight:700}
  .rate-bar input[type=range]{flex:1;min-width:80px;accent-color:var(--accent);height:26px;cursor:pointer}
  .rate-bar .rate-val{min-width:64px;text-align:center;background:rgba(56,189,248,.14);
    border:1px solid var(--border);border-radius:999px;padding:4px 10px;color:var(--accent);
    font-weight:800;font-size:14px;white-space:nowrap}
  /* 🎤 마이크 버튼 (입력창 옆) */
  .inbar .mic-btn{flex:0 0 auto;background:linear-gradient(135deg,#22c55e,#16a34a);color:#04240f;
    border:0;border-radius:12px;padding:0 15px;font-size:19px;line-height:1;cursor:pointer;font-family:inherit}
  .inbar .mic-btn:active{transform:scale(.95)}
  .inbar .mic-btn.rec{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;animation:micpulse 1s infinite}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.55)}70%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
  /* 🎙️ '듣는 중' 표시 (입력창 위) */
  #listening{display:none;align-items:center;justify-content:center;gap:9px;
    padding:9px 16px;background:rgba(239,68,68,.12);border-top:1px solid rgba(239,68,68,.3);
    color:#fca5a5;font-size:13px;font-weight:700}
  #listening .dot{width:9px;height:9px;border-radius:50%;background:#ef4444;animation:micpulse 1s infinite}
  /* 📱 모바일(≤640px): 머리글 한 줄 유지 + 글자 크기 정돈 — 화면에 문장이 온전히 보이게 */
  @media (max-width:640px){
    .top{padding:9px 12px;gap:8px}
    .top a{font-size:14px;white-space:nowrap}
    .top h1{font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .spk-toggle{font-size:12px;padding:5px 9px}
    .wrap{height:calc(100dvh - 44px)}
    .meta{font-size:12px;padding:8px 12px;gap:6px}
    .meta .chip{padding:3px 9px}
    .rate-bar{margin:2px 12px 6px;padding:7px 10px;gap:7px;font-size:12px}
    .rate-bar .rate-title{font-size:13px}
    .rate-bar .rate-side{display:none}  /* 좁은 화면: 🐢/🐇 라벨 숨겨 값 칩이 안 잘리게 */
    .rate-bar .rate-val{min-width:54px;font-size:12px;padding:3px 8px}
    .msg{font-size:16px;padding:10px 13px;max-width:88%}
    .msg.sys{font-size:13px}
    .msg .who{font-size:12px}
    .msg .who-ava{width:20px;height:20px}
    .replay-btn{font-size:13px;padding:5px 12px;margin-top:8px}
    .typing{font-size:14px}
    .inbar{padding:10px 10px;gap:6px}
    .inbar input{font-size:16px;padding:11px 12px}
    .inbar button{font-size:15px;padding:0 14px}
    .inbar .mic-btn{font-size:17px;padding:0 13px}
    .hint{font-size:12px;padding:0 12px 8px}
  }
</style>
</head>
<body>
  <div class="top">
    <a href="/">← <span>홈</span></a>
    <h1>🗣️ 수업 전 AI 웜업</h1>
    <button id="spkToggle" class="spk-toggle" type="button" onclick="toggleSpeech()" title="AI 답변 음성 켜기/끄기">🔊 음성 켜짐</button>
  </div>

  <div class="wrap">
    <div class="meta">
      <span class="chip">세션 <b id="m-session">—</b></span>
      <span class="chip">주제 <b id="m-topic">자유 대화</b></span>
      <span class="chip">서버 <b id="m-server">미연결</b></span>
    </div>

    <!-- 🐢🐇 선생님(AI) 음성 듣기 속도: 1(천천히) ~ 5(빠르게) -->
    <div class="rate-bar">
      <span class="rate-title">🗣️ 듣기 속도</span>
      <span class="rate-side">🐢 천천히</span>
      <input id="rateSlider" type="range" min="1" max="5" step="1" value="3"
        oninput="setRate(this.value)" title="선생님 음성 속도 (1 천천히 ~ 5 빠르게)" />
      <span class="rate-side">빠르게 🐇</span>
      <span class="rate-val" id="rateVal">3 · 보통</span>
    </div>

    <div id="log"></div>

    <div id="listening"><span class="dot"></span> 🎙️ 듣는 중… 영어로 말해보세요</div>
    <div class="inbar">
      <input id="inp" type="text" placeholder="영어로 말해보세요! (한국어로 '이거 영어로 어떻게 해?'도 OK)"
        autocomplete="off" onkeydown="if(event.key==='Enter')sendMsg()" />
      <button id="micBtn" class="mic-btn" type="button" onclick="toggleMic()" title="마이크로 말하기">🎤</button>
      <button id="sendBtn" onclick="sendMsg()">보내기</button>
    </div>
    <div class="hint">💡 🎤 를 눌러 <b>영어로 말하면</b> AI가 듣고 <b>음성으로 답</b>해줘요. 텍스트 입력도 가능합니다.</div>
  </div>

  <!-- 🚀 채팅 셸 아래(일반 문서 흐름): 아래로 스크롤하면 나오는 '다음 이동' 버튼 + 서버 설정 -->
  <div class="after">
    <!-- 🚀 웜업을 충분히 했으면 다음 활동으로 -->
    <button type="button" onclick="window.MangoFlow&&MangoFlow.open('warmup')"
      style="width:100%;padding:14px;background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff;border:0;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(56,189,248,.4)">
      🚀 웜업 끝내고 다음으로 이동
    </button>

    <details class="settings" style="margin-top:12px">
      <summary>⚙️ 웜업 서버 설정 (선택)</summary>
      <div style="margin-top:6px">기본은 <b>같은 오리진</b>(Cloudflare 워커의 <code>/api/warmup/chat</code>)이라 설정 없이 바로 대화됩니다.<br>
        외부 백엔드(FastAPI 등)로 바꾸려면 주소를 입력하세요. 예: <code>http://127.0.0.1:8010</code></div>
      <input id="apiInput" type="text" placeholder="비워두면 같은 오리진 사용" onchange="saveApi(this.value)" />
    </details>
  </div>

<script>
/* ── 1. URL 파라미터 / 저장값에서 설정 읽기 ─────────────────────── */
var Q = new URLSearchParams(location.search);
function getLoginId(){
  try{ var u=JSON.parse(localStorage.getItem('mango_user')||'null'); if(u&&(u.user_id||u.uid||u.id)) return u.user_id||u.uid||u.id; }catch(e){}
  try{ var a=JSON.parse(localStorage.getItem('mangoi_logged_user')||'null'); if(a&&(a.user_id||a.uid||a.id)) return a.user_id||a.uid||a.id; }catch(e){}
  return '';
}
// 🗓️ 오늘 배울 교재 컨텍스트 — ?textbook/&level/&lesson 파라미터 우선, 없으면 로그인 학생의 배정 교재를 서버에서 조회
var WCTX = {
  textbook: (Q.get('textbook')||'').trim(),
  level: (Q.get('level')||'').trim(),
  lesson_no: parseInt(Q.get('lesson')||'0',10)||0,
  sentences: []
};
// session_id: ?room 우선 → ?session → 로그인 유저 → 날짜 기반
var SESSION_ID = Q.get('room') || Q.get('session') ||
  (getLoginId() ? ('user_'+getLoginId()) : ('warmup_'+new Date().toISOString().slice(0,10)));
// lesson_topic: ?unit 또는 ?topic (없으면 null=자유 대화)
var LESSON_TOPIC = Q.get('unit') || Q.get('topic') || '';
// API_BASE: ?api → localStorage → '' (빈 값이면 같은 오리진 상대경로 사용)
//   라이브(test.mangoi.co.kr)는 정적 페이지와 /api/warmup/chat 을 같은 워커가 서빙하므로
//   아무 설정 없이 바로 AI 대화가 된다. (외부 백엔드로 바꾸려면 ?api= 또는 ⚙️설정)
var API_BASE = (Q.get('api') || localStorage.getItem('mangoi_api_base') || '').replace(/\/$/,'');
if(Q.get('api')){ try{ localStorage.setItem('mangoi_api_base', API_BASE); }catch(e){} }
var USE_RELATIVE = !API_BASE;                 // true = 같은 오리진(/api/warmup/chat)
function warmupEndpoint(){ return (API_BASE || '') + '/api/warmup/chat'; }

/* ── 2. 상단 메타 표시 ──────────────────────────────────────────── */
document.getElementById('m-session').textContent = SESSION_ID.slice(0,22);
document.getElementById('m-topic').textContent = LESSON_TOPIC || '자유 대화';
document.getElementById('m-server').textContent = USE_RELATIVE ? '동일 오리진' : '외부 연결';
document.getElementById('m-server').style.color = '#34d399';
var apiInput = document.getElementById('apiInput'); if(apiInput) apiInput.value = API_BASE;

/* ── 3. 메시지 렌더 ─────────────────────────────────────────────── */
var log = document.getElementById('log');
function addMsg(text, who){
  var d = document.createElement('div');
  d.className = 'msg ' + who;
  var whoHtml = who==='ai'
      ? '<span class="who"><img class="who-ava" src="/img/mango-char.png" alt="Mango">Mango</span>'
      : who==='me' ? '<span class="who">나</span>' : '';
  d.innerHTML = whoHtml + renderMsg(text);
  if(who==='ai'){
    // 각 AI 메시지에 🔊 다시 듣기 버튼
    var rb = document.createElement('button');
    rb.className = 'replay-btn'; rb.type = 'button';
    rb.textContent = '🔊 다시 듣기';
    rb.onclick = function(){ speak(text, rb); };
    d.appendChild(document.createElement('br'));
    d.appendChild(rb);
  }
  log.appendChild(d); log.scrollTop = log.scrollHeight;
  if(who==='ai'){ speak(text); }   // AI 답변/첫 인사 자동 낭독(원어민 음성)
  return d;
}
function escapeHtml(s){ return String(s).replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
// 🥭 이모지(빨간/주황 망고 그림)를 우리 망고아이 캐릭터 이미지로 치환 —
// 하드코딩 인사말은 물론 AI 응답 텍스트에 망고가 나와도 자동으로 브랜드 캐릭터로 렌더된다.
function renderMsg(s){
  return escapeHtml(s).replace(/🥭/g,
    '<img class="mango-inline" src="/img/mango-char.png" alt="Mango 캐릭터" />');
}

/* ══════════════════════════════════════════════════════════════════
   🔊 듣기(TTS) — 브라우저 speechSynthesis 로 AI 답변을 원어민 음성 낭독
   ══════════════════════════════════════════════════════════════════ */
var _enVoice = null, _speechOn = true, _audioUnlocked = false;
var _lastAiSpeak = null, _speechEverStarted = false;   // 모바일: 차단된 첫 인사를 첫 터치 때 재낭독하기 위한 기록

/* 🐢🐇 듣기 속도: 1(천천히)~5(빠르게) → speechSynthesis rate 값 매핑 */
var RATE_STEPS = { 1:0.6, 2:0.8, 3:0.95, 4:1.15, 5:1.4 };
var RATE_NAMES = { 1:'아주 천천히', 2:'천천히', 3:'보통', 4:'빠르게', 5:'아주 빠르게' };
var _rateLevel = 3;
try{
  var savedRate = parseInt(localStorage.getItem('mangoi_warmup_rate')||'3',10);
  if(savedRate>=1 && savedRate<=5) _rateLevel = savedRate;
}catch(e){}
function setRate(lv){
  lv = parseInt(lv,10); if(!(lv>=1 && lv<=5)) lv = 3;
  _rateLevel = lv;
  try{ localStorage.setItem('mangoi_warmup_rate', String(lv)); }catch(e){}
  var s=document.getElementById('rateSlider'); if(s && String(s.value)!==String(lv)) s.value=lv;
  var v=document.getElementById('rateVal'); if(v) v.textContent = lv + ' · ' + RATE_NAMES[lv];
}
setRate(_rateLevel);   // 저장된 속도로 슬라이더/표시 초기화
// 영어 원어민 보이스 점수화(en-US/en-GB 자연스러운 보이스 우선) — 게임/아바타와 동일 취지
function _scoreVoice(v){
  var n=(v.name||'').toLowerCase(), lang=(v.lang||'').toLowerCase(), s=0;
  if(lang==='en-us') s+=40; else if(lang==='en-gb'||lang==='en-au') s+=28;
  else if(lang.slice(0,2)==='en') s+=18; else s-=120;
  if(/natural|neural/.test(n)) s+=70;
  if(/google/.test(n)) s+=60;
  if(/\b(aria|jenny|guy|ava|emma|libby|michelle|jane|nova|sara|samantha|alex|allison)\b/.test(n)) s+=46;
  if(/online|premium|enhanced|plus/.test(n)) s+=24;
  if(v.localService===false) s+=30;
  if(/zira|david|mark|hazel|george|desktop|compact|espeak/.test(n)) s-=50;
  return s;
}
function pickVoice(){
  try{
    var vs=window.speechSynthesis.getVoices(); if(!vs.length) return;
    var en=vs.filter(function(v){ return (v.lang||'').slice(0,2).toLowerCase()==='en'; });
    if(!en.length){ _enVoice=null; return; }
    var best=null, bs=-1e9;
    en.forEach(function(v){ var sc=_scoreVoice(v); if(sc>bs){ bs=sc; best=v; } });
    _enVoice=best;
  }catch(e){}
}
try{ if(window.speechSynthesis){ pickVoice(); window.speechSynthesis.onvoiceschanged=pickVoice; } }catch(e){}

function speak(text, btn){
  try{
    if(!window.speechSynthesis || !_speechOn || !text) return;
    if(!_enVoice) pickVoice();
    var u=new SpeechSynthesisUtterance(String(text));
    u.lang=(_enVoice&&_enVoice.lang)||'en-US'; u.rate=RATE_STEPS[_rateLevel]||0.95; u.pitch=1.02;
    if(_enVoice) u.voice=_enVoice;
    _lastAiSpeak=String(text);
    u.onstart=function(){ _speechEverStarted=true; };
    if(btn){ btn.classList.add('playing'); u.onend=function(){ btn.classList.remove('playing'); }; u.onerror=function(){ btn.classList.remove('playing'); }; }
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }catch(e){}
}
// 모바일 자동재생 정책: 첫 사용자 제스처에서 speechSynthesis 를 깨워둔다(무음 발화)
function unlockAudio(){
  if(_audioUnlocked) return; _audioUnlocked=true;
  try{ if(window.speechSynthesis){ var u=new SpeechSynthesisUtterance(' '); u.volume=0; window.speechSynthesis.speak(u); } }catch(e){}
  // 페이지 진입 직후 자동 낭독된 첫 인사는 모바일 자동재생 정책에 막혀 무음으로 버려진다.
  // 한 번도 실제 발화가 시작된 적이 없으면(_speechEverStarted=false) 이 첫 제스처에서 다시 읽어준다.
  if(!_speechEverStarted && _lastAiSpeak && _speechOn){
    setTimeout(function(){ if(!_speechEverStarted && _lastAiSpeak && !_recognizing) speak(_lastAiSpeak); }, 250);
  }
}
document.addEventListener('pointerdown', unlockAudio, { once:false, passive:true });
document.addEventListener('touchstart', unlockAudio, { once:false, passive:true });

// 상단 🔊 음성 켜기/끄기 토글
function toggleSpeech(){
  _speechOn = !_speechOn;
  var b=document.getElementById('spkToggle');
  if(b){ b.textContent = _speechOn ? '🔊 음성 켜짐' : '🔇 음성 꺼짐'; b.classList.toggle('off', !_speechOn); }
  if(!_speechOn){ try{ window.speechSynthesis.cancel(); }catch(e){} }
}

/* ══════════════════════════════════════════════════════════════════
   🎤 말하기(STT) — webkitSpeechRecognition 으로 영어 발화 인식 → 자동 전송
   ══════════════════════════════════════════════════════════════════ */
var _recog=null, _recognizing=false;
function sttSupported(){ return !!(window.SpeechRecognition || window.webkitSpeechRecognition); }
function setMicState(on){
  _recognizing=on;
  var b=document.getElementById('micBtn');
  if(b){ b.classList.toggle('rec', on); b.textContent = on ? '⏹' : '🎤'; b.title = on ? '멈추기' : '마이크로 말하기'; }
  var ind=document.getElementById('listening');
  if(ind) ind.style.display = on ? 'flex' : 'none';
}
function toggleMic(){
  unlockAudio();                       // 마이크 탭 = 사용자 제스처 → 이후 음성 재생 허용
  try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(e){}  // AI 낭독 중이면 멈추고 듣기
  if(_recognizing){ try{ _recog && _recog.stop(); }catch(e){} return; }
  if(!sttSupported()){
    addMsg('이 브라우저는 음성 인식을 지원하지 않아요 😢 크롬(안드로이드/PC)이나 Safari(iOS)에서 사용하거나, 아래에 텍스트로 입력해 주세요.', 'sys');
    return;
  }
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  _recog=new SR();
  _recog.lang='en-US';                 // 기본은 영어 연습 (한국어 질문도 대부분 인식됨)
  _recog.interimResults=true;
  _recog.maxAlternatives=1;
  _recog.continuous=false;
  var finalText='';
  _recog.onstart=function(){ setMicState(true); };
  _recog.onresult=function(e){
    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      var t=e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText+=t; else interim+=t;
    }
    document.getElementById('inp').value=(finalText+' '+interim).trim();
  };
  _recog.onerror=function(e){
    setMicState(false);
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      addMsg('🎤 마이크 권한이 꺼져 있어요. 주소창의 자물쇠(🔒) → 마이크 "허용" 후 다시 🎤 를 눌러 주세요. (텍스트 입력은 계속 가능)', 'sys');
    } else if(e.error==='no-speech'){
      addMsg('🎤 소리가 잘 안 들렸어요. 다시 🎤 를 누르고 또박또박 말해 주세요.', 'sys');
    }
  };
  _recog.onend=function(){
    setMicState(false);
    var v=(document.getElementById('inp').value||'').trim();
    if(v){ sendMsg(); }                // 인식이 끝나면 자동 전송 → AI가 텍스트+음성으로 답
  };
  try{ _recog.start(); }catch(e){ setMicState(false); }
}

/* ── 4. 첫 안내 메시지 — 오늘 배울 교재와 연동 ─────────────────────
   ① /api/warmup/context 로 로그인 학생의 오늘 교재/레벨/핵심 문장을 조회
   ② 교재가 있으면 AI가 그 교재 내용으로 첫 워밍업 질문을 하며 시작
   ③ 조회/AI 실패 시 기존 자유 대화 인사로 폴백 (화면은 절대 안 깨짐) */
function fallbackGreeting(){
  addMsg('Hi! I\'m your Mangoi AI friend 🥭 ' + (LESSON_TOPIC ? ('Today\'s topic is "'+LESSON_TOPIC+'". ') : '') + 'Let\'s warm up before class. How are you today?', 'ai');
}
function withCtx(body){
  var uid = getLoginId(); if(uid) body.user_id = uid;
  if(WCTX.textbook) body.textbook = WCTX.textbook;
  if(WCTX.level) body.level = WCTX.level;
  if(WCTX.lesson_no) body.lesson_no = WCTX.lesson_no;
  if(LESSON_TOPIC) body.lesson_topic = LESSON_TOPIC;
  return body;
}
function updateTopicChip(){
  var t = document.getElementById('m-topic');
  if(!t) return;
  if(WCTX.textbook) t.textContent = '📚 ' + WCTX.textbook + (WCTX.lesson_no ? (' L' + WCTX.lesson_no) : '');
  else t.textContent = LESSON_TOPIC || '자유 대화';
}
(async function initGreeting(){
  try{
    var qs = new URLSearchParams();
    var uid = getLoginId(); if(uid) qs.set('user_id', uid);
    if(WCTX.textbook) qs.set('textbook', WCTX.textbook);
    if(WCTX.level) qs.set('level', WCTX.level);
    if(WCTX.lesson_no) qs.set('lesson', String(WCTX.lesson_no));
    if(uid || WCTX.textbook || WCTX.level){
      var r = await fetch((API_BASE||'') + '/api/warmup/context?' + qs.toString());
      if(r.ok){
        var d = await r.json();
        if(d && d.ok){
          if(d.textbook) WCTX.textbook = d.textbook;
          if(d.level) WCTX.level = d.level;
          if(d.lesson_no) WCTX.lesson_no = d.lesson_no;
          if(d.sentences && d.sentences.length) WCTX.sentences = d.sentences;
          if(d.weak_sentences && d.weak_sentences.length) WCTX.weak = d.weak_sentences;
        }
      }
    }
  }catch(e){}
  updateTopicChip();
  // 🎯 개인화(Neo4j): 이 학생의 복습 포인트가 있으면 긍정 프레임으로 안내 (AI도 이 표현을 우선 질문함)
  if(WCTX.weak && WCTX.weak.length){
    var pts = WCTX.weak.slice(0,3).map(function(w){ return '"'+w.text+'"'; }).join(' · ');
    addMsg('🎯 오늘의 연습 포인트: ' + pts + '\n이 표현들이 나오면 자신 있게 말해보세요!', 'sys');
  }
  // 오늘 교재가 확인되면 → AI가 교재 기반 첫 질문으로 시작
  if(WCTX.textbook || WCTX.sentences.length){
    var typing = document.createElement('div');
    typing.className = 'typing'; typing.textContent = 'AI 친구가 오늘 배울 교재를 확인하는 중…';
    log.appendChild(typing); log.scrollTop = log.scrollHeight;
    try{
      var body = withCtx({ session_id: SESSION_ID,
        student_input: "Let's start today's pre-class warm-up! Greet me briefly in English and ask me ONE very easy question about today's lesson." });
      var kr = await fetch(warmupEndpoint(), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      typing.remove();
      if(kr.ok){
        var kd = await kr.json();
        if(kd && kd.ai_response){ addMsg(kd.ai_response, 'ai'); return; }
      }
    }catch(e){ try{ typing.remove(); }catch(_){} }
  }
  fallbackGreeting();
})();

/* ── 5. 전송 ────────────────────────────────────────────────────── */
var sending = false;
function saveApi(v){
  API_BASE = (v||'').trim().replace(/\/$/,'');
  try{ localStorage.setItem('mangoi_api_base', API_BASE); }catch(e){}
  location.reload();   // 설정 반영을 위해 새로고침(연결 상태/첫 인사 갱신)
}
async function sendMsg(){
  var inp = document.getElementById('inp');
  var text = (inp.value||'').trim();
  if(!text || sending) return;

  addMsg(text, 'me'); inp.value = '';
  sending = true; document.getElementById('sendBtn').disabled = true;

  var typing = document.createElement('div');
  typing.className = 'typing'; typing.textContent = 'AI 친구가 입력 중…';
  log.appendChild(typing); log.scrollTop = log.scrollHeight;

  try{
    var body = withCtx({ session_id: SESSION_ID, student_input: text });
    var r = await fetch(warmupEndpoint(), {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    typing.remove();
    if(!r.ok){
      var errTxt = '';
      try{ var ej = await r.json(); errTxt = ej.detail || ''; }catch(e){}
      addMsg('⚠️ 서버 응답 오류('+r.status+')' + (errTxt ? (': '+errTxt) : '') +
             '\n(백엔드가 켜져 있고 OPENAI_API_KEY 가 설정됐는지 확인해 주세요.)', 'sys');
    } else {
      var d = await r.json();
      addMsg(d.ai_response || '(응답이 비어 있어요)', 'ai');
    }
  }catch(e){
    typing.remove();
    addMsg('⚠️ 웜업 서버에 연결할 수 없어요.\n주소가 맞는지, 백엔드(uvicorn)가 실행 중인지 확인해 주세요.', 'sys');
  }finally{
    sending = false; document.getElementById('sendBtn').disabled = false;
    document.getElementById('inp').focus();
  }
}
</script>
