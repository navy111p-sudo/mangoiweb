<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drawer scroll test</title>
<style>
  html,body{margin:0;height:100%;background:#0b1020}
  #mg-drawer{position:fixed;top:0;left:0;height:100%;width:325px;max-width:90vw;background:rgba(11,16,32,0.9);z-index:100000;display:flex;flex-direction:column;font-family:sans-serif;border-right:1px solid rgba(251,191,36,.25)}
  .mg-drawer-head{display:flex;align-items:center;justify-content:space-between;padding:23px 21px 16px;border-bottom:1px solid rgba(255,255,255,.08);color:#fbbf24;font-size:23px;font-weight:800}
  .mg-drawer-nav{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:13px 16px;padding-bottom:28px;display:flex;flex-direction:column;gap:8px}
  .mg-drawer-nav button{text-align:left;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);color:#e2e8f0;padding:16px 18px;border-radius:14px;font-size:18px;font-weight:600}
  .mg-acc{border:1px solid rgba(251,191,36,.18);border-radius:16px;background:rgba(255,255,255,.03);overflow:hidden}
  .mg-acc summary{list-style:none;display:flex;align-items:center;gap:10px;padding:15px 18px;font-size:16.5px;font-weight:800;color:#fde68a;min-height:30px}
  .mg-acc-body{display:flex;flex-direction:column;gap:7px;padding:10px}
  .mg-acc-body button{font-size:16px;padding:13px 15px;border-radius:12px}
</style></head><body>
<aside id="mg-drawer">
  <div class="mg-drawer-head"><span>Mangoi</span><span>✕</span></div>
  <nav class="mg-drawer-nav">
    <button>망고아이란?</button>
    <details class="mg-acc" open><summary>🎓 학습 공간</summary><div class="mg-acc-body">
      <button>🎯 레벨테스트</button><button>🎥 수업 진단</button><button>📝 수업 신청</button>
      <button>📅 연기/변경</button><button>👨‍🏫 교사 소개</button><button>📋 평가표</button>
      <button>🎮 학생게임</button><button>📖 단어장</button>
    </div></details>
    <details class="mg-acc"><summary>🤖 AI 학습 도구</summary></details>
    <details class="mg-acc"><summary>💳 계정 및 결제</summary></details>
    <button>🏠 전체메뉴</button>
  </nav>
</aside>
<script>
window.__measure=function(){
  var nav=document.querySelector('.mg-drawer-nav');
  var last=nav.querySelectorAll('button');last=last[last.length-1];
  nav.scrollTop=99999;
  return {vh:window.innerHeight,navClientH:nav.clientHeight,navScrollH:nav.scrollHeight,
    scrollable:nav.scrollHeight>nav.clientHeight+1,maxScroll:nav.scrollHeight-nav.clientHeight,
    scrolledTo:nav.scrollTop,lastText:last.textContent.trim()};
};
document.title = JSON.stringify(window.__measure());
</script>

</body></html>
