name = "webrtc-unified-platform"
main = "src/index.ts"
compatibility_date = "2026-04-07"
# fix (2026-06-01) — 계정 자동조회 실패(Authentication/account ID 오류) 방지: account_id 명시
account_id = "7ae16a3c4bcc84743c70828a5156ebb3"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalingRoom", "VideoCallRoom"]

[[durable_objects.bindings]]
name = "SIGNALING_ROOM"
class_name = "SignalingRoom"

[[durable_objects.bindings]]
name = "VIDEO_CALL_ROOM"
class_name = "VideoCallRoom"

[[kv_namespaces]]
binding = "PDF_STORE"
id = "f2df070b6e6d4b29adceb1dc96be6a67"

[[kv_namespaces]]
binding = "SESSION_STATE"
id = "7fc5f228dbd4490eb775637a8f8ba219"

[[d1_databases]]
binding = "DB"
database_name = "mango-db"
database_id = "80a12a77-4d79-4abd-aa9e-f5e39a7b5cf5"

[[r2_buckets]]
binding = "RECORDINGS"
bucket_name = "webrtc-class-recordings"

# Phase 21 - Workers AI binding (search bar AI command feature)
[ai]
binding = "AI"

[vars]
MAX_RECORDING_MB = "500"
ALLOWED_RECORDING_MIME = "video/webm,video/mp4,audio/webm,audio/mp4"
# /admin/health "Last Deploy" tile identifier - auto-updated by fix-and-deploy.ps1
BUILD_STAMP = "2026-07-13T03:38:11Z"
# 📟 UptimeRobot 장애 웹훅 → 관리자 문자(SMS) 알림 (api-uptime.ts)
#   UPTIME_HOOK_KEY: 웹훅 URL 의 ?key= 토큰(무단 호출 방지). OWNER_ALERT_PHONE: 문자 받을 번호.
UPTIME_HOOK_KEY = "74d3de23b5d488a03a6ea10c7bb48c4632e3"
OWNER_ALERT_PHONE = "01089862224"
# 💬 SOLAPI 발신번호(등록·인증 완료된 번호). API 키/시크릿은 wrangler secret 으로 관리.
SOLAPI_FROM_PHONE = "01089862224"
# 🧾 강사 급여 자동화 — 카페24 서버 집계 스크립트가 결과를 밀어넣을 때 쓰는 공유키(무단 주입 방지)
PAYROLL_INGEST_KEY = "9c4f7a2e15b83d6079e1c4a8f2b5d3e6"
# 📧 이메일(Resend) — 레벨테스트 신규신청 관리자(필리핀) 알림 + 교사 배정 알림
#   활성화: (1) resend.com 도메인 인증 → (2) `wrangler secret put RESEND_API_KEY`
#   RESEND_API_KEY 미설정 시 이메일은 조용히 skip(신청/문자/대시보드는 정상 동작).
RESEND_FROM = "망고아이 MANGOi <noreply@mangoi.co.kr>"
LEVELTEST_ADMIN_EMAIL = ""   # ← 필리핀 관리자 이메일 입력(비우면 관리자 이메일 알림만 skip)

[assets]
directory = "./public"
binding = "ASSETS"
# Force all requests to hit Worker first (boolean - Wrangler 4 backwards-compat)
# Without this, CF Assets returns index.html via SPA fallback for unmatched routes
# like /api/*, blocking the Worker's /api/dashboard handler.
# Worker-first lets src/index.ts route API/WS, then env.ASSETS.fetch handles the rest.
run_worker_first = true
not_found_handling = "none"
html_handling = "none"

# Cron trigger — index.ts 의 scheduled() 핸들러
#   - KST 03:00 (UTC 18:00) : retention purge + 일일 브리핑 + dunning + (일) 시간표 자동
#   - KST 09:00 (UTC 00:00) : 정기결제 자동 청구 (Phase RB)
#   - KST 10:00 (UTC 01:00) : 매월 1일 NPS 발송 (Phase NPS)
#   - KST 19:00 (UTC 10:00) : 학생 streak/일일 참여 푸시 + (금) 학부모 다이제스트
[triggers]
#   마지막 "*/15 * * * *" = 🐕 사이트 자체 감시견(15분마다 health 확인 → 죽으면 관리자 문자).
#   계정 cron 한도 5개 — 현재 5개(딱 한도). 더 추가하려면 하나 줄일 것.
crons = ["0 18 * * *", "0 0 * * *", "0 1 * * *", "0 10 * * *", "*/15 * * * *"]

# ===== Production environment (Wrangler 4: bindings NOT inherited - must redeclare) =====
[env.production]
name = "webrtc-unified-platform-prod"

# Wrangler 4 also requires [[migrations]] to be redeclared per env.
# Missing this causes prod deploy error code 10097 (Free plan + DO + sqlite_classes).
[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["SignalingRoom", "VideoCallRoom"]

[[env.production.durable_objects.bindings]]
name = "SIGNALING_ROOM"
class_name = "SignalingRoom"

[[env.production.durable_objects.bindings]]
name = "VIDEO_CALL_ROOM"
class_name = "VideoCallRoom"

[[env.production.kv_namespaces]]
binding = "PDF_STORE"
id = "f2df070b6e6d4b29adceb1dc96be6a67"

[[env.production.kv_namespaces]]
binding = "SESSION_STATE"
id = "7fc5f228dbd4490eb775637a8f8ba219"

[[env.production.d1_databases]]
binding = "DB"
database_name = "mango-db"
database_id = "80a12a77-4d79-4abd-aa9e-f5e39a7b5cf5"

[[env.production.r2_buckets]]
binding = "RECORDINGS"
bucket_name = "webrtc-class-recordings"

# Phase 21 - Workers AI binding (production)
[env.production.ai]
binding = "AI"

[env.production.vars]
MAX_RECORDING_MB = "500"
ALLOWED_RECORDING_MIME = "video/webm,video/mp4,audio/webm,audio/mp4"
BUILD_STAMP = "2026-07-13T03:38:11Z"
UPTIME_HOOK_KEY = "74d3de23b5d488a03a6ea10c7bb48c4632e3"
OWNER_ALERT_PHONE = "01089862224"
SOLAPI_FROM_PHONE = "01089862224"
PAYROLL_INGEST_KEY = "9c4f7a2e15b83d6079e1c4a8f2b5d3e6"
# 📧 이메일(Resend) — 레벨테스트 관리자/교사 알림 (RESEND_API_KEY 는 secret)
RESEND_FROM = "망고아이 MANGOi <noreply@mangoi.co.kr>"
LEVELTEST_ADMIN_EMAIL = ""   # ← 필리핀 관리자 이메일 입력

[env.production.assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "none"
html_handling = "none"

# 스테이징(-prod)에는 cron 미등록.
#   - 이유1: 계정 cron 한도(5개) — 메인이 4개를 쓰므로 스테이징까지 4개면 초과(code 10072).
#   - 이유2: 스테이징이 cron 을 돌리면 미납독촉/NPS/정기결제/브리핑이 "중복 발송"됨.
#   운영 cron 은 메인(webrtc-unified-platform) 에서만 동작합니다.
[env.production.triggers]
crons = []
