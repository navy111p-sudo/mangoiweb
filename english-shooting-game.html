<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>영어 문장 슈팅 게임 — Sentence Shooter</title>
<style>
  :root{
    --bg1:#0b1b3a; --bg2:#13294f; --accent:#fbbf24; --good:#22c55e; --bad:#ef4444;
    --blue:#3b82f6; --tx:#e8f0ff; --sub:#9fb3d6; --panel:rgba(10,18,38,.72);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Noto Sans KR','Segoe UI',sans-serif;color:var(--tx);
    background:radial-gradient(120% 90% at 50% 0%,#1c3566 0%,#081227 70%);
    overflow:hidden;user-select:none}
  #game{position:relative;width:100%;height:100dvh;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  #game.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-8px,4px)}40%{transform:translate(7px,-5px)}60%{transform:translate(-5px,6px)}80%{transform:translate(6px,-3px)}}

  /* ===== HUD ===== */
  .hud{position:relative;z-index:20;display:flex;align-items:center;gap:10px;padding:10px 14px;
    background:linear-gradient(180deg,rgba(8,16,34,.92),rgba(8,16,34,.55));backdrop-filter:blur(8px)}
  .stat{display:flex;flex-direction:column;line-height:1.1}
  .stat .lab{font-size:11px;color:var(--sub);font-weight:600}
  .stat .val{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
  #score .val{color:var(--accent)}
  .timer{margin-left:auto}
  .timer .val{color:#7fd1ff}
  .timer.low .val{color:var(--bad);animation:blink .8s infinite}
  @keyframes blink{50%{opacity:.35}}
  .lvlpill{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.5);color:#bcd6ff;
    font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px}

  /* ===== 목표 문장 ===== */
  .target{position:relative;z-index:20;display:flex;flex-wrap:wrap;gap:7px;justify-content:center;
    padding:12px 14px;background:rgba(8,16,34,.45)}
  .target .hint{flex-basis:100%;text-align:center;font-size:12px;color:var(--sub);margin-bottom:2px}
  .chip{font-size:17px;font-weight:700;padding:6px 13px;border-radius:10px;border:1px solid transparent;transition:.15s;position:relative}
  .chip.done{background:rgba(34,197,94,.18);color:#86efac;border-color:rgba(34,197,94,.4)}
  .chip.done::after{content:'✓';position:absolute;top:-8px;right:-6px;font-size:11px;color:var(--good)}
  .chip.next{background:var(--accent);color:#3a2e05;border-color:#fff3c4;
    box-shadow:0 0 0 0 rgba(251,191,36,.6);animation:pulse 1.1s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(251,191,36,.55)}100%{box-shadow:0 0 0 14px rgba(251,191,36,0)}}
  .chip.pending{background:rgba(255,255,255,.06);color:var(--sub);border-color:rgba(255,255,255,.1)}

  /* ===== 플레이필드 ===== */
  #field{position:relative;flex:1 1 auto;min-height:0;overflow:hidden}

  /* 몬스터 */
  .monster{position:absolute;display:flex;flex-direction:column;align-items:center;gap:1px;
    border:none;background:none;cursor:pointer;font-family:inherit;will-change:transform;
    animation:sway 2s ease-in-out infinite alternate;padding:2px}
  @keyframes sway{from{transform:translateX(-9px) rotate(-5deg)}to{transform:translateX(9px) rotate(5deg)}}
  .monster .face{font-size:34px;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5))}
  .monster .word{font-size:15px;font-weight:800;color:#fff;background:rgba(12,20,40,.82);
    border:2px solid rgba(255,255,255,.18);border-radius:999px;padding:3px 12px;white-space:nowrap;
    box-shadow:0 4px 12px rgba(0,0,0,.4);text-shadow:0 1px 2px rgba(0,0,0,.6)}
  .monster.distractor .word{border-color:rgba(255,120,120,.35)}
  .monster:active{transform:scale(.92)}
  .monster.pop{animation:pop .28s forwards}
  @keyframes pop{to{transform:scale(1.8);opacity:0}}
  .monster.wrong .word{animation:wrongflash .4s;border-color:var(--bad)}
  @keyframes wrongflash{0%,100%{background:rgba(12,20,40,.82)}50%{background:var(--bad)}}

  /* 총알 */
  .bullet{position:absolute;width:14px;height:14px;margin:-7px 0 0 -7px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff,var(--accent) 60%,#b45309);
    box-shadow:0 0 12px 3px rgba(251,191,36,.8);transition:left .16s linear,top .16s linear;z-index:8;pointer-events:none}

  /* 폭발 파티클 */
  .spark{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--accent);pointer-events:none;z-index:9}

  /* 떠오르는 점수 텍스트 */
  .floatscore{position:absolute;font-weight:900;font-size:22px;pointer-events:none;z-index:12;
    animation:floatup .8s forwards;text-shadow:0 2px 6px rgba(0,0,0,.6)}
  .floatscore.plus{color:var(--good)} .floatscore.minus{color:var(--bad)}
  @keyframes floatup{to{transform:translateY(-46px);opacity:0}}

  /* 콤보 */
  #combo{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);z-index:15;
    font-size:46px;font-weight:900;font-style:italic;color:#fff;pointer-events:none;opacity:0;
    text-shadow:0 0 16px var(--accent),0 4px 10px rgba(0,0,0,.6);-webkit-text-stroke:2px #b45309}
  #combo.show{animation:comboPop .8s}
  @keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-8deg)}
    35%{opacity:1;transform:translate(-50%,-50%) scale(1.25) rotate(4deg)}
    70%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}
    100%{opacity:0;transform:translate(-50%,-90%) scale(1)}}

  /* 대포 */
  #cannon{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);z-index:10;
    font-size:42px;transform-origin:50% 80%;transition:transform .08s;pointer-events:none;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
  #base{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:80px;height:18px;z-index:9;
    background:linear-gradient(180deg,#475569,#1e293b);border-radius:14px 14px 0 0;border:1px solid #64748b}

  /* 오버레이(시작/종료) */
  .overlay{position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;
    background:rgba(4,9,22,.86);backdrop-filter:blur(6px)}
  .card{width:min(92vw,420px);background:linear-gradient(180deg,#16233f,#0d1730);border:1px solid rgba(255,255,255,.12);
    border-radius:20px;padding:26px 24px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.6)}
  .card h1{font-size:26px;font-weight:900;margin-bottom:6px}
  .card h1 .em{color:var(--accent)}
  .card p{color:var(--sub);font-size:14px;line-height:1.7;margin-bottom:18px}
  .card .big{font-size:48px;font-weight:900;color:var(--accent);margin:6px 0}
  .card .best{color:#7fd1ff;font-weight:700;margin-bottom:16px}
  .btn{background:var(--accent);color:#3a2e05;border:none;border-radius:12px;padding:13px 30px;
    font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 20px rgba(251,191,36,.35)}
  .btn:active{transform:scale(.96)}
  .rules{text-align:left;font-size:13px;color:#c7d3ea;background:rgba(255,255,255,.05);border-radius:12px;
    padding:12px 14px;margin-bottom:18px;line-height:1.8}
  .rules b{color:var(--accent)}
</style>
</head>
<body>
<div id="game">
  <!-- HUD -->
  <div class="hud">
    <div class="stat" id="score"><span class="lab">점수 SCORE</span><span class="val" id="scoreVal">0</span></div>
    <span class="lvlpill" id="lvlPill">문장 1</span>
    <div class="stat timer" id="timer"><span class="lab">남은 시간 TIME</span><span class="val" id="timerVal">60</span></div>
  </div>

  <!-- 목표 문장 -->
  <div class="target">
    <div class="hint">🎯 아래 단어 몬스터를 <b>문장 순서대로</b> 쏘세요!</div>
    <div id="sentence" style="display:contents"></div>
  </div>

  <!-- 플레이필드 -->
  <div id="field">
    <div id="combo"></div>
    <div id="base"></div>
    <div id="cannon">🔫</div>
  </div>

  <!-- 시작/종료 오버레이 -->
  <div class="overlay" id="overlay">
    <div class="card" id="card">
      <h1>영어 문장 <span class="em">슈팅</span> 게임</h1>
      <p>떠다니는 단어 몬스터를 쏴서 문장을 완성하세요!</p>
      <div class="rules">
        • 화면 위 <b>목표 문장</b>을 보고, 단어를 <b>순서대로</b> 쏩니다.<br>
        • 순서가 맞으면 <b>+100점</b> & 터짐 💥<br>
        • 순서가 틀리면 <b>−50점</b> & 오답음 (안 터짐)<br>
        • 빠르게 연속 정답 → <b>콤보!</b> · 제한시간 <b>60초</b>
      </div>
      <button class="btn" id="startBtn">게임 시작 ▶</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  // ===== 데이터 =====
  var SENTENCES = [
    "He plays soccer on Sundays.",
    "She is reading a book now.",
    "We go to school by bus.",
    "I have two cute dogs.",
    "They like to eat pizza.",
    "My mother cooks dinner every day.",
    "The cat is sleeping on the sofa."
  ];
  var DISTRACTORS = ["cat","run","blue","apple","green","quickly","does","happy","jump","red",
    "water","seven","table","want","under","slow","they","big","funny","milk","tree","fast"];
  var FACES = ['👾','👹','👻','🤖','🐲','😈','🦠','👽','🎃','💀'];
  var COMBO_WINDOW = 2500; // ms — 이 시간 안에 연속 정답이면 콤보 유지

  // ===== 상태 =====
  var score=0, timeLeft=60, combo=0, level=0, currentIndex=0;
  var targetWords=[], monsters=[], running=false, lastHit=0, lastTs=0, rafId=null, timerId=null;

  // ===== DOM =====
  var field=document.getElementById('field');
  var cannon=document.getElementById('cannon');
  var comboEl=document.getElementById('combo');
  var sentenceEl=document.getElementById('sentence');
  var scoreVal=document.getElementById('scoreVal');
  var timerVal=document.getElementById('timerVal');
  var timerBox=document.getElementById('timer');
  var lvlPill=document.getElementById('lvlPill');
  var overlay=document.getElementById('overlay');
  var card=document.getElementById('card');
  var gameEl=document.getElementById('game');

  function rand(a,b){ return a + Math.random()*(b-a); }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

  // ===== 사운드 (WebAudio, 외부 파일 없음) =====
  var actx=null;
  function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended'){ actx.resume(); } }
  function tone(freq,start,dur,type,gain){
    if(!actx) return;
    var o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
    var t=actx.currentTime+start;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(gain||0.18,t+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.03);
  }
  function sCorrect(){ tone(660,0,0.12,'triangle',0.2); tone(990,0.08,0.14,'triangle',0.2); }
  function sWrong(){ tone(150,0,0.28,'sawtooth',0.18); tone(110,0.05,0.28,'square',0.12); }
  function sCombo(){ tone(523,0,0.1,'square',0.15); tone(659,0.07,0.1,'square',0.15); tone(880,0.14,0.16,'square',0.16); }
  function sShoot(){ tone(420,0,0.06,'square',0.1); }

  // ===== 라운드 구성 =====
  function startRound(){
    clearMonsters();
    var sentence = SENTENCES[level % SENTENCES.length];
    targetWords = sentence.split(' ');
    currentIndex = 0;
    lvlPill.textContent = '문장 ' + (level+1);

    var pool = DISTRACTORS.filter(function(w){ return targetWords.indexOf(w)<0; });
    shuffle(pool);
    var extra = pool.slice(0, Math.min(2, Math.max(1, 4-targetWords.length))+1).slice(0,2);

    var items = targetWords.map(function(w){ return {word:w,isTarget:true}; })
                  .concat(extra.map(function(w){ return {word:w,isTarget:false}; }));
    shuffle(items);
    items.forEach(function(it){ spawnMonster(it.word, it.isTarget); });
    renderSentence();
  }

  function spawnMonster(word, isTarget){
    var el=document.createElement('button');
    el.className='monster'+(isTarget?'':' distractor');
    el.innerHTML='<span class="face">'+FACES[Math.floor(Math.random()*FACES.length)]+'</span>'+
                 '<span class="word">'+word+'</span>';
    var fw=field.clientWidth, fh=field.clientHeight;
    var m={ el:el, word:word, isTarget:isTarget,
            x: rand(8, Math.max(40, fw-90)),
            y: rand(6, Math.max(40, fh*0.32)),
            vy: rand(8, 22) };           // 아래로 내려오는 속도(px/s)
    el.style.left=m.x+'px'; el.style.top=m.y+'px';
    el.style.animationDuration=rand(1.4,3).toFixed(2)+'s';      // 좌우 흔들림 속도 랜덤
    el.style.animationDelay=(-rand(0,2)).toFixed(2)+'s';
    el.addEventListener('click', function(){ fireAt(m); });
    field.appendChild(el);
    monsters.push(m);
  }

  function clearMonsters(){
    monsters.forEach(function(m){ if(m.el&&m.el.parentNode) m.el.remove(); });
    monsters=[];
  }

  function renderSentence(){
    sentenceEl.innerHTML = targetWords.map(function(w,i){
      var cls = i<currentIndex ? 'done' : (i===currentIndex ? 'next' : 'pending');
      return '<span class="chip '+cls+'">'+w+'</span>';
    }).join('');
  }

  // ===== 발사 → 판정 =====
  function fireAt(m){
    if(!running || !m.el.isConnected) return;
    ensureAudio(); sShoot();
    var f=field.getBoundingClientRect();
    var c=cannon.getBoundingClientRect();
    var r=m.el.getBoundingClientRect();
    var sx=c.left+c.width/2 - f.left, sy=c.top+4 - f.top;
    var tx=r.left+r.width/2 - f.left, ty=r.top+r.height/2 - f.top;
    var ang=Math.atan2(ty-sy, tx-sx)*180/Math.PI + 90;
    cannon.style.transform='translateX(-50%) rotate('+ang+'deg)';
    var b=document.createElement('div'); b.className='bullet';
    b.style.left=sx+'px'; b.style.top=sy+'px'; field.appendChild(b);
    requestAnimationFrame(function(){ b.style.left=tx+'px'; b.style.top=ty+'px'; });
    setTimeout(function(){ if(b.parentNode) b.remove(); resolve(m, tx, ty); }, 165);
  }

  function resolve(m, x, y){
    if(!running || !m.el.isConnected) return;
    var required = targetWords[currentIndex];
    if(m.word === required){               // ===== 정답: 순서 일치 =====
      score += 100;
      var now=performance.now();
      combo = (now-lastHit < COMBO_WINDOW) ? combo+1 : 1;
      lastHit = now;
      currentIndex++;
      sCorrect();
      popMonster(m);
      floatScore('+100', x, y, true);
      if(combo>=2){ showCombo(combo); sCombo(); }
      renderSentence(); updateHUD();
      if(currentIndex >= targetWords.length) roundComplete();
    } else {                               // ===== 오답: 순서 틀림 / 방해단어 =====
      score = Math.max(0, score-50);
      combo = 0;
      sWrong();
      m.el.classList.remove('wrong'); void m.el.offsetWidth; m.el.classList.add('wrong');
      floatScore('-50', x, y, false);
      shake();
      updateHUD();
    }
  }

  function roundComplete(){
    // 문장 완성 보너스 + 다음 문장
    var bonus = 50 + combo*10;
    score += bonus; updateHUD();
    showBanner('문장 완성! +'+bonus);
    level++;
    setTimeout(function(){ if(running) startRound(); }, 950);
  }

  // ===== 이펙트 =====
  function popMonster(m){
    var i=monsters.indexOf(m); if(i>=0) monsters.splice(i,1);
    var f=field.getBoundingClientRect(), r=m.el.getBoundingClientRect();
    burst(r.left-f.left+r.width/2, r.top-f.top+r.height/2);
    m.el.classList.add('pop');
    setTimeout(function(){ if(m.el.parentNode) m.el.remove(); }, 280);
  }
  function burst(x,y){
    for(var i=0;i<10;i++){
      (function(){
        var s=document.createElement('div'); s.className='spark';
        s.style.left=x+'px'; s.style.top=y+'px';
        s.style.background=['#fbbf24','#22c55e','#7fd1ff','#fff'][i%4];
        field.appendChild(s);
        var ang=Math.random()*Math.PI*2, dist=30+Math.random()*45;
        s.animate([{transform:'translate(0,0)',opacity:1},
          {transform:'translate('+Math.cos(ang)*dist+'px,'+Math.sin(ang)*dist+'px)',opacity:0}],
          {duration:480+Math.random()*200,easing:'cubic-bezier(.2,.7,.3,1)'});
        setTimeout(function(){ if(s.parentNode) s.remove(); }, 720);
      })();
    }
  }
  function floatScore(txt,x,y,plus){
    var d=document.createElement('div'); d.className='floatscore '+(plus?'plus':'minus');
    d.textContent=txt; d.style.left=(x-18)+'px'; d.style.top=(y-10)+'px'; field.appendChild(d);
    setTimeout(function(){ if(d.parentNode) d.remove(); }, 800);
  }
  function showCombo(n){
    comboEl.textContent=n+' COMBO!';
    comboEl.classList.remove('show'); void comboEl.offsetWidth; comboEl.classList.add('show');
  }
  function showBanner(txt){
    comboEl.textContent=txt;
    comboEl.classList.remove('show'); void comboEl.offsetWidth; comboEl.classList.add('show');
  }
  function shake(){ gameEl.classList.remove('shake'); void gameEl.offsetWidth; gameEl.classList.add('shake');
    setTimeout(function(){ gameEl.classList.remove('shake'); }, 420); }

  // ===== HUD / 타이머 =====
  function updateHUD(){ scoreVal.textContent=score; }
  function updateTimer(){
    timerVal.textContent=timeLeft;
    timerBox.classList.toggle('low', timeLeft<=10);
  }
  function tick(){
    if(!running) return;
    timeLeft--; updateTimer();
    if(timeLeft<=0) endGame();
  }

  // ===== 메인 루프 (몬스터 하강) =====
  function loop(ts){
    if(!running) return;
    if(!lastTs) lastTs=ts;
    var dt=Math.min(0.05,(ts-lastTs)/1000); lastTs=ts;
    var h=field.clientHeight, w=field.clientWidth;
    for(var i=0;i<monsters.length;i++){
      var m=monsters[i];
      m.y += m.vy*dt;
      if(m.y > h-70){ m.y=-6; m.x=rand(8,Math.max(40,w-90)); m.el.style.left=m.x+'px'; } // 바닥 닿으면 위로 순환
      m.el.style.top=m.y+'px';
    }
    rafId=requestAnimationFrame(loop);
  }

  // ===== 게임 시작/종료 =====
  function startGame(){
    ensureAudio();
    score=0; timeLeft=60; combo=0; level=0; lastHit=0; lastTs=0; running=true;
    overlay.style.display='none';
    updateHUD(); updateTimer();
    startRound();
    clearInterval(timerId); timerId=setInterval(tick,1000);
    cancelAnimationFrame(rafId); rafId=requestAnimationFrame(loop);
  }
  function endGame(){
    running=false;
    clearInterval(timerId); cancelAnimationFrame(rafId);
    clearMonsters();
    var best=+(localStorage.getItem('ess_best')||0);
    if(score>best){ best=score; localStorage.setItem('ess_best', best); }
    card.innerHTML =
      '<h1>⏰ 시간 종료!</h1>'+
      '<div class="big">'+score+'점</div>'+
      '<div class="best">🏆 최고 점수 '+best+'점</div>'+
      '<button class="btn" id="restartBtn">다시 시작 ↻</button>';
    overlay.style.display='flex';
    document.getElementById('restartBtn').addEventListener('click', startGame);
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  // 리사이즈 시 화면 밖 몬스터 보정
  window.addEventListener('resize', function(){
    var w=field.clientWidth;
    monsters.forEach(function(m){ if(m.x>w-70){ m.x=Math.max(8,w-90); m.el.style.left=m.x+'px'; } });
  });
})();
</script>
</body>
</html>
