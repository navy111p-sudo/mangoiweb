<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>망고아이 AI 상담직원</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body { font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:transparent; }
  #avatar-window { position:fixed; inset:0; width:100%; height:100%;
    background:rgba(20,20,25,0.96); border-radius:18px; overflow:hidden;
    display:flex; flex-direction:column; }
  #avatar-window.hidden { display:none; }
  #toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 12px;
    background:rgba(255,204,0,0.12); border-bottom:1px solid rgba(255,204,0,0.35); flex:0 0 auto; }
  #toolbar .title { color:#ffcc00; font-weight:700; font-size:15px; }
  #toolbar .controls button { background:transparent; border:none; cursor:pointer; font-size:17px;
    margin-left:6px; padding:2px 6px; border-radius:6px; }
  #toolbar .controls button:hover { background:rgba(255,255,255,0.12); }
  /* 하트 프레임 영상 아바타 */
  #avatar-area { position:relative; width:100%; height:250px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    background:radial-gradient(circle at 50% 40%, #2a2f3a 0%, #14141a 100%); }
  #avatar-video { width:250px; height:250px; object-fit:cover; object-position:center 22%; display:block;
    -webkit-clip-path:url(#heartClip); clip-path:url(#heartClip);
    filter:drop-shadow(0 6px 16px rgba(0,0,0,0.45)); background:#000; }
  #speaking-dot { position:absolute; top:10px; left:12px; background:rgba(0,0,0,0.55); color:#ffcc00;
    font-size:12px; padding:5px 10px; border-radius:12px; z-index:2; }
  #speaking-dot.hidden { display:none; }
  #subtitle { color:#fff; font-size:15px; line-height:1.6; padding:14px 16px; min-height:60px;
    flex:1 1 auto; overflow-y:auto; background:rgba(0,0,0,0.30); }
  #chat-area { display:flex; gap:8px; padding:12px; background:rgba(0,0,0,0.25); flex:0 0 auto;
    /* 우하단에 떠 있는 상담직원 얼굴 런처가 🎤마이크를 가리지 않도록 입력바를 위로 올림 */
    padding-bottom:calc(12px + 92px + env(safe-area-inset-bottom)); }
  #input-wrap { flex:1; position:relative; display:flex; }
  #chat-input { flex:1; width:100%; border:1px solid rgba(255,204,0,0.5); border-radius:12px;
    padding:12px 52px 12px 14px; font-size:16px; background:rgba(255,255,255,0.95); outline:none; }
  #send-btn { position:absolute; right:6px; top:50%; transform:translateY(-50%);
    width:36px; height:36px; background:#ffcc00; color:#1a1a1a; border:none;
    border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; }
  #send-btn svg { width:20px; height:20px; display:block; }
  #send-btn:hover { background:#ffd633; }
  #send-btn:disabled { opacity:0.5; cursor:not-allowed; }
  #mic-btn { width:44px; height:44px; flex:0 0 auto; border:none; border-radius:50%;
    background:rgba(255,255,255,0.92); color:#1a1a1a; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; padding:0; }
  #mic-btn.listening { background:#e53935; color:#fff; animation:micPulse 1s infinite; }
  @keyframes micPulse { 0%{ box-shadow:0 0 0 0 rgba(229,57,53,0.6); } 70%{ box-shadow:0 0 0 10px rgba(229,57,53,0); } 100%{ box-shadow:0 0 0 0 rgba(229,57,53,0); } }
  /* 🎤 마이크 안내 말풍선 — 마이크를 누르는 동안(빨간불)만 표시, 꼬리가 마이크를 가리킴 */
  #mic-tip { position:absolute; right:12px; bottom:166px; max-width:250px;
    background:rgba(38,42,52,0.94); color:#f3f5fa; font-size:13px; line-height:1.55;
    padding:11px 14px; border-radius:14px; border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 8px 22px rgba(0,0,0,0.5); z-index:60; pointer-events:none;
    opacity:0; transform:translateY(6px) scale(0.96); transform-origin:bottom right;
    transition:opacity .18s ease, transform .18s ease; }
  #mic-tip.show { opacity:1; transform:translateY(0) scale(1); }
  #mic-tip .hot { color:#ff6b6b; font-weight:800; }
  #mic-tip b { color:#ffd24a; }
  #mic-tip::after { content:""; position:absolute; right:24px; bottom:-9px;
    border-width:10px 9px 0 9px; border-style:solid;
    border-color:rgba(38,42,52,0.94) transparent transparent transparent; }
</style>
</head>
<body>
  <!-- 하트 모양 클립(영상 프레임용) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
      <path d="M0.5,0.30 C0.5,0.18 0.36,0.04 0.20,0.09 C0.04,0.14 0.01,0.34 0.10,0.50 C0.18,0.66 0.37,0.81 0.5,0.96 C0.63,0.81 0.82,0.66 0.90,0.50 C0.99,0.34 0.96,0.14 0.80,0.09 C0.64,0.04 0.5,0.18 0.5,0.30 Z"/>
    </clipPath>
  </defs></svg>

  <div id="avatar-window">
    <div id="toolbar">
      <span class="title" id="hdr-title">💁‍♀️ 망고아이 상담직원</span>
      <span class="controls">
        <button id="replay-btn" title="음성 다시듣기">🔁</button>
        <button id="close-btn" title="닫기">❌</button>
      </span>
    </div>
    <div id="avatar-area">
      <video id="avatar-video"
        src="https://webrtc-unified-platform.navy111p.workers.dev/video/postpone-guide.mp4"
        muted loop playsinline preload="auto"></video>
      <div id="speaking-dot" class="hidden">🔊 말하는 중...</div>
    </div>
    <div id="subtitle">무엇을 도와 드릴까요? 😊</div>
    <div id="chat-area">
      <div id="input-wrap">
        <input id="chat-input" type="text" placeholder="궁금한 점을 물어보세요!" autocomplete="off" />
        <button id="send-btn" type="button" aria-label="전송" title="전송">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 19V5M12 5L6 11M12 5L18 11" stroke="currentColor" stroke-width="2.4"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <button id="mic-btn" type="button" aria-label="음성으로 질문하기" title="음성으로 질문하기">🎤</button>
    </div>
    <div id="mic-tip">🎤 <b>마이크</b>를 누르고 <span class="hot">빨간불</span>일 때 질문하세요. 다시 누르면 상담사가 답변합니다.</div>
  </div>

<script>
  var subtitle=document.getElementById("subtitle");
  var input=document.getElementById("chat-input");
  var sendBtn=document.getElementById("send-btn");
  var replayBtn=document.getElementById("replay-btn");
  var closeBtn=document.getElementById("close-btn");
  var win=document.getElementById("avatar-window");
  var speakingDot=document.getElementById("speaking-dot");
  var video=document.getElementById("avatar-video");

  // 평소엔 입 닫힘(정지). 말할 때만 영상 재생 → 입 움직임.
  try{ video.pause(); video.currentTime=0; }catch(e){}
  video.addEventListener("loadeddata", function(){ try{ video.pause(); video.currentTime=0; }catch(e){} });
  // 영상 로드 실패 시 깔끔히 숨김(배경 그라데이션 유지)
  video.addEventListener("error", function(){ video.style.opacity="0"; });

  var lastAnswer="";
  var lastBlobUrl=null;
  var uiLang="ko";
  function startMouth(){
    speakingDot.classList.remove("hidden");
    if(ensureLipGraph()){
      try{ if(actx && actx.state==="suspended") actx.resume(); }catch(e){}
      if(!lipRAF) lipRAF=requestAnimationFrame(lipLoop);
    } else {
      try{ video.play(); }catch(e){}                 // WebAudio 미지원/실패 → 기존 동작 폴백
    }
  }
  function stopMouth(){
    speakingDot.classList.add("hidden");
    if(lipRAF){ try{ cancelAnimationFrame(lipRAF); }catch(e){} lipRAF=0; }
    try{ video.pause(); }catch(e){}
  }
  // 브라우저 내장 음성(영어/폴백)용 입모양: 오디오 분석 없이 영상 루프 재생
  function startMouthPlain(){ speakingDot.classList.remove("hidden"); try{ video.play(); }catch(e){} }

  // === 음성: 1순위 타입캐스트(서버), 실패 시 브라우저 음성 ===
  var audioEl = new Audio();
  // 모바일(안드로이드 Chrome) 자동재생 정책 우회: 첫 사용자 제스처에서 오디오/영상 잠금 해제
  var __mu=false;function __unlock(){if(__mu)return;__mu=true;try{if(actx&&actx.state==="suspended")actx.resume();}catch(e){}try{var p=audioEl.play();if(p&&p.then)p.then(function(){audioEl.pause();audioEl.currentTime=0;}).catch(function(){});}catch(e){}try{var pv=video.play();if(pv&&pv.then)pv.then(function(){video.pause();video.currentTime=0;}).catch(function(){});}catch(e){}}
  ["touchstart","pointerdown","mousedown","click","keydown"].forEach(function(ev){document.addEventListener(ev,__unlock,{passive:true});});
  audioEl.addEventListener("playing", startMouth);
  audioEl.addEventListener("ended", stopMouth);
  audioEl.addEventListener("pause", stopMouth);
  audioEl.addEventListener("error", stopMouth);

  // === 음량 기반 립싱크 (Web Audio) — 음소 모양은 못 바꾸지만 음량으로 입 움직임 강약 ===
  var actx=null, srcNode=null, analyser=null, lipData=null, lipRAF=0, lipReady=false, lipFailed=false;
  function ensureLipGraph(){            // 엘리먼트당 createMediaElementSource는 1회 → 지연 1회 생성
    if(lipReady) return true;
    if(lipFailed) return false;
    try{
      var AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) throw new Error("no WebAudio");
      actx=new AC();
      srcNode=actx.createMediaElementSource(audioEl);
      srcNode.connect(actx.destination);             // 1) 소리 경로 먼저 보장(필수 — 안 하면 무음)
      analyser=actx.createAnalyser(); analyser.fftSize=512;
      srcNode.connect(analyser);                      // 2) 분석용 탭(destination 연결 불필요)
      lipData=new Uint8Array(analyser.fftSize);
      lipReady=true;
      return true;
    }catch(e){
      lipFailed=true;                                 // 실패 → 재시도 안 함, video.play() 폴백
      try{ if(actx) actx.close(); }catch(_){}
      actx=null; srcNode=null; analyser=null;
      return false;
    }
  }
  function lipLoop(){
    if(!lipReady){ lipRAF=0; return; }
    analyser.getByteTimeDomainData(lipData);
    var sum=0;
    for(var i=0;i<lipData.length;i++){ var v=(lipData[i]-128)/128; sum+=v*v; }
    var level=Math.sqrt(sum/lipData.length);          // RMS 0~1
    if(level>0.06){
      try{ if(video.paused) video.play(); video.playbackRate=0.7+level*1.1; }catch(e){}
    } else {
      try{ if(!video.paused) video.pause(); }catch(e){}
    }
    lipRAF=requestAnimationFrame(lipLoop);
  }

  // 자연스러운 브라우저 음성 선택: Google/Natural/Online 신경망 음성 우선(로봇음 완화).
  var koVoice=null, enVoice=null;
  function _bestVoice(vs, langRe, prefs){
    var cand=vs.filter(function(v){ return langRe.test(v.lang||""); });
    for(var i=0;i<prefs.length;i++){
      for(var j=0;j<cand.length;j++){
        var nm=((cand[j].name||"")+" "+(cand[j].lang||"")).toLowerCase();
        if(nm.indexOf(prefs[i])>=0) return cand[j];
      }
    }
    return cand[0]||null;
  }
  function pickVoice(){ var vs=window.speechSynthesis?speechSynthesis.getVoices():[];
    koVoice=_bestVoice(vs, /ko/i, ["google","natural","online","heami","sun-hi","yuna","seoyeon","ko-kr"]);
    enVoice=_bestVoice(vs, /^en/i, ["google us","google uk","natural","online","aria","jenny","guy","en-us"]);
  }
  if(window.speechSynthesis){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
  function speakBrowser(text){
    if(!window.speechSynthesis){ startMouthPlain(); setTimeout(stopMouth, Math.min(12000, Math.max(1500, text.length*90))); return; }
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    // 약간 느린 속도 + 살짝 높은 톤이 한국어를 더 따뜻하고 사람스럽게 들리게 함
    if(/[가-힣]/.test(text)){ u.lang="ko-KR"; if(koVoice) u.voice=koVoice; u.rate=0.97; u.pitch=1.32; }
    else { u.lang="en-US"; if(enVoice) u.voice=enVoice; u.rate=0.98; u.pitch=1.02; }
    u.volume=1.0;
    u.onstart=startMouthPlain; u.onend=stopMouth; u.onerror=stopMouth;
    speechSynthesis.speak(u);
  }

  // === 음성 정지: 진행 중 TTS fetch 취소 + 재생/입모양 중단 ===
  var ttsAbort=null, speakSeq=0;
  function stopSpeaking(){
    speakSeq++;                                 // 진행 중 시퀀스 무효화(늦게 온 TTS 폐기)
    try{ if(ttsAbort) ttsAbort.abort(); }catch(e){}
    ttsAbort=null;
    try{ if(window.AndroidTTS && window.AndroidTTS.stop) window.AndroidTTS.stop(); }catch(e){}
    try{ speechSynthesis.cancel(); }catch(e){}
    try{ audioEl.pause(); audioEl.currentTime=0; }catch(e){}
    stopMouth();
  }

  // 답변 읽어주기: Typecast(성우) 미사용 — 크레딧이 너무 빨리 소진돼 배제.
  // 👩 여자 목소리 우선순위:
  //  ① 앱(APK v1.8+) 네이티브 TTS 브리지(window.AndroidTTS) — 구글 시스템 한국어(여성)
  //  ② 한국어 + 브라우저에 한국어 음성 있음 → speakBrowser(_bestVoice 가 여성 우선)
  //  ③ 서버 TTS(/api/tts-free): 영어=Aura-2 asteria(여성 원어민). 한국어는 최후 폴백
  //     (CF→구글 TTS가 깨진 오디오를 주는 문제 확인 — 구형 APK 전용 안전망일 뿐)
  function _ttsClean(t){
    return (t||"").replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE0F}]/gu,"")
                  .replace(/\s{2,}/g," ").trim();
  }
  function _hasKoBrowserVoice(){
    try{ if(!window.speechSynthesis) return false;
      if(koVoice) return true;
      var vs=speechSynthesis.getVoices()||[];
      return vs.some(function(v){ return /ko/i.test(v.lang||""); });
    }catch(e){ return false; }
  }
  function speak(text){
    lastAnswer=text;
    stopListening();                            // 답변 재생 시작 → 듣기 중이면 정지(에코 방지)
    stopSpeaking();                             // 이전 음성/입모양 정지 + 토큰 증가
    var spoken=_ttsClean(text);
    if(!spoken){ return; }
    var isKo=/[가-힣]/.test(spoken);
    // ① 앱 네이티브 TTS(여성) — 브리지가 있으면 무조건 이 경로
    try{
      if(window.AndroidTTS && window.AndroidTTS.isReady && window.AndroidTTS.isReady()){
        window.AndroidTTS.speak(spoken, isKo?"ko":"en", isKo?1.32:1.1, 1.0);
        startMouthPlain();
        setTimeout(stopMouth, Math.min(30000, Math.max(1500, spoken.length*(isKo?110:70))));
        return;
      }
    }catch(e){}
    // ② 한국어는 브라우저 음성(여성 우선)이 서버 구글 TTS보다 훨씬 자연스러움
    if(isKo && _hasKoBrowserVoice()){ speakBrowser(text); return; }
    var mySeq=speakSeq;
    ttsAbort=new AbortController();
    fetch("/api/tts-free",{ method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ text:spoken, lang:/[가-힣]/.test(spoken)?"ko":"en" }),
        signal:ttsAbort.signal })
      .then(function(r){ if(!r.ok) throw new Error("tts_"+r.status); return r.blob(); })
      .then(function(b){
        if(mySeq!==speakSeq) return;            // 그 사이 정지/새 발화 → 폐기
        if(lastBlobUrl){ try{ URL.revokeObjectURL(lastBlobUrl); }catch(e){} }
        lastBlobUrl=URL.createObjectURL(b);
        audioEl.src=lastBlobUrl;                // playing→startMouth / ended→stopMouth 는 리스너가 처리
        // 👩 여자 목소리: 한국어 서버 TTS(Google, 중저음)는 피치를 올려 여성 톤으로.
        //    preservesPitch=false + playbackRate>1 = 피치·속도 동반 상승(약 +2.4반음).
        //    영어(Aura-2 asteria)는 원래 여성 음성이라 원음 그대로(1.0 + 피치 보존).
        var isKo=/[가-힣]/.test(spoken);
        try{ audioEl.preservesPitch=!isKo; audioEl.webkitPreservesPitch=!isKo; audioEl.mozPreservesPitch=!isKo; }catch(e){}
        audioEl.playbackRate = isKo ? 1.22 : 1.0;
        var p=audioEl.play();
        if(p&&p.catch) p.catch(function(){ if(mySeq===speakSeq) speakBrowser(text); });
      })
      .catch(function(e){
        if(mySeq===speakSeq && (!e||e.name!=="AbortError")) speakBrowser(text);
      });
  }

  // === 정지 트리거: 부모(mangoi-stop) / 탭 숨김 / 페이지 이탈 ===
  window.addEventListener("message", function(ev){
    var d=ev.data;
    if(d==="mangoi-stop" || (d && d.type==="mangoi-stop")) stopSpeaking();
    if(d && d.type==="mangoi-lang" && d.lang) applyLang(d.lang);
    if(d==="mangoi-greet" || (d && d.type==="mangoi-greet")) greetOnOpen();   // 위젯 열릴 때 인사말 먼저 음성으로
    if(d==="mangoi-reset" || (d && d.type==="mangoi-reset")) resetWidget();   // 닫을 때 → 다시 열면 처음부터 깨끗하게
  });
  // === 위젯 초기화: 닫을 때 호출 → 대화/상태 비우고 깨끗한 인사 화면으로 ===
  function resetWidget(){
    pendingGo=null;
    try{ stopSpeaking(); }catch(e){}
    if(input) input.value="";
    __typedNotified=false;          // 타이핑 알림 재무장(다음에 다시 홍보영상 페이드 등 동작)
    _greetGuard=0;                  // 다음 열 때 인사 음성 다시 나오게
    var t=I18N[uiLang]||I18N.ko;
    if(subtitle) subtitle.textContent=t.greet;   // 깨끗한 인사 화면으로 복귀
  }
  // === 인사말 음성 미리 받아두기(클릭/열림 즉시 재생되도록 프리패치) ===
  var _greetAudio={};          // spoken 텍스트 -> blob URL (네트워크 왕복 미리 끝내둠)
  function _greetSpoken(lang){
    var t=I18N[lang]||I18N.ko;
    return t.greet.replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE0F}]/gu,"")
                  .replace(/\s{2,}/g," ").trim();
  }
  function prefetchGreet(lang){
    // Typecast(성우) 미사용 → 인사 음성 프리패치 안 함. 인사말도 브라우저 음성으로 speakGreet→speak 처리.
    return;
  }
  // 프리패치된 인사 음성이 있으면 fetch 없이 즉시 재생, 없으면 기존 speak 폴백
  function speakGreet(spoken){
    var url=_greetAudio[spoken];
    if(!url){ speak(spoken); return; }
    lastAnswer=spoken;
    try{ stopListening(); }catch(e){}
    stopSpeaking();                              // 토큰 증가 후 mySeq 확보
    var mySeq=speakSeq;
    try{
      audioEl.src=url;                           // 캐시 blob은 revoke하지 않고 재사용
      var p=audioEl.play();

  // 브라우저 음성인식(Web Speech API)이 Chrome 에서 차단된다(권한은 받아도 start() 가 실패).
  // 화상수업 마이크가 되는 이유는 getUserMedia/WebRTC 를 쓰기 때문 — iframe 에서도 동작함.
  // 그래서 getUserMedia 로 직접 '녹음' 한 뒤 서버 /api/stt(Workers AI Whisper)로 보내 텍스트로 변환한다.
  // iOS Safari 도 MediaRecorder 를 지원하므로 이제 음성 입력이 가능하다.
  // 녹음은 Web Audio 로 raw PCM 을 직접 캡처해 16kHz mono WAV 로 인코딩한다.
  // MediaRecorder(webm/opus)는 Cloudflare Whisper 가 디코딩을 자주 실패해 빈 결과가 나온다 —
  // Whisper 가 가장 확실히 인식하는 포맷이 16kHz mono WAV(PCM) 라서 인식률이 크게 좋아진다.
  var micBtn=document.getElementById("mic-btn");
  var listening=false, recStream=null, recTimer=null, recAborted=false;
  var audioCtx=null, srcNode=null, procNode=null, silentGain=null, pcmChunks=[], pcmLen=0, inRate=44100;
  function setListening(on){ listening=on; if(micBtn) micBtn.classList.toggle("listening", on);
    var tip=document.getElementById("mic-tip");
    if(tip){
      if(on){ tip.innerHTML = (uiLang==="en")
          ? '🎤 Press the <b>mic</b> and ask while the light is <span class="hot">red</span>. Press again and the consultant replies.'
          : '🎤 <b>마이크</b>를 누르고 <span class="hot">빨간불</span>일 때 질문하세요. 다시 누르면 상담사가 답변합니다.'; }
      tip.classList.toggle("show", on);   // 마이크 누르면(녹음 시작) 표시, 다시 누르면(종료) 사라짐
    }
  }
  function stopListening(){ if(listening){ recAborted=true; finishRecording(); } } // 외부에서 취소(언어 전환 등)
  function transcribe(blob){
    subtitle.textContent="음성을 인식하고 있어요…";
    fetch("/api/stt?lang="+encodeURIComponent(uiLang),{ method:"POST", headers:{"Content-Type": blob.type||"audio/wav"}, body:blob })
      .then(function(r){ return r.json().then(function(d){ return { ok:r.ok, d:d||{} }; }); })
      .then(function(res){
        var txt=(res.d.text||"").trim();
        if(res.ok && txt){ input.value=txt; notifyTyping(); send(); return; }   // 인식 성공 → 자동 전송
        // 서버/쿼터 오류(HTTP 실패 or error 필드): 발음 탓으로 오해시키지 말 것
        if(!res.ok || res.d.error){ subtitle.textContent="지금 음성 인식 서버가 원활하지 않아요. 잠시 후 다시 시도하거나 아래 칸에 직접 입력해 주세요."; return; }
        subtitle.textContent="잘 못 들었어요. 다시 한 번 또렷하게 말씀해 주세요.";   // 200 + 빈 텍스트일 때만 = 진짜 못 알아들음
      })
      .catch(function(){ subtitle.textContent="음성 인식에 실패했어요. 잠시 후 다시 시도하거나 아래 칸에 직접 입력해 주세요."; });
  }
  // Float32 PCM 을 16kHz 로 다운샘플(구간 평균)
  function downsampleTo16k(buf, rate){
    var outRate=16000; if(rate===outRate) return buf;
    var ratio=rate/outRate, outLen=Math.round(buf.length/ratio), out=new Float32Array(outLen);
    var oi=0, ib=0;
    while(oi<outLen){
      var next=Math.round((oi+1)*ratio), sum=0, cnt=0;
      for(var i=ib;i<next && i<buf.length;i++){ sum+=buf[i]; cnt++; }
      out[oi++]=cnt?sum/cnt:0; ib=next;
    }
    return out;
  }
  // 16-bit PCM WAV Blob 생성
  function encodeWav(samples, rate){
    var buf=new ArrayBuffer(44+samples.length*2), view=new DataView(buf);
    function ws(off,s){ for(var i=0;i<s.length;i++) view.setUint8(off+i, s.charCodeAt(i)); }
    ws(0,"RIFF"); view.setUint32(4,36+samples.length*2,true); ws(8,"WAVE");
    ws(12,"fmt "); view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true);
    view.setUint32(24,rate,true); view.setUint32(28,rate*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
    ws(36,"data"); view.setUint32(40,samples.length*2,true);
    var off=44;
    for(var i=0;i<samples.length;i++){ var s=Math.max(-1,Math.min(1,samples[i])); view.setInt16(off, s<0?s*0x8000:s*0x7FFF, true); off+=2; }
    return new Blob([view], {type:"audio/wav"});
  }
  function finishRecording(){
    if(!procNode && !recStream) return;   // 이미 종료됨(재진입 방지). audioCtx 는 재사용 위해 닫지 않음.
    try{ if(procNode){ procNode.onaudioprocess=null; procNode.disconnect(); } }catch(e){}
    try{ if(silentGain) silentGain.disconnect(); }catch(e){}
    try{ if(srcNode) srcNode.disconnect(); }catch(e){}
    if(recTimer){ clearTimeout(recTimer); recTimer=null; }
    if(recStream){ try{ recStream.getTracks().forEach(function(t){ t.stop(); }); }catch(e){} recStream=null; }
    var rate=inRate, aborted=recAborted, chunks=pcmChunks, total=pcmLen;
    srcNode=null; procNode=null; silentGain=null; pcmChunks=[]; pcmLen=0;
    setListening(false);
    if(aborted || !total) return;
    if(total/rate < 0.4){ subtitle.textContent="너무 짧아요. 🎤 를 누르고 조금 더 길게 말씀해 주세요."; return; }
    var merged=new Float32Array(total), off=0;
    for(var i=0;i<chunks.length;i++){ merged.set(chunks[i], off); off+=chunks[i].length; }
    transcribe(encodeWav(downsampleTo16k(merged, rate), 16000));
  }
  function ensureAudioCtx(){   // 사용자 제스처(클릭) 안에서 생성/재개해야 iOS Safari 에서 onaudioprocess 가 돈다
    var AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return null;
    if(!audioCtx || audioCtx.state==="closed"){ audioCtx=new AC(); }
    if(audioCtx.state==="suspended"){ try{ audioCtx.resume(); }catch(e){} }
    return audioCtx;
  }
  function startRecording(){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !audioCtx){
      subtitle.textContent="이 브라우저는 녹음을 지원하지 않아요. 최신 브라우저에서 시도해 주세요."; return;
    }
    stopSpeaking();                    // 에코 방지: 말하는 중이면 정지
    recAborted=false;
    navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true, noiseSuppression:true, autoGainControl:true}}).then(function(stream){
      if(recAborted){ try{ stream.getTracks().forEach(function(t){ t.stop(); }); }catch(e){} return; }  // 권한 대기 중 취소됨
      recStream=stream; pcmChunks=[]; pcmLen=0;
      if(audioCtx.state==="suspended"){ try{ audioCtx.resume(); }catch(e){} }   // iOS Safari
      inRate=audioCtx.sampleRate||44100;
      srcNode=audioCtx.createMediaStreamSource(stream);
      procNode=audioCtx.createScriptProcessor(4096,1,1);
      procNode.onaudioprocess=function(ev){
        if(recAborted) return;
        var ch=ev.inputBuffer.getChannelData(0);
        pcmChunks.push(new Float32Array(ch)); pcmLen+=ch.length;
      };
      silentGain=audioCtx.createGain(); silentGain.gain.value=0;   // 무음 경로: onaudioprocess 발화용(스피커 피드백 방지)
      srcNode.connect(procNode); procNode.connect(silentGain); silentGain.connect(audioCtx.destination);
      setListening(true);
      subtitle.textContent="듣고 있어요… 다 말한 뒤 🎤 를 한 번 더 누르세요.";
      recTimer=setTimeout(function(){ if(listening) finishRecording(); }, 15000); // 안전장치: 최대 15초
    }).catch(function(err){
      setListening(false);
      subtitle.textContent = (err && (err.name==="NotAllowedError"||err.name==="SecurityError"))
        ? "마이크 권한이 꺼져 있어요. 주소창의 🔒(자물쇠) → 마이크 → '허용'으로 바꾼 뒤 다시 눌러주세요."
        : "마이크를 사용할 수 없어요. 다른 앱이 마이크를 쓰고 있지 않은지 확인 후 다시 시도해 주세요.";
    });
  }
  if(micBtn){
    micBtn.addEventListener("click", function(){
      if(listening){ finishRecording(); return; }  // 두 번째 클릭 → 종료 후 전송
      ensureAudioCtx();     // 클릭(제스처) 안에서 오디오 컨텍스트 준비 — iOS 필수
      startRecording();
    });
  }
</script>
</body>
</html>
