<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>교사 — 교재 공유</title>
<style>
  body{font-family:-apple-system,"Noto Sans KR",sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
  .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px;background:#1e293b}
  button,label.btn{padding:8px 14px;border:0;border-radius:8px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
  #canvas{display:block;background:#fff;margin:12px auto;max-width:96%;border-radius:8px}
  .tag{font-size:12px;color:#94a3b8}
</style>
</head>
<body>
  <div class="bar">
    <b>👨‍🏫 교사</b>
    <span class="tag" id="roomTag"></span>
    <!-- 교재 업로드: 이미지(PDF는 pdf.js 필요 — 아래 주석 참고) -->
    <label class="btn">📁 교재 업로드
      <input id="file" type="file" accept="image/*" hidden>
    </label>
    <button id="prev">◀ 이전</button>
    <span id="pageInfo" class="tag">- / -</span>
    <button id="next">다음 ▶</button>
  </div>
  <canvas id="canvas" width="900" height="600"></canvas>

  <!-- Socket.io 클라이언트 라이브러리 (서버가 자동 제공) -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── 방 코드: URL ?room=class1 에서 읽음 (없으면 기본값) ──
    const room = new URLSearchParams(location.search).get('room') || 'class1';
    document.getElementById('roomTag').textContent = '방: ' + room;

    const socket = io();                       // 서버에 연결
    socket.emit('join_room', room);            // 같은 방에 입장 (학생과 동일 코드여야 함)

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // 교재가 여러 장(페이지)일 수 있으므로 배열로 관리
    let pages = [];      // 각 페이지의 이미지 DataURL 들
    let cur = 0;         // 현재 페이지 인덱스

    // 캔버스에 이미지를 '비율 유지하며' 꽉 차게 그리는 함수
    function drawImage(url){
      const img = new Image();
      img.onload = () => {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);          // 배경 흰색
        const r = Math.min(canvas.width / img.width, canvas.height / img.height);
        const w = img.width * r, h = img.height * r;
        ctx.drawImage(img, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);  // 가운데 정렬
      };
      img.src = url;                            // 이미지 로드 시작
    }

    function showPage(i){
      if (!pages.length) return;
      cur = Math.max(0, Math.min(i, pages.length - 1));
      document.getElementById('pageInfo').textContent = (cur + 1) + ' / ' + pages.length;
      drawImage(pages[cur]);                    // 1) 교사 화면에 그리기
    }

    // ── 파일 업로드 → 이미지를 읽어 DataURL 로 변환 → 학생에게 전송 ──
    document.getElementById('file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        pages = [reader.result];                // (여러 장이면 여기서 배열에 push)
        cur = 0;
        showPage(0);                            // 교사 본인 화면 표시
        // 🚀 학생에게 교재 공유 (이미지 데이터 + 페이지 + 이름)
        socket.emit('material_share', { image: reader.result, page: 1, name: file.name });
      };
      reader.readAsDataURL(file);               // 파일 → base64 DataURL
    });

    // ── 이전/다음 → 교사 화면 갱신 + 학생에게 페이지 번호 전송 ──
    document.getElementById('prev').onclick = () => {
      showPage(cur - 1);
      socket.emit('material_page', { page: cur + 1, image: pages[cur] });
    };
    document.getElementById('next').onclick = () => {
      showPage(cur + 1);
      socket.emit('material_page', { page: cur + 1, image: pages[cur] });
    };

    /*
      📌 PDF 교재를 쓰려면:
      1) head 에 pdf.js 스크립트를 추가 (cdnjs 의 pdf.min.js).
      2) 업로드한 PDF 를 pdfjsLib.getDocument(arrayBuffer) 로 열고,
         각 page.render({canvasContext, viewport}) 로 캔버스에 그린 뒤
         canvas.toDataURL() 로 이미지화하여 위 pages[] 에 넣으면
         이미지와 똑같은 방식으로 학생에게 공유됩니다.
    */
  </script>
</body>
</html>
