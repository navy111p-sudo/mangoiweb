<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>망고아이 — 가로 레이아웃 / 회전 테스트 하니스</title>
<style>
  :root{--ok:#16a34a;--no:#dc2626;--bd:#e3e8ef;--mut:#64748b;--bg:#f6f8fb}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:#1f2733;padding:18px;line-height:1.5}
  h1{font-size:18px;margin:0 0 4px}
  .sub{color:var(--mut);font-size:13px;margin:0 0 16px}
  .wrap{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px;align-items:start}
  @media(max-width:880px){.wrap{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px}
  .bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  button{font:inherit;font-size:13px;font-weight:600;border:1px solid var(--bd);background:#fff;color:#1f2733;
    border-radius:8px;padding:8px 12px;cursor:pointer}
  button:hover{background:var(--bg)}
  button.primary{background:#2563eb;color:#fff;border-color:#2563eb}
  .frame-shell{border:1px solid var(--bd);border-radius:10px;overflow:auto;background:#0f1626;padding:10px;display:flex;justify-content:center}
  iframe{border:0;background:#0f1626}
  .size{font-size:12px;color:var(--mut);margin-top:6px;text-align:center}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td{padding:7px 8px;border-bottom:1px solid #eef1f5;vertical-align:top}
  td.st{width:54px;font-weight:700;white-space:nowrap}
  .pass{color:var(--ok)} .fail{color:var(--no)}
  .msg{color:var(--mut);font-size:12px}
  .summary{font-weight:700;font-size:14px;margin:10px 0 0}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:700}
  .pill.ok{background:#dcfce7;color:#166534}.pill.no{background:#fee2e2;color:#991b1b}
  code{background:#eef1f5;padding:1px 5px;border-radius:5px;font-size:12px}
</style>
</head>
<body>
<h1>🧪 망고아이 — 가로 레이아웃 / 회전 테스트 하니스</h1>
<p class="sub">대상: <code>mobile-class-entry-mockup.html</code> · iframe을 세로(360×720)/가로(720×360)로 리사이즈하며 자동 검증합니다.</p>

<div class="wrap">
  <div class="card">
    <div class="bar">
      <button class="primary" id="runBtn">▶ 전체 테스트 실행</button>
      <button id="pBtn">세로로 보기</button>
      <button id="lBtn">가로로 보기</button>
      <button id="reloadBtn">↻ 새로고침</button>
    </div>
    <div class="frame-shell">
      <iframe id="frame" src="mobile-class-entry-mockup.html" width="360" height="720" title="mockup"></iframe>
    </div>
    <div class="size" id="sizeLbl">360 × 720 (세로)</div>
  </div>

  <div class="card">
    <div class="summary" id="summary"><span class="pill" id="pill">대기 중</span></div>
    <table><tbody id="results"></tbody></table>
  </div>
</div>

<script>
const frame=document.getElementById('frame');
const resultsEl=document.getElementById('results');
const pill=document.getElementById('pill');
const summaryEl=document.getElementById('summary');
const sizeLbl=document.getElementById('sizeLbl');

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const raf=()=>new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
const doc=()=>frame.contentDocument;
const win=()=>frame.contentWindow;

function setSize(o){
  if(o==='landscape'){frame.width=720;frame.height=360;}
  else{frame.width=360;frame.height=720;}
  sizeLbl.textContent=(o==='landscape'?'720 × 360 (가로)':'360 × 720 (세로)');
}
// iframe 크기 변경 후, 내부 window에 resize 디스패치(회전 핸들러 트리거) + 미디어쿼리 재평가 대기
async function orient(o){
  setSize(o);
  await raf();
  try{ win().dispatchEvent(new Event('resize')); }catch(e){}
  await raf(); await sleep(40);
}
function rect(sel){ const el=doc().querySelector(sel); return el?el.getBoundingClientRect():null; }
function overlap(a,b){ return !(a.right<=b.left||b.right<=a.left||a.bottom<=b.top||b.bottom<=a.top); }

const TESTS=[
  {name:'세로: .screen 레이아웃 = flex', run:async()=>{
    await orient('portrait');
    const d=win().getComputedStyle(doc().querySelector('.screen')).display;
    return [d==='flex', '실제값: '+d];
  }},
  {name:'가로: .screen 레이아웃 = grid(2단)', run:async()=>{
    await orient('landscape');
    const d=win().getComputedStyle(doc().querySelector('.screen')).display;
    return [d==='grid', '실제값: '+d];
  }},
  {name:'가로: 카메라 영상 16:9 비율 유지', run:async()=>{
    await orient('landscape');
    const r=rect('.tile.main .vid');
    const ratio=r? r.width/r.height : 0;
    return [Math.abs(ratio-16/9)<0.1, '비율 '+ratio.toFixed(3)+' (기대 1.778)'];
  }},
  {name:'가로: 시계 ↔ 테마토글 미겹침', run:async()=>{
    await orient('landscape');
    const a=rect('.clock-pill'), b=rect('.theme-toggle');
    if(!a||!b) return [false,'요소 없음'];
    return [!overlap(a,b), overlap(a,b)?'겹침 발생!':'겹치지 않음 OK'];
  }},
  {name:'설정 통합: #menuSettings 존재 · #kebab/#menuClass/#menuDevice 없음', run:async()=>{
    const d=doc();
    const has=!!d.getElementById('menuSettings');
    const gone=!d.getElementById('kebab')&&!d.getElementById('menuClass')&&!d.getElementById('menuDevice');
    return [has&&gone, has?(gone?'단일 설정 메뉴 OK':'옛 메뉴 잔존'):'#menuSettings 없음'];
  }},
  {name:'자동 녹화 배지 기본 ON', run:async()=>{
    const on=doc().getElementById('recBadge').classList.contains('on');
    return [on, on?'rec.on 적용됨':'녹화 배지 꺼짐'];
  }},
  {name:'하단 도크: 아이콘만(라벨 텍스트 노드 없음)', run:async()=>{
    const tools=[...doc().querySelectorAll('.toolbar .tool')];
    // 버튼의 직접 자식은 .ic 스팬 하나뿐이어야 함(아이콘 밑 라벨 텍스트 노드 제거 확인)
    const iconOnly=tools.every(t=>t.childNodes.length===1 && t.firstElementChild && t.firstElementChild.classList.contains('ic'));
    return [tools.length===5&&iconOnly, tools.length+'개 버튼 · '+(iconOnly?'아이콘만 OK':'라벨 텍스트 노드 잔존')];
  }},
  {name:'회전 핸들러 동작(디바운스 후 rotations 증가)', run:async()=>{
    await orient('portrait');
    const before=win().__mangoi?win().__mangoi.rotations:-1;
    if(before<0) return [false,'__mangoi 훅 없음'];
    await orient('landscape');
    await sleep(330); // 250ms 디바운스 대기
    const after=win().__mangoi.rotations;
    const last=win().__mangoi.last;
    return [after>before&&last&&last.orientation==='landscape',
      'rotations '+before+'→'+after+', last='+(last?last.orientation:'-')];
  }},
  {name:'회전 후 다크모드 상태 유지', run:async()=>{
    await orient('portrait');
    const d=doc();
    if(!d.body.classList.contains('dark')) d.getElementById('darkBtn').click(); // 다크 ON
    await orient('landscape'); await sleep(330);
    const keep=doc().body.classList.contains('dark') && win().__mangoi.last.dark===true;
    d.getElementById('lightBtn').click(); // 원복
    return [keep, keep?'회전 후에도 dark 유지':'다크 상태 유실'];
  }},
  {name:'회전 후 활성 탭 유지', run:async()=>{
    await orient('portrait');
    const tab=[...doc().querySelectorAll('.tab')].find(t=>t.dataset.tab==='교재');
    tab.click();
    await orient('landscape'); await sleep(330);
    const active=doc().querySelector('.tab.active');
    const ok=active&&active.dataset.tab==='교재'&&win().__mangoi.last.activeTab==='교재';
    return [ok, '활성 탭: '+(active?active.dataset.tab:'-')];
  }},
];

function row(name,ok,msg){
  const tr=document.createElement('tr');
  tr.innerHTML='<td class="st '+(ok?'pass':'fail')+'">'+(ok?'PASS':'FAIL')+'</td>'+
    '<td>'+name+'<div class="msg">'+(msg||'')+'</div></td>';
  resultsEl.appendChild(tr);
}

async function runAll(){
  resultsEl.innerHTML=''; pill.className='pill'; pill.textContent='실행 중…';
  // 깨끗한 상태로 시작
  await reload();
  let pass=0;
  for(const t of TESTS){
    let ok=false,msg='';
    try{ const [o,m]=await t.run(); ok=o; msg=m; }
    catch(e){ ok=false; msg='오류: '+e.message; }
    row(t.name,ok,msg); if(ok)pass++;
  }
  await orient('portrait');
  const all=pass===TESTS.length;
  pill.className='pill '+(all?'ok':'no');
  pill.textContent=pass+' / '+TESTS.length+' 통과';
}

function reload(){
  return new Promise(res=>{
    setSize('portrait');
    frame.onload=async()=>{ await sleep(60); res(); };
    frame.src='mobile-class-entry-mockup.html?ts='+Date.now();
  });
}

// 프리뷰/자동화에서 호출 — 결과를 구조화해 반환
window.__runTests=async function(){
  resultsEl.innerHTML=''; pill.className='pill'; pill.textContent='실행 중…';
  await reload();
  const out=[];
  for(const t of TESTS){
    let ok=false,msg='';
    try{const [o,m]=await t.run();ok=o;msg=m;}catch(e){ok=false;msg='오류: '+e.message;}
    row(t.name,ok,msg); out.push({name:t.name,ok,msg});
  }
  await orient('portrait');
  const pass=out.filter(x=>x.ok).length;
  pill.className='pill '+(pass===TESTS.length?'ok':'no');
  pill.textContent=pass+' / '+TESTS.length+' 통과';
  return {pass,total:TESTS.length,results:out};
};

document.getElementById('runBtn').onclick=()=>runAll().catch(e=>{
  pill.className='pill no';
  pill.textContent='접근 차단';
  summaryEl.insertAdjacentHTML('beforeend',
    '<div class="msg" style="margin-top:8px;color:var(--no)">iframe 접근이 차단됐습니다('+e.message+
    '). file:// 보안정책 때문일 수 있어요 — 로컬 서버로 여세요: <code>npx serve</code> 또는 <code>python -m http.server</code></div>');
});
document.getElementById('pBtn').onclick=()=>orient('portrait');
document.getElementById('lBtn').onclick=()=>orient('landscape');
document.getElementById('reloadBtn').onclick=()=>reload();
</script>
</body>
</html>
